2,"en":"Here is a useful tip that can help you remember new words more easily when you study English.","zh":"这里有一个有用的窍门，能帮助你在学英语时更容易地记住生词。"},{"l":3,"en":"The teacher gave us one final tip before the exam: stay calm, read each question twice, and never give up too easily.","zh":"考试前老师给了我们最后一个建议：保持冷静，每道题读两遍，永远不要轻易放弃。"}]}]},{"day":54,"w":"tired","ph":"","defs":[{"pos":"adj.","m":"疲劳的，累的","ex":[{"l":1,"en":"When we reached the houses in the late afternoon, we were tired.","zh":"下午晚些时候我们到达那些房子时，我们已经很累了。"},{"l":2,"en":"After running for an hour, the boys were so tired that they fell asleep on the sofa at once.","zh":"跑了一个小时后，男孩们累得马上在沙发上睡着了。"},{"l":3,"en":"Tired as she was after a whole day’s work, she still insisted on finishing the report before going to bed.","zh":"尽管工作了一整天很疲惫，她仍坚持在睡觉前完成这份报告。"}]}]},{"day":54,"w":"title","ph":"","defs":[{"pos":"n.","m":"标题，题目","ex":[{"l":1,"en":"What is the title of the book?","zh":"这本书的标题是什么？"},{"l":2,"en":"The title of the article tells us that the writer wants to share his travel story with readers.","zh":"文章的标题告诉我们，作者想和读者分享他的旅行故事。"},{"l":3,"en":"Only by reading beyond the title can we truly understand what the author intends to express in this moving essay.","zh":"只有超越标题去阅读，我们才能真正理解作者在这篇感人的文章中想要表达的内容。"}]}]},{"day":54,"w":"to","ph":"","defs":[{"pos":"prep.","m":"给...；对...，向...，到","ex":[{"l":1,"en":"It’s time to begin.","zh":"该开始了。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想说的是，虽然有人说拥有物品是一种巨大的快乐，但我认为使用你拥有的东西更令人愉快。"},{"l":3,"en":"Determined to make his dream come true, the boy devoted every spare minute to reading books related to science.","zh":"决心实现梦想，这个男孩把每一分钟空闲时间都用来阅读与科学相关的书籍。"}]}]},{"day":54,"w":"today","ph":"","defs":[{"pos":"adv.&n.","m":"今天；现在，当前","ex":[{"l":1,"en":"Today is Monday.","zh":"今天是星期一。"},{"l":2,"en":"Today is the happiest day of my life because my dream of visiting Beijing has finally come true.","zh":"今天是我一生中最幸福的一天，因为我去北京参观的梦想终于实现了。"},{"l":3,"en":"Young as they are, the students of today are far more aware of environmental problems than any generation before them.","zh":"尽管年纪尚小，如今的学生对环境问题的认识远比以往任何一代人都更深刻。"}]}]},{"day":54,"w":"together","ph":"","defs":[{"pos":"adv.","m":"一起，共同","ex":[{"l":1,"en":"In addition, I prefer experiences because they bring people together.","zh":"此外，我更喜欢经历，因为它们能把人们聚在一起。"},{"l":2,"en":"But parents and teachers worked together to protect the school and now they are pleased to see the result.","zh":"但是家长和老师们齐心协力保护了学校，现在他们很高兴看到这个结果。"},{"l":3,"en":"Standing together through every difficulty, the family finally rebuilt the small farm that the storm had nearly destroyed.","zh":"共同度过每一个难关，这家人最终重建了那座几乎被暴风雨摧毁的小农场。"}]}]},{"day":54,"w":"tomato","ph":"","defs":[{"pos":"n.","m":"番茄，西红柿","ex":[{"l":1,"en":"I ate a red tomato this morning.","zh":"今天早上我吃了一个红番茄。"},{"l":2,"en":"My mother bought some fresh tomatoes so that we could make soup for dinner.","zh":"妈妈买了一些新鲜的番茄，以便我们晚饭能做汤。"},{"l":3,"en":"It is the tomato, rich in vitamin C, that helps protect our eyes and keep us healthy.","zh":"正是番茄，富含维生素C，能帮助保护我们的眼睛并让我们保持健康。"}]}]},{"day":54,"w":"tomorrow","ph":"","defs":[{"pos":"adv.&n.","m":"明天","ex":[{"l":1,"en":"See you tomorrow.","zh":"明天见。"},{"l":2,"en":"If it does not rain tomorrow, we will have a picnic in the park.","zh":"如果明天不下雨，我们将在公园里野餐。"},{"l":3,"en":"Only when you finish today's homework tonight will you be free to play tomorrow.","zh":"只有今晚完成今天的作业，你明天才能自由地玩耍。"}]}]},{"day":54,"w":"tonight","ph":"","defs":[{"pos":"adv.&n.","m":"今晚，今夜","ex":[{"l":1,"en":"Let us watch TV tonight.","zh":"我们今晚看电视吧。"},{"l":2,"en":"I wonder whether you will come to my birthday party tonight.","zh":"我想知道你今晚是否会来参加我的生日聚会。"},{"l":3,"en":"Tonight is the night when all the stars seem brighter than ever before.","zh":"今晚所有的星星似乎比以往任何时候都要明亮。"}]}]},{"day":54,"w":"too","ph":"","defs":[{"pos":"adv.","m":"也；还；又；太；过分；很，非常","ex":[{"l":1,"en":"He's a student,too.","zh":"他也是个学生。"},{"l":2,"en":"Sitting in front of the screen for too long is unhealthy.","zh":"在屏幕前坐得太久是不健康的。"},{"l":3,"en":"Never have I seen such a beautiful sunset, and I was moved too deeply to speak.","zh":"我从没见过如此美丽的日落，我感动得说不出话来。"}]}]},{"day":54,"w":"tool","ph":"","defs":[{"pos":"n.","m":"工具","ex":[{"l":1,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着GPS系统等基于计算机的工具的兴起，制图师需要比过去更强的计算机技能。"},{"l":2,"en":"A dictionary is a useful tool that helps us learn English well.","zh":"字典是有用的工具，能帮助我们学好英语。"},{"l":3,"en":"It is the Internet that has become the most powerful tool for students to search for information.","zh":"正是互联网已成为学生搜索信息最强大的工具。"}]}]},{"day":54,"w":"tooth","ph":"","defs":[{"pos":"n.","m":"牙齿","ex":[{"l":1,"en":"Plants certainly cannot run away, and they have no teeth or claws.","zh":"植物当然不能逃跑，它们没有牙齿或爪子。"},{"l":2,"en":"The boy brushes his teeth every morning so that he will not have toothache.","zh":"男孩每天早上刷牙，这样他就不会牙痛。"},{"l":3,"en":"Only by brushing your teeth twice a day can you keep them strong until old age.","zh":"只有每天刷两次牙，你的牙齿才能一直坚固到老。"}]}]},{"day":54,"w":"toothache","ph":"","defs":[{"pos":"n.","m":"牙痛","ex":[{"l":1,"en":"I have a bad toothache today.","zh":"我今天牙痛得厉害。"},{"l":2,"en":"Because he ate too much candy, he got a terrible toothache last night.","zh":"因为他吃了太多糖果，昨晚他牙痛得厉害。"},{"l":3,"en":"Such a terrible toothache did he have that he could hardly sleep the whole night.","zh":"他的牙痛如此剧烈，几乎整晚都没法入睡。"}]}]},{"day":54,"w":"top","ph":"","defs":[{"pos":"n.","m":"顶端；（物体的）上面","ex":[{"l":1,"en":"The bird is at the top of the tree.","zh":"鸟在树顶上。"},{"l":2,"en":"When we reached the top of the mountain, we were tired but happy.","zh":"当我们到达山顶时，我们又累又开心。"},{"l":3,"en":"At the top of the hill stands an old temple which has a history of over five hundred years.","zh":"山顶上矗立着一座有五百多年历史的古庙。"}]},{"pos":"adj.","m":"最上面的；居首位的","ex":[{"l":1,"en":"He is the top student in our class.","zh":"他是我们班的尖子生。"},{"l":2,"en":"The girl who won the first prize is a top student in her school.","zh":"获得一等奖的那个女孩是她学校的尖子生。"},{"l":3,"en":"Not only is she a top student, but she is also kind to everyone around her.","zh":"她不仅是尖子生，而且对身边的每个人都很友善。"}]}]},{"day":54,"w":"topic","ph":"","defs":[{"pos":"n.","m":"话题；题目","ex":[{"l":1,"en":"Let us talk about an interesting topic.","zh":"让我们谈论一个有趣的话题。"},{"l":2,"en":"The teacher asked us to write a composition on the topic of friendship.","zh":"老师让我们以友谊为题写一篇作文。"},{"l":3,"en":"What I want to discuss today is a topic that has puzzled scientists for many years.","zh":"我今天想讨论的是困扰科学家多年的一个话题。"}]}]},{"day":55,"w":"touch","ph":"","defs":[{"pos":"v.","m":"触摸；接触；感动","ex":[{"l":1,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在游学中遇到了一些青少年，现在我仍与他们保持联系，但我几乎不记得旅途中买了什么。"},{"l":2,"en":"Please do not touch the glass because it is very hot.","zh":"请不要触摸玻璃，因为它非常烫。"},{"l":3,"en":"Deeply touched by the old man's story, the students decided to help him every weekend.","zh":"被老人的故事深深感动，学生们决定每个周末都去帮助他。"}]}]},{"day":55,"w":"tour","ph":"","defs":[{"pos":"n.","m":"参观；观光；旅行","ex":[{"l":1,"en":"We had a tour of the city yesterday.","zh":"我们昨天游览了这座城市。"},{"l":2,"en":"The guide told us that the tour would last for about three hours.","zh":"导游告诉我们这次游览将持续大约三个小时。"},{"l":3,"en":"So popular is the tour that hundreds of visitors come here every single day.","zh":"这次游览如此受欢迎，每天都有成百上千的游客来到这里。"}]}]},{"day":55,"w":"tourist","ph":"","defs":[{"pos":"n.","m":"游客；旅客；旅行者","ex":[{"l":1,"en":"Many tourists visit the Great Wall every year.","zh":"每年有许多游客参观长城。"},{"l":2,"en":"The hotel where the tourists stayed was close to the beach.","zh":"游客们住的酒店离海滩很近。"},{"l":3,"en":"It was the tourists who left so much rubbish that made the beach look dirty.","zh":"正是留下这么多垃圾的游客让海滩看起来很脏。"}]}]},{"day":55,"w":"toward(s)","ph":"","defs":[{"pos":"prep.","m":"向，朝；对于","ex":[{"l":1,"en":"He ran toward the bus stop.","zh":"他朝公交车站跑去。"},{"l":2,"en":"As we walked towards the forest, we heard some birds singing.","zh":"当我们走向森林时，我们听到了鸟儿在唱歌。"},{"l":3,"en":"Toward the end of the film, the hero finally found the truth he had been seeking.","zh":"在电影接近尾声时，主人公终于找到了他一直追寻的真相。"}]}]},{"day":55,"w":"tower","ph":"","defs":[{"pos":"n.","m":"塔","ex":[{"l":1,"en":"The TV tower is very tall.","zh":"那座电视塔很高。"},{"l":2,"en":"The tower which was built two hundred years ago is still very strong.","zh":"两百年前建造的那座塔现在仍然很坚固。"},{"l":3,"en":"At the foot of the hill lies an old tower that attracts thousands of visitors each spring.","zh":"山脚下有一座古塔，每年春天都吸引成千上万的游客。"}]}]},{"day":55,"w":"town","ph":"","defs":[{"pos":"n.","m":"城镇；城","ex":[{"l":1,"en":"I was born in a little town not far from here.","zh":"我出生在离这儿不远的一个小镇。"},{"l":2,"en":"Although the town is small, it has a long history and friendly people.","zh":"虽然这个镇很小，但它有悠久的历史和友善的人们。"},{"l":3,"en":"Never before had I visited such a peaceful town where time seemed to stand still.","zh":"我以前从未去过如此宁静的小镇，在那里时间仿佛静止了。"}]}]},{"day":55,"w":"toy","ph":"","defs":[{"pos":"n.","m":"玩具","ex":[{"l":1,"en":"The kids were excited to see the toy rocket flying into the sky.","zh":"孩子们看到玩具火箭飞上天空很兴奋。"},{"l":2,"en":"The little boy who got a new toy smiled happily all day long.","zh":"得到一个新玩具的小男孩整天开心地笑着。"},{"l":3,"en":"What made the child cry was that his favourite toy had been broken by accident.","zh":"让孩子哭泣的是他最心爱的玩具被意外弄坏了。"}]}]},{"day":55,"w":"tradition","ph":"","defs":[{"pos":"n.","m":"传统","ex":[{"l":1,"en":"It is a tradition to eat dumplings in spring festival.","zh":"春节吃饺子是一个传统。"},{"l":2,"en":"Eating mooncakes on Mid-Autumn Festival is a tradition that has lasted for centuries.","zh":"中秋节吃月饼是一个延续了几个世纪的传统。"},{"l":3,"en":"It is this tradition that reminds us of the importance of family and love.","zh":"正是这个传统让我们想起家庭与爱的重要性。"}]}]},{"day":55,"w":"traditional","ph":"","defs":[{"pos":"adj.","m":"传统的","ex":[{"l":1,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"这个中学生能用英语讲中国传统故事吗？"},{"l":2,"en":"Dumplings are a kind of traditional food that Chinese people love very much.","zh":"饺子是中国人非常喜爱的一种传统食物。"},{"l":3,"en":"Not only is she good at traditional Chinese painting, but she also wins many prizes every year.","zh":"她不仅擅长中国画，而且每年都赢得许多奖项。"}]}]},{"day":55,"w":"traffic","ph":"","defs":[{"pos":"n.","m":"交通","ex":[{"l":1,"en":"There is heavy traffic on the road.","zh":"路上交通很拥挤。"},{"l":2,"en":"We left early so that we could avoid the heavy traffic in the morning.","zh":"我们很早就出发，以便能避开早晨拥堵的交通。"},{"l":3,"en":"Only when everyone follows the traffic rules can we keep the roads safe and smooth.","zh":"只有人人都遵守交通规则，我们才能让道路安全畅通。"}]}]},{"day":55,"w":"train","ph":"","defs":[{"pos":"n.","m":"火车","ex":[{"l":1,"en":"I took a train to Beijing last summer.","zh":"去年夏天我乘火车去了北京。"},{"l":2,"en":"The train that we took yesterday arrived at the station on time though it rained heavily.","zh":"尽管雨下得很大，我们昨天乘坐的那列火车还是准时到站了。"},{"l":3,"en":"Not until the conductor checked our tickets did we realize that we had got on the wrong train.","zh":"直到乘务员查验我们的车票，我们才意识到上错了火车。"}]},{"pos":"v.","m":"培训，训练","ex":[{"l":1,"en":"The coach trains us every morning.","zh":"教练每天早上训练我们。"},{"l":2,"en":"In order to win the match, the coach trains the players so hard that they often feel tired after practice.","zh":"为了赢得比赛，教练训练队员非常刻苦，以至于他们练习后常常感到疲惫。"},{"l":3,"en":"Trained by a famous coach for three years, the young athlete finally broke the school record in the 100-meter race.","zh":"经过一位著名教练三年的训练，这位年轻运动员最终打破了学校百米赛跑纪录。"}]}]},{"day":55,"w":"translate","ph":"","defs":[{"pos":"v.","m":"翻译","ex":[{"l":1,"en":"Can you translate this sentence into Chinese?","zh":"你能把这个句子翻译成中文吗？"},{"l":2,"en":"When I read English stories, I often translate the new words into Chinese so that I can understand them better.","zh":"读英语故事时，我常把生词翻译成中文，以便更好地理解它们。"},{"l":3,"en":"It is the novel translated from French that has attracted so many young readers since it was published.","zh":"正是这本从法语翻译过来的小说，自出版以来吸引了这么多年轻读者。"}]}]},{"day":55,"w":"transport","ph":"","defs":[{"pos":"v.","m":"运输，运送；输送","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍然是中国运输系统中重要的一部分。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它的修建是为了把中国南方富饶农田的粮食运送到北方的城市。"},{"l":3,"en":"Modern trains can transport thousands of passengers across the country in a single day, which was unimaginable decades ago.","zh":"现代列车能在一天之内把数千名旅客运送到全国各地，这在几十年前是不可想象的。"}]},{"pos":"n.","m":"运输；输送；运送；运输机器","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍然是中国运输系统中重要的一部分。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它的修建是为了把中国南方富饶农田的粮食运送到北方的城市。"},{"l":3,"en":"Only when public transport becomes cleaner and faster will more people choose to leave their cars at home.","zh":"只有当公共交通变得更清洁、更快捷时，才会有更多的人选择把汽车留在家里。"}]}]},{"day":55,"w":"transportation","ph":"","defs":[{"pos":"n.","m":"运输；交通；交通工具","ex":[{"l":1,"en":"Bicycles are a cheap kind of transportation.","zh":"自行车是一种便宜的交通工具。"},{"l":2,"en":"With the development of transportation, it has become much easier for people to travel between different cities.","zh":"随着交通的发展，人们在城市之间出行变得容易多了。"},{"l":3,"en":"What makes this city attractive is its convenient transportation, which allows visitors to reach any place within half an hour.","zh":"让这座城市具有吸引力的是它便捷的交通，使游客能在半小时内到达任何地方。"}]}]},{"day":55,"w":"travel","ph":"","defs":[{"pos":"n.&v.","m":"旅行","ex":[{"l":1,"en":"We plan to travel to Hangzhou next week.","zh":"我们计划下周去杭州旅行。"},{"l":2,"en":"Although air travel is more expensive, it can save us a lot of time when we go to faraway places.","zh":"虽然乘飞机旅行更贵，但去远方时它能为我们节省很多时间。"},{"l":3,"en":"Traveling by high-speed train not only saves time but also gives passengers a chance to enjoy the scenery along the way.","zh":"乘坐高铁旅行不仅节省时间，还让旅客有机会欣赏沿途的风景。"}]}]},{"day":55,"w":"tree","ph":"","defs":[{"pos":"n.","m":"树","ex":[{"l":1,"en":"After David planted the tree by himself, he felt pleased.","zh":"戴维自己种下这棵树后，感到很满意。"},{"l":2,"en":"Some plants, such as the oak tree, have special ways to discourage leaf-eating animals.","zh":"有些植物，比如橡树，有特殊的方法来驱赶吃叶子的动物。"},{"l":3,"en":"Under the old tree stands a small wooden bench where my grandfather often reads on sunny afternoons.","zh":"那棵老树下放着一张小木长椅，晴天下午爷爷常在那里读书。"}]}]},{"day":55,"w":"trick","ph":"","defs":[{"pos":"n.","m":"恶作剧；诡计，花招","ex":[{"l":1,"en":"The children played a trick on their teacher.","zh":"孩子们对老师搞了恶作剧。"},{"l":2,"en":"The clever fox used a trick to get the food, which showed that animals can also be very smart.","zh":"聪明的狐狸用了一个花招得到了食物，这说明动物也可以非常聪明。"},{"l":3,"en":"Never judge a person by his words, for what seems friendly may sometimes be a trick to cheat you.","zh":"千万不要凭言辞评价一个人，因为看似友善的举动有时可能是欺骗你的花招。"}]}]},{"day":55,"w":"trip","ph":"","defs":[{"pos":"n.","m":"旅行；旅程","ex":[{"l":1,"en":"A few hours into the trip, we took a wrong turn.","zh":"出发几个小时后，我们拐错了弯。"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次游学旅行中遇到了一些青少年，现在仍和他们保持联系，但我几乎不记得旅行期间买了什么。"},{"l":3,"en":"So unforgettable was the trip to the mountains that I still dream of the sunrise we watched together.","zh":"那次山中之行令人难忘，我至今仍会梦见我们一起看过的日出。"}]}]},{"day":55,"w":"trouble","ph":"","defs":[{"pos":"n.","m":"问题；烦恼；麻烦；困难","ex":[{"l":1,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，他们在生活中遇到困难时可能会感到无助和沮丧，尤其是那些腼腆的人。"},{"l":2,"en":"Whenever you are in trouble, you can always turn to your parents or true friends for help.","zh":"无论你什么时候遇到麻烦，你都可以向父母或真正的朋友求助。"},{"l":3,"en":"It is reported that students who learn to face trouble on their own grow up to be more confident than those who always rely on others.","zh":"据报道，学会独自面对困难的学生，长大后比总是依赖他人的人更自信。"}]},{"pos":"v.","m":"使困恼；麻烦","ex":[{"l":1,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，他们在生活中遇到困难时可能会感到无助和沮丧，尤其是那些腼腆的人。"},{"l":2,"en":"The noise from the street troubled the old man so much that he could hardly fall asleep at night.","zh":"街上的噪音让这位老人非常烦恼，以至于他夜里几乎无法入睡。"},{"l":3,"en":"What troubled the teacher most was not the low marks but the students' lack of interest in learning.","zh":"最让老师烦恼的不是低分，而是学生对学习缺乏兴趣。"}]}]},{"day":55,"w":"trousers","ph":"","defs":[{"pos":"n.","m":"裤子，长裤","ex":[{"l":1,"en":"These trousers are too long for me.","zh":"这条裤子对我来说太长了。"},{"l":2,"en":"The trousers that my mother bought me yesterday are made of cotton and feel very comfortable.","zh":"妈妈昨天给我买的那条裤子是棉的，穿起来很舒服。"},{"l":3,"en":"Only after he tried on five pairs of trousers did he finally find one that fitted him perfectly.","zh":"直到试了五条裤子，他才终于找到一条完全合身的。"}]}]},{"day":55,"w":"truck","ph":"","defs":[{"pos":"n.","m":"卡车，货车","ex":[{"l":1,"en":"A red truck stopped at the gate.","zh":"一辆红色卡车停在了门口。"},{"l":2,"en":"The truck which carried fresh vegetables broke down on the way, so the driver had to ask for help.","zh":"运送新鲜蔬菜的卡车在路上抛锚了，司机只好求助。"},{"l":3,"en":"Loaded with boxes of books, the heavy truck moved slowly up the hill under the burning sun.","zh":"满载一箱箱书本的重型卡车，在烈日下缓慢地爬上山坡。"}]}]},{"day":55,"w":"True","ph":"","defs":[{"pos":"adj.","m":"真的；真实的","ex":[{"l":1,"en":"Is this story true or false?","zh":"这个故事是真是假？"},{"l":2,"en":"I believe that what he told us is true, because he has never lied to anyone before.","zh":"我相信他告诉我们的都是真的，因为他以前从没对任何人撒过谎。"},{"l":3,"en":"However hard the legend sounds, recent research has proved that part of it is actually true.","zh":"无论这个传说听起来多么离奇，近期的研究已证明其中一部分确实是真的。"}]}]},{"day":55,"w":"trust","ph":"","defs":[{"pos":"n.&v.","m":"信任，相信","ex":[{"l":1,"en":"I trust my best friend completely.","zh":"我完全信任我最好的朋友。"},{"l":2,"en":"If you want others to trust you, you must first learn to be honest in everything you do.","zh":"如果你想别人信任你，你必须首先学会做任何事都诚实。"},{"l":3,"en":"It takes years to build trust between people, but only a single lie can destroy it completely.","zh":"人与人之间建立信任需要多年，但一句谎言就能将它彻底摧毁。"}]}]},{"day":55,"w":"truth","ph":"","defs":[{"pos":"n.","m":"真理；真相，实际情况","ex":[{"l":1,"en":"I wish I had told him the truth.","zh":"我真希望我当时告诉了他真相。"},{"l":2,"en":"No matter how hard the situation is, you should always have the courage to tell the truth.","zh":"无论情况多艰难，你都应该有勇气说出真相。"},{"l":3,"en":"What surprised everyone at the meeting was the truth that the project had been finished two weeks ahead of time.","zh":"让会上每个人吃惊的是这样一个事实：工程已经提前两周完工了。"}]}]},{"day":55,"w":"try","ph":"","defs":[{"pos":"v.","m":"试；试图；努力","ex":[{"l":1,"en":"Uncle Andy tried ten different jobs, and finally chose to be a lawyer.","zh":"安迪叔叔尝试了十种不同的工作，最后选择当律师。"},{"l":2,"en":"Try to do regular sports.The mind needs exercise as well as the body.","zh":"尽量做有规律的运动。大脑和身体一样也需要锻炼。"},{"l":3,"en":"Only those who keep trying after each failure will finally reach the goal they have dreamed of.","zh":"只有那些在每次失败后仍不断尝试的人，才能最终达到他们梦寐以求的目标。"}]},{"pos":"n.","m":"试；努力","ex":[{"l":1,"en":"Let me have a try at this game.","zh":"让我试一试这个游戏吧。"},{"l":2,"en":"Even if you fail this time, you should have another try instead of giving up easily.","zh":"即使这次失败了，你也应该再试一次，而不是轻易放弃。"},{"l":3,"en":"It was his third try at the exam, and this time his hard work finally paid off.","zh":"这是他第三次参加考试，这一次他的努力终于有了回报。"}]}]},{"day":55,"w":"Tuesday","ph":"","defs":[{"pos":"n.","m":"星期二","ex":[{"l":1,"en":"Where were you on Tuesday?","zh":"星期二你在哪里？"},{"l":2,"en":"We will have an English test next Tuesday, so I must go over my lessons this weekend.","zh":"我们下周二要考英语，所以这个周末我必须复习功课。"},{"l":3,"en":"It was on a rainy Tuesday that our class finally won the basketball match after months of training.","zh":"正是在一个下雨的星期二，我们班经过几个月的训练后终于赢得了篮球赛。"}]}]},{"day":55,"w":"turkey","ph":"","defs":[{"pos":"n.","m":"火鸡","ex":[{"l":1,"en":"We had turkey for dinner on Thanksgiving.","zh":"感恩节晚餐我们吃了火鸡。"},{"l":2,"en":"My mother cooked a big turkey because the whole family would come together to celebrate the festival.","zh":"妈妈做了一只大火鸡，因为全家人都要聚在一起庆祝这个节日。"},{"l":3,"en":"Not only did grandma roast a turkey, but she also prepared several traditional dishes that reminded us of our childhood.","zh":"奶奶不仅烤了火鸡，还准备了几道让我们想起童年的传统菜肴。"}]}]},{"day":55,"w":"turn","ph":"","defs":[{"pos":"v.","m":"旋转；翻转；转弯；转变；变得","ex":[{"l":1,"en":"A few hours into the trip, we took a wrong turn.","zh":"行程过了几个小时后，我们拐错了弯。"},{"l":2,"en":"For example, people should remember to turn off electric items like TV sets and air conditioners when they are not used.","zh":"例如，人们应该记得在不使用电视机和空调等电器时把它们关掉。"},{"l":3,"en":"Only when you turn off all the lights and lock the door can you leave the house safely for the long holiday.","zh":"只有关掉所有灯并锁好门，你才能安心地离开家去度过漫长的假期。"}]},{"pos":"n.","m":"（轮流的）顺序","ex":[{"l":1,"en":"It is your turn to answer the question.","zh":"轮到你回答问题了。"},{"l":2,"en":"When it was my turn to speak, my heart beat so fast that I could hardly say a word.","zh":"轮到我发言时，我的心跳得很快，几乎说不出一句话。"},{"l":3,"en":"Wait patiently for your turn, and you will find that good things come to those who never push others aside.","zh":"耐心等待属于你的机会，你会发现美好的事物总会降临到那些从不把别人挤到一边的人身上。"}]}]},{"day":55,"w":"twice","ph":"","defs":[{"pos":"adv.","m":"两次；两倍","ex":[{"l":1,"en":"I have been to Beijing twice.","zh":"我去过北京两次。"},{"l":2,"en":"Although she has read the book twice, she still finds something new every time she opens it.","zh":"虽然这本书她已经读过两遍，但每次翻开她仍能发现新的内容。"},{"l":3,"en":"The price of this kind of phone is twice what it was last year, which makes many students give up the idea of buying it.","zh":"这款手机的价格是去年的两倍，这让许多学生放弃了购买的念头。"}]}]},{"day":55,"w":"twin","ph":"","defs":[{"pos":"n.","m":"双胞胎之一","ex":[{"l":1,"en":"My sister has a twin brother.","zh":"我姐姐有一个双胞胎弟弟。"},{"l":2,"en":"The twin sisters look so alike that even their teachers often mistake one for the other in class.","zh":"这对双胞胎姐妹长得太像了，连老师上课时也常常把其中一个错认成另一个。"},{"l":3,"en":"Though the twin brothers look exactly the same, their interests are so different that nobody believes they were born on the same day.","zh":"虽然这对双胞胎兄弟长得一模一样，但他们的兴趣差异如此之大，以至于没人相信他们同一天出生。"}]}]},{"day":56,"w":"type","ph":"","defs":[{"pos":"n.","m":"类型","ex":[{"l":1,"en":"Thousands of boats use it every day to transport grain and many other types of cargo.","zh":"每天有数千艘船用它来运送粮食和许多其他种类的货物。"},{"l":2,"en":"This type of phone is very popular among students because it is cheap and easy to use.","zh":"这种类型的手机在学生中很受欢迎，因为它便宜又好用。"},{"l":3,"en":"Of all the types of sports we tried last term, basketball is the one that attracts the most students in our school.","zh":"在上学期我们尝试过的所有运动类型中，篮球是最吸引我们学校学生的一项。"}]},{"pos":"v.","m":"打字","ex":[{"l":1,"en":"I can type this letter in five minutes.","zh":"我能在五分钟内打完这封信。"},{"l":2,"en":"She has practiced so hard that she can type more than sixty words a minute without any mistakes.","zh":"她练习得非常刻苦，现在每分钟能打六十多个单词而不会出错。"},{"l":3,"en":"Not until he learned to type quickly did he realize how much time he had wasted copying notes by hand.","zh":"直到学会了快速打字，他才意识到自己曾经用手抄笔记浪费了多少时间。"}]}]},{"day":56,"w":"umbrella","ph":"","defs":[{"pos":"n.","m":"伞","ex":[{"l":1,"en":"It is raining. Take an umbrella with you.","zh":"下雨了，带上一把伞吧。"},{"l":2,"en":"You had better take an umbrella with you in case it rains suddenly on your way home.","zh":"你最好带上一把伞，以免回家的路上突然下雨。"},{"l":3,"en":"Carry an umbrella wherever you go in spring, for the weather here changes so fast that you can never trust the morning sky.","zh":"春天无论去哪里都要带上伞，因为这里的天气变化太快，你永远不能相信早晨的天空。"}]}]},{"day":56,"w":"uncle","ph":"","defs":[{"pos":"n.","m":"叔；伯；舅；姑父；姨夫","ex":[{"l":1,"en":"Uncle Andy tried ten different jobs, and finally chose to be a lawyer.","zh":"安迪叔叔尝试过十种不同的工作，最终选择成为一名律师。"},{"l":2,"en":"The whole day we walked around the countryside, and every now and then, my uncle put stones in our bags.","zh":"我们一整天都在乡间走动，不时地，叔叔会把石头放进我们的包里。"},{"l":3,"en":"My uncle is such a warm-hearted man that whenever someone in the village is in trouble, he is always the first to offer help.","zh":"我叔叔是个如此热心的人，每当村里有人遇到困难，他总是第一个伸出援手。"}]}]},{"day":56,"w":"under","ph":"","defs":[{"pos":"adv.&prep.","m":"在..下面，向..下面","ex":[{"l":1,"en":"When an animal is under attack, it can run away or fight back.","zh":"当动物遭到攻击时，它可以逃跑或反击。"},{"l":2,"en":"The children hid under the big tree so that the heavy rain would not make them completely wet.","zh":"孩子们躲在那棵大树下，这样大雨就不会把他们全身淋湿了。"},{"l":3,"en":"Under the old bridge lies a small shop where you can buy the cheapest ice cream in the whole town.","zh":"在那座旧桥下面有一家小店，在那里你能买到全镇最便宜的冰淇淋。"}]}]},{"day":56,"w":"underground","ph":"","defs":[{"pos":"adj.","m":"地下的","ex":[{"l":1,"en":"They built an underground parking lot last year.","zh":"去年他们建了一个地下停车场。"},{"l":2,"en":"The underground railway that was built ten years ago makes it easier for people to travel across the city.","zh":"十年前修建的地下铁路让人们穿越这座城市变得更加容易。"},{"l":3,"en":"It is in the underground station that thousands of workers meet every morning before the sun even rises.","zh":"每天清晨太阳还未升起时，正是在这个地下车站里，成千上万的工人汇聚在一起。"}]},{"pos":"n.","m":"地铁","ex":[{"l":1,"en":"I go to school by underground every day.","zh":"我每天坐地铁上学。"},{"l":2,"en":"Taking the underground is faster than taking the bus, especially when the roads are busy in the morning.","zh":"坐地铁比坐公交车更快，尤其是在早晨道路繁忙的时候。"},{"l":3,"en":"The underground in our city has improved so much that even visitors from other countries find it easy to reach any place they want.","zh":"我们城市的地铁进步如此之大，连来自其他国家的游客都能轻松到达任何想去的地方。"}]}]},{"day":56,"w":"underline","ph":"","defs":[{"pos":"v.","m":"在..下面划线；强调，使突出","ex":[{"l":1,"en":"Please underline the new words in your book.","zh":"请把书里的生词划上下划线。"},{"l":2,"en":"The teacher asked us to underline the key sentences so that we could review them before the exam.","zh":"老师让我们把重点句子划上下划线，以便考试前复习。"},{"l":3,"en":"Underlining the important points while reading is a good habit that will help you remember what you have learned for a much longer time.","zh":"阅读时在要点下面划线是一个好习惯，它会帮助你把所学内容记忆更长的时间。"}]}]},{"day":56,"w":"underlined","ph":"","defs":[{"pos":"adj.","m":"带下划线的","ex":[{"l":1,"en":"Read the underlined words carefully.","zh":"请仔细阅读带下划线的单词。"},{"l":2,"en":"The underlined sentence in the passage shows clearly what the writer wants to tell us.","zh":"文章中带下划线的句子清楚地表明了作者想告诉我们的内容。"},{"l":3,"en":"Pay attention to the underlined part, for it often contains the answer that the whole question depends on.","zh":"注意带下划线的部分，因为它往往包含整道题所依赖的答案。"}]}]},{"day":56,"w":"understand","ph":"","defs":[{"pos":"v.","m":"明白；懂得；理解","ex":[{"l":1,"en":"Do you understand?","zh":"你明白了吗？"},{"l":2,"en":"After his amazing talk, I understand why my father is busy.","zh":"在他精彩的演讲之后，我明白了父亲为什么那么忙碌。"},{"l":3,"en":"Only by listening carefully in class can you really understand what the teacher is trying to explain.","zh":"只有上课认真听讲，你才能真正理解老师想要讲解的内容。"}]}]},{"day":56,"w":"unfair","ph":"","defs":[{"pos":"adj.","m":"不公平的；不公正的；违反规则或准则的","ex":[{"l":1,"en":"It is unfair to laugh at others.","zh":"嘲笑别人是不公平的。"},{"l":2,"en":"The students felt it was unfair that only a few of them were chosen to join the competition.","zh":"学生们感到很不公平，因为只有少数人被选中参加比赛。"},{"l":3,"en":"It is unfair to judge a person only by his clothes, since what really matters lies deep inside his heart.","zh":"只凭衣着去评判一个人是不公平的，因为真正重要的东西深藏在他的内心。"}]}]},{"day":56,"w":"unforgettable","ph":"","defs":[{"pos":"adj.","m":"难忘的","ex":[{"l":1,"en":"That trip was an unforgettable experience.","zh":"那次旅行是一次难忘的经历。"},{"l":2,"en":"The summer camp was so unforgettable that I still remember every friend I made there.","zh":"那次夏令营令人如此难忘，我至今还记得在那里结识的每一位朋友。"},{"l":3,"en":"So unforgettable was that evening that whenever I see the old photos, all the laughter and tears come back at once.","zh":"那个夜晚如此难忘，每当看到那些旧照片，所有的欢笑与泪水便一下子涌上心头。"}]}]},{"day":56,"w":"unfortunately","ph":"","defs":[{"pos":"adv.","m":"不幸地；遗憾地","ex":[{"l":1,"en":"Unfortunately, I missed the early bus.","zh":"不幸的是，我错过了早班车。"},{"l":2,"en":"Unfortunately, it began to rain heavily just as we arrived at the park for the picnic.","zh":"不幸的是，我们刚到公园准备野餐时就开始下起了大雨。"},{"l":3,"en":"Unfortunately, the museum was closed by the time we got there, which made the children who had looked forward to the visit quite sad.","zh":"不幸的是，我们赶到时博物馆已经关门了，这让一直盼望参观的孩子们非常失望。"}]}]},{"day":56,"w":"unhappy","ph":"","defs":[{"pos":"adj.","m":"不开心的；不幸福的；难过的","ex":[{"l":1,"en":"Sometimes my father's job makes me feel unhappy and lonely because he's always very busy.","zh":"有时候父亲的工作让我感到不开心和孤单，因为他总是很忙。"},{"l":2,"en":"The boy felt unhappy because his best friend refused to share the toys with him at the party.","zh":"那个男孩感到不开心，因为他最好的朋友在聚会上拒绝和他分享玩具。"},{"l":3,"en":"Looking unhappy, the old man sat alone in the corner, wondering whether anyone would ever come to talk with him again.","zh":"那位老人神情落寞地独自坐在角落里，心里想着是否还会有人来和他说话。"}]}]},{"day":56,"w":"unhealthy","ph":"","defs":[{"pos":"adj.","m":"不健康的","ex":[{"l":1,"en":"Sitting in front of the screen for too long is unhealthy.","zh":"在屏幕前坐得太久是不健康的。"},{"l":2,"en":"Eating too much junk food is unhealthy, so we should eat more fruit and vegetables instead.","zh":"吃太多垃圾食品是不健康的，所以我们应该多吃水果和蔬菜来代替。"},{"l":3,"en":"It is unhealthy to stay up late every night, which will not only hurt your eyes but also make it hard to focus in class.","zh":"每天熬夜是不健康的，这不仅会伤害你的眼睛，还会让你上课难以集中注意力。"}]}]},{"day":56,"w":"uniform","ph":"","defs":[{"pos":"n.","m":"制服","ex":[{"l":1,"en":"All students must wear the school uniform on Mondays.","zh":"所有学生周一必须穿校服。"},{"l":2,"en":"The new uniform, which is made of comfortable cotton, makes students feel proud of their school.","zh":"这件由舒适棉布制成的新校服让学生们为学校感到自豪。"},{"l":3,"en":"Not only does the school uniform build a sense of belonging, but it also helps reduce the pressure of choosing clothes every morning.","zh":"校服不仅培养了归属感，还帮助减轻了每天早晨选衣服的压力。"}]}]},{"day":56,"w":"unit","ph":"","defs":[{"pos":"n.","m":"单位；单元；部件","ex":[{"l":1,"en":"This unit is the most difficult in the whole book.","zh":"这个单元是整本书中最难的。"},{"l":2,"en":"The teacher told us that we would finish this unit before the exam so that we could review it in time.","zh":"老师告诉我们，考试前我们会完成这个单元，以便能及时复习。"},{"l":3,"en":"Each unit of the course is designed to connect with the next, making it easier for students to build up their knowledge step by step.","zh":"课程的每个单元都与下一个单元相衔接，使学生更容易逐步积累知识。"}]}]},{"day":56,"w":"united","ph":"","defs":[{"pos":"adj.","m":"联合的；统一的","ex":[{"l":1,"en":"The united team won the game at last.","zh":"这支团结的队伍最终赢得了比赛。"},{"l":2,"en":"If people stay united, they will overcome any difficulty that comes their way.","zh":"如果人们保持团结，他们就能克服任何遇到的困难。"},{"l":3,"en":"Only when a country remains united can it achieve long-term peace and steady development in a changing world.","zh":"只有一个国家保持团结，它才能在不断变化的世界中实现长期的和平与稳定的发展。"}]}]},{"day":56,"w":"university","ph":"","defs":[{"pos":"n.","m":"大学","ex":[{"l":1,"en":"He loved to go on long walks to find stones to add to his collection at the university.","zh":"他喜欢长途散步，去寻找石头，添进他在大学的收藏。"},{"l":2,"en":"After he entered the university, he worked so hard that he soon became one of the top students in his class.","zh":"进入大学后，他如此努力，以至于很快成了班里最优秀的学生之一。"},{"l":3,"en":"It is at university that young people not only gain knowledge but also learn how to face challenges and make independent choices.","zh":"正是在大学里，年轻人不仅获得知识，还学会如何面对挑战并做出独立的选择。"}]}]},{"day":56,"w":"unless","ph":"","defs":[{"pos":"conj.","m":"如果不，除非","ex":[{"l":1,"en":"You will fail unless you work harder.","zh":"除非你更努力，否则你会失败。"},{"l":2,"en":"Unless we leave right now, we will miss the train that goes to the city center.","zh":"除非我们现在就出发，否则我们会错过开往市中心的那趟火车。"},{"l":3,"en":"Unless we take action to protect the environment now, future generations will have to pay a heavy price for our mistakes.","zh":"除非我们现在就采取行动保护环境，否则子孙后代将不得不为我们的错误付出沉重代价。"}]}]},{"day":56,"w":"until","ph":"","defs":[{"pos":"prep.&pron.","m":"直到..为止","ex":[{"l":1,"en":"The restaurant doesn't open until seven forty-five.","zh":"这家餐厅直到七点四十五分才开门。"},{"l":2,"en":"I will not leave the classroom until the teacher has answered all the questions I raised.","zh":"直到老师回答了我提出的所有问题，我才会离开教室。"},{"l":3,"en":"Not until he experienced the failure himself did he realize how much his parents had done for him over the years.","zh":"直到他自己经历了那次失败，他才意识到多年来父母为他付出了多少。"}]}]},{"day":56,"w":"unusual","ph":"","defs":[{"pos":"adj.","m":"不寻常的","ex":[{"l":1,"en":"It is an unusual story about a brave boy.","zh":"这是一个关于勇敢男孩的不寻常的故事。"},{"l":2,"en":"What made the trip so unusual was that we met an old friend we had not seen for ten years.","zh":"让这次旅行如此不同寻常的是，我们遇到了一位十年未见的老朋友。"},{"l":3,"en":"It is highly unusual for a student of his age to master two foreign languages while keeping top grades in every subject.","zh":"对于一个他这个年纪的学生来说，能在每门功课保持顶尖成绩的同时掌握两门外语，是非常不寻常的。"}]}]},{"day":56,"w":"up","ph":"","defs":[{"pos":"adv.&prep.","m":"向上；在上方；起来","ex":[{"l":1,"en":"Stand up,please.","zh":"请起立。"},{"l":2,"en":"But our trusty GPS pulled up a map of the area and got us back on track in no time.","zh":"但我们可靠的GPS调出了该地区的地图，让我们很快回到了正轨。"},{"l":3,"en":"No matter how many times he was knocked down, he stood up again and kept walking toward his dream.","zh":"无论被击倒多少次，他都会重新站起来，继续朝梦想前行。"}]}]},{"day":56,"w":"upset","ph":"","defs":[{"pos":"adj.","m":"心烦的，难过的","ex":[{"l":1,"en":"She felt upset when she lost her watch.","zh":"丢了手表时她很难过。"},{"l":2,"en":"The boy was so upset that he refused to talk to anyone until his mother came back home.","zh":"这个男孩非常难过，直到妈妈回家前他都拒绝和任何人说话。"},{"l":3,"en":"Deeply upset by the result, the girl locked herself in her room, wondering what she could do to improve next time.","zh":"因为这个结果非常难过，女孩把自己锁在房间里，思索着下次怎样才能有所进步。"}]}]},{"day":56,"w":"upstairs","ph":"","defs":[{"pos":"adv.","m":"在楼上；到楼上","ex":[{"l":1,"en":"My bedroom is upstairs.","zh":"我的卧室在楼上。"},{"l":2,"en":"When I walked upstairs, I noticed that the light in my brother's room was still on.","zh":"当我走上楼时，我注意到哥哥房间的灯还亮着。"},{"l":3,"en":"Hearing strange noise coming from upstairs, she held her breath and slowly climbed the stairs to find out what was happening.","zh":"听到楼上传来奇怪的声响，她屏住呼吸，慢慢地爬上楼梯想弄清楚发生了什么。"}]}]},{"day":56,"w":"use","ph":"","defs":[{"pos":"v.&n.","m":"利用；使用；应用","ex":[{"l":1,"en":"They use this information to make detailed maps of places around the globe.","zh":"他们利用这些信息来绘制全球各地的详细地图。"},{"l":2,"en":"Thousands of boats use it every day to transport grain and many other types of cargo.","zh":"每天有成千上万艘船使用它来运输谷物和许多其他种类的货物。"},{"l":3,"en":"Only by learning how to use what we have wisely can we truly make a difference in protecting our planet for the future.","zh":"只有学会明智地利用我们所拥有的，我们才能真正为保护地球的未来发挥作用。"}]}]},{"day":56,"w":"useful","ph":"","defs":[{"pos":"adj.","m":"有用的；有益的","ex":[{"l":1,"en":"This book is very useful for beginners.","zh":"这本书对初学者很有用。"},{"l":2,"en":"The app that I downloaded last week is so useful that I use it to study English every day.","zh":"我上周下载的这个应用非常有用，我每天都用它来学英语。"},{"l":3,"en":"What makes this dictionary particularly useful is that it provides both example sentences and common mistakes for every word.","zh":"让这本词典格外有用的是，它为每个单词都提供了例句和常见错误。"}]}]},{"day":56,"w":"useless","ph":"","defs":[{"pos":"adj.","m":"无用的；废旧的","ex":[{"l":1,"en":"This broken pen is useless.","zh":"这支坏钢笔没用了。"},{"l":2,"en":"He felt that all his efforts were useless because the result did not change at all.","zh":"他觉得所有的努力都白费了，因为结果根本没有改变。"},{"l":3,"en":"It is no use crying over what has already happened; what really matters is how we move forward from here.","zh":"为已经发生的事情哭泣毫无意义；真正重要的是我们如何从这里继续前行。"}]}]},{"day":56,"w":"usual","ph":"","defs":[{"pos":"adj.","m":"通常的，平常的","ex":[{"l":1,"en":"He arrived earlier than usual today.","zh":"他今天比平常到得早。"},{"l":2,"en":"As usual, she walked to school alone, but today she felt a little nervous about the exam.","zh":"像往常一样，她独自步行上学，但今天她对考试感到有点紧张。"},{"l":3,"en":"Despite the heavy rain, the old man set out for the market at the usual time, carrying nothing but a small basket.","zh":"尽管下着大雨，这位老人还是照常带着一个小篮子出发去了市场。"}]}]},{"day":56,"w":"usually","ph":"","defs":[{"pos":"adv.","m":"通常；经常","ex":[{"l":1,"en":"I usually get up at six.","zh":"我通常六点起床。"},{"l":2,"en":"I usually read for half an hour before going to bed, which helps me sleep better at night.","zh":"我通常睡前读半小时书，这有助于我晚上睡得更好。"},{"l":3,"en":"People who usually spend more time outdoors tend to feel happier and healthier than those who stay inside all day.","zh":"通常花更多时间在户外的人，往往比整天待在室内的人感到更快乐、更健康。"}]}]},{"day":56,"w":"value","ph":"","defs":[{"pos":"n.","m":"价值；价格；数值；价值观","ex":[{"l":1,"en":"This old watch has great value.","zh":"这块旧手表很有价值。"},{"l":2,"en":"The teacher told us that the true value of a book lies in what we learn from it, not in its price.","zh":"老师告诉我们，一本书的真正价值在于我们从中学到了什么，而不在于它的价格。"},{"l":3,"en":"Only when we lose something do we begin to understand the real value it holds in our lives.","zh":"只有当我们失去某样东西时，我们才开始理解它在生活中的真正价值。"}]},{"pos":"v.","m":"给……估价；重视；珍惜","ex":[{"l":1,"en":"I value our friendship very much.","zh":"我非常珍惜我们的友谊。"},{"l":2,"en":"People who value their health will try to eat well and exercise every day.","zh":"重视健康的人会努力吃好并每天锻炼。"},{"l":3,"en":"What parents value most is not the grade itself, but the effort their children put into reaching their goals.","zh":"父母最看重的不是成绩本身，而是孩子们为达成目标所付出的努力。"}]}]},{"day":56,"w":"variety","ph":"","defs":[{"pos":"n.","m":"种种；种类","ex":[{"l":1,"en":"The shop sells a variety of fruits.","zh":"这家商店卖各种各样的水果。"},{"l":2,"en":"The market offers such a variety of goods that you can almost find anything you need there.","zh":"这个市场提供如此多样的商品，你几乎能在那里找到任何你需要的东西。"},{"l":3,"en":"Exposed to a variety of cultures from a young age, the girl grew up to be open-minded and full of new ideas.","zh":"从小接触各种各样的文化，这个女孩长大后思想开阔，充满了新想法。"}]}]},{"day":57,"w":"various","ph":"","defs":[{"pos":"adj.","m":"各种各样的","ex":[{"l":1,"en":"We saw various birds in the park.","zh":"我们在公园里看到了各种各样的鸟。"},{"l":2,"en":"The teacher gave us various tasks so that everyone could find something interesting to do.","zh":"老师给我们布置了各种任务，这样每个人都能找到有趣的事情做。"},{"l":3,"en":"There are various reasons why teenagers fail to communicate well with their parents, and understanding them is the first step to solving the problem.","zh":"青少年不能与父母良好沟通有多种原因，理解这些原因是解决问题的第一步。"}]}]},{"day":57,"w":"vegetable","ph":"","defs":[{"pos":"n.","m":"蔬菜","ex":[{"l":1,"en":"I eat vegetables every day.","zh":"我每天都吃蔬菜。"},{"l":2,"en":"My mother often tells me that eating more vegetables is good for my health and helps me grow taller.","zh":"妈妈常告诉我，多吃蔬菜对我的健康有益，还能帮我长高。"},{"l":3,"en":"Doctors suggest that children who refuse to eat vegetables may miss out on the vitamins needed for healthy growth.","zh":"医生建议，拒绝吃蔬菜的孩子可能会错失健康成长所需的维生素。"}]}]},{"day":57,"w":"very","ph":"","defs":[{"pos":"adv.","m":"很，非常","ex":[{"l":1,"en":"Very please to meet you.","zh":"很高兴见到你。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段 起初，这所学校被要求关闭，校舍也不得不出售，因为学校位于一个非常优越的地段。"},{"l":3,"en":"It was the very book that I had been looking for, so I could hardly believe my eyes when I saw it on the shelf.","zh":"这正是我一直在寻找的那本书，所以当我在书架上看到它时，我几乎不敢相信自己的眼睛。"}]}]},{"day":57,"w":"victory","ph":"","defs":[{"pos":"n.","m":"胜利","ex":[{"l":1,"en":"Our team won a great victory yesterday.","zh":"我们队昨天取得了巨大的胜利。"},{"l":2,"en":"The players were so excited that they cheered loudly after they won the victory.","zh":"队员们非常激动，赢得胜利后大声欢呼起来。"},{"l":3,"en":"Only after years of hard training did the young athlete finally taste the sweetness of victory at the international games.","zh":"只有经过多年艰苦训练，这位年轻的运动员才终于在国际赛场上品尝到胜利的甘甜。"}]}]},{"day":57,"w":"video","ph":"","defs":[{"pos":"n.","m":"录像;视频","ex":[{"l":1,"en":"I watched an interesting video last night.","zh":"我昨晚看了一个有趣的视频。"},{"l":2,"en":"The teacher showed us a video which explained how the machine works in a clear way.","zh":"老师给我们播放了一段视频，它清楚地解释了这台机器是如何运转的。"},{"l":3,"en":"Having watched the short video, the students understood why it is so important to protect wild animals in danger.","zh":"看完这段短视频后，学生们明白了为什么保护濒危野生动物如此重要。"}]}]},{"day":57,"w":"view","ph":"","defs":[{"pos":"n.","m":"看法，见解；风景，景色；视野","ex":[{"l":1,"en":"We have a beautiful view of the sea here.","zh":"我们在这里能看到美丽的海景。"},{"l":2,"en":"In my view, the plan is great because it will help more poor children go to school.","zh":"在我看来，这个计划很棒，因为它将帮助更多贫困儿童上学。"},{"l":3,"en":"From the top of the hill, the visitors could see the whole city spreading below them like a shining picture.","zh":"从山顶望去，游客们能看到整座城市如同一幅闪亮的画卷在他们脚下铺展开来。"}]}]},{"day":57,"w":"village","ph":"","defs":[{"pos":"n.","m":"村庄，乡村","ex":[{"l":1,"en":"My grandparents live in a small village.","zh":"我的祖父母住在一个小村庄里。"},{"l":2,"en":"The village where he was born has changed a lot since he left ten years ago.","zh":"他出生的那个村庄自从他十年前离开后变化很大。"},{"l":3,"en":"It is this quiet village that has kept its old traditions alive for hundreds of years.","zh":"正是这个宁静的村庄把它的古老传统延续了数百年。"}]}]},{"day":57,"w":"violin","ph":"","defs":[{"pos":"n.","m":"小提琴","ex":[{"l":1,"en":"She plays the violin very well.","zh":"她小提琴拉得很好。"},{"l":2,"en":"The boy who is playing the violin on the stage is one of my best friends.","zh":"正在舞台上拉小提琴的男孩是我最好的朋友之一。"},{"l":3,"en":"Practicing the violin for two hours every day, the girl made rapid progress and won first prize in the competition.","zh":"由于每天练习两小时小提琴，这个女孩进步神速并在比赛中获得了一等奖。"}]}]},{"day":57,"w":"visit","ph":"","defs":[{"pos":"n.&v.","m":"参观；访问，拜访","ex":[{"l":1,"en":"We know that someone tried hard to make our visit special. Thanks so much for going above and beyond!","zh":"我们知道有人努力让我们的访问变得特别。非常感谢你们付出超乎寻常的心血！"},{"l":2,"en":"During the visit to the museum, I learned a lot about Chinese history that I had never known before.","zh":"在参观博物馆期间，我学到了许多以前从未了解过的中国历史知识。"},{"l":3,"en":"Not only did we enjoy the visit to the old temple, but we also made friends with several local guides.","zh":"我们不仅享受了对古寺的参观，还结识了几位当地导游做朋友。"}]}]},{"day":57,"w":"visitor","ph":"","defs":[{"pos":"n.","m":"参观者；访问者","ex":[{"l":1,"en":"Many visitors come to our city every year.","zh":"每年有许多游客来到我们的城市。"},{"l":2,"en":"The visitors were deeply moved when they saw how hard the children studied in the mountain school.","zh":"当游客们看到山里学校的孩子学习多么刻苦时，他们深受感动。"},{"l":3,"en":"So friendly are the local people that every visitor feels welcome the moment he arrives at the town.","zh":"当地人如此友善，以至于每位游客一到镇上就感到宾至如归。"}]}]},{"day":57,"w":"voice","ph":"","defs":[{"pos":"n.","m":"嗓音","ex":[{"l":1,"en":"She has a very sweet voice.","zh":"她的嗓音非常甜美。"},{"l":2,"en":"When I heard her voice on the phone, I knew at once that she was happy about the news.","zh":"当我在电话里听到她的声音时，我立刻知道她对这消息感到高兴。"},{"l":3,"en":"Though her voice was weak after the illness, she still insisted on reading stories to the children every evening.","zh":"尽管病后她的声音很虚弱，她仍坚持每天傍晚给孩子们读故事。"}]}]},{"day":57,"w":"volleyball","ph":"","defs":[{"pos":"n.","m":"排球","ex":[{"l":1,"en":"We play volleyball after school every day.","zh":"我们每天放学后打排球。"},{"l":2,"en":"The volleyball match which was held last Friday attracted a large number of students.","zh":"上周五举行的那场排球赛吸引了大量学生前来观看。"},{"l":3,"en":"Excited as the players were, they still kept calm and won the volleyball match in the final minute.","zh":"尽管队员们非常激动，他们仍保持冷静并在最后时刻赢得了这场排球赛。"}]}]},{"day":57,"w":"volunteer","ph":"","defs":[{"pos":"n.","m":"志愿者","ex":[{"l":1,"en":"How hard the volunteer worked to get more kids back to school!","zh":"那位志愿者为了让更多孩子重返校园工作得多辛苦啊！"},{"l":2,"en":"The volunteers who helped at the old people's home said they learned a lot from the elderly.","zh":"在敬老院帮忙的志愿者们说他们从老人身上学到了很多。"},{"l":3,"en":"It is the kind volunteer that has changed the lonely boy's life completely over the past three years.","zh":"正是这位善良的志愿者，在过去三年里彻底改变了这个孤独男孩的生活。"}]},{"pos":"v.","m":"自愿（做）；自愿提供","ex":[{"l":1,"en":"He volunteered to clean the classroom after school.","zh":"他放学后主动打扫教室。"},{"l":2,"en":"Many students volunteered to help the old people when they heard about the activity.","zh":"许多学生一听说这项活动就主动去帮助老人。"},{"l":3,"en":"Having volunteered at the animal shelter for two summers, she decided to study veterinary medicine in the future.","zh":"在动物收容所志愿工作了两个夏天后，她决定将来学习兽医学。"}]}]},{"day":57,"w":"wait","ph":"","defs":[{"pos":"v.","m":"等，等候","ex":[{"l":1,"en":"And some said they couldn't wait for the project to be finally completed at the end of this year.","zh":"一些人表示，他们迫不及待地希望这个项目能在今年年底最终完工。"},{"l":2,"en":"Please wait here until I come back, because the road outside is too busy for children.","zh":"请在这里等我回来，因为外面的马路对孩子们来说太繁忙了。"},{"l":3,"en":"No matter how long we have to wait, we will never give up our dream of traveling around the world.","zh":"无论我们必须等待多久，我们都绝不会放弃环游世界的梦想。"}]}]},{"day":57,"w":"waiter","ph":"","defs":[{"pos":"n.","m":"侍者，服务员","ex":[{"l":1,"en":"The waiter brought us the menu.","zh":"服务员把菜单拿给了我们。"},{"l":2,"en":"The waiter who served us yesterday was so friendly that we left him a big tip.","zh":"昨天为我们服务的服务员非常友好，所以我们给了他一大笔小费。"},{"l":3,"en":"Busy as the waiter was, he still found time to recommend several delicious local dishes to us.","zh":"尽管服务员很忙碌，他仍抽出时间向我们推荐了几道美味的当地菜。"}]}]},{"day":57,"w":"waitress","ph":"","defs":[{"pos":"n.","m":"女侍者，女服务员","ex":[{"l":1,"en":"The waitress is very kind to everyone.","zh":"那位女服务员对每个人都很友善。"},{"l":2,"en":"The waitress told us that the soup of the day was made from fresh tomatoes.","zh":"女服务员告诉我们，今日例汤是用新鲜番茄做的。"},{"l":3,"en":"The young waitress smiled so warmly that all the customers felt relaxed as soon as they walked in.","zh":"这位年轻的女服务员笑得如此温暖，所有顾客一进门就感到轻松。"}]}]},{"day":57,"w":"wake","ph":"","defs":[{"pos":"v.","m":"醒；唤醒","ex":[{"l":1,"en":"I usually wake up at six in the morning.","zh":"我通常早上六点醒来。"},{"l":2,"en":"Please don't wake the baby up, because he just fell asleep a few minutes ago.","zh":"请不要吵醒婴儿，因为他几分钟前才刚刚睡着。"},{"l":3,"en":"Woken by the loud noise outside, the little girl ran to her mother's room and hid behind the door.","zh":"被外面的巨大声响吵醒后，小女孩跑到妈妈的房间，躲在了门后。"}]}]},{"day":57,"w":"walk","ph":"","defs":[{"pos":"v.&n.","m":"步行；散步","ex":[{"l":1,"en":"He loved to go on long walks to find stones to add to his collection at the university.","zh":"他喜欢走很长的路去寻找石头，以增添他在大学里的收藏。"},{"l":2,"en":"After dinner, my grandfather and I often take a walk along the river, where the air is fresh and clean.","zh":"晚饭后，我和爷爷经常沿着河边散步，那里空气清新洁净。"},{"l":3,"en":"Only by walking for half an hour every day can we keep healthy enough to deal with our busy study.","zh":"只有每天散步半小时，我们才能保持足够的健康来应对繁忙的学习。"}]}]},{"day":57,"w":"wall","ph":"","defs":[{"pos":"n.","m":"墙","ex":[{"l":1,"en":"There is a picture on the wall.","zh":"墙上有一幅画。"},{"l":2,"en":"The children drew many beautiful pictures and put them up on the wall of the classroom.","zh":"孩子们画了许多漂亮的画，并把它们贴在教室的墙上。"},{"l":3,"en":"It was on this old wall that the famous poet wrote his most popular poem hundreds of years ago.","zh":"数百年前，这位著名诗人正是在这堵旧墙上写下了他最受欢迎的诗篇。"}]}]},{"day":57,"w":"want","ph":"","defs":[{"pos":"v.","m":"想；想要；需要","ex":[{"l":1,"en":"It was so salty that no one wanted to eat it.","zh":"它太咸了，没有人想吃。"},{"l":2,"en":"We wanted them to think of ideas to express their own interests and hopes,\" she said.","zh":"我们希望他们能想出办法来表达自己的兴趣和希望。\"她说。"},{"l":3,"en":"What the old scientist wanted to tell us is that failure is just a step on the road to success.","zh":"这位老科学家想告诉我们的是，失败不过是通往成功路上的一步。"}]}]},{"day":57,"w":"war","ph":"","defs":[{"pos":"n.","m":"战争","ex":[{"l":1,"en":"People hate war and love peace.","zh":"人们痛恨战争，热爱和平。"},{"l":2,"en":"During the war, many families were separated and children had to leave their homes.","zh":"战争期间，许多家庭被迫分离，孩子们不得不离开家园。"},{"l":3,"en":"Having suffered so much in the war, the old man often tells young people how precious peace really is.","zh":"在战争中饱受苦难之后，这位老人常对年轻人讲和平是多么珍贵。"}]}]},{"day":57,"w":"warm","ph":"","defs":[{"pos":"adj.","m":"暖和的；热情的","ex":[{"l":1,"en":"The water is warm and the sun is bright.","zh":"水很暖和，阳光很明亮。"},{"l":2,"en":"When we arrived at the village, the warm sunshine made us feel that spring had truly come.","zh":"当我们到达村庄时，温暖的阳光让我们感到春天真的来了。"},{"l":3,"en":"Only when you are wrapped in the warm smile of an old friend do you realize how much you have missed home.","zh":"只有当你被老朋友那温暖的微笑所包围时，你才会意识到自己有多么想家。"}]}]},{"day":57,"w":"warn","ph":"","defs":[{"pos":"v.","m":"警告；告诫","ex":[{"l":1,"en":"My mother often warns me to be careful.","zh":"我妈妈经常告诫我要小心。"},{"l":2,"en":"The teacher warned the students that if they were late again, they would not be allowed to enter the classroom.","zh":"老师警告学生们，如果再迟到，就不允许进教室了。"},{"l":3,"en":"The guide warned us that the path would become dangerous unless we kept to the marked route before sunset.","zh":"向导告诫我们，除非在日落前沿着标记的路线走，否则小路会变得危险。"}]}]},{"day":57,"w":"wash","ph":"","defs":[{"pos":"v.","m":"洗涤，洗","ex":[{"l":1,"en":"I wash my hands before meals every day.","zh":"我每天饭前都洗手。"},{"l":2,"en":"After playing football for an hour, the boys went home to wash their dirty clothes.","zh":"踢了一个小时足球后，男孩们回家去洗脏衣服了。"},{"l":3,"en":"It was not until the river had been polluted that people began to wash their riverbanks clean every weekend.","zh":"直到河流被污染，人们才开始每个周末把河岸清洗干净。"}]}]},{"day":57,"w":"waste","ph":"","defs":[{"pos":"v.","m":"浪费","ex":[{"l":1,"en":"Please do not waste your time on games.","zh":"请不要把时间浪费在游戏上。"},{"l":2,"en":"If you waste too much time chatting online, you will fall behind in your studies.","zh":"如果你在网上聊天浪费太多时间，学习就会落后。"},{"l":3,"en":"Whoever wastes the chances given by life will find it hard to achieve the dream he has longed for.","zh":"凡是浪费生命给予的机会的人，都很难实现自己长久期盼的梦想。"}]},{"pos":"n.","m":"浪费；废物；垃圾","ex":[{"l":1,"en":"Sorting waste is good for our city.","zh":"垃圾分类对我们的城市有好处。"},{"l":2,"en":"The factory produces a lot of waste every day, which makes the air around it smell terrible.","zh":"这家工厂每天产生大量垃圾，使得周围的空气闻起来很糟糕。"},{"l":3,"en":"It is the waste from daily life, rather than industry, that quietly pollutes the rivers we depend on.","zh":"正是日常生活中的垃圾，而非工业，悄悄污染了我们赖以生存的河流。"}]}]},{"day":57,"w":"watch","ph":"","defs":[{"pos":"n.","m":"手表，表 v,观看；注视；当心","ex":[{"l":1,"en":"My watch is fast and your watch is slow.","zh":"我的表快了，你的表慢了。"},{"l":2,"en":"The watch that my grandfather gave me still works well even though it was made thirty years ago.","zh":"爷爷送给我的那块手表依然走得很好，尽管它是三十年前制造的。"},{"l":3,"en":"Lost was the old watch that had recorded every important moment of his childhood.","zh":"丢失的是那块记录了他童年每个重要时刻的旧手表。"}]}]},{"day":57,"w":"water","ph":"","defs":[{"pos":"n.","m":"水","ex":[{"l":1,"en":"They measure land, air space, and water areas.","zh":"他们测量陆地、空域和水域。"},{"l":2,"en":"Before we started on our road trip, we packed up the car with snacks, water, and music.","zh":"在开始公路旅行之前，我们往车里装满了零食、水和音乐。"},{"l":3,"en":"It is clear water, rather than sweet drinks, that keeps our bodies running in the most natural way.","zh":"是清水，而非甜饮料，以最自然的方式维持着我们身体的运转。"}]},{"pos":"v.","m":"浇水","ex":[{"l":1,"en":"My father waters the flowers every morning.","zh":"我爸爸每天早上给花浇水。"},{"l":2,"en":"Grandma told me that I should water the plants twice a week so that they could grow tall.","zh":"奶奶告诉我应该每周给植物浇两次水，这样它们才能长高。"},{"l":3,"en":"Only by watering the young trees carefully every day did the barren hill finally turn green in spring.","zh":"只有每天细心地给小树浇水，那座荒山才终于在这个春天变绿了。"}]}]},{"day":57,"w":"wave","ph":"","defs":[{"pos":"n.","m":"波，波浪","ex":[{"l":1,"en":"A big wave hit the small boat.","zh":"一个大浪打中了那艘小船。"},{"l":2,"en":"When I stood on the beach, I saw huge waves rolling toward the shore one after another.","zh":"当我站在沙滩上时，我看到巨大的海浪一个接一个地向岸边涌来。"},{"l":3,"en":"It is the gentle wave, rather than the stormy sea, that lulls children to sleep on summer nights.","zh":"是那温柔的波浪，而非狂暴的大海，让孩子们在夏夜安然入睡。"}]},{"pos":"v.","m":"挥手，招手；挥动","ex":[{"l":1,"en":"Would he have seen you if you hadn't waved to him?","zh":"如果你没有向他挥手，他会看见你吗？"},{"l":2,"en":"As soon as the train began to move, the boy waved goodbye to his parents through the window.","zh":"火车一开始移动，男孩就隔着窗户向父母挥手告别。"},{"l":3,"en":"Never had she waved so warmly to a stranger until that rainy afternoon changed everything.","zh":"直到那个下雨的下午改变了一切，她才如此热情地向一个陌生人挥手。"}]}]},{"day":57,"w":"way","ph":"","defs":[{"pos":"n.","m":"路；路线；路途；方法，手段","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"有些植物有自己赶走动物的方法。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它被建造的目的，是把中国南方富饶农业区的粮食运送到北方的城市。"},{"l":3,"en":"It was the only way left for the villagers to cross the river before the new bridge was finally opened.","zh":"在新桥最终通车之前，这是村民们过河仅存的方法。"}]}]},{"day":57,"w":"weak","ph":"","defs":[{"pos":"adj.","m":"弱的，差；淡的","ex":[{"l":1,"en":"First find out about the school. Read the school introductions and look at the school websites. Then think about yourself—your strong points and weak ones. Try to find a few examples you could give the interviewers.","zh":"先了解学校。阅读学校介绍并查看学校网站。然后想想你自己——你的强项和弱项。试着找几个可以给面试官的例子。"},{"l":2,"en":"Although she was weak after the illness, she still insisted on finishing the long race.","zh":"虽然她病后身体虚弱，但她仍然坚持完成了那场长跑。"},{"l":3,"en":"Weak as he was in math, he never gave up and finally ranked among the top three in the class.","zh":"尽管他数学薄弱，但他从未放弃，最终跻身班级前三名。"}]}]},{"day":58,"w":"wealth","ph":"","defs":[{"pos":"n.","m":"财产；财富","ex":[{"l":1,"en":"Health is more important than wealth.","zh":"健康比财富更重要。"},{"l":2,"en":"Many people believe that wealth does not always bring happiness to those who own it.","zh":"许多人认为，财富并不总是给拥有它的人带来幸福。"},{"l":3,"en":"Not until they lost everything did they realize that true wealth lies in love rather than money.","zh":"直到失去一切，他们才意识到真正的财富在于爱，而非金钱。"}]}]},{"day":58,"w":"wear","ph":"","defs":[{"pos":"v.","m":"穿；戴","ex":[{"l":1,"en":"He wears a blue coat today.","zh":"他今天穿着一件蓝色外套。"},{"l":2,"en":"Students who wear school uniforms look tidy and serious when they enter the gate.","zh":"穿校服的学生走进校门时显得整洁而严肃。"},{"l":3,"en":"It is the confidence she wears every day, rather than her clothes, that makes her shine among her friends.","zh":"是她每天展现的自信，而非她的衣着，使她在朋友中闪闪发光。"}]}]},{"day":58,"w":"weather","ph":"","defs":[{"pos":"n.","m":"天气","ex":[{"l":1,"en":"The weather is fine today.","zh":"今天天气很好。"},{"l":2,"en":"If the weather is good tomorrow, we will have a picnic in the park near our school.","zh":"如果明天天气好，我们就在学校附近的公园野餐。"},{"l":3,"en":"Such fine weather has never been seen in this northern town during the cold winter months.","zh":"在这个北方小镇寒冷的冬季，从未见过如此好的天气。"}]}]},{"day":58,"w":"web","ph":"","defs":[{"pos":"n.","m":"网，网状物","ex":[{"l":1,"en":"A spider can make a beautiful web.","zh":"蜘蛛能织出一张美丽的网。"},{"l":2,"en":"When a fly is caught in the web, the spider quickly runs out to catch it.","zh":"当一只苍蝇被网住时，蜘蛛会迅速跑出来抓住它。"},{"l":3,"en":"It is the web of small lies that finally traps a person who once meant to tell the truth.","zh":"正是那由小谎言编织成的网，最终困住了一个本打算说真话的人。"}]}]},{"day":58,"w":"website","ph":"","defs":[{"pos":"n.","m":"网站","ex":[{"l":1,"en":"First find out about the school. Read the school introductions and look at the school websites. Then think about yourself—your strong points and weak ones. Try to find a few examples you could give the interviewers.","zh":"先了解学校。阅读学校介绍并查看学校网站。然后想想你自己——你的强项和弱项。试着找几个可以给面试官的例子。"},{"l":2,"en":"The website that she built last summer has helped thousands of students learn English for free.","zh":"她去年夏天建立的网站已经帮助数千名学生免费学习英语。"},{"l":3,"en":"Seldom has a single website changed the way so many young people read news around the world.","zh":"很少有一个网站能改变如此多年轻人阅读世界新闻的方式。"}]}]},{"day":58,"w":"Wednesday","ph":"","defs":[{"pos":"n.","m":"星期三","ex":[{"l":1,"en":"We have a music class on Wednesday.","zh":"我们星期三有一节音乐课。"},{"l":2,"en":"I will hand in my report next Wednesday because I need more time to check the facts.","zh":"我下周三交报告，因为我需要更多时间核对事实。"},{"l":3,"en":"It was on a rainy Wednesday that she made the bravest decision of her whole teenage life.","zh":"正是在一个下雨的星期三，她做出了整个青少年时期最勇敢的决定。"}]}]},{"day":58,"w":"week","ph":"","defs":[{"pos":"n.","m":"星期","ex":[{"l":1,"en":"I was in the hospital for several weeks.","zh":"我在医院住了好几个星期。"},{"l":2,"en":"After he stayed in the village for two weeks, he fell in love with the quiet life there.","zh":"在村子里待了两个星期后，他爱上了那里宁静的生活。"},{"l":3,"en":"Not for a single week did the young scientist stop working on the experiment that worried his family.","zh":"整整一个星期，这位年轻的科学家都没有停止那项让家人担忧的实验工作。"}]}]},{"day":58,"w":"weekday","ph":"","defs":[{"pos":"n.","m":"工作日","ex":[{"l":1,"en":"My father goes to work on weekdays.","zh":"我爸爸工作日去上班。"},{"l":2,"en":"On weekdays, the library opens early so that students can read before class begins.","zh":"工作日图书馆开门很早，这样学生可以在上课前阅读。"},{"l":3,"en":"Only on weekdays, when the streets are quiet, does the old baker truly enjoy his morning walk.","zh":"只有在工作日，街道安静的时候，这位老面包师才真正享受他的晨间散步。"}]}]},{"day":58,"w":"weekend","ph":"","defs":[{"pos":"n.","m":"周末","ex":[{"l":1,"en":"I often play football with my friends on the weekend.","zh":"周末我经常和朋友们踢足球。"},{"l":2,"en":"Last weekend, my family went to the park and we had a great time having a picnic there.","zh":"上个周末，我们一家去了公园，在那里野餐玩得很开心。"},{"l":3,"en":"Instead of staying at home this weekend, why not join the volunteer group that helps the old in our neighborhood?","zh":"这个周末与其待在家里，为什么不加入帮助社区老人的志愿小组呢？"}]}]},{"day":58,"w":"weigh","ph":"","defs":[{"pos":"v.","m":"称..的重量；重","ex":[{"l":1,"en":"The doctor asked me to weigh myself every morning.","zh":"医生让我每天早上称一下体重。"},{"l":2,"en":"Before buying the apples, the old woman asked the seller to weigh them so that she could know the price.","zh":"买苹果之前，那位老妇人请卖家称一下重量，这样她就能知道价格。"},{"l":3,"en":"Only when you weigh the advantages against the disadvantages carefully can you make a wise decision about your future study.","zh":"只有仔细权衡利弊，你才能为未来的学习做出明智的决定。"}]}]},{"day":58,"w":"weight","ph":"","defs":[{"pos":"n.","m":"重量","ex":[{"l":1,"en":"What is the weight of this box?","zh":"这个盒子的重量是多少？"},{"l":2,"en":"The elephant is so big that its weight is much heavier than that of any other animal in the zoo.","zh":"这头大象很大，它的重量比动物园里任何其他动物都重得多。"},{"l":3,"en":"The teacher told us that losing too much weight in a short time would do harm to our health rather than help us.","zh":"老师告诉我们，短时间内减重太多会对健康造成伤害，而不是带来好处。"}]}]},{"day":58,"w":"welcome","ph":"","defs":[{"pos":"n.&v.","m":"&","ex":[{"l":1,"en":"Please give a warm welcome to our new teacher.","zh":"请热烈欢迎我们的新老师。"},{"l":2,"en":"When the foreign visitors arrived, the students welcomed them with flowers and songs that moved everyone.","zh":"当外国客人到达时，学生们用鲜花和歌声欢迎他们，感动了所有人。"},{"l":3,"en":"Wherever you go, you will be welcomed by friendly people who are ready to offer help whenever you need it.","zh":"无论你走到哪里，都会受到友好的人们欢迎，他们随时准备在你需要时提供帮助。"}]},{"pos":"int.","m":"欢迎","ex":[{"l":1,"en":"Welcome to our school!","zh":"欢迎来到我们学校！"},{"l":2,"en":"Welcome, everyone! Today we are going to talk about how to keep safe when we surf the Internet.","zh":"欢迎大家！今天我们要讨论的是上网时如何注意安全。"},{"l":3,"en":"Welcome, my dear friends! It is such a great honor for me to share with you the story of my growing up in this small town.","zh":"欢迎，我亲爱的朋友们！能和大家分享我在这座小镇长大的故事，我深感荣幸。"}]},{"pos":"adj.","m":"受欢迎的","ex":[{"l":1,"en":"You are always welcome in our home.","zh":"在我们家你总是受欢迎的。"},{"l":2,"en":"The new student felt shy at first, but the warm welcome from his classmates made him happy.","zh":"新同学起初很害羞，但同学们热烈的欢迎让他感到开心。"},{"l":3,"en":"Anyone who is willing to work hard will be welcome to join our team, no matter where he comes from.","zh":"任何愿意努力工作的人都会受到欢迎加入我们的团队，无论他来自哪里。"}]}]},{"day":58,"w":"well","ph":"","defs":[{"pos":"adj.","m":"健康的","ex":[{"l":1,"en":"She’s very well,thank you.","zh":"她身体很好，谢谢。"},{"l":2,"en":"Try to do regular sports.The mind needs exercise as well as the body.","zh":"尽量经常做运动。大脑和身体一样都需要锻炼。"},{"l":3,"en":"Although the old man is over eighty, he looks well and can still climb the mountain without stopping to rest.","zh":"虽然这位老人已经八十多岁了，但他看起来很健康，仍能不停歇地爬上那座山。"}]},{"pos":"adv.","m":"好；令人满意地；完全地","ex":[{"l":1,"en":"She’s very well,thank you.","zh":"她身体很好，谢谢。"},{"l":2,"en":"Try to do regular sports.The mind needs exercise as well as the body.","zh":"尽量经常做运动。大脑和身体一样都需要锻炼。"},{"l":3,"en":"If you want to learn English well, you had better read aloud every morning and keep a diary in English every day.","zh":"如果你想学好英语，最好每天早晨大声朗读，并每天用英语写日记。"}]},{"pos":"n.","m":"井","ex":[{"l":1,"en":"She’s very well,thank you.","zh":"她身体很好，谢谢。"},{"l":2,"en":"Try to do regular sports.The mind needs exercise as well as the body.","zh":"尽量经常做运动。大脑和身体一样都需要锻炼。"},{"l":3,"en":"The villagers had to fetch water from the deep well every day before the government built a new water system for them.","zh":"在政府为他们修建新的供水系统之前，村民们每天不得不从那口深井里打水。"}]},{"pos":"int.","m":"好，好吧；那么","ex":[{"l":1,"en":"She’s very well,thank you.","zh":"她身体很好，谢谢。"},{"l":2,"en":"Try to do regular sports.The mind needs exercise as well as the body.","zh":"尽量经常做运动。大脑和身体一样都需要锻炼。"},{"l":3,"en":"Well, to tell the truth, I was so nervous that I forgot what to say when I stood in front of so many people.","zh":"好吧，说实话，我太紧张了，站在那么多人面前时竟然忘了要说什么。"}]}]},{"day":58,"w":"west","ph":"","defs":[{"pos":"n.","m":"西部；西方","ex":[{"l":1,"en":"The sun sets in the west.","zh":"太阳从西边落下。"},{"l":2,"en":"Shanghai lies in the east of China, while Xinjiang is in the west, thousands of kilometers away.","zh":"上海位于中国的东部，而新疆在西部，相距数千公里。"},{"l":3,"en":"It is said that people in the west have different eating habits from those in the east, which is really interesting.","zh":"据说西方人的饮食习惯与东方人不同，这确实很有趣。"}]},{"pos":"adj.","m":"西方的；向西的","ex":[{"l":1,"en":"Take the west gate and you will find the library.","zh":"走西门你就能找到图书馆。"},{"l":2,"en":"On the west side of the lake, there is an old temple that was built hundreds of years ago.","zh":"在湖的西侧，有一座几百年前建造的古庙。"},{"l":3,"en":"Standing on the west bank of the river, we could see the whole city shining under the setting sun.","zh":"站在河的西岸，我们可以看到整座城市在夕阳下闪闪发光。"}]}]},{"day":58,"w":"western","ph":"","defs":[{"pos":"adj.","m":"西方的","ex":[{"l":1,"en":"I like western food very much.","zh":"我非常喜欢西餐。"},{"l":2,"en":"More and more young people are interested in Western music, but some still prefer traditional Chinese songs.","zh":"越来越多的年轻人对西方音乐感兴趣，但有些人仍然更喜欢传统的中国歌曲。"},{"l":3,"en":"Western culture has spread widely in recent years, yet we should never forget our own traditions.","zh":"近年来西方文化广泛传播，但我们绝不应忘记自己的传统。"}]}]},{"day":58,"w":"wet","ph":"","defs":[{"pos":"adj.","m":"湿的，潮的；多雨的","ex":[{"l":1,"en":"My clothes got wet in the rain.","zh":"我的衣服在雨中淋湿了。"},{"l":2,"en":"Be careful! The floor is wet because someone has just cleaned it, so you may fall down.","zh":"小心！地板是湿的，因为有人刚拖过，你可能会摔倒。"},{"l":3,"en":"It has been a wet week, during which it rained almost every day and the river rose higher and higher.","zh":"这是一个多雨的星期，几乎每天都在下雨，河水越涨越高。"}]}]},{"day":58,"w":"what","ph":"","defs":[{"pos":"pron.","m":"什么；怎么样","ex":[{"l":1,"en":"What’s this?","zh":"这是什么？"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次游学中遇到了一些青少年，现在我和他们还有联系，但我几乎记不起旅途中买了什么。"},{"l":3,"en":"What moved me most was not the gift itself, but the love that my mother put into every word of the letter.","zh":"最让我感动的不是礼物本身，而是母亲倾注在信中每个字里的爱。"}]},{"pos":"adv.","m":"什么；多么","ex":[{"l":1,"en":"What’s this?","zh":"这是什么？"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次游学中遇到了一些青少年，现在我和他们还有联系，但我几乎记不起旅途中买了什么。"},{"l":3,"en":"What a wonderful surprise it was when I opened the door and saw all my old friends standing there with smiles!","zh":"当我打开门，看到所有老朋友面带微笑站在那里时，这是多么美妙的惊喜啊！"}]},{"pos":"conj.","m":"（引导宾语从句）","ex":[{"l":1,"en":"What’s this?","zh":"这是什么？"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次游学中遇到了一些青少年，现在我和他们还有联系，但我几乎记不起旅途中买了什么。"},{"l":3,"en":"I really do not know what I should do next, so could you please give me some advice on this difficult problem?","zh":"我真的不知道下一步该做什么，所以你能就这个难题给我一些建议吗？"}]}]},{"day":58,"w":"when","ph":"","defs":[{"pos":"adv.","m":"什么时候；当..的时候","ex":[{"l":1,"en":"When were you born?","zh":"你什么时候出生的？"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，当我们把它们放在地上时大大松了一口气，而我们叔叔的背包却是半空的。"},{"l":3,"en":"Only when you face difficulties bravely will you find that you are much stronger than you thought.","zh":"只有勇敢地面对困难，你才会发现自己比想象中坚强得多。"}]}]},{"day":58,"w":"where","ph":"","defs":[{"pos":"adv.","m":"在哪里","ex":[{"l":1,"en":"Where’s the door?","zh":"门在哪里？"},{"l":2,"en":"Could you tell me where the nearest post office is, because I need to send a letter to my pen pal?","zh":"你能告诉我最近的邮局在哪里吗？因为我需要给我的笔友寄一封信。"},{"l":3,"en":"No matter where you go in the world, you will always find someone who is ready to give you a hand when you are in trouble.","zh":"无论你走到世界上哪里，总能找到一个在你遇到麻烦时愿意帮助你的人。"}]}]},{"day":58,"w":"whether","ph":"","defs":[{"pos":"conj.","m":"是否","ex":[{"l":1,"en":"I don’t know whether he will come.","zh":"我不知道他是否会来。"},{"l":2,"en":"I am not sure whether the meeting will be held tomorrow, because the manager has not made a decision yet.","zh":"我不确定明天是否开会，因为经理还没有做决定。"},{"l":3,"en":"Whether you succeed or not depends largely on how much effort you put into your work over the years.","zh":"你是否成功在很大程度上取决于多年来你在工作中付出了多少努力。"}]}]},{"day":58,"w":"which","ph":"","defs":[{"pos":"adj.&pron.","m":"那（哪）一个（些）","ex":[{"l":1,"en":"Ask yourself, 'Which will I spend my money on, an outing or a pair of shoes?","zh":"问问你自己，我会把钱花在哪一样上，一次郊游还是一双鞋？"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English. Louise has many Chinese friends. They communicate by computer.","zh":"路易斯现在十三岁，正在学中文，中文已经成为与英语同样重要的世界语言。她有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"When faced with two equally attractive offers, you should ask yourself which choice will bring you closer to your long-term goal before making a final decision.","zh":"当面对两个同样诱人的机会时，你应该在做最终决定前问问自己，哪一个选择能让你更接近长远目标。"}]}]},{"day":58,"w":"while","ph":"","defs":[{"pos":"conj.","m":"在..的时候；正当..时","ex":[{"l":1,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，我们把它们放到地上时长长地松了口气，而我们叔叔的背包却是半空的。"},{"l":2,"en":"While I was reading in the library, my friend came in and told me that the meeting had been put off until next Friday.","zh":"我正在图书馆看书时，我的朋友走进来告诉我，会议已经推迟到下周五了。"},{"l":3,"en":"While some students prefer to study alone in a quiet room, others believe that working in groups helps them understand difficult problems more quickly.","zh":"虽然有些学生更喜欢独自在安静的房间里学习，但另一些人认为小组合作能帮助他们更快地理解难题。"}]},{"pos":"n.","m":"一会儿","ex":[{"l":1,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，我们把它们放到地上时长长地松了口气，而我们叔叔的背包却是半空的。"},{"l":2,"en":"After resting for a short while, the old man continued to walk along the river because he wanted to enjoy the beautiful sunset.","zh":"休息了一会儿之后，那位老人继续沿着河散步，因为他想欣赏美丽的日落。"},{"l":3,"en":"Let us sit down and rest for a while, for we have been walking for nearly three hours without taking any break.","zh":"我们坐下来歇一会儿吧，因为我们已经连续走了将近三个小时，一次都没休息过。"}]}]},{"day":58,"w":"white","ph":"","defs":[{"pos":"adj.","m":"白色的","ex":[{"l":1,"en":"She is wearing a white dress and looks very beautiful today.","zh":"她穿着一条白色的连衣裙，今天看起来非常漂亮。"},{"l":2,"en":"The nurse, dressed in a white uniform, told us that the doctor would arrive in ten minutes.","zh":"那位穿着白色制服的护士告诉我们，医生十分钟后就到。"},{"l":3,"en":"Covered with white snow, the whole mountain looked like a sleeping giant under the pale morning light.","zh":"被白雪覆盖着，整座山在苍白的晨光中看上去就像一个沉睡的巨人。"}]},{"pos":"n.","m":"白色","ex":[{"l":1,"en":"White is my favourite colour because it makes me feel clean and calm.","zh":"白色是我最喜欢的颜色，因为它让我感到洁净和宁静。"},{"l":2,"en":"In Chinese culture, white is often used at funerals, while in Western countries it is the colour of wedding dresses.","zh":"在中国文化中，白色常用于葬礼，而在西方国家它却是婚纱的颜色。"},{"l":3,"en":"The artist mixed a little black with pure white so that the painting would not look too bright against the dark wall.","zh":"那位画家在纯白中掺入少许黑色，这样这幅画挂在深色的墙前就不会显得过于刺眼。"}]}]},{"day":58,"w":"who","ph":"","defs":[{"pos":"pron.","m":"谁","ex":[{"l":1,"en":"Who are you?","zh":"你是谁？"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生，应该尽可能多地学习地理知识。"},{"l":3,"en":"The gentleman who is talking with our headmaster is said to be the scientist who invented the new kind of medicine.","zh":"正在和校长交谈的那位先生，据说就是发明这种新药的科学家。"}]}]},{"day":58,"w":"whole","ph":"","defs":[{"pos":"adj.","m":"整个的","ex":[{"l":1,"en":"The whole day we walked around the countryside, and every now and then, my uncle put stones in our bags.","zh":"我们一整天都在乡间走来走去，我叔叔不时地把石头放进我们的包里。"},{"l":2,"en":"To my surprise, the whole class agreed to raise money for the children who lost their parents in the earthquake.","zh":"令我惊讶的是，全班都同意为那些在地震中失去父母的孩子筹款。"},{"l":3,"en":"It took the whole team three months to complete the project, but the result was far better than anyone had expected.","zh":"整个团队花了三个月才完成这个项目，但结果远远超出了所有人的预期。"}]}]},{"day":58,"w":"whom","ph":"","defs":[{"pos":"pron.","m":"谁","ex":[{"l":1,"en":"With whom did you go to the cinema last night?","zh":"昨晚你和谁一起去看电影了？"},{"l":2,"en":"The teacher asked me with whom I had discussed the problem before I handed in my report.","zh":"老师问我在交报告之前和谁讨论过这个问题。"},{"l":3,"en":"The professor, to whom I wrote a long letter last week, has agreed to write a recommendation for my application.","zh":"我上周给那位教授写了一封长信，他已同意为我的申请写一封推荐信。"}]}]},{"day":58,"w":"whose","ph":"","defs":[{"pos":"pron.","m":"谁的","ex":[{"l":1,"en":"Whose book is this?","zh":"这是谁的书？"},{"l":2,"en":"Do you know whose umbrella was left in the classroom after the meeting yesterday?","zh":"你知道昨天会议结束后谁的雨伞落在教室里了吗？"},{"l":3,"en":"The girl whose painting won the first prize is only twelve years old, which surprised all the judges at the show.","zh":"那个画作获得一等奖的女孩只有十二岁，这让展览上所有的评委都感到惊讶。"}]}]},{"day":58,"w":"why","ph":"","defs":[{"pos":"adv.","m":"为什么","ex":[{"l":1,"en":"Why not meet at 5:30 to have dinner first?","zh":"为什么不在五点半先见面吃晚饭呢？"},{"l":2,"en":"After his amazing talk, I understand why my father is busy.","zh":"在他精彩的演讲之后，我明白了为什么我父亲总是那么忙。"},{"l":3,"en":"That is why I strongly advise you to think twice before giving up the chance that may never come again.","zh":"那就是为什么我强烈建议你在放弃这个或许再也不会出现的机会之前要三思。"}]}]},{"day":58,"w":"wide","ph":"","defs":[{"pos":"adj.","m":"宽的；广泛的","ex":[{"l":1,"en":"The river is very wide, so we have to cross it by boat.","zh":"这条河很宽，所以我们只能乘船过河。"},{"l":2,"en":"The new bridge, which is wide enough for eight cars, was built to solve the heavy traffic problem in the city centre.","zh":"这座新桥宽得足以容纳八辆汽车并行，是为解决市中心严重的交通问题而修建的。"},{"l":3,"en":"Only when you stand at the top of the wide valley can you realize how small human beings really are.","zh":"只有当你站在宽阔的山谷顶端时，你才会意识到人类其实多么渺小。"}]}]},{"day":58,"w":"widely","ph":"","defs":[{"pos":"adv.","m":"宽阔地；广泛地","ex":[{"l":1,"en":"The news spread widely after it was reported by a local newspaper.","zh":"这条消息被一家当地报纸报道后，便广泛地传开了。"},{"l":2,"en":"English is widely used in international business, which is why so many students work hard to learn it well.","zh":"英语在国际商务中被广泛使用，这就是为什么这么多学生努力学习好它的原因。"},{"l":3,"en":"The technology has been so widely accepted that it is hard to imagine modern life without it.","zh":"这项技术已被如此广泛地接受，以至于很难想象没有它的现代生活。"}]}]},{"day":59,"w":"widen","ph":"","defs":[{"pos":"v.","m":"拓宽","ex":[{"l":1,"en":"The workers are trying to widen this road to make traffic easier.","zh":"工人们正设法拓宽这条路，以使交通更顺畅。"},{"l":2,"en":"In order to widen the students' horizons, the school organizes a study trip to the museum every spring.","zh":"为了开阔学生的眼界，学校每年春天都组织一次去博物馆的研学旅行。"},{"l":3,"en":"Reading a variety of books is one of the best ways to widen your knowledge and prepare yourself for future challenges.","zh":"阅读各种各样的书籍是拓宽知识面、为未来挑战做好准备的最佳途径之一。"}]}]},{"day":59,"w":"wife","ph":"","defs":[{"pos":"n.","m":"妻子","ex":[{"l":1,"en":"His wife is a kind woman and she often helps others.","zh":"他的妻子是个善良的女人，她经常帮助别人。"},{"l":2,"en":"The old man's wife, who has been ill for a long time, was finally able to leave the hospital last week.","zh":"那位老人的妻子病了很久，上周终于能够出院了。"},{"l":3,"en":"As a doctor's wife, she has got used to spending most festivals alone while her husband takes care of his patients.","zh":"作为医生的妻子，她已经习惯了在大多数节日里独自度过，而她的丈夫则在照顾病人。"}]}]},{"day":59,"w":"wild","ph":"","defs":[{"pos":"adj.","m":"野生的；荒凉的","ex":[{"l":1,"en":"There are many wild animals living in the forest.","zh":"森林里生活着许多野生动物。"},{"l":2,"en":"When spring comes, the whole mountain is covered with wild flowers that smell really sweet.","zh":"春天到来时，整座山都开满了野花，闻起来非常芬芳。"},{"l":3,"en":"It is reported that the number of wild tigers in this area has increased since the government set up the nature reserve.","zh":"据报道，自从政府建立自然保护区以来，这一地区野生老虎的数量已经增加了。"}]}]},{"day":59,"w":"will","ph":"","defs":[{"pos":"v.","m":"将；会；愿意；...好吗？","ex":[{"l":1,"en":"Yes, I will.","zh":"是的，我会的。"},{"l":2,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易斯至少能活到一百三十岁。她的愿望是工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"If you keep practising every day, you will surely make great progress, however hard the beginning may be.","zh":"如果你每天坚持练习，无论开头多么困难，你都一定会取得巨大的进步。"}]},{"pos":"n.","m":"意志","ex":[{"l":1,"en":"Yes, I will.","zh":"是的，我会的。"},{"l":2,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易斯至少能活到一百三十岁。她的愿望是工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"With a strong will, even an ordinary student can overcome the difficulties that stand in the way of success.","zh":"只要拥有坚强的意志，即使是一个普通的学生也能克服挡在成功道路上的种种困难。"}]}]},{"day":59,"w":"win","ph":"","defs":[{"pos":"v.","m":"获胜；赢得","ex":[{"l":1,"en":"Our team worked hard and finally won the match.","zh":"我们队努力拼搏，最终赢得了比赛。"},{"l":2,"en":"Although they were behind at first, the players did not give up and managed to win the game in the last minute.","zh":"虽然他们一开始落后，但队员们没有放弃，并在最后一分钟赢下了比赛。"},{"l":3,"en":"It was his courage and hard work that helped him win the respect of everyone in the school, including the strict headmaster.","zh":"正是他的勇气和努力，帮助他赢得了学校里所有人的尊重，包括那位严厉的校长。"}]}]},{"day":59,"w":"wind","ph":"","defs":[{"pos":"n.","m":"风","ex":[{"l":1,"en":"The wind is so strong that it blows my hat away.","zh":"风太大了，把我的帽子都吹走了。"},{"l":2,"en":"When the strong wind finally stopped, the children ran out to play in the garden that was full of fallen leaves.","zh":"当大风终于停下来时，孩子们跑出去在满是落叶的花园里玩耍。"},{"l":3,"en":"Blown by the cold wind, the boy pulled his coat tightly around him and hurried home before it began to rain.","zh":"被冷风吹着，男孩把外套紧紧裹在身上，赶在下雨之前匆匆回家。"}]}]},{"day":59,"w":"window","ph":"","defs":[{"pos":"n.","m":"窗户；橱窗","ex":[{"l":1,"en":"Please open the window and let some fresh air in.","zh":"请把窗户打开，让新鲜空气进来。"},{"l":2,"en":"Looking out of the window, I saw a little girl helping an old man cross the busy street.","zh":"从窗户望出去，我看到一个小女孩正在帮助一位老人穿过繁忙的街道。"},{"l":3,"en":"Standing by the window, she watched the last bus disappear in the distance before realizing she had missed it.","zh":"她站在窗边，看着最后一班公交车消失在远处，才意识到自己已经错过了它。"}]}]},{"day":59,"w":"windy","ph":"","defs":[{"pos":"adj.","m":"有风的；起风的","ex":[{"l":1,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"在有风的日子里，落叶铺在地上，马路看起来很美。"},{"l":2,"en":"Although it was a windy afternoon, the children still went out to fly kites happily in the park.","zh":"虽然那是一个有风的下午，孩子们还是开心地到公园里去放风筝了。"},{"l":3,"en":"It was on such a windy morning that the little boat set off, determined to cross the wide sea despite the rough waves.","zh":"正是在那样一个有风的早晨，小船启航了，不顾汹涌的海浪，决心横渡宽阔的大海。"}]}]},{"day":59,"w":"wine","ph":"","defs":[{"pos":"n.","m":"酒；葡萄酒","ex":[{"l":1,"en":"My father drank a glass of wine at dinner.","zh":"我爸爸在晚饭时喝了一杯葡萄酒。"},{"l":2,"en":"The farmer told us that this kind of wine was made from grapes which grew on the hill behind his house.","zh":"那位农夫告诉我们，这种酒是用他房后山上种的葡萄酿成的。"},{"l":3,"en":"Not only is the local wine famous across the country, but it also reminds people of the happy days they spent in the small town.","zh":"这种本地葡萄酒不仅闻名全国，还让人们回想起在小城度过的快乐时光。"}]}]},{"day":59,"w":"wing","ph":"","defs":[{"pos":"n.","m":"机翼；翅膀","ex":[{"l":1,"en":"The bird spread its wings and flew away.","zh":"鸟儿展开翅膀飞走了。"},{"l":2,"en":"The plane couldn't take off because one of its wings had been broken during the heavy storm last night.","zh":"飞机无法起飞，因为昨晚的大暴雨把它的一个机翼弄坏了。"},{"l":3,"en":"Only when the young eagle is pushed out of the nest does it learn to spread its wings and fly high in the sky.","zh":"只有当小鹰被推出巢穴时，它才学会展开翅膀，在空中高飞。"}]}]},{"day":59,"w":"winner","ph":"","defs":[{"pos":"n.","m":"获胜者","ex":[{"l":1,"en":"She is the winner of the singing competition.","zh":"她是歌唱比赛的获胜者。"},{"l":2,"en":"As the winner of the speech contest, he was invited to give a talk to all the students in the school hall.","zh":"作为演讲比赛的获胜者，他被邀请到学校礼堂给全体学生做了一次演讲。"},{"l":3,"en":"What made her the final winner was not luck, but years of hard practice that nobody else had ever noticed.","zh":"让她最终成为获胜者的不是运气，而是别人从未注意到的多年刻苦练习。"}]}]},{"day":59,"w":"winter","ph":"","defs":[{"pos":"n.","m":"冬天，冬季","ex":[{"l":1,"en":"It often snows in winter here.","zh":"这里冬天经常下雪。"},{"l":2,"en":"I love winter because I can make snowmen with my friends when the whole world is covered with white snow.","zh":"我喜欢冬天，因为当整个世界被白雪覆盖时，我可以和朋友一起堆雪人。"},{"l":3,"en":"Cold as the winter was, the old man still walked outside every morning to feed the stray cats in the street.","zh":"尽管冬天很冷，那位老人每天早上仍会出门去喂街上的流浪猫。"}]}]},{"day":59,"w":"wisdom","ph":"","defs":[{"pos":"n.","m":"智慧","ex":[{"l":1,"en":"The old man has much wisdom.","zh":"这位老人很有智慧。"},{"l":2,"en":"The teacher told us that we could learn a lot of wisdom from the stories written by famous writers long ago.","zh":"老师告诉我们，我们可以从很久以前著名作家写的故事中学到很多智慧。"},{"l":3,"en":"It takes not only knowledge but also wisdom to solve such a difficult problem that has troubled people for years.","zh":"解决这样一个困扰人们多年的难题，需要的不仅是知识，还有智慧。"}]}]},{"day":59,"w":"wise","ph":"","defs":[{"pos":"adj.","m":"聪明的；明智的","ex":[{"l":1,"en":"It is wise to wear warm clothes in cold weather.","zh":"在寒冷的天气里穿暖和的衣服是明智的。"},{"l":2,"en":"It was wise of you to ask the teacher for help before you gave up the difficult math problem completely.","zh":"你在完全放弃这道数学难题之前去请教老师，这是明智的。"},{"l":3,"en":"Only a wise leader can guide the team to success when everyone else seems ready to give up halfway.","zh":"当其他人似乎都准备半途而废时，只有明智的领导者才能带领团队走向成功。"}]}]},{"day":59,"w":"wish","ph":"","defs":[{"pos":"n.","m":"愿望；祝愿","ex":[{"l":1,"en":"I wish you hadn't cheated me.","zh":"我希望你没有欺骗我。"},{"l":2,"en":"According to the family doctor,Louise will live to at least130.Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易丝至少能活到一百三十岁。她的愿望是再工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"Deep in her heart, her greatest wish was that her children would come back safely from the faraway city before winter came.","zh":"在她内心深处，她最大的愿望是孩子们能在冬天到来之前从遥远的城市平安归来。"}]},{"pos":"v.","m":"希望；想要；祝愿","ex":[{"l":1,"en":"I wish you hadn't cheated me.","zh":"我希望你没有欺骗我。"},{"l":2,"en":"According to the family doctor,Louise will live to at least130.Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易丝至少能活到一百三十岁。她的愿望是再工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"I sincerely wish that every student who has worked hard for years will finally receive the good news they have been dreaming of.","zh":"我真心希望每一位努力了多年的学生，最终都能收到他们梦寐以求的好消息。"}]}]},{"day":59,"w":"with","ph":"","defs":[{"pos
