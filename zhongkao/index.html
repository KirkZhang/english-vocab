xtremely proud.","zh":"练习篮球十多年后，这位年轻的运动员终于实现了加入国家队的梦想，这让他的家人无比自豪。"}]}]},{"day":5,"w":"bath","ph":"","defs":[{"pos":"n.","m":"洗澡","ex":[{"l":1,"en":"I take a bath every evening.","zh":"我每天晚上洗个澡。"},{"l":2,"en":"After a long day of work, taking a hot bath can help you relax and sleep better.","zh":"工作了一整天之后，洗个热水澡能帮你放松并睡得更好。"},{"l":3,"en":"So relaxing did he feel after the warm bath that he fell asleep on the sofa before finishing his homework.","zh":"洗完温水澡后他感到如此放松，以至于还没做完作业就在沙发上睡着了。"}]}]},{"day":5,"w":"bathroom","ph":"","defs":[{"pos":"n.","m":"浴室；厕所","ex":[{"l":1,"en":"Where is the bathroom, please?","zh":"请问浴室在哪里？"},{"l":2,"en":"Please wait a moment while I go to the bathroom to wash my hands before dinner.","zh":"请稍等，我先去浴室洗一下手再吃晚饭。"},{"l":3,"en":"The bathroom that was repaired last month is equipped with modern facilities, making it convenient for the whole family to use every day.","zh":"上个月翻修过的浴室配备了现代化的设施，方便全家人每天使用。"}]}]},{"day":5,"w":"battery","ph":"","defs":[{"pos":"n.","m":"电池，蓄电池","ex":[{"l":1,"en":"My phone battery is dead.","zh":"我的手机电池没电了。"},{"l":2,"en":"If you do not turn off the lights, the car battery will run out quickly.","zh":"如果你不关灯，汽车电池很快就会耗尽。"},{"l":3,"en":"Only when the battery of his laptop suddenly died did he realize how much he depended on modern technology.","zh":"直到笔记本电脑的电池突然没电，他才意识到自己有多么依赖现代科技。"}]}]},{"day":5,"w":"battle","ph":"","defs":[{"pos":"n.","m":"战斗；战役","ex":[{"l":1,"en":"They won the battle at last.","zh":"他们最终赢得了这场战斗。"},{"l":2,"en":"The battle that took place here hundreds of years ago is still remembered by the local people.","zh":"数百年前发生在这里的那场战斗仍然被当地人铭记。"},{"l":3,"en":"Faced with such a fierce battle, the young soldier showed great courage and never gave up fighting for his country.","zh":"面对如此激烈的战斗，这位年轻的士兵展现出极大的勇气，从未放弃为祖国而战。"}]}]},{"day":5,"w":"be","ph":"","defs":[{"pos":"v.","m":"是；成为","ex":[{"l":1,"en":"Yes,I am.","zh":"是的，我是。"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"露易丝今年十三岁，目前正在学习中文，中文已经成为和英语一样重要的世界语言。露易丝有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"What he wants to be in the future is a doctor who can help patients in poor areas, and he has been working hard to realize this dream.","zh":"他将来想成为的是一名能帮助贫困地区病人的医生，为此他一直在努力实现这个梦想。"}]}]},{"day":5,"w":"beach","ph":"","defs":[{"pos":"n.","m":"海滨，海滩","ex":[{"l":1,"en":"We walked along the beach together.","zh":"我们一起沿着海滩散步。"},{"l":2,"en":"The beach which we visited last summer was clean and full of beautiful shells.","zh":"去年夏天我们游览的那片海滩很干净，到处是美丽的贝壳。"},{"l":3,"en":"Standing on the quiet beach and watching the sun sink into the sea, the girl felt all her worries disappear at that moment.","zh":"站在宁静的海滩上看着太阳沉入大海，女孩感到所有的烦恼在那一刻都消失了。"}]}]},{"day":5,"w":"bear","ph":"","defs":[{"pos":"n.","m":"熊","ex":[{"l":1,"en":"When were you born?","zh":"你什么时候出生的？"},{"l":2,"en":"The bear that lives in the zoo was rescued from the forest three years ago.","zh":"住在动物园里的那头熊是三年前从森林里救出来的。"},{"l":3,"en":"Rarely do we see a polar bear in the wild, which is why scientists are trying hard to protect its disappearing habitat.","zh":"我们极少能在野外看到北极熊，这正是科学家们努力保护其逐渐消失的栖息地的原因。"}]}]},{"day":5,"w":"beat","ph":"","defs":[{"pos":"v.","m":"敲打；跳动；打赢","ex":[{"l":1,"en":"It is not easy to beat a robot player in a chess game.","zh":"在国际象棋比赛中打败机器人棋手并不容易。"},{"l":2,"en":"Although our team was behind at first, we did not give up and finally beat the strongest team in the league.","zh":"虽然我们队一开始落后，但我们没有放弃，最终打败了联赛中最强的队伍。"},{"l":3,"en":"Not until he beat the national champion did people begin to believe that hard work could truly change one's fate.","zh":"直到他打败了全国冠军，人们才开始相信努力真的能改变一个人的命运。"}]}]},{"day":5,"w":"beautiful","ph":"","defs":[{"pos":"adj.","m":"美丽的","ex":[{"l":1,"en":"John began to play the piano and beautiful music filled the room.","zh":"约翰开始弹钢琴，美妙的音乐充满了房间。"},{"l":2,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"在有风的日子里，树叶落在地上，这条路看起来很美。"},{"l":3,"en":"So beautiful was the sunset over the lake that many tourists stopped to take photos, unwilling to leave such a wonderful scene.","zh":"湖上的日落如此美丽，许多游客停下脚步拍照，舍不得离开这样美妙的景色。"}]}]},{"day":5,"w":"beautifully","ph":"","defs":[{"pos":"adv.","m":"优美地","ex":[{"l":1,"en":"She dances beautifully on the stage.","zh":"她在舞台上优美地跳舞。"},{"l":2,"en":"The young girl danced so beautifully that the whole audience stood up and cheered for her.","zh":"那个小女孩跳得如此优美，以至于全场观众都站起来为她欢呼。"},{"l":3,"en":"Dressed in a long red dress, she played the piano so beautifully that nobody in the hall wanted the music to end.","zh":"她身穿红色长裙，钢琴弹得如此优美，以至于大厅里没有人希望音乐结束。"}]}]},{"day":5,"w":"beauty","ph":"","defs":[{"pos":"n.","m":"美","ex":[{"l":1,"en":"I love the beauty of the sea.","zh":"我喜欢大海的美。"},{"l":2,"en":"When spring comes, the beauty of the garden attracts many visitors who come to take photos.","zh":"春天到来时，花园的美吸引了许多来拍照的游客。"},{"l":3,"en":"It is the beauty of nature that makes us realize how lucky we are to live in such a wonderful world.","zh":"正是大自然的美让我们意识到，能生活在如此美好的世界里是多么幸运。"}]}]},{"day":5,"w":"because","ph":"","defs":[{"pos":"conj.","m":"因为","ex":[{"l":1,"en":"He might feel happy because Grandma loved his gift.","zh":"他可能会感到高兴，因为奶奶喜欢他的礼物。"},{"l":2,"en":"Because he misunderstood his Grandma's words fruit bowl as football.","zh":"因为他把奶奶说的果盘误解成了足球。"},{"l":3,"en":"Not until he read the letter did he understand why Grandma had smiled, because he had been puzzled by her strange words for days.","zh":"直到读了那封信他才明白奶奶为什么微笑，因为他已经被她奇怪的话语困惑了好几天。"}]}]},{"day":5,"w":"become","ph":"","defs":[{"pos":"v.","m":"变得；成为","ex":[{"l":1,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为地图绘制者感兴趣的学生应该尽可能多地学习地理知识。"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English. Louise has many Chinese friends. They communicate by computer.","zh":"露易丝现在十三岁，正在学习中文，中文已经成为和英语一样重要的世界语言。露易丝有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"Having made up her mind to become a doctor, the girl studied so hard that she finally entered one of the best medical schools in the country.","zh":"下定决心要成为一名医生后，这个女孩学习如此刻苦，最终考入了全国最好的医学院之一。"}]}]},{"day":5,"w":"bed","ph":"","defs":[{"pos":"n.","m":"床","ex":[{"l":1,"en":"I make my bed every morning.","zh":"我每天早上整理床铺。"},{"l":2,"en":"Before I go to bed, I always read a book for half an hour so that I can sleep better.","zh":"上床睡觉前，我总会看半小时书，这样能睡得更好。"},{"l":3,"en":"Tired as he was after the long journey, he still made his bed before lying down, for he believed a tidy room could bring a good mood.","zh":"尽管长途旅行后很疲惫，他躺下前仍整理好床铺，因为他相信整洁的房间能带来好心情。"}]}]},{"day":5,"w":"bedroom","ph":"","defs":[{"pos":"n.","m":"卧室","ex":[{"l":1,"en":"My bedroom is small but clean.","zh":"我的卧室小但干净。"},{"l":2,"en":"The bedroom whose window faces south is the brightest room in our house.","zh":"窗户朝南的那间卧室是我们家最明亮的房间。"},{"l":3,"en":"Decorated with photos and warm lights, the small bedroom has become the coziest corner where the whole family loves to chat at night.","zh":"经过照片和暖灯的装饰，这间小卧室已成为全家夜晚最爱聚在一起聊天的最舒适角落。"}]}]},{"day":5,"w":"beef","ph":"","defs":[{"pos":"n.","m":"牛肉","ex":[{"l":1,"en":"I had beef for lunch today.","zh":"我今天午饭吃了牛肉。"},{"l":2,"en":"My mother cooked beef with potatoes, which smelled so good that all of us wanted to eat at once.","zh":"妈妈做了土豆烧牛肉，闻起来太香了，我们都想马上吃。"},{"l":3,"en":"Only when you taste the beef cooked in this special way will you understand why the small restaurant is so popular among local people.","zh":"只有当你品尝过这种特殊做法烹制的牛肉，你才会明白这家小餐馆为何在当地人中间如此受欢迎。"}]}]},{"day":5,"w":"before","ph":"","defs":[{"pos":"prep.","m":"在..以前；在..前面","ex":[{"l":1,"en":"I get up before six o'clock every day.","zh":"我每天六点前起床。"},{"l":2,"en":"Before we started on our road trip, we packed up the car with snacks, water, and music.","zh":"在开始公路旅行之前，我们把零食、水和音乐装满了车。"},{"l":3,"en":"Please hand in your report before this Friday, because the teacher will check all of them during the weekend.","zh":"请在本周五之前交报告，因为老师会在周末检查全部内容。"}]},{"pos":"adv.","m":"以前","ex":[{"l":1,"en":"I have read this book before.","zh":"我以前读过这本书。"},{"l":2,"en":"Although she has seen the film before, she still wants to watch it again with her friends.","zh":"虽然她以前看过这部电影，她仍然想和朋友再看一遍。"},{"l":3,"en":"Never before have I tasted such delicious food, and I will surely visit this restaurant again next month.","zh":"我以前从未尝过如此美味的食物，下个月我一定会再来这家餐厅。"}]},{"pos":"conj.","m":"在..之前","ex":[{"l":1,"en":"Wash your hands before you eat.","zh":"吃饭前要洗手。"},{"l":2,"en":"Please turn off the lights before you leave the classroom so that we can save energy.","zh":"离开教室前请关灯，这样我们能节约能源。"},{"l":3,"en":"It was already dark before we realized that we had taken the wrong road in the forest.","zh":"在我们意识到自己在森林里走错了路之前，天已经黑了。"}]}]},{"day":5,"w":"beg","ph":"","defs":[{"pos":"v.","m":"请求；乞求，乞讨","ex":[{"l":1,"en":"The poor boy begged for some food.","zh":"那个可怜的男孩乞求一些食物。"},{"l":2,"en":"The hungry dog begged for food so sadly that the girl decided to take it home.","zh":"那只饥饿的狗乞求食物的样子如此可怜，女孩决定把它带回家。"},{"l":3,"en":"Never will I beg others for help unless I have truly tried my best to solve the problem on my own.","zh":"我绝不会乞求别人帮助，除非我真的已经竭尽全力自己解决问题。"}]}]},{"day":5,"w":"begin","ph":"","defs":[{"pos":"v.","m":"开始，着手","ex":[{"l":1,"en":"Let's begin now.","zh":"我们现在开始吧。"},{"l":2,"en":"As soon as the bell rings, the teacher will begin the lesson and we must listen carefully.","zh":"铃声一响，老师就会开始上课，我们必须认真听讲。"},{"l":3,"en":"Having waited for months, the fans began to cheer the moment the famous singer appeared on the stage.","zh":"等候了数月之后，这位著名歌手一出现在舞台上，粉丝们就开始欢呼起来。"}]}]},{"day":6,"w":"beginning","ph":"","defs":[{"pos":"n.","m":"开始；开端","ex":[{"l":1,"en":"This is the beginning of the story.","zh":"这是故事的开端。"},{"l":2,"en":"At the beginning of the term, our teacher told us to make a clear plan for our studies.","zh":"学期伊始，老师告诉我们要为学习制定一个清晰的计划。"},{"l":3,"en":"From the very beginning, it was clear that the young player had a special talent that would lead him to success.","zh":"从一开始就很明显，这位年轻选手拥有一种特殊的才能，这种才能将引领他走向成功。"}]}]},{"day":6,"w":"behaviour","ph":"","defs":[{"pos":"n.","m":"行为；举止","ex":[{"l":1,"en":"His behaviour is very good.","zh":"他的行为非常好。"},{"l":2,"en":"The teacher praised Tom because his behaviour in class has improved a lot this term.","zh":"老师表扬了汤姆，因为这学期他在课堂上的行为进步了很多。"},{"l":3,"en":"It is parents' duty to teach their children good behaviour, which will benefit them throughout their whole lives.","zh":"教导孩子良好的行为是父母的职责，这将使他们终生受益。"}]}]},{"day":6,"w":"behind","ph":"","defs":[{"pos":"prep.","m":"在...后面","ex":[{"l":1,"en":"The cat is behind the door.","zh":"猫在门后面。"},{"l":2,"en":"There is a big garden behind the house where children love to play after school.","zh":"房子后面有一个大花园，孩子们放学后喜欢在那里玩。"},{"l":3,"en":"Behind the old library lies a quiet river, along which the elderly often take a slow walk in the early morning.","zh":"在旧图书馆后面有一条安静的河，老人清晨常沿着它慢慢散步。"}]},{"pos":"adv.","m":"在后面；向后","ex":[{"l":1,"en":"Please look behind before you back up.","zh":"倒退前请向后看。"},{"l":2,"en":"When the little girl heard footsteps behind, she was so afraid that she began to run fast.","zh":"当小女孩听到身后有脚步声时，她害怕得开始飞奔。"},{"l":3,"en":"Looking behind, the climber saw the whole valley covered with morning fog, which made the view even more beautiful.","zh":"回头看时，登山者看到整个山谷被晨雾笼罩，这让景色更加美丽。"}]}]},{"day":6,"w":"being","ph":"","defs":[{"pos":"n.","m":"生物；人","ex":[{"l":1,"en":"A human being needs water.","zh":"人需要水。"},{"l":2,"en":"Every living being on the earth depends on the sun, which gives us light and warmth.","zh":"地球上每种生物都依赖太阳，它给我们光明和温暖。"},{"l":3,"en":"As thinking beings, we should consider not only our own interests but also the future of the whole planet.","zh":"作为会思考的生物，我们不仅应考虑自己的利益，还应考虑整个地球的未来。"}]}]},{"day":6,"w":"believe","ph":"","defs":[{"pos":"v.","m":"相信；认为","ex":[{"l":1,"en":"I believe you are right.","zh":"我相信你是对的。"},{"l":2,"en":"I truly believe that if we keep practicing, we will achieve our dreams in the future.","zh":"我真心相信，如果我们坚持练习，将来一定会实现梦想。"},{"l":3,"en":"Not only do I believe in your ability, but I also believe that you will succeed no matter how hard the journey is.","zh":"我不仅相信你的能力，也相信无论旅途多么艰难，你都会成功。"}]}]},{"day":6,"w":"bell","ph":"","defs":[{"pos":"n.","m":"钟；铃","ex":[{"l":1,"en":"The bell is ringing.","zh":"铃响了。"},{"l":2,"en":"As soon as the bell rang, the students rushed out of the classroom to play on the playground.","zh":"铃声一响，学生们就冲出教室到操场上玩。"},{"l":3,"en":"Hearing the bell that marked the end of the exam, all the students let out a deep breath and finally relaxed.","zh":"听到标志着考试结束的铃声，所有学生都长舒一口气，终于放松下来。"}]}]},{"day":6,"w":"belong","ph":"","defs":[{"pos":"v.","m":"属；附属","ex":[{"l":1,"en":"Does this radio belong to you?","zh":"这台收音机是你的吗？"},{"l":2,"en":"Success belongs to hardworking students in the end.","zh":"成功最终属于勤奋的学生。"},{"l":3,"en":"It is generally believed that glory belongs to those who never give up, no matter how many times they fail.","zh":"人们普遍认为，荣耀属于那些永不放弃的人，无论他们失败多少次。"}]}]},{"day":6,"w":"below","ph":"","defs":[{"pos":"prep.","m":"在..下面","ex":[{"l":1,"en":"The cat is sleeping below the chair.","zh":"猫正在椅子下面睡觉。"},{"l":2,"en":"Please read the notice below the picture and tell me what it says.","zh":"请阅读图片下方的通知，然后告诉我上面写了什么。"},{"l":3,"en":"The temperature in winter here often falls below zero, which makes it necessary for us to wear thick coats.","zh":"这里的冬天气温常常降到零度以下，这使我们有必要穿上厚外套。"}]}]},{"day":6,"w":"belt","ph":"","defs":[{"pos":"n.","m":"（皮）带；带子","ex":[{"l":1,"en":"He is wearing a black belt today.","zh":"他今天系着一条黑色皮带。"},{"l":2,"en":"The driver who forgot to wear a seat belt was stopped by the police at once.","zh":"那位忘记系安全带的司机立刻被警察拦了下来。"},{"l":3,"en":"It was not until the teacher reminded him that he realized fastening the safety belt was the most important thing before driving.","zh":"直到老师提醒，他才意识到系好安全带是开车前最重要的事情。"}]}]},{"day":6,"w":"beside","ph":"","defs":[{"pos":"prep.","m":"在...旁边；靠近","ex":[{"l":1,"en":"Come and sit beside me.","zh":"过来坐在我旁边。"},{"l":2,"en":"She stood beside the window, watching the children who were playing happily in the garden.","zh":"她站在窗边，看着那些在花园里快乐玩耍的孩子们。"},{"l":3,"en":"Beside the river stands an old temple, which has attracted thousands of visitors since it was built hundreds of years ago.","zh":"河边矗立着一座古庙，自从几百年前建成以来，它已经吸引了成千上万的游客。"}]}]},{"day":6,"w":"besides","ph":"","defs":[{"pos":"prep.","m":"除..以外（还有）","ex":[{"l":1,"en":"Besides English, he also learns French.","zh":"除了英语，他还学习法语。"},{"l":2,"en":"Besides the homework that the teacher gave us, we still need to prepare for the coming exam.","zh":"除了老师布置的作业之外，我们还需要为即将到来的考试做准备。"},{"l":3,"en":"Besides reading classic novels, she spends much time listening to English news, which helps improve her listening skills a lot.","zh":"除了阅读经典小说，她还花很多时间听英语新闻，这大大帮助她提高了听力水平。"}]},{"pos":"adv.","m":"还有，此外","ex":[{"l":1,"en":"Besides, students are likely to suffer from mental problems.","zh":"此外，学生们还可能会遭受心理问题的困扰。"},{"l":2,"en":"Besides, students are likely to suffer from mental problems if they always stay up late to finish their homework.","zh":"此外，如果学生总是熬夜完成作业，他们很可能会出现心理问题。"},{"l":3,"en":"Besides, regular exercise not only builds up our bodies but also helps reduce the stress that comes from heavy schoolwork.","zh":"此外，经常锻炼不仅能强健体魄，还有助于减轻繁重学业带来的压力。"}]}]},{"day":6,"w":"best","ph":"","defs":[{"pos":"adj.&adv.","m":"最好的；最好地；最","ex":[{"l":1,"en":"Your parents are the best bakers in the neighborhood.","zh":"你的父母是这片街区最好的面包师。"},{"l":2,"en":"I'm sure that you will do well in your interviews. Best of luck, boys and girls!","zh":"我相信你们会在面试中表现出色。祝你们好运，孩子们！"},{"l":3,"en":"Of all the subjects we learn, English is the one that interests me most, so I always try my best to practice it every day.","zh":"在我们学的所有科目中，英语是最让我感兴趣的一门，所以我每天都尽最大努力去练习它。"}]}]},{"day":6,"w":"better","ph":"","defs":[{"pos":"adj.","m":"较好的，更好的","ex":[{"l":1,"en":"This book is better than that one.","zh":"这本书比那本书更好。"},{"l":2,"en":"I think reading every day is a better way to learn English than only doing exercises.","zh":"我认为每天阅读是比只做练习更好的学习英语的方法。"},{"l":3,"en":"The more you practice, the better result you will get, so never give up even when you meet difficulties.","zh":"你练习得越多，取得的结果就越好，所以即使遇到困难也绝不要放弃。"}]},{"pos":"adv.","m":"更好地","ex":[{"l":1,"en":"You can do it better next time.","zh":"下次你能做得更好。"},{"l":2,"en":"If you want to sing better, you should practice more often than before.","zh":"如果你想唱得更好，就应该比以前更经常地练习。"},{"l":3,"en":"Only by listening carefully in class can we understand the teacher better and remember what we have learned for a longer time.","zh":"只有在课堂上认真听讲，我们才能更好地理解老师，并把所学知识记得更久。"}]},{"pos":"n.","m":"较好的事物；较优者","ex":[{"l":1,"en":"He always wants the better of the two.","zh":"他总是想要两个当中较好的那一个。"},{"l":2,"en":"Between the two plans, she always chooses the better, which can save us much time.","zh":"在这两个计划之间，她总是选择较好的那一个，这能为我们节省很多时间。"},{"l":3,"en":"We should never be satisfied with what we have, for there is always the better waiting for us to discover through hard work.","zh":"我们永远不应满足于已有的事物，因为总有更好的东西等待我们通过努力去发现。"}]}]},{"day":6,"w":"between","ph":"","defs":[{"pos":"prep.","m":"在（两者）之间；在...中间","ex":[{"l":1,"en":"The ball is between the two boxes.","zh":"球在两个箱子之间。"},{"l":2,"en":"There is a secret between the two girls that nobody else knows.","zh":"这两个女孩之间有一个别人都不知道的秘密。"},{"l":3,"en":"The friendship between classmates is one of the most precious things we can get during our school life, and it often lasts for a lifetime.","zh":"同学之间的友谊是我们在学生时代能获得的最珍贵的东西之一，它往往能持续一生。"}]}]},{"day":6,"w":"bicycle","ph":"","defs":[{"pos":"n.","m":"自行车","ex":[{"l":1,"en":"I go to school by bicycle every day.","zh":"我每天骑自行车上学。"},{"l":2,"en":"Riding a bicycle is good for our health, and it also helps protect the environment.","zh":"骑自行车对我们的健康有益，同时也有助于保护环境。"},{"l":3,"en":"Compared with taking the bus, riding a bicycle not only saves time during rush hours but also gives us a chance to exercise every day.","zh":"与乘公交车相比，骑自行车不仅在高峰时段节省时间，还给了我们每天锻炼的机会。"}]}]},{"day":6,"w":"big","ph":"","defs":[{"pos":"adj.","m":"大的","ex":[{"l":1,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，以至于我们把它们放到地上时大大地松了一口气，而我们叔叔的背包却只装了一半。"},{"l":2,"en":"There is a big tree in front of our house, which gives us cool shade in summer.","zh":"我们家门前有一棵大树，它在夏天为我们提供凉爽的树荫。"},{"l":3,"en":"Making a big decision is never easy, so we should think it over carefully before we take action.","zh":"做出重大决定绝非易事，所以我们在采取行动之前应该仔细斟酌。"}]}]},{"day":6,"w":"bill","ph":"","defs":[{"pos":"n.","m":"账单；钞票，纸币","ex":[{"l":1,"en":"Good-bye, Bill.","zh":"再见，比尔。"},{"l":2,"en":"After dinner, he asked the waiter to bring the bill so that he could pay at once.","zh":"晚饭后，他请服务员拿来账单，以便立刻结账。"},{"l":3,"en":"Before you pay the bill, you had better check it carefully to make sure that everything on it is correct.","zh":"在结账之前，你最好仔细核对账单，以确保上面的每一项都准确无误。"}]}]},{"day":6,"w":"bin","ph":"","defs":[{"pos":"n.","m":"箱子；垃圾箱","ex":[{"l":1,"en":"Please throw the rubbish into the bin.","zh":"请把垃圾扔进垃圾箱。"},{"l":2,"en":"We should put different kinds of rubbish into different bins so that they can be recycled.","zh":"我们应该把不同种类的垃圾放进不同的垃圾箱，以便它们能够被回收利用。"},{"l":3,"en":"It is a good habit to sort the rubbish before throwing it into the right bin, which will greatly help protect our environment.","zh":"在把垃圾扔进正确的垃圾箱之前先进行分类是个好习惯，这将极大地帮助保护我们的环境。"}]}]},{"day":6,"w":"bird","ph":"","defs":[{"pos":"n.","m":"鸟","ex":[{"l":1,"en":"The bird is singing in the tree.","zh":"鸟在树上唱歌。"},{"l":2,"en":"Look at the beautiful bird that is flying over the lake!","zh":"看那只正飞过湖面的美丽的鸟！"},{"l":3,"en":"Early in the morning, the sweet songs of birds wake me up, making me feel that a new day full of hope has begun.","zh":"清晨，鸟儿甜美的歌声把我唤醒，让我感到充满希望的新一天已经开始。"}]}]},{"day":6,"w":"birthday","ph":"","defs":[{"pos":"n.","m":"生日","ex":[{"l":1,"en":"Today is my birthday.","zh":"今天是我的生日。"},{"l":2,"en":"My parents bought me a new bike as a birthday present, which made me very happy.","zh":"我父母给我买了一辆新自行车作为生日礼物，这让我非常高兴。"},{"l":3,"en":"On my fourteenth birthday, I made a wish that I would work hard to enter the high school of my dream in the future.","zh":"在我十四岁生日那天，我许下了一个愿望：将来要努力学习，考入我梦想中的高中。"}]}]},{"day":6,"w":"biscuit","ph":"","defs":[{"pos":"n.","m":"饼干","ex":[{"l":1,"en":"Would you like a biscuit?","zh":"你想来一块饼干吗？"},{"l":2,"en":"My mother often bakes some biscuits for us when we come back home from school.","zh":"当我们放学回家时，妈妈经常为我们烤一些饼干。"},{"l":3,"en":"Although the biscuits my grandmother made were not as beautiful as those in the shop, they tasted much better than any I had ever eaten.","zh":"尽管奶奶做的饼干没有商店里的好看，但它们的味道比我吃过的任何饼干都要好得多。"}]}]},{"day":6,"w":"bit","ph":"","defs":[{"pos":"n.","m":"一点；一些；少量","ex":[{"l":1,"en":"We were a bit surprised that he also took some stones out from our bags at times.","zh":"我们有点惊讶，他有时也会从我们的包里拿出一些石头。"},{"l":2,"en":"I felt a bit tired after running for an hour, so I decided to take a short rest.","zh":"跑了一个小时后我感到有点累，所以我决定稍微休息一下。"},{"l":3,"en":"Learning a foreign language well is a bit difficult at the beginning, but as long as you keep practicing, you will surely make great progress.","zh":"学好一门外语在开始时有点困难，但只要你坚持练习，就一定能取得巨大的进步。"}]}]},{"day":6,"w":"bite","ph":"","defs":[{"pos":"v.","m":"咬；叮","ex":[{"l":1,"en":"When an insect bites a tobacco leaf, the leaf produces a chemical messenger.","zh":"当昆虫咬了一口烟叶时，这片叶子会产生一种化学信使。"},{"l":2,"en":"Be careful when you play in the garden, or the dog there may bite you.","zh":"在花园里玩的时候要小心，否则那里的狗可能会咬你。"},{"l":3,"en":"It was the mosquito that bit me last night, leaving several red marks on my arm that still itch now.","zh":"正是昨晚那只蚊子咬了我，在我的胳膊上留下了几处现在还在发痒的红印。"}]}]},{"day":6,"w":"black","ph":"","defs":[{"pos":"n.","m":"黑色","ex":[{"l":1,"en":"She is wearing a dress in black.","zh":"她穿着一件黑色的连衣裙。"},{"l":2,"en":"In Chinese culture, red means good luck while black often stands for sadness.","zh":"在中国文化中，红色代表好运，而黑色常常象征悲伤。"},{"l":3,"en":"Dressed in black from head to foot, the old man looked so serious that nobody dared to speak to him at first.","zh":"那位老人从头到脚都穿着黑色，看起来非常严肃，起初没人敢跟他说话。"}]},{"pos":"adj.","m":"黑色的","ex":[{"l":1,"en":"He has a black car.","zh":"他有一辆黑色的小汽车。"},{"l":2,"en":"The man in a black coat is the teacher who teaches us English.","zh":"穿黑色外套的那个人就是教我们英语的老师。"},{"l":3,"en":"Only when the last ray of light disappeared did the black night quietly cover the whole village.","zh":"直到最后一缕光线消失，黑夜才悄悄笼罩了整个村庄。"}]}]},{"day":6,"w":"blackboard","ph":"","defs":[{"pos":"n.","m":"黑板","ex":[{"l":1,"en":"Please look at the blackboard.","zh":"请看黑板。"},{"l":2,"en":"The teacher wrote the new words on the blackboard so that everyone could see them clearly.","zh":"老师把生词写在黑板上，以便每个人都能看清楚。"},{"l":3,"en":"Whenever I recall the blackboard of that old classroom, I am reminded of the days when we worked hard for our dreams.","zh":"每当回想起那间旧教室的黑板，我就会想起我们为梦想努力奋斗的日子。"}]}]},{"day":6,"w":"blanket","ph":"","defs":[{"pos":"n.","m":"毯子","ex":[{"l":1,"en":"The blanket is very warm.","zh":"这条毯子很暖和。"},{"l":2,"en":"When the winter came, Mother put a thick blanket on my bed to keep me warm.","zh":"冬天来临时，妈妈在我床上铺了一条厚毯子来给我保暖。"},{"l":3,"en":"Covered with a soft blanket, the sick child soon fell asleep while his mother watched quietly beside him.","zh":"盖着柔软的毯子，那个生病的孩子很快就睡着了，他的母亲在一旁静静地看着。"}]}]},{"day":6,"w":"blind","ph":"","defs":[{"pos":"adj.","m":"瞎的","ex":[{"l":1,"en":"The blind dog needs our help.","zh":"这只瞎眼的狗需要我们的帮助。"},{"l":2,"en":"Although he has been blind since birth, he never gives up his dream of becoming a musician.","zh":"虽然他从出生起就看不见，但他从未放弃成为音乐家的梦想。"},{"l":3,"en":"Not until I met the blind pianist did I realize that a strong heart can overcome any difficulty in life.","zh":"直到遇见那位失明的钢琴家，我才意识到一颗坚强的心能克服生活中的任何困难。"}]},{"pos":"n.","m":"盲人","ex":[{"l":1,"en":"He helped a blind cross the street.","zh":"他帮助一位盲人过马路。"},{"l":2,"en":"As a blind, he has learned to read by touching the special books with his fingers.","zh":"作为一名盲人，他已经学会了用手指触摸特殊的书本来阅读。"},{"l":3,"en":"It was the kind blind who showed us the way home when we got lost in the strange town.","zh":"正是那位善良的盲人在我们迷路于陌生小镇时给我们指了回家的路。"}]}]},{"day":6,"w":"block","ph":"","defs":[{"pos":"n.","m":"一排房屋；街区；大块","ex":[{"l":1,"en":"The hotel is two blocks away.","zh":"那家旅馆有两个街区远。"},{"l":2,"en":"The museum which you are looking for is just three blocks from here, next to the post office.","zh":"你正在找的博物馆离这里只有三个街区，就在邮局旁边。"},{"l":3,"en":"Walk straight on for two blocks, and you will find the old library standing quietly at the corner of the street.","zh":"一直走两个街区，你就会发现那座旧图书馆静静地矗立在街角。"}]},{"pos":"v.","m":"阻止","ex":[{"l":1,"en":"Don't block the door.","zh":"别堵住门口。"},{"l":2,"en":"The heavy truck broke down and blocked the road, which made all the cars stop.","zh":"那辆重型卡车抛锚并堵住了路，这使得所有汽车都停了下来。"},{"l":3,"en":"Whatever you do, never let fear block your way to success, for courage is the key to a brighter future.","zh":"无论你做什么，都不要让恐惧阻挡你通往成功的路，因为勇气是通向更美好未来的钥匙。"}]}]},{"day":6,"w":"blood","ph":"","defs":[{"pos":"n.","m":"血，血液","ex":[{"l":1,"en":"Blood is red.","zh":"血是红色的。"},{"l":2,"en":"The doctor told him that giving blood could save the lives of many sick people.","zh":"医生告诉他，献血可以挽救许多病人的生命。"},{"l":3,"en":"It is said that the blood of those heroes will forever flow in the history of this brave nation.","zh":"据说那些英雄的血液将永远流淌在这个勇敢民族的历史中。"}]}]},{"day":6,"w":"blow","ph":"","defs":[{"pos":"v.","m":"吹；刮风；吹气","ex":[{"l":1,"en":"The wind blows hard.","zh":"风刮得很大。"},{"l":2,"en":"When the north wind begins to blow, leaves fall from the trees and cover the ground.","zh":"当北风开始刮起时，树叶从树上落下，铺满地面。"},{"l":3,"en":"Standing on the top of the hill, I watched the strong wind blow across the open field, carrying the sweet smell of spring.","zh":"站在山顶上，我看着强风吹过空旷的田野，带来了春天甜美的气息。"}]}]},{"day":7,"w":"blue","ph":"","defs":[{"pos":"n.","m":"蓝色","ex":[{"l":1,"en":"Blue is my favorite color.","zh":"蓝色是我最喜欢的颜色。"},{"l":2,"en":"She painted the wall blue because it always reminds her of the clear sky in summer.","zh":"她把墙刷成蓝色，因为这总会让她想起夏天晴朗的天空。"},{"l":3,"en":"Of all the colors in the rainbow, it is blue that brings me a deep sense of peace and quiet.","zh":"在彩虹的所有颜色中，正是蓝色给我带来一种深深的宁静感。"}]},{"pos":"adj.","m":"蓝色的","ex":[{"l":1,"en":"She has blue eyes.","zh":"她有一双蓝色的眼睛。"},{"l":2,"en":"The little girl with blue eyes is the student who won the first prize in the speech contest.","zh":"那个蓝眼睛的小女孩就是那位在演讲比赛中获得一等奖的学生。"},{"l":3,"en":"Lost in thought, she stared at the deep blue sea, wondering what lay beyond the far horizon.","zh":"她陷入沉思，凝视着深蓝色的大海，想象着遥远的地平线之外会有什么。"}]}]},{"day":7,"w":"board","ph":"","defs":[{"pos":"n.","m":"板；木板","ex":[{"l":1,"en":"There is a board on the wall.","zh":"墙上有一块木板。"},{"l":2,"en":"The notice on the board tells us that the school sports meeting will be held next Friday.","zh":"布告栏上的通知告诉我们，学校运动会将于下周五举行。"},{"l":3,"en":"Looking carefully at the old board, he found some words carved by a traveler many years ago.","zh":"仔细看着那块旧木板，他发现了多年前一位旅行者刻下的一些字。"}]},{"pos":"v.","m":"登，上（船、火车、飞机等）","ex":[{"l":1,"en":"We will board the train now.","zh":"我们现在要上火车了。"},{"l":2,"en":"Please make sure that you board the plane before the gate closes.","zh":"请确保在登机口关闭之前登机。"},{"l":3,"en":"Having boarded the ship, the passengers were told that the journey would take longer than expected.","zh":"上了船之后，乘客们被告知这趟旅程将比预期的更长。"}]}]},{"day":7,"w":"boat","ph":"","defs":[{"pos":"n.","m":"小船，小舟","ex":[{"l":1,"en":"Thousands of boats use it every day to transport grain and many other types of cargo.","zh":"每天有成千上万艘船使用它来运输谷物和许多其他种类的货物。"},{"l":2,"en":"We noticed a small boat which was moving slowly toward the bank of the river.","zh":"我们注意到一艘小船正缓缓驶向河岸。"},{"l":3,"en":"Only after the storm passed did the fishermen dare to take their boats out to the deep sea again.","zh":"直到风暴过去之后，渔夫们才敢再次把船开到深海。"}]},{"pos":"v.","m":"划船（游玩）","ex":[{"l":1,"en":"They boated on the lake happily.","zh":"他们在湖上愉快地划船。"},{"l":2,"en":"While we boated on the lake, the gentle wind brought us the sweet songs of birds.","zh":"当我们在湖上划船时，微风给我们带来了鸟儿甜美的歌声。"},{"l":3,"en":"Having boated for two hours, the children finally reached the small island hidden in the middle of the lake.","zh":"划了两个小时船后，孩子们终于到达了隐藏在湖中央的小岛。"}]}]},{"day":7,"w":"body","ph":"","defs":[{"pos":"n.","m":"身体","ex":[{"l":1,"en":"Try to do regular sports.The mind needs exercise as well as the body.","zh":"尽量进行有规律的运动，心灵和身体一样需要锻炼。"},{"l":2,"en":"If you want to keep healthy, you should take care of your body by eating well and sleeping enough.","zh":"如果你想保持健康，就应该通过好好吃饭和充足睡眠来照顾你的身体。"},{"l":3,"en":"It is your body that supports every dream you chase, so never forget to treat it with care and respect.","zh":"正是你的身体支撑着你追逐的每一个梦想，所以永远不要忘记用心呵护它。"}]}]},{"day":7,"w":"boil","ph":"","defs":[{"pos":"v.","m":"沸腾；煮","ex":[{"l":1,"en":"Water boils at 100 degrees.","zh":"水在一百度时沸腾。"},{"l":2,"en":"Mother told me to wait until the water boils before I put the noodles into the pot.","zh":"妈妈告诉我要等水烧开后再把面条放进锅里。"},{"l":3,"en":"Watching the water boil slowly in the pot, the old man smiled at the memory of his childhood in the countryside.","zh":"看着锅里的水慢慢沸腾，老人回想起乡下的童年时光，露出了微笑。"}]}]},{"day":7,"w":"book","ph":"","defs":[{"pos":"n.","m":"书；本子","ex":[{"l":1,"en":"Those are books.","zh":"那些是书。"},{"l":2,"en":"The books which I borrowed from the library last week are all about Chinese history.","zh":"我上周从图书馆借的那些书都是关于中国历史的。"},{"l":3,"en":"Surrounded by thousands of books in the quiet library, she felt as if she had entered a whole new world.","zh":"在安静的图书馆里被成千上万本书包围着，她感觉自己仿佛进入了一个全新的世界。"}]},{"pos":"v.","m":"预订，订（房间、车票、座位等）","ex":[{"l":1,"en":"I will book a room online.","zh":"我将在网上预订一个房间。"},{"l":2,"en":"You had better book the tickets in advance because the concert is very popular.","zh":"你最好提前订票，因为这场音乐会非常受欢迎。"},{"l":3,"en":"Not only did she book the hotel rooms, but she also planned the whole trip for the whole family.","zh":"她不仅预订了旅馆房间，还为全家人安排了整个旅程。"}]}]},{"day":7,"w":"bored","ph":"","defs":[{"pos":"adj.","m":"感到乏味的；厌倦的","ex":[{"l":1,"en":"I feel bored at home.","zh":"我在家感到乏味。"},{"l":2,"en":"The boy became bored with the game because he had played it many times before.","zh":"那个男孩对这款游戏感到厌倦，因为他以前玩过很多次了。"},{"l":3,"en":"Bored with the dull lessons, the students were overjoyed when the teacher finally announced an outdoor activity.","zh":"对枯燥的课程感到厌倦的学生们，当老师终于宣布一项户外活动时欣喜若狂。"}]}]},{"day":7,"w":"boring","ph":"","defs":[{"pos":"adj.","m":"乏味的；无聊的；令人厌烦的","ex":[{"l":1,"en":"The movie is very boring.","zh":"这部电影非常乏味。"},{"l":2,"en":"The film was so boring that many students fell asleep before it ended.","zh":"这部电影太乏味了，以至于许多学生在结束前就睡着了。"},{"l":3,"en":"It is the boring lecture rather than the noisy classroom that makes it hard for me to focus on what the teacher is saying.","zh":"正是那场乏味的讲座，而非嘈杂的教室，让我很难集中注意力听清老师讲的内容。"}]}]},{"day":7,"w":"born","ph":"","defs":[{"pos":"","m":"出生","ex":[{"l":1,"en":"When were you born?","zh":"你什么时候出生的？"},{"l":2,"en":"The famous writer was born in a small village, where she spent most of her childhood.","zh":"这位著名的作家出生在一个小村庄，她在那里度过了大部分童年时光。"},{"l":3,"en":"Born into a poor family, the boy had to work after school to support his dream of becoming a doctor.","zh":"因为出生在贫困家庭，这个男孩不得不放学后打工，以支撑自己成为医生的梦想。"}]}]},{"day":7,"w":"borrow","ph":"","defs":[{"pos":"v.","m":"（向别人）借用；借","ex":[{"l":1,"en":"May I borrow your pen?","zh":"我可以借用你的钢笔吗？"},{"l":2,"en":"I borrowed a few interesting books from the library so that I could read them during the holiday.","zh":"我从图书馆借了几本有趣的书，这样我就可以在假期里读它们了。"},{"l":3,"en":"Only when you borrow knowledge from books and put it into practice can you truly understand the world around you.","zh":"只有当你从书本中汲取知识并付诸实践时，你才能真正理解周围的世界。"}]}]},{"day":7,"w":"boss","ph":"","defs":[{"pos":"n.","m":"老板；首领","ex":[{"l":1,"en":"The boss is very kind to us.","zh":"老板对我们很好。"},{"l":2,"en":"The boss told the workers that they would get a pay rise if they finished the project on time.","zh":"老板告诉工人们，如果他们按时完成项目，就会得到加薪。"},{"l":3,"en":"It was the new boss who encouraged us to share our ideas, which made the whole team work much more happily.","zh":"正是那位新老板鼓励我们分享自己的想法，这让整个团队工作得更愉快了。"}]}]},{"day":7,"w":"both","ph":"","defs":[{"pos":"pron.","m":"两者（都）；双方（都）","ex":[{"l":1,"en":"Yes, I have both your hat and your coat.","zh":"是的，你的帽子和外套我都有。"},{"l":2,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物可以通过物理和化学两种方式来保护自己。"},{"l":3,"en":"Both of the twin sisters dream of becoming scientists, and they often help each other to turn the dream into reality.","zh":"这对双胞胎姐妹都梦想成为科学家，她们经常互相帮助，把梦想变成现实。"}]},{"pos":"adj.","m":"（两）...都；双","ex":[{"l":1,"en":"Yes, I have both your hat and your coat.","zh":"是的，你的帽子和外套我都有。"},{"l":2,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物可以通过物理和化学两种方式来保护自己。"},{"l":3,"en":"Both plans sound reasonable, but we still need to think carefully before making a final decision.","zh":"两个方案听起来都合理，但我们在做最终决定前仍需仔细考虑。"}]},{"pos":"adv.","m":"两个都","ex":[{"l":1,"en":"Yes, I have both your hat and your coat.","zh":"是的，你的帽子和外套我都有。"},{"l":2,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物可以通过物理和化学两种方式来保护自己。"},{"l":3,"en":"The two brothers both love sports, and neither of them would give up the chance to join the school team.","zh":"两兄弟都热爱运动，他们谁也不愿放弃加入校队的机会。"}]}]},{"day":7,"w":"bottle","ph":"","defs":[{"pos":"n.","m":"瓶子","ex":[{"l":1,"en":"The bottle is full of water.","zh":"瓶子里装满了水。"},{"l":2,"en":"Please put the empty bottle on the table after you finish drinking the milk.","zh":"喝完牛奶后，请把空瓶子放在桌子上。"},{"l":3,"en":"What I want to point out is that the bottle on the shelf has been there for years and may no longer be safe to drink.","zh":"我想指出的是，架子上的那个瓶子已经放了多年，可能不再适合饮用了。"}]}]},{"day":7,"w":"bottom","ph":"","defs":[{"pos":"n.","m":"底部","ex":[{"l":1,"en":"The cat is at the bottom of the box.","zh":"猫在盒子的底部。"},{"l":2,"en":"If you look at the bottom of the page carefully, you will find the answer to the question.","zh":"如果你仔细看这一页的底部，就会发现问题的答案。"},{"l":3,"en":"At the bottom of the sea live many strange animals that scientists are still trying hard to study.","zh":"在海底生活着许多奇异的动物，科学家们仍在努力研究它们。"}]}]},{"day":7,"w":"bowl","ph":"","defs":[{"pos":"n.","m":"碗","ex":[{"l":1,"en":"She put the football in the centre of a fruit bowl and praised it.","zh":"她把足球放在水果碗的中央并夸奖了它。"},{"l":2,"en":"Because he misunderstood his Grandma's words 'fruit bowl' as 'football'.","zh":"因为他把奶奶说的水果碗误解成了足球。"},{"l":3,"en":"The wooden bowl that my grandfather gave me reminds me of the warm days I spent with him in the countryside.","zh":"爷爷送给我的那只木碗，让我想起在乡间与他共度的温暖日子。"}]}]},{"day":7,"w":"box","ph":"","defs":[{"pos":"n.","m":"盒子；箱子","ex":[{"l":1,"en":"There is a box on the desk.","zh":"桌子上有一个盒子。"},{"l":2,"en":"The box which was left under the bed turned out to be full of old photos and letters.","zh":"那个被留在床底下的盒子，结果装满了旧照片和信件。"},{"l":3,"en":"Not until I opened the box did I realize that my mother had kept every drawing I made as a child.","zh":"直到打开盒子，我才意识到妈妈一直保留着我小时候画的每一幅画。"}]}]},{"day":7,"w":"boy","ph":"","defs":[{"pos":"n.","m":"男孩","ex":[{"l":1,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"这个中学生能用英语讲中国传统故事吗？"},{"l":2,"en":"The boy started to live in school and learn to manage time by himself.","zh":"这个男孩开始住校，并学着独自管理时间。"},{"l":3,"en":"Such a clever boy is he that the whole class often turns to him whenever they meet a difficult problem.","zh":"他是如此聪明的一个男孩，以至于全班同学每当遇到难题都会向他求助。"}]}]},{"day":7,"w":"brain","ph":"","defs":[{"pos":"n.","m":"脑","ex":[{"l":1,"en":"We use our brain to think.","zh":"我们用大脑思考。"},{"l":2,"en":"Scientists say that the human brain works better when we have enough sleep and healthy food.","zh":"科学家说，当我们有充足的睡眠和健康的食物时，人的大脑工作得更好。"},{"l":3,"en":"What surprises the scientists most is how quickly the brain can learn a new language in childhood.","zh":"最令科学家惊讶的是，大脑在童年时期学习一门新语言的速度有多快。"}]}]},{"day":7,"w":"brave","ph":"","defs":[{"pos":"adj.","m":"勇敢的","ex":[{"l":1,"en":"The brave boy saved the girl.","zh":"这个勇敢的男孩救了那个女孩。"},{"l":2,"en":"The brave fireman rushed into the burning house without thinking of his own safety.","zh":"那位勇敢的消防员没考虑自己的安全，冲进了燃烧的房子。"},{"l":3,"en":"Brave as the little girl was, she still could not help crying when she saw the dark shadow moving towards her.","zh":"尽管小女孩很勇敢，但当她看到黑影朝她移动时，还是忍不住哭了起来。"}]}]},{"day":7,"w":"bread","ph":"","defs":[{"pos":"n.","m":"面包","ex":[{"l":1,"en":"I have some bread for breakfast.","zh":"我早餐吃了一些面包。"},{"l":2,"en":"My mother always prepares fresh bread for me so that I can have a good meal before school.","zh":"妈妈总是为我准备新鲜的面包，这样我就能在上学前好好吃一顿。"},{"l":3,"en":"The smell of warm bread coming from the kitchen reminded me of the mornings I spent with my grandmother.","zh":"厨房里飘来的热面包的香味，让我想起与奶奶共度的那些清晨。"}]}]},{"day":7,"w":"break","ph":"","defs":[{"pos":"v.","m":"打破（断、碎）；损坏；违反","ex":[{"l":1,"en":"I enjoyed the time we shared snacks with each other during the break time.","zh":"我很享受课间我们一起分享零食的时光。"},{"l":2,"en":"Be careful not to break the glass when you carry it to the kitchen after the party.","zh":"聚会后把玻璃杯端到厨房时要小心，别把它打碎了。"},{"l":3,"en":"Whoever breaks the school rules will be asked to write a report explaining why such a mistake was made.","zh":"无论谁违反了校规，都将被要求写一份报告，解释为何犯下这样的错误。"}]},{"pos":"n.","m":"休息；间隙","ex":[{"l":1,"en":"I enjoyed the time we shared snacks with each other during the break time.","zh":"我很享受课间我们一起分享零食的时光。"},{"l":2,"en":"Let us take a short break before we go on with the next lesson, shall we?","zh":"我们在继续下一节课前先休息一会儿，好吗？"},{"l":3,"en":"Only during the summer break do these students have enough time to read the books they have long wanted to read.","zh":"只有在暑假期间，这些学生才有足够的时间读他们一直想读的书。"}]}]},{"day":7,"w":"breakfast","ph":"","defs":[{"pos":"n.","m":"早餐","ex":[{"l":1,"en":"I eat breakfast at seven.","zh":"我七点吃早餐。"},{"l":2,"en":"Doctors believe that eating a healthy breakfast every morning helps students study better in class.","zh":"医生认为每天早上吃一顿健康的早餐有助于学生在课堂上学习得更好。"},{"l":3,"en":"What I really enjoy about weekends is having breakfast slowly with my family instead of rushing to school.","zh":"我真正喜欢的周末，是能和家人慢慢吃早餐，而不是赶着去上学。"}]}]},{"day":7,"w":"breath","ph":"","defs":[{"pos":"n.","m":"呼吸；一口气；气息","ex":[{"l":1,"en":"He took a deep breath.","zh":"他深吸了一口气。"},{"l":2,"en":"After running for a long time, the boy stopped to catch his breath under a big tree.","zh":"跑了很久之后，男孩停在一棵大树下喘口气。"},{"l":3,"en":"Out of breath, the messenger reached the gate and told the guards the news that saved the whole city.","zh":"信使气喘吁吁地跑到城门口，告诉卫兵那条拯救了整座城市的消息。"}]}]},{"day":7,"w":"breathe","ph":"","defs":[{"pos":"v.","m":"呼吸","ex":[{"l":1,"en":"We need to breathe fresh air.","zh":"我们需要呼吸新鲜空气。"},{"l":2,"en":"It is important to plant more trees because they help us breathe cleaner air in the city.","zh":"种更多的树很重要，因为它们能帮助我们在城市里呼吸更清洁的空气。"},{"l":3,"en":"Only when we stop polluting the air will our children be able to breathe freely on a sunny morning.","zh":"只有当我们停止污染空气，我们的孩子才能在一个阳光明媚的早晨自由呼吸。"}]}]},{"day":7,"w":"bridge","ph":"","defs":[{"pos":"n.","m":"桥","ex":[{"l":1,"en":"An old bridge crosses the small river.","zh":"一座古老的桥横跨这条小河。"},{"l":2,"en":"The new bridge which was built last year makes it easy for villagers to cross the river.","zh":"去年新建的那座桥让村民们过河变得容易。"},{"l":3,"en":"Not only does the stone bridge connect the two villages, but it also stands as a symbol of friendship that has lasted for over a hundred years.","zh":"这座石桥不仅连接了两个村庄，而且作为友谊的象征已经屹立了一百多年。"}]}]},{"day":7,"w":"bright","ph":"","defs":[{"pos":"adj.","m":"明亮的；聪明的；灿烂的","ex":[{"l":1,"en":"And every day seems much better and brighter.","zh":"而且每一天似乎都更加美好、更加明亮。"},{"l":2,"en":"Although the morning was cloudy, the bright sun came out in the afternoon and lifted everyone's spirits.","zh":"虽然早晨多云，但下午明媚的阳光出来了，让大家精神振奋。"},{"l":3,"en":"Only when you keep a bright smile on your face will you find that life is full of hope and unexpected surprises.","zh":"只有当你脸上保持灿烂的微笑时，你才会发现生活充满希望与意想不到的惊喜。"}]}]},{"day":7,"w":"bring","ph":"","defs":[{"pos":"v.","m":"拿来，带来","ex":[{"l":1,"en":"In addition, I prefer experiences because they bring people together.","zh":"此外，我更喜欢体验，因为它们能把人们聚在一起。"},{"l":2,"en":"It is my opinion that spending money on experiences brings greater happiness.","zh":"我认为，把钱花在体验上能带来更大的幸福感。"},{"l":3,"en":"What the teacher wants to stress is that reading good books can bring us not only knowledge but also the courage to face difficulties in life.","zh":"老师想要强调的是，阅读好书不仅能给我们带来知识，还能带来面对生活困难的勇气。"}]}]},{"day":7,"w":"Britain","ph":"","defs":[{"pos":"n.","m":"英国","ex":[{"l":1,"en":"My pen pal comes from Britain.","zh":"我的笔友来自英国。"},{"l":2,"en":"When I visited Britain last summer, I learned that people there love drinking tea in the afternoon.","zh":"去年夏天我去英国游玩时，了解到那里的人们喜欢在下午喝茶。"},{"l":3,"en":"Having studied in Britain for two years, she has grown so independent that her parents feel truly proud of her progress.","zh":"在英国学习两年后，她变得如此独立，以至于父母为她的进步感到由衷自豪。"}]}]},{"day":7,"w":"British","ph":"","defs":[{"pos":"adj.","m":"英国的；英国人的","ex":[{"l":1,"en":"He is a famous British writer.","zh":"他是一位著名的英国作家。"},{"l":2,"en":"The British students who visited our school gave us a wonderful talk about their hometown.","zh":"来我校参观的英国学生给我们做了一场关于他们家乡的精彩讲座。"},{"l":3,"en":"It is the British habit of drinking afternoon tea that has spread to many countries around the world.","zh":"正是英国人喝下午茶的习惯传遍了世界上许多国家。"}]}]},{"day":7,"w":"Briton","ph":"","defs":[{"pos":"n.","m":"英国人","ex":[{"l":1,"en":"A young Briton won the race yesterday.","zh":"一位年轻的英国人昨天赢得了比赛。"},{"l":2,"en":"The Briton whom we met at the party told us many interesting stories about London.","zh":"我们在聚会上遇到的那位英国人给我们讲了许多关于伦敦的趣事。"},{"l":3,"en":"Little did we know that the quiet Briton sitting next to us was actually a well-known scientist respected by people all over the world.","zh":"我们一点也不知道，坐在我们旁边那位安静的英国人实际上是一位受全世界人们尊敬的著名科学家。"}]}]},{"day":8,"w":"broadcast","ph":"","defs":[{"pos":"n.","m":"广播节目","ex":[{"l":1,"en":"I listened to the news broadcast this morning.","zh":"我今天早上收听了新闻广播。"},{"l":2,"en":"The radio broadcast which we heard yesterday reported that a heavy snow would hit the city.","zh":"我们昨天听到的广播报道说，一场大雪将袭击这座城市。"},{"l":3,"en":"Not until the broadcast ended did the students realize how serious the weather problem had become.","zh":"直到广播结束，学生们才意识到天气问题已经变得多么严重。"}]}]},{"day":8,"w":"brother","ph":"","defs":[{"pos":"n.","m":"兄；弟","ex":[{"l":1,"en":"Are you John's brother?","zh":"你是约翰的兄弟吗？"},{"l":2,"en":"My elder brother who works in a hospital often tells me interesting stories about his patients.","zh":"我在医院工作的哥哥经常给我讲关于病人的有趣故事。"},{"l":3,"en":"Having made up his mind to become a doctor, my brother studies so hard that he often forgets to have dinner.","zh":"下定决心要当医生后，我哥哥学习如此刻苦，以至于常常忘记吃晚饭。"}]}]},{"day":8,"w":"brown","ph":"","defs":[{"pos":"n.","m":"褐色，棕色","ex":[{"l":1,"en":"She painted the wall a warm brown.","zh":"她把墙刷成了温暖的棕色。"},{"l":2,"en":"The handbag made of brown leather was a birthday gift that I received from my aunt.","zh":"那个棕色皮制的手提包是我从姑姑那里收到的生日礼物。"},{"l":3,"en":"It was the deep brown of her eyes that reminded me of the quiet forest I visited as a child.","zh":"正是她眼睛的深棕色让我想起了小时候参观过的那片宁静的森林。"}]},{"pos":"adj.","m":"褐色的，棕色的","ex":[{"l":1,"en":"He wore a brown coat to school.","zh":"他穿着一件棕色的外套去上学。"},{"l":2,"en":"The brown bear that lives in the forest feeds mainly on fish and wild fruit.","zh":"生活在森林里的那头棕熊主要以鱼和野果为食。"},{"l":3,"en":"Dressed in a brown jacket, the old man looked so warm that nobody could guess he had walked in the snow for hours.","zh":"穿着棕色夹克的老人看起来如此温暖，没人能猜出他已经在雪中走了几个小时。"}]}]},{"day":8,"w":"brush","ph":"","defs":[{"pos":"v.","m":"刷；擦","ex":[{"l":1,"en":"I brush my teeth twice a day.","zh":"我每天刷牙两次。"},{"l":2,"en":"Before going to bed, she always brushes her hair carefully so that it stays smooth and clean.","zh":"睡觉前，她总是仔细地梳理头发，以便保持柔顺干净。"},{"l":3,"en":"Not only does the girl brush her dog every morning, but she also takes it for a long walk along the riverbank.","zh":"这个女孩不仅每天早上给她的狗刷毛，还带它沿着河岸散步很久。"}]},{"pos":"n.","m":"刷子","ex":[{"l":1,"en":"I need a new brush for painting.","zh":"我需要一把新画笔来画画。"},{"l":2,"en":"The brush which my grandfather gave me has been used for more than ten years.","zh":"我爷爷送给我的那把刷子已经用了十多年了。"},{"l":3,"en":"With a small brush in her hand, the little girl painted such a beautiful picture that all the visitors stopped to admire it.","zh":"手里拿着一把小画笔，小女孩画出了如此美丽的一幅画，以至于所有参观者都停下来欣赏。"}]}]},{"day":8,"w":"build","ph":"","defs":[{"pos":"v.","m":"建筑；建造","ex":[{"l":1,"en":"He also told us his story of saving people from a burning building.","zh":"他还给我们讲述了他从燃烧的大楼里救人的故事。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它被建造用来把中国南方富饶农业区的粮食运送到北方的城市。"},{"l":3,"en":"Not only did the workers build the bridge in record time, but they also made sure that it could stand against strong winds and heavy rain.","zh":"工人们不仅以创纪录的速度建成了这座桥，还确保它能抵御狂风暴雨。"}]}]},{"day":8,"w":"building","ph":"","defs":[{"pos":"n.","m":"建筑物；大楼","ex":[{"l":1,"en":"He also told us his story of saving people from a burning building.","zh":"他还给我们讲述了他从燃烧的大楼里救人的故事。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段 一开始，这所学校被要求关闭，大楼也将不得不被出售，因为学校地处一个非常好的位置。"},{"l":3,"en":"Standing in front of the tall building, the boy felt so proud that his father had taken part in designing it years ago.","zh":"站在那栋高楼前，男孩感到非常自豪，因为他的父亲几年前曾参与设计它。"}]}]},{"day":8,"w":"bund","ph":"","defs":[{"pos":"n.","m":"外滩","ex":[{"l":1,"en":"We took many photos on the Bund.","zh":"我们在外滩拍了许多照片。"},{"l":2,"en":"When night falls, the Bund becomes one of the most beautiful places that tourists must visit in Shanghai.","zh":"夜幕降临时，外滩成为游客在上海必游的最美丽的地方之一。"},{"l":3,"en":"Only by walking along the Bund at sunset can you fully understand why so many people fall in love with this city.","zh":"只有在日落时分沿着外滩漫步，你才能完全理解为什么这么多人爱上这座城市。"}]}]},{"day":8,"w":"burn","ph":"","defs":[{"pos":"v.","m":"燃烧；着火；使烧焦","ex":[{"l":1,"en":"He also told us his story of saving people from a burning building.","zh":"他还给我们讲述了他从燃烧的大楼里救人的故事。"},{"l":2,"en":"Dry wood burns easily, so we must keep it away from the fire to stay safe.","zh":"干木头很容易燃烧，所以我们必须让它远离火源以确保安全。"},{"l":3,"en":"So fiercely did the forest fire burn that hundreds of firefighters had to work through the night to bring it under control.","zh":"森林大火燃烧得如此猛烈，以至于数百名消防员不得不彻夜工作才将其控制住。"}]}]},{"day":8,"w":"bus","ph":"","defs":[{"pos":"n.","m":"公共汽车","ex":[{"l":1,"en":"I go to school by bus every day.","zh":"我每天乘公共汽车上学。"},{"l":2,"en":"The bus which I take every morning is always crowded with students and office workers.","zh":"我每天早上乘坐的公共汽车总是挤满了学生和上班族。"},{"l":3,"en":"Not until the bus stopped did the old man realize that he had left his bag on the seat next to him.","zh":"直到公共汽车停下，老人才意识到自己把包落在了旁边的座位上。"}]}]},{"day":8,"w":"business","ph":"","defs":[{"pos":"n.","m":"生意；事业；商业","ex":[{"l":1,"en":"His father runs a small business.","zh":"他父亲经营一家小生意。"},{"l":2,"en":"Doing business with foreign companies requires not only good English but also a clear understanding of different cultures.","zh":"与外国公司做生意不仅需要良好的英语，还需要对不同文化有清楚的了解。"},{"l":3,"en":"It is honesty and hard work that lay the firm foundation for any successful business in the long run.","zh":"从长远来看，正是诚实与勤劳为任何成功的生意奠定了坚实的基础。"}]}]},{"day":8,"w":"businessman","ph":"","defs":[{"pos":"n.","m":"商人","ex":[{"l":1,"en":"The businessman signed a big contract.","zh":"这位商人签下了一份大合同。"},{"l":2,"en":"The businessman whom we interviewed last week started his own company when he was only twenty.","zh":"我们上周采访的那位商人在他只有二十岁时就创办了自己的公司。"},{"l":3,"en":"Having failed several times, the young businessman did not give up; instead, he worked even harder until his dream came true.","zh":"失败了几次之后，这位年轻的商人没有放弃；相反，他更加努力地工作，直到梦想成真。"}]}]},{"day":8,"w":"busy","ph":"","defs":[{"pos":"adj.","m":"忙碌的","ex":[{"l":1,"en":"Sometimes my father's job makes me feel unhappy and lonely because he's always very busy.","zh":"有时候父亲的工作让我感到不开心和孤独，因为他总是非常忙碌。"},{"l":2,"en":"After his amazing talk, I understand why my father is busy.","zh":"在他精彩的演讲之后，我明白了父亲为什么忙碌。"},{"l":3,"en":"Busy as he is with his work, my father never forgets to call me every evening to ask about my day at school.","zh":"尽管工作繁忙，父亲从不忘每天晚上给我打电话，询问我在学校的一天。"}]}]},{"day":8,"w":"but","ph":"","defs":[{"pos":"conj.","m":"但是","ex":[{"l":1,"en":"He already has a phonograph, but he doesn't have a radio yet.","zh":"他已经有一台留声机了，但是他还没有收音机。"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次研学旅行中遇到了一些青少年，现在我仍和他们保持联系，但我几乎不记得旅途中买了什么。"},{"l":3,"en":"I had planned to join the school band this term, but to my surprise, I found that practicing the drum every evening was much harder than I had expected.","zh":"我本打算这学期加入学校乐队，但令我惊讶的是，我发现每天傍晚练习鼓比预期的要难得多。"}]}]},{"day":8,"w":"butter","ph":"","defs":[{"pos":"n.","m":"黄油","ex":[{"l":1,"en":"I would like some butter on my bread.","zh":"我想在面包上抹些黄油。"},{"l":2,"en":"Mother told me that the butter we bought yesterday had gone bad because we forgot to put it in the fridge.","zh":"妈妈告诉我，我们昨天买的黄油已经变质了，因为我们忘记放进冰箱了。"},{"l":3,"en":"When the butter finally melted in the warm pan, the whole kitchen was filled with a sweet smell that reminded me of my grandmother's cooking.","zh":"当黄油最终在温热的平底锅里融化时，整个厨房充满了香甜的气味，让我想起了祖母做的饭菜。"}]}]},{"day":8,"w":"butterfly","ph":"","defs":[{"pos":"n.","m":"蝴蝶","ex":[{"l":1,"en":"A butterfly is flying among the flowers.","zh":"一只蝴蝶正在花丛中飞舞。"},{"l":2,"en":"The children watched the butterfly until it flew away, which made them feel a little sad.","zh":"孩子们一直注视着那只蝴蝶，直到它飞走，这让他们有点难过。"},{"l":3,"en":"Only when the warm spring comes will the colorful butterfly appear in the garden, dancing from flower to flower in the gentle wind.","zh":"只有当温暖的春天到来时，色彩斑斓的蝴蝶才会出现在花园里，在微风中从一朵花飞向另一朵花。"}]}]},{"day":8,"w":"button","ph":"","defs":[{"pos":"n.","m":"纽扣；（电铃等的）按钮","ex":[{"l":1,"en":"Please press this button to start the machine.","zh":"请按这个按钮启动机器。"},{"l":2,"en":"If you want to call the lift, you must press the button on the wall next to the door.","zh":"如果你想叫电梯，你必须按门旁边墙上的按钮。"},{"l":3,"en":"She was so nervous before the speech that her finger kept pressing the button of her pen again and again, not knowing what to say first.","zh":"演讲前她紧张极了，手指一次又一次地按着钢笔的按钮（笔端），不知该先说什么。"}]}]},{"day":8,"w":"buy","ph":"","defs":[{"pos":"v.","m":"买","ex":[{"l":1,"en":"We are not the result of the things we've bought.","zh":"我们不是我们所买东西的产物。"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次研学旅行中遇到了一些青少年，现在我仍和他们保持联系，但我几乎不记得旅途中买了什么。"},{"l":3,"en":"Having saved money for half a year, the girl finally bought the dictionary she had long dreamed of, and it was this book that helped her fall in love with English.","zh":"攒了半年的钱后，女孩终于买到了她梦寐以求的词典，正是这本书帮助她爱上了英语。"}]}]},{"day":8,"w":"by","ph":"","defs":[{"pos":"prep.","m":"靠近；在..旁边；在..时间；不迟于；（用于被动语态）被；（表示手段、方法）用；由；（用交通工具等）乘（车）","ex":[{"l":1,"en":"After David planted the tree by himself, he felt pleased.","zh":"大卫自己种下那棵树之后，他感到很高兴。"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English. Louise has many Chinese friends. They communicate by computer.","zh":"路易斯现在十三岁，目前在学习汉语，汉语已经成为和英语一样重要的世界语言。路易斯有许多中国朋友，他们通过电脑进行交流。"},{"l":3,"en":"By the time we arrived at the station, the last train had already left, leaving us no choice but to spend the night at a small hotel nearby.","zh":"当我们到达车站时，末班火车已经开走了，我们别无选择，只能在附近的一家小旅馆过夜。"}]}]},{"day":8,"w":"bye","ph":"","defs":[{"pos":"int.","m":"再见","ex":[{"l":1,"en":"Bye, see you tomorrow at school.","zh":"再见，明天学校见。"},{"l":2,"en":"After saying bye to his friends, he walked into the station and waited for the train to come.","zh":"和朋友们道别之后，他走进车站，等待火车到来。"},{"l":3,"en":"Waving his hand and shouting bye to his parents, the boy stepped onto the train, not knowing that this journey would change his whole life.","zh":"男孩挥着手向父母喊着再见，踏上了火车，他并不知道这次旅程将改变他的一生。"}]}]},{"day":8,"w":"cabbage","ph":"","defs":[{"pos":"n.","m":"卷心菜","ex":[{"l":1,"en":"My mother bought a green cabbage in the market.","zh":"我妈妈在市场上买了一颗绿色的卷心菜。"},{"l":2,"en":"The cabbage in the garden has grown very well because my grandfather waters it every morning.","zh":"菜园里的卷心菜长得很好，因为我爷爷每天早上都给它浇水。"},{"l":3,"en":"Not only is the cabbage cheap in winter, but it also keeps fresh for a long time, which makes it a popular vegetable in northern families.","zh":"冬天的卷心菜不仅便宜，而且能保鲜很久，这使它成为北方家庭中受欢迎的蔬菜。"}]}]},{"day":8,"w":"cafe","ph":"","defs":[{"pos":"n.","m":"咖啡馆","ex":[{"l":1,"en":"We met at a small cafe near the park.","zh":"我们在公园附近的一家小咖啡馆见面。"},{"l":2,"en":"The cafe where we used to do our homework has been turned into a bookshop, which makes me feel a bit sorry.","zh":"我们过去常去写作业的那家咖啡馆已经变成了一家书店，这让我觉得有点可惜。"},{"l":3,"en":"Sitting quietly in the corner of the cafe, the old man read the letter again and again, tears slowly rolling down his face.","zh":"老人静静地坐在咖啡馆的角落里，一遍又一遍地读着那封信，泪水慢慢滑落脸庞。"}]}]},{"day":8,"w":"cake","ph":"","defs":[{"pos":"n.","m":"蛋糕；糕点；饼","ex":[{"l":1,"en":"She made a birthday cake for her mother.","zh":"她为妈妈做了一个生日蛋糕。"},{"l":2,"en":"The cake that my sister baked this morning smells so nice that everyone in the house wants to taste it.","zh":"我姐姐今早烤的蛋糕闻起来太香了，家里每个人都想尝一尝。"},{"l":3,"en":"It was the chocolate cake that the kind lady gave me on that cold rainy day, a small gift that I will never forget.","zh":"正是那个寒冷的雨天里那位善良女士给我的巧克力蛋糕，这份小小的礼物我永远不会忘记。"}]}]},{"day":8,"w":"call","ph":"","defs":[{"pos":"v.","m":"打电话给...；称呼；取；呼唤；喊；叫","ex":[{"l":1,"en":"Cartographers, also called mapmakers, study and interpret geographic information.","zh":"制图师，也被称为地图绘制者，研究和解释地理信息。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番之后，我了解到，负责绘制世界各地道路、山脉、海洋和其他地点的人被称为制图师。"},{"l":3,"en":"Realizing that nobody could hear him, the boy had to call for help as loudly as possible, hoping that someone passing by would notice him.","zh":"意识到没人能听见他，男孩只好尽可能大声地呼救，希望路过的某人能注意到他。"}]},{"pos":"n.","m":"喊；叫；电话；通话","ex":[{"l":1,"en":"I will give you a call this evening.","zh":"我今晚会给你打个电话。"},{"l":2,"en":"When I received the call from my teacher, I knew that something important must have happened at school.","zh":"当我接到老师的电话时，我知道学校里一定发生了什么重要的事。"},{"l":3,"en":"It was the phone call from his old friend that changed his mind, making him decide to return to the city he had left ten years before.","zh":"正是老朋友的那通电话改变了他的想法，让他决定回到他十年前离开的那座城市。"}]}]},{"day":8,"w":"calm","ph":"","defs":[{"pos":"adj.","m":"镇静的；沉着的","ex":[{"l":1,"en":"Please keep calm in an earthquake.","zh":"地震时请保持镇静。"},{"l":2,"en":"Although the situation was dangerous, the pilot remained calm and finally landed the plane safely.","zh":"虽然形势很危险，这位飞行员依然保持镇静，最终使飞机安全着陆。"},{"l":3,"en":"No matter how noisy the classroom became, the teacher stayed calm, waiting quietly for the students to notice her presence.","zh":"无论教室变得多么吵闹，老师始终沉着冷静，静静地等待学生们注意到她的到来。"}]},{"pos":"v.","m":"使平静；安静","ex":[{"l":1,"en":"The mother tried to calm her crying baby.","zh":"妈妈试图让她哭闹的宝宝平静下来。"},{"l":2,"en":"The teacher spoke softly to calm the students who were worried about the coming exam.","zh":"老师轻声说话，让那些为即将到来的考试担忧的学生平静下来。"},{"l":3,"en":"To calm the frightened child, the doctor told him a funny story, which soon made him forget all about the pain in his arm.","zh":"为了让受惊的孩子平静下来，医生给他讲了一个有趣的故事，这很快让他忘记了胳膊上的疼痛。"}]}]},{"day":8,"w":"camera","ph":"","defs":[{"pos":"n.","m":"照相机","ex":[{"l":1,"en":"He bought a new camera last week.","zh":"他上周买了一台新照相机。"},{"l":2,"en":"The camera that my uncle gave me on my birthday works so well that I take it wherever I travel.","zh":"我叔叔在我生日时送我的照相机非常好用，我旅行时走到哪都带着它。"},{"l":3,"en":"Armed with nothing but an old camera, the young reporter recorded everything he saw, hoping to show the world the real life of the village.","zh":"这位年轻记者只带着一台旧照相机，记录下了他所看到的一切，希望能向世界展示村庄的真实生活。"}]}]},{"day":8,"w":"camp","ph":"","defs":[{"pos":"n.","m":"（夏令）营；野营","ex":[{"l":1,"en":"The children had a good time at summer camp.","zh":"孩子们在夏令营过得很愉快。"},{"l":2,"en":"The summer camp where I made many new friends last year will open again next month, which makes me very excited.","zh":"我去年在那里交了许多新朋友的夏令营下个月又要开营了，这让我非常兴奋。"},{"l":3,"en":"Looking back on those days at camp, I realize that it was there that I learned how to get along with others and how to face difficulties bravely.","zh":"回想起在营地度过的那些日子，我意识到正是在那里，我学会了如何与人相处，以及如何勇敢地面对困难。"}]}]},{"day":8,"w":"can","ph":"","defs":[{"pos":"v.","m":"可能；能够；可以；会","ex":[{"l":1,"en":"No, I can't.","zh":"不，我不会。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应该尽可能多地学习地理知识。"},{"l":3,"en":"Only by practicing every day can you learn a foreign language well, no matter how hard it seems at the very beginning.","zh":"只有每天练习才能学好一门外语，无论它在最初看起来有多难。"}]},{"pos":"n.","m":"（美）罐头；罐子","ex":[{"l":1,"en":"No, I can't.","zh":"不，我不会。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应该尽可能多地学习地理知识。"},{"l":3,"en":"The old man picked up a can from the shelf, opened it carefully, and shared the food inside with the hungry dog at his feet.","zh":"老人从架子上拿起一个罐头，小心翼翼地打开，把里面的食物分给脚边那只饥饿的狗。"}]}]},{"day":8,"w":"Canada","ph":"","defs":[{"pos":"n.","m":"加拿大","ex":[{"l":1,"en":"Canada is a very large country.","zh":"加拿大是一个很大的国家。"},{"l":2,"en":"Canada, which is famous for its beautiful mountains and lakes, attracts millions of tourists from all over the world every year.","zh":"加拿大以其美丽的山脉和湖泊而闻名，每年吸引着来自世界各地的数百万游客。"},{"l":3,"en":"Having dreamed of visiting Canada since childhood, the girl finally set off last summer, carrying only a small bag full of hope and curiosity.","zh":"从小就梦想着去加拿大，这个女孩终于在去年夏天出发了，只带着一个装满希望与好奇心的小包。"}]}]},{"day":8,"w":"Canadian","ph":"","defs":[{"pos":"adj.","m":"加拿大的；加拿大人的","ex":[{"l":1,"en":"He is a famous Canadian singer.","zh":"他是一位著名的加拿大歌手。"},{"l":2,"en":"The Canadian team that we played against last week was so strong that we lost the game in the end.","zh":"我们上周对阵的加拿大队实力太强，我们最终输掉了比赛。"},{"l":3,"en":"What impressed me most during the trip was not the Canadian scenery, but the warmth of the people I met along the way.","zh":"旅途中给我印象最深的不是加拿大的风景，而是一路上遇到的人们的热情。"}]},{"pos":"n.","m":"加拿大人","ex":[{"l":1,"en":"A Canadian is a person from Canada.","zh":"加拿大人就是来自加拿大的人。"},{"l":2,"en":"The Canadian who sat next to me on the plane told me many interesting stories about his country.","zh":"在飞机上坐在我旁边的那位加拿大人给我讲了许多关于他国家的有趣故事。"},{"l":3,"en":"Not only is the Canadian proud of his hometown, but he also hopes that more tourists will visit the beautiful land where he grew up.","zh":"这位加拿大人不仅为家乡感到自豪，还希望更多的游客能去他生长的那片美丽土地看看。"}]}]},{"day":8,"w":"cancel","ph":"","defs":[{"pos":"v.","m":"取消","ex":[{"l":1,"en":"They cancel the meeting because of the rain.","zh":"因为下雨，他们取消了会议。"},{"l":2,"en":"The school decided to cancel the sports meeting since the heavy rain had made the playground too wet to use.","zh":"学校决定取消运动会，因为大雨把操场弄得太过湿滑，无法使用。"},{"l":3,"en":"Had the airline informed us earlier, we would not have waited at the airport for hours before they finally cancelled the flight.","zh":"要是航空公司早点通知我们，我们就不必在机场苦等数小时，直到他们最终取消航班。"}]}]},{"day":9,"w":"capital","ph":"","defs":[{"pos":"n.","m":"首都","ex":[{"l":1,"en":"Beijing is the capital of China.","zh":"北京是中国的首都。"},{"l":2,"en":"As the capital of France, Paris attracts millions of visitors who want to see the Eiffel Tower every year.","zh":"作为法国的首都，巴黎每年吸引数百万想参观埃菲尔铁塔的游客。"},{"l":3,"en":"It is in this ancient capital that emperors once lived, and today it still keeps so many buildings that tell the history of the country.","zh":"正是在这座古都，昔日的帝王曾居住于此；如今它仍保留着众多诉说着这个国家历史的建筑。"}]}]},{"day":9,"w":"captain","ph":"","defs":[{"pos":"n.","m":"队长；船长","ex":[{"l":1,"en":"Our captain is a tall boy.","zh":"我们的队长是个高个子男孩。"},{"l":2,"en":"The captain of our basketball team always encourages us to do our best, even when we are losing the game.","zh":"我们的篮球队长总是鼓励我们尽力而为，即使在我们比赛落后的时候。"},{"l":3,"en":"Only when the captain remains calm in danger can the whole team follow his lead and find a way out of the difficulty.","zh":"只有当队长在危险中保持冷静时，全队才能跟随他的带领，找到摆脱困境的办法。"}]}]},{"day":9,"w":"car","ph":"","defs":[{"pos":"n.","m":"小汽车","ex":[{"l":1,"en":"Before we started on our road trip, we packed up the car with snacks, water, and music.","zh":"出发自驾游之前，我们把零食、水和音乐都塞进了车里。"},{"l":2,"en":"The new car which my father bought last week runs so quietly that we can hardly hear its engine on the road.","zh":"我爸爸上周买的那辆新车跑起来非常安静，在路上我们几乎听不到它的发动机声。"},{"l":3,"en":"It was the small red car that saved us from the heavy rain, allowing us to reach the village before it got dark.","zh":"正是那辆红色的小汽车让我们躲过了大雨，使我们赶在天黑之前抵达了村庄。"}]}]},{"day":9,"w":"card","ph":"","defs":[{"pos":"n.","m":"卡片","ex":[{"l":1,"en":"I got a birthday card from my friend.","zh":"我收到了朋友寄来的生日贺卡。"},{"l":2,"en":"She sent me a beautiful card with her best wishes written on the back, which made me feel really warm.","zh":"她给我寄了一张漂亮的卡片，背面写着她最美好的祝福，这让我感到十分温暖。"},{"l":3,"en":"The card that my grandmother made by hand means far more to me than any expensive gift I have ever received.","zh":"奶奶亲手制作的那张卡片对我来说，远比我收到过的任何昂贵礼物都更有意义。"}]}]},{"day":9,"w":"care","ph":"","defs":[{"pos":"n.","m":"照料，保护；小心","ex":[{"l":1,"en":"Take care when you cross the street.","zh":"过马路时要小心。"},{"l":2,"en":"The nurses in this hospital take good care of the patients so that they can get well soon.","zh":"这家医院的护士把病人照顾得很好，好让他们尽快康复。"},{"l":3,"en":"With great care and patience, the old teacher helped every child in the village learn to read and write.","zh":"怀着极大的细心和耐心，这位老教师帮助村里的每个孩子学会了读书和写字。"}]},{"pos":"v.","m":"介意；在乎；关心","ex":[{"l":1,"en":"I do not care about the price.","zh":"我不在乎价格。"},{"l":2,"en":"Even though nobody seemed to care about his idea, he still kept working on his invention day and night.","zh":"即使似乎没有人在乎他的想法，他仍然日夜不停地研究他的发明。"},{"l":3,"en":"It is wrong to think that adults do not care what young people really need in their daily lives.","zh":"认为成年人不关心年轻人在日常生活中真正需要什么，这种想法是错误的。"}]}]},{"day":9,"w":"careful","ph":"","defs":[{"pos":"adj.","m":"小心的；仔细的","ex":[{"l":1,"en":"Be careful with the hot water.","zh":"小心热水。"},{"l":2,"en":"A careful student always checks his answers before he hands in the exam paper to the teacher.","zh":"细心的学生总是在把试卷交给老师之前检查自己的答案。"},{"l":3,"en":"Careful as she was, she still made a few small mistakes that cost her the first prize in the competition.","zh":"尽管她十分细心，她还是犯了几个小错误，使她错失了比赛的一等奖。"}]}]},{"day":9,"w":"carefully","ph":"","defs":[{"pos":"adv.","m":"小心地；仔细地","ex":[{"l":1,"en":"Please listen carefully in class.","zh":"请在课堂上认真听讲。"},{"l":2,"en":"The teacher spoke slowly and carefully so that every student could understand the difficult problem.","zh":"老师说得很慢很仔细，以便每个学生都能理解这道难题。"},{"l":3,"en":"Only by reading the instructions carefully can we avoid making mistakes when we use the new machine for the first time.","zh":"只有认真阅读说明，我们才能在第一次使用这台新机器时避免犯错。"}]}]},{"day":9,"w":"careless","ph":"","defs":[{"pos":"adj.","m":"粗心的","ex":[{"l":1,"en":"A careless driver is dangerous.","zh":"粗心的司机很危险。"},{"l":2,"en":"Because he was careless, he left his schoolbag on the bus and had to buy a new one the next day.","zh":"因为粗心，他把书包落在了公交车上，第二天只好买了个新的。"},{"l":3,"en":"It was his careless words that hurt his best friend, and he deeply regretted what he had said that evening.","zh":"正是他那些粗心的话伤害了他最好的朋友，那天晚上说的话让他深感后悔。"}]}]},{"day":9,"w":"carrot","ph":"","defs":[{"pos":"n.","m":"胡萝卜","ex":[{"l":1,"en":"Rabbits love to eat carrots.","zh":"兔子爱吃胡萝卜。"},{"l":2,"en":"My mother often puts some carrots in the soup because she believes they are good for our eyes.","zh":"我妈妈常在汤里放些胡萝卜，因为她认为胡萝卜对眼睛有益。"},{"l":3,"en":"The carrots that we grew in our small garden taste much sweeter than the ones sold in the supermarket.","zh":"我们在自家小菜园里种的胡萝卜，吃起来比超市里卖的甜得多。"}]}]},{"day":9,"w":"carry","ph":"","defs":[{"pos":"v.","m":"拿，搬，提，抬，背，抱；携带；运送","ex":[{"l":1,"en":"You carry them in your mind just like those stones in bags.","zh":"你把它们记在心里，就像把那些石头装在袋子里一样。"},{"l":2,"en":"The canal will carry millions of liters of water from the south to the north.","zh":"这条运河将把数百万升的水从南方输送到北方。"},{"l":3,"en":"Strong bridges are built to carry not only cars and people but also the hopes that connect two cities into one big family.","zh":"坚固的桥梁不仅承载着汽车和行人，更承载着把两座城市连成一个大家庭的希望。"}]}]},{"day":9,"w":"cartoon","ph":"","defs":[{"pos":"n.","m":"动画片；卡通；漫画","ex":[{"l":1,"en":"My brother likes watching cartoons.","zh":"我弟弟喜欢看动画片。"},{"l":2,"en":"When I was a little child, I loved the cartoon which told a story about a brave mouse and its friends.","zh":"我小时候很喜欢那部动画片，它讲的是一只勇敢的老鼠和它的朋友们的故事。"},{"l":3,"en":"It is no surprise that this cartoon has won the hearts of children all over the world, for its story is both funny and touching.","zh":"这部动画片赢得了全世界孩子的心并不令人意外，因为它的故事既有趣又感人。"}]}]},{"day":9,"w":"case","ph":"","defs":[{"pos":"n.","m":"情况；案件；箱；盒","ex":[{"l":1,"en":"That is not the case here.","zh":"这里的情况并非如此。"},{"l":2,"en":"In that case, you had better ask your teacher for help before you make the final decision.","zh":"在那种情况下，你最好在做最后决定之前向老师求助。"},{"l":3,"en":"If that is really the case, we will have to change our plan and find another way to solve the problem.","zh":"如果情况确实如此，我们将不得不改变计划，另寻解决问题的办法。"}]}]},{"day":9,"w":"cat","ph":"","defs":[{"pos":"n.","m":"猫","ex":[{"l":1,"en":"The cat is sleeping on the sofa.","zh":"猫正在沙发上睡觉。"},{"l":2,"en":"The little cat which I found in the street last month has become the most popular pet in my family.","zh":"我上个月在街上发现的那只小猫，如今成了我家最受欢迎的宠物。"},{"l":3,"en":"Only when the cat is sure that there is no danger around will it come out of the box to play with the children.","zh":"只有当猫确信周围没有危险时，它才会从盒子里出来和孩子们玩耍。"}]}]},{"day":9,"w":"catch","ph":"","defs":[{"pos":"v.","m":"接住；捉住；赶上（车辆等）；染上（疾病等）；弄清楚；领会；理解","ex":[{"l":1,"en":"Can you catch the ball?","zh":"你能接住球吗？"},{"l":2,"en":"He ran so fast that he managed to catch the last bus, although it was already leaving the station.","zh":"他跑得飞快，赶上了末班车，尽管车当时已经驶离了车站。"},{"l":3,"en":"It was the heavy rain that made so many students catch a cold last week, and the teacher told them to drink more hot water.","zh":"正是上周那场大雨让许多学生感冒了，老师叮嘱他们多喝热水。"}]}]},{"day":9,"w":"cause","ph":"","defs":[{"pos":"n.","m":"原因，起因","ex":[{"l":1,"en":"Some plants produce chemicals that taste bitter or cause an unpleasant reaction.","zh":"有些植物会产生尝起来发苦的化学物质，或引起令人不适的反应。"},{"l":2,"en":"The police are still looking into the cause of the fire, which destroyed three houses in the village last night.","zh":"警方仍在调查那场火灾的起因，昨晚的火灾烧毁了村里的三栋房子。"},{"l":3,"en":"What we must do first is to find out the real cause of the problem instead of blaming each other for the mistake.","zh":"我们首先要做的是查明问题的真正原因，而不是为这个错误互相指责。"}]},{"pos":"v.","m":"促使；引起，使发生","ex":[{"l":1,"en":"Some plants produce chemicals that taste bitter or cause an unpleasant reaction.","zh":"有些植物会产生尝起来发苦的化学物质，或引起令人不适的反应。"},{"l":2,"en":"Smoking can cause serious health problems, so doctors always advise people to give up the bad habit as soon as possible.","zh":"吸烟会引起严重的健康问题，因此医生总是建议人们尽早戒掉这个坏习惯。"},{"l":3,"en":"It is heavy traffic that often causes students to be late for school, especially on rainy Monday mornings.","zh":"正是拥堵的交通常常导致学生上学迟到，尤其是在下雨的周一早晨。"}]}]},{"day":9,"w":"cave","ph":"","defs":[{"pos":"n.","m":"洞，穴；地窖","ex":[{"l":1,"en":"The bear sleeps in a cave.","zh":"熊在洞穴里睡觉。"},{"l":2,"en":"The explorers found a deep cave where ancient people had left drawings of animals on the walls.","zh":"探险者发现了一个深洞，古人在洞壁上留下了动物的图画。"},{"l":3,"en":"Hidden in the mountain for thousands of years, the cave was finally discovered by a group of children who were looking for their lost dog.","zh":"这座深藏在山中的洞穴历经千年，最终被一群寻找走失小狗的孩子发现了。"}]}]},{"day":9,"w":"celebrate","ph":"","defs":[{"pos":"v.","m":"庆祝","ex":[{"l":1,"en":"We will celebrate my mother's birthday at home.","zh":"我们将在家为妈妈庆祝生日。"},{"l":2,"en":"When the whole family got together to celebrate the Spring Festival, everyone felt really happy.","zh":"当全家人聚在一起庆祝春节时，每个人都感到非常幸福。"},{"l":3,"en":"Not only did the whole town gather to celebrate the team's victory, but they also held a parade that lasted for hours.","zh":"全镇人不仅聚在一起庆祝球队的胜利，还举行了持续数小时的游行。"}]}]},{"day":9,"w":"cent","ph":"","defs":[{"pos":"n.","m":"美分","ex":[{"l":1,"en":"This pen costs fifty cents.","zh":"这支钢笔花了五十美分。"},{"l":2,"en":"The little boy saved every cent he could so that he would buy a new bike for his brother.","zh":"小男孩尽可能攒下每一美分，以便给弟弟买一辆新自行车。"},{"l":3,"en":"What surprised me most was that the kind old lady gave away every last cent she had to help the poor children in the village.","zh":"最让我惊讶的是，那位善良的老妇人把身上最后一美分都捐了出来，去帮助村里贫困的孩子们。"}]}]},{"day":9,"w":"centre","ph":"","defs":[{"pos":"n.","m":"中心；中央","ex":[{"l":1,"en":"She put the football in the centre of a fruit bowl and praised it.","zh":"她把那个足球放在水果碗的正中央，并对它大加赞赏。"},{"l":2,"en":"The new shopping mall, which lies in the centre of the city, has become the most popular place for young people.","zh":"位于市中心的那家新购物中心已成为年轻人最喜欢的去处。"},{"l":3,"en":"Located right in the centre of the old town, the museum attracts thousands of visitors who are interested in local history.","zh":"坐落在古镇正中央的这座博物馆，吸引了成千上万对当地历史感兴趣的游客。"}]}]},{"day":9,"w":"century","ph":"","defs":[{"pos":"n.","m":"世纪；百年","ex":[{"l":1,"en":"What do you know about the tenth century?","zh":"关于第十个世纪，你了解些什么？"},{"l":2,"en":"Many great inventions that appeared in the last century have completely changed the way we live today.","zh":"上个世纪出现的许多伟大发明，已经彻底改变了我们今天的生活方式。"},{"l":3,"en":"It is hard to imagine how people communicated across the world a century ago, when neither telephones nor the Internet existed.","zh":"很难想象一个世纪前，在既没有电话也没有互联网的情况下，人们是如何在全世界范围内交流的。"}]}]},{"day":9,"w":"certainly","ph":"","defs":[{"pos":"adv.","m":"当然；是的；一定；无疑地","ex":[{"l":1,"en":"Plants certainly cannot run away, and they have no teeth or claws.","zh":"植物当然不能跑开，它们也没有牙齿或爪子。"},{"l":2,"en":"For example, getting expensive clothes didn't change me as a person, but the camping trip last summer certainly did.","zh":"例如，买昂贵的衣服并没有改变我这个人，但去年夏天的露营旅行却真的改变了我。"},{"l":3,"en":"You will certainly regret it in the future if you give up the chance to study abroad that you have worked so hard for.","zh":"如果你放弃了自己努力争取到的出国留学的机会，将来一定会为此后悔。"}]}]},{"day":9,"w":"chain","ph":"","defs":[{"pos":"n.","m":"链；链条；连锁店","ex":[{"l":1,"en":"She wore a gold chain around her neck.","zh":"她脖子上戴着一条金链子。"},{"l":2,"en":"The fast food chain that opened last month has already become popular among students who like quick meals.","zh":"上个月开业的那家快餐连锁店，已经在喜欢快餐的学生中流行起来。"},{"l":3,"en":"A single small mistake in a long chain of decisions may lead to a result that nobody expected at the beginning.","zh":"在一长串决策链条中，一个细小的失误就可能导致起初谁都没有预料到的结果。"}]}]},{"day":9,"w":"chair","ph":"","defs":[{"pos":"n.","m":"椅子","ex":[{"l":1,"en":"Please sit on this chair and wait a moment.","zh":"请坐在这把椅子上等一会儿。"},{"l":2,"en":"The old chair that has stood in the corner for years was finally repaired by my father last weekend.","zh":"那把在角落里放了多年的旧椅子，上周末终于被我爸爸修好了。"},{"l":3,"en":"Tired after a long day of work, she sank into the soft chair and refused to move until she had finished her tea.","zh":"工作了一整天后疲惫不堪，她瘫软在柔软的椅子里，直到喝完茶都不肯动弹。"}]}]},{"day":9,"w":"challenge","ph":"","defs":[{"pos":"n.&v.","m":"挑战；质疑","ex":[{"l":1,"en":"Climbing the mountain is a great challenge for us.","zh":"爬这座山对我们来说是一个巨大的挑战。"},{"l":2,"en":"Although the new job was a real challenge for him, he decided to accept it and try his best.","zh":"虽然新工作对他来说是个真正的挑战，他还是决定接受并全力以赴。"},{"l":3,"en":"Facing such a difficult challenge, the young player did not give up but trained even harder than before.","zh":"面对如此艰难的挑战，这位年轻选手没有放弃，而是比以前训练得更加刻苦。"}]}]},{"day":9,"w":"chance","ph":"","defs":[{"pos":"n.","m":"机会","ex":[{"l":1,"en":"No matter how many difficulties we came across, we considered them as chances for us to improve.","zh":"无论我们遇到多少困难，我们都把它们视为提升自己的机会。"},{"l":2,"en":"If you really want to learn English well, you should catch every chance to practise speaking with foreigners.","zh":"如果你真想把英语学好，就应该抓住每一个机会与外国人练习口语。"},{"l":3,"en":"Only when you are brave enough to step out of your comfort zone will you get the chance to discover your real potential.","zh":"只有当你勇敢地走出舒适区，你才有机会发现自己真正的潜力。"}]}]},{"day":9,"w":"change","ph":"","defs":[{"pos":"v.","m":"改变，变化；更换；兑换（零钱）","ex":[{"l":1,"en":"For example, getting expensive clothes didn't change me as a person, but the camping trip last summer certainly did.","zh":"例如，买昂贵的衣服并没有改变我这个人，但去年夏天的露营旅行却真的改变了我。"},{"l":2,"en":"The teacher told us that reading more books would change the way we think about the world.","zh":"老师告诉我们，多读书会改变我们看待世界的方式。"},{"l":3,"en":"It is believed that a single journey to a strange place can change a person's attitude towards life completely.","zh":"人们相信，一次前往陌生之地的旅行，就能彻底改变一个人对生活的态度。"}]},{"pos":"n.","m":"零钱；找头；变化","ex":[{"l":1,"en":"I gave the shopkeeper a coin and he gave me the change.","zh":"我给了店主一枚硬币，他把找头给了我。"},{"l":2,"en":"When I paid for the book, the kind shopkeeper told me to keep the change as a small gift.","zh":"当我付书钱时，好心的店主让我把找零留下，当作一份小礼物。"},{"l":3,"en":"Searching his pockets carefully, he found that he had no change left to make a phone call at the station.","zh":"他仔细翻找口袋，发现身上已经没有零钱可以在车站打电话了。"}]}]},{"day":9,"w":"changeable","ph":"","defs":[{"pos":"adj.","m":"易变的；变化无常的","ex":[{"l":1,"en":"The weather here is very changeable in spring.","zh":"这里春天的天气非常多变。"},{"l":2,"en":"Because the weather in the mountains is so changeable, you had better take a warm jacket with you.","zh":"因为山里的天气如此多变，你最好随身带一件保暖的外套。"},{"l":3,"en":"Due to the changeable weather in this area, farmers find it difficult to decide when to plant their crops each year.","zh":"由于这一地区多变的天气，农民们每年都很难决定何时播种庄稼。"}]}]},{"day":9,"w":"channel","ph":"","defs":[{"pos":"n.","m":"(电视）频道","ex":[{"l":1,"en":"Please turn to another channel if you don't like this programme.","zh":"如果你不喜欢这个节目，请换到另一个频道。"},{"l":2,"en":"The documentary on this channel, which is about wild animals, is so interesting that I watch it every week.","zh":"这个频道关于野生动物的纪录片非常有趣，我每周都看。"},{"l":3,"en":"Switching to a different channel, I happened to see a programme that taught me more about Chinese history than any textbook had.","zh":"换到另一个频道时，我恰好看到一档节目，它让我对中国的了解比任何教科书都多。"}]}]},{"day":9,"w":"character","ph":"","defs":[{"pos":"n.","m":"性格；特性；特征，特点","ex":[{"l":1,"en":"He has a strong and brave character.","zh":"他有着坚强勇敢的性格。"},{"l":2,"en":"What I really like about her is that she has a kind character and is always ready to help others.","zh":"我真正喜欢她的是，她性格善良，总是乐于助人。"},{"l":3,"en":"It takes years of effort and experience to build a character strong enough to face all kinds of failures in life.","zh":"要塑造一种足以面对人生中各种失败的坚强品格，需要多年的努力和经历。"}]}]},{"day":9,"w":"charge","ph":"","defs":[{"pos":"n.","m":"主管，掌管","ex":[{"l":1,"en":"Mr. Li is in charge of our class this term.","zh":"这学期李老师负责我们班。"},{"l":2,"en":"The manager who is in charge of the project promised that the work would be finished before Friday.","zh":"负责该项目的经理承诺，工作会在周五前完成。"},{"l":3,"en":"Left in charge of the whole shop while the boss was away, the young assistant felt both proud and a little nervous.","zh":"老板不在时被留下来负责整家店，这位年轻的店员既感到自豪，又有些紧张。"}]}]},{"day":10,"w":"charity","ph":"","defs":[{"pos":"n.","m":"慈善","ex":[{"l":1,"en":"She often does volunteer work for a charity.","zh":"她经常为一家慈善机构做志愿工作。"},{"l":2,"en":"The money that was raised at the concert will be given to a charity that helps poor children.","zh":"音乐会上筹集到的钱将捐给一家帮助贫困儿童的慈善机构。"},{"l":3,"en":"Moved by the story of the sick girl, many people donated to the charity without hesitation, hoping to bring her some hope.","zh":"被那个生病女孩的故事所感动，许多人毫不犹豫地向这家慈善机构捐款，希望能给她带来一些希望。"}]}]},{"day":10,"w":"chat","ph":"","defs":[{"pos":"n.&v.","m":"聊天，闲谈","ex":[{"l":1,"en":"It was really wonderful to chat with each other and enjoy food at the same time.","zh":"一边彼此聊天一边品尝美食，真是太棒了。"},{"l":2,"en":"After dinner, my grandfather and I sat by the fire and had a long chat about his childhood in the country.","zh":"晚饭后，我和爷爷坐在炉火旁，就他在乡下的童年时光聊了很久。"},{"l":3,"en":"Having a short chat with an old friend after years of separation often brings back memories that you thought you had forgotten.","zh":"与多年未见的老友简短地聊一聊，常常会唤回你以为早已忘记的回忆。"}]}]},{"day":10,"w":"cheap","ph":"","defs":[{"pos":"adj.","m":"便宜的","ex":[{"l":1,"en":"These apples are very cheap and fresh.","zh":"这些苹果既便宜又新鲜。"},{"l":2,"en":"Although the shoes were cheap, they were so comfortable that I wore them almost every day.","zh":"虽然这双鞋很便宜，却非常舒服，我几乎每天都穿。"},{"l":3,"en":"Cheap as the second-hand bike was, it served me faithfully for three whole years without any major repair.","zh":"尽管这辆二手自行车很便宜，它却忠实地为我服役了整整三年，没有做过任何大修。"}]}]},{"day":10,"w":"check","ph":"","defs":[{"pos":"n.","m":"检查；批改；支票","ex":[{"l":1,"en":"The teacher gave my homework a quick check.","zh":"老师快速检查了我的作业。"},{"l":2,"en":"The doctor advised me to have a health check once a year so that problems could be found early.","zh":"医生建议我每年做一次健康检查，以便早发现问题。"},{"l":3,"en":"A careful check of the machine before each use is the best way to prevent accidents from happening in the factory.","zh":"每次使用前对机器进行仔细检查，是防止工厂发生事故的最好办法。"}]},{"pos":"v.","m":"核对；检查","ex":[{"l":1,"en":"Please check your answers before you hand in the paper.","zh":"交卷前请核对你的答案。"},{"l":2,"en":"Before you leave the hotel, remember to check whether you have taken all your belongings with you.","zh":"离开酒店前，记得检查是否带齐了所有随身物品。"},{"l":3,"en":"It is necessary to check the information you read online carefully, for not everything on the Internet is true.","zh":"仔细核实你在网上读到的信息是必要的，因为网上并非所有内容都是真实的。"}]}]},{"day":10,"w":"cheer","ph":"","defs":[{"pos":"n.&v.","m":"欢呼；喝彩","ex":[{"l":1,"en":"The cheer of the crowd made the players happy.","zh":"人群的欢呼让队员们很高兴。"},{"l":2,"en":"When our team scored the goal, all the students stood up and gave a loud cheer.","zh":"当我们的球队进球时，所有学生都站起来大声欢呼。"},{"l":3,"en":"Only when the bus finally arrived did the tired children give a cheer of relief.","zh":"只有当公交车终于到达时，疲惫的孩子们才如释重负地欢呼起来。"}]}]},{"day":10,"w":"cheese","ph":"","defs":[{"pos":"n.","m":"奶酪","ex":[{"l":1,"en":"I would like some cheese on my bread.","zh":"我想在面包上加一些奶酪。"},{"l":2,"en":"Although my sister likes cheese very much, she never eats it before going to bed.","zh":"虽然我妹妹非常喜欢奶酪，但她从不在睡觉前吃。"},{"l":3,"en":"Made from milk that has been kept for months, this kind of cheese tastes stronger than the one we bought last week.","zh":"这种奶酪由存放数月的牛奶制成，尝起来比我们上周买的那种味道更浓。"}]}]},{"day":10,"w":"chemical","ph":"","defs":[{"pos":"n.","m":"化学品；化学物质","ex":[{"l":1,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物能够通过物理和化学两种手段保护自己。"},{"l":2,"en":"Some plants produce chemicals that taste bitter or cause an unpleasant reaction.","zh":"一些植物会产生尝起来发苦或引起不适反应的化学物质。"},{"l":3,"en":"Farmers who worry about pests often use chemicals, yet scientists remind us that too many of them may pollute the river nearby.","zh":"担心害虫的农民常常使用化学物质，但科学家提醒我们，使用过多可能会污染附近的河流。"}]},{"pos":"adj.","m":"化学的","ex":[{"l":1,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物能够通过物理和化学两种手段保护自己。"},{"l":2,"en":"Some plants produce chemicals that taste bitter or cause an unpleasant reaction.","zh":"一些植物会产生尝起来发苦或引起不适反应的化学物质。"},{"l":3,"en":"It is the chemical change in the leaves that makes them turn red in autumn, which surprises many children.","zh":"正是叶子中的化学变化使它们在秋天变红，这令许多孩子感到惊奇。"}]}]},{"day":10,"w":"chemistry","ph":"","defs":[{"pos":"n.","m":"化学","ex":[{"l":1,"en":"I find chemistry very interesting.","zh":"我觉得化学很有趣。"},{"l":2,"en":"If you want to be a doctor, you should learn chemistry well because it helps you understand medicine.","zh":"如果你想当医生，你就应该学好化学，因为它能帮助你理解药物。"},{"l":3,"en":"Not until he entered senior high did Tom realize how important chemistry would be for his dream of becoming a scientist.","zh":"直到进入高中，汤姆才意识到化学对他成为科学家的梦想有多么重要。"}]}]},{"day":10,
