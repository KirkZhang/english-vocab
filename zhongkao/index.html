ct","ph":"","defs":[{"pos":"adj.","m":"完美的；极好的","ex":[{"l":1,"en":"The weather is perfect today.","zh":"今天天气完美。"},{"l":2,"en":"Nobody is perfect, but we can always try to do things better than before.","zh":"没有人是完美的，但我们总能努力把事情做得比以前更好。"},{"l":3,"en":"Perfect as the plan sounds, we still need to think carefully before we put it into practice.","zh":"尽管这个计划听起来很完美，在付诸实践之前我们仍需仔细思考。"}]}]},{"day":39,"w":"performance","ph":"","defs":[{"pos":"n.","m":"表演；演出；行动","ex":[{"l":1,"en":"Their performance was very wonderful.","zh":"他们的表演非常精彩。"},{"l":2,"en":"The students gave a wonderful performance at the school art festival, which moved everyone in the hall.","zh":"学生们在校艺术节上献上了精彩的表演，感动了大厅里的每一个人。"},{"l":3,"en":"Having practiced for three months, the girl gave such a perfect performance that all the audience stood up to cheer.","zh":"练习了三个月之后，这个女孩呈现了如此完美的表演，以至于全体观众都起立欢呼。"}]}]},{"day":39,"w":"perhaps","ph":"","defs":[{"pos":"adv.","m":"可能；也许","ex":[{"l":1,"en":"Perhaps it will rain tomorrow.","zh":"也许明天会下雨。"},{"l":2,"en":"Perhaps we should ask the teacher for help, because this question is too difficult for us to work out.","zh":"也许我们应该向老师求助，因为这道题对我们来说太难了，做不出来。"},{"l":3,"en":"Perhaps the best way to learn English well, as many top students suggest, is to read and speak as much as possible every day.","zh":"正如许多尖子生所建议的那样，学好英语最好的方法也许是每天尽可能多地读和说。"}]}]},{"day":39,"w":"person","ph":"","defs":[{"pos":"n.","m":"人","ex":[{"l":1,"en":"Who are those people?","zh":"那些人是谁？"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后要指出的是，尽管有些人说拥有东西是一种巨大的快乐，我认为使用你拥有的东西更令人愉悦。"},{"l":3,"en":"A person who is willing to learn from mistakes will surely make greater progress than one who always gives up easily.","zh":"一个愿意从错误中学习的人一定会比一个总是轻易放弃的人取得更大的进步。"}]}]},{"day":39,"w":"personal","ph":"","defs":[{"pos":"adj.","m":"个人的；私人的","ex":[{"l":1,"en":"This is my personal computer.","zh":"这是我的个人电脑。"},{"l":2,"en":"Please do not ask others about their personal questions, because everyone needs some private space.","zh":"请不要问别人私人问题，因为每个人都需要一些私密空间。"},{"l":3,"en":"It is impolite to read others' personal letters without permission, no matter how close you are to them.","zh":"未经允许读别人的私人信件是不礼貌的，无论你和他们有多亲近。"}]}]},{"day":39,"w":"pet","ph":"","defs":[{"pos":"n.","m":"宠物","ex":[{"l":1,"en":"I have a small pet dog.","zh":"我有一只小宠物狗。"},{"l":2,"en":"Keeping a pet can teach children how to care for others, but it also takes a lot of time and energy.","zh":"养宠物可以教会孩子如何关心他人，但它也需要花费大量时间和精力。"},{"l":3,"en":"Not only does the pet bring joy to the family, but it also helps the lonely old man feel less sad.","zh":"这只宠物不仅给这个家庭带来欢乐，还帮助这位孤独的老人减轻了悲伤。"}]}]},{"day":39,"w":"phone","ph":"","defs":[{"pos":"n.","m":"电话；电话机","ex":[{"l":1,"en":"Thanks to the invention of the smart phone, it's convenient to take photos anytime.","zh":"多亏了智能手机的发明，现在随时拍照都很方便。"},{"l":2,"en":"Please pick up the phone when your parents call, because they may have something important to tell you.","zh":"当你父母打电话时请接电话，因为他们可能有重要的事情要告诉你。"},{"l":3,"en":"Addicted to his phone, the boy hardly noticed what was happening around him until his mother took it away.","zh":"这个男孩沉迷于手机，几乎没注意到周围发生的事情，直到他妈妈把手机拿走。"}]},{"pos":"v.","m":"打电话","ex":[{"l":1,"en":"Thanks to the invention of the smart phone, it's convenient to take photos anytime.","zh":"多亏了智能手机的发明，现在随时拍照都很方便。"},{"l":2,"en":"Whenever you have a problem, you can phone me and I will try my best to help you.","zh":"每当你遇到问题时，你可以给我打电话，我会尽力帮助你。"},{"l":3,"en":"Having phoned his teacher to explain the situation, the boy felt much better and went back to class with a smile.","zh":"给老师打电话解释了情况之后，这个男孩感觉好多了，微笑着回到了课堂。"}]}]},{"day":39,"w":"photo","ph":"","defs":[{"pos":"n.","m":"照片","ex":[{"l":1,"en":"Thanks to the invention of the smart phone, it's convenient to take photos anytime.","zh":"多亏了智能手机的发明，随时拍照变得很方便。"},{"l":2,"en":"Now that smartphones are widely used, it is convenient for us to take photos whenever we travel to a new place.","zh":"既然智能手机被广泛使用，我们无论何时去一个新地方旅行，都能很方便地拍照。"},{"l":3,"en":"Thanks to the widespread use of smartphones, never before has it been so convenient for people to take photos and share them with friends around the world.","zh":"多亏了智能手机的广泛使用，人们拍照并与世界各地的朋友分享从未如此方便过。"}]}]},{"day":39,"w":"physical","ph":"","defs":[{"pos":"adj.","m":"身体的；物理的","ex":[{"l":1,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物能通过物理和化学两种手段来保护自己。"},{"l":2,"en":"Although playing sports is good for our physical health, we should also pay attention to our mental health, which is equally important.","zh":"虽然做运动对我们的身体健康有好处，但我们也应该关注心理健康，它同样重要。"},{"l":3,"en":"Not only does regular exercise improve our physical health, but it also helps us build a strong mind to deal with the challenges we meet in daily life.","zh":"经常锻炼不仅能改善我们的身体健康，还能帮助我们建立坚强的意志，去应对日常生活中遇到的挑战。"}]}]},{"day":39,"w":"physics","ph":"","defs":[{"pos":"n.","m":"物理（学）","ex":[{"l":1,"en":"Physics is my favourite subject because it is very interesting.","zh":"物理是我最喜欢的科目，因为它非常有趣。"},{"l":2,"en":"The teacher told us that physics was difficult but very useful, so we should spend more time practicing it.","zh":"老师告诉我们物理很难但很有用，所以我们应该花更多时间练习它。"},{"l":3,"en":"Only by doing experiments ourselves can we truly understand the principles of physics that we have learned from the textbooks.","zh":"只有亲自做实验，我们才能真正理解从课本上学到的物理原理。"}]}]},{"day":39,"w":"piano","ph":"","defs":[{"pos":"n.","m":"钢琴","ex":[{"l":1,"en":"John began to play the piano and beautiful music filled the room.","zh":"约翰开始弹钢琴，优美的音乐充满了房间。"},{"l":2,"en":"When she was only five years old, she showed great interest in the piano, which her parents had bought for her birthday.","zh":"当她只有五岁时，她就对父母为她生日买的那架钢琴表现出了浓厚的兴趣。"},{"l":3,"en":"It was the piano that she had practiced for over ten years that finally helped her realize her dream of becoming a famous musician.","zh":"正是她练习了十多年的钢琴，最终帮助她实现了成为著名音乐家的梦想。"}]}]},{"day":39,"w":"pick","ph":"","defs":[{"pos":"v.","m":"拾起；摘；采集；挑选","ex":[{"l":1,"en":"Please pick up the pen on the floor.","zh":"请把地上的钢笔捡起来。"},{"l":2,"en":"When I was walking in the park, I picked up a wallet that someone had left on the bench.","zh":"当我在公园散步时，我捡到了一个别人落在长椅上的钱包。"},{"l":3,"en":"Wherever you go, remember to pick up your own rubbish so that we can keep our environment clean and beautiful.","zh":"无论你去哪里，记得带走你自己的垃圾，这样我们就能保持环境干净美丽。"}]}]},{"day":39,"w":"picnic","ph":"","defs":[{"pos":"n.","m":"野餐","ex":[{"l":1,"en":"What would you have done if you hadn't gone out for a picnic yesterday?","zh":"如果你昨天没有出去野餐，你会做什么？"},{"l":2,"en":"If the weather is fine tomorrow, we will go to the park and have a picnic with our classmates.","zh":"如果明天天气好，我们将去公园和同学们一起野餐。"},{"l":3,"en":"So excited were the children about the picnic that they woke up early in the morning and prepared all the food by themselves.","zh":"孩子们对野餐如此兴奋，以至于他们一早就醒了，并自己准备了所有的食物。"}]}]},{"day":39,"w":"picture","ph":"","defs":[{"pos":"n.","m":"图片,照片；影片","ex":[{"l":1,"en":"There is a beautiful picture on the wall.","zh":"墙上有一幅美丽的画。"},{"l":2,"en":"The picture which hangs in the living room was painted by my grandfather when he was young.","zh":"挂在客厅里的那幅画是我爷爷年轻时画的。"},{"l":3,"en":"Looking at the old picture, I could hardly believe how much my hometown had changed over the past twenty years.","zh":"看着这张老照片，我几乎不敢相信我的家乡在过去的二十年里发生了这么大的变化。"}]}]},{"day":39,"w":"piece","ph":"","defs":[{"pos":"n.","m":"一块（片、张、件、段）；碎片；部件","ex":[{"l":1,"en":"Please give me a piece of paper.","zh":"请给我一张纸。"},{"l":2,"en":"After the glass fell onto the floor, it broke into pieces, which made the little girl cry sadly.","zh":"玻璃杯掉到地上后碎成了碎片，这让小女孩伤心地哭了起来。"},{"l":3,"en":"Each time I read this book, I find a new piece of wisdom that encourages me to face the difficulties in my study.","zh":"每次读这本书，我都会发现一条新的智慧，鼓励我去面对学习中的困难。"}]}]},{"day":39,"w":"pig","ph":"","defs":[{"pos":"n.","m":"猪","ex":[{"l":1,"en":"The pig is very fat and cute.","zh":"这头猪很胖很可爱。"},{"l":2,"en":"On the farm, the children saw many animals, including a pink pig that was sleeping under the tree.","zh":"在农场上，孩子们看到了许多动物，包括一头正在树下睡觉的粉红色猪。"},{"l":3,"en":"To the children's surprise, the little pig they had raised on the farm turned out to be the cleverest animal they had ever seen.","zh":"令孩子们惊讶的是，他们在农场上养的那头小猪竟然是他们见过的最聪明的动物。"}]}]},{"day":39,"w":"pill","ph":"","defs":[{"pos":"n.","m":"药丸","ex":[{"l":1,"en":"The doctor told him to take the pills three times a day.","zh":"医生让他每天吃三次药丸。"},{"l":2,"en":"After taking the pill, she felt much better, but the doctor still advised her to rest for a few days.","zh":"吃药后她感觉好多了，但医生仍然建议她休息几天。"},{"l":3,"en":"It was not until she had taken the pill that she realized how important it was to follow the doctor's advice carefully.","zh":"直到吃了药，她才意识到认真听从医生的建议是多么重要。"}]}]},{"day":39,"w":"pilot","ph":"","defs":[{"pos":"n.","m":"飞行员","ex":[{"l":1,"en":"His dream is to become a pilot.","zh":"他的梦想是成为一名飞行员。"},{"l":2,"en":"The pilot who has flown for over twenty years said that he still loved his job very much.","zh":"那位已经飞行了二十多年的飞行员说，他仍然非常热爱自己的工作。"},{"l":3,"en":"Only after years of hard training did the young man become a qualified pilot who could fly across the ocean safely.","zh":"经过多年艰苦训练，这个年轻人才成为一名合格的飞行员，能够安全飞越大洋。"}]}]},{"day":39,"w":"pin","ph":"","defs":[{"pos":"n.","m":"针","ex":[{"l":1,"en":"She pricked her finger with a pin.","zh":"她用针刺破了手指。"},{"l":2,"en":"The pin that lay on the table was so small that I almost didn't notice it when I cleaned the room.","zh":"桌子上的那根针太小了，我打扫房间时几乎没有注意到它。"},{"l":3,"en":"As small as a pin may be, it can still cause great pain if you step on it by accident.","zh":"针虽小，但如果你不小心踩到它，仍然会引起剧痛。"}]},{"pos":"v.","m":"用别针","ex":[{"l":1,"en":"She pinned the flower to her dress.","zh":"她把花别在裙子上。"},{"l":2,"en":"Before the meeting began, the teacher pinned a small note on the board so that everyone could see it clearly.","zh":"会议开始前，老师在板上别了一张小纸条，以便大家都能清楚地看到。"},{"l":3,"en":"It was the note pinned to the door that reminded me of the meeting I had almost forgotten.","zh":"正是别在门上的那张纸条提醒了我那个差点忘记的会议。"}]}]},{"day":39,"w":"pineapple","ph":"","defs":[{"pos":"n.","m":"菠萝","ex":[{"l":1,"en":"I like eating pineapple very much.","zh":"我非常喜欢吃菠萝。"},{"l":2,"en":"My mother bought a pineapple from the market, which tasted sweeter than any fruit I had ever eaten.","zh":"妈妈从市场买了一个菠萝，它比我吃过的任何水果都甜。"},{"l":3,"en":"Not only is pineapple rich in vitamins, but it also helps us digest food better when we eat it after meals.","zh":"菠萝不仅富含维生素，而且饭后食用还能帮助我们更好地消化食物。"}]}]},{"day":39,"w":"pink","ph":"","defs":[{"pos":"n.","m":"粉红","ex":[{"l":1,"en":"Pink is her favourite colour.","zh":"粉红色是她最喜欢的颜色。"},{"l":2,"en":"The little girl loves pink so much that she asks her mother to buy pink clothes for her every season.","zh":"这个小女孩非常喜欢粉红色，以至于她每个季节都让妈妈给她买粉红色的衣服。"},{"l":3,"en":"Only when she wore the dress in pink did she realize how beautiful and confident she could look in front of others.","zh":"只有当她穿上那件粉红色的连衣裙时，她才意识到自己可以在别人面前看起来多么美丽自信。"}]},{"pos":"adj.","m":"粉红色的","ex":[{"l":1,"en":"She is wearing a pink dress today.","zh":"她今天穿着一条粉红色的连衣裙。"},{"l":2,"en":"The pink flowers which grow in our school garden make the whole yard look more beautiful in spring.","zh":"春天时，学校花园里生长的粉红色花朵让整个院子看起来更美丽。"},{"l":3,"en":"So lovely was the pink skirt that all the girls in the class wanted to buy one just like it.","zh":"那条粉红色的裙子太可爱了，班里所有的女孩都想买一条一模一样的。"}]}]},{"day":39,"w":"pioneer","ph":"","defs":[{"pos":"n.","m":"先锋；开拓者","ex":[{"l":1,"en":"He is a pioneer in this field.","zh":"他是这个领域的先驱。"},{"l":2,"en":"As a pioneer of modern science, he devoted all his life to studying new technologies that changed the world.","zh":"作为现代科学的先驱，他毕生致力于研究改变世界的新技术。"},{"l":3,"en":"It was his courage and hard work that made him a true pioneer, inspiring many young people to follow their dreams bravely.","zh":"正是他的勇气和努力使他成为真正的先驱，激励了许多年轻人勇敢地追寻自己的梦想。"}]}]},{"day":39,"w":"pity","ph":"","defs":[{"pos":"n.","m":"怜悯；同情；可惜的事","ex":[{"l":1,"en":"It is a pity that you missed the party.","zh":"你错过了聚会真可惜。"},{"l":2,"en":"It is a great pity that he didn't come to the meeting, because he had prepared a long speech for it.","zh":"真遗憾他没有来参加会议，因为他为它准备了一篇长长的演讲。"},{"l":3,"en":"What a pity it is that so many students have given up reading, which is one of the best ways to improve themselves.","zh":"真遗憾，那么多学生放弃了阅读，而阅读是提升自我最好的方式之一。"}]}]},{"day":40,"w":"pizza","ph":"","defs":[{"pos":"n.","m":"比萨饼","ex":[{"l":1,"en":"I remember I put too much salt into the pizza.","zh":"我记得我在比萨饼里放了太多盐。"},{"l":2,"en":"Although the pizza tasted a little salty, we still enjoyed it because my mother had made it herself.","zh":"虽然比萨饼尝起来有点咸，但我们仍然很喜欢，因为它是妈妈亲手做的。"},{"l":3,"en":"Not only did he learn how to make pizza from his grandfather, but he also opened his own restaurant after finishing college.","zh":"他不仅从爷爷那里学会了做比萨饼，而且大学毕业后还开了自己的餐厅。"}]}]},{"day":40,"w":"place","ph":"","defs":[{"pos":"n.","m":"地方；住所","ex":[{"l":1,"en":"It made me wonder: Who creates maps in the first place?","zh":"这让我好奇：最初是谁制作了地图？"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一段时间后，我了解到，负责绘制世界各地的道路、山脉、海洋和其他地方的人被称为制图师。"},{"l":3,"en":"Only when we visit a new place in person can we truly understand why people say that travelling is the best way to learn about the world.","zh":"只有亲自去一个新地方，我们才能真正理解为什么人们说旅行是了解世界的最好方式。"}]},{"pos":"v.","m":"放置","ex":[{"l":1,"en":"It made me wonder: Who creates maps in the first place?","zh":"这让我好奇:最初是谁绘制了地图呢?"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番之后,我了解到那些负责绘制世界各地道路、山脉、海洋和其他地方的人被称为制图师。"},{"l":3,"en":"When I found my name placed at the top of the list, I finally understood how much effort it takes to place oneself among the best players in the city.","zh":"当我发现自己的名字被排在名单最前面时,我终于明白,要让一个人跻身全市最优秀选手之列需要付出多少努力。"}]}]},{"day":40,"w":"plan","ph":"","defs":[{"pos":"n.&v.","m":"计划，打算","ex":[{"l":1,"en":"We plan to visit the museum this weekend.","zh":"我们计划这个周末去参观博物馆。"},{"l":2,"en":"Although we have made a detailed plan, we are still not sure when we will start the trip.","zh":"虽然我们已经制定了详细的计划,但我们仍然不确定什么时候开始这次旅行。"},{"l":3,"en":"It is the careful plan that we made last summer that finally allows us to enjoy the trip without worrying about anything going wrong.","zh":"正是去年夏天我们制定的这个周密的计划,最终让我们能够无忧无虑地享受这次旅行,不必担心出任何差错。"}]}]},{"day":40,"w":"plane","ph":"","defs":[{"pos":"n.","m":"飞机","ex":[{"l":1,"en":"The plane will take off in ten minutes.","zh":"飞机十分钟后起飞。"},{"l":2,"en":"By the time we arrived at the airport, the plane to Beijing had already taken off.","zh":"当我们到达机场时,飞往北京的飞机已经起飞了。"},{"l":3,"en":"Not until the plane landed safely did the nervous passengers begin to relax, smiling at each other with relief.","zh":"直到飞机安全降落,紧张的乘客们才开始放松下来,如释重负地彼此微笑。"}]}]},{"day":40,"w":"planet","ph":"","defs":[{"pos":"n.","m":"行星","ex":[{"l":1,"en":"The earth is a planet of the sun.","zh":"地球是太阳的一颗行星。"},{"l":2,"en":"Scientists say that Mars is the planet which is most similar to the earth in the solar system.","zh":"科学家们说,火星是太阳系中与地球最相似的行星。"},{"l":3,"en":"What surprised us most was that such a tiny planet could hold so many mysteries waiting to be discovered by young scientists.","zh":"最令我们惊讶的是,这样一颗微小的行星竟藏着如此多的奥秘,等待着年轻的科学家们去发现。"}]}]},{"day":40,"w":"plant","ph":"","defs":[{"pos":"v.","m":"种植；播种","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"有些植物有自己独特的方法来驱赶动物。"},{"l":2,"en":"Plants certainly cannot run away, and they have no teeth or claws.","zh":"植物当然无法逃跑,而且它们没有牙齿或爪子。"},{"l":3,"en":"Every spring, the students plant young trees along the river, hoping that these trees will one day grow tall enough to protect the soil from being washed away.","zh":"每年春天,学生们都会在河边种下小树苗,希望有一天这些树能长得足够高大,以保护土壤不被冲走。"}]},{"pos":"n.","m":"植物","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"有些植物有自己独特的方法来驱赶动物。"},{"l":2,"en":"Plants certainly cannot run away, and they have no teeth or claws.","zh":"植物当然无法逃跑,而且它们没有牙齿或爪子。"},{"l":3,"en":"Rare is the plant that can survive in such a dry desert, where almost no rain falls throughout the whole year.","zh":"能在如此干旱的沙漠中存活的植物极为罕见,那里几乎全年都不下一滴雨。"}]}]},{"day":40,"w":"plastic","ph":"","defs":[{"pos":"adj.","m":"塑料的","ex":[{"l":1,"en":"Please do not use plastic bags when shopping.","zh":"购物时请不要使用塑料袋。"},{"l":2,"en":"If we keep using plastic bottles, our oceans will be filled with rubbish in the future.","zh":"如果我们继续使用塑料瓶,我们的海洋将来会被垃圾填满。"},{"l":3,"en":"Only when people realize how much harm plastic waste causes to the environment will they truly change their daily habits.","zh":"只有当人们认识到塑料垃圾对环境造成多大危害时,他们才会真正改变自己的日常习惯。"}]}]},{"day":40,"w":"plate","ph":"","defs":[{"pos":"n.","m":"盘子；碟子;板；牌","ex":[{"l":1,"en":"Please pass me a clean plate.","zh":"请递给我一个干净的盘子。"},{"l":2,"en":"The plate that my grandmother gave me was broken by my little brother yesterday.","zh":"我奶奶送我的那个盘子昨天被我弟弟打破了。"},{"l":3,"en":"On the plate lay a piece of cake that looked so delicious that I could hardly wait to taste it.","zh":"盘子里放着一块蛋糕,看起来美味极了,我几乎迫不及待想要尝一口。"}]}]},{"day":40,"w":"platform","ph":"","defs":[{"pos":"n.","m":"讲台；站台","ex":[{"l":1,"en":"Please wait for me on the platform.","zh":"请在站台上等我。"},{"l":2,"en":"When the train finally arrived, I was standing on the platform reading a newspaper.","zh":"当火车终于到达时,我正站在站台上读报纸。"},{"l":3,"en":"Standing on the platform and watching the train disappear into the distance, she suddenly felt that a new chapter of her life had begun.","zh":"站在站台上望着火车消失在远方,她突然觉得自己人生的新篇章已经开启。"}]}]},{"day":40,"w":"play","ph":"","defs":[{"pos":"v.","m":"玩；打（球）；演奏；扮演；播放","ex":[{"l":1,"en":"A lot of fans were attracted by the 13-year-old one-armed basketball player.","zh":"许多球迷被这位13岁的独臂篮球运动员所吸引。"},{"l":2,"en":"It is not easy to beat a robot player in a chess game.","zh":"在棋类比赛中打败机器人选手并不容易。"},{"l":3,"en":"Not only does he play the piano well, but he also manages to play basketball with his teammates after school every day.","zh":"他不仅钢琴弹得好,还能每天放学后和队友们一起打篮球。"}]},{"pos":"n.","m":"玩耍；戏剧；剧本","ex":[{"l":1,"en":"John began to play the piano and beautiful music filled the room.","zh":"约翰开始弹钢琴,美妙的音乐充满了整个房间。"},{"l":2,"en":"The students who will take part in the play next week are busy practicing every afternoon.","zh":"下周将参加这部戏剧的学生们每天下午都在忙着排练。"},{"l":3,"en":"So touching was the play that many audience members were moved to tears before the final scene ended.","zh":"这部戏剧如此动人,以至于在最后一幕结束前,许多观众都被感动得流下了眼泪。"}]}]},{"day":40,"w":"player","ph":"","defs":[{"pos":"n.","m":"运动员","ex":[{"l":1,"en":"A lot of fans were attracted by the 13-year-old one-armed basketball player.","zh":"许多球迷被这位13岁的独臂篮球运动员所吸引。"},{"l":2,"en":"It is not easy to beat a robot player in a chess game.","zh":"在棋类比赛中打败机器人选手并不容易。"},{"l":3,"en":"What makes a great player is not only talent but also the courage to keep going when the team is losing.","zh":"成就一名伟大运动员的,不仅是天赋,还有在球队落后时坚持到底的勇气。"}]}]},{"day":40,"w":"playground","ph":"","defs":[{"pos":"n.","m":"操场，运动场","ex":[{"l":1,"en":"We often play basketball on the playground after school.","zh":"我们放学后常在操场上打篮球。"},{"l":2,"en":"When the bell rang, all the students ran to the playground to celebrate their victory.","zh":"铃声一响,所有学生都跑向操场去庆祝他们的胜利。"},{"l":3,"en":"On the playground stood a group of children whose laughter reminded me of my own happy childhood.","zh":"操场上站着一群孩子,他们的笑声让我想起了自己快乐的童年。"}]}]},{"day":40,"w":"pleasant","ph":"","defs":[{"pos":"adj.","m":"令人愉快的；舒适的","ex":[{"l":1,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我的最后一点是,虽然有人说拥有东西是件乐事,但我觉得使用自己所拥有的东西更令人愉快。"},{"l":2,"en":"Even though the journey was long and tiring, the pleasant weather made us feel relaxed and happy.","zh":"尽管旅途漫长而疲惫,但令人愉快的天气让我们感到轻松愉快。"},{"l":3,"en":"It was such a pleasant afternoon that we decided to sit by the lake, watching the sunset slowly turn the sky orange.","zh":"那是一个如此惬意的下午,我们决定坐在湖边,看着夕阳慢慢把天空染成橙色。"}]}]},{"day":40,"w":"please","ph":"","defs":[{"pos":"int.","m":"请","ex":[{"l":1,"en":"Come in,please.","zh":"请进。"},{"l":2,"en":"Please tell me what you saw at the corner of the street last night.","zh":"请告诉我昨晚你在街角看到了什么。"},{"l":3,"en":"Please do remember that, no matter how busy you are, you should always make time for the people you love.","zh":"请务必记住,无论你多忙,都应当为你所爱的人留出时间。"}]},{"pos":"v.","m":"使高兴；使满意","ex":[{"l":1,"en":"Come in,please.","zh":"请进。"},{"l":2,"en":"But parents and teachers worked together to protect the school and now they are pleased to see the result.","zh":"但是家长和老师们齐心协力保护这所学校,现在他们很高兴看到这样的结果。"},{"l":3,"en":"What pleased the teacher most was that every student in the class had tried his or her best to prepare for the exam.","zh":"最让老师欣慰的是,班上每个学生都尽了最大努力来准备这次考试。"}]}]},{"day":40,"w":"pleased","ph":"","defs":[{"pos":"adj.","m":"感到高兴的；感到满意的","ex":[{"l":1,"en":"After David planted the tree by himself, he felt pleased.","zh":"大卫自己种下那棵树后,他感到很满意。"},{"l":2,"en":"But parents and teachers worked together to protect the school and now they are pleased to see the result.","zh":"但是家长和老师们齐心协力保护这所学校,现在他们很高兴看到这样的结果。"},{"l":3,"en":"Pleased with the progress he had made, the young musician decided to challenge himself with a far more difficult piece.","zh":"由于对自己取得的进步感到满意,这位年轻的音乐家决定用一首难得多曲子来挑战自己。"}]}]},{"day":40,"w":"pleasure","ph":"","defs":[{"pos":"n.","m":"高兴；愉快","ex":[{"l":1,"en":"It is a pleasure to talk with you.","zh":"和你交谈是件愉快的事。"},{"l":2,"en":"Reading books brings me great pleasure because it helps me understand the world better.","zh":"读书给我带来极大的快乐,因为它帮助我更好地理解这个世界。"},{"l":3,"en":"It is my great pleasure to introduce a speaker whose story will surely inspire everyone present here today.","zh":"我很荣幸能介绍一位演讲者,他的故事一定会激励今天在座的每一个人。"}]}]},{"day":40,"w":"plenty","ph":"","defs":[{"pos":"n.","m":"丰富，充足；大量","ex":[{"l":1,"en":"There is plenty of water in the bottle.","zh":"瓶子里有充足的水。"},{"l":2,"en":"As long as you practice every day, you will have plenty of chances to improve your English.","zh":"只要你每天练习,你就会有大量机会提高你的英语水平。"},{"l":3,"en":"There is plenty of evidence to show that students who read regularly tend to perform better in their studies.","zh":"有充足的证据表明,经常阅读的学生往往在学业上表现更出色。"}]}]},{"day":40,"w":"plus","ph":"","defs":[{"pos":"prep.","m":"加，加上","ex":[{"l":1,"en":"Two plus three is five.","zh":"二加三等于五。"},{"l":2,"en":"The hotel is cheap, plus it is close to the beach, so many tourists like to stay there.","zh":"这家旅馆很便宜,而且离海滩很近,所以许多游客喜欢住在那里。"},{"l":3,"en":"The new library is bright and quiet, plus it offers plenty of books, which makes it a perfect place for students to study after school.","zh":"新图书馆明亮又安静,而且还提供大量书籍,这使它成为学生们放学后学习的理想去处。"}]}]},{"day":40,"w":"P.M.","ph":"","defs":[{"pos":"","m":"下午","ex":[{"l":1,"en":"The meeting will begin at 4 P.M. tomorrow.","zh":"会议将在明天下午四点开始。"},{"l":2,"en":"When the bell rang at 5 P.M., all the students rushed out of the classroom happily.","zh":"下午五点铃响时，所有学生都开心地冲出了教室。"},{"l":3,"en":"Not until 6 P.M. did the manager realize that he had forgotten to send the important report.","zh":"直到下午六点，经理才意识到自己忘了发送那份重要的报告。"}]}]},{"day":40,"w":"pocket","ph":"","defs":[{"pos":"","m":"(衣服的）口袋","ex":[{"l":1,"en":"He put the key into his pocket.","zh":"他把钥匙放进了口袋里。"},{"l":2,"en":"The boy took out a small notebook from his pocket and wrote down what the teacher said.","zh":"男孩从口袋里掏出一本小笔记本，把老师说的话记了下来。"},{"l":3,"en":"It is the empty pocket that often teaches young people the true value of hard work.","zh":"正是空空的口袋，常常教会年轻人努力工作的真正价值。"}]}]},{"day":40,"w":"poem","ph":"","defs":[{"pos":"n.","m":"诗","ex":[{"l":1,"en":"She wrote a short poem about spring.","zh":"她写了一首关于春天的短诗。"},{"l":2,"en":"The poem which the girl read at the school meeting moved everyone in the hall.","zh":"女孩在学校集会上朗读的那首诗感动了大厅里的每一个人。"},{"l":3,"en":"Deeply touched by the old poem, the student decided to spend more time reading classic literature.","zh":"被这首古诗深深打动，这名学生决定花更多时间阅读经典文学。"}]}]},{"day":40,"w":"point","ph":"","defs":[{"pos":"v.","m":"指；指向","ex":[{"l":1,"en":"She pointed at the picture on the wall.","zh":"她指着墙上的那幅画。"},{"l":2,"en":"The guide pointed to the tower and told us that it was built hundreds of years ago.","zh":"导游指着那座塔告诉我们，它是数百年前建造的。"},{"l":3,"en":"Pointing at the chart, the teacher explained why the population of the city had grown so quickly.","zh":"老师指着图表，解释了这座城市的人口为何增长得如此之快。"}]},{"pos":"n.","m":"点；分数；小数点","ex":[{"l":1,"en":"Holly leaves on lower branches have more sharp points than leaves on upper branches.","zh":"下部分枝上的冬青叶比上部分枝上的叶子有更多尖锐的尖端。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想指出的一点是，尽管有人说拥有东西是一种极大的快乐，但我认为使用你所拥有的东西更令人愉悦。"},{"l":3,"en":"What I want to stress in the last point is that reading widely helps us think more clearly than before.","zh":"我想在最后一点强调的是，广泛阅读能帮助我们比以前思考得更清晰。"}]}]},{"day":40,"w":"pole","ph":"","defs":[{"pos":"n.","m":"杆；极","ex":[{"l":1,"en":"The flag is flying at the top of the pole.","zh":"旗帜在杆顶飘扬。"},{"l":2,"en":"The scientists who traveled to the North Pole brought back many useful photos of the ice.","zh":"前往北极的科学家们带回了大量有用的冰层照片。"},{"l":3,"en":"Only when you stand at the pole can you realize how cold and silent the polar world really is.","zh":"只有当你站在极地时，你才会意识到极地世界是多么寒冷与寂静。"}]}]},{"day":40,"w":"policeman","ph":"","defs":[{"pos":"n.","m":"警察","ex":[{"l":1,"en":"The policeman helped the old man cross the road.","zh":"警察帮助那位老人过了马路。"},{"l":2,"en":"The policeman asked the boy why he was walking alone in the street so late at night.","zh":"警察问那个男孩，为什么深夜独自在街上行走。"},{"l":3,"en":"It was the young policeman who saved the child from the burning house before the firemen arrived.","zh":"正是在消防员到达之前，是那位年轻的警察把孩子从燃烧的房子里救了出来。"}]}]},{"day":40,"w":"polite","ph":"","defs":[{"pos":"adj.","m":"有礼貌的","ex":[{"l":1,"en":"It is polite to say thank you.","zh":"说声谢谢是有礼貌的。"},{"l":2,"en":"The girl is so polite that she always greets her neighbors when she meets them.","zh":"这个女孩很有礼貌，遇到邻居时总会主动打招呼。"},{"l":3,"en":"Polite as the new student is, he still finds it hard to make friends in the first week.","zh":"尽管这位新同学很有礼貌，他在第一周仍然觉得很难交到朋友。"}]}]},{"day":40,"w":"politely","ph":"","defs":[{"pos":"adv.","m":"有礼貌地","ex":[{"l":1,"en":"He spoke to the teacher politely.","zh":"他礼貌地和老师说话。"},{"l":2,"en":"When you ask for help, you should speak politely so that others are willing to listen.","zh":"当你寻求帮助时，应该礼貌地说话，别人才愿意倾听。"},{"l":3,"en":"Speaking politely to others is a habit that will benefit you throughout your whole life.","zh":"礼貌地对他人说话，是一种会让你终生受益的习惯。"}]}]},{"day":40,"w":"politics","ph":"","defs":[{"pos":"n.","m":"政治；政治学","ex":[{"l":1,"en":"He is interested in politics.","zh":"他对政治感兴趣。"},{"l":2,"en":"Although she is young, she has read many books about politics and history.","zh":"尽管她还年轻，却已经读了许多关于政治和历史的书。"},{"l":3,"en":"Only by understanding politics well can young people take an active part in building a better society.","zh":"只有充分了解政治，年轻人才能积极参与建设一个更美好的社会。"}]}]},{"day":40,"w":"pollute","ph":"","defs":[{"pos":"v.","m":"污染，弄脏","ex":[{"l":1,"en":"The factory pollutes the river.","zh":"这家工厂污染了河流。"},{"l":2,"en":"If people continue to pollute the air, the earth will become a worse place to live.","zh":"如果人们继续污染空气，地球将成为一个更糟糕的居住之地。"},{"l":3,"en":"Having realized how badly the factory had polluted the lake, the workers decided to take action at once.","zh":"意识到工厂把湖泊污染得如此严重之后，工人们决定立即采取行动。"}]}]},{"day":40,"w":"pollution","ph":"","defs":[{"pos":"n.","m":"污染","ex":[{"l":1,"en":"Air pollution is a big problem in the city.","zh":"空气污染是这座城市的一个大问题。"},{"l":2,"en":"The government has made strict rules to reduce water pollution since the river turned black.","zh":"自从河水变黑以来，政府制定了严格的规章来减少水污染。"},{"l":3,"en":"Not only does pollution harm our health, but it also destroys the future of the next generation.","zh":"污染不仅危害我们的健康，还破坏下一代的未来。"}]}]},{"day":40,"w":"pool","ph":"","defs":[{"pos":"n.","m":"水塘；水池","ex":[{"l":1,"en":"The children are swimming in the pool.","zh":"孩子们正在游泳池里游泳。"},{"l":2,"en":"The new swimming pool which was built last month is open to students every afternoon.","zh":"上个月新建的游泳池每天下午向学生开放。"},{"l":3,"en":"Surrounded by green trees, the quiet pool is the best place for the family to spend hot summer days.","zh":"被绿树环绕的这个安静的水池，是一家人度过炎热夏日的最佳去处。"}]}]},{"day":41,"w":"poor","ph":"","defs":[{"pos":"adj.","m":"可怜的；贫穷的；不好的","ex":[{"l":1,"en":"The poor boy has no shoes.","zh":"这个可怜的男孩没有鞋穿。"},{"l":2,"en":"Although his family was poor, he worked hard and finally entered a good university.","zh":"虽然他家境贫寒，但他努力学习，最终考入了一所好大学。"},{"l":3,"en":"Poor as the village was, every child there still dreamed of changing life through education.","zh":"尽管这个村庄贫穷，那里的每个孩子仍然梦想通过教育改变命运。"}]}]},{"day":41,"w":"popular","ph":"","defs":[{"pos":"adj.","m":"流行的；大众的；受欢迎的","ex":[{"l":1,"en":"The song is very popular with students.","zh":"这首歌很受学生欢迎。"},{"l":2,"en":"The singer who became popular last year will give a concert in our city next month.","zh":"去年走红的那位歌手下个月将在我市举办一场音乐会。"},{"l":3,"en":"So popular has the online course become that thousands of students have signed up in only one week.","zh":"这门网课变得如此受欢迎，仅一周就有数千名学生报名。"}]}]},{"day":41,"w":"population","ph":"","defs":[{"pos":"n.","m":"人口，人数","ex":[{"l":1,"en":"The population of China is large.","zh":"中国的人口很多。"},{"l":2,"en":"The population of the city has grown quickly because more and more people move here for work.","zh":"这座城市的人口增长很快，因为越来越多人为了工作搬到这儿。"},{"l":3,"en":"With the population increasing year by year, the government has to build more schools and hospitals.","zh":"随着人口逐年增加，政府不得不修建更多的学校和医院。"}]}]},{"day":41,"w":"pork","ph":"","defs":[{"pos":"n.","m":"猪肉","ex":[{"l":1,"en":"I had pork for lunch today.","zh":"今天午饭我吃了猪肉。"},{"l":2,"en":"My mother bought some pork from the market so that she could make dumplings for us.","zh":"妈妈从市场买了些猪肉，以便给我们包饺子。"},{"l":3,"en":"It is said that eating too much pork without enough vegetables may cause health problems in later years.","zh":"据说吃太多猪肉而不摄入足够的蔬菜，可能会在日后引发健康问题。"}]}]},{"day":41,"w":"possible","ph":"","defs":[{"pos":"adj.","m":"可能的；也许的","ex":[{"l":1,"en":"The engineer promised to finish the task as soon as possible.","zh":"这位工程师答应尽快完成这项任务。"},{"l":2,"en":"If it is possible, I would like to visit the museum with my classmates this weekend.","zh":"如果可能的话，我想这个周末和同学一起参观博物馆。"},{"l":3,"en":"Only by working together is it possible for us to solve such a difficult problem in a short time.","zh":"只有携手合作，我们才有可能在短时间内解决如此困难的问题。"}]}]},{"day":41,"w":"possibly","ph":"","defs":[{"pos":"adv.","m":"可能；也许","ex":[{"l":1,"en":"He will possibly come tomorrow.","zh":"他明天可能会来。"},{"l":2,"en":"She will possibly join the club if she has enough free time after school.","zh":"如果放学后有足够的空余时间，她可能会加入这个社团。"},{"l":3,"en":"It is possibly the most meaningful trip that the students have ever taken during their middle school years.","zh":"这或许是学生们在中学阶段所经历过的最有意义的一次旅行。"}]}]},{"day":41,"w":"post","ph":"","defs":[{"pos":"n.","m":"邮政；邮寄；邮件","ex":[{"l":1,"en":"I sent the letter by post.","zh":"我通过邮局寄了那封信。"},{"l":2,"en":"The package which was lost in the post last week has finally arrived at our school.","zh":"上周在邮寄中丢失的包裹终于送到了我们学校。"},{"l":3,"en":"With the development of the Internet, traditional post is no longer as popular as it was twenty years ago.","zh":"随着互联网的发展，传统邮政已不再像二十年前那样受欢迎。"}]},{"pos":"v.","m":"邮寄","ex":[{"l":1,"en":"I will post the letter to my friend tomorrow.","zh":"我明天要把这封信寄给我的朋友。"},{"l":2,"en":"Could you please post the photos to me when you return from your trip?","zh":"你旅行回来时，能不能把这些照片寄给我？"},{"l":3,"en":"Having posted the package three days ago, she still wondered why it had not arrived at the destination yet.","zh":"三天前寄出包裹后，她仍在想为什么包裹还没到达目的地。"}]}]},{"day":41,"w":"postcard","ph":"","defs":[{"pos":"n.","m":"明信片","ex":[{"l":1,"en":"She sent me a postcard from Beijing.","zh":"她从北京给我寄了一张明信片。"},{"l":2,"en":"The postcard which my pen pal sent me shows the beautiful mountains in his country.","zh":"我笔友寄给我的那张明信片展示了他祖国美丽的群山。"},{"l":3,"en":"Reading the postcard sent by her grandmother, the girl could not help thinking of those happy summer days they had spent together.","zh":"读者奶奶寄来的明信片，女孩不禁想起她们一起度过的那些快乐的夏日。"}]}]},{"day":41,"w":"poster","ph":"","defs":[{"pos":"n.","m":"海报","ex":[{"l":1,"en":"There is a nice poster on the wall.","zh":"墙上有一张漂亮的海报。"},{"l":2,"en":"The students who made this poster want to tell people how to protect the environment.","zh":"制作这张海报的学生想告诉人们如何保护环境。"},{"l":3,"en":"Not only is the poster well designed, but it also encourages teenagers to take action to save water in daily life.","zh":"这张海报不仅设计精美，还鼓励青少年在日常生活中采取行动节约用水。"}]}]},{"day":41,"w":"postman","ph":"","defs":[{"pos":"n.","m":"邮递员","ex":[{"l":1,"en":"The postman brings us letters every morning.","zh":"邮递员每天早上给我们送信。"},{"l":2,"en":"The postman told me that he had worked in this area for more than twenty years.","zh":"那位邮递员告诉我，他已在这一带工作了二十多年。"},{"l":3,"en":"No matter how heavy the rain was, the kind postman managed to deliver every letter before dark.","zh":"无论雨下得多大，那位好心的邮递员都在天黑前把每一封信都送到了。"}]}]},{"day":41,"w":"pot","ph":"","defs":[{"pos":"n.","m":"锅；壶；罐","ex":[{"l":1,"en":"Mum is cooking soup in the pot.","zh":"妈妈正在锅里煮汤。"},{"l":2,"en":"When the water in the pot boils, please turn off the gas and add some salt.","zh":"当锅里的水烧开时，请关掉煤气并加些盐。"},{"l":3,"en":"The old pot that has been kept in the kitchen for many years still reminds me of the dishes my mother used to cook.","zh":"那只保存在厨房里多年的旧锅仍然让我想起妈妈过去常做的那些菜。"}]}]},{"day":41,"w":"potato","ph":"","defs":[{"pos":"n.","m":"土豆，马铃薯","ex":[{"l":1,"en":"I would like some potato and meat for lunch.","zh":"我午饭想吃点土豆和肉。"},{"l":2,"en":"My sister does not like potato at all, although it is good for our health.","zh":"我妹妹一点也不喜欢土豆，尽管它对我们的健康有益。"},{"l":3,"en":"It is said that potato was first grown in South America and later spread to many other countries around the world.","zh":"据说土豆最早种植于南美洲，后来传到了世界上许多其他国家。"}]}]},{"day":41,"w":"pound","ph":"","defs":[{"pos":"n.","m":"磅；英镑","ex":[{"l":1,"en":"The apples cost two pounds a kilo.","zh":"这些苹果每公斤两英镑。"},{"l":2,"en":"If you want to lose weight, you should not eat too many pounds of meat every week.","zh":"如果你想减肥，每周就不该吃太多磅的肉。"},{"l":3,"en":"The bag weighs only a few pounds, yet it contains everything the traveler needs for the long journey.","zh":"这只包只有几磅重，却装着这位旅行者长途旅行所需的一切。"}]}]},{"day":41,"w":"power","ph":"","defs":[{"pos":"n.","m":"电源；能源；动力；电力","ex":[{"l":1,"en":"Our uncle taught us one of the most important lessons in life: the power of attitude.","zh":"叔叔教会了我们人生中最重要的一课：态度的力量。"},{"l":2,"en":"It is well known that knowledge is power, which can change a person's whole life.","zh":"众所周知，知识就是力量，它能改变一个人的一生。"},{"l":3,"en":"Little did we realize that the power of a single kind word could encourage a lonely child for many years to come.","zh":"我们几乎没有意识到，一句善意的话语所蕴含的力量，竟能在未来的许多年里鼓舞一个孤独的孩子。"}]}]},{"day":41,"w":"powerful","ph":"","defs":[{"pos":"adj.","m":"强大的","ex":[{"l":1,"en":"He is a powerful leader in the company.","zh":"他是公司里一位强有力的领导。"},{"l":2,"en":"The powerful wind that blew last night broke many trees in our school.","zh":"昨晚刮的那阵大风刮断了我们学校里的许多树。"},{"l":3,"en":"So powerful is music that it can help people calm down and forget their worries after a long, tiring day.","zh":"音乐的力量如此强大，以至于它能帮助人们在漫长疲惫的一天后平静下来，忘却烦恼。"}]}]},{"day":41,"w":"practice","ph":"","defs":[{"pos":"n.","m":"练习；实践","ex":[{"l":1,"en":"Practice makes perfect, as the saying goes.","zh":"俗话说，熟能生巧。"},{"l":2,"en":"The teacher told us that more practice would help us make greater progress in English.","zh":"老师告诉我们，多加练习能帮助我们在英语上取得更大的进步。"},{"l":3,"en":"Only through long years of practice did the young pianist finally become able to play the difficult piece with ease.","zh":"只有经过多年的练习，这位年轻的钢琴家才终于能够轻松地弹奏这首高难度的曲子。"}]},{"pos":"v.","m":"练习；实践","ex":[{"l":1,"en":"We practice playing basketball after school.","zh":"我们放学后练习打篮球。"},{"l":2,"en":"She keeps practicing the piano every day so that she can win the competition next month.","zh":"她每天坚持练习钢琴，以便能在下个月的比赛中获胜。"},{"l":3,"en":"Having practiced for over three hours, the dancers were so tired that they could hardly stand on the stage.","zh":"练了三个多小时后，舞者们累得几乎站不稳在舞台上。"}]}]},{"day":41,"w":"praise","ph":"","defs":[{"pos":"n.&v.","m":"赞扬；表扬","ex":[{"l":1,"en":"The teacher gave high praise to his work.","zh":"老师高度赞扬了他的作品。"},{"l":2,"en":"When the mother heard the praise from the teacher, she felt really proud of her son.","zh":"当这位母亲听到老师的表扬时，她真的为儿子感到骄傲。"},{"l":3,"en":"It is the praise from those we love that often gives us the courage to keep going when we face hard times.","zh":"正是来自我们所爱之人的赞扬，常常给予我们在面对困难时继续前行的勇气。"}]}]},{"day":41,"w":"precious","ph":"","defs":[{"pos":"adj.","m":"宝贵的，珍贵的","ex":[{"l":1,"en":"Time is precious to everyone.","zh":"时间对每个人都很宝贵。"},{"l":2,"en":"This old photo is very precious to me because it reminds me of my childhood.","zh":"这张旧照片对我来说非常珍贵，因为它让我想起了我的童年。"},{"l":3,"en":"Children seldom realize how precious the time spent with their grandparents is until those days are gone forever.","zh":"孩子们很少意识到与祖父母共度的时光有多么珍贵，直到那些日子永远逝去。"}]}]},{"day":41,"w":"predict","ph":"","defs":[{"pos":"v.","m":"预言；预料","ex":[{"l":1,"en":"No one can predict the future.","zh":"没有人能预测未来。"},{"l":2,"en":"The scientists predict that the weather will become warmer in the coming years.","zh":"科学家们预测，未来几年的天气会变得更暖。"},{"l":3,"en":"Although the experts predict that the new medicine will work well, it will still take years before it is widely used in hospitals.","zh":"尽管专家们预测这种新药会有效，但它在医院广泛使用仍需数年时间。"}]}]},{"day":41,"w":"prefer","ph":"","defs":[{"pos":"v.","m":"宁愿（选择）；更喜欢","ex":[{"l":1,"en":"I prefer to make it a heart-to-heart room.","zh":"我更愿意把它做成一间可以交心的房间。"},{"l":2,"en":"In addition, I prefer experiences because they bring people together.","zh":"此外，我更喜欢体验，因为它们能把人们聚在一起。"},{"l":3,"en":"While many students prefer to study alone, I would rather learn with friends, since sharing ideas always helps me understand things better.","zh":"虽然许多学生更喜欢独自学习，我却宁愿和朋友一起学，因为分享想法总能帮助我更好地理解事物。"}]}]},{"day":41,"w":"prepare","ph":"","defs":[{"pos":"v.","m":"准备，预备","ex":[{"l":1,"en":"We are preparing for the English test.","zh":"我们正在为英语考试做准备。"},{"l":2,"en":"She has prepared everything that is needed for the party which will be held this Saturday.","zh":"她已经为本周六将要举行的聚会准备好了一切所需的东西。"},{"l":3,"en":"Having prepared for the speech for several weeks, the boy still felt nervous the moment he stepped onto the stage.","zh":"尽管为这次演讲准备了几个星期，男孩在踏上舞台的那一刻仍然感到紧张。"}]}]},{"day":41,"w":"present","ph":"","defs":[{"pos":"n.","m":"礼物；赠品；现在","ex":[{"l":1,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"露易丝现在十三岁，目前正在学中文，中文已经成为和英语一样重要的世界语言。露易丝有许多中国朋友，他们通过电脑交流。"},{"l":2,"en":"I gave my mother a beautiful present on her birthday, which made her very happy.","zh":"我在妈妈生日那天送了她一份漂亮的礼物，这让她非常高兴。"},{"l":3,"en":"The present I received from my best friend is not expensive, but it is something I will treasure for the rest of my life.","zh":"我从最好的朋友那里收到的礼物并不昂贵，但我会珍藏它一辈子。"}]},{"pos":"adj.","m":"出现的，出席的","ex":[{"l":1,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"露易丝现在十三岁，目前正在学中文，中文已经成为和英语一样重要的世界语言。露易丝有许多中国朋友，他们通过电脑交流。"},{"l":2,"en":"All the students present at the meeting agreed to plant more trees around the school.","zh":"出席会议的所有学生都同意在学校周围种更多的树。"},{"l":3,"en":"Everyone present in the hall was deeply moved by the speech given by the old scientist who had devoted his life to research.","zh":"在场的每一个人都被那位毕生致力于研究的老科学家的演讲深深打动了。"}]}]},{"day":41,"w":"president","ph":"","defs":[{"pos":"n.","m":"总统；主席","ex":[{"l":1,"en":"The president gave a long speech on TV.","zh":"总统在电视上发表了一篇很长的演讲。"},{"l":2,"en":"The president who once studied in this school will come back to give a talk next week.","zh":"曾在这所学校学习过的那位主席下周将回来做一次报告。"},{"l":3,"en":"It was at this small village school that the future president began his education, which later led him to a great and successful career.","zh":"正是在这所乡村小学校里，未来的总统开始了他的学业，这后来为他带来了伟大而成功的事业。"}]}]},{"day":41,"w":"press","ph":"","defs":[{"pos":"v.","m":"压；按","ex":[{"l":1,"en":"Please press the button to start the machine.","zh":"请按按钮启动机器。"},{"l":2,"en":"If you press the red button, the door will open automatically without any key.","zh":"如果你按下红色按钮，门会自动打开，不需要任何钥匙。"},{"l":3,"en":"Press the button gently, and the screen will show you all the information that you need for your homework tonight.","zh":"轻轻按下按钮，屏幕就会向你展示今晚作业所需的所有信息。"}]}]},{"day":41,"w":"pretend","ph":"","defs":[{"pos":"v.","m":"假装，装作","ex":[{"l":1,"en":"The boy pretended to be asleep when his mother came in.","zh":"妈妈进来时，男孩假装睡着了。"},{"l":2,"en":"When the teacher asked him the question, he pretended that he had not heard it at all.","zh":"当老师问他这个问题时，他假装根本没听见。"},{"l":3,"en":"Pretending not to notice the mistake, the clever student went on with his explanation as if nothing had happened.","zh":"这个聪明的学生假装没有注意到那个错误，继续他的解释，就好像什么也没发生过一样。"}]}]},{"day":41,"w":"pretty","ph":"","defs":[{"pos":"adj.","m":"漂亮的","ex":[{"l":1,"en":"She is a pretty girl with long black hair.","zh":"她是一个留着黑色长发的漂亮女孩。"},{"l":2,"en":"The pretty dress that my mother bought me yesterday fits me very well.","zh":"妈妈昨天给我买的那条漂亮的裙子很合身。"},{"l":3,"en":"What a pretty garden it is, with all kinds of flowers blooming brightly in the warm spring sun!","zh":"多么漂亮的一个花园啊，各种各样的花在温暖的春日阳光下灿烂地盛开着！"}]}]},{"day":41,"w":"prevent","ph":"","defs":[{"pos":"v.","m":"防止，预防；阻止，阻挡","ex":[{"l":1,"en":"We should wash our hands to prevent illness.","zh":"我们应该洗手以预防疾病。"},{"l":2,"en":"Taking regular exercise can help us prevent many diseases that are common in winter.","zh":"经常锻炼能帮助我们预防许多冬季常见的疾病。"},{"l":3,"en":"Only by working closely together can we prevent such problems from happening again in the future.","zh":"只有密切合作，我们才能防止此类问题将来再次发生。"}]}]},{"day":41,"w":"price","ph":"","defs":[{"pos":"n.","m":"价格","ex":[{"l":1,"en":"The price of this book is ten yuan.","zh":"这本书的价格是十元。"},{"l":2,"en":"Although the price of the computer is a little high, it is really worth buying.","zh":"虽然这台电脑的价格有点高，但确实值得购买。"},{"l":3,"en":"The price of vegetables has risen so sharply that many families have to change their eating habits.","zh":"蔬菜价格上涨得如此之快，以至于许多家庭不得不改变他们的饮食习惯。"}]}]},{"day":41,"w":"primary","ph":"","defs":[{"pos":"adj.","m":"初等的，初级的","ex":[{"l":1,"en":"He started learning English in primary school.","zh":"他在小学开始学英语。"},{"l":2,"en":"When I was a primary school student, I dreamed of becoming a scientist one day.","zh":"当我是一名小学生时，我梦想着有一天能成为科学家。"},{"l":3,"en":"Reading is of primary importance in primary education, for it lays a solid foundation for all future learning.","zh":"阅读在初等教育中至关重要，因为它为所有未来的学习打下坚实的基础。"}]}]},{"day":41,"w":"print","ph":"","defs":[{"pos":"v.","m":"打印；印刷","ex":[{"l":1,"en":"Please print this document for me.","zh":"请帮我打印这份文件。"},{"l":2,"en":"Before you hand in your report, make sure that you have printed it clearly on clean paper.","zh":"交报告之前，确保你已把它清晰地打印在干净的纸上。"},{"l":3,"en":"Having printed all the photos taken during the trip, she put them carefully into a beautiful album.","zh":"把旅途中拍的所有照片打印出来后，她把它们小心翼翼地放进了一本精美的相册里。"}]}]},{"day":42,"w":"prison","ph":"","defs":[{"pos":"n.","m":"监狱","ex":[{"l":1,"en":"The thief was sent to prison at last.","zh":"小偷最终被送进了监狱。"},{"l":2,"en":"The man who had stolen the car was put into prison for three years.","zh":"那个偷车的男人被关进监狱三年。"},{"l":3,"en":"After being in prison for five years, the old man finally realized that freedom was the most valuable thing in life.","zh":"在监狱里待了五年之后，老人终于意识到自由是人生中最珍贵的东西。"}]}]},{"day":42,"w":"private","ph":"","defs":[{"pos":"adj.","m":"私人的；私有的","ex":[{"l":1,"en":"This is my private room.","zh":"这是我的私人房间。"},{"l":2,"en":"Please do not open the letter, because it contains some private information about my family.","zh":"请不要拆开这封信，因为里面有关于我家庭的一些私人信息。"},{"l":3,"en":"Everyone has the right to keep his private matters secret, which should be respected by all of us.","zh":"每个人都有权保守自己的私事，这一点应该被我们所有人尊重。"}]}]},{"day":42,"w":"prize","ph":"","defs":[{"pos":"n.","m":"奖赏；奖品","ex":[{"l":1,"en":"He won the first prize in the competition.","zh":"他在比赛中获得了一等奖。"},{"l":2,"en":"The prize that she got for her excellent speech made her parents very proud.","zh":"她因精彩演讲而获得的奖品让她的父母非常自豪。"},{"l":3,"en":"Never before had such a young student won the top prize in this international maths competition.","zh":"以前从未有这么年轻的学生在这项国际数学竞赛中获得最高奖。"}]}]},{"day":42,"w":"probable","ph":"","defs":[{"pos":"adj.","m":"可能的；大概的","ex":[{"l":1,"en":"It is probable that it will rain tomorrow.","zh":"明天可能会下雨。"},{"l":2,"en":"It is highly probable that the flight will be delayed because of the heavy snow.","zh":"由于大雪，航班很可能会被延误。"},{"l":3,"en":"Given the dark clouds gathering in the sky, it is probable that a heavy storm will hit the city before evening.","zh":"考虑到天空中聚集的乌云，傍晚之前这座城市很可能会遭到一场大暴风雨的袭击。"}]}]},{"day":42,"w":"probably","ph":"","defs":[{"pos":"adv.","m":"很可能；大概；或许","ex":[{"l":1,"en":"He will probably come to the party tonight.","zh":"他今晚很可能会来参加聚会。"},{"l":2,"en":"If you keep practising every day, you will probably make great progress in a few months.","zh":"如果你每天坚持练习，几个月后你很可能会取得很大进步。"},{"l":3,"en":"Having prepared for so long, she will probably pass the difficult exam without too much difficulty.","zh":"准备了这么长时间，她很可能会不太困难地通过这场艰难的考试。"}]}]},{"day":42,"w":"problem","ph":"","defs":[{"pos":"n.","m":"问题，难题，习题","ex":[{"l":1,"en":"Besides, students are likely to suffer from mental problems.","zh":"此外，学生们还可能受到心理问题的困扰。"},{"l":2,"en":"If these problems aren't solved well, they may bring bad results.","zh":"如果这些问题没有得到很好的解决，它们可能会带来不好的后果。"},{"l":3,"en":"Mental problems, if not dealt with in time, may seriously affect a student's studies and daily life in the long run.","zh":"从长远来看，心理问题如果不及时处理，可能会严重影响学生的学习和日常生活。"}]}]},{"day":42,"w":"process","ph":"","defs":[{"pos":"v.","m":"处理；加工","ex":[{"l":1,"en":"The factory processes fresh milk every morning.","zh":"这家工厂每天早晨加工新鲜牛奶。"},{"l":2,"en":"The computers in the lab are used to process a large amount of information every day.","zh":"实验室里的电脑每天被用来处理大量信息。"},{"l":3,"en":"Processed properly, the local farm products can be kept fresh for a much longer time than before.","zh":"经过适当加工，当地的农产品可以比以前保鲜更长时间。"}]},{"pos":"n.","m":"过程","ex":[{"l":1,"en":"Learning English is a long process.","zh":"学习英语是一个漫长的过程。"},{"l":2,"en":"In the process of solving this problem, we have learned many useful skills.","zh":"在解决这个问题的过程中，我们学到了许多有用的技能。"},{"l":3,"en":"Although the process of carrying out the new plan is full of difficulties, we will never give up halfway.","zh":"虽然实施新计划的过程充满困难，但我们决不会半途而废。"}]}]},{"day":42,"w":"produce","ph":"","defs":[{"pos":"v.","m":"生产；产生；制造","ex":[{"l":1,"en":"This messenger sends to the roots the information to produce more nicotine.","zh":"这个信使向根部发送信息，以产生更多的尼古丁。"},{"l":2,"en":"Some plants produce chemicals that taste bitter or cause an unpleasant reaction.","zh":"有些植物会产生尝起来发苦或引起不适反应的化学物质。"},{"l":3,"en":"It is these factories that produce the most popular goods sold in supermarkets across the country.","zh":"正是这些工厂生产出了全国超市里销售的最受欢迎的商品。"}]}]},{"day":42,"w":"product","ph":"","defs":[{"pos":"n.","m":"产品","ex":[{"l":1,"en":"How long has Lee helped the local people sell their products?","zh":"李帮助当地人销售他们的产品有多久了？"},{"l":2,"en":"The products made by this company are so popular that they sell out quickly every week.","zh":"这家公司生产的产品非常受欢迎，每周都会很快卖光。"},{"l":3,"en":"Only by improving the quality of our products can we win back the trust of the customers we have lost.","zh":"只有提高产品质量，我们才能赢回我们已经失去的顾客的信任。"}]}]},{"day":42,"w":"professional","ph":"","defs":[{"pos":"adj.","m":"职业的；专业的","ex":[{"l":1,"en":"Her father is a professional basketball player.","zh":"她爸爸是一名职业篮球运动员。"},{"l":2,"en":"The professional team that we invited will give us some useful advice on our project.","zh":"我们邀请的专业团队将会就我们的项目给我们一些有用的建议。"},{"l":3,"en":"What the young man needs is not money but professional training, which will help him find a better job.","zh":"这个年轻人需要的不是金钱，而是专业培训，这将帮助他找到一份更好的工作。"}]}]},{"day":42,"w":"programme","ph":"","defs":[{"pos":"n.","m":"节目；项目","ex":[{"l":1,"en":"Julia made up her mind to be a doctor after watching the news programme.","zh":"看了那档新闻节目后，朱莉娅下定决心要当一名医生。"},{"l":2,"en":"The educational programme that we watched last night taught us how to protect the environment.","zh":"我们昨晚观看的那个教育节目教会了我们如何保护环境。"},{"l":3,"en":"Having watched the inspiring programme, many teenagers made up their minds to work harder for their dreams.","zh":"看了那个鼓舞人心的节目后，许多青少年下定决心为自己的梦想更加努力。"}]}]},{"day":42,"w":"progress","ph":"","defs":[{"pos":"n.","m":"进步；进展","ex":[{"l":1,"en":"Tom has made great progress this term.","zh":"汤姆这学期取得了很大进步。"},{"l":2,"en":"If you want to make progress in English, you must read and speak more every day.","zh":"如果你想提高英语，就必须每天多读多说。"},{"l":3,"en":"As great progress has been made in the past few years, our city has become more beautiful than ever before.","zh":"由于在过去几年里取得了巨大进步，我们的城市变得比以往任何时候都更加美丽。"}]}]},{"day":42,"w":"project","ph":"","defs":[{"pos":"n.","m":"过工程；课程；作业；项目；规划","ex":[{"l":1,"en":"And some said they couldn't wait for the project to be finally completed at the end of this year.","zh":"一些人说他们迫不及待地希望这个项目在今年年底最终完工。"},{"l":2,"en":"The science project that our group is working on will be finished before the summer holiday.","zh":"我们小组正在做的科学项目将在暑假前完成。"},{"l":3,"en":"Not until the project was completed did the engineers realize how much they had learned during the whole process.","zh":"直到项目完成，工程师们才意识到在整个过程中他们学到了多少东西。"}]}]},{"day":42,"w":"promise","ph":"","defs":[{"pos":"n.&v.","m":"答应；承诺","ex":[{"l":1,"en":"I promise to finish my homework before dinner.","zh":"我承诺在晚饭前完成作业。"},{"l":2,"en":"The teacher promised that whoever got the highest mark would get a small gift.","zh":"老师答应说，无论谁取得最高分，都会得到一份小礼物。"},{"l":3,"en":"Only by keeping your promise can you win the trust of the people around you, however difficult the situation is.","zh":"无论处境多么艰难，只有信守承诺，你才能赢得身边人的信任。"}]}]},{"day":42,"w":"pronounce","ph":"","defs":[{"pos":"v.","m":"发音","ex":[{"l":1,"en":"Can you help me pronounce this new word?","zh":"你能帮我读一下这个新单词吗？"},{"l":2,"en":"When you meet a word you cannot pronounce, you should look it up in the dictionary or ask the teacher for help.","zh":"当你遇到不会发音的单词时，应该查字典或向老师求助。"},{"l":3,"en":"It is pronunciation rather than spelling that troubles most beginners, since English is not always pronounced the way it is written.","zh":"困扰大多数初学者的是发音而非拼写，因为英语并不总是按书写方式来发音。"}]}]},{"day":42,"w":"properly","ph":"","defs":[{"pos":"adv.","m":"恰当地；合适地","ex":[{"l":1,"en":"Please use the machine properly and safely.","zh":"请正确、安全地使用这台机器。"},{"l":2,"en":"If you do not use the machine properly, it may break down and cause danger to the workers nearby.","zh":"如果你不正确使用这台机器，它可能会出故障，并给附近的工人带来危险。"},{"l":3,"en":"Properly managed, a small garden can produce enough vegetables to feed a whole family throughout the year.","zh":"只要管理得当，一个小菜园就能产出足够养活一大家子一整年的蔬菜。"}]}]},{"day":42,"w":"protect","ph":"","defs":[{"pos":"v.","m":"保护","ex":[{"l":1,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物能够利用物理和化学两种方法来保护自己。"},{"l":2,"en":"My father said people should know more about fire safety so that they could protect themselves and their families.","zh":"我父亲说，人们应该多了解消防安全知识，这样才能保护自己和家人。"},{"l":3,"en":"Wearing a helmet is one of the simplest yet most effective ways to protect yourself when riding a bike, no matter how short the trip is.","zh":"无论路程多短，骑车时戴上头盔都是保护自己最简单却最有效的方法之一。"}]}]},{"day":42,"w":"proud","ph":"","defs":[{"pos":"adj.","m":"自豪的；骄傲的","ex":[{"l":1,"en":"I'm proud of him because he has saved people's lives.","zh":"我为他感到骄傲，因为他拯救了人们的生命。"},{"l":2,"en":"Her parents felt very proud of her when they learned that she had won the first prize in the city competition.","zh":"当父母得知她在全市比赛中荣获一等奖时，他们为她感到非常自豪。"},{"l":3,"en":"Proud as he was of his success, he never forgot the teachers who had helped him along the way.","zh":"尽管他为自己的成功感到自豪，却从未忘记一路上帮助过他的老师们。"}]}]},{"day":42,"w":"prove","ph":"","defs":[{"pos":"v.","m":"证明","ex":[{"l":1,"en":"Please show me your ticket to prove it.","zh":"请出示你的票来证明。"},{"l":2,"en":"The scientist did many experiments to prove that this new medicine was safe for children to use.","zh":"这位科学家做了许多实验，以证明这种新药对儿童是安全的。"},{"l":3,"en":"It has been proved that students who read regularly tend to write better and think more clearly than those who do not.","zh":"事实证明，经常阅读的学生比不阅读的学生写作更好、思维更清晰。"}]}]},{"day":42,"w":"proverb","ph":"","defs":[{"pos":"n.","m":"谚语，格言","ex":[{"l":1,"en":"This proverb tells us an important lesson.","zh":"这句谚语告诉我们一个重要的道理。"},{"l":2,"en":"There is an old proverb which says that a friend in need is a friend indeed.","zh":"有一句古老的谚语说，患难见真情。"},{"l":3,"en":"As the well-known proverb goes, where there is a will, there is a way, which encourages us never to give up our dreams.","zh":"正如那句名言所说，有志者事竟成，它鼓励我们永远不要放弃梦想。"}]}]},{"day":42,"w":"provide","ph":"","defs":[{"pos":"v.","m":"提供","ex":[{"l":1,"en":"The school provides free lunch for every student.","zh":"学校为每位学生提供免费午餐。"},{"l":2,"en":"The charity provides warm clothes and hot meals for the children who live in the poor mountain area.","zh":"这家慈善机构为生活在贫困山区的孩子们提供保暖的衣物和热饭热菜。"},{"l":3,"en":"Not only does the library provide books for readers, but it also offers free online courses that anyone can join.","zh":"这家图书馆不仅为读者提供书籍，还提供任何人都能参加的免费在线课程。"}]}]},{"day":42,"w":"public","ph":"","defs":[{"pos":"adj.","m":"公共的，公众的","ex":[{"l":1,"en":"Smoking is not allowed in public places.","zh":"公共场所不允许吸烟。"},{"l":2,"en":"We should keep our voices down in public places so that we do not trouble the people around us.","zh":"我们应在公共场所压低声音，以免打扰周围的人。"},{"l":3,"en":"Good manners in public reflect a person's education, and small actions like queuing up can leave a deep impression on others.","zh":"良好的公共礼仪体现一个人的教养，而排队这样的小举动能给他人留下深刻印象。"}]},{"pos":"n.","m":"公众","ex":[{"l":1,"en":"The museum is open to the public every day.","zh":"这家博物馆每天都向公众开放。"},{"l":2,"en":"The new park, which was built last year, is now open to the public and has become a popular place for families.","zh":"去年建成的新公园现已向公众开放，并已成为家庭喜爱的去处。"},{"l":3,"en":"Hidden from the public for years, the old palace was finally repaired and opened, attracting thousands of visitors each month.","zh":"这座古老的宫殿多年来一直不对外开放，如今终于修缮并开放，每月吸引数千名游客。"}]}]},{"day":42,"w":"publish","ph":"","defs":[{"pos":"v.","m":"出版","ex":[{"l":1,"en":"The company will publish a new magazine next month.","zh":"这家公司下个月将出版一本新杂志。"},{"l":2,"en":"The famous writer said he would publish his new novel as soon as he finished the last chapter.","zh":"这位著名作家说，他一写完最后一章就会出版他的新小说。"},{"l":3,"en":"It was in 1990 that the newspaper first published the story, which later became one of the most loved children's books in the country.","zh":"正是在1990年，这家报纸首次刊登了这个故事，它后来成为国内最受喜爱的儿童读物之一。"}]}]},{"day":42,"w":"pull","ph":"","defs":[{"pos":"v.","m":"拉；拖；拔","ex":[{"l":1,"en":"But our trusty GPS pulled up a map of the area and got us back on track in no time.","zh":"但是我们可靠的GPS调出了该地区的地图，让我们立刻回到了正轨。"},{"l":2,"en":"The strong horse pulled the heavy cart up the hill, although the road was wet and full of stones.","zh":"尽管路面湿滑且布满石头，那匹强壮的马还是把沉重的马车拉上了山。"},{"l":3,"en":"Equipped with a powerful engine, the new train can pull more than twenty carriages, making long-distance travel much faster than before.","zh":"配备了强劲的引擎，这列新火车能拉动二十多节车厢，使长途旅行比从前快得多。"}]}]},{"day":42,"w":"purpose","ph":"","defs":[{"pos":"n.","m":"目的；用途","ex":[{"l":1,"en":"What is the main purpose of this meeting?","zh":"这次会议的主要目的是什么？"},{"l":2,"en":"The main purpose of this club is to help students learn more about science and make new friends at the same time.","zh":"这个俱乐部的主要目的是帮助学生更多地了解科学，同时结交新朋友。"},{"l":3,"en":"For the purpose of improving air quality, the city has planted thousands of trees, which also make the streets look more beautiful.","zh":"为了改善空气质量，这座城市种了数千棵树，这也让街道变得更加美丽。"}]}]},{"day":42,"w":"push","ph":"","defs":[{"pos":"v.&n.","m":"推","ex":[{"l":1,"en":"Please push the door open for me.","zh":"请帮我把门推开。"},{"l":2,"en":"When the car broke down on the way, the two brothers had to push it to the nearest garage to get it repaired.","zh":"当汽车在路上抛锚时，兄弟俩只好把它推到最近的修理厂去维修。"},{"l":3,"en":"Encouraged by his coach, the young runner gave the door a final push of effort and crossed the finish line first in the race.","zh":"在教练的鼓励下，这位年轻的选手最后一刻拼尽全力，率先冲过终点线。"}]}]},{"day":42,"w":"put","ph":"","defs":[{"pos":"v.","m":"放，摆","ex":[{"l":1,"en":"I remember I put too much salt into the pizza.","zh":"我记得我在披萨里放了太多盐。"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，我们把它放到地上时如释重负地长舒一口气，而叔叔的背包却只有半满。"},{"l":3,"en":"Realizing that he had put the key in the wrong pocket, he had to empty everything out and search the whole bag once again.","zh":"意识到自己把钥匙放错了口袋，他不得不把所有东西倒出来，把整个包又找了一遍。"}]}]},{"day":42,"w":"quality","ph":"","defs":[{"pos":"n.","m":"质量","ex":[{"l":1,"en":"The quality of this shirt is very good.","zh":"这件衬衫的质量很好。"},{"l":2,"en":"The shop is popular because it sells clothes of high quality at prices that most students can afford.","zh":"这家店很受欢迎，因为它卖的衣服质量好，而且价格是大多数学生能负担得起的。"},{"l":3,"en":"What really matters is not the price but the quality, since a well-made product can serve you for many years without breaking down.","zh":"真正重要的不是价格而是质量，因为做工精良的产品能使用多年而不坏。"}]}]},{"day":42,"w":"quarter","ph":"","defs":[{"pos":"n.","m":"四分之一；一刻钟","ex":[{"l":1,"en":"It is a quarter past three now.","zh":"现在是三点一刻。"},{"l":2,"en":"By the time we arrived at the station, it was already a quarter to nine, so we missed the early train.","zh":"等我们到达车站时，已经是八点四十五分了，所以我们错过了早班火车。"},{"l":3,"en":"Nearly a quarter of the students in our school take part in after-school clubs, which help them develop skills beyond textbooks.","zh":"我校近四分之一的学生参加课外社团，这帮助他们培养课本之外的能力。"}]}]},{"day":42,"w":"queen","ph":"","defs":[{"pos":"n.","m":"皇后；女王","ex":[{"l":1,"en":"The queen lived in a beautiful palace.","zh":"女王住在一座美丽的宫殿里。"},{"l":2,"en":"Long ago, the queen ordered that everyone in the country should plant a tree to make the land greener.","zh":"很久以前，女王下令全国每个人都要种一棵树，让土地更绿。"},{"l":3,"en":"Crowned queen at a young age, she ruled wisely and was loved by her people throughout her long life.","zh":"她在年轻时便加冕为女王，一生统治有方，深受子民爱戴。"}]}]},{"day":43,"w":"question","ph":"","defs":[{"pos":"n.","m":"问题","ex":[{"l":1,"en":"May I ask you a question?","zh":"我可以问你一个问题吗？"},{"l":2,"en":"The teacher encouraged the students to ask questions whenever they did not understand what was taught in class.","zh":"老师鼓励学生只要不明白课堂上讲的内容就提问。"},{"l":3,"en":"The key question we must answer is not what to learn, but how to learn wisely and keep curious about the world.","zh":"我们必须回答的关键问题不是学什么，而是如何智慧地学习并保持对世界的好奇。"}]}]},{"day":43,"w":"quick","ph":"","defs":[{"pos":"adj.","m":"快的；敏捷的；迅速的","ex":[{"l":1,"en":"He is a quick runner in our class.","zh":"他是我们班跑得快的人。"},{"l":2,"en":"Tom is so quick at maths that he can usually work out the hardest problems before the other students finish reading them.","zh":"汤姆数学反应很快，通常其他同学还没读完题，他就能算出最难的题目。"},{"l":3,"en":"Quick thinking saved the boy from danger when a car suddenly turned the corner and rushed toward him on the narrow street.","zh":"当一辆汽车突然拐角冲向这条狭窄街道上的男孩时，敏捷的思维让他化险为夷。"}]}]},{"day":43,"w":"quickly","ph":"","defs":[{"pos":"adv.","m":"快地；讯速地","ex":[{"l":1,"en":"He finished his homework quickly.","zh":"他很快就完成了作业。"},{"l":2,"en":"When the bell rang, all the students quickly ran back to the classroom so that they would not be late.","zh":"铃响时,所有学生迅速跑回教室,以便不会迟到。"},{"l":3,"en":"Only when we finish the task quickly can we have more time to review what we have learned this term.","zh":"只有当我们迅速完成任务时,我们才能有更多时间复习本学期所学的内容。"}]}]},{"day":43,"w":"quiet","ph":"","defs":[{"pos":"adj.","m":"安静的","ex":[{"l":1,"en":"Please keep quiet in the library.","zh":"请在图书馆里保持安静。"},{"l":2,"en":"The teacher asked us to be quiet because the students next door were having an important exam.","zh":"老师让我们安静下来,因为隔壁的学生正在进行一场重要的考试。"},{"l":3,"en":"Quiet as the boy is in class, he is actually one of the most active members in our school basketball club.","zh":"尽管这男孩在课堂上很安静,他实际上是我们学校篮球俱乐部最活跃的成员之一。"}]}]},{"day":43,"w":"quietly","ph":"","defs":[{"pos":"adv.","m":"安静地","ex":[{"l":1,"en":"She quietly closed the door.","zh":"她悄悄地关上了门。"},{"l":2,"en":"The children listened quietly while the teacher was telling them an interesting story about animals.","zh":"当老师给他们讲一个关于动物的有趣故事时,孩子们安静地听着。"},{"l":3,"en":"Walking quietly into the room, he did not want to wake up his little sister, who had been sick for two days.","zh":"他悄悄地走进房间,不想吵醒已经病了两天的妹妹。"}]}]},{"day":43,"w":"quite","ph":"","defs":[{"pos":"adv.","m":"完全；十分；相当","ex":[{"l":1,"en":"The film is quite interesting.","zh":"这部电影相当有趣。"},{"l":2,"en":"I am quite sure that he will come to the party, although he has not answered my message yet.","zh":"我相当确信他会来参加聚会,尽管他还没有回复我的消息。"},{"l":3,"en":"It is quite natural that beginners make mistakes; what matters most is that they keep trying.","zh":"初学者犯错是相当正常的;最重要的是他们不断尝试。"}]}]},{"day":43,"w":"quiz","ph":"","defs":[{"pos":"n.","m":"测验","ex":[{"l":1,"en":"We will have a math quiz tomorrow.","zh":"我们明天有一个数学小测验。"},{"l":2,"en":"The teacher told us that the quiz would cover everything we had learned in the past two weeks.","zh":"老师告诉我们,这次小测验将涵盖我们过去两周学到的所有内容。"},{"l":3,"en":"Nervous as she was before the English quiz, she managed to get the highest mark in her class.","zh":"尽管她在英语小测验前很紧张,她还是设法拿到了全班最高分。"}]}]},{"day":43,"w":"race","ph":"","defs":[{"pos":"n.","m":"比赛；赛跑","ex":[{"l":1,"en":"He won the running race.","zh":"他赢得了赛跑比赛。"},{"l":2,"en":"The race, which was held last Sunday, attracted more than two hundred runners from different schools.","zh":"上周日举行的比赛吸引了两百多名来自不同学校的参赛者。"},{"l":3,"en":"Taking part in the race not only builds up our body but also teaches us the value of never giving up.","zh":"参加比赛不仅能强健体魄,还能教会我们永不放弃的价值。"}]},{"pos":"v.","m":"赛跑","ex":[{"l":1,"en":"They raced to the bus stop.","zh":"他们冲向公交车站。"},{"l":2,"en":"As soon as the bell rang, the children raced out of the classroom to play on the playground.","zh":"铃声一响,孩子们就冲出教室到操场上玩耍。"},{"l":3,"en":"Having raced against time for three days, the rescue team finally reached the village cut off by the heavy snow.","zh":"与时间赛跑了三天后,救援队终于抵达被大雪封锁的村庄。"}]}]},{"day":43,"w":"radio","ph":"","defs":[{"pos":"n.","m":"无线电；收音机","ex":[{"l":1,"en":"Dees this radio belong to you?","zh":"这台收音机是你的吗?"},{"l":2,"en":"My grandfather still listens to the news on the radio every morning, although he has owned a smart phone for years.","zh":"我爷爷仍然每天早上用收音机听新闻,尽管他已经用智能手机很多年了。"},{"l":3,"en":"It was through the old radio that the lonely old lady first got to know the wider world outside her small village.","zh":"正是通过这台旧收音机,这位孤独的老奶奶才第一次了解到她小村庄之外更广阔的世界。"}]}]},{"day":43,"w":"railway","ph":"","defs":[{"pos":"n.","m":"铁路，铁道","ex":[{"l":1,"en":"A new railway was built here.","zh":"这里修建了一条新铁路。"},{"l":2,"en":"The railway that connects the two cities makes it much easier for people to travel for work.","zh":"连接两座城市的铁路让人们出行上班变得容易多了。"},{"l":3,"en":"Completed last year, the new railway has greatly improved the life of the people living in this mountain area.","zh":"这条去年建成的新铁路极大地改善了生活在这片山区的人们的生活。"}]}]},{"day":43,"w":"rain","ph":"","defs":[{"pos":"n.","m":"雨，雨水","ex":[{"l":1,"en":"There is a lot of rain in the south of China, but not as much in the north.","zh":"中国南方雨量充沛,但北方没有那么多。"},{"l":2,"en":"After several days of heavy rain, the river rose so high that many roads in the town were covered by water.","zh":"连续几天下大雨后,河水涨得那么高,镇上许多道路都被水淹没了。"},{"l":3,"en":"The farmers had been worrying about the lack of rain until a sudden shower saved their crops last weekend.","zh":"农民们一直为缺雨发愁,直到上周末一场骤雨救了他们的庄稼。"}]},{"pos":"v.","m":"下雨","ex":[{"l":1,"en":"There is a lot of rain in the south of China, but not as much in the north.","zh":"中国南方雨水很多,但北方没有那么多。"},{"l":2,"en":"If it rains heavily tomorrow, we will have to put off the school sports meeting until next Friday.","zh":"如果明天下大雨,我们将不得不把校运动会推迟到下周五。"},{"l":3,"en":"It has been raining for a whole week, which makes the river rise to a dangerous level and threatens the village nearby.","zh":"已经下了一整周的雨,这使河水上涨到危险水位,威胁着附近的村庄。"}]}]},{"day":43,"w":"rainy","ph":"","defs":[{"pos":"adj.","m":"有雨的；多雨的","ex":[{"l":1,"en":"It is a rainy day today.","zh":"今天是个雨天。"},{"l":2,"en":"On rainy days, I prefer to stay at home and read a good book rather than go out to play.","zh":"下雨天,我宁愿待在家里读一本好书,也不愿出去玩。"},{"l":3,"en":"Even on a rainy afternoon, the young volunteer kept delivering food to the elderly who lived alone.","zh":"即使在一个下雨的下午,这位年轻的志愿者仍坚持为独居老人送餐。"}]}]},{"day":43,"w":"raise","ph":"","defs":[{"pos":"vt.","m":"举起；使升高；饲养，抚养；筹钱","ex":[{"l":1,"en":"Please raise your hand.","zh":"请举手。"},{"l":2,"en":"The students organized a charity sale to raise money for the children who lost their homes in the flood.","zh":"学生们组织了一次义卖,为在洪水中失去家园的孩子们筹款。"},{"l":3,"en":"Raised by his grandparents in the countryside, the boy has developed a deep love for nature and simple life.","zh":"由祖父母在乡下抚养长大,这个男孩对自然和简单的生活产生了深深的热爱。"}]}]},{"day":43,"w":"rarely","ph":"","defs":[{"pos":"adv.","m":"罕有；很少；不常","ex":[{"l":1,"en":"He is rarely late for school.","zh":"他很少上学迟到。"},{"l":2,"en":"She rarely watches TV on weekdays because she believes that reading is much more useful for her studies.","zh":"她工作日很少看电视,因为她相信阅读对她的学习更有用。"},{"l":3,"en":"Rarely do we realize how much our parents have done for us until we leave home and live on our own.","zh":"我们很少意识到父母为我们付出了多少,直到我们离家独立生活。"}]}]},{"day":43,"w":"rather","ph":"","defs":[{"pos":"adv.","m":"相当，颇；宁可","ex":[{"l":1,"en":"It is rather cold today.","zh":"今天相当冷。"},{"l":2,"en":"I would rather stay at home and help my mother than go shopping with my friends this weekend.","zh":"这个周末我宁愿待在家帮妈妈,也不愿和朋友去购物。"},{"l":3,"en":"It is rather surprising that such a young student has read so many classical novels written by famous writers.","zh":"相当令人惊讶的是,这样一个年纪小的学生竟然读了那么多著名作家写的古典小说。"}]}]},{"day":43,"w":"reach","ph":"","defs":[{"pos":"v.","m":"到达","ex":[{"l":1,"en":"When we reached the houses in the late afternoon, we were tired.","zh":"傍晚我们到达那些房子时,我们都很累。"},{"l":2,"en":"This is because the lower leaves are easier for most animals to reach.","zh":"这是因为较低的叶子对大多数动物来说更容易够到。"},{"l":3,"en":"Only after they had reached the top of the mountain did the climbers realize how beautiful the whole city looked below.","zh":"直到登山者到达山顶后,他们才意识到下面的整座城市看起来多么美丽。"}]}]},{"day":43,"w":"read","ph":"","defs":[{"pos":"v.","m":"读；朗读","ex":[{"l":1,"en":"Now read,please.","zh":"现在请朗读。"},{"l":2,"en":"First find out about the school.Read the school introductions and look at the school websites.Then think about yourself—your strong points and weak ones.Try to find a few examples you could give the interviewers.","zh":"首先了解这所学校。阅读学校介绍,查看学校网站。然后想想你自己——你的长处和短处。尽量找一些你可以给面试官的例子。"},{"l":3,"en":"Having read the book three times, he finally understood the deep meaning the writer wanted to share with young readers.","zh":"读了三遍这本书后,他终于理解了作者想与年轻读者分享的深层含义。"}]}]},{"day":43,"w":"ready","ph":"","defs":[{"pos":"adj.","m":"准备好的；乐于","ex":[{"l":1,"en":"Are you ready for the test?","zh":"你为考试准备好了吗?"},{"l":2,"en":"We must get everything ready before the guests arrive so that they will feel welcome at our home.","zh":"我们必须在客人到达之前把一切准备好,这样他们才会觉得在我们家受到欢迎。"},{"l":3,"en":"Ready to face any difficulty, the young scientist continued her research although many people doubted her idea.","zh":"准备好面对任何困难,这位年轻的科学家继续她的研究,尽管许多人怀疑她的想法。"}]}]},{"day":43,"w":"real","ph":"","defs":[{"pos":"adj.","m":"真实的，确实的；真正的","ex":[{"l":1,"en":"This is a real story.","zh":"这是一个真实的故事。"},{"l":2,"en":"The teacher told us that real friends are those who stay with us when we are in trouble.","zh":"老师告诉我们,真正的朋友是那些在我们遇到困难时留在我们身边的人。"},{"l":3,"en":"What the old man said made us realize that real happiness does not come from money but from love and kindness.","zh":"老人说的话让我们意识到,真正的幸福并非来自金钱,而是来自爱与善良。"}]}]},{"day":43,"w":"realize","ph":"","defs":[{"pos":"v.","m":"认识到；实现","ex":[{"l":1,"en":"I realize my mistake now.","zh":"我现在意识到我的错误了。"},{"l":2,"en":"When I saw the old photos, I suddenly realized how fast time had passed since I entered middle school.","zh":"当我看到那些旧照片时,我突然意识到自从我上中学以来时间过得有多快。"},{"l":3,"en":"Not until he lost the match did he realize how much more effort he needed to make his dream of being a champion come true.","zh":"直到输掉比赛,他才意识到要实现成为冠军的梦想,他还需要付出多少努力。"}]}]},{"day":43,"w":"really","ph":"","defs":[{"pos":"adv.","m":"真正地，确实地","ex":[{"l":1,"en":"I really don't know.","zh":"我真的不知道。"},{"l":2,"en":"I really think the school will develop with success.","zh":"我确实认为这所学校会发展成功。"},{"l":3,"en":"I really believe that if we keep practising every day, our spoken English will improve more quickly than we expect.","zh":"我确实相信，如果我们每天坚持练习，我们的英语口语会比我们预想的进步得更快。"}]}]},{"day":43,"w":"reason","ph":"","defs":[{"pos":"n.","m":"理由，原因","ex":[{"l":1,"en":"That is the main reason for his being late.","zh":"那是他迟到的主要原因。"},{"l":2,"en":"The reason why he was absent is that he had a high fever and could hardly get out of bed.","zh":"他缺席的原因是他发高烧，几乎下不了床。"},{"l":3,"en":"There are several reasons why reading matters, but the most important one is that it opens a window to the wider world.","zh":"阅读之所以重要有几个原因，但最重要的一点是它为我们打开了一扇通往更广阔世界的窗。"}]}]},{"day":43,"w":"rebuild","ph":"","defs":[{"pos":"v.","m":"重建","ex":[{"l":1,"en":"They plan to rebuild the old bridge.","zh":"他们计划重建那座旧桥。"},{"l":2,"en":"After the earthquake, the villagers decided to rebuild their houses so that children could return to a safe home.","zh":"地震过后，村民们决定重建房屋，以便孩子们能回到安全的家。"},{"l":3,"en":"It took them three years to rebuild the town, which had been almost destroyed by the terrible storm.","zh":"他们花了三年时间才重建那座几乎被可怕的风暴摧毁的小镇。"}]}]},{"day":43,"w":"receive","ph":"","defs":[{"pos":"v.","m":"收到；得到","ex":[{"l":1,"en":"I received a letter from my friend yesterday.","zh":"昨天我收到了朋友的一封信。"},{"l":2,"en":"When she received the good news, she was so excited that she could not help jumping up.","zh":"当她收到这个好消息时，她激动得忍不住跳了起来。"},{"l":3,"en":"Not until I received the invitation did I realize that I had been chosen to take part in the international summer camp.","zh":"直到收到邀请，我才意识到自己已被选中参加这个国际夏令营。"}]}]},{"day":43,"w":"recent","ph":"","defs":[{"pos":"adj.","m":"近来的；最近的","ex":[{"l":1,"en":"He told me about his recent trip to Beijing.","zh":"他跟我讲了最近去北京旅行的事。"},{"l":2,"en":"In a recent survey, most students said that they preferred reading paper books to using e-books.","zh":"在最近的一项调查中，大多数学生说他们比起电子书更喜欢读纸质书。"},{"l":3,"en":"According to a recent report, the number of young people who choose to study abroad has increased sharply over the past few years.","zh":"根据最近的一份报告，近几年选择出国留学的年轻人数量大幅增加。"}]}]},{"day":43,"w":"recently","ph":"","defs":[{"pos":"adv.","m":"近来；最近","ex":[{"l":1,"en":"I have not seen him recently.","zh":"我最近没有见过他。"},{"l":2,"en":"She has been very busy recently because she is preparing for an important speech contest.","zh":"她最近一直很忙，因为她正在为一个重要的演讲比赛做准备。"},{"l":3,"en":"The company has recently developed a new kind of material which is both lighter and stronger than the old one.","zh":"这家公司最近研发出了一种既比旧的更轻、也更坚固的新型材料。"}]}]},{"day":43,"w":"recognize","ph":"","defs":[{"pos":"v.","m":"辨认出；认识","ex":[{"l":1,"en":"I recognized her voice at once.","zh":"我立刻听出了她的声音。"},{"l":2,"en":"Although we had not seen each other for ten years, I recognized him the moment he walked in.","zh":"虽然我们十年没见面了，但他一走进来我就认出了他。"},{"l":3,"en":"It was in the crowded station that I finally recognized the old friend whom I had been trying to find for years.","zh":"正是在那个拥挤的车站，我终于认出了多年来一直努力寻找的老朋友。"}]}]},{"day":43,"w":"record","ph":"","defs":[{"pos":"n.","m":"记录；唱片","ex":[{"l":1,"en":"She holds the school record for the high jump.","zh":"她保持着这所学校跳高的纪录。"},{"l":2,"en":"The athlete broke the world record, which made people all over the country very proud.","zh":"这位运动员打破了世界纪录，这让全国人民都非常自豪。"},{"l":3,"en":"What surprised us most was that the young swimmer set a new national record at the age of only fifteen.","zh":"最让我们惊讶的是，这位年轻的游泳运动员在仅十五岁时就刷新了全国纪录。"}]},{"pos":"v.","m":"录制，录音；记录","ex":[{"l":1,"en":"He wants to record the song again.","zh":"他想把这首歌重新录一遍。"},{"l":2,"en":"The teacher asked us to record what we saw during the trip so that we could write a report later.","zh":"老师让我们记录旅途中看到的内容，以便之后写报告。"},{"l":3,"en":"Having recorded every detail of the experiment, the students began to discuss what the result might mean.","zh":"把实验的每一个细节都记录下来之后，学生们开始讨论这个结果可能意味着什么。"}]}]},{"day":43,"w":"recycle","ph":"","defs":[{"pos":"v.","m":"回收利用；使再循环","ex":[{"l":1,"en":"We should recycle waste paper.","zh":"我们应该回收废纸。"},{"l":2,"en":"If we recycle plastic bottles and cans, we can help protect the environment that we all depend on.","zh":"如果我们回收塑料瓶和易拉罐，就能帮助保护我们赖以生存的环境。"},{"l":3,"en":"Only by learning to recycle and reuse old things can we leave a cleaner and more beautiful world to the next generation.","zh":"只有学会回收和再利用旧物，我们才能为下一代留下一个更清洁、更美丽的世界。"}]}]},{"day":43,"w":"red","ph":"","defs":[{"pos":"adj.","m":"红色的","ex":[{"l":1,"en":"If you mix red and yellow, what colour will you get?","zh":"如果你把红色和黄色混合，你会得到什么颜色？"},{"l":2,"en":"She wore a red dress, which made her look especially lively among all the guests at the party.","zh":"她穿着一条红色的连衣裙，这让她在聚会的所有客人中显得格外活泼。"},{"l":3,"en":"The little girl was dressed in a bright red coat so that her parents could easily find her in the crowded park.","zh":"小女孩穿着一件鲜红色的大衣，这样她的父母就能在拥挤的公园里很容易地找到她。"}]},{"pos":"n.","m":"红色","ex":[{"l":1,"en":"If you mix red and yellow, what colour will you get?","zh":"如果你把红色和黄色混合，你会得到什么颜色？"},{"l":2,"en":"In Chinese culture, red is the colour that stands for good luck and happiness during festivals.","zh":"在中国文化中，红色是节日期间代表好运和幸福的颜色。"},{"l":3,"en":"It is said that red can make people feel warm and active, which is why many restaurants paint their walls this colour.","zh":"据说红色能让人感到温暖和积极，这就是为什么许多餐馆把墙壁刷成这种颜色的原因。"}]}]},{"day":44,"w":"reduce","ph":"","defs":[{"pos":"v.","m":"减少；缩减","ex":[{"l":1,"en":"We must reduce waste in daily life.","zh":"我们在日常生活中必须减少浪费。"},{"l":2,"en":"We should reduce the time we spend on phones so that we have more time for outdoor activities.","zh":"我们应该减少花在手机上的时间，以便有更多时间进行户外活动。"},{"l":3,"en":"In order to reduce air pollution, the government encourages people to take public transport instead of driving private cars.","zh":"为了减少空气污染，政府鼓励人们乘坐公共交通工具而不是开私家车。"}]}]},{"day":44,"w":"reference","ph":"","defs":[{"pos":"n.","m":"参考","ex":[{"l":1,"en":"This book is a good reference for beginners.","zh":"这本书对初学者是很好的参考。"},{"l":2,"en":"When you write a report, you should list the books you used for reference at the end.","zh":"写报告时，你应该在末尾列出用作参考的书籍。"},{"l":3,"en":"The teacher advised us to keep a notebook for reference, which would be helpful whenever we needed to look up key points.","zh":"老师建议我们准备一个笔记本作为参考，每当需要查阅要点时都会很有帮助。"}]}]},{"day":44,"w":"refuse","ph":"","defs":[{"pos":"v.","m":"拒绝；不愿","ex":[{"l":1,"en":"He refused to tell a lie.","zh":"他拒绝说谎。"},{"l":2,"en":"Although his friends invited him to the party, he refused because he had to look after his sick mother.","zh":"尽管朋友们邀请他去聚会，他还是拒绝了，因为他得照顾生病的母亲。"},{"l":3,"en":"She refused to give up her dream no matter how many difficulties lay ahead on her way to success.","zh":"无论在通往成功的路上有多少困难，她都拒绝放弃自己的梦想。"}]}]},{"day":44,"w":"regular","ph":"","defs":[{"pos":"adj.","m":"规则的；经常的","ex":[{"l":1,"en":"Try to do regular sports. The mind needs exercise as well as the body.","zh":"尽量做规律的运动。大脑和身体一样需要锻炼。"},{"l":2,"en":"Regular exercise not only keeps the body strong but also helps the mind stay calm and clear.","zh":"规律的运动不仅使身体强壮，还能帮助大脑保持平静和清醒。"},{"l":3,"en":"Students who form regular study habits tend to make greater progress than those who only study hard before exams.","zh":"养成规律学习习惯的学生，往往比那些只在考前才用功的学生进步更大。"}]}]},{"day":44,"w":"relationship","ph":"","defs":[{"pos":"n.","m":"关系","ex":[{"l":1,"en":"Sharing a new experience develops stronger relationships and creates long-lasting memories.","zh":"分享新的经历能建立更牢固的关系，并创造持久的回忆。"},{"l":2,"en":"To sum up, experiences make us who we are and develop stronger relationships.","zh":"总而言之，经历造就了我们，并建立起更牢固的关系。"},{"l":3,"en":"What truly matters in a good relationship is not how much time we spend together, but how deeply we understand each other.","zh":"在一段好的关系中，真正重要的不是我们在一起待了多久，而是我们彼此理解得有多深。"}]}]},{"day":44,"w":"relative","ph":"","defs":[{"pos":"n.","m":"亲戚","ex":[{"l":1,"en":"My relatives came to visit us last week.","zh":"上周我的亲戚来看望我们。"},{"l":2,"en":"During the Spring Festival, many relatives gather together to share a big dinner and exchange good wishes.","zh":"春节期间，许多亲戚聚在一起共享丰盛的晚餐，互致美好的祝愿。"},{"l":3,"en":"Whenever I meet my relatives during the holidays, I realize how lucky I am to grow up in such a warm and loving family.","zh":"每当假期见到亲戚，我都会意识到自己能在这样一个温暖有爱的家庭中长大是多么幸运。"}]}]},{"day":44,"w":"relax","ph":"","defs":[{"pos":"v.","m":"(使)放松，轻松","ex":[{"l":1,"en":"Let us relax after dinner.","zh":"让我们饭后放松一下。"},{"l":2,"en":"Listening to soft music is a good way to relax after a long and tiring day at school.","zh":"在学校漫长而劳累的一天后，听轻柔的音乐是放松的好方法。"},{"l":3,"en":"Only when we learn to relax properly can we keep enough energy to face the new challenges of the coming week.","zh":"只有学会恰当地放松，我们才能保持足够的精力去迎接新一周的挑战。"}]}]},{"day":44,"w":"release","ph":"","defs":[{"pos":"v.&n.","m":"释放，排放；发行，发表","ex":[{"l":1,"en":"The factory will release waste water into the river.","zh":"这家工厂将把废水排入河中。"},{"l":2,"en":"The band will release their new album next month, which is expected to be popular among young people.","zh":"这支乐队下个月将发行新专辑，预计会在年轻人中很受欢迎。"},{"l":3,"en":"The news of the new film's release spread quickly, and thousands of fans queued up outside the cinema to buy tickets.","zh":"这部新片上映的消息迅速传开，成千上万的影迷在影院外排队买票。"}]}]},{"day":44,"w":"rely","ph":"","defs":[{"pos":"v.","m":"依靠","ex":[{"l":1,"en":"You can rely on me when you are in trouble.","zh":"你有困难时可以依靠我。"},{"l":2,"en":"Many students rely on their parents so much that they cannot solve problems on their own.","zh":"许多学生如此依赖父母，以至于无法独立解决问题。"},{"l":3,"en":"What we should always remember is that relying on ourselves is the first step towards real independence.","zh":"我们应当永远记住：依靠自己才是迈向真正独立的第一步。"}]}]},{"day":44,"w":"remember","ph":"","defs":[{"pos":"v.","m":"记得；想起","ex":[{"l":1,"en":"I don't remember where I was then.","zh":"我不记得当时我在哪里。"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在游学途中遇到一些青少年，现在仍与他们保持联系，但我几乎不记得旅行中买了什么。"},{"l":3,"en":"No matter how long time passes, I will always remember the days when we studied together in that small classroom.","zh":"无论时光如何流逝，我都会永远记得我们一起在那间小教室里学习的日子。"}]}]},{"day":44,"w":"remind","ph":"","defs":[{"pos":"v.","m":"提醒","ex":[{"l":1,"en":"Please remind me to call my grandma tonight.","zh":"请提醒我今晚给奶奶打电话。"},{"l":2,"en":"I reminded him that he had promised to finish the report before Friday.","zh":"我提醒他，他曾答应在周五前完成那份报告。"},{"l":3,"en":"Whenever I see this old photo, it reminds me of the summer when we worked together as volunteers in the village.","zh":"每当我看到这张旧照片，它就会让我想起我们一起在村里当志愿者的那个夏天。"}]}]},{"day":44,"w":"repair","ph":"","defs":[{"pos":"n.&v.","m":"修理","ex":[{"l":1,"en":"My father is repairing the broken bike.","zh":"我爸爸正在修理那辆坏自行车。"},{"l":2,"en":"The shop where I had my computer repaired last week is closed today.","zh":"我上周修理电脑的那家店今天关门了。"},{"l":3,"en":"Instead of buying a new one, he decided to have the old watch repaired, which had been passed down from his grandfather.","zh":"他没有买新的，而是决定修好那块从爷爷那里传下来的旧手表。"}]}]},{"day":44,"w":"repeat","ph":"","defs":[{"pos":"v.","m":"重复","ex":[{"l":1,"en":"Listen and repeat.","zh":"听并跟读。"},{"l":2,"en":"The teacher asked us to repeat the sentence until we could say it correctly.","zh":"老师让我们反复读这个句子，直到能正确说出为止。"},{"l":3,"en":"Listening and repeating may seem simple, but it is exactly how we build the confidence to speak a foreign language fluently.","zh":"听和跟读看似简单，但这正是我们建立流利说外语信心
