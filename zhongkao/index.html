sleep.","zh":"睡觉前请把灯关掉。"},{"l":2,"en":"When the power went out, Mother lit a lamp so that we could finish our homework.","zh":"停电时，妈妈点了一盏灯，这样我们就能完成作业。"},{"l":3,"en":"The warm light from the desk lamp made the whole room so cozy that I didn't want to leave at all.","zh":"台灯散发的暖光让整个房间如此温馨，以至于我一点也不想离开。"}]}]},{"day":30,"w":"land","ph":"","defs":[{"pos":"n.","m":"陆地；土地","ex":[{"l":1,"en":"They measure land, air space, and water areas.","zh":"他们测量陆地、领空和水域。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它的修建是为了把粮食从中国南方肥沃的农田运到北方的城市。"},{"l":3,"en":"After sailing for many days, the travelers were overjoyed to see land appearing on the far horizon.","zh":"航行了许多天后，旅行者们看到远处地平线上出现了陆地，欣喜若狂。"}]},{"pos":"v.","m":"登陆；降落","ex":[{"l":1,"en":"The plane will land in ten minutes.","zh":"飞机将在十分钟后降落。"},{"l":2,"en":"The pilot told us that the plane would land safely although the weather was bad.","zh":"飞行员告诉我们，尽管天气不好，飞机也会安全降落。"},{"l":3,"en":"No sooner had the plane landed at the small airport than a crowd of reporters rushed toward it with cameras.","zh":"飞机刚在那个小机场降落，一群记者就举着相机冲了过去。"}]}]},{"day":30,"w":"language","ph":"","defs":[{"pos":"n.","m":"语言","ex":[{"l":1,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"路易丝现在十三岁，目前正在学习汉语，汉语已成为和英语一样重要的世界语言。路易丝有许多中国朋友，他们通过电脑交流。"},{"l":2,"en":"Many people believe that learning a foreign language can open a window to a different world.","zh":"许多人相信，学习一门外语能打开一扇通向不同世界的窗户。"},{"l":3,"en":"The more languages you master, the easier it becomes for you to communicate with people from all over the world.","zh":"你掌握的语言越多，与来自世界各地的人交流就越容易。"}]}]},{"day":30,"w":"lantern","ph":"","defs":[{"pos":"n.","m":"灯笼","ex":[{"l":1,"en":"The red lantern looks very beautiful.","zh":"那个红灯笼看起来很漂亮。"},{"l":2,"en":"During the Spring Festival, people hang red lanterns outside their houses to welcome the new year.","zh":"春节期间，人们把红灯笼挂在屋外，以迎接新年。"},{"l":3,"en":"Lit up at night, the paper lanterns along the old street create a festive atmosphere that attracts many visitors.","zh":"夜晚点亮后，老街两旁的纸灯笼营造出一种吸引许多游客的节日气氛。"}]}]},{"day":30,"w":"large","ph":"","defs":[{"pos":"adj.","m":"大的；巨大的","ex":[{"l":1,"en":"They live in a large house.","zh":"他们住在一所大房子里。"},{"l":2,"en":"The zoo is so large that we spent the whole morning walking through only half of it.","zh":"这个动物园很大，我们花了一整个上午也只走完了一半。"},{"l":3,"en":"Such a large number of students took part in the speech contest that the hall was almost full.","zh":"如此多的学生参加了演讲比赛，以至于大厅几乎坐满了。"}]}]},{"day":30,"w":"last","ph":"","defs":[{"pos":"adj.","m":"最近刚过去的；最后的","ex":[{"l":1,"en":"How do you spell your last name?","zh":"你的姓怎么拼写？"},{"l":2,"en":"For example, getting expensive clothes didn't change me as a person, but the camping trip last summer certainly did.","zh":"例如，买昂贵的衣服并没有改变我这个人，但去年夏天的露营之旅确实改变了我。"},{"l":3,"en":"The last time I visited my hometown, I was surprised to find that the old market had been turned into a modern mall.","zh":"上次我回故乡时，我惊讶地发现那个旧市场已经变成了一座现代商场。"}]},{"pos":"adv.","m":"最近刚过去；最后地","ex":[{"l":1,"en":"He came to school last and missed the first bus.","zh":"他最后才到学校，错过了第一班车。"},{"l":2,"en":"When I arrived last at the station, the train had already left without me.","zh":"当我最后到达车站时，火车已经丢下我开走了。"},{"l":3,"en":"Whoever arrives last at the meeting tomorrow will have to sing a song in front of the whole class.","zh":"明天开会时最后到达的人，必须在全班面前唱一首歌。"}]},{"pos":"n.","m":"最后","ex":[{"l":1,"en":"At last, we finished the work.","zh":"最后，我们完成了工作。"},{"l":2,"en":"At last, the missing dog was found by a kind farmer who lived near the forest.","zh":"最后，那只走失的狗被住在森林附近的一位好心的农民找到了。"},{"l":3,"en":"From the first to the last, the movie kept us so excited that nobody said a word during the whole two hours.","zh":"从头到尾，这部电影都让我们如此兴奋，整整两个小时里没有一个人说话。"}]},{"pos":"v.","m":"持续；延续","ex":[{"l":1,"en":"The meeting will last an hour.","zh":"会议将持续一个小时。"},{"l":2,"en":"The teacher said the exam would last two hours, so we had to manage our time well.","zh":"老师说考试将持续两个小时，所以我们必须合理安排时间。"},{"l":3,"en":"However hard the storm tried, it could not last long, and the sun soon broke through the dark clouds.","zh":"无论风暴多么猛烈，它也持续不了多久，太阳很快就冲破了乌云。"}]}]},{"day":30,"w":"late","ph":"","defs":[{"pos":"adj.","m":"晚的；迟的","ex":[{"l":1,"en":"Had I taken a taxi, I wouldn't have been late.","zh":"要是当时我坐了出租车，就不会迟到了。"},{"l":2,"en":"When we reached the houses in the late afternoon, we were tired.","zh":"傍晚时分我们到达那些房子时，已经很累了。"},{"l":3,"en":"It was already late when we set off, yet we still hoped to reach the top of the mountain before sunset.","zh":"我们出发时已经很晚了，但我们仍希望能在日落前到达山顶。"}]},{"pos":"adv.","m":"晚地；迟地","ex":[{"l":1,"en":"He got up late this morning.","zh":"他今天早上起晚了。"},{"l":2,"en":"Because he worked late last night, he felt very sleepy during the morning class.","zh":"因为昨晚工作到很晚，他上午上课时非常困。"},{"l":3,"en":"No matter how late he returns home, his mother always keeps a warm meal waiting on the table.","zh":"无论他多晚回家，妈妈总会在桌上留着一顿热饭等着他。"}]}]},{"day":30,"w":"later","ph":"","defs":[{"pos":"adj.","m":"晚些的，迟些的","ex":[{"l":1,"en":"We will talk about the problem at a later time.","zh":"我们会在晚些时候讨论这个问题。"},{"l":2,"en":"The teacher told us that the meeting would be held at a later time so that everyone could come.","zh":"老师告诉我们，会议将推迟到晚些时候举行，这样大家都能来。"},{"l":3,"en":"It was not until a later stage of the project that the team realized how much work remained to be done.","zh":"直到项目的较晚阶段，团队才意识到还有多少工作要做。"}]},{"pos":"adv.","m":"后来，以后","ex":[{"l":1,"en":"I will call you later this evening.","zh":"我今晚会晚些时候给你打电话。"},{"l":2,"en":"Later that day, we found out that the bus had broken down on the way to the museum.","zh":"那天晚些时候，我们才发现去博物馆的半路上公交车抛锚了。"},{"l":3,"en":"He worked as a volunteer in the library for two years, and later decided to study literature at college.","zh":"他在图书馆做了两年志愿者，后来决定在大学里学习文学。"}]}]},{"day":30,"w":"laugh","ph":"","defs":[{"pos":"v.&n.","m":"笑，大笑；嘲笑","ex":[{"l":1,"en":"The funny story made all the children laugh.","zh":"这个有趣的故事让所有孩子都笑了起来。"},{"l":2,"en":"When he gave the wrong answer, he was afraid that his classmates would laugh at him.","zh":"当他答错时，他担心同学们会嘲笑他。"},{"l":3,"en":"Although she felt hurt by their laugh, she still smiled and joined in the game bravely.","zh":"尽管他们的嘲笑让她感到受伤，她仍然微笑着，勇敢地加入了游戏。"}]}]},{"day":30,"w":"law","ph":"","defs":[{"pos":"n.","m":"法律","ex":[{"l":1,"en":"Everyone must obey the law in our country.","zh":"在我国，每个人都必须遵守法律。"},{"l":2,"en":"The new law says that young people under sixteen are not allowed to drive a car on the road.","zh":"新法律规定，十六岁以下的年轻人不允许在马路上开车。"},{"l":3,"en":"It is widely believed that the law should protect those who cannot protect themselves in society.","zh":"人们普遍认为，法律应该保护社会上那些无法保护自己的人。"}]}]},{"day":30,"w":"lawyer","ph":"","defs":[{"pos":"n.","m":"律师","ex":[{"l":1,"en":"Uncle Andy tried ten different jobs, and finally chose to be a lawyer.","zh":"安迪叔叔尝试过十种不同的工作，最后选择当一名律师。"},{"l":2,"en":"After years of hard work, she became a lawyer who helped poor people protect their rights.","zh":"经过多年的努力，她成为一名帮助穷人维护权益的律师。"},{"l":3,"en":"The lawyer not only explained the case clearly but also made the jury believe what he said.","zh":"这位律师不仅清楚地解释了这个案子，还让陪审团相信了他所说的话。"}]}]},{"day":30,"w":"lay","ph":"","defs":[{"pos":"v.","m":"放，搁；下（蛋）","ex":[{"l":1,"en":"Please lay the book on the table.","zh":"请把书放在桌子上。"},{"l":2,"en":"The mother bird laid her eggs in the nest that she had built in the tall tree.","zh":"母鸟把蛋产在她搭在高树上的鸟窝里。"},{"l":3,"en":"The farmer laid the basket on the ground and sat down to rest under the tree, feeling really tired.","zh":"农夫把篮子放在地上，坐在树下休息，感到非常疲惫。"}]}]},{"day":30,"w":"lazy","ph":"","defs":[{"pos":"adj.","m":"懒惰的","ex":[{"l":1,"en":"The lazy boy never cleans his room.","zh":"这个懒惰的男孩从不打扫他的房间。"},{"l":2,"en":"If you are too lazy to do your homework, you will not pass the exam at the end of the term.","zh":"如果你太懒不做作业，期末考试就不会及格。"},{"l":3,"en":"He used to be a lazy student, but after failing the exam, he made up his mind to study hard every day.","zh":"他曾经是个懒惰的学生，但考试不及格后，他下定决心每天努力学习。"}]}]},{"day":30,"w":"lead","ph":"","defs":[{"pos":"v.","m":"领导；带领","ex":[{"l":1,"en":"Our teacher will lead us to the museum.","zh":"我们的老师将带领我们去博物馆。"},{"l":2,"en":"The guide who led us through the old city told us many interesting stories about its history.","zh":"带领我们穿过老城的向导给我们讲了许多关于这座城市历史的有趣故事。"},{"l":3,"en":"Only by working together can we lead our team to win the match against such strong players.","zh":"只有齐心协力，我们才能带领团队在与如此强劲对手的比赛中获胜。"}]}]},{"day":30,"w":"learn","ph":"","defs":[{"pos":"v.","m":"学习；学会","ex":[{"l":1,"en":"We learned much about fire and the danger firemen face.","zh":"我们学到了很多关于火和消防员所面临危险的知识。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"有兴趣成为制图员的学生应尽可能多地学习地理知识。"},{"l":3,"en":"From this experience, we learn that success does not come easily and that patience is the key to progress.","zh":"从这次经历中我们学到，成功来之不易，耐心才是进步的关键。"}]}]},{"day":30,"w":"leave","ph":"","defs":[{"pos":"v.","m":"离开；把...留下；剩下","ex":[{"l":1,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"刮风的日子里，树叶落在地上，马路看起来很美。"},{"l":2,"en":"For example, the leaves of the holly plant have sharp points that discourage grass-eating animals.","zh":"例如，冬青植物的叶子长有尖锐的刺，会让食草动物望而却步。"},{"l":3,"en":"Please do not leave the door open when you go out, because the cold wind will make the room uncomfortable.","zh":"出去时请不要把门开着，因为寒风会让房间变得不舒服。"}]},{"pos":"n.","m":"准假","ex":[{"l":1,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"刮风的日子里，树叶落在地上，马路看起来很美。"},{"l":2,"en":"For example, the leaves of the holly plant have sharp points that discourage grass-eating animals.","zh":"例如，冬青植物的叶子长有尖锐的刺，会让食草动物望而却步。"},{"l":3,"en":"The teacher gave the student three days of leave so that he could stay at home and take care of his sick mother.","zh":"老师准了那个学生三天假，好让他在家照顾生病的母亲。"}]}]},{"day":30,"w":"lecture","ph":"","defs":[{"pos":"n.","m":"讲座；演讲","ex":[{"l":1,"en":"The professor gave a lecture on Chinese history.","zh":"这位教授做了一场关于中国历史的讲座。"},{"l":2,"en":"After the lecture, the students who had many questions stayed and talked with the professor.","zh":"讲座结束后，许多学生留下来和教授交谈，提出各种问题。"},{"l":3,"en":"The lecture which was held in the school hall attracted more than three hundred students who love science.","zh":"在学校礼堂举行的那场讲座吸引了三百多名热爱科学的学生。"}]}]},{"day":30,"w":"left","ph":"","defs":[{"pos":"adj.","m":"左边的","ex":[{"l":1,"en":"One morning, we left early and this time our uncle had bought us backpacks.","zh":"一天早上，我们很早就出发了，这次叔叔给我们买了背包。"},{"l":2,"en":"The boy standing on the left side of the photo is my best friend from primary school.","zh":"站在照片左边那个男孩是我小学时最好的朋友。"},{"l":3,"en":"Take the left turning at the second crossing, and you will find the library between the bank and the post office.","zh":"在第二个十字路口左转，你就会发现图书馆位于银行和邮局之间。"}]},{"pos":"adv.","m":"向左","ex":[{"l":1,"en":"One morning, we left early and this time our uncle had bought us backpacks.","zh":"一天早上，我们很早就出发了，这次叔叔给我们买了背包。"},{"l":2,"en":"When you reach the end of the street, turn left and you will see the hospital on your right.","zh":"走到街道尽头时向左转，你就会在医院就在你的右边。"},{"l":3,"en":"Walk straight ahead for about five minutes, then turn left at the traffic lights, and the museum is right in front of you.","zh":"一直往前走大约五分钟，然后在红绿灯处向左转，博物馆就在你正前方。"}]},{"pos":"n.","m":"左，左边","ex":[{"l":1,"en":"One morning, we left early and this time our uncle had bought us backpacks.","zh":"一天早上，我们很早就出发了，这次叔叔给我们买了背包。"},{"l":2,"en":"On the left of the playground, there is a small garden where students often read books after lunch.","zh":"操场左边有一个小花园，学生们常在午饭后在那里读书。"},{"l":3,"en":"Please sit on my left so that I can share the textbook with you during the lesson.","zh":"请坐在我左边，这样上课时我就能和你共用这本课本了。"}]}]},{"day":30,"w":"leg","ph":"","defs":[{"pos":"n.","m":"腿","ex":[{"l":1,"en":"My left leg hurts after running.","zh":"跑步后我的左腿疼。"},{"l":2,"en":"The poor boy broke his leg when he fell off the bike on his way home.","zh":"这个可怜的男孩在回家的路上从自行车上摔下来，摔断了腿。"},{"l":3,"en":"After the operation, it took her nearly three months to walk again on her injured leg.","zh":"手术之后，她用了将近三个月才能用那条受伤的腿重新走路。"}]}]},{"day":30,"w":"lend","ph":"","defs":[{"pos":"v.","m":"借（出）；把..借给","ex":[{"l":1,"en":"Can you lend me your pen?","zh":"你能把你的笔借给我吗？"},{"l":2,"en":"I will lend you the book as soon as I finish reading it this weekend.","zh":"这个周末我一读完这本书就会把它借给你。"},{"l":3,"en":"A true friend is someone who is always ready to lend a hand when you are in trouble.","zh":"真正的朋友是那个在你遇到麻烦时随时准备伸出援手的人。"}]}]},{"day":30,"w":"length","ph":"","defs":[{"pos":"n.","m":"长度","ex":[{"l":1,"en":"The length of the bridge is about 200 meters.","zh":"这座桥的长度大约是200米。"},{"l":2,"en":"The teacher asked us to measure the length of the desk and write down the number in our notebooks.","zh":"老师让我们测量课桌的长度，并把数字记在笔记本上。"},{"l":3,"en":"In fact, the length of the river makes it one of the longest in the whole country.","zh":"事实上，这条河的长度使它成为全国最长的河流之一。"}]}]},{"day":30,"w":"lesson","ph":"","defs":[{"pos":"n.","m":"课；功课；教训","ex":[{"l":1,"en":"This is Lesson One.","zh":"这是第一课。"},{"l":2,"en":"Our uncle taught us one of the most important lessons in life: the power of attitude.","zh":"叔叔教会了我们人生中最重要的一课：态度的力量。"},{"l":3,"en":"The failure taught him a valuable lesson that hard work alone is not always enough to reach a goal.","zh":"这次失败给了他一个宝贵的教训：仅靠努力并不总是足以实现目标。"}]}]},{"day":30,"w":"let","ph":"","defs":[{"pos":"v.","m":"让","ex":[{"l":1,"en":"Let's begin now.","zh":"我们现在开始吧。"},{"l":2,"en":"My mother will not let me go out to play until I finish all my homework.","zh":"在我完成所有作业之前，妈妈不会让我出去玩。"},{"l":3,"en":"Never let small problems grow into big ones, or you will find them much harder to solve later.","zh":"绝不要让小问题发展成大问题，否则以后你会发现它们难解决得多。"}]}]},{"day":30,"w":"letter","ph":"","defs":[{"pos":"n.","m":"信；字母","ex":[{"l":1,"en":"I got a letter from my pen pal yesterday.","zh":"我昨天收到了笔友的一封信。"},{"l":2,"en":"The letter which my teacher wrote to me made me feel much better.","zh":"老师写给我的那封信让我感觉好多了。"},{"l":3,"en":"Not until I received her letter did I realize how much she had missed me during those lonely months abroad.","zh":"直到收到她的信，我才意识到她在国外那段孤独的日子里有多想念我。"}]}]},{"day":31,"w":"level","ph":"","defs":[{"pos":"n.","m":"水平线；水平","ex":[{"l":1,"en":"The higher levels of nicotine discourage the insect.","zh":"较高浓度的尼古丁能让昆虫望而却步。"},{"l":2,"en":"If you want to reach a higher level of English, you should read more and practice speaking every day.","zh":"如果你想到达更高的英语水平，就应该多读并每天练习说英语。"},{"l":3,"en":"Only by working harder than before can we raise our level of learning to meet the new challenges of the entrance exam.","zh":"只有比从前更努力，我们才能提高学习水平，以迎接升学考试的新挑战。"}]}]},{"day":31,"w":"librarian","ph":"","defs":[{"pos":"n.","m":"图书馆管理员","ex":[{"l":1,"en":"The librarian helped me find the book.","zh":"图书管理员帮我找到了那本书。"},{"l":2,"en":"The librarian told us that we must return the books before Friday, or we would have to pay a fine.","zh":"图书管理员告诉我们必须在周五之前归还这些书，否则就要交罚款。"},{"l":3,"en":"It was the kind librarian who showed me where to find the information I needed for my school project.","zh":"正是那位热心的图书管理员告诉我去哪里找学校课题所需的信息。"}]}]},{"day":31,"w":"library","ph":"","defs":[{"pos":"n.","m":"图书馆；图书室","ex":[{"l":1,"en":"We often read books in the school library.","zh":"我们经常在学校图书馆读书。"},{"l":2,"en":"Our school library has thousands of books, and students can borrow two books at a time for two weeks.","zh":"我们学校图书馆有几千本书，学生一次可以借两本，借期两周。"},{"l":3,"en":"Whenever I have free time, I go to the library, where I can enjoy reading in a quiet and comfortable environment.","zh":"每当我有空闲时间，我就会去图书馆，在那儿我可以享受在安静舒适的环境里阅读。"}]}]},{"day":31,"w":"lie","ph":"","defs":[{"pos":"n.&v.","m":"谎言；说谎","ex":[{"l":1,"en":"Telling a lie is not a good habit.","zh":"说谎不是好习惯。"},{"l":2,"en":"He was so afraid of being punished that he decided to tell a lie to his parents about the broken window.","zh":"他太害怕被惩罚，于是决定就那扇打破的窗户对父母撒谎。"},{"l":3,"en":"To cover up his mistake, he told a lie, only to find that one lie always leads to another.","zh":"为了掩盖错误他撒了谎，结果却发现一个谎言总会引出另一个谎言。"}]},{"pos":"v.","m":"躺；卧；位于","ex":[{"l":1,"en":"The cat lies on the sofa all day.","zh":"那只猫整天躺在沙发上。"},{"l":2,"en":"When I came home, my dog was lying at the door, waiting for me with its tail wagging.","zh":"我回家时，我的狗正躺在门口，摇着尾巴等我。"},{"l":3,"en":"The small village lies between two green hills, where people live a simple and peaceful life.","zh":"那个小村庄位于两座青山之间，那里的人们过着简朴而宁静的生活。"}]}]},{"day":31,"w":"life","ph":"","defs":[{"pos":"n.","m":"生命；生活；人生","ex":[{"l":1,"en":"I'm proud of him because he has saved people's lives.","zh":"我为他感到骄傲，因为他拯救了他人的生命。"},{"l":2,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生而言，当他们在生活中遇到困难时可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":3,"en":"Only by facing difficulties bravely can we learn valuable lessons that will guide us for the rest of our life.","zh":"只有勇敢地面对困难，我们才能学到宝贵的人生经验，指引我们今后的生活。"}]}]},{"day":31,"w":"lift","ph":"","defs":[{"pos":"v.","m":"举起；抬起","ex":[{"l":1,"en":"This box is too heavy for me to lift.","zh":"这个箱子太重了，我举不起来。"},{"l":2,"en":"The little boy was so strong that he could lift the big stone without any help from others.","zh":"那个小男孩力气很大，不用别人帮忙就能举起那块大石头。"},{"l":3,"en":"Though she was tired after running, she still managed to lift the suitcase onto the shelf before the train started.","zh":"尽管跑步后很累，她还是在火车启动前把行李箱抬到了架子上。"}]},{"pos":"n.","m":"（英)电梯","ex":[{"l":1,"en":"Let us take the lift to the fifth floor.","zh":"我们乘电梯到五楼吧。"},{"l":2,"en":"When the old woman entered the lift, a young man politely pressed the button for her.","zh":"那位老妇人走进电梯时，一个年轻人礼貌地帮她按了按钮。"},{"l":3,"en":"The lift was so crowded that I had to wait for the next one instead of squeezing in with so many people.","zh":"电梯里太挤了，我只好等下一趟，而不和那么多人挤在一起。"}]}]},{"day":31,"w":"light","ph":"","defs":[{"pos":"n.","m":"光；灯光","ex":[{"l":1,"en":"Please turn off the light before you leave.","zh":"离开前请关灯。"},{"l":2,"en":"When the light suddenly went out, the children were so frightened that they began to cry loudly.","zh":"灯突然熄灭时，孩子们吓得大声哭了起来。"},{"l":3,"en":"Standing in the warm light of the setting sun, I suddenly understood why my grandfather loved this small garden so much.","zh":"站在落日温暖的光辉里，我忽然明白了祖父为何如此钟爱这座小花园。"}]},{"pos":"adj.","m":"明亮的；轻的；浅色的","ex":[{"l":1,"en":"She is wearing a light blue dress today.","zh":"她今天穿着一条浅蓝色的裙子。"},{"l":2,"en":"The box is so light that even a small child can carry it easily without help.","zh":"这个箱子很轻，连小孩子都能轻松地独自搬动。"},{"l":3,"en":"The room looks brighter than before because we painted the walls in a light color and added a large window.","zh":"房间看起来比以前明亮了，因为我们把墙刷成了浅色，并加了一扇大窗户。"}]}]},{"day":31,"w":"like","ph":"","defs":[{"pos":"prep.","m":"像；跟..一样","ex":[{"l":1,"en":"I feel like I just came to this middle school yesterday.","zh":"我觉得自己好像昨天才来到这所中学。"},{"l":2,"en":"For example, people should remember to turn off electric items like TV sets and air conditioners when they are not used.","zh":"例如，人们应该记得在不使用时关掉电视机和空调之类的电器。"},{"l":3,"en":"Just like many other teenagers, she often feels confused about her future and does not know which path to take.","zh":"就像许多其他青少年一样，她经常对未来感到困惑，不知道该走哪条路。"}]},{"pos":"v.","m":"喜欢；喜爱；想要","ex":[{"l":1,"en":"I feel like I just came to this middle school yesterday.","zh":"我觉得自己好像昨天才来到这所中学。"},{"l":2,"en":"For example, people should remember to turn off electric items like TV sets and air conditioners when they are not used.","zh":"例如，人们应该记得在不使用时关掉电视机和空调之类的电器。"},{"l":3,"en":"I would rather stay at home reading a good book than go shopping, because I like quiet places better than noisy ones.","zh":"我宁愿待在家读一本好书，也不想去购物，因为我更喜欢安静的地方而不是嘈杂之处。"}]}]},{"day":31,"w":"likely","ph":"","defs":[{"pos":"adj.","m":"很可能的","ex":[{"l":1,"en":"Besides, students are likely to suffer from mental problems.","zh":"此外，学生还很可能出现心理问题。"},{"l":2,"en":"Students who stay up too late are more likely to feel tired in class and get lower marks in exams.","zh":"熬夜太晚的学生更可能在课堂上感到疲倦，并在考试中取得较低分数。"},{"l":3,"en":"Those who take part in after-school activities regularly are less likely to feel lonely and more likely to make new friends.","zh":"经常参加课外活动的学生不太容易感到孤独，也更容易结交新朋友。"}]},{"pos":"adv.","m":"很可能地","ex":[{"l":1,"en":"Besides, students are likely to suffer from mental problems.","zh":"此外，学生还很可能出现心理问题。"},{"l":2,"en":"If you do not review your lessons in time, you will most likely forget what you have learned in a few days.","zh":"如果你不及时复习功课，你很可能会在几天内忘记所学的内容。"},{"l":3,"en":"However hard the problem seems, students will very likely find a way to solve it if they keep trying without giving up.","zh":"无论这道题看起来有多难，只要学生坚持尝试不放弃，就很可能找到解决办法。"}]}]},{"day":31,"w":"limit","ph":"","defs":[{"pos":"n.","m":"极限；限制；限度；界限","ex":[{"l":1,"en":"There is a speed limit on this road.","zh":"这条路有速度限制。"},{"l":2,"en":"The teacher told us that we should set a time limit for each exam so that we could finish all the questions.","zh":"老师告诉我们应该给每场考试设定时间限制，这样才能做完所有题目。"},{"l":3,"en":"Although there is a limit to how much we can learn in one day, our progress over months can be truly surprising.","zh":"虽然一天之内我们能学的东西是有限的，但几个月下来我们的进步可能会令人惊讶。"}]},{"pos":"v.","m":"限制；限定","ex":[{"l":1,"en":"We should limit the time we spend on games.","zh":"我们应该限制玩游戏的时间。"},{"l":2,"en":"In order to protect their eyes, parents often limit the time their children spend watching television or playing online games.","zh":"为了保护眼睛，父母常常限制孩子看电视或玩网络游戏的时间。"},{"l":3,"en":"If we do not limit the use of plastic bags, our environment will keep getting worse year after year.","zh":"如果我们不限制塑料袋的使用，我们的环境只会年复一年地不断恶化。"}]}]},{"day":31,"w":"limited","ph":"","defs":[{"pos":"adj.","m":"有限的；限制的","ex":[{"l":1,"en":"Our time in middle school is limited.","zh":"我们初中的时间是有限的。"},{"l":2,"en":"Since our time and money are limited, we must choose carefully what we really need before we go shopping.","zh":"既然我们的时间和金钱都有限，购物前必须仔细挑选真正需要的东西。"},{"l":3,"en":"With limited resources but great effort, the small school still helped many students enter their dream high schools.","zh":"尽管资源有限，但凭借巨大努力，这所小学校仍帮助许多学生进入了理想的高中。"}]}]},{"day":31,"w":"line","ph":"","defs":[{"pos":"n.","m":"排，行；线路","ex":[{"l":1,"en":"Please stand in a straight line.","zh":"请站成一条直线。"},{"l":2,"en":"The students stood in a long line, waiting patiently for their turn to get the books signed by the famous writer.","zh":"学生们排着长队，耐心等待轮到自己请那位著名作家签名赠书。"},{"l":3,"en":"When the bell rang, children quickly formed a straight line in front of the classroom, ready to greet their new teacher.","zh":"铃声一响，孩子们迅速在教室前排成一条直队，准备迎接他们的新老师。"}]},{"pos":"v.","m":"排队","ex":[{"l":1,"en":"We lined up to buy the tickets.","zh":"我们排队买票。"},{"l":2,"en":"Before the bus arrived, many people had already lined up at the stop, holding their umbrellas in the heavy rain.","zh":"公交车到达之前，许多人已经冒雨打着伞在站台排好了队。"},{"l":3,"en":"Having lined up for over an hour, the fans finally got the chance to see their favorite singer face to face.","zh":"排队等了一个多小时后，歌迷们终于有机会与最喜欢的歌手面对面相见。"}]}]},{"day":31,"w":"link","ph":"","defs":[{"pos":"v.&n.","m":"连接；联系","ex":[{"l":1,"en":"The bridge links the two cities.","zh":"这座桥连接着两座城市。"},{"l":2,"en":"The new railway will link the small town to the big city so that people can travel more easily.","zh":"新铁路将把这座小镇与大城市连接起来，以便人们出行更方便。"},{"l":3,"en":"What links these two events together remains a mystery to the police, who have worked on the case for months.","zh":"把这两件事联系在一起的究竟是什么，对已经侦办此案数月的警方来说仍是个谜。"}]}]},{"day":31,"w":"lion","ph":"","defs":[{"pos":"n.","m":"狮子","ex":[{"l":1,"en":"The lion is the king of animals.","zh":"狮子是百兽之王。"},{"l":2,"en":"When we visited the zoo, the children were excited because they saw a lion lying quietly under a big tree.","zh":"我们参观动物园时，孩子们很兴奋，因为他们看到一头狮子正安静地躺在一棵大树下。"},{"l":3,"en":"It is the lion that the tourists most want to see when they arrive at the wildlife park in Africa.","zh":"游客们到达非洲野生动物园时，最想看到的正是狮子。"}]}]},{"day":31,"w":"liquid","ph":"","defs":[{"pos":"n.","m":"液体","ex":[{"l":1,"en":"Water is a clear liquid.","zh":"水是一种清澈的液体。"},{"l":2,"en":"When the weather gets cold enough, the liquid in the bottle will turn into ice, which is a solid.","zh":"当天气足够冷时，瓶中的液体就会变成冰，冰是一种固体。"},{"l":3,"en":"Only after the scientist did many experiments did he find out that the strange liquid could be used as a new kind of fuel.","zh":"直到那位科学家做了许多实验之后，他才发现这种奇怪的液体可以用作一种新型燃料。"}]}]},{"day":31,"w":"list","ph":"","defs":[{"pos":"n.","m":"目录；清单","ex":[{"l":1,"en":"Please write your name on the list.","zh":"请把你的名字写在清单上。"},{"l":2,"en":"Before going shopping, my mother always makes a list of the things she needs to buy so that she will not forget anything.","zh":"去购物之前，我妈妈总会把她要买的东西列一张清单，这样她就不会忘记任何东西了。"},{"l":3,"en":"The teacher told us to put the words in order of difficulty, which means we had to make a list from the easiest to the hardest.","zh":"老师让我们按难度排列这些单词，这意味着我们必须把它们从最易到最难列一张清单。"}]}]},{"day":31,"w":"listen","ph":"","defs":[{"pos":"v.","m":"听；仔细听","ex":[{"l":1,"en":"Listen and repeat.","zh":"听一听，然后跟着读。"},{"l":2,"en":"When the teacher speaks in class, you should listen carefully so that you can understand what she is talking about.","zh":"当老师在课堂上讲话时，你应该认真听，这样你才能听懂她在讲什么。"},{"l":3,"en":"Not until I stopped to listen to the birds did I realize how beautiful the morning in the forest really was.","zh":"直到我停下来倾听鸟鸣，我才意识到森林的清晨竟是如此美丽。"}]}]},{"day":31,"w":"litter","ph":"","defs":[{"pos":"n.","m":"废物，垃圾","ex":[{"l":1,"en":"Please put the litter in the bin.","zh":"请把垃圾扔进垃圾桶。"},{"l":2,"en":"If we throw litter everywhere, our city will become dirty, which makes it hard for people to enjoy their lives.","zh":"如果我们到处乱扔垃圾，我们的城市就会变脏，这会让人们很难享受生活。"},{"l":3,"en":"There was so much litter left on the beach after the holiday that the volunteers had to spend a whole day cleaning it up.","zh":"假期过后海滩上留下了太多垃圾，志愿者们不得不花了一整天时间才清理干净。"}]},{"pos":"v.","m":"乱扔垃圾","ex":[{"l":1,"en":"Please do not litter in the park.","zh":"请不要在公园里乱扔垃圾。"},{"l":2,"en":"Anyone who is caught littering in the public place will have to pay a fine, because it harms our environment.","zh":"任何被抓到在公共场所乱扔垃圾的人都必须交罚款，因为这会破坏我们的环境。"},{"l":3,"en":"Only by teaching children not to litter from a young age can we hope to keep our city clean in the future.","zh":"只有从小教育孩子们不乱扔垃圾，我们才有希望在未来保持城市整洁。"}]}]},{"day":31,"w":"little","ph":"","defs":[{"pos":"adj.","m":"小的；少的","ex":[{"l":1,"en":"I was born in a little town not far from here.","zh":"我出生在离这儿不远的一个小镇上。"},{"l":2,"en":"Though the little girl is only six years old, she can already read many storybooks that her brother sends her.","zh":"虽然这个小女孩只有六岁，她已经能读哥哥寄给她的许多故事书了。"},{"l":3,"en":"It was in that little village at the foot of the mountain that I spent the happiest summer of my childhood.","zh":"正是在山脚下那个小村庄里，我度过了童年中最快乐的夏天。"}]},{"pos":"adv.","m":"很少地；稍许","ex":[{"l":1,"en":"I was born in a little town not far from here.","zh":"我出生在离这儿不远的一个小镇上。"},{"l":2,"en":"After the long trip, the children were a little tired, so they went to bed earlier than usual.","zh":"长途旅行之后，孩子们有点累了，所以比平时更早上床睡觉了。"},{"l":3,"en":"Much as he likes reading, he has little time for it now because he is busy preparing for the important exam.","zh":"尽管他很喜欢读书，但他现在几乎没有时间读，因为他正忙着准备那场重要的考试。"}]},{"pos":"n.","m":"没有多少；一点","ex":[{"l":1,"en":"I was born in a little town not far from here.","zh":"我出生在离这儿不远的一个小镇上。"},{"l":2,"en":"There is little water left in the glass, so please get some more for the guests who are coming soon.","zh":"杯子里没剩多少水了，请再为马上要到的客人取一些来。"},{"l":3,"en":"The little that I know about this subject comes from a book I read last year, which is still very helpful to me now.","zh":"我对这一话题所了解的那一点知识来自去年读的一本书，这本书对我现在仍很有帮助。"}]}]},{"day":31,"w":"live","ph":"","defs":[{"pos":"v.","m":"生活；居住；活着","ex":[{"l":1,"en":"I had thought about living with my grandparents when my parents went abroad last year.","zh":"去年我父母出国时，我曾考虑过和祖父母一起住。"},{"l":2,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易丝至少能活到一百三十岁。她的愿望是工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"Those who live in the mountains far away from the city often enjoy cleaner air and a quieter life than people in towns.","zh":"那些住在远离城市的大山里的人，往往比镇上的人享受更清新的空气和更宁静的生活。"}]}]},{"day":31,"w":"local","ph":"","defs":[{"pos":"adj.","m":"当地的；地方的","ex":[{"l":1,"en":"How long has Lee helped the local people sell their products?","zh":"李帮助当地人销售他们的产品有多久了？"},{"l":2,"en":"The news spread widely after it was reported by a local newspaper.","zh":"这条消息被一家当地报纸报道后广泛传播开来。"},{"l":3,"en":"It is the local government that has done the most to protect the old buildings which attract thousands of visitors every year.","zh":"正是当地政府在保护这些每年吸引成千上万游客的古建筑方面做得最多。"}]},{"pos":"n.","m":"本地人","ex":[{"l":1,"en":"How long has Lee helped the local people sell their products?","zh":"李帮助当地人销售他们的产品有多久了？"},{"l":2,"en":"The news spread widely after it was reported by a local newspaper.","zh":"这条消息被一家当地报纸报道后广泛传播开来。"},{"l":3,"en":"As a local of this small island, the old fisherman knows every corner of the sea better than any map could show.","zh":"作为这座小岛的本地人，这位老渔民对大海每个角落的了解胜过任何地图所能呈现的。"}]}]},{"day":31,"w":"locate","ph":"","defs":[{"pos":"v.","m":"坐落于；确定...的地方","ex":[{"l":1,"en":"Our school is located near the river.","zh":"我们学校坐落在河边。"},{"l":2,"en":"The new hospital, which is located in the center of the city, will provide better service for the people who live nearby.","zh":"位于市中心的那家新医院将为住在附近的人提供更好的服务。"},{"l":3,"en":"Hard as they tried, the rescue team could not locate the missing climber until the weather cleared up the next morning.","zh":"尽管救援队竭尽全力，他们直到第二天早晨天气放晴才确定那位失踪登山者的位置。"}]}]},{"day":31,"w":"location","ph":"","defs":[{"pos":"n.","m":"位置；场所","ex":[{"l":1,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二篇：起初，这所学校被要求关闭，校舍也不得不卖掉，因为学校的位置非常好。"},{"l":2,"en":"The location of the new library is perfect because students can easily walk there after school every day.","zh":"新图书馆的位置非常好，因为学生每天放学后可以轻松地走到那里。"},{"l":3,"en":"What makes this restaurant so popular is not the price but its location, from which customers can enjoy a wonderful view of the lake.","zh":"让这家餐厅如此受欢迎的不是价格而是它的位置，从那里顾客可以欣赏到湖的美丽景色。"}]}]},{"day":31,"w":"lock","ph":"","defs":[{"pos":"n.&v.","m":"锁","ex":[{"l":1,"en":"Please lock the door when you leave.","zh":"你离开时请锁门。"},{"l":2,"en":"When she got home, she found that the lock on the door was broken, which made her feel quite worried.","zh":"她到家时发现门上的锁坏了，这让她相当担心。"},{"l":3,"en":"Never leave your bike unlocked in the street at night, or it may be stolen before you come back the next morning.","zh":"晚上切勿在街上不锁自行车，否则第二天早晨你回来之前它可能就被偷走了。"}]}]},{"day":31,"w":"London","ph":"","defs":[{"pos":"n.","m":"（英国首都）伦敦","ex":[{"l":1,"en":"London is the capital of Britain.","zh":"伦敦是英国的首都。"},{"l":2,"en":"When we traveled to London last summer, we visited many famous places such as the British Museum and the Tower Bridge.","zh":"去年夏天我们去伦敦旅行时，参观了许多著名的地方，比如大英博物馆和塔桥。"},{"l":3,"en":"It was in London that I first tasted the dish which has since become my favorite food in the world.","zh":"正是在伦敦，我第一次品尝到了那道后来成为我世上最爱的菜。"}]}]},{"day":31,"w":"lonely","ph":"","defs":[{"pos":"adj.","m":"孤独的；寂寞的","ex":[{"l":1,"en":"Sometimes my father's job makes me feel unhappy and lonely because he's always very busy.","zh":"有时候爸爸的工作让我感到不开心和孤独，因为他总是很忙。"},{"l":2,"en":"After her best friend moved to another city, the lonely girl often sat by the window, hoping to see her again some day.","zh":"她最好的朋友搬到另一座城市后，这个孤独的女孩常坐在窗边，希望有一天能再见到她。"},{"l":3,"en":"Lonely as the old man seemed to be, his eyes still shone with joy whenever he talked about his grandchildren.","zh":"尽管这位老人看起来很孤独，但每当谈起孙辈时，他的眼中仍闪烁着喜悦的光芒。"}]}]},{"day":31,"w":"long","ph":"","defs":[{"pos":"adj.","m":"（时间）长的；（距离）远的","ex":[{"l":1,"en":"It's the longest man-made waterway in the world.","zh":"它是世界上最长的人工水道。"},{"l":2,"en":"This man-made waterway - known in China as Da Yunhe - is 1,700 kilometers long and some parts of it are more than 2,000 years old.","zh":"这条人工水道在中国被称为大运河，全长一千七百公里，其中一些部分有两千多年的历史。"},{"l":3,"en":"It took us a long time to finish the report, but the teacher said it was the best one she had ever read.","zh":"我们花了很长时间才完成这份报告，但老师说这是她读过的最好的一篇。"}]}]},{"day":31,"w":"look","ph":"","defs":[{"pos":"n.","m":"看；瞧","ex":[{"l":1,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"刮风的日子里，树叶落在地上，这条路看起来很美。"},{"l":2,"en":"First find out about the school. Read the school introductions and look at the school websites. Then think about yourself - your strong points and weak ones. Try to find a few examples you could give the interviewers.","zh":"首先了解这所学校。阅读学校介绍并查看学校网站。然后想想你自己——你的长处和短处。尽量找几个能向面试官提供的例子。"},{"l":3,"en":"It was the strange look on her face that told me she had already known the secret long before I said a word.","zh":"正是她脸上那奇怪的神情让我明白，在我开口之前她早就知道这个秘密了。"}]},{"pos":"v.","m":"看；观看；看起来","ex":[{"l":1,"en":"Looking back on it, I think I shouldn't have given up the contest so easily.","zh":"回想起来，我觉得我不该那么轻易地放弃比赛。"},{"l":2,"en":"First find out about the school.Read the school introductions and look at the school websites.Then think about yourself—your strong points and weak ones.Try to find a few examples you could give the interviewers.","zh":"首先要了解这所学校，阅读学校简介并查看学校网站，然后审视你自己——你的长处和短处，尽量找出一些可以提供给面试官的例子。"},{"l":3,"en":"Only when you look closely at the small details can you discover the hidden mistakes that others have missed in their work.","zh":"只有当你仔细观察那些细节时，你才能发现别人在工作中遗漏的隐藏错误。"}]}]},{"day":31,"w":"lose","ph":"","defs":[{"pos":"v.","m":"失去；丢失","ex":[{"l":1,"en":"I lost my keys on the way home.","zh":"我在回家的路上丢了钥匙。"},{"l":2,"en":"If you lose heart whenever you meet difficulties, you will never achieve your dream.","zh":"如果你一遇到困难就灰心丧气，你将永远无法实现梦想。"},{"l":3,"en":"Not until he lost the chance to study abroad did he realize how precious time really was.","zh":"直到失去出国留学的机会，他才意识到时间是多么宝贵。"}]}]},{"day":31,"w":"lost","ph":"","defs":[{"pos":"adj.","m":"丢失的；迷路的","ex":[{"l":1,"en":"The lost boy was crying in the street.","zh":"那个迷路的男孩在街上哭泣。"},{"l":2,"en":"The wallet that was lost yesterday has been found by a kind old man near the park.","zh":"昨天丢失的钱包已经被一位善良的老人在公园附近找到了。"},{"l":3,"en":"Lost in the strange city without a map, the two travelers had to ask the local people for help.","zh":"迷失在这座陌生的城市里又没有地图，这两位旅行者只好向当地人求助。"}]}]},{"day":32,"w":"lot","ph":"","defs":[{"pos":"n.","m":"许多","ex":[{"l":1,"en":"A lot of fans were attracted by the 13-year-old one-armed basketball player.","zh":"许多球迷被这位13岁的独臂篮球运动员所吸引。"},{"l":2,"en":"There is a lot of rain in the south of China, but not as much in the north.","zh":"中国南方雨水很多，但北方没那么多。"},{"l":3,"en":"A lot of students who used to dislike reading now find it hard to put down a good book once they begin.","zh":"许多过去不喜欢阅读的学生现在发现，一旦开始读一本好书就很难放下。"}]}]},{"day":32,"w":"loud","ph":"","defs":[{"pos":"adj.","m":"大声的","ex":[{"l":1,"en":"The music in the hall is too loud.","zh":"大厅里的音乐太吵了。"},{"l":2,"en":"Please turn down the TV because the loud noise will wake up the sleeping baby in the next room.","zh":"请把电视声音调小，因为巨大的噪音会吵醒隔壁房间里熟睡的婴儿。"},{"l":3,"en":"So loud was the thunder last night that all the children in the village were woken up at once.","zh":"昨晚雷声太大，村里的孩子一下子全都被吵醒了。"}]}]},{"day":32,"w":"loudly","ph":"","defs":[{"pos":"adv.","m":"大声地","ex":[{"l":1,"en":"He spoke loudly so that everyone could hear him.","zh":"他大声说话，以便大家都能听见。"},{"l":2,"en":"When the teacher came into the classroom, the students stopped talking loudly and began to read their books.","zh":"当老师走进教室时，学生们停止大声交谈，开始读起书来。"},{"l":3,"en":"The boy who was reading loudly in the library was asked to leave by the librarian at once.","zh":"那个在图书馆里大声朗读的男孩立刻被图书管理员请了出去。"}]}]},{"day":32,"w":"love","ph":"","defs":[{"pos":"n.&v.","m":"爱；热爱；很喜欢","ex":[{"l":1,"en":"I love the experience of cycling, not owning bike parts!","zh":"我热爱骑行的体验，而不是拥有自行车零件！"},{"l":2,"en":"My mother told me that her love for cooking began when she was only eight years old.","zh":"我妈妈告诉我，她对烹饪的热爱始于她只有八岁的时候。"},{"l":3,"en":"It is the deep love for music that drives the young girl to practise the piano every single day after school.","zh":"正是对音乐的深厚热爱，驱使这个小女孩每天放学后都练习钢琴。"}]}]},{"day":32,"w":"lovely","ph":"","defs":[{"pos":"adj.","m":"美好的；可爱的","ex":[{"l":1,"en":"The little girl has a lovely smile.","zh":"那个小女孩笑容可爱。"},{"l":2,"en":"The lovely garden which lies behind the house is full of flowers in spring.","zh":"房子后面那座可爱的花园在春天开满了鲜花。"},{"l":3,"en":"What a lovely day it is today, with the sun shining brightly and birds singing happily in the trees.","zh":"今天天气多么美好啊，阳光灿烂，鸟儿在树上欢快地歌唱。"}]}]},{"day":32,"w":"low","ph":"","defs":[{"pos":"adj.&adv.","m":"低；矮","ex":[{"l":1,"en":"The price of this shirt is quite low.","zh":"这件衬衫的价格相当低。"},{"l":2,"en":"Although the temperature is low today, the workers are still working hard outside to finish the road.","zh":"尽管今天气温很低，工人们仍在外面努力工作以修完这条路。"},{"l":3,"en":"Never before has the price of fresh fruit been so low that almost every family can afford it every day.","zh":"新鲜水果的价格从未如此之低，几乎每个家庭每天都能买得起。"}]}]},{"day":32,"w":"luck","ph":"","defs":[{"pos":"n.","m":"运气；好运","ex":[{"l":1,"en":"Best of luck, boys and girls!","zh":"祝好运，孩子们！"},{"l":2,"en":"I am sure that good luck will come to you as long as you keep working hard and never give up.","zh":"我相信，只要你坚持努力、永不放弃，好运就会降临到你身上。"},{"l":3,"en":"It was pure luck that helped the old man find his lost dog at the corner of the street at last.","zh":"正是纯粹的运气，帮助那位老人最后在街角找到了他丢失的狗。"}]}]},{"day":32,"w":"luckily","ph":"","defs":[{"pos":"adv.","m":"幸运地；侥幸地","ex":[{"l":1,"en":"Luckily, no one was hurt in the fire.","zh":"幸运的是，火灾中没有人受伤。"},{"l":2,"en":"Luckily, a passer-by found the injured cat and took it to the animal hospital without delay.","zh":"幸运的是，一位路人发现了受伤的猫，并立即把它送到了动物医院。"},{"l":3,"en":"Luckily enough, the rain stopped just before the football match began, which made all the players very happy.","zh":"足够幸运的是，雨正好在足球比赛开始前停了，这让所有球员都很高兴。"}]}]},{"day":32,"w":"lucky","ph":"","defs":[{"pos":"adj.","m":"幸运的","ex":[{"l":1,"en":"He is a lucky boy with many friends.","zh":"他是个有很多朋友的幸运男孩。"},{"l":2,"en":"The lucky student who won the first prize said that hard work was the real key to his success.","zh":"那位获得一等奖的幸运学生说，努力才是他成功的真正关键。"},{"l":3,"en":"How lucky the children are to have such kind teachers who always help them with patience and love.","zh":"孩子们多么幸运啊，能有这样善良的老师，总是耐心而充满爱心地帮助他们。"}]}]},{"day":32,"w":"luggage","ph":"","defs":[{"pos":"n.","m":"行李","ex":[{"l":1,"en":"Please take care of your luggage at the station.","zh":"请在车站照看好你的行李。"},{"l":2,"en":"Before you get on the train, make sure that all your luggage has been clearly marked with your name.","zh":"上火车之前，请确保你所有的行李都已清楚地标上了你的名字。"},{"l":3,"en":"Carrying too much luggage made the tired traveler unable to walk quickly through the crowded station.","zh":"带着太多行李使这位疲惫的旅客无法在拥挤的车站里快速行走。"}]}]},{"day":32,"w":"lunch","ph":"","defs":[{"pos":"n.","m":"午餐；午饭","ex":[{"l":1,"en":"We usually have lunch at school.","zh":"我们通常在学校吃午饭。"},{"l":2,"en":"After we finished our lunch, my father suggested that we should take a walk along the river.","zh":"吃完午饭后，爸爸建议我们应该沿着河边散散步。"},{"l":3,"en":"What the children really want for lunch is not expensive food but a warm talk with their busy parents.","zh":"孩子们午餐时真正想要的，不是昂贵的食物，而是与忙碌的父母温暖地交谈。"}]}]},{"day":32,"w":"machine","ph":"","defs":[{"pos":"n.","m":"机器","ex":[{"l":1,"en":"This machine can wash clothes quickly.","zh":"这台机器能很快地洗衣服。"},{"l":2,"en":"The new machine which was bought last week has greatly improved the working efficiency of the factory.","zh":"上周买来的新机器大大提高了工厂的工作效率。"},{"l":3,"en":"Only by using the machine correctly can the workers avoid the accidents that may cause serious injuries.","zh":"只有正确使用这台机器，工人们才能避免可能造成严重伤害的事故。"}]}]},{"day":32,"w":"mad","ph":"","defs":[{"pos":"adj.","m":"发疯的；生气的","ex":[{"l":1,"en":"Don't be mad at me, please.","zh":"请不要生我的气。"},{"l":2,"en":"His mother was so mad that she asked him to explain why he had broken the window of the neighbor.","zh":"他妈妈气得要他解释为什么要打破邻居家的窗户。"},{"l":3,"en":"Mad with anger, the man shouted at the driver who had broken the traffic rules in front of the school.","zh":"那人怒气冲冲，对着在学校门口违反交通规则的司机大喊大叫。"}]}]},{"day":32,"w":"magazine","ph":"","defs":[{"pos":"n.","m":"杂志","ex":[{"l":1,"en":"I read an interesting magazine every week.","zh":"我每周读一本有趣的杂志。"},{"l":2,"en":"The magazine whose cover was designed by a famous artist has sold more than one million copies.","zh":"那本封面由著名艺术家设计的杂志已经卖出了超过一百万册。"},{"l":3,"en":"Not only does this magazine provide useful knowledge, but it also helps students develop good reading habits step by step.","zh":"这本杂志不仅提供有用的知识，还帮助学生逐步养成良好的阅读习惯。"}]}]},{"day":32,"w":"magic","ph":"","defs":[{"pos":"n.","m":"魔术；魔法","ex":[{"l":1,"en":"The children love magic shows very much.","zh":"孩子们非常喜欢魔术表演。"},{"l":2,"en":"The magic show that we watched last night was so wonderful that everyone kept talking about it the next day.","zh":"我们昨晚观看的魔术表演太精彩了，以至于第二天大家都在谈论它。"},{"l":3,"en":"It was through years of hard practice that the old magician mastered the magic that amazed every audience.","zh":"正是经过多年的刻苦练习，这位老魔术师掌握了令每位观众都惊叹的魔术。"}]}]},{"day":32,"w":"mail","ph":"","defs":[{"pos":"n.","m":"（美)邮件；邮递","ex":[{"l":1,"en":"I sent the letter by mail yesterday.","zh":"我昨天通过邮寄寄出了那封信。"},{"l":2,"en":"When I opened the mail this morning, I was surprised to find a beautiful card from my old friend.","zh":"今早打开邮件时，我惊讶地发现了一张来自老朋友的漂亮贺卡。"},{"l":3,"en":"With the development of the Internet, fewer and fewer people choose to send cards by mail during festivals.","zh":"随着互联网的发展，越来越少的人在节日时选择通过邮寄发送贺卡。"}]},{"pos":"v.","m":"邮寄","ex":[{"l":1,"en":"Please mail this letter for me.","zh":"请替我邮寄这封信。"},{"l":2,"en":"I will mail the photos to you as soon as I arrive in Beijing and have a good rest.","zh":"我一到北京、好好休息之后，就会把照片邮寄给你。"},{"l":3,"en":"Having mailed the package to his parents, the young man felt much better and went back to his small room happily.","zh":"把包裹寄给父母之后，年轻人心情好多了，开心地回到了他的小房间。"}]}]},{"day":32,"w":"main","ph":"","defs":[{"pos":"adj.","m":"主要的","ex":[{"l":1,"en":"The main road is closed today.","zh":"这条主干道今天封闭了。"},{"l":2,"en":"The main reason why he was late is that his bike broke down on the way.","zh":"他迟到的主要原因在于自行车在路上坏了。"},{"l":3,"en":"It is the main library that provides students with thousands of books, which makes it the best place to study after school.","zh":"正是这家主图书馆为学生提供了成千上万的图书，这使它成为放学后学习的最佳去处。"}]}]},{"day":32,"w":"mainly","ph":"","defs":[{"pos":"adv.","m":"主要地","ex":[{"l":1,"en":"We mainly eat rice for dinner.","zh":"我们晚饭主要吃米饭。"},{"l":2,"en":"The vegetables sold in this shop are mainly grown by local farmers who work hard every day.","zh":"这家店出售的蔬菜主要由每天辛勤劳作的本地农民种植。"},{"l":3,"en":"Birds mainly feed on insects and grains, which explains why they gather near the fields when autumn comes.","zh":"鸟类主要以昆虫和谷物为食，这解释了为何秋天来临时它们会聚集在田野附近。"}]}]},{"day":32,"w":"major","ph":"","defs":[{"pos":"adj.","m":"主要的","ex":[{"l":1,"en":"Reading is a major habit for him.","zh":"阅读对他来说是个主要习惯。"},{"l":2,"en":"The major problem we face today is that many rivers have been polluted by factories.","zh":"我们今天面临的主要问题在于许多河流已被工厂污染。"},{"l":3,"en":"Only when we solve the major problem of air pollution can children enjoy a truly healthy life.","zh":"只有解决了空气污染这个主要问题，孩子们才能享有真正健康的生活。"}]},{"pos":"n.","m":"主修科目","ex":[{"l":1,"en":"His major is English.","zh":"他的专业是英语。"},{"l":2,"en":"I want to choose history as my major because it helps me understand how the world changed.","zh":"我想选历史作为主修科目，因为它能帮我理解世界是如何变迁的。"},{"l":3,"en":"Choosing the right major is so important that many students spend months thinking carefully before making a decision.","zh":"选择合适的主修科目如此重要，以至于许多学生在做决定前要花上数月仔细思考。"}]}]},{"day":32,"w":"make","ph":"","defs":[{"pos":"v.","m":"制造；做；使得","ex":[{"l":1,"en":"I prefer to make it a heart-to-heart room.","zh":"我更愿意把它布置成一个谈心室。"},{"l":2,"en":"My first reason is that experiences make us different as we grow.","zh":"我的第一个理由是，随着我们的成长，经历使我们各不相同。"},{"l":3,"en":"What makes the project special is that students are encouraged to make decisions on their own, which builds up their confidence step by step.","zh":"让这个项目与众不同的是，学生被鼓励自己做决定，这逐步建立起他们的自信。"}]}]},{"day":32,"w":"male","ph":"","defs":[{"pos":"adj.","m":"男（性）的；雄的","ex":[{"l":1,"en":"A male teacher will give the talk.","zh":"一位男老师将作报告。"},{"l":2,"en":"The male students in our class prefer basketball, while the girls enjoy dancing after school.","zh":"我们班男生更喜欢篮球，而女生们放学后喜欢跳舞。"},{"l":3,"en":"In this school, male teachers are encouraged to join the reading club, which helps them share ideas with their students.","zh":"在这所学校，男教师被鼓励加入阅读俱乐部，这有助于他们与学生分享想法。"}]},{"pos":"n.","m":"男性","ex":[{"l":1,"en":"A young male helped the old lady.","zh":"一位年轻男子帮助了那位老太太。"},{"l":2,"en":"The doctor told us that males are more likely to get this kind of illness than females.","zh":"医生告诉我们，男性比女性更容易得这种病。"},{"l":3,"en":"Not only the males but also the females in the village take part in the work, which has greatly improved their life.","zh":"村里的男性和女性都参加了这项工作，这大大改善了他们的生活。"}]}]},{"day":32,"w":"man","ph":"","defs":[{"pos":"n.","m":"成年男人；人；人类","ex":[{"l":1,"en":"Those men aren't students, either.","zh":"那些男人也不是学生。"},{"l":2,"en":"The old man who lives next door often tells us stories about his life in the small village.","zh":"住在隔壁的老人常给我们讲他在小村庄里的生活故事。"},{"l":3,"en":"Never before has man been so closely connected as today, when messages can travel around the world in seconds.","zh":"人类从未像今天这样紧密相连，如今信息几秒内就能传遍全球。"}]}]},{"day":32,"w":"manage","ph":"","defs":[{"pos":"v.","m":"管理；经营；处理；设法对付","ex":[{"l":1,"en":"The boy started to live in school and learn to manage time by himself.","zh":"这个男孩开始住校，并学着独自管理时间。"},{"l":2,"en":"Although she was very busy, she managed to finish the report before the meeting began.","zh":"尽管她很忙，她还是设法在会议开始前完成了报告。"},{"l":3,"en":"Only those who learn to manage their time wisely can manage to balance study and hobbies at the same time.","zh":"只有那些学会明智管理时间的人，才能同时兼顾学习与爱好。"}]}]},{"day":32,"w":"manager","ph":"","defs":[{"pos":"n.","m":"经理","ex":[{"l":1,"en":"His father is a hotel manager.","zh":"他父亲是一家酒店的经理。"},{"l":2,"en":"The manager told the workers that the new shop would open as soon as the goods arrived.","zh":"经理告诉工人们，新店一俟货物到达就会开业。"},{"l":3,"en":"What the manager wants is a team that works well together, so he often organizes activities to help members know each other better.","zh":"经理想要的是一支协作良好的团队，因此他经常组织活动来帮助成员更好地互相了解。"}]}]},{"day":32,"w":"manner(s)","ph":"","defs":[{"pos":"n.","m":"方式；态度；举止","ex":[{"l":1,"en":"He spoke in a kind manner.","zh":"他说话态度和蔼。"},{"l":2,"en":"It is bad manners to talk loudly when others are eating quietly in the restaurant.","zh":"别人在餐厅安静用餐时大声说话是不礼貌的。"},{"l":3,"en":"Good manners, which show respect for others, are so valuable that they often leave a deep impression on people we meet.","zh":"良好的举止体现了对他人的尊重，如此珍贵，常常给遇到的人留下深刻印象。"}]}]},{"day":32,"w":"many","ph":"","defs":[{"pos":"adj.","m":"许多的","ex":[{"l":1,"en":"How many sisters and brothers do you have?","zh":"你有几个兄弟姐妹？"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English. Louise has many Chinese friends. They communicate by computer.","zh":"路易丝现年十三岁，正在学习中文；中文已成为与英语同样重要的世界语言。路易丝有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"So many students have taken part in the volunteer program that the school has decided to set up more groups next year.","zh":"如此多的学生参加了这个志愿者项目，以至于学校决定明年成立更多小组。"}]},{"pos":"pron.","m":"许多人（物)","ex":[{"l":1,"en":"How many sisters and brothers do you have?","zh":"你有几个兄弟姐妹？"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English. Louise has many Chinese friends. They communicate by computer.","zh":"路易丝现年十三岁，正在学习中文；中文已成为与英语同样重要的世界语言。路易丝有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"Many of the visitors were deeply moved by the old man's story, which reminded them of their own childhood.","zh":"许多参观者被老人的故事深深打动，这让他们想起了自己的童年。"}]}]},{"day":32,"w":"map","ph":"","defs":[{"pos":"n.","m":"地图","ex":[{"l":1,"en":"It made me wonder: Who creates maps in the first place?","zh":"这让我好奇：究竟是谁最初绘制了地图？"},{"l":2,"en":"But our trusty GPS pulled up a map of the area and got us back on track in no time.","zh":"但我们可靠的GPS调出了该区域的地图，很快让我们重新回到正轨。"},{"l":3,"en":"It was the old map drawn by his grandfather that helped the boy find the hidden path through the forest.","zh":"正是爷爷绘制的旧地图帮男孩找到了穿过森林的隐秘小径。"}]}]},{"day":32,"w":"March","ph":"","defs":[{"pos":"n.","m":"三月","ex":[{"l":1,"en":"My birthday is in March.","zh":"我的生日在三月。"},{"l":2,"en":"We will hold a sports meeting in March if the weather becomes warm enough.","zh":"如果天气足够暖和，我们将在三月举行运动会。"},{"l":3,"en":"It was in March that the little town held its first flower festival, attracting thousands of visitors from nearby cities.","zh":"正是在三月，这座小镇举办了首届花卉节，吸引了附近城市成千上万的游客。"}]}]},{"day":32,"w":"mark","ph":"","defs":[{"pos":"n.","m":"标记，记号；符号；分数","ex":[{"l":1,"en":"He got a high mark in maths.","zh":"他数学得了高分。"},{"l":2,"en":"The teacher left a mark on the paper to show that the student had made great progress.","zh":"老师在纸上留下了一个记号，表明这名学生取得了很大进步。"},{"l":3,"en":"The marks on the wall, which were left by the children years ago, still remind us of those happy days.","zh":"墙上这些孩子们多年前留下的痕迹，依然让我们想起那些快乐的时光。"}]},{"pos":"vt.","m":"标明；做记号于；给..打分数","ex":[{"l":1,"en":"Please mark the right answer.","zh":"请标出正确答案。"},{"l":2,"en":"The teacher marked each student's homework carefully before giving it back the next day.","zh":"老师仔细批改了每位学生的作业，第二天才发回去。"},{"l":3,"en":"Having marked all the papers, the teacher felt tired but satisfied because most students had done a good job.","zh":"批改完全部试卷后，老师感到疲惫却很欣慰，因为大多数学生表现出色。"}]}]},{"day":32,"w":"market","ph":"","defs":[{"pos":"n.","m":"市场；集市","ex":[{"l":1,"en":"My mother goes to the market early.","zh":"我妈妈一大早就去市场。"},{"l":2,"en":"The market near my home sells fresh fruit and vegetables that are brought in every morning.","zh":"我家附近的市场出售每天清晨运来的新鲜水果和蔬菜。"},{"l":3,"en":"Not only is the market famous for its fresh food, but it also attracts tourists who want to experience local life.","zh":"这家市场不仅以新鲜食品闻名，还吸引着想体验当地生活的游客。"}]}]},{"day":33,"w":"marry","ph":"","defs":[{"pos":"v.","m":"（使）成婚；结婚","ex":[{"l":1,"en":"They will marry next year.","zh":"他们明年结婚。"},{"l":2,"en":"The couple have been married for ten years since they married in a small church.","zh":"这对夫妇在一座小教堂结婚至今已有十年。"},{"l":3,"en":"It was in 2010 that they married, and they have lived happily together ever since.","zh":"正是在2010年他们结了婚，从那以后一直幸福地生活在一起。"}]}]},{"day":33,"w":"match","ph":"","defs":[{"pos":"n.","m":"比赛，竞赛；火柴","ex":[{"l":1,"en":"We won the football match.","zh":"我们赢了那场足球赛。"},{"l":2,"en":"The basketball match that was held yesterday afternoon was so exciting that everyone cheered loudly.","zh":"昨天下午举行的篮球赛如此精彩，以至于每个人都大声欢呼。"},{"l":3,"en":"Rarely have I seen such an exciting match, which kept all the fans shouting until the last minute.","zh":"我很少见过如此激动人心的比赛，它让所有球迷一直呐喊到最后一刻。"}]},{"pos":"v.","m":"与..匹配","ex":[{"l":1,"en":"Your shoes do not match your school uniform.","zh":"你的鞋子和校服不搭配。"},{"l":2,"en":"The color of the curtains matches the wall perfectly, which makes the room look warm.","zh":"窗帘的颜色和墙面完美搭配，这让房间看起来很温馨。"},{"l":3,"en":"What really matters is not how expensive the gift is, but whether it matches the receiver's taste.","zh":"真正重要的不是礼物有多贵，而是它是否与收礼人的品味相匹配。"}]}]},{"day":33,"w":"material","ph":"","defs":[{"pos":"n.","m":"材料，原料","ex":[{"l":1,"en":"We need some new materials for the art class.","zh":"我们需要一些新的材料上美术课。"},{"l":2,"en":"The teacher told us that silk was one of the most popular materials in ancient trade between China and Europe.","zh":"老师告诉我们，在古代中欧贸易中，丝绸是最受欢迎的材料之一。"},{"l":3,"en":"Only when we recycle these materials can we reduce the waste that factories produce every day.","zh":"只有当我们回收这些材料时，才能减少工厂每天产生的废料。"}]}]},{"day":33,"w":"maths","ph":"","defs":[{"pos":"n.","m":"数学","ex":[{"l":1,"en":"It also helps to take courses in maths and computer science.","zh":"选修数学和计算机科学课程也会有帮助。"},{"l":2,"en":"Although some students find maths difficult, it helps them think logically when they solve real problems.","zh":"虽然有些学生觉得数学难，但它能帮助他们在解决实际问题时进行逻辑思考。"},{"l":3,"en":"It is maths that trains our minds to find hidden patterns behind those confusing numbers.","zh":"正是数学训练我们的大脑，去发现那些混乱数字背后隐藏的规律。"}]}]},{"day":33,"w":"matter","ph":"","defs":[{"pos":"n.","m":"要紧事；麻烦事；事情；问题；物质","ex":[{"l":1,"en":"No matter how many difficulties we came across, we considered them as chances for us to improve.","zh":"无论我们遇到多少困难，我们都把它们视为提升自己的机会。"},{"l":2,"en":"As a matter of fact, the strange matter in the lab still puzzles scientists who have studied it for years.","zh":"事实上，实验室里那种奇怪的物质仍然困扰着研究了它多年的科学家们。"},{"l":3,"en":"No matter how hard the matter seemed, she refused to give up until the truth came out.","zh":"无论这件事看起来多么棘手，她都拒绝放弃，直到真相大白。"}]},{"pos":"v.","m":"要紧；有关系","ex":[{"l":1,"en":"No matter how many difficulties we came across, we considered them as chances for us to improve.","zh":"无论我们遇到多少困难，我们都把它们视为提升自己的机会。"},{"l":2,"en":"It does not matter whether you win or lose, as long as you have tried your best in the game.","zh":"输赢并不重要，只要你在比赛中尽了最大努力。"},{"l":3,"en":"What matters most is not how smart you are, but how much effort you put into your work.","zh":"最重要的不是你有多聪明，而是你付出了多少努力。"}]}]},{"day":33,"w":"May","ph":"","defs":[{"pos":"n.","m":"五月","ex":[{"l":1,"en":"If these problems aren't solved well, they may bring bad results.","zh":"如果这些问题解决不好，它们可能会带来不好的结果。"},{"l":2,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，当他们在生活中遇到困难时，可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":3,"en":"Warm as May was this year, the sudden rain ruined the school trip that we had planned for weeks.","zh":"尽管今年五月很暖和，那场突如其来的雨还是毁了我们筹划了数周的学校出游。"}]}]},{"day":33,"w":"may","ph":"","defs":[{"pos":"v.","m":"可以；也许，可能","ex":[{"l":1,"en":"If these problems aren't solved well, they may bring bad results.","zh":"如果这些问题解决不好，它们可能会带来不好的结果。"},{"l":2,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，当他们在生活中遇到困难时，可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":3,"en":"You may not realize it, but every small choice you make today will shape the person you become tomorrow.","zh":"你可能没有意识到，但你今天做出的每一个小选择，都将塑造你明天成为什么样的人。"}]}]},{"day":33,"w":"maybe","ph":"","defs":[{"pos":"adv.","m":"可能，大概；也许","ex":[{"l":1,"en":"Maybe they're farmers.","zh":"也许他们是农民。"},{"l":2,"en":"Maybe the bus is late again, so we should call the station to find out what has happened.","zh":"也许公交车又晚点了，所以我们应该打电话给车站弄清楚发生了什么。"},{"l":3,"en":"Maybe you have forgotten the promise you made, but I still remember every word of it.","zh":"也许你已经忘记了自己许下的诺言，但我仍然记得其中的每一个字。"}]}]},{"day":33,"w":"meal","ph":"","defs":[{"pos":"n.","m":"一餐（饭）","ex":[{"l":1,"en":"My mother cooks a big meal for us every Sunday.","zh":"我妈妈每个星期天都为我们做一顿丰盛的饭菜。"},{"l":2,"en":"After a long morning of classes, the students couldn't wait to enjoy the meal that the cook had prepared.","zh":"上了整整一上午的课后，学生们迫不及待地想享用厨师准备的饭菜。"},{"l":3,"en":"Never before had I tasted such a delicious meal, which reminded me of the dishes my grandma used to cook.","zh":"我从未尝过如此美味的一餐，它让我想起了奶奶过去常做的那些菜。"}]}]},{"day":33,"w":"mean","ph":"","defs":[{"pos":"v.","m":"意思是；意味着","ex":[{"l":1,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物可以通过物理和化学两种手段来保护自己。"},{"l":2,"en":"What I mean is that we should read more books instead of spending all day on our phones.","zh":"我的意思是我们应该多读书，而不是整天玩手机。"},{"l":3,"en":"Failing the exam doesn't mean that you are a poor student; it only means you need a better method.","zh":"考试不及格并不意味着你是个差生，它只说明你需要一个更好的方法。"}]},{"pos":"adj.","m":"刻薄的","ex":[{"l":1,"en":"But plants can protect themselves by using both physical and chemical means.","zh":"但是植物可以通过物理和化学两种手段来保护自己。"},{"l":2,"en":"It is wrong of him to say such mean words to his classmates who are always ready to help others.","zh":"他对那些总是乐于助人的同学说这么刻薄的话是不对的。"},{"l":3,"en":"Don't be so mean to the new student, or you will soon find yourself without any friends.","zh":"不要对那位新同学如此刻薄，否则你很快就会发现自己一个朋友都没有。"}]}]},{"day":33,"w":"meaning","ph":"","defs":[{"pos":"n.","m":"意思，意义；含义","ex":[{"l":1,"en":"Can you explain the meaning of this word to me?","zh":"你能给我解释一下这个词的意思吗？"},{"l":2,"en":"The story has a deep meaning that young readers may not understand until they grow up.","zh":"这个故事有深刻的含义，小读者们可能要长大之后才能理解。"},{"l":3,"en":"It was not until the teacher explained the poem that I realized the true meaning behind those simple lines.","zh":"直到老师讲解了那首诗，我才意识到那些朴素诗句背后的真正含义。"}]}]},{"day":33,"w":"meat","ph":"","defs":[{"pos":"n.","m":"肉","ex":[{"l":1,"en":"I would like some meat and vegetables for dinner.","zh":"我晚饭想吃点肉和蔬菜。"},{"l":2,"en":"The doctor advised him to eat less meat and more fruit if he wanted to stay healthy.","zh":"医生建议他如果想保持健康，就要少吃肉，多吃水果。"},{"l":3,"en":"Only by cutting down on meat and fried food can you lose the weight that has worried you for months.","zh":"只有减少肉类和油炸食品的摄入，你才能减掉困扰你数月的体重。"}]}]},{"day":33,"w":"medical","ph":"","defs":[{"pos":"adj.","m":"医学的；医疗的","ex":[{"l":1,"en":"He needs some medical care after the accident.","zh":"事故之后他需要一些医疗护理。"},{"l":2,"en":"The old man could not afford the medical bills, so his neighbors raised money to help him out.","zh":"那位老人付不起医疗费用，所以邻居们凑钱帮助他。"},{"l":3,"en":"Thanks to the quick medical team, the injured driver was saved before the car caught fire.","zh":"多亏了反应迅速的医疗队，受伤的司机在汽车起火之前获救了。"}]}]},{"day":33,"w":"medicine","ph":"","defs":[{"pos":"n.","m":"药","ex":[{"l":1,"en":"Take this medicine after meals three times a day.","zh":"这药每天三次，饭后服用。"},{"l":2,"en":"Remember to take the medicine on time, or you will not get well before the exam begins.","zh":"记得按时吃药，否则你在考试开始之前不会康复。"},{"l":3,"en":"It is this kind of medicine that has saved millions of lives since it was first used in hospitals.","zh":"正是这种药，自从在医院首次使用以来，已经拯救了数百万人的生命。"}]}]},{"day":33,"w":"medium","ph":"","defs":[{"pos":"adj.","m":"中间的；中等的","ex":[{"l":1,"en":"I would like a medium cup of coffee, please.","zh":"请给我一杯中杯咖啡。"},{"l":2,"en":"She chose a medium size because the small one was too tiny and the large one too expensive.","zh":"她选了中号，因为小号太小，而大号又太贵。"},{"l":3,"en":"Of medium height and with a warm smile, the new teacher soon won the hearts of all her students.","zh":"这位新老师中等身材，笑容温暖，很快就赢得了所有学生的心。"}]}]},{"day":33,"w":"meet","ph":"","defs":[{"pos":"v.","m":"遇见，见到；会见；迎接；满足","ex":[{"l":1,"en":"Very please to meet you.","zh":"很高兴见到你。"},{"l":2,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，当他们在生活中遇到困难时，可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":3,"en":"Not until I reached the station did I realize that the friend I was to meet had already left.","zh":"直到我赶到车站，我才意识到我要接见的朋友已经离开了。"}]},{"pos":"n.","m":"会，集会","ex":[{"l":1,"en":"Very please to meet you.","zh":"很高兴见到你。"},{"l":2,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，当他们在生活中遇到困难时，可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":3,"en":"The school decided to hold a sports meet next month so that students could relax after the exams.","zh":"学校决定下个月举办一场运动会，以便学生们在考试后能放松一下。"}]}]},{"day":33,"w":"meeting","ph":"","defs":[{"pos":"n.","m":"会，集会；会见","ex":[{"l":1,"en":"Very please to meet you.","zh":"很高兴见到你。"},{"l":2,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，当他们在生活中遇到困难时，可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":3,"en":"It was at the meeting that I first realized how important teamwork is to a successful project.","zh":"正是在那次会议上，我第一次意识到团队合作对一个成功项目有多重要。"}]}]},{"day":33,"w":"member","ph":"","defs":[{"pos":"n.","m":"成员；会员","ex":[{"l":1,"en":"My father is a member of the football club.","zh":"我爸爸是足球俱乐部的成员。"},{"l":2,"en":"As a member of the band, she has to practice the guitar every day after she finishes her homework.","zh":"作为乐队的成员，她每天做完作业后都必须练习吉他。"},{"l":3,"en":"Only a member who has worked here for years can understand how much the company has changed.","zh":"只有在这里工作多年的成员，才能理解这家公司发生了多大的变化。"}]}]},{"day":33,"w":"memory","ph":"","defs":[{"pos":"n.","m":"回忆；记忆","ex":[{"l":1,"en":"Sharing a new experience develops stronger relationships and creates long-lasting memories.","zh":"分享新的经历能建立更牢固的关系，并创造持久的回忆。"},{"l":2,"en":"When we share a new experience with friends, it not only develops stronger relationships but also creates long-lasting memories that we will never forget.","zh":"当我们和朋友分享新的经历时，它不仅会建立更牢固的关系，还会创造我们永远难忘的持久回忆。"},{"l":3,"en":"It is by sharing new experiences that we develop stronger relationships and create those long-lasting memories which light up our whole life.","zh":"正是通过分享新的经历，我们才建立起更牢固的关系，并创造出照亮我们一生的那些持久回忆。"}]}]},{"day":33,"w":"mention","ph":"","defs":[{"pos":"v.","m":"提到，说起","ex":[{"l":1,"en":"Did he mention my name in the meeting?","zh":"他在会上提到我的名字了吗？"},{"l":2,"en":"The teacher mentioned that anyone who wanted to join the school trip should hand in the form before Friday.","zh":"老师提到，任何想参加学校旅行的人都应该在周五之前交表格。"},{"l":3,"en":"Not until the report came out did he mention that the problem, ignored for years, had already caused serious losses to the company.","zh":"直到报告出来，他才提到这个被忽视了多年的问题已经给公司造成了严重的损失。"}]}]},{"day":33,"w":"menu","ph":"","defs":[{"pos":"n.","m":"菜单","ex":[{"l":1,"en":"Let me have a look at the menu first.","zh":"让我先看一下菜单。"},{"l":2,"en":"The waiter brought the menu and told us that the most popular dish was the roast chicken.","zh":"服务员拿来菜单，并告诉我们最受欢迎的菜是烤鸡。"},{"l":3,"en":"Glancing through the menu, she found that the dishes recommended by the manager were much more expensive than she had expected.","zh":"浏览着菜单，她发现经理推荐的菜比她预想的要贵得多。"}]}]},{"day":33,"w":"mess","ph":"","defs":[{"pos":"n.","m":"混乱；杂乱","ex":[{"l":1,"en":"Your room is in such a mess!","zh":"你的房间真是一团糟！"},{"l":2,"en":"After the birthday party, the whole living room was in such a mess that we spent two hours cleaning it up.","zh":"生日派对之后，整个客厅乱成了一团，我们花了两个小时才打扫干净。"},{"l":3,"en":"The room was left in such a mess that hardly had we stepped inside when we realized a thorough cleaning was a must.","zh":"房间被弄得如此杂乱，我们刚一踏进去就意识到必须彻底打扫一次。"}]},{"pos":"v.","m":"使不整洁；弄脏；弄乱","ex":[{"l":1,"en":"Don't mess up your clean clothes.","zh":"别把你干净的衣服弄脏了。"},{"l":2,"en":"If you mess up the kitchen like this again, mum will be very angry with you.","zh":"如果你再把厨房弄得像这样乱，妈妈会非常生你的气。"},{"l":3,"en":"Having messed up the project by carelessness, he had no choice but to admit his mistake and start all over again.","zh":"由于粗心把项目搞砸了，他别无选择，只能承认错误并从头再来。"}]}]},{"day":33,"w":"message","ph":"","defs":[{"pos":"n.","m":"消息；音信","ex":[{"l":1,"en":"Can I take a message for you?","zh":"我可以替你捎个口信吗？"},{"l":2,"en":"Could you tell me when Mr. Wang will come back so that I can leave a message for him?","zh":"你能告诉我王先生什么时候回来吗，这样我可以给他留个口信？"},{"l":3,"en":"Deeply moved by the message left by her teacher, she made up her mind to work harder and never let him down.","zh":"被老师留下的留言深深打动，她下定决心要更努力学习，绝不让他失望。"}]}]},{"day":33,"w":"metal","ph":"","defs":[{"pos":"n.","m":"金属","ex":[{"l":1,"en":"This box is made of metal.","zh":"这个盒子是金属做的。"},{"l":2,"en":"The bridge, which was built hundreds of years ago, is mainly made of stone and metal.","zh":"这座建于几百年前的桥主要由石头和金属建成。"},{"l":3,"en":"It is metal that makes the modern car both light and strong enough to keep passengers safe in an accident.","zh":"正是金属使现代汽车既轻便又足够坚固，能在事故中保护乘客的安全。"}]}]},{"day":33,"w":"method","ph":"","defs":[{"pos":"n.","m":"方法，办法","ex":[{"l":1,"en":"We need a new method to solve the problem.","zh":"我们需要一种新方法来解决这个问题。"},{"l":2,"en":"The teacher told us that the best method to learn English well is to read and speak every day.","zh":"老师告诉我们，学好英语最好的方法是每天阅读和开口说。"},{"l":3,"en":"Only by changing our learning method can we keep up with the rapid development of the modern world.","zh":"只有改变我们的学习方法，我们才能跟上现代世界快速发展的步伐。"}]}]},{"day":33,"w":"metre","ph":"","defs":[{"pos":"n.","m":"米，公尺","ex":[{"l":1,"en":"The river is about five metres wide.","zh":"这条河大约五米宽。"},{"l":2,"en":"The running track is four hundred metres long, so it takes me about two minutes to finish one lap.","zh":"这条跑道长四百米，所以我跑完一圈大约需要两分钟。"},{"l":3,"en":"Buried just two metres below the ground, the ancient coins were finally discovered by a group of curious children.","zh":"埋在地下仅两米深处，这些古币最终被一群好奇的孩子发现了。"}]}]},{"day":33,"w":"middle","ph":"","defs":[{"pos":"n.","m":"中间，当中，中部","ex":[{"l":1,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"这个中学生能用英语讲中国传统故事吗？"},{"l":2,"en":"I feel like I just came to this middle school yesterday.","zh":"我感觉自己好像昨天才刚来到这所中学。"},{"l":3,"en":"Looking back on her middle school years, she realized that it was those hard days that shaped her into a confident young girl.","zh":"回首自己的中学时光，她意识到正是那些艰辛的日子让她成长为一个自信的少女。"}]}]},{"day":33,"w":"mile","ph":"","defs":[{"pos":"n.","m":"英里","ex":[{"l":1,"en":"I walk a mile to school every day.","zh":"我每天走一英里去上学。"},{"l":2,"en":"It is about two miles from my home to the railway station, so we had better take a taxi.","zh":"我家到火车站大约有两英里，所以我们最好乘出租车。"},{"l":3,"en":"So heavy was the rain that we could not see the road even a mile ahead, which made driving extremely dangerous.","zh":"雨下得如此之大，我们连一英里外的路都看不清，这使得驾驶变得极其危险。"}]}]},{"day":33,"w":"milk","ph":"","defs":[{"pos":"n.","m":"牛奶","ex":[{"l":1,"en":"I drink a glass of milk every morning.","zh":"我每天早上喝一杯牛奶。"},{"l":2,"en":"My mother always tells me that drinking a glass of milk before bed will help me sleep better.","zh":"妈妈总是告诉我，睡前喝一杯牛奶能帮助我睡得更好。"},{"l":3,"en":"Rich in calcium, a glass of fresh milk every morning is considered one of the secrets of keeping teenagers healthy and strong.","zh":"富含钙质，每天早上一杯新鲜牛奶被认为是保持青少年健康强壮的秘诀之一。"}]}]},{"day":33,"w":"mind","ph":"","defs":[{"pos":"n.","m":"思想；想法","ex":[{"l":1,"en":"You carry them in your mind just like those stones in bags.","zh":"你把它们装在脑海里，就像把那些石头装在袋子里一样。"},{"l":2,"en":"Try to do regular sports. The mind needs exercise as well as the body.","zh":"尽量做规律的运动。大脑和身体一样需要锻炼。"},{"l":3,"en":"What we put into our mind shapes who we will become, just as the food we eat builds our body day by day.","zh":"我们输入大脑的东西塑造了我们将来会成为的人，就像我们吃的食物日复一日地构建着我们的身体。"}]},{"pos":"v.","m":"介意；关心","ex":[{"l":1,"en":"Would you mind opening the window?","zh":"你介意把窗户打开吗？"},{"l":2,"en":"Would you mind turning down the radio a little so that I can focus on my homework?","zh":"你介意把收音机调小一点吗，这样我就能专心做作业了。"},{"l":3,"en":"Never mind what others say; what really matters is that you keep moving toward the goal you have set for yourself.","zh":"别在意别人怎么说；真正重要的是你不断朝着为自己设定的目标前进。"}]}]},{"day":34,"w":"minus","ph":"","defs":[{"pos":"prep.","m":"减(去）","ex":[{"l":1,"en":"Ten minus three is seven.","zh":"十减三等于七。"},{"l":2,"en":"The shop assistant told me that the price of this shirt was 200 yuan, minus a 20 percent discount.","zh":"店员告诉我这件衬衫的价格是200元，减去百分之二十的折扣。"},{"l":3,"en":"With three players absent, the team, minus its best shooter, still managed to win the match in the last minute.","zh":"在缺少三名球员的情况下，这支队伍少了最棒的射手，却仍在一分钟前赢得了比赛。"}]},{"pos":"adj.","m":"负的；减去的","ex":[{"l":1,"en":"The temperature is minus five degrees today.","zh":"今天的气温是零下五度。"},{"l":2,"en":"In winter, the temperature here often drops to minus ten degrees, which makes the river freeze completely.","zh":"冬天，这里的气温经常降到零下十度，这使得河水完全结冰。"},{"l":3,"en":"Rarely have we experienced such a cold winter, with the temperature staying below minus fifteen degrees for almost a whole month.","zh":"我们几乎从未经历过如此寒冷的冬天，气温将近一整月都维持在零下十五度以下。"}]}]},{"day":34,"w":"minute","ph":"","defs":[{"pos":"n.","m":"分钟；一会；瞬间","ex":[{"l":1,"en":"It's a few minutes after two.","zh":"现在是两点过几分。"},{"l":2,"en":"Please wait here for a few minutes, and I will check whether the manager has time to see you.","zh":"请在这里等几分钟，我去查一下经理是否有时间见你。"},{"l":3,"en":"What seemed like only a few minutes turned out to be a whole afternoon, as we were so deeply lost in the interesting book.","zh":"原以为只是几分钟的时间，结果却整整过了一个下午，因为我们太沉迷于这本有趣的书了。"}]}]},{"day":34,"w":"mirror","ph":"","defs":[{"pos":"n.","m":"镜子","ex":[{"l":1,"en":"She is looking at herself in the mirror.","zh":"她正照着镜子看自己。"},{"l":2,"en":"When I looked into the mirror this morning, I found that my hair was in a real mess.","zh":"今天早上我照镜子时，发现我的头发真是乱极了。"},{"l":3,"en":"A true friend is like a mirror that shows not only your smile but also the weaknesses you hardly notice yourself.","zh":"真正的朋友就像一面镜子，不仅照出你的微笑，也照出你自己几乎察觉不到的缺点。"}]}]},{"day":34,"w":"miss","ph":"","defs":[{"pos":"v.","m":"失去，错过；缺；惦记","ex":[{"l":1,"en":"Hurry up, or we will miss the bus.","zh":"快点，否则我们会错过公交车。"},{"l":2,"en":"I will miss the days when we studied together in this small village school.","zh":"我会想念我们在这所乡村小学一起学习的那些日子。"},{"l":3,"en":"Realizing that she might miss the last train, she ran as fast as possible, only to find the platform empty when she arrived.","zh":"意识到自己可能错过末班火车，她尽可能快地跑，结果到达时却发现站台空无一人。"}]}]},{"day":34,"w":"Miss","ph":"","defs":[{"pos":"n.","m":"小姐，女士","ex":[{"l":1,"en":"Miss Li is our English teacher.","zh":"李小姐是我们的英语老师。"},{"l":2,"en":"Miss Wang asked us to hand in our homework before she left the classroom.","zh":"王老师让我们在她离开教室之前交作业。"},{"l":3,"en":"Patient and kind as Miss Chen is, every student in our class regards her not only as a teacher but also as a close friend.","zh":"陈老师既耐心又和蔼，我们班每个学生不仅把她当作老师，更把她当作亲密的朋友。"}]}]},{"day":34,"w":"mistake","ph":"","defs":[{"pos":"n.","m":"错误","ex":[{"l":1,"en":"I made a mistake in the math test.","zh":"我在数学考试中犯了一个错误。"},{"l":2,"en":"If you are careless, you will make a lot of mistakes that you may regret later.","zh":"如果你粗心大意，你就会犯许多错误，以后可能会后悔。"},{"l":3,"en":"Not until the teacher pointed out my mistakes did I realize how important it is to check my work before handing it in.","zh":"直到老师指出我的错误，我才意识到交作业前检查是多么重要。"}]}]},{"day":34,"w":"mix","ph":"","defs":[{"pos":"v.","m":"混合，搅拌","ex":[{"l":1,"en":"If you mix red and yellow, what colour will you get?","zh":"如果你把红色和黄色混合，你会得到什么颜色？"},{"l":2,"en":"When you mix flour with water and sugar, you can make soft dough for delicious bread.","zh":"当你把面粉与水和糖混合时，你就能为美味的面包和出柔软的面团。"},{"l":3,"en":"Only by mixing theory with practice can students truly understand what they have learned in class.","zh":"只有把理论与实践相结合，学生才能真正理解他们在课堂上学到的知识。"}]}]},{"day":34,"w":"mixture","ph":"","defs":[{"pos":"n.","m":"混合物","ex":[{"l":1,"en":"The cake is a mixture of eggs and milk.","zh":"这蛋糕是鸡蛋和牛奶的混合物。"},{"l":2,"en":"The doctor gave the boy a mixture of honey and warm water, which helped him stop coughing at night.","zh":"医生给了这男孩一份蜂蜜加温水的混合物，帮助他在夜里停止咳嗽。"},{"l":3,"en":"This special mixture, produced by local farmers from herbs grown on the hillside, has become popular among visitors.","zh":"这种由当地农民用山坡上种植的草药制成的特殊混合物，在游客中变得很受欢迎。"}]}]},{"day":34,"w":"model","ph":"","defs":[{"pos":"n.","m":"模型；范例；模范；模特","ex":[{"l":1,"en":"He made a model plane yesterday.","zh":"他昨天做了一个模型飞机。"},{"l":2,"en":"The model who wore a red dress showed the students how to walk on the stage with confidence.","zh":"那位穿着红裙的模特向学生展示了如何自信地在舞台上行走。"},{"l":3,"en":"As a role model for teenagers, the famous athlete not only trains hard but also encourages young people to follow their dreams.","zh":"作为青少年的榜样，这位著名运动员不仅刻苦训练，还鼓励年轻人追寻梦想。"}]}]},{"day":34,"w":"modern","ph":"","defs":[{"pos":"adj.","m":"现代的","ex":[{"l":1,"en":"This is a modern city.","zh":"这是一座现代城市。"},{"l":2,"en":"Although the building looks old from the outside, its inside is filled with modern equipment.","zh":"虽然这栋楼从外面看很旧，但里面装满了现代化的设备。"},{"l":3,"en":"Few would deny that modern technology has greatly changed the way we communicate with each other.","zh":"很少有人会否认，现代科技极大地改变了我们彼此交流的方式。"}]}]},{"day":34,"w":"moment","ph":"","defs":[{"pos":"n.","m":"片刻，瞬间","ex":[{"l":1,"en":"Please wait a moment.","zh":"请等一会儿。"},{"l":2,"en":"The moment I saw the beautiful sunset, I knew I would never forget that evening.","zh":"我一看到那美丽的日落，就知道自己永远不会忘记那个傍晚。"},{"l":3,"en":"For a long moment the whole class remained silent, surprised by the news that they had won first prize.","zh":"在很长的一瞬间，全班同学都保持着沉默，为他们获得一等奖的消息感到惊讶。"}]}]},{"day":34,"w":"Monday","ph":"","defs":[{"pos":"n.","m":"星期一","ex":[{"l":1,"en":"Today is Monday.","zh":"今天是星期一。"},{"l":2,"en":"We usually have a long meeting on Monday morning, so I always get up early to prepare for it.","zh":"我们通常在星期一上午开一个长会，所以我总是早起准备。"},{"l":3,"en":"Since this Monday falls on a public holiday, the school has decided to move the exam to the following day.","zh":"由于这周一正好是公共假日，学校决定把考试推迟到第二天。"}]}]},{"day":34,"w":"money","ph":"","defs":[{"pos":"n.","m":"钱；货币","ex":[{"l":1,"en":"Even if you had given him much more money, he might not have paid off the debt.","zh":"即使你当时给了他更多的钱，他也可能还清不了债务。"},{"l":2,"en":"For example, I spend most of my spare money on new parts for my old mountain bike, but I love the experience of cycling, not owning bike parts!","zh":"例如，我把大部分零花钱花在旧山地车的新零件上，但我爱的是骑行的体验，而不是拥有自行车零件！"},{"l":3,"en":"It is said that people who spend money on experiences rather than things tend to feel happier in the long run.","zh":"据说，把钱花在体验上而非物品上的人，从长远来看往往更快乐。"}]}]},{"day":34,"w":"monitor","ph":"","defs":[{"pos":"n.","m":"班长；监控器","ex":[{"l":1,"en":"Our monitor is very kind.","zh":"我们的班长很善良。"},{"l":2,"en":"The monitor of our class always helps the teacher hand out books before the lesson begins.","zh":"我们班的班长总是在上课前帮老师把书发下去。"},{"l":3,"en":"Chosen as the new monitor, the shy girl promised to serve every student in the class wholeheartedly.","zh":"被选为新班长后，那个害羞的女孩承诺全心全意为班上每位同学服务。"}]}]},{"day":34,"w":"monkey","ph":"","defs":[{"pos":"n.","m":"猴子","ex":[{"l":1,"en":"The monkey is eating a banana.","zh":"那只猴子正在吃香蕉。"},{"l":2,"en":"When the visitors gave food to the little monkey, it quickly climbed up the tree with joy.","zh":"当游客把食物递给那只小猴子时，它高兴地迅速爬上了树。"},{"l":3,"en":"The monkeys living in this forest, which are protected by local people, have become a major attraction for tourists.","zh":"生活在这片森林里、受当地人保护的猴子，已成为吸引游客的主要景观。"}]}]},{"day":34,"w":"month","ph":"","defs":[{"pos":"n.","m":"月，月份","ex":[{"l":1,"en":"What month is this?","zh":"这是几月份？"},{"l":2,"en":"We will have a school trip next month, so we are busy preparing food and drinks these days.","zh":"下个月我们将有一次学校旅行，所以这些天我们正忙着准备食物和饮料。"},{"l":3,"en":"It was exactly three months ago that the young writer finished her first novel, which soon became a best-seller.","zh":"正好三个月前，那位年轻作家完成了她的第一部小说，该书很快成了畅销书。"}]}]},{"day":34,"w":"mood","ph":"","defs":[{"pos":"n.","m":"心情，语气，气氛","ex":[{"l":1,"en":"She is in a good mood today.","zh":"她今天心情很好。"},{"l":2,"en":"When you are in a bad mood, listening to soft music can help you calm down quickly.","zh":"当你心情不好的时候，听轻柔的音乐能帮你很快平静下来。"},{"l":3,"en":"The warm sunlight and gentle breeze created such a peaceful mood that nobody wanted to leave the garden.","zh":"温暖的阳光和微风营造出如此宁静的氛围，没有人想离开花园。"}]}]},{"day":34,"w":"moon","ph":"","defs":[{"pos":"n.","m":"月球；月亮","ex":[{"l":1,"en":"The moon is bright tonight.","zh":"今晚月光明亮。"},{"l":2,"en":"When the full moon rose above the mountain, the children began to sing songs around the fire.","zh":"当满月升起在山头时，孩子们开始在篝火旁唱歌。"},{"l":3,"en":"Looking up at the bright moon, the old man could not help thinking of the days he had spent with his family.","zh":"抬头望着明月，老人不禁想起与家人共度的那些日子。"}]}]},{"day":34,"w":"more","ph":"","defs":[{"pos":"adj.","m":"较多的；更大的；更多的","ex":[{"l":1,"en":"Even if you had given him much more money, he might not have paid off the debt.","zh":"即使你当时给了他更多的钱，他也可能还清不了债务。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后一点是，尽管有人说拥有东西是种巨大的快乐，但我认为使用你拥有的东西更令人愉快。"},{"l":3,"en":"The more time you spend reading, the more knowledge you will gain, which will benefit your future studies.","zh":"你花在阅读上的时间越多，获得的知识就越多，这将有益于你未来的学习。"}]},{"pos":"adv.","m":"再；更","ex":[{"l":1,"en":"Even if you had given him much more money, he might not have paid off the debt.","zh":"即使你当时给了他更多的钱，他也可能还清不了债务。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后一点是，尽管有人说拥有东西是种巨大的快乐，但我认为使用你拥有的东西更令人愉快。"},{"l":3,"en":"To learn English well, you should read aloud more often so that you can remember the new words more easily.","zh":"为了学好英语，你应该更经常地大声朗读，这样你就能更容易地记住生词。"}]},{"pos":"n.","m":"更多的量","ex":[{"l":1,"en":"Even if you had given him much more money, he might not have paid off the debt.","zh":"即使你当时给了他更多的钱，他也可能还清不了债务。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后一点是，尽管有人说拥有东西是种巨大的快乐，但我认为使用你拥有的东西更令人愉快。"},{"l":3,"en":"After a long run, the boy drank two glasses of water but still wanted more to quench his thirst.","zh":"长跑后，这男孩喝了两杯水，但还是想要更多来解渴。"}]}]},{"day":34,"w":"morning","ph":"","defs":[{"pos":"n.","m":"早晨，上午","ex":[{"l":1,"en":"Good morning.","zh":"早上好。"},{"l":2,"en":"One morning, we left early and this time our uncle had bought us backpacks.","zh":"一天早上，我们很早就出发了，这一次叔叔给我们买了背包。"},{"l":3,"en":"Early the next morning, before the sun had fully risen, the children set off for the mountain with great excitement.","zh":"第二天清晨，太阳还未完全升起，孩子们就怀着极大的兴奋出发前往那座山。"}]}]},{"day":34,"w":"most","ph":"","defs":[{"pos":"adj.","m":"最大的；最多的；大多数的；大部分的","ex":[{"l":1,"en":"This is because the lower leaves are easier for most animals to reach.","zh":"这是因为较低的叶子对大多数动物来说更容易够到。"},{"l":2,"en":"For example, I spend most of my spare money on new parts for my old mountain bike, but I love the experience of cycling, not owning bike parts!","zh":"例如，我把大部分零花钱花在旧山地车的新零件上，但我爱的是骑行的体验，而不是拥有自行车零件！"},{"l":3,"en":"Most students who took part in the survey said that reading helps them relax after a busy day at school.","zh":"参加调查的大多数学生说，阅读有助于他们在学校忙碌一天后放松。"}]},{"pos":"adv.","m":"最","ex":[{"l":1,"en":"This is because the lower leaves are easier for most animals to reach.","zh":"这是因为较低的叶子对大多数动物来说更容易够到。"},{"l":2,"en":"For example, I spend most of my spare money on new parts for my old mountain bike, but I love the experience of cycling, not owning bike parts!","zh":"例如，我把大部分零花钱花在旧山地车的新零件上，但我爱的是骑行的体验，而不是拥有自行车零件！"},{"l":3,"en":"Among all the subjects, the girl likes English most because she dreams of studying abroad one day.","zh":"在所有学科中，这女孩最喜欢英语，因为她梦想有一天出国留学。"}]},{"pos":"n.","m":"大部分；大多数","ex":[{"l":1,"en":"This is because the lower leaves are easier for most animals to reach.","zh":"这是因为较低的叶子对大多数动物来说更容易够到。"},{"l":2,"en":"For example, I spend most of my spare money on new parts for my old mountain bike, but I love the experience of cycling, not owning bike parts!","zh":"例如，我把大部分零花钱花在旧山地车的新零件上，但我爱的是骑行的体验，而不是拥有自行车零件！"},{"l":3,"en":"Most of what the old teacher said has been written down by the students, who will review it before the final exam.","zh":"老教师说的大部分内容都已被学生记下，他们将在期末考试前复习。"}]}]},{"day":34,"w":"mother","ph":"","defs":[{"pos":"n.","m":"母亲","ex":[{"l":1,"en":"My mother works in a hospital.","zh":"我母亲在一家医院工作。"},{"l":2,"en":"My mother told me that I should finish my homework before I watched TV.","zh":"我妈妈告诉我，我应该先完成作业再看电视。"},{"l":3,"en":"Not until I became a parent did I truly understand how much my mother had sacrificed for the family over the years.","zh":"直到我自己为人父母，我才真正理解这些年来母亲为家庭付出了多少。"}]}]},{"day":34,"w":"motorcycle","ph":"","defs":[{"pos":"n.","m":"摩托车","ex":[{"l":1,"en":"He bought a new motorcycle last week.","zh":"他上周买了一辆新摩托车。"},{"l":2,"en":"The young man who rode a red motorcycle along the street was stopped by the police because he was speeding.","zh":"那个骑着红色摩托车沿街飞驰的年轻人被警察拦下了，因为他超速了。"},{"l":3,"en":"Riding a motorcycle across the mountains may sound exciting, but it actually requires considerable skill and great care.","zh":"骑摩托车翻越群山听起来令人兴奋，但事实上它需要相当娴熟的技术和高度的谨慎。"}]}]},{"day":34,"w":"mountain","ph":"","defs":[{"pos":"n.","m":"山；山脉","ex":[{"l":1,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网
