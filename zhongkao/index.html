室去享受这短暂的休息。"}]}]},{"day":25,"w":"hardworking","ph":"","defs":[{"pos":"adj.","m":"努力工作的","ex":[{"l":1,"en":"Success belongs to hardworking students in the end.","zh":"成功最终属于努力的学生。"},{"l":2,"en":"All the teachers agree that hardworking students usually make greater progress than those who give up easily.","zh":"所有老师都认为，努力的学生通常比轻易放弃的学生进步更大。"},{"l":3,"en":"What impresses me most is that this hardworking girl never complains no matter how tired she is.","zh":"最让我印象深刻的是，无论多累，这个勤奋的女孩从不抱怨。"}]}]},{"day":25,"w":"harm","ph":"","defs":[{"pos":"v.&n.","m":"伤害","ex":[{"l":1,"en":"Smoking harms your health.","zh":"吸烟有害健康。"},{"l":2,"en":"Junk food does harm to our bodies if we eat too much of it every day.","zh":"如果我们每天吃太多垃圾食品，它会对我们的身体造成伤害。"},{"l":3,"en":"What we must remember is that too much screen time will do harm to both our eyes and our sleep.","zh":"我们必须记住，看屏幕时间过长会对眼睛和睡眠都造成伤害。"}]}]},{"day":25,"w":"harmful","ph":"","defs":[{"pos":"adj.","m":"有害的；导致损害的","ex":[{"l":1,"en":"Smoking is harmful to your health.","zh":"吸烟对你的健康有害。"},{"l":2,"en":"Reading in the dark is harmful to your eyes, so you should always turn on a lamp when you study at night.","zh":"在暗处看书对你的眼睛有害，所以晚上学习时你应当总是开着台灯。"},{"l":3,"en":"It is the harmful habits that we form in childhood which often do the greatest damage to our bodies in later years.","zh":"正是我们在童年时期养成的有害习惯，往往会在日后对我们的身体造成最大的伤害。"}]}]},{"day":25,"w":"hat","ph":"","defs":[{"pos":"n.","m":"帽子","ex":[{"l":1,"en":"Don’t you have my hat?","zh":"你没拿我的帽子吗？"},{"l":2,"en":"The hat that grandma bought me last winter is so warm that I wear it almost every cold morning.","zh":"奶奶去年冬天给我买的那顶帽子非常暖和，几乎每个寒冷的早晨我都戴着它。"},{"l":3,"en":"Not until I reached the school gate did I realize that I had left my favourite hat on the table at home.","zh":"直到走到校门口，我才意识到我把最心爱的帽子落在了家里的桌上。"}]}]},{"day":25,"w":"hate","ph":"","defs":[{"pos":"v.&n.","m":"不喜欢；恨；讨厌","ex":[{"l":1,"en":"I hate rainy days.","zh":"我讨厌下雨天。"},{"l":2,"en":"Although she hates getting up early, she always arrives at school on time because she does not want to be late.","zh":"尽管她讨厌早起，她总是准时到校，因为她不想迟到。"},{"l":3,"en":"What I really hate is being kept waiting for hours without any clear explanation.","zh":"我真正讨厌的是被晾在那儿等上好几个小时，却得不到任何清楚的解释。"}]}]},{"day":25,"w":"have","ph":"","defs":[{"pos":"v.","m":"有；吃；喝；进行","ex":[{"l":1,"en":"Do you have a book?","zh":"你有一本书吗？"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"路易丝现在十三岁，正在学习中文，中文已成为与英语同样重要的世界语言。路易丝有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"Only when you have mastered the basics of a language can you truly enjoy reading its literature and understanding its culture.","zh":"只有当你掌握了一门语言的基础之后，你才能真正欣赏它的文学作品并理解它的文化。"}]}]},{"day":25,"w":"head","ph":"","defs":[{"pos":"n.","m":"头；头脑；首脑","ex":[{"l":1,"en":"Susan, the head teacher, invited students to share their ideas about how to rebuild the school.","zh":"校长苏珊邀请学生们分享他们关于如何重建学校的想法。"},{"l":2,"en":"Your fan, Carmen Rivera --- A head master is giving a speech about how to perform successfully in an interview to a new school.","zh":"你的粉丝卡门·里韦拉——一位校长正在发表演讲，讲述如何在升入新学校的面试中表现出色。"},{"l":3,"en":"It was the head teacher who encouraged me to believe in myself when I wanted to give up my studies.","zh":"正是那位班主任，在我想放弃学业的时候鼓励我相信自己。"}]}]},{"day":25,"w":"headache","ph":"","defs":[{"pos":"n.","m":"头痛","ex":[{"l":1,"en":"I have a bad headache.","zh":"我头痛得厉害。"},{"l":2,"en":"If you keep staring at the screen for too long, you will probably get a headache and feel tired.","zh":"如果你一直盯着屏幕太久，你很可能会头痛并感到疲倦。"},{"l":3,"en":"Such a terrible headache did I have last night that I could hardly fall asleep until three in the morning.","zh":"昨晚我头痛得如此厉害，直到凌晨三点才勉强睡着。"}]}]},{"day":25,"w":"headline","ph":"","defs":[{"pos":"n.","m":"（报刊的）大字标题","ex":[{"l":1,"en":"The headline is very big.","zh":"这个大字标题很大。"},{"l":2,"en":"The headline on the front page caught everyone’s attention because it reported an exciting piece of news.","zh":"头版上的大字标题吸引了所有人的注意，因为它报道了一条令人振奋的消息。"},{"l":3,"en":"Hardly had the newspaper come out when the surprising headline spread quickly across the whole city.","zh":"报纸刚一出版，那条惊人的大字标题便迅速传遍了整座城市。"}]}]},{"day":25,"w":"headmaster","ph":"","defs":[{"pos":"n.","m":"（英）中小学校长","ex":[{"l":1,"en":"The headmaster is very kind.","zh":"校长非常和蔼。"},{"l":2,"en":"The headmaster promised that he would build a new library if more money could be raised this year.","zh":"校长承诺，如果今年能筹集到更多资金，他就建一座新图书馆。"},{"l":3,"en":"Not only does the headmaster care about our studies, but he also pays close attention to our mental health.","zh":"校长不仅关心我们的学业，还密切关注我们的心理健康。"}]}]},{"day":25,"w":"health","ph":"","defs":[{"pos":"n.","m":"健康","ex":[{"l":1,"en":"Health is very important.","zh":"健康非常重要。"},{"l":2,"en":"Since health is the most valuable thing we own, we should take good care of it every single day.","zh":"既然健康是我们拥有的最宝贵的东西，我们每天都应当好好珍惜它。"},{"l":3,"en":"It is health, rather than wealth, that truly decides whether a person can enjoy a happy life.","zh":"真正决定一个人能否享受幸福生活的，是健康，而不是财富。"}]}]},{"day":25,"w":"healthy","ph":"","defs":[{"pos":"adj.","m":"健康的","ex":[{"l":1,"en":"She looks healthy and strong.","zh":"她看起来既健康又强壮。"},{"l":2,"en":"Eating more vegetables and fruit is a good way to stay healthy, while too much junk food will do you harm.","zh":"多吃蔬菜和水果是保持健康的好方法，而过多的垃圾食品会损害你的身体。"},{"l":3,"en":"Only by forming healthy habits early in life can we lay a solid foundation for a long and active future.","zh":"只有在生命早期养成健康的习惯，我们才能为漫长而充满活力的未来打下坚实的基础。"}]}]},{"day":25,"w":"hear","ph":"","defs":[{"pos":"v.","m":"听见；听说；得知","ex":[{"l":1,"en":"Can you hear me?","zh":"你能听见我说话吗？"},{"l":2,"en":"I was so excited when I heard that our class had won the first prize in the singing competition.","zh":"当我听说我们班在歌唱比赛中获得了一等奖时，我非常激动。"},{"l":3,"en":"Never before had I heard such a moving speech that it brought tears to almost everyone’s eyes.","zh":"我从未听过如此动人的演讲，它几乎让在场的每个人都热泪盈眶。"}]}]},{"day":25,"w":"heart","ph":"","defs":[{"pos":"n.","m":"心；心脏","ex":[{"l":1,"en":"My heart beats fast.","zh":"我的心跳得很快。"},{"l":2,"en":"When she saw the lost dog find its way home, her heart was filled with joy and warmth.","zh":"当她看到那只走失的狗自己找到了回家的路时，她的内心充满了喜悦与温暖。"},{"l":3,"en":"With all his heart devoted to the research, the young scientist finally achieved a great breakthrough.","zh":"这位年轻的科学家全身心投入研究，最终取得了重大突破。"}]}]},{"day":25,"w":"heat","ph":"","defs":[{"pos":"n.","m":"热度，热量","ex":[{"l":1,"en":"The heat is too strong.","zh":"这热度太强了。"},{"l":2,"en":"The heat of the summer sun made it impossible for us to play football on the playground at noon.","zh":"夏日阳光的炎热让我们无法在中午去操场上踢足球。"},{"l":3,"en":"So terrible was the heat that day that even the river beside our village almost dried up.","zh":"那天的酷热如此可怕，连我们村旁的小河都几乎干涸了。"}]},{"pos":"v.","m":"加热","ex":[{"l":1,"en":"Please heat the milk.","zh":"请把牛奶加热。"},{"l":2,"en":"Before you heat the soup, you should wash your hands and check whether the pot is clean.","zh":"在加热汤之前，你应该洗手，并检查锅是否干净。"},{"l":3,"en":"It is safer to heat the food slowly over a small fire than to rush the process with a large flame.","zh":"用文火慢慢加热食物，比用大火急于求成要更安全。"}]}]},{"day":25,"w":"heavily","ph":"","defs":[{"pos":"adv.","m":"沉重地；大量地","ex":[{"l":1,"en":"It is raining heavily.","zh":"雨下得很大。"},{"l":2,"en":"When it rained heavily yesterday afternoon, we had to stay in the classroom and read books.","zh":"昨天下午雨下得很大时，我们只好待在教室里看书。"},{"l":3,"en":"Although the snow fell heavily throughout the night, the early buses still managed to run on time.","zh":"尽管整夜大雪纷飞，早班车仍然设法准时运行。"}]}]},{"day":25,"w":"heavy","ph":"","defs":[{"pos":"adj.","m":"重的","ex":[{"l":1,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle’s backpack was half-empty.","zh":"背包太重了，我们把它们放在地上时如释重负地长舒一口气，而我们叔叔的背包却空了一半。"},{"l":2,"en":"The box was so heavy that nobody in the class could lift it without someone else’s help.","zh":"这个箱子太重了，班上没有人能在没有别人帮忙的情况下举起它。"},{"l":3,"en":"Never before have I carried such a heavy backpack on a long mountain trip as I did last weekend.","zh":"在上周末的长途登山旅行中，我背了从未有过的那么沉重的背包。"}]}]},{"day":25,"w":"height","ph":"","defs":[{"pos":"n.","m":"高度","ex":[{"l":1,"en":"What is the height of the tree?","zh":"这棵树的高度是多少？"},{"l":2,"en":"The height of the new building is twice that of the old one, which surprises everyone in the town.","zh":"这座新楼的高度是旧楼的两倍，这让镇上所有人都感到惊讶。"},{"l":3,"en":"It is not the height of a person but the depth of his character that truly matters in the long run.","zh":"从长远来看，真正重要的不是一个人的身高，而是他品格的深度。"}]}]},{"day":25,"w":"hello","ph":"","defs":[{"pos":"int.","m":"喂；你好","ex":[{"l":1,"en":"Hello, everyone!","zh":"大家好！"},{"l":2,"en":"Hello, my name is Li Ming, and I would like to make friends with all of you in this new class.","zh":"你好，我叫李明，我想在这个新班级里和大家交朋友。"},{"l":3,"en":"‘Hello’ may be a simple word, yet it often opens the door to a warm and lasting friendship.","zh":"‘你好’也许是个简单的词，却常常能开启一段温暖而持久的友谊。"}]}]},{"day":25,"w":"help","ph":"","defs":[{"pos":"v.&n.","m":"帮助，帮忙","ex":[{"l":1,"en":"The canal will also help to move water.","zh":"这条运河也将帮助引水。"},{"l":2,"en":"It also helps to take courses in maths and computer science.","zh":"学习数学和计算机科学课程也会有所帮助。"},{"l":3,"en":"Only by working together and helping each other can we solve the problems that seem impossible at first.","zh":"只有齐心协力、互相帮助，我们才能解决那些起初看似不可能的问题。"}]}]},{"day":25,"w":"helpful","ph":"","defs":[{"pos":"adj.","m":"有帮助的；有益的","ex":[{"l":1,"en":"This book is very helpful.","zh":"这本书很有帮助。"},{"l":2,"en":"A good dictionary is helpful when you read English stories, because it explains new words clearly.","zh":"读英语故事时，一本好词典很有帮助，因为它能清楚地解释生词。"},{"l":3,"en":"It was his helpful advice that finally enabled me to overcome the difficulties in my English writing.","zh":"正是他有益的建议，最终使我克服了英语写作中的困难。"}]}]},{"day":25,"w":"helpless","ph":"","defs":[{"pos":"adj.","m":"无助的，没有帮助的","ex":[{"l":1,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，当他们在生活中遇到困难时，可能会感到无助和沮丧，特别是那些害羞的学生。"},{"l":2,"en":"When the little girl got lost in the crowded station, she felt completely helpless and did not know whom she should turn to for help.","zh":"当小女孩在拥挤的车站迷路时，她感到完全无助，不知道应该向谁求助。"},{"l":3,"en":"Caught in the heavy rain without an umbrella, the old man stood helpless at the bus stop until a kind teenager offered to share his.","zh":"老人被困在暴雨中又没有带伞，无助地站在公交车站，直到一位好心的少年主动和他共用一把伞。"}]}]},{"day":25,"w":"here","ph":"","defs":[{"pos":"adv.","m":"这里；在这里；向这里","ex":[{"l":1,"en":"You were here in February,weren’t you?","zh":"你二月份在这里，不是吗？"},{"l":2,"en":"If you stand here, you will be able to see the whole city clearly and take wonderful photos of the river.","zh":"如果你站在这里，你就能清楚地看到整座城市，并拍下河流的精美照片。"},{"l":3,"en":"Here comes the bus we have been waiting for since early morning, so let us get ready to get on quickly.","zh":"我们从清早一直等的那辆公交车终于来了，我们赶紧准备上车吧。"}]}]},{"day":25,"w":"hero","ph":"","defs":[{"pos":"n.","m":"英雄；勇士；男主角","ex":[{"l":1,"en":"The young man became a hero after he saved the boy from the river.","zh":"那个年轻人从河里救出男孩后成了一名英雄。"},{"l":2,"en":"The fireman who rushed into the burning house to save the children was regarded as a real hero by the whole town.","zh":"冲进燃烧的房屋救出孩子们的消防员被全镇人视为真正的英雄。"},{"l":3,"en":"Not until I read the news did I realize that the quiet man living next door was actually a national hero who had saved dozens of lives.","zh":"直到读了那条新闻我才意识到，住在隔壁的那位安静的老人竟是一位救过几十条人命的民族英雄。"}]}]},{"day":25,"w":"hesitate","ph":"","defs":[{"pos":"v.","m":"犹豫；踌躇","ex":[{"l":1,"en":"Please do not hesitate to ask me if you have any questions.","zh":"如果你有任何问题，请不要犹豫问我。"},{"l":2,"en":"Whenever you are in trouble, you should not hesitate to ask your teachers and friends for help because they are always ready to support you.","zh":"每当你遇到困难时，都不应犹豫向老师和朋友求助，因为他们总是乐意帮助你。"},{"l":3,"en":"Seeing the old lady struggling with her heavy bags, the boy did not hesitate for a moment before he ran across to give her a hand.","zh":"看到那位老奶奶正吃力地拎着沉重的袋子，男孩一刻也没有犹豫，便跑过去帮她。"}]}]},{"day":25,"w":"hide","ph":"","defs":[{"pos":"v.","m":"把...藏起来，隐藏","ex":[{"l":1,"en":"The cat likes to hide behind the door when it is afraid.","zh":"猫害怕时喜欢藏在门后面。"},{"l":2,"en":"The children were playing hide-and-seek in the garden, and Tom tried to hide himself behind a big tree so that nobody could find him.","zh":"孩子们正在花园里玩捉迷藏，汤姆想把自己藏在一棵大树后面，这样就没人能找到他。"},{"l":3,"en":"It is wrong of you to hide the truth from your parents, because honesty is always the best policy between family members.","zh":"向父母隐瞒真相是不对的，因为诚实永远是家人之间最好的相处之道。"}]}]},{"day":25,"w":"high","ph":"","defs":[{"pos":"adj.","m":"高的","ex":[{"l":1,"en":"The higher levels of nicotine discourage the insect.","zh":"较高浓度的尼古丁能驱赶昆虫。"},{"l":2,"en":"Since the mountain is too high for beginners to climb safely, the guide advised us to take a longer but easier path to the top.","zh":"由于这座山对初学者来说太高，无法安全攀登，向导建议我们走一条更长但更容易的路到达山顶。"},{"l":3,"en":"The higher we climbed up the mountain, the thinner the air became, which made it difficult for us to breathe normally.","zh":"我们爬得越高，空气就越稀薄，这使我们难以正常呼吸。"}]}]},{"day":25,"w":"hill","ph":"","defs":[{"pos":"n.","m":"小山","ex":[{"l":1,"en":"The children ran up the hill and had a picnic at the top.","zh":"孩子们跑上山，在山顶野餐。"},{"l":2,"en":"Every Sunday morning, my grandfather walks slowly to the top of the hill behind our village so that he can enjoy the fresh air there.","zh":"每个星期天早上，我爷爷都慢慢地走到村后小山的山顶，这样他就能享受那里的新鲜空气。"},{"l":3,"en":"Standing on the top of the hill, we could see the whole city spread out below us like a shining picture in the morning sun.","zh":"站在山顶上，我们可以看到整座城市像一幅闪闪发光的画卷在晨曦中展现在我们脚下。"}]}]},{"day":25,"w":"historical","ph":"","defs":[{"pos":"adj.","m":"历史的，历史上的","ex":[{"l":1,"en":"We visited a historical museum in the city center yesterday.","zh":"昨天我们参观了市中心的一座历史博物馆。"},{"l":2,"en":"The teacher told us that this old bridge is not only a historical building but also a popular place where tourists from all over the world come to visit.","zh":"老师告诉我们，这座古桥不仅是一座历史建筑，也是世界各地游客前来参观的热门景点。"},{"l":3,"en":"Knowing little about the historical background of the novel, the students found it hard to understand why the hero made such a difficult choice.","zh":"由于对这部小说的历史背景知之甚少，学生们很难理解主人公为何做出如此艰难的抉择。"}]}]},{"day":25,"w":"history","ph":"","defs":[{"pos":"n.","m":"历史；历史学","ex":[{"l":1,"en":"I am very interested in Chinese history.","zh":"我对中国历史非常感兴趣。"},{"l":2,"en":"Our history teacher often says that if we want to understand the present clearly, we must first learn what happened in the past.","zh":"我们的历史老师常说，如果想清楚地了解现在，我们必须先了解过去发生过什么。"},{"l":3,"en":"Only by studying history carefully can we avoid making the same mistakes again and build a much brighter future for the next generation.","zh":"只有认真研究历史，我们才能避免重蹈覆辙，为下一代建设一个更加光明的未来。"}]}]},{"day":26,"w":"hit","ph":"","defs":[{"pos":"v.","m":"打，撞，击中，碰撞","ex":[{"l":1,"en":"The ball hit the window and broke it.","zh":"球击中了窗户，把它打碎了。"},{"l":2,"en":"When the boy was crossing the road, a speeding car almost hit him, which made all the people around cry out in fear.","zh":"当男孩过马路时，一辆超速行驶的汽车差点撞到他，这让周围所有人都害怕地叫了起来。"},{"l":3,"en":"It was the heavy storm that hit the coastal city last night, leaving thousands of families without electricity for hours.","zh":"正是昨晚那场猛烈的暴风雨袭击了这座沿海城市，使数千户家庭停电数小时。"}]}]},{"day":26,"w":"hobby","ph":"","defs":[{"pos":"n.","m":"兴趣，嗜好","ex":[{"l":1,"en":"My hobby is reading books on weekends.","zh":"我的爱好是在周末读书。"},{"l":2,"en":"Collecting stamps is an interesting hobby because it can help you learn about different countries while you enjoy yourself.","zh":"集邮是一项有趣的爱好，因为它能在你享受乐趣的同时帮助你了解不同的国家。"},{"l":3,"en":"Having a hobby not only makes our free time more meaningful, but also gives us a chance to make friends who share the same interest.","zh":"拥有一项爱好不仅能让我们的业余时间更有意义，还能让我们有机会结交志趣相投的朋友。"}]}]},{"day":26,"w":"hold","ph":"","defs":[{"pos":"v.","m":"拿；抱；举行；进行；保持；容纳","ex":[{"l":1,"en":"Olivia asked her secretary if the exhibition would be held in Shanghai.","zh":"奥利维亚问她的秘书展览是否会在上海举行。"},{"l":2,"en":"The school will hold a sports meeting next Friday, and every student is looking forward to taking part in the exciting games.","zh":"学校下周五将举行运动会，每个学生都期待着参加这些激动人心的比赛。"},{"l":3,"en":"It was the old man who held my hand tightly and told me that no matter how hard life was, I should never give up my dream.","zh":"正是那位老人紧紧握着我的手告诉我，无论生活多么艰难，我都绝不能放弃自己的梦想。"}]}]},{"day":26,"w":"hole","ph":"","defs":[{"pos":"n.","m":"洞；坑","ex":[{"l":1,"en":"There is a big hole in the wall of the old house.","zh":"旧房子的墙上有一个大洞。"},{"l":2,"en":"The workers found a deep hole in the ground, and they decided to fill it with stones so that nobody would fall into it by accident.","zh":"工人们在地上发现了一个深洞，他们决定用石头把它填满，以免有人不小心掉进去。"},{"l":3,"en":"Having noticed a small hole in his pocket, the boy realized that was the reason why his coins had been dropping out all morning.","zh":"男孩注意到口袋上有一个小洞后，才意识到这就是他一上午硬币不断掉落的原因。"}]}]},{"day":26,"w":"holiday","ph":"","defs":[{"pos":"n.","m":"假日；假期","ex":[{"l":1,"en":"I would have had a much better holiday if I had stayed at home.","zh":"如果我待在家里，我就会有一个好得多的假期。"},{"l":2,"en":"During the summer holiday, my family went to a beautiful village where we could swim in the river and pick fresh fruit in the orchard.","zh":"暑假期间，我们一家去了一个美丽的村庄，在那里我们可以在河里游泳，还可以在果园里摘新鲜的水果。"},{"l":3,"en":"Not until the holiday was over did the children realize how quickly the happy days had passed and how much homework they still had to finish.","zh":"直到假期结束，孩子们才意识到那些快乐的日子过得有多快，以及他们还有多少作业要完成。"}]}]},{"day":26,"w":"home","ph":"","defs":[{"pos":"n.","m":"家","ex":[{"l":1,"en":"There is no place like home.","zh":"没有比家更好的地方。"},{"l":2,"en":"No matter how far we travel, we will always remember that home is the warmest place where we can rest and feel safe.","zh":"无论我们走得多远，我们都会永远记得，家是我们能休息和感到安全的最温暖的地方。"},{"l":3,"en":"It was not until he left home for college that the young man truly understood how much his parents had done for him over the years.","zh":"直到离家上大学，那个年轻人才真正体会到多年来父母为他付出了多少。"}]},{"pos":"adv.","m":"在家；到家；回家","ex":[{"l":1,"en":"I go home at five o'clock every day.","zh":"我每天五点钟回家。"},{"l":2,"en":"When the bell rings at the end of the day, all the students hurry home because they want to tell their parents what happened at school.","zh":"放学铃声一响，所有学生都赶着回家，因为他们想把学校里发生的事告诉父母。"},{"l":3,"en":"Tired but happy, the volunteers did not go home until every child in the village had received a new book and a warm smile.","zh":"志愿者们虽然疲惫却很快乐，直到村里每个孩子都拿到一本新书和一个温暖的微笑，他们才回家。"}]}]},{"day":26,"w":"homeless","ph":"","defs":[{"pos":"adj.","m":"无家可归的","ex":[{"l":1,"en":"The kind woman gave some food to the homeless dog.","zh":"善良的女人给那只无家可归的狗一些食物。"},{"l":2,"en":"In winter, the weather is so cold that many homeless people have to sleep on the streets, which makes us feel really sad.","zh":"冬天天气太冷，许多无家可归的人不得不睡在街头，这让我们感到非常难过。"},{"l":3,"en":"Deeply moved by the homeless boy's story, the kind teacher decided to offer him not only free meals but also a chance to go back to school.","zh":"被那个无家可归男孩的故事深深打动，善良的老师决定不仅为他提供免费餐食，还给他一个重返校园的机会。"}]}]},{"day":26,"w":"hometown","ph":"","defs":[{"pos":"n.","m":"家乡，故乡","ex":[{"l":1,"en":"I love my hometown very much.","zh":"我非常爱我的家乡。"},{"l":2,"en":"Although my hometown is a small town, it has changed so much in recent years that I can hardly recognize the streets I used to play on.","zh":"虽然我的家乡是一个小镇，但这些年来它变化太大，以至于我几乎认不出我过去常玩的街道了。"},{"l":3,"en":"Having lived abroad for ten years, the old scientist finally returned to his hometown, where he decided to set up a free library for children.","zh":"在国外生活了十年之后，那位老科学家终于回到了家乡，并决定在那里为孩子们建一所免费图书馆。"}]}]},{"day":26,"w":"homework","ph":"","defs":[{"pos":"n.","m":"家庭作业","ex":[{"l":1,"en":"I finish my homework before dinner every day.","zh":"我每天晚饭前完成作业。"},{"l":2,"en":"If you finish your homework carefully every day, you will find that learning becomes much easier and your grades will improve quickly.","zh":"如果你每天认真完成作业，你会发现学习变得容易得多，成绩也会很快提高。"},{"l":3,"en":"It was not the heavy homework but his own laziness that caused him to fail the exam, which he finally admitted to his parents.","zh":"不是繁重的作业，而是他自己的懒惰导致他考试不及格，这一点他最终向父母承认了。"}]}]},{"day":26,"w":"honest","ph":"","defs":[{"pos":"adj.","m":"诚实的；正直的","ex":[{"l":1,"en":"To be honest, being a child of a fireman can be difficult.","zh":"说实话，做消防员的孩子可能会很不容易。"},{"l":2,"en":"To be honest, I was so nervous before the speech that I could hardly say a word, but my teacher's smile gave me courage.","zh":"说实话，演讲前我紧张得几乎说不出一句话，但老师的微笑给了我勇气。"},{"l":3,"en":"Honest as he was, the boy still hesitated for a long time before he told his mother the truth about the broken vase in the living room.","zh":"尽管男孩很诚实，他在告诉母亲客厅花瓶被打碎的真相之前，还是犹豫了很久。"}]}]},{"day":26,"w":"honesty","ph":"","defs":[{"pos":"n.","m":"诚实","ex":[{"l":1,"en":"Honesty is the best policy.","zh":"诚实为上策。"},{"l":2,"en":"The teacher told us that honesty is more important than good grades in the long run.","zh":"老师告诉我们，从长远来看，诚实比好成绩更重要。"},{"l":3,"en":"Only when we treat honesty as the foundation of our lives can we win the trust of the people around us.","zh":"只有当我们把诚实当作生活的根基时，我们才能赢得周围人的信任。"}]}]},{"day":26,"w":"honey","ph":"","defs":[{"pos":"n.","m":"蜂蜜","ex":[{"l":1,"en":"The honey tastes very sweet.","zh":"这蜂蜜尝起来很甜。"},{"l":2,"en":"My grandmother often adds some honey to warm water because it is good for our health.","zh":"我奶奶常在温水里加些蜂蜜，因为那对我们的健康有益。"},{"l":3,"en":"Mixed with warm water and lemon, the honey makes a soothing drink that many people enjoy on cold winter mornings.","zh":"与温水和柠檬混合后，这蜂蜜制成了一杯润喉的饮品，许多人在寒冬的清晨都喜欢喝。"}]}]},{"day":26,"w":"honour","ph":"","defs":[{"pos":"n.","m":"荣誉，光荣","ex":[{"l":1,"en":"Winning the match is a great honour.","zh":"赢得比赛是一项极大的荣誉。"},{"l":2,"en":"It is a great honour for me to be chosen to represent our school in the speech contest.","zh":"能被选中代表学校参加演讲比赛，对我来说是一项极大的荣誉。"},{"l":3,"en":"Defending the honour of the team, every player trained so hard that they hardly had time to rest before the final.","zh":"为了捍卫球队的荣誉，每位队员训练得如此刻苦，以至于在决赛前几乎没有时间休息。"}]}]},{"day":26,"w":"hope","ph":"","defs":[{"pos":"n.&v.","m":"希望","ex":[{"l":1,"en":"I hope so.","zh":"我希望如此。"},{"l":2,"en":"We wanted them to think of ideas to express their own interests and hopes,\" she said.","zh":"她说：我们希望他们能想出办法，来表达自己的兴趣与希望。"},{"l":3,"en":"Filled with hope, the students walked into the examination room, believing that their years of hard work would finally pay off.","zh":"满怀希望地，学生们走进考场，相信多年的努力终将得到回报。"}]}]},{"day":26,"w":"hopeful","ph":"","defs":[{"pos":"adj.","m":"满怀希望的；抱有希望的；表现出希望的；给人以希望的","ex":[{"l":1,"en":"She is hopeful about the result.","zh":"她对结果抱有希望。"},{"l":2,"en":"Although the task is difficult, we remain hopeful that we can finish it before Friday.","zh":"虽然任务很困难，但我们仍然抱有希望，能在周五之前完成它。"},{"l":3,"en":"The hopeful look in her eyes showed that she still believed a miracle could happen despite all the setbacks she had faced.","zh":"她眼中那充满希望的神情表明，尽管经历了种种挫折，她仍然相信奇迹会发生。"}]}]},{"day":26,"w":"hopeless","ph":"","defs":[{"pos":"adj.","m":"没有希望的；无望的","ex":[{"l":1,"en":"The broken watch is hopeless.","zh":"这块坏掉的手表没救了。"},{"l":2,"en":"He felt hopeless when he realized that nobody could help him solve the difficult problem.","zh":"当他意识到没有人能帮他解决这个难题时，他感到毫无希望。"},{"l":3,"en":"Lost in the dark forest with no phone signal, the tourists began to feel hopeless about ever finding their way back to the camp.","zh":"迷失在没有手机信号的黑暗森林里，游客们开始对能否找到回营地的路感到无望。"}]}]},{"day":26,"w":"horrible","ph":"","defs":[{"pos":"adj.","m":"令人恐惧的；恐怖的","ex":[{"l":1,"en":"That was a horrible dream.","zh":"那是一个可怕的梦。"},{"l":2,"en":"The weather was so horrible that we had to cancel the picnic we had planned for weeks.","zh":"天气太糟糕了，我们不得不取消筹划了好几周的野餐。"},{"l":3,"en":"The film was so horrible that even the bravest boy in our class could not help covering his eyes during the scariest scene.","zh":"这部电影如此恐怖，就连我们班最勇敢的男生在最吓人的那一幕也忍不住捂住了眼睛。"}]}]},{"day":26,"w":"horse","ph":"","defs":[{"pos":"n.","m":"马","ex":[{"l":1,"en":"The horse runs very fast.","zh":"这匹马跑得很快。"},{"l":2,"en":"The horse which my uncle bought last year has won several prizes in the local races.","zh":"我叔叔去年买的那匹马，已经在当地的比赛中赢了好几个奖。"},{"l":3,"en":"Frightened by the sudden noise, the horse suddenly jumped over the fence and ran wildly across the open field.","zh":"被突如其来的声响吓到，那匹马猛地跃过栅栏，在空旷的原野上狂奔起来。"}]}]},{"day":26,"w":"hospital","ph":"","defs":[{"pos":"n.","m":"医院","ex":[{"l":1,"en":"I was in the hospital for several weeks.","zh":"我在医院住了几个星期。"},{"l":2,"en":"When I arrived at the hospital, the doctor told me that my grandfather was already out of danger.","zh":"当我赶到医院时，医生告诉我，我祖父已经脱离了危险。"},{"l":3,"en":"Rushed to the nearest hospital by ambulance, the injured driver was treated at once and fortunately recovered a few weeks later.","zh":"受伤的司机被救护车紧急送往最近的医院，立刻接受了治疗，所幸几周后便康复了。"}]}]},{"day":26,"w":"host","ph":"","defs":[{"pos":"n.","m":"主人；节目主持人","ex":[{"l":1,"en":"He is a kind host.","zh":"他是一位和善的主人。"},{"l":2,"en":"The host of the talk show is so humorous that the audience often laughs during the programme.","zh":"这位脱口秀的主持人很幽默，观众常常在节目播出时大笑。"},{"l":3,"en":"As the host of the school party, she made sure that every guest felt welcomed before the music even began to play.","zh":"作为学校晚会的主持人，她在音乐响起之前，就确保每位来宾都感到受欢迎。"}]}]},{"day":26,"w":"hot","ph":"","defs":[{"pos":"adj.","m":"热的；辣的","ex":[{"l":1,"en":"The soup is very hot.","zh":"这汤很烫。"},{"l":2,"en":"It is so hot today that many children have gone to the swimming pool to cool themselves down.","zh":"今天太热了，许多孩子都去了游泳池，让自己凉快下来。"},{"l":3,"en":"Standing under the burning sun on such a hot day, the players still kept training hard without a single word of complaint.","zh":"在这样炎热的一天，顶着烈日站立，队员们仍刻苦训练，没有半句怨言。"}]}]},{"day":26,"w":"hot-dog","ph":"","defs":[{"pos":"n.","m":"热狗","ex":[{"l":1,"en":"I ate a hot-dog for lunch.","zh":"我午餐吃了一个热狗。"},{"l":2,"en":"The hot-dog which my brother bought at the corner shop smelled delicious but tasted a bit too salty.","zh":"我哥哥在街角店里买的热狗闻起来很香，但尝起来有点太咸了。"},{"l":3,"en":"After walking around the amusement park for hours, the children were so hungry that a simple hot-dog seemed like the best meal in the world.","zh":"在游乐园里转了好几个小时后，孩子们饿得连一个普通的热狗都成了世上最美味的食物。"}]}]},{"day":26,"w":"hotel","ph":"","defs":[{"pos":"n.","m":"旅馆，宾馆","ex":[{"l":1,"en":"We stayed at a small hotel.","zh":"我们住在一家小旅馆。"},{"l":2,"en":"The hotel where we stayed during the holiday offered free breakfast to all the guests every morning.","zh":"我们度假时住的那家旅馆，每天早上为所有客人提供免费早餐。"},{"l":3,"en":"Located near the beach, the hotel is so popular in summer that visitors are advised to book their rooms several weeks ahead.","zh":"这家旅馆靠近海滩，夏天非常受欢迎，建议游客提前几周预订房间。"}]}]},{"day":26,"w":"hour","ph":"","defs":[{"pos":"n.","m":"小时","ex":[{"l":1,"en":"A few hours into the trip, we took a wrong turn.","zh":"出发几个小时后，我们拐错了方向。"},{"l":2,"en":"It took us more than two hours to reach the museum because the traffic was extremely heavy that morning.","zh":"我们花了两个多小时才到达博物馆，因为那天早上交通非常拥堵。"},{"l":3,"en":"Having waited for nearly three hours in the cold wind, the fans still looked excited the moment the singer finally appeared on stage.","zh":"在寒风中苦等了近三个小时，当歌手终于登上舞台的那一刻，粉丝们看上去仍然很兴奋。"}]}]},{"day":26,"w":"house","ph":"","defs":[{"pos":"n.","m":"房子；住宅；家","ex":[{"l":1,"en":"When we reached the houses in the late afternoon, we were tired.","zh":"傍晚我们到达那些房子时，已经很累了。"},{"l":2,"en":"The old house at the end of the street has been empty for years, but nobody knows why its owner left.","zh":"街尽头的那座旧房子已经空置多年，但没人知道它的主人为何离开。"},{"l":3,"en":"Surrounded by tall trees and colourful flowers, the wooden house looks so peaceful that visitors often mistake it for a painting.","zh":"被高大的树木和五颜六色的花朵环绕，这座木屋显得如此宁静，以至于来客常把它误认作一幅画。"}]}]},{"day":26,"w":"housework","ph":"","defs":[{"pos":"n.","m":"家务活","ex":[{"l":1,"en":"I help my mother with housework.","zh":"我帮妈妈做家务。"},{"l":2,"en":"After finishing her homework, she always helps her parents with the housework before dinner.","zh":"做完家庭作业后，她总在晚饭前帮父母做家务。"},{"l":3,"en":"Sharing the housework among all family members not only makes the work easier but also helps children learn to be responsible.","zh":"所有家庭成员分担家务，不仅让活儿变得轻松，还能帮助孩子们学会承担责任。"}]}]},{"day":26,"w":"how","ph":"","defs":[{"pos":"adv.","m":"怎样；如何；多少；多么","ex":[{"l":1,"en":"How are you?","zh":"你好吗？"},{"l":2,"en":"Your fan, Carmen Rivera --- A head master is giving a speech about how to perform successfully in an interview to a new school.","zh":"你的粉丝卡门·里韦拉——一位校长正在发表演讲，讲述如何在一所新学校的面试中表现出色。"},{"l":3,"en":"No matter how difficult the problem may seem, a calm mind will always help you find a way to solve it step by step.","zh":"无论问题看起来多么困难，冷静的头脑总能帮你一步步找到解决它的方法。"}]}]},{"day":26,"w":"however","ph":"","defs":[{"pos":"adv.","m":"可是","ex":[{"l":1,"en":"However, I still hope that he can attend either our school open day or school parents' meeting.","zh":"然而，我仍然希望他能参加我们学校的开放日或家长会。"},{"l":2,"en":"The journey was long and tiring; however, the beautiful views along the way made everything worthwhile.","zh":"旅途漫长而疲惫；然而，沿途美丽的景色让一切都值得了。"},{"l":3,"en":"He had prepared for the exam for months; however, the questions were so tricky that he almost lost confidence halfway through.","zh":"他为这场考试准备了数月；然而，题目如此刁钻，以至于他做到一半时几乎失去了信心。"}]},{"pos":"conj.","m":"然而，可是，尽管如此","ex":[{"l":1,"en":"However, I still hope that he can attend either our school open day or school parents' meeting.","zh":"然而，我仍然希望他能参加我们学校的开放日或家长会。"},{"l":2,"en":"I really wanted to join the basketball team; however, my parents advised me to focus on my studies first.","zh":"我很想加入篮球队；然而，父母建议我先把心思放在学习上。"},{"l":3,"en":"Most students prefer reading printed books; however, an increasing number of them have begun to enjoy e-books on their tablets.","zh":"多数学生更喜欢读纸质书；然而，越来越多的学生开始喜欢在平板电脑上读电子书。"}]}]},{"day":26,"w":"hug","ph":"","defs":[{"pos":"n.&v.","m":"拥抱","ex":[{"l":1,"en":"She gave her mother a hug.","zh":"她给了妈妈一个拥抱。"},{"l":2,"en":"When the little girl saw her father at the airport, she ran to him and gave him a big hug.","zh":"当小女孩在机场看到爸爸时，她跑过去给了他一个大大的拥抱。"},{"l":3,"en":"Seeing her son return safely from the army, the mother rushed forward and hugged him so tightly that tears rolled down her face.","zh":"看到儿子从部队平安归来，母亲冲上前紧紧地抱住他，泪水顺着脸颊流下。"}]}]},{"day":26,"w":"huge","ph":"","defs":[{"pos":"adj.","m":"巨大的；庞大的","ex":[{"l":1,"en":"The elephant is a huge animal.","zh":"大象是一种巨大的动物。"},{"l":2,"en":"When I walked into the hall, I was surprised to see a huge birthday cake that my mother had prepared.","zh":"当我走进大厅时，我惊讶地看到妈妈准备的一个巨大的生日蛋糕。"},{"l":3,"en":"It is the huge project that has attracted so many young engineers from all over the country to work here.","zh":"正是这个庞大的项目吸引了全国各地许多年轻工程师来这里工作。"}]}]},{"day":27,"w":"human","ph":"","defs":[{"pos":"adj.","m":"人的；人类的","ex":[{"l":1,"en":"This is a great human achievement.","zh":"这是一项伟大的人类成就。"},{"l":2,"en":"Although human bodies are not as strong as machines, we can use our minds to change the world.","zh":"虽然人类的身体不如机器强壮，但我们可以用头脑改变世界。"},{"l":3,"en":"Rarely has any human invention changed our daily life as deeply as the smartphone has in the past twenty years.","zh":"在过去的二十年里，几乎没有任何人类的发明像智能手机那样深刻地改变了我们的日常生活。"}]},{"pos":"n.","m":"人类","ex":[{"l":1,"en":"Humans need water and food.","zh":"人类需要水和食物。"},{"l":2,"en":"Humans are different from animals because they can think and create new things.","zh":"人类与动物不同，因为他们能够思考并创造新事物。"},{"l":3,"en":"Humans, who have lived on the earth for thousands of years, must learn to protect nature instead of destroying it.","zh":"在地球上生活了数千年的人类必须学会保护自然，而不是破坏它。"}]}]},{"day":27,"w":"humorous","ph":"","defs":[{"pos":"adj.","m":"幽默的,风趣的","ex":[{"l":1,"en":"Our English teacher is very humorous.","zh":"我们的英语老师非常幽默。"},{"l":2,"en":"The humorous story that he told us yesterday made everyone laugh loudly in class.","zh":"他昨天给我们讲的那个幽默的故事让全班同学都大声笑了起来。"},{"l":3,"en":"Not only is he a humorous speaker, but he also knows how to make difficult ideas easy to understand.","zh":"他不仅是一位幽默的演讲者，还懂得如何把难懂的道理讲得浅显易懂。"}]}]},{"day":27,"w":"hungry","ph":"","defs":[{"pos":"adj.","m":"饥饿的","ex":[{"l":1,"en":"I am very hungry now.","zh":"我现在很饿。"},{"l":2,"en":"If you feel hungry after school, you can eat some bread that I left on the table.","zh":"如果你放学后觉得饿，可以吃一些我留在桌上的面包。"},{"l":3,"en":"Hungry and tired after a long day, the boy still finished all his homework before going to bed.","zh":"经过漫长的一天，男孩又饿又累，但仍在睡觉前完成了全部作业。"}]}]},{"day":27,"w":"hunt","ph":"","defs":[{"pos":"v.","m":"寻找；猎取","ex":[{"l":1,"en":"They hunt wild animals in the forest.","zh":"他们在森林里猎取野生动物。"},{"l":2,"en":"When the cat saw the mouse, it began to hunt it under the table where we were having dinner.","zh":"猫看到老鼠后，就开始在我们吃饭的桌子底下追逐它。"},{"l":3,"en":"Police spent three days hunting for the lost child who had disappeared near the river last Sunday.","zh":"警方花了三天时间寻找上周日在河边失踪的那个孩子。"}]}]},{"day":27,"w":"hurry","ph":"","defs":[{"pos":"v.","m":"赶快；匆忙","ex":[{"l":1,"en":"Please hurry up, or we will be late.","zh":"请快点，否则我们会迟到。"},{"l":2,"en":"We must hurry to the station before the train leaves, because the traffic is very heavy today.","zh":"我们必须在火车开走前赶到车站，因为今天交通非常拥堵。"},{"l":3,"en":"Realizing that the meeting would start in five minutes, she hurried out of the room without finishing her breakfast.","zh":"意识到会议五分钟后就要开始，她没吃完早饭就匆匆走出了房间。"}]},{"pos":"n.","m":"赶紧；急忙","ex":[{"l":1,"en":"He left in a hurry this morning.","zh":"他今天早上匆忙离开了。"},{"l":2,"en":"There is no hurry; you can take your time to finish the test that will last two hours.","zh":"不用着急；你可以慢慢做完这场将持续两个小时的考试。"},{"l":3,"en":"In his hurry to catch the early bus, he forgot to bring the notebook that he needed most for the class.","zh":"他在匆忙赶早班车时，忘了带上那本课堂上最需要的笔记本。"}]}]},{"day":27,"w":"hurt","ph":"","defs":[{"pos":"adj.","m":"受伤的","ex":[{"l":1,"en":"My leg is hurt.","zh":"我的腿受伤了。"},{"l":2,"en":"The hurt boy who fell off his bike was sent to hospital by a kind driver at once.","zh":"那个从自行车上摔下来的受伤男孩立刻被一位好心的司机送往医院。"},{"l":3,"en":"Though badly hurt in the accident, the old man still tried to help the children who were trapped in the car.","zh":"虽然在事故中受了重伤，这位老人仍然尽力帮助被困在车里的孩子们。"}]}]},{"day":27,"w":"husband","ph":"","defs":[{"pos":"n.","m":"丈夫","ex":[{"l":1,"en":"Her husband is a doctor.","zh":"她的丈夫是一名医生。"},{"l":2,"en":"Her husband works in a hospital which is far from their home, so he comes back very late every day.","zh":"她的丈夫在一家离他们家很远的医院工作，所以他每天回来得很晚。"},{"l":3,"en":"Her husband, who has been teaching physics for over twenty years, often spends his weekends helping students prepare for exams.","zh":"她的丈夫教物理已超过二十年，常利用周末帮助学生备考。"}]}]},{"day":27,"w":"ice","ph":"","defs":[{"pos":"n.","m":"冰","ex":[{"l":1,"en":"The water turned into ice in winter.","zh":"冬天水变成了冰。"},{"l":2,"en":"When winter comes, the river is covered with thick ice that the children love to skate on.","zh":"冬天来临时，河面被厚厚的冰覆盖，孩子们喜欢在上面滑冰。"},{"l":3,"en":"Only when the lake freezes into solid ice can the villagers safely walk across it to reach the other town.","zh":"只有当湖面结成坚实的冰时，村民们才能安全地走过去到达对面的小镇。"}]}]},{"day":27,"w":"ice-cream","ph":"","defs":[{"pos":"n.","m":"冰淇淋","ex":[{"l":1,"en":"I like chocolate ice-cream.","zh":"我喜欢巧克力冰淇淋。"},{"l":2,"en":"After dinner, my little sister asked me to buy her an ice-cream that was sold at the corner shop.","zh":"晚饭后，我的小妹妹让我去街角那家店给她买个冰淇淋。"},{"l":3,"en":"Ice-cream, which most children love very much, can quickly cool you down on a hot summer afternoon.","zh":"大多数孩子都非常喜欢的冰淇淋，在炎热的夏日午后能让你迅速凉快下来。"}]}]},{"day":27,"w":"idea","ph":"","defs":[{"pos":"n.","m":"主意；意见；打算；想法","ex":[{"l":1,"en":"Susan, the head teacher, invited students to share their ideas about how to rebuild the school.","zh":"校长苏珊邀请学生们分享关于如何重建学校的想法。"},{"l":2,"en":"We wanted them to think of ideas to express their own interests and hopes,' she said.","zh":"我们希望他们想出各种主意来表达自己的兴趣和希望，她说。"},{"l":3,"en":"Only by listening to different ideas can a leader find the best way to solve the problems that the team is facing.","zh":"只有听取不同的意见，领导者才能找到解决团队所面临问题的最佳方法。"}]}]},{"day":27,"w":"if","ph":"","defs":[{"pos":"conj.","m":"（连接状语从句）如果，假使；（连接宾语从句）是否，是不是","ex":[{"l":1,"en":"Even if you take the exam again, you won't pass it.","zh":"即使你再考一次，你也通不过。"},{"l":2,"en":"If you mix red and yellow, what colour will you get?","zh":"如果你把红色和黄色混合，你会得到什么颜色？"},{"l":3,"en":"If we had left home ten minutes earlier, we would not have missed the train that we had planned to take.","zh":"如果我们早十分钟出门，就不会错过我们原计划乘坐的那趟火车了。"}]}]},{"day":27,"w":"ignore","ph":"","defs":[{"pos":"v.","m":"忽视；不理睬","ex":[{"l":1,"en":"Don't ignore your health.","zh":"不要忽视你的健康。"},{"l":2,"en":"Some students ignore their homework because they spend too much time playing games on the phone.","zh":"一些学生忽视他们的作业，因为他们在手机上花太多时间玩游戏。"},{"l":3,"en":"Whoever ignores these simple safety rules may put both himself and others in great danger.","zh":"无论谁忽视这些简单的安全规则，都可能使自己和他人都陷入巨大危险。"}]}]},{"day":27,"w":"ill","ph":"","defs":[{"pos":"adj.","m":"有病的；不健康的","ex":[{"l":1,"en":"He is ill today.","zh":"他今天生病了。"},{"l":2,"en":"Because Tom felt ill yesterday, his mother took him to the hospital to see a doctor at once.","zh":"因为汤姆昨天觉得生病了，他的妈妈立刻带他去医院看医生。"},{"l":3,"en":"Being ill for a whole week, the girl fell behind her classmates and had to work even harder to catch up.","zh":"整整病了一周后，这个女孩落在了同学后面，不得不更加努力才能赶上。"}]}]},{"day":27,"w":"illness","ph":"","defs":[{"pos":"n.","m":"疾病","ex":[{"l":1,"en":"His illness is very serious.","zh":"他的病很严重。"},{"l":2,"en":"The doctor told us that his illness was caused by eating too much cold food in summer.","zh":"医生告诉我们，他的病是由于夏天吃了太多冷食引起的。"},{"l":3,"en":"The serious illness that suddenly took away his sight did not stop him from finishing his studies.","zh":"那场突然夺走他视力的重病并没有阻止他完成学业。"}]}]},{"day":27,"w":"imagine","ph":"","defs":[{"pos":"v.","m":"想象；设想","ex":[{"l":1,"en":"I can't imagine his life there.","zh":"我无法想象他在那里的生活。"},{"l":2,"en":"Can you imagine what our city will look like in twenty years if we keep polluting the air?","zh":"如果我们继续污染空气，你能想象我们的城市二十年后会是什么样子吗？"},{"l":3,"en":"Hard as it is to imagine, the quiet boy has become one of the most popular singers in the country.","zh":"尽管难以想象，那个安静的男孩已经成为了全国最受欢迎的歌手之一。"}]}]},{"day":27,"w":"immediately","ph":"","defs":[{"pos":"adv.","m":"立即，马上","ex":[{"l":1,"en":"Please answer me immediately.","zh":"请立即回答我。"},{"l":2,"en":"When the teacher came in, all the students immediately stopped talking and opened their books.","zh":"当老师走进来时，所有学生立刻停止说话并打开课本。"},{"l":3,"en":"The moment he heard the strange noise, he immediately rushed out of the room to see what had happened.","zh":"他一听到那奇怪的声音，就立刻冲出房间去看发生了什么事。"}]}]},{"day":27,"w":"importance","ph":"","defs":[{"pos":"n.","m":"重要性","ex":[{"l":1,"en":"I know the importance of English.","zh":"我知道英语的重要性。"},{"l":2,"en":"Our teacher often tells us the importance of reading more books if we want to learn well.","zh":"老师常告诉我们，如果想学好，多读书很重要。"},{"l":3,"en":"Not until that day did he truly understand the importance of the friendship that his classmates had shown him.","zh":"直到那天他才真正理解同学们所给予他的友谊的重要性。"}]}]},{"day":27,"w":"important","ph":"","defs":[{"pos":"adj.","m":"重要的","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍然是中国交通系统中一个重要的组成部分。"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"露易丝现在十三岁，目前正在学习中文，中文已经成为和英语一样重要的世界语言。露易丝有许多中国朋友，他们通过电脑进行交流。"},{"l":3,"en":"What really matters is not how much knowledge you have remembered, but whether you can use it to solve real problems, which is exactly why practical experience is so important for every student.","zh":"真正重要的不是你记住了多少知识，而是你能否用它来解决实际问题，这正是实践经验对每个学生如此重要的原因。"}]}]},{"day":27,"w":"impossible","ph":"","defs":[{"pos":"adj.","m":"不可能的","ex":[{"l":1,"en":"It is impossible to finish so much homework in one hour.","zh":"在一小时内完成这么多作业是不可能的。"},{"l":2,"en":"Though it seemed impossible to win the match, the players never gave up until the last minute.","zh":"尽管赢得比赛似乎是不可能的，但队员们直到最后一刻都没有放弃。"},{"l":3,"en":"It is almost impossible for a single person to change the whole situation unless he gets enough support from people around him who share the same dream.","zh":"除非一个人从身边有共同梦想的人那里获得足够支持，否则他几乎不可能独自改变整个局面。"}]}]},{"day":27,"w":"impression","ph":"","defs":[{"pos":"n.","m":"印象","ex":[{"l":1,"en":"The clean classroom left a good impression on the visitors.","zh":"干净的教室给来访者留下了好印象。"},{"l":2,"en":"The speech that the headmaster gave at the meeting made a deep impression on every student present.","zh":"校长在会上发表的那场演讲给在场的每位学生留下了深刻印象。"},{"l":3,"en":"Wearing a warm smile and speaking in a gentle voice, the new teacher managed to leave such a lasting impression on the class that no one would forget her first lesson.","zh":"新老师带着温暖的微笑，用温柔的声音说话，给全班留下了如此持久的印象，以至于没人会忘记她的第一节课。"}]}]},{"day":27,"w":"improve","ph":"","defs":[{"pos":"v.","m":"改进，更新","ex":[{"l":1,"en":"No matter how many difficulties we came across, we considered them as chances for us to improve.","zh":"无论我们遇到多少困难，我们都把它们当作提升自己的机会。"},{"l":2,"en":"If you keep reading English every morning, you will find that your spoken English has improved a lot by the end of this term.","zh":"如果你每天早上坚持读英语，到这个学期末你会发现你的英语口语有了很大提高。"},{"l":3,"en":"What encouraged us most was that the shy girl kept practicing in front of the mirror every day, determined to improve her speaking skills before the speech contest.","zh":"最让我们受鼓舞的是，那个腼腆的女孩每天都在镜子前坚持练习，决心在演讲比赛前提高自己的口语能力。"}]}]},{"day":27,"w":"in","ph":"","defs":[{"pos":"prep.","m":"在..里；在..(时间）；在..（情况、状态）中；以..（方式）；使用...（语言）；穿；戴","ex":[{"l":1,"en":"Come in,please.","zh":"请进。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应当尽可能多地学习地理知识。"},{"l":3,"en":"Only by putting what you have learned in class into real practice can you truly understand how valuable each lesson has been.","zh":"只有把课堂上学到的知识运用到实际中，你才能真正体会到每一堂课有多么宝贵。"}]},{"pos":"adv.","m":"在家；在内；向内","ex":[{"l":1,"en":"Come in,please.","zh":"请进来。"},{"l":2,"en":"When the rain suddenly began to fall, the children quickly ran in and waited until the sky cleared up.","zh":"当雨突然下起来时，孩子们赶紧跑进屋里，一直等到天空放晴。"},{"l":3,"en":"Hearing the familiar song coming from the open window, the old man stepped in, only to find that the room had been kept exactly as it was twenty years ago.","zh":"听到从敞开的窗户里传来的熟悉歌曲，老人走了进去，却发现房间仍保持着二十年前的样子。"}]}]},{"day":27,"w":"inch","ph":"","defs":[{"pos":"n.","m":"英寸","ex":[{"l":1,"en":"The box is about ten inches wide.","zh":"这个盒子大约有十英寸宽。"},{"l":2,"en":"The little plant grows only a few inches each year, but it will become a tall tree after many years.","zh":"这棵小植物每年只长几英寸，但许多年后它会长成一棵大树。"},{"l":3,"en":"Within a few inches of the old wall lies a small garden where the family has planted all kinds of flowers that bloom from spring to late autumn.","zh":"在离旧墙几英寸之内有一个小花园，一家人在那里种满了从春天到深秋一直开放的各种鲜花。"}]}]},{"day":27,"w":"include","ph":"","defs":[{"pos":"v.","m":"包括；包含","ex":[{"l":1,"en":"The price includes breakfast and lunch.","zh":"这个价格包括早餐和午餐。"},{"l":2,"en":"The summer camp includes many interesting activities, such as swimming, climbing and singing songs around the fire.","zh":"夏令营包括许多有趣的活动，比如游泳、爬山和在篝火旁唱歌。"},{"l":3,"en":"The new reading plan includes not only classical Chinese poems but also some short English stories, all of which are chosen to help students think more deeply.","zh":"新的阅读计划不仅包括中国古典诗歌，还包括一些简短的英文故事，所有这些都是为了帮助学生更深入地思考。"}]}]},{"day":27,"w":"including","ph":"","defs":[{"pos":"prep.","m":"包括；包含","ex":[{"l":1,"en":"There are six people in the room, including two kids.","zh":"房间里有六个人，包括两个小孩。"},{"l":2,"en":"Many students, including those who were not good at sports, took part in the school sports meeting last week.","zh":"许多学生，包括那些不擅长体育的，都参加了上周的学校运动会。"},{"l":3,"en":"All the members of the club, including the new students who joined only last month, are required to take part in the charity sale to be held next Sunday.","zh":"俱乐部的所有成员，包括上月才加入的新生，都被要求参加下周日举行的义卖活动。"}]}]},{"day":27,"w":"income","ph":"","defs":[{"pos":"n.","m":"收入；所得","ex":[{"l":1,"en":"His income is enough to support the family.","zh":"他的收入足够养家。"},{"l":2,"en":"Although the young couple's income is not very high, they still save some money every month for their child's education.","zh":"虽然这对年轻夫妇的收入不是很高，他们仍然每月为孩子教育存些钱。"},{"l":3,"en":"It is reported that the average income of the workers in this factory has increased greatly since the new manager carried out a series of reforms last year.","zh":"据报道，自从新经理去年实施了一系列改革以来，这家工厂工人的平均收入大幅增加。"}]}]},{"day":27,"w":"increase","ph":"","defs":[{"pos":"v.&n.","m":"增加","ex":[{"l":1,"en":"The number of students has increased this year.","zh":"今年学生的人数增加了。"},{"l":2,"en":"If we want to increase the sales of our products, we must first find out what customers really need.","zh":"如果我们想增加产品的销量，就必须先弄清楚顾客真正需要什么。"},{"l":3,"en":"What surprised the scientists was that the population of the rare birds had increased to over five hundred, which meant their years of hard work had finally paid off.","zh":"让科学家们惊讶的是，这种珍稀鸟类的数量已增加到五百多只，这意味着他们多年的努力终于有了回报。"}]}]},{"day":27,"w":"independent","ph":"","defs":[{"pos":"adj.","m":"独立的；有主见的","ex":[{"l":1,"en":"She is old enough to be independent.","zh":"她已经大到可以独立了。"},{"l":2,"en":"Parents should teach their children to become independent so that they can look after themselves in the future.","zh":"父母应当教会孩子变得独立，以便将来他们能照顾自己。"},{"l":3,"en":"Only when a child learns to make his own decisions can he truly become independent, and this is exactly what modern education tries to encourage.","zh":"只有当孩子学会自己做决定时，他才能真正变得独立，而这正是现代教育努力倡导的。"}]}]},{"day":27,"w":"indoor","ph":"","defs":[{"pos":"adj.","m":"室内的","ex":[{"l":1,"en":"We play indoor games on rainy days.","zh":"下雨天我们玩室内游戏。"},{"l":2,"en":"When the weather is bad, children prefer to stay at school and enjoy some interesting indoor activities with their friends.","zh":"天气不好时，孩子们更喜欢留在学校和朋友一起享受有趣的室内活动。"},{"l":3,"en":"Compared with outdoor sports, indoor activities can not only protect students from the cold weather but also help them develop teamwork skills in a safe and warm environment.","zh":"与户外运动相比，室内活动不仅能保护学生免受寒冷天气的影响，还能帮助他们在安全温暖的环境中培养团队合作能力。"}]}]},{"day":27,"w":"industry","ph":"","defs":[{"pos":"n.","m":"工业，产业","ex":[{"l":1,"en":"His father works in the car industry.","zh":"他父亲在汽车工业工作。"},{"l":2,"en":"Since the tourism industry is developing quickly, more and more young people choose to work in this field after graduation.","zh":"由于旅游业发展迅速，越来越多的年轻人选择毕业后在这一领域工作。"},{"l":3,"en":"It is widely believed that the film industry, which has grown rapidly over the past few years, will create a large number of jobs for creative young people.","zh":"人们普遍认为，过去几年迅速发展的电影产业将为有创造力的年轻人创造大量就业机会。"}]}]},{"day":28,"w":"influence","ph":"","defs":[{"pos":"n.","m":"影响；作用；影响力；支配力","ex":[{"l":1,"en":"Books have a great influence on children.","zh":"书本对孩子有很大的影响。"},{"l":2,"en":"What the teacher says and does has a deep influence on the students who are still learning how to tell right from wrong.","zh":"老师的言行对那些还在学习辨别是非的学生有深远的影响。"},{"l":3,"en":"Few people realize that a simple word of encouragement may have such a lasting influence on a child that it changes the whole direction of his life.","zh":"很少有人意识到，一句简单的鼓励可能对孩子产生如此持久的影响，以至于改变他一生的方向。"}]},{"pos":"v.","m":"影响；左右；对……起作用；支配","ex":[{"l":1,"en":"The weather often influences our mood.","zh":"天气常常影响我们的心情。"},{"l":2,"en":"Although friends may influence our choices, we should always think carefully before making any important decision.","zh":"尽管朋友会影响我们的选择，但我们在做任何重要决定前都应仔细思考。"},{"l":3,"en":"What influences teenagers most is not what they are told, but what they see the adults around them actually doing in daily life.","zh":"对青少年影响最大的不是别人告诉他们的话，而是他们看到身边的成年人在日常生活中真正在做的事。"}]}]},{"day":28,"w":"information","ph":"","defs":[{"pos":"n.","m":"信息；情报；资料","ex":[{"l":1,"en":"Cartographers, also called mapmakers, study and interpret geographic information.","zh":"制图师，也叫地图绘制者，研究和解释地理信息。"},{"l":2,"en":"They use this information to make detailed maps of places around the globe.","zh":"他们利用这些信息制作世界各地详尽的地图。"},{"l":3,"en":"What makes the Internet so useful is that it allows people to share a huge amount of information within seconds, no matter how far apart they are from each other.","zh":"互联网之所以如此有用，是因为它能让人们在几秒钟内分享大量信息，无论彼此相隔多远。"}]}]},{"day":28,"w":"ink","ph":"","defs":[{"pos":"n.","m":"墨水；油墨","ex":[{"l":1,"en":"Please write your name in blue ink.","zh":"请用蓝色墨水写下你的名字。"},{"l":2,"en":"The bottle of ink that I bought yesterday was so dark that the words on the paper were very clear.","zh":"我昨天买的那瓶墨水颜色很深，纸上的字非常清晰。"},{"l":3,"en":"With only a bottle of ink and a cheap pen, the young artist managed to draw such a lively picture that everyone who saw it was deeply moved.","zh":"仅凭一瓶墨水和一支便宜的钢笔，这位年轻艺术家就画出了如此生动的画，以至于每个看到的人都深受感动。"}]}]},{"day":28,"w":"inside","ph":"","defs":[{"pos":"prep.","m":"在..里面","ex":[{"l":1,"en":"What is inside the box?","zh":"盒子里有什么？"},{"l":2,"en":"The old man hid the key inside a small box so that no one else could find it easily.","zh":"老人把钥匙藏在一个小盒子里，以便别人不容易找到。"},{"l":3,"en":"Hidden inside the thick envelope was a letter written by her grandfather thirty years ago, which finally explained the secret the family had wondered about for so long.","zh":"厚厚的信封里藏着爷爷三十年前写的一封信，它终于解开了家人困惑已久的秘密。"}]},{"pos":"adv.","m":"在里面","ex":[{"l":1,"en":"It is warm inside the room.","zh":"房间里很暖和。"},{"l":2,"en":"When we finally got home and walked inside, we found that our dog had broken a cup on the table.","zh":"当我们终于到家走进去时，发现我们的狗打碎了桌上的杯子。"},{"l":3,"en":"Standing quietly inside the old library, the boy could hardly believe that so many wonderful books had been kept there waiting to be read for so many years.","zh":"静静地站在旧图书馆里，男孩几乎不敢相信这么多精彩的书一直被保存在那里等待阅读了这么多年。"}]}]},{"day":28,"w":"instead","ph":"","defs":[{"pos":"adv.","m":"代替，顶替","ex":[{"l":1,"en":"Instead, we are the result of everything we've seen and done.","zh":"相反，我们是我们所见过和所做过的一切的结果。"},{"l":2,"en":"I didn't give up; instead, I kept trying until I finally solved the difficult problem.","zh":"我没有放弃；相反，我一直尝试，直到最终解决了那道难题。"},{"l":3,"en":"He could have complained about the bad weather; instead, he put on a raincoat and cycled to school as usual.","zh":"他本可以抱怨糟糕的天气，但他没有，而是穿上雨衣，像往常一样骑车去了学校。"}]}]},{"day":28,"w":"instruction","ph":"","defs":[{"pos":"n.","m":"用法说明；命令，指令；指示；指导","ex":[{"l":1,"en":"Please read the instructions carefully before you use the machine.","zh":"使用这台机器前请仔细阅读说明。"},{"l":2,"en":"The teacher gave us clear instructions so that we could finish the experiment safely in the lab.","zh":"老师给了我们明确的指示，以便我们能在实验室里安全地完成实验。"},{"l":3,"en":"Follow the instructions printed on the bottle, and you will find it much easier to take the medicine correctly.","zh":"按照瓶子上印的说明去做，你就会发现正确服药容易得多。"}]}]},{"day":28,"w":"interest","ph":"","defs":[{"pos":"n.","m":"兴趣；趣味","ex":[{"l":1,"en":"We wanted them to think of ideas to express their own interests and hopes,\" she said.","zh":"我们希望他们想出办法来表达自己内心的兴趣与希望，她说。"},{"l":2,"en":"Although she has lost interest in playing the piano, her parents still encourage her to keep practicing.","zh":"虽然她已经对弹钢琴失去了兴趣，但她的父母仍然鼓励她坚持练习。"},{"l":3,"en":"Not only does reading widen our knowledge, but it also helps us discover new interests that may shape our future.","zh":"阅读不仅拓宽我们的知识，还能帮助我们发现自己的新兴趣，而这些兴趣可能会塑造我们的未来。"}]}]},{"day":28,"w":"interested","ph":"","defs":[{"pos":"adj.","m":"感兴趣的","ex":[{"l":1,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应当尽可能多地学习地理知识。"},{"l":2,"en":"If you are interested in science, you can join the club which meets every Friday afternoon.","zh":"如果你对科学感兴趣，你可以加入那个每周五下午活动的俱乐部。"},{"l":3,"en":"Only when you are truly interested in what you do will you find the energy to keep going when things get hard.","zh":"只有当你真正对自己所做的事感兴趣时，你才能在困难的时候找到坚持下去的力量。"}]}]},{"day":28,"w":"interesting","ph":"","defs":[{"pos":"adj.","m":"有趣的；有意思的","ex":[{"l":1,"en":"The book is so interesting that I want to read it again.","zh":"这本书太有趣了，我想再读一遍。"},{"l":2,"en":"The museum offers many interesting activities which attract thousands of visitors every year.","zh":"这家博物馆提供许多有趣的活动，每年吸引成千上万的游客。"},{"l":3,"en":"What makes the story truly interesting is the way the writer describes the characters' feelings with such care.","zh":"让这个故事真正有趣的是作者如此用心地描写人物情感的方式。"}]}]},{"day":28,"w":"international","ph":"","defs":[{"pos":"adj.","m":"国际的","ex":[{"l":1,"en":"English is an important international language.","zh":"英语是一门重要的国际语言。"},{"l":2,"en":"Shanghai has become an international city where people from different countries live and work together.","zh":"上海已经成为一座国际化都市，来自不同国家的人在这里共同生活和工作。"},{"l":3,"en":"With the rapid growth of international trade, learning a foreign language has become more useful than ever before.","zh":"随着国际贸易的快速增长，学习一门外语变得比以往任何时候都更有用。"}]}]},{"day":28,"w":"Internet","ph":"","defs":[{"pos":"n.","m":"互联网，因特网","ex":[{"l":1,"en":"I often search for information on the Internet.","zh":"我经常在互联网上搜索信息。"},{"l":2,"en":"The Internet makes it possible for us to communicate with friends who live far away.","zh":"互联网使我们能够与住在远方的朋友交流。"},{"l":3,"en":"While the Internet brings us great convenience, we should also be careful not to spend too much time on it.","zh":"虽然互联网给我们带来了极大的便利，但我们也应当小心，不要在上面花费太多时间。"}]}]},{"day":28,"w":"interview","ph":"","defs":[{"pos":"n.&v.","m":"采访；会见；面试","ex":[{"l":1,"en":"I'm sure that you will do well in your interviews.Best of luck,boys and girls!","zh":"我相信你们会在面试中表现出色。祝好运，孩子们！"},{"l":2,"en":"Your fan, Carmen Rivera --- A head master is giving a speech about how to perform successfully in an interview to a new school.","zh":"你的粉丝卡门·里韦拉——一位校长正在发表演讲，主题是如何在新学校的面试中表现成功。"},{"l":3,"en":"It was during the interview that she realized confidence mattered even more than the answers she had prepared.","zh":"正是在面试过程中，她意识到自信比她准备好的答案更重要。"}]}]},{"day":28,"w":"into","ph":"","defs":[{"pos":"prep.","m":"到..里；向内；变成","ex":[{"l":1,"en":"I remember I put too much salt into the pizza.","zh":"我记得我在比萨里放了太多盐。"},{"l":2,"en":"A few hours into the trip, we took a wrong turn.","zh":"行程开始几个小时后，我们拐错了弯。"},{"l":3,"en":"Deep into the night, the young scientist kept working on the experiment that might change people's lives.","zh":"深夜时分，这位年轻的科学家仍在继续那项可能改变人们生活的实验。"}]}]},{"day":28,"w":"introduce","ph":"","defs":[{"pos":"v.","m":"介绍","ex":[{"l":1,"en":"Let me introduce my good friend to you.","zh":"让我把我的好朋友介绍给你。"},{"l":2,"en":"The teacher asked me to introduce the new student who had just moved to our city from Beijing.","zh":"老师让我介绍那位刚从北京搬到我们城市的新同学。"},{"l":3,"en":"Allow me to introduce myself before we begin, so that you will know a little more about who I am.","zh":"在我们开始之前，请允许我做一下自我介绍，这样你就能对我有更多了解。"}]}]},{"day":28,"w":"invent","ph":"","defs":[{"pos":"v.","m":"发明，创造","ex":[{"l":1,"en":"Bell invented the telephone in 1876.","zh":"贝尔在1876年发明了电话。"},{"l":2,"en":"Scientists are trying to invent new machines that can help doctors save more lives.","zh":"科学家们正试图发明能够帮助医生挽救更多生命的新机器。"},{"l":3,"en":"Few people believed the two brothers would invent a flying machine, yet their hard work finally changed history.","zh":"很少有人相信这两兄弟能发明出飞行机器，然而他们的努力最终改变了历史。"}]}]},{"day":28,"w":"invention","ph":"","defs":[{"pos":"n.","m":"发明，创造","ex":[{"l":1,"en":"Thanks to the invention of the smart phone, it's convenient to take photos anytime.","zh":"多亏了智能手机的发明，随时随地拍照变得很方便。"},{"l":2,"en":"The invention of the Internet has changed the way we live, work and study in many ways.","zh":"互联网的发明在很多方面改变了我们生活、工作和学习的方式。"},{"l":3,"en":"It is the wheel, a simple but great invention, that made long-distance travel possible thousands of years ago.","zh":"正是轮子这一简单而伟大的发明，使得数千年前长途旅行成为可能。"}]}]},{"day":28,"w":"inventor","ph":"","defs":[{"pos":"n.","m":"发明家，创造者","ex":[{"l":1,"en":"Edison was a famous American inventor.","zh":"爱迪生是一位著名的美国发明家。"},{"l":2,"en":"As a young inventor, he spent most of his time working on machines that could help farmers.","zh":"作为一名年轻的发明家，他把大部分时间都花在研制能帮助农民的机器上。"},{"l":3,"en":"The inventor never gave up, even when people around him laughed at his strange ideas.","zh":"这位发明家从不放弃，即使周围的人嘲笑他那奇怪的想法。"}]}]},{"day":28,"w":"investigate","ph":"","defs":[{"pos":"v.","m":"调查","ex":[{"l":1,"en":"The police are investigating the accident.","zh":"警方正在调查这起事故。"},{"l":2,"en":"Scientists decided to investigate why the river had become so dirty over the past few years.","zh":"科学家们决定调查为什么这条河在过去几年里变得如此肮脏。"},{"l":3,"en":"In order to find the truth, the reporter spent months investigating the case that everyone had forgotten.","zh":"为了查明真相，这位记者花了几个月时间调查那桩所有人都已遗忘的案件。"}]}]},{"day":28,"w":"invitation","ph":"","defs":[{"pos":"n.","m":"邀请；请帖","ex":[{"l":1,"en":"Thank you for your invitation to the party.","zh":"感谢你邀请我参加聚会。"},{"l":2,"en":"I received an invitation to the concert which will be held in our city next weekend.","zh":"我收到了一份下周末在我们城市举行的音乐会的邀请。"},{"l":3,"en":"What surprised me most was the invitation written in a language I had never seen before.","zh":"最让我惊讶的是，那份邀请竟然是用我从未见过的一种语言写成的。"}]}]},{"day":28,"w":"invite","ph":"","defs":[{"pos":"v.","m":"邀请","ex":[{"l":1,"en":"Susan, the head teacher, invited students to share their ideas about how to rebuild the school.","zh":"校长苏珊邀请学生们分享关于如何重建学校的想法。"},{"l":2,"en":"We invited the famous writer to our school so that students could ask him questions about his books.","zh":"我们邀请了这位著名作家来我们学校，以便学生们能就他的书向他提问。"},{"l":3,"en":"Not until the teacher invited him to speak did the shy boy finally find the courage to share his story.","zh":"直到老师邀请他发言，这个害羞的男孩才终于鼓起勇气分享了自己的故事。"}]}]},{"day":28,"w":"iron","ph":"","defs":[{"pos":"n.","m":"铁","ex":[{"l":1,"en":"Iron is a kind of useful metal.","zh":"铁是一种有用的金属。"},{"l":2,"en":"In the past, people used iron to make tools because it was strong and easy to find.","zh":"在过去，人们用铁制造工具，因为它坚固又容易找到。"},{"l":3,"en":"The bridge, built mainly of iron more than a hundred years ago, still stands strong across the wide river.","zh":"这座主要用铁建成、已有一百多年历史的大桥，仍坚固地横跨在那条宽阔的河上。"}]}]},{"day":28,"w":"island","ph":"","defs":[{"pos":"n.","m":"岛","ex":[{"l":1,"en":"Hainan is a beautiful island in the south of China.","zh":"海南是中国南部的一座美丽岛屿。"},{"l":2,"en":"The small island, which lies in the east of the country, is famous for its clean beaches.","zh":"这座位于该国东部的小岛，以其洁净的海滩而闻名。"},{"l":3,"en":"Only when you reach the island by boat will you understand why so many writers have fallen in love with it.","zh":"只有当你乘船抵达这座岛屿时，你才会明白为什么那么多作家爱上了它。"}]}]},{"day":28,"w":"Italian","ph":"","defs":[{"pos":"n.","m":"意大利人；意大利语","ex":[{"l":1,"en":"An Italian is talking with our English teacher.","zh":"一位意大利人正在和我们的英语老师交谈。"},{"l":2,"en":"The Italian who visited our school yesterday gave us a talk about his country's history and culture.","zh":"昨天参观我们学校的那位意大利人就他国家的历史和文化给我们做了一场讲座。"},{"l":3,"en":"It was an Italian who first taught me how to make real pizza, and I will never forget that warm afternoon.","zh":"是一位意大利人最先教会我做真正的比萨，我永远不会忘记那个温暖的下午。"}]},{"pos":"adj.","m":"意大利人的；意大利语的","ex":[{"l":1,"en":"I like Italian food very much.","zh":"我非常喜欢意大利食物。"},{"l":2,"en":"The Italian restaurant near our school serves delicious food that many students enjoy after class.","zh":"我们学校附近的那家意大利餐厅供应美味的食物，许多学生下课后都喜欢去吃。"},{"l":3,"en":"Deeply attracted by Italian art, the young painter decided to travel to Rome to study the works of the great masters.","zh":"被意大利艺术深深吸引，这位年轻的画家决定前往罗马，研究那些大师的作品。"}]}]},{"day":28,"w":"Italy","ph":"","defs":[{"pos":"n.","m":"意大利","ex":[{"l":1,"en":"Italy is a beautiful country in Europe.","zh":"意大利是欧洲一个美丽的国家。"},{"l":2,"en":"Last summer, my family travelled to Italy, where we visited many famous old buildings.","zh":"去年夏天，我们一家去了意大利旅行，在那里参观了许多著名的古老建筑。"},{"l":3,"en":"It is in Italy that you can taste the best pizza while enjoying the breathtaking view of ancient ruins.","zh":"正是在意大利，你才能一边品尝最棒的披萨，一边欣赏古迹那令人惊叹的景色。"}]}]},{"day":28,"w":"item","ph":"","defs":[{"pos":"n.","m":"项目；节目；一件商品（物品）；一则","ex":[{"l":1,"en":"For example, people should remember to turn off electric items like TV sets and air conditioners when they are not used.","zh":"例如，人们应该记得在不使用时关掉电视和空调等电器。"},{"l":2,"en":"Please check each item on the shopping list before you leave the supermarket.","zh":"在离开超市之前，请核对购物清单上的每一项物品。"},{"l":3,"en":"The shop assistant told me that every item in this store was carefully chosen to meet the needs of young customers.","zh":"店员告诉我，这家店里的每一件商品都是精心挑选的，以满足年轻顾客的需求。"}]}]},{"day":28,"w":"jacket","ph":"","defs":[{"pos":"n.","m":"短上衣，夹克衫","ex":[{"l":1,"en":"He is wearing a blue jacket today.","zh":"他今天穿着一件蓝色的夹克衫。"},{"l":2,"en":"The jacket that my mother bought me yesterday is both warm and comfortable.","zh":"我妈妈昨天给我买的那件夹克既保暖又舒服。"},{"l":3,"en":"Wearing this thick jacket, the little boy still felt cold in the freezing winter wind.","zh":"穿着这件厚夹克，小男孩在刺骨的寒风中仍然觉得冷。"}]}]},{"day":28,"w":"jam","ph":"","defs":[{"pos":"n.","m":"果酱；阻塞","ex":[{"l":1,"en":"I like bread with jam for breakfast.","zh":"我早餐喜欢吃抹果酱的面包。"},{"l":2,"en":"There was a traffic jam on the road, so we were late for the meeting.","zh":"路上堵车了，所以我们开会迟到了。"},{"l":3,"en":"Not only did she make the jam herself, but she also shared it with all her neighbours.","zh":"她不仅亲手制作了果酱，还把它分享给了所有的邻居。"}]}]},{"day":28,"w":"January","ph":"","defs":[{"pos":"n.","m":"一月","ex":[{"l":1,"en":"This is January.","zh":"这是一月。"},{"l":2,"en":"January is the first month of the year, and it is usually very cold here.","zh":"一月是一年中的第一个月，这里通常很冷。"},{"l":3,"en":"Only in January does the river freeze completely, allowing children to skate on the ice safely.","zh":"只有在一月，这条河才会完全结冰，让孩子们可以安全地在冰上滑冰。"}]}]},{"day":28,"w":"Japan","ph":"","defs":[{"pos":"n.","m":"日本","ex":[{"l":1,"en":"Japan is an island country in Asia.","zh":"日本是亚洲的一个岛国。"},{"l":2,"en":"Mount Fuji in Japan is famous all over the world for its beauty.","zh":"日本的富士山因其美丽而闻名于世。"},{"l":3,"en":"Many tourists visit Japan every spring because they want to see the cherry blossoms that cover the hills.","zh":"每年春天都有许多游客访问日本，因为他们想看漫山遍野的樱花。"}]}]},{"day":28,"w":"Japanese","ph":"","defs":[{"pos":"n.","m":"日本人；日语","ex":[{"l":1,"en":"My pen pal is a Japanese from Tokyo.","zh":"我的笔友是一位来自东京的日本人。"},{"l":2,"en":"She has studied Japanese for three years, but she still finds it hard to speak well.","zh":"她已经学了三年日语，但她仍然觉得很难说好。"},{"l":3,"en":"Although he is a Japanese, he has lived in China for so long that he speaks Chinese perfectly.","zh":"虽然他是日本人，但他在中国生活了这么久，中文说得非常流利。"}]},{"pos":"adj.","m":"日本的；日语的；日本人的","ex":[{"l":1,"en":"I like Japanese food very much.","zh":"我非常喜欢日本料理。"},{"l":2,"en":"The Japanese cartoons that he watches every weekend are really exciting.","zh":"他每个周末看的那些日本动画片真的很精彩。"},{"l":3,"en":"Deeply interested in Japanese culture, the girl decided to learn the language and travel to Tokyo next year.","zh":"由于对日本文化深感兴趣，这个女孩决定学习这门语言，并在明年去东京旅行。"}]}]},{"day":29,"w":"jeans","ph":"","defs":[{"pos":"n.","m":"牛仔裤","ex":[{"l":1,"en":"He bought a pair of blue jeans yesterday.","zh":"他昨天买了一条蓝色牛仔裤。"},{"l":2,"en":"Most students in our class wear jeans because they are cheap and comfortable.","zh":"我们班大多数学生穿牛仔裤，因为它们便宜又舒服。"},{"l":3,"en":"Worn out though the old jeans are, the boy still refuses to throw them away.","zh":"尽管这条旧牛仔裤已经破旧不堪，男孩仍然拒绝把它扔掉。"}]}]},{"day":29,"w":"job","ph":"","defs":[{"pos":"n.","m":"工作","ex":[{"l":1,"en":"He gave a talk about his job in my class.","zh":"他在我们班做了一个关于他工作的报告。"},{"l":2,"en":"Uncle Andy tried ten different jobs, and finally chose to be a lawyer.","zh":"安迪叔叔尝试了十种不同的工作，最后选择做一名律师。"},{"l":3,"en":"What I want to stress is that a good job does not always mean a happy life.","zh":"我想强调的是，一份好工作并不总意味着幸福的生活。"}]}]},{"day":29,"w":"join","ph":"","defs":[{"pos":"v.","m":"参加，加入；连接","ex":[{"l":1,"en":"Please join our English club after school.","zh":"放学后请加入我们的英语俱乐部。"},{"l":2,"en":"When the two rivers join, they form a wide and powerful river.","zh":"当两条河汇合时，它们形成了一条宽阔而有力的河流。"},{"l":3,"en":"Only by joining the team can you have the chance to take part in the international competition.","zh":"只有加入这支队伍，你才有机会参加这次国际比赛。"}]}]},{"day":29,"w":"joke","ph":"","defs":[{"pos":"n.","m":"笑话","ex":[{"l":1,"en":"He told us a funny joke just now.","zh":"他刚才给我们讲了一个有趣的笑话。"},{"l":2,"en":"The joke that he told at the party made everyone laugh loudly.","zh":"他在聚会上讲的那个笑话让大家哈哈大笑。"},{"l":3,"en":"Such a silly joke did nobody laugh at; instead, it made the room fall into silence.","zh":"这么愚蠢的笑话没人笑；相反，它让整个房间陷入了沉默。"}]},{"pos":"v.","m":"开玩笑","ex":[{"l":1,"en":"Don't joke about serious things.","zh":"不要拿严肃的事情开玩笑。"},{"l":2,"en":"I am not joking when I say that you must finish the work today.","zh":"当我说你必须今天完成这项工作时，我不是在开玩笑。"},{"l":3,"en":"Realizing that his friends were joking, the boy stopped being angry and joined in their laughter.","zh":"意识到朋友们在开玩笑，男孩不再生气，跟着一起笑了起来。"}]}]},{"day":29,"w":"journalist","ph":"","defs":[{"pos":"n.","m":"记者，新闻工作者","ex":[{"l":1,"en":"Her dream is to be a journalist.","zh":"她的梦想是成为一名记者。"},{"l":2,"en":"The journalist who interviewed our headmaster last week is from a famous newspaper.","zh":"上周采访我们校长的那位记者来自一家著名报纸。"},{"l":3,"en":"As a journalist, she travels around the world to report important events that matter to people.","zh":"作为一名记者，她周游世界，报道对人们重要的事件。"}]}]},{"day":29,"w":"journey","ph":"","defs":[{"pos":"n.","m":"旅行；旅程","ex":[{"l":1,"en":"We had a pleasant journey to Beijing.","zh":"我们去北京旅行得很愉快。"},{"l":2,"en":"The journey from Shanghai to London by plane takes about eleven hours.","zh":"从上海到伦敦乘飞机的旅程大约需要十一个小时。"},{"l":3,"en":"Tired as they were after the long journey, the children still smiled when they saw the sea.","zh":"尽管长途旅行后很疲惫，孩子们看到大海时仍然露出了笑容。"}]}]},{"day":29,"w":"joy","ph":"","defs":[{"pos":"n.","m":"欢乐；高兴；乐趣","ex":[{"l":1,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后的观点是，虽然有人说拥有东西是很大的乐趣，但我认为使用你拥有的东西更令人愉快。"},{"l":2,"en":"To her great joy, she got the first prize in the singing competition.","zh":"令她非常高兴的是，她在唱歌比赛中获得了一等奖。"},{"l":3,"en":"Filled with joy, the old man hugged his grandson tightly the moment he stepped off the train.","zh":"老人满心欢喜，孙子一下火车就紧紧地拥抱了他。"}]}]},{"day":29,"w":"judge","ph":"","defs":[{"pos":"n.","m":"裁判；审判员；法官","ex":[{"l":1,"en":"The judge said the player was the winner.","zh":"裁判说那位选手是获胜者。"},{"l":2,"en":"The judge who wore a black robe entered the courtroom quietly.","zh":"穿着黑色长袍的法官悄悄走进了法庭。"},{"l":3,"en":"As a fair judge, he never lets personal feelings affect his decisions on any case.","zh":"作为一名公正的法官，他从不让个人感情影响他对任何案件的裁决。"}]},{"pos":"v.","m":"审判；断定","ex":[{"l":1,"en":"Don't judge a person by his looks.","zh":"不要以貌取人。"},{"l":2,"en":"You should not judge others before you really understand them.","zh":"在你真正了解别人之前，你不应该评判他们。"},{"l":3,"en":"Only when you have walked in his shoes can you judge whether his choice was right.","zh":"只有设身处地为他着想，你才能判断他的选择是否正确。"}]}]},{"day":29,"w":"juice","ph":"","defs":[{"pos":"n.","m":"果汁","ex":[{"l":1,"en":"I would like a glass of orange juice.","zh":"我想要一杯橙汁。"},{"l":2,"en":"Fresh juice is good for your health because it is full of vitamins.","zh":"新鲜果汁对你的健康有益，因为它富含维生素。"},{"l":3,"en":"Made from freshly picked apples, the juice tasted so sweet that everyone asked for more.","zh":"这果汁是用刚摘的苹果做成的，味道如此甘甜，每个人都想再来一杯。"}]}]},{"day":29,"w":"July","ph":"","defs":[{"pos":"n.","m":"七月","ex":[{"l":1,"en":"My birthday is in July.","zh":"我的生日在七月。"},{"l":2,"en":"July is usually the hottest month of the year in this city.","zh":"在这座城市，七月通常是一年中最热的月份。"},{"l":3,"en":"Not until July did the rain finally stop, allowing the farmers to harvest their crops.","zh":"直到七月雨才终于停了，让农民们得以收割庄稼。"}]}]},{"day":29,"w":"jump","ph":"","defs":[{"pos":"n.&v.","m":"跳；跳跃","ex":[{"l":1,"en":"He made a long jump and won first prize.","zh":"他跳得很远,获得了一等奖。"},{"l":2,"en":"When the coach showed us how to do the jump correctly, I realized that practice was the key.","zh":"当教练向我们展示如何正确地跳跃时,我意识到练习才是关键。"},{"l":3,"en":"Only by practicing the high jump every day after school did he manage to break the school record that had stood for ten years.","zh":"只有每天放学后坚持练习跳高,他才得以打破保持了十年的校纪录。"}]}]},{"day":29,"w":"June","ph":"","defs":[{"pos":"n.","m":"六月","ex":[{"l":1,"en":"My birthday is in June every year.","zh":"我的生日每年都在六月。"},{"l":2,"en":"We will have final exams in late June, so we must make a good study plan right now.","zh":"我们将在六月底进行期末考试,所以现在必须制定一个好的学习计划。"},{"l":3,"en":"It is in June that the roses in our school garden bloom most beautifully, attracting many students to take photos.","zh":"正是在六月,我们学校花园里的玫瑰开得最美,吸引了许多学生来拍照。"}]}]},{"day":29,"w":"junior","ph":"","defs":[{"pos":"adj.","m":"初级的；年少的","ex":[{"l":1,"en":"My younger brother is a junior high school student.","zh":"我弟弟是一名初中生。"},{"l":2,"en":"Although she is a junior member of the team, she has already shown great talent in playing basketball.","zh":"虽然她是队里的初级成员,但她已经在打篮球方面展现出了极大的天赋。"},{"l":3,"en":"Even as a junior student, he refused to give up the chance to compete with senior players who were much stronger.","zh":"即使作为一名年少的学生,他也拒绝放弃与强大得多的学长们比赛的机会。"}]}]},{"day":29,"w":"just","ph":"","defs":[{"pos":"adv.","m":"刚才；恰好；不过；仅","ex":[{"l":1,"en":"I feel like I just came to this middle school yesterday.","zh":"我觉得我昨天才刚来到这所中学。"},{"l":2,"en":"We thought he had just found better stones than the ones we already had.","zh":"我们以为他刚刚找到了比我们已有的更好的石头。"},{"l":3,"en":"Hardly had I sat down when the bell rang, which meant the exam I had just worried about would begin in a minute.","zh":"我刚一坐下,铃声就响了,这意味着我刚才还在担心的考试马上就要开始了。"}]}]},{"day":29,"w":"keen","ph":"","defs":[{"pos":"adj.","m":"热心的","ex":[{"l":1,"en":"She is keen on playing the piano after school.","zh":"她放学后热衷于弹钢琴。"},{"l":2,"en":"The students who are keen on science will join the club that meets every Friday afternoon.","zh":"那些对科学感兴趣的学生将加入每周五下午聚会的俱乐部。"},{"l":3,"en":"It was his keen interest in nature that led him to spend every weekend observing birds in the mountains.","zh":"正是他对自然的浓厚兴趣,促使他每个周末都去山里观察鸟类。"}]}]},{"day":29,"w":"keep","ph":"","defs":[{"pos":"v.","m":"保持；保存；继续不断；培育，饲养","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"一些植物有自己的方法来驱赶动物。"},{"l":2,"en":"If you want to keep healthy, you should eat more vegetables and do exercise every day.","zh":"如果你想保持健康,就应该多吃蔬菜并且每天锻炼。"},{"l":3,"en":"Not only does she keep a diary in English every day, but she also encourages her classmates to form the same good habit.","zh":"她不仅每天坚持用英语写日记,还鼓励同学们养成同样的好习惯。"}]}]},{"day":29,"w":"key","ph":"","defs":[{"pos":"n.","m":"钥匙；答案；关键","ex":[{"l":1,"en":"I lost the key to my front door.","zh":"我弄丢了前门的钥匙。"},{"l":2,"en":"The teacher told us that hard work was the key to success in our studies.","zh":"老师告诉我们,努力学习是学习取得成功的关键。"},{"l":3,"en":"What we must remember is that confidence, rather than luck alone, is the real key to overcoming difficulties.","zh":"我们必须记住的是,自信而不是仅仅靠运气,才是克服困难的真正关键。"}]}]},{"day":29,"w":"keyboard","ph":"","defs":[{"pos":"n.","m":"键盘","ex":[{"l":1,"en":"Please type your name on the keyboard.","zh":"请在键盘上输入你的名字。"},{"l":2,"en":"After the teacher showed me how to use the keyboard, I found it much easier to write my compositions.","zh":"老师教我使用键盘之后,我觉得写作文容易多了。"},{"l":3,"en":"Having practiced typing on the keyboard for three months, she can now finish a long report within half an hour.","zh":"在键盘上练习打字三个月后,她现在能在半小时内完成一篇长报告。"}]}]},{"day":29,"w":"kick","ph":"","defs":[{"pos":"v.&n.","m":"踢","ex":[{"l":1,"en":"He gave the ball a hard kick.","zh":"他用力踢了一下球。"},{"l":2,"en":"When the player was ready to kick the ball, the crowd became quiet and watched him carefully.","zh":"当那名球员准备踢球时,人群安静下来,仔细地注视着他。"},{"l":3,"en":"Such a powerful kick did he give the ball that it flew over the wall and landed in the goal directly.","zh":"他踢球的力气如此之大,以至于球飞过墙壁,直接落入了球门。"}]}]},{"day":29,"w":"kid","ph":"","defs":[{"pos":"v.","m":"开玩笑","ex":[{"l":1,"en":"Are you kidding? I cannot believe it.","zh":"你在开玩笑吗?我真不敢相信。"},{"l":2,"en":"When he said he was kidding, we all laughed and felt much more relaxed.","zh":"当他说他在开玩笑时,我们都笑了起来,感觉轻松多了。"},{"l":3,"en":"Only after his friend explained the joke did he realize they were kidding him about his funny new haircut.","zh":"直到朋友解释了这个笑话,他才意识到他们在拿他滑稽的新发型开玩笑。"}]},{"pos":"n.","m":"小孩","ex":[{"l":1,"en":"How hard the volunteer worked to get more kids back to school!","zh":"那位志愿者多么努力地工作,为了让更多孩子重返校园!"},{"l":2,"en":"The kids were excited to see the toy rocket flying into the sky.","zh":"孩子们看到玩具火箭飞上天空,非常兴奋。"},{"l":3,"en":"What surprised the teacher most was that the shy kid had the courage to speak in front of so many strangers.","zh":"最令老师惊讶的是,那个害羞的孩子竟然有勇气在这么多陌生人面前讲话。"}]}]},{"day":29,"w":"kill","ph":"","defs":[{"pos":"n.","m":"杀死，弄死","ex":[{"l":1,"en":"The hunter made a clean kill in the forest.","zh":"猎人在森林里干净利落地完成了一次猎杀。"},{"l":2,"en":"The documentary showed that the lion's kill provided food for the whole family for several days.","zh":"纪录片显示,狮子捕获的猎物为一家人提供了几天的食物。"},{"l":3,"en":"Watching the tiger move silently, we understood why it is regarded as a master of the kill in the wild.","zh":"看着老虎悄然移动,我们明白了为什么它被视为野外捕猎的高手。"}]}]},{"day":29,"w":"kilogram","ph":"","defs":[{"pos":"n.","m":"千克（公斤）","ex":[{"l":1,"en":"I bought one kilogram of apples today.","zh":"我今天买了一千克苹果。"},{"l":2,"en":"The shop assistant told me that each box weighed about two kilograms, so I asked him to carry two for me.","zh":"店员告诉我每个箱子大约重两千克,所以我让他帮我拿两个。"},{"l":3,"en":"What the farmer proudly showed us was a pumpkin weighing over fifty kilograms, which had won the first prize at the fair.","zh":"农夫自豪地向我们展示的是一个重达五十多千克的南瓜,它在集市上获得了一等奖。"}]}]},{"day":29,"w":"kilometre","ph":"","defs":[{"pos":"n.","m":"千米（公里）","ex":[{"l":1,"en":"The school is two kilometres away from my home.","zh":"学校离我家两千米。"},{"l":2,"en":"Although the lake is about five kilometres around, many old people still walk around it every morning.","zh":"虽然这个湖大约有五千米周长,许多老人仍然每天早晨绕湖散步。"},{"l":3,"en":"Having run ten kilometres without stopping, the young athlete finally proved that his training had not been in vain.","zh":"这位年轻运动员一口气跑了十千米,终于证明了他的训练没有白费。"}]}]},{"day":29,"w":"kind","ph":"","defs":[{"pos":"n.","m":"种，类","ex":[{"l":1,"en":"This kind of flower is very beautiful.","zh":"这种花非常漂亮。"},{"l":2,"en":"The shop sells many kinds of fruits that are grown by local farmers in the countryside.","zh":"这家商店出售许多种由当地农民在乡下种植的水果。"},{"l":3,"en":"It is this kind of friendship, built on trust and honesty, that helps young people face the challenges of growing up.","zh":"正是这种建立在信任和诚实基础上的友谊,帮助年轻人面对成长的挑战。"}]},{"pos":"adj.","m":"善良的；友好的","ex":[{"l":1,"en":"She is a kind girl who often helps others.","zh":"她是一个善良的女孩,经常帮助别人。"},{"l":2,"en":"It was very kind of you to help the old man carry the heavy box up the stairs.","zh":"你帮那位老人把重箱子搬上楼,真是太善良了。"},{"l":3,"en":"So kind was the stranger that he not only gave us directions but also led us all the way to the hospital.","zh":"那位陌生人如此善良,他不仅给我们指路,还一路把我们带到了医院。"}]}]},{"day":29,"w":"kindergarten","ph":"","defs":[{"pos":"n.","m":"幼儿园","ex":[{"l":1,"en":"My little sister goes to kindergarten every day.","zh":"我妹妹每天上幼儿园。"},{"l":2,"en":"When I dropped my brother off at the kindergarten, I noticed that the teachers were very patient with the children.","zh":"当我把弟弟送到幼儿园时,我注意到老师们对孩子们非常耐心。"},{"l":3,"en":"The time I spent in kindergarten remains the sweetest memory, where I first learned to share toys with other kids.","zh":"我在幼儿园度过的时光仍是最甜蜜的回忆,在那里我第一次学会与其他孩子分享玩具。"}]}]},{"day":29,"w":"kindness","ph":"","defs":[{"pos":"n.","m":"仁慈；好意","ex":[{"l":1,"en":"Thank you for your kindness to me.","zh":"感谢你对我的好意。"},{"l":2,"en":"The old man was so moved by the girl's kindness that he decided to help her family in return.","zh":"老人被女孩的好意深深感动,决定反过来帮助她的家人。"},{"l":3,"en":"What the world needs most, I believe, is simple kindness that can warm the hearts of people in trouble.","zh":"我相信,这个世界最需要的,是能够温暖困境中人们心灵的简单善意。"}]}]},{"day":29,"w":"king","ph":"","defs":[{"pos":"n.","m":"国王","ex":[{"l":1,"en":"The king lived in a big castle.","zh":"国王住在一座大城堡里。"},{"l":2,"en":"The story tells us that the king finally understood that love was more important than power.","zh":"故事告诉我们,国王终于明白了爱比权力更重要。"},{"l":3,"en":"Crowned as king at a young age, he had to learn quickly how to rule the country wisely and fairly.","zh":"他在年轻时就被加冕为王,不得不迅速学会如何明智而公正地治理国家。"}]}]},{"day":29,"w":"kitchen","ph":"","defs":[{"pos":"n.","m":"厨房","ex":[{"l":1,"en":"My mother is cooking in the kitchen.","zh":"我妈妈正在厨房做饭。"},{"l":2,"en":"While my mother was cleaning the kitchen, I helped her wash the dishes that we had used for dinner.","zh":"妈妈在打扫厨房时,我帮她洗了我们晚饭用过的盘子。"},{"l":3,"en":"Not until I entered the kitchen did I notice that my father had already prepared a big surprise cake for my birthday.","zh":"直到走进厨房,我才注意到爸爸已经为我的生日准备好了一个大大的惊喜蛋糕。"}]}]},{"day":29,"w":"kite","ph":"","defs":[{"pos":"n.","m":"风筝","ex":[{"l":1,"en":"The children are flying a kite in the park.","zh":"孩子们正在公园里放风筝。"},{"l":2,"en":"When spring comes, many families go to the hill to fly kites so that kids can enjoy the warm sunshine.","zh":"春天到来时，许多家庭去山上放风筝，好让孩子们享受温暖的阳光。"},{"l":3,"en":"Only when you hold the string tightly can you keep the colorful kite flying high in the clear blue sky.","zh":"只有紧紧握住线，你才能让那只彩色风筝在高高的晴空中飞翔。"}]}]},{"day":29,"w":"knife","ph":"","defs":[{"pos":"n.","m":"小刀","ex":[{"l":1,"en":"He cut the apple with a small knife.","zh":"他用一把小刀切开了苹果。"},{"l":2,"en":"Please be careful when you use the knife, or you may cut your fingers by accident.","zh":"使用小刀时请小心，否则你可能意外割伤手指。"},{"l":3,"en":"The knife lying on the kitchen table is the very one that my grandfather used to peel apples years ago.","zh":"放在厨房桌上的那把小刀，正是我祖父多年前用来削苹果的那一把。"}]}]},{"day":30,"w":"knock","ph":"","defs":[{"pos":"n.&v.","m":"敲（门）；打；击","ex":[{"l":1,"en":"Someone is knocking at the door.","zh":"有人在敲门。"},{"l":2,"en":"When you hear a knock at the door, you should ask who it is before you open it.","zh":"当你听到敲门声时，开门之前你应该先问是谁。"},{"l":3,"en":"Hearing a soft knock on the window, the girl turned around only to find that it was just the wind shaking the tree.","zh":"听到窗户上轻轻的敲击声，女孩转过身，结果发现只是风在摇动那棵树。"}]}]},{"day":30,"w":"know","ph":"","defs":[{"pos":"v.","m":"知道；了解；认识；懂得","ex":[{"l":1,"en":"I really don't know.","zh":"我真的不知道。"},{"l":2,"en":"This man-made waterway — known in China as Da Yunhe — is 1,700 kilometers long and some parts of it are more than 2,000 years old.","zh":"这条人造水道——在中国被称为大运河——长1700公里，其中一些部分已有两千多年的历史。"},{"l":3,"en":"As far as I know, the young scientist who discovered the new material has already won several international awards.","zh":"据我所知，发现这种新材料的年轻科学家已经获得了好几项国际大奖。"}]}]},{"day":30,"w":"knowledge","ph":"","defs":[{"pos":"n.","m":"知识；学问","ex":[{"l":1,"en":"Reading books gives us a lot of knowledge.","zh":"读书能给我们很多知识。"},{"l":2,"en":"If you want to get more knowledge, you should read as many good books as possible.","zh":"如果你想获得更多知识，你应该尽可能多地读好书。"},{"l":3,"en":"Not only does knowledge open our minds, but it also helps us solve the problems that we meet in daily life.","zh":"知识不仅能开阔我们的思路，还能帮助我们解决日常生活中遇到的问题。"}]}]},{"day":30,"w":"lab","ph":"","defs":[{"pos":"n.","m":"实验室","ex":[{"l":1,"en":"We do experiments in the science lab.","zh":"我们在科学实验室里做实验。"},{"l":2,"en":"Our teacher told us that the new lab would be ready before the new term began.","zh":"老师告诉我们，新实验室会在新学期开始前准备好。"},{"l":3,"en":"Equipped with the latest machines, the school lab allows students to carry out experiments that were impossible years ago.","zh":"配备了最新设备后，学校实验室让学生能够开展几年前还不可能做的实验。"}]}]},{"day":30,"w":"lady","ph":"","defs":[{"pos":"n.","m":"女士；夫人","ex":[{"l":1,"en":"Is that lady a student?","zh":"那位女士是一名学生吗？"},{"l":2,"en":"The old lady who lives next door often tells us interesting stories about her childhood.","zh":"住在隔壁的那位老奶奶经常给我们讲她童年的有趣故事。"},{"l":3,"en":"It was the young lady in a red dress that offered her seat to the old man when the bus got crowded.","zh":"正是那位穿红裙子的年轻女士，在公交车拥挤时把座位让给了那位老人。"}]}]},{"day":30,"w":"lake","ph":"","defs":[{"pos":"n.","m":"湖","ex":[{"l":1,"en":"We often swim in the lake in summer.","zh":"夏天我们常在湖里游泳。"},{"l":2,"en":"The lake which we visited last weekend is one of the most beautiful places in our city.","zh":"我们上周末参观的那个湖是我们城市里最美的地方之一。"},{"l":3,"en":"Surrounded by green hills, the quiet lake looks like a huge mirror reflecting the white clouds above.","zh":"被青山环绕着，那片宁静的湖面就像一面巨大的镜子，映照着上方的白云。"}]}]},{"day":30,"w":"lamp","ph":"","defs":[{"pos":"n.","m":"灯","ex":[{"l":1,"en":"Please turn off the lamp before you
