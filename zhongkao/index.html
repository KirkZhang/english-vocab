<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="color-scheme" content="light">

<link rel="icon" href="icon-32.png">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
  background:#f4f5f7;color:#222;display:flex;flex-direction:column;align-items:center;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior:none;
  -webkit-user-select:none;user-select:none}
#app{width:100%;max-width:640px;min-height:100dvh;display:flex;flex-direction:column;margin:0 auto}
.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(28px,5vw,48px) clamp(18px,4vw,28px);text-align:center}
h1{font-size:clamp(28px,4.2vw,38px);margin-bottom:10px;letter-spacing:1px}
.sub{color:#999;margin-bottom:30px;font-size:clamp(13px,1.8vw,15px)}
.big-btns{display:flex;gap:clamp(14px,2vw,20px);margin-bottom:22px;flex-wrap:wrap;justify-content:center}
.big{padding:clamp(18px,3vw,24px) clamp(38px,6vw,56px);font-size:clamp(18px,2.4vw,22px);border:none;border-radius:16px;
  background:#33bb77;color:#fff;font-weight:600;cursor:pointer;box-shadow:0 6px 16px rgba(50,187,119,.32);
  transition:transform .1s;touch-action:manipulation}
.big:active{transform:scale(.96)}
.big.ghost{background:#fff;color:#33bb77;border:2px solid #33bb77;box-shadow:none}
.stat{color:#bbb;font-size:13px}
.link{background:none;border:none;color:#3a7bd5;font-size:14px;cursor:pointer;margin-top:18px;padding:10px;min-height:44px;touch-action:manipulation}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:26px;width:100%;max-width:480px}
.day{display:flex;align-items:center;justify-content:center;padding:clamp(9px,1.4vw,12px) 4px;background:#fff;
  border:1px solid #e3e3e3;border-radius:9px;font-size:clamp(12px,1.7vw,14px);cursor:pointer;user-select:none;min-height:40px;touch-action:manipulation}
.day:has(input:checked){background:#eafaf1;border-color:#33bb77;color:#1f8f55}
.day input{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:clamp(10px,1.6vw,14px) clamp(14px,2vw,20px);background:#fff;border-bottom:1px solid #eee}
.tag{font-size:clamp(11px,1.5vw,13px);color:#555;background:#eef1f6;padding:5px 11px;border-radius:11px;max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lvl{display:flex;align-items:center;gap:3px;font-size:12px;color:#999;flex-shrink:0}
.lvl button{border:1px solid #ddd;background:#fff;color:#555;width:clamp(28px,4vw,34px);height:clamp(28px,4vw,34px);border-radius:7px;cursor:pointer;font-size:13px;touch-action:manipulation}
.lvl button.on{background:#33bb77;color:#fff;border-color:#33bb77}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:clamp(14px,2.5vw,24px)}
.card{background:#fff;border-radius:20px;padding:clamp(28px,4vw,48px) clamp(22px,3.5vw,38px);width:100%;
  box-shadow:0 8px 28px rgba(0,0,0,.07);text-align:center;cursor:pointer;min-height:clamp(286px,52vh,468px);
  display:flex;flex-direction:column;justify-content:center;align-items:center;transition:transform .12s;touch-action:manipulation}
.card:active{transform:scale(.992)}
.word{font-size:clamp(34px,7vw,60px);font-weight:700;margin-bottom:6px;word-break:break-word;line-height:1.15}
.ph{color:#aaa;font-size:clamp(15px,2vw,19px);margin-bottom:14px}
.tap{color:#ccc;font-size:clamp(12px,1.7vw,14px);margin-top:20px}
.defs{width:100%;text-align:left;margin-top:16px;border-top:1px dashed #ececec;padding-top:16px}
.def{margin-bottom:16px}
.def:last-child{margin-bottom:4px}
.pos-m{margin-bottom:7px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
.pos{display:inline-block;background:#eef1f6;color:#3a7bd5;padding:3px 9px;border-radius:7px;font-size:clamp(11px,1.6vw,13px);font-weight:600}
.m{font-size:clamp(15px,2.1vw,18px);color:#333;flex:1;min-width:0}
.ex{background:#f7f8fa;border-radius:9px;padding:clamp(9px,1.3vw,12px) clamp(11px,1.6vw,14px);margin-top:5px}
.en{font-size:clamp(13px,1.9vw,16px);color:#3a3a3a;line-height:1.55}
.zh{font-size:clamp(12px,1.7vw,14px);color:#888;margin-top:4px;line-height:1.5}
.progress{text-align:center;color:#bbb;font-size:clamp(12px,1.7vw,14px);padding:8px}
.ans{display:flex;gap:clamp(12px,2vw,18px);padding:clamp(12px,2vw,18px) clamp(16px,2.5vw,22px) max(28px,env(safe-area-inset-bottom))}
.ans button{flex:1;padding:clamp(16px,2.4vw,22px);font-size:clamp(17px,2.4vw,22px);border:none;border-radius:15px;
  font-weight:600;cursor:pointer;color:#fff;transition:transform .1s;touch-action:manipulation;min-height:52px}
.ans .yes{background:#33bb77}
.ans .no{background:#e8604a}
.ans button:active{transform:scale(.97)}
.empty{color:#aaa;font-size:14px;line-height:1.8}
.card.browsed{cursor:default;align-items:stretch;text-align:left}
.word-bar{display:flex;align-items:center;justify-content:center;gap:clamp(6px,2vw,14px);width:100%;margin-bottom:8px}
.word-row{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0}
.browse-stage{align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch}
.nav-arrow{flex-shrink:0;background:transparent;border:none;color:#9aa;
  font-size:clamp(30px,4.5vw,44px);cursor:pointer;padding:10px 14px;border-radius:12px;
  touch-action:manipulation;min-width:48px;line-height:1;font-weight:300}
.nav-arrow:active{background:#eef1f6;color:#33bb77}
.spk{background:transparent;border:1px solid #ddd;color:#888;font-size:12px;padding:3px 9px;border-radius:11px;cursor:pointer;touch-action:manipulation;margin-left:8px;vertical-align:middle}
.spk.on{background:#eafaf1;border-color:#33bb77;color:#1f8f55}
.dict-area{flex:1;display:flex;flex-direction:column;align-items:center;gap:14px;min-width:0;padding:10px 0}
.dict-hint{color:#888;font-size:15px;text-align:center}
.dict-input{font-size:26px;text-align:center;padding:10px 16px;border:2px solid #ddd;border-radius:10px;width:82%;max-width:280px;outline:none;letter-spacing:1px}
.dict-input:focus{border-color:#33bb77}
.dict-mark{font-size:22px;font-weight:700;margin-left:10px;vertical-align:middle}
.dict-mark.ok{color:#33bb77}.dict-mark.no{color:#e8604a}
/* 移动端(phone+iPad)：去除卡片容器，内容直接呈现于页面 */
@media (max-width:1024px){
  .card{background:transparent;box-shadow:none;border-radius:0}
  .card:active{transform:none}
}

/* iPad 竖屏及以上 */
@media (min-width:768px){
  #app{max-width:820px}
  .day-grid{grid-template-columns:repeat(8,1fr);max-width:680px;gap:11px}
}
/* iPad 横屏 / 大 pad */
@media (min-width:1024px){
  #app{max-width:920px}
  .day-grid{grid-template-columns:repeat(10,1fr);max-width:none}
}
/* 小 phone */
@media (max-width:380px){
  .day-grid{grid-template-columns:repeat(4,1fr)}
}
/* 横屏低高（手机横屏）避免卡片溢出 */
@media (orientation:landscape) and (max-height:500px){
  .card{min-height:auto}
  .stage{padding:10px}
  .wrap{padding-top:20px;padding-bottom:20px}
}
</style><style id="touch-opt">
*{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
button,.big,.day,.nav-arrow,.spk,.lvl button,.link,.ans button,.card{touch-action:manipulation}
.lvl button,.spk,.nav-arrow,.link{min-width:44px;min-height:44px}
.link{display:inline-flex;align-items:center;justify-content:center}
.big:active,.ans button:active,.nav-arrow:active,.day:active,.lvl button:active,.spk:active{opacity:.65;transform:scale(.96)}
input{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default;font-size:max(16px,4.5vw)}
.dict-input{min-height:54px}
.topbar{padding-top:max(10px,env(safe-area-inset-top))}
.ans{padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right));padding-bottom:max(22px,env(safe-area-inset-bottom))}
.stage{padding-left:max(14px,env(safe-area-inset-left));padding-right:max(14px,env(safe-area-inset-right))}
@media(hover:none){.big:hover,.ans button:hover,.nav-arrow:hover{transform:none}}
</style>
<style id="card-flat">.card,.card.browsed{background:transparent!important;box-shadow:none!important;border-radius:0!important;border:none!important}.card:active{transform:scale(.992)!important}.stage{display:flex!important;align-items:stretch!important;justify-content:center!important;padding:0!important}.card{width:100%!important;min-height:100%!important;height:100%!important;justify-content:center!important;align-items:center!important}.card.browsed{width:100%!important;margin-left:0!important;margin-right:0!important}</style></head>

<script>
const WORDS = [{"day":1,"w":"ability","ph":"","defs":[{"pos":"n.","m":"能力；才能","ex":[{"l":1,"en":"She has the ability to sing well.","zh":"她有唱歌的天赋。"},{"l":2,"en":"I believe that everyone has the ability to learn English well if he works hard enough.","zh":"我相信只要足够努力，每个人都有学好英语的能力。"},{"l":3,"en":"Not only does she have the ability to solve difficult problems, but she also helps her classmates improve their own skills.","zh":"她不仅有解决难题的能力，还帮助同学提高他们自己的技能。"}]}]},{"day":1,"w":"able","ph":"","defs":[{"pos":"adj.","m":"能够；有能力的","ex":[{"l":1,"en":"He is able to swim across the river.","zh":"他能游过这条河。"},{"l":2,"en":"If you want to be able to pass the exam, you must review what you have learned every day.","zh":"如果你想能够通过考试，就必须每天复习所学的知识。"},{"l":3,"en":"Only by practising every day will you be able to speak English as fluently as a native speaker in the future.","zh":"只有每天练习，将来你才能把英语说得像母语者一样流利。"}]}]},{"day":1,"w":"about","ph":"","defs":[{"pos":"adv.","m":"大约；到处，四处","ex":[{"l":1,"en":"It must be about three thirty.","zh":"现在一定是三点三十分左右了。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应当尽可能多地学习地理知识。"},{"l":3,"en":"When the meeting finally ended, it was already about seven, and most of us were too tired to think clearly.","zh":"当会议终于结束时，已经大约七点了，我们大多数人累得无法清晰思考。"}]},{"pos":"prep.","m":"关于","ex":[{"l":1,"en":"He told me a story about a brave boy.","zh":"他给我讲了一个关于勇敢男孩的故事。"},{"l":2,"en":"The book about which we talked yesterday is very popular among middle school students.","zh":"我们昨天谈论的那本书在初中生中非常受欢迎。"},{"l":3,"en":"What I want to share with you today is a story about a girl who never gave up her dream no matter what happened.","zh":"今天我想和你分享的是一个关于女孩的故事，无论发生什么她都从未放弃梦想。"}]}]},{"day":1,"w":"above","ph":"","defs":[{"pos":"prep.","m":"在...上面","ex":[{"l":1,"en":"The plane is flying above the clouds.","zh":"飞机正飞行在云层之上。"},{"l":2,"en":"We know that someone tried hard to make our visit special. Thanks so much for going above and beyond!","zh":"我们知道有人为了让我们此行特别而竭尽全力。非常感谢你们所付出的远超职责的努力！"},{"l":3,"en":"From the top of the hill, we could see the whole city spread out below, with the river shining far above the roofs in the morning sun.","zh":"从山顶望去，整座城市在脚下铺展开来，晨光中河流在屋顶上方远远地闪着光。"}]}]},{"day":1,"w":"abroad","ph":"","defs":[{"pos":"adv.","m":"到（在）国外","ex":[{"l":1,"en":"I had thought about living with my grandparents when my parents went abroad last year.","zh":"去年父母出国时，我曾考虑过和祖父母一起住。"},{"l":2,"en":"When he went abroad to study last year, he found that living in a foreign country was not as easy as he had expected.","zh":"去年他出国留学时，发现生活在异国并不像他预想的那么容易。"},{"l":3,"en":"Having studied abroad for two years, she has not only improved her English but also learned to look after herself independently.","zh":"在国外学习两年后，她不仅提高了英语水平，还学会了独立照顾自己。"}]}]},{"day":1,"w":"accept","ph":"","defs":[{"pos":"v.","m":"接受","ex":[{"l":1,"en":"Please accept my sincere thanks.","zh":"请接受我真诚的感谢。"},{"l":2,"en":"Although the gift was small, she gladly accepted it because it was given by her best friend.","zh":"虽然礼物很小，她还是高兴地收下了，因为那是她最好的朋友送的。"},{"l":3,"en":"It was his teacher's advice that finally made him accept the truth that failure is part of growing up.","zh":"正是老师的话最终让他接受了失败是成长一部分这个事实。"}]}]},{"day":1,"w":"accident","ph":"","defs":[{"pos":"n.","m":"事故；意外的事","ex":[{"l":1,"en":"A car accident happened on the road.","zh":"路上发生了一起车祸。"},{"l":2,"en":"The police are looking into the accident which took place at the corner of the street yesterday evening.","zh":"警方正在调查昨晚发生在街道拐角处的那起事故。"},{"l":3,"en":"Never before had I seen such a terrible accident, and it taught me that safety must always come first on the road.","zh":"我从未见过如此可怕的事故，它让我明白在路上安全永远要放在第一位。"}]}]},{"day":1,"w":"accurate","ph":"","defs":[{"pos":"adj.","m":"准确的","ex":[{"l":1,"en":"His answer is accurate.","zh":"他的回答是准确的。"},{"l":2,"en":"To make sure the report is accurate, we need to check all the numbers again before handing it in.","zh":"为了确保报告准确无误，提交前我们需要再次核对所有数字。"},{"l":3,"en":"What makes a good translator is not only a large vocabulary, but also the ability to give an accurate and natural translation.","zh":"成为一名好翻译不仅需要丰富的词汇，还需要给出准确自然译文的能力。"}]}]},{"day":1,"w":"ache","ph":"","defs":[{"pos":"n.","m":"疼；痛","ex":[{"l":1,"en":"I have a stomach ache.","zh":"我胃疼。"},{"l":2,"en":"If you have a headache or a stomach ache, you had better see the doctor at once.","zh":"如果你头疼或胃疼，最好立刻去看医生。"},{"l":3,"en":"After running for two hours without a break, he felt such a bad ache in his legs that he could hardly stand up.","zh":"连续跑了两小时没休息后，他腿疼得几乎站不起来。"}]}]},{"day":1,"w":"achieve","ph":"","defs":[{"pos":"v.","m":"达到，获得","ex":[{"l":1,"en":"He worked hard to achieve his dream.","zh":"他努力工作以实现梦想。"},{"l":2,"en":"Only when you keep trying can you achieve what you have always dreamed of in your life.","zh":"只有不断尝试，你才能实现一直以来梦寐以求的目标。"},{"l":3,"en":"It is through years of hard work and patience that she was finally able to achieve the goal she set for herself as a child.","zh":"正是凭借多年的努力与耐心，她最终实现了儿时为自己设定的目标。"}]}]},{"day":1,"w":"across","ph":"","defs":[{"pos":"prep.","m":"横过，穿过","ex":[{"l":1,"en":"He walked across the street carefully.","zh":"他小心翼翼地穿过马路。"},{"l":2,"en":"No matter how many difficulties we came across, we considered them as chances for us to improve.","zh":"无论遇到多少困难，我们都把它们视为提升自己的机会。"},{"l":3,"en":"Walking across the square filled with tourists, I suddenly realized how much this small town had changed over the years.","zh":"穿过挤满游客的广场时，我突然意识到这座小镇这些年来变化有多大。"}]}]},{"day":1,"w":"act","ph":"","defs":[{"pos":"v.","m":"表演，扮演（角色）；行动","ex":[{"l":1,"en":"She wants to act in the school play.","zh":"她想在学校话剧里表演。"},{"l":2,"en":"The boy who will act the king in the play has practised his lines for almost a month.","zh":"将在剧中扮演国王的那个男孩已经练习台词将近一个月了。"},{"l":3,"en":"Not until he began to act on stage did he understand how much courage it takes to face a large audience.","zh":"直到他登台表演，他才明白面对众多观众需要多大的勇气。"}]}]},{"day":1,"w":"active","ph":"","defs":[{"pos":"adj.","m":"活跃的；积极的","ex":[{"l":1,"en":"She is an active student in class.","zh":"她在课堂上是个积极的学生。"},{"l":2,"en":"Students who are active in class usually learn faster than those who keep silent all the time.","zh":"课堂上积极的学生通常比一直沉默的学生学得更快。"},{"l":3,"en":"What impressed the teacher most was that even the shyest girl became active in discussion after the trip.","zh":"给老师印象最深的是，旅行后连最害羞的女孩也在讨论中变得积极起来。"}]}]},{"day":1,"w":"activity","ph":"","defs":[{"pos":"n.","m":"活动","ex":[{"l":1,"en":"Swimming is my favorite activity.","zh":"游泳是我最喜欢的活动。"},{"l":2,"en":"The school will hold a reading activity next week, which is planned to help students love books.","zh":"学校下周将举办一项阅读活动，旨在帮助学生爱上书籍。"},{"l":3,"en":"Taking part in after-school activity not only relaxes our minds, but also helps us make friends with the same interests.","zh":"参加课外活动不仅能放松心情，还能帮助我们结交志趣相投的朋友。"}]}]},{"day":1,"w":"actor","ph":"","defs":[{"pos":"n.","m":"男演员","ex":[{"l":1,"en":"The actor is very famous.","zh":"这位男演员非常有名。"},{"l":2,"en":"The actor who played the hero in the film became popular among young people almost overnight.","zh":"在影片中饰演男主角的那位演员几乎一夜之间就在年轻人中走红。"},{"l":3,"en":"It is said that the young actor has won several awards, which makes him one of the most promising stars of his age.","zh":"据说这位年轻演员已数次获奖，这使他成为同龄人中最有前途的明星之一。"}]}]},{"day":1,"w":"actress","ph":"","defs":[{"pos":"n.","m":"女演员","ex":[{"l":1,"en":"She is a famous actress.","zh":"她是一位著名的女演员。"},{"l":2,"en":"The actress whose new film came out last week said that she loved playing strong and brave women.","zh":"上周推出新片的那位女演员说她喜欢扮演坚强勇敢的女性。"},{"l":3,"en":"Having dreamed of becoming an actress since childhood, she finally got the leading role in a popular TV series.","zh":"自幼梦想成为女演员的她，终于在一部热门电视剧中担任了主角。"}]}]},{"day":1,"w":"actually","ph":"","defs":[{"pos":"adv.","m":"实际上；现实地","ex":[{"l":1,"en":"Actually, I don't like coffee.","zh":"事实上，我不喜欢咖啡。"},{"l":2,"en":"He looks quiet, but actually he is one of the most humorous boys in our class.","zh":"他看起来文静，但实际上他是我们班最幽默的男生之一。"},{"l":3,"en":"What surprised me most was that the simple-looking tool was actually invented by a middle school student.","zh":"最令我惊讶的是，那个看起来简单的工具其实是一名初中生发明的。"}]}]},{"day":1,"w":"add","ph":"","defs":[{"pos":"v.","m":"添加，增加","ex":[{"l":1,"en":"Please add some sugar to the milk.","zh":"请在牛奶里加点糖。"},{"l":2,"en":"He loved to go on long walks to find stones to add to his collection at the university.","zh":"他喜欢长途散步，去寻找石头添到他大学的收藏中。"},{"l":3,"en":"It was his habit of collecting stones that enabled him to add many rare samples to the museum over the years.","zh":"正是他收集石头的习惯，使他多年来能为博物馆增添许多珍稀标本。"}]}]},{"day":1,"w":"addition","ph":"","defs":[{"pos":"n.","m":"增加","ex":[{"l":1,"en":"In addition, I prefer experiences because they bring people together.","zh":"此外，我更喜欢经历，因为它们让人相聚。"},{"l":2,"en":"In addition to reading books, she also spends much time listening to English news every evening.","zh":"除了读书之外，她每天晚上还花很多时间听英语新闻。"},{"l":3,"en":"What makes the club special is that, in addition to regular training, it offers students chances to perform on a real stage.","zh":"让这个社团与众不同的是，除了常规训练外，它还给学生提供在真正舞台上表演的机会。"}]}]},{"day":1,"w":"address","ph":"","defs":[{"pos":"n.","m":"地址","ex":[{"l":1,"en":"Please write down your home address on the form.","zh":"请在表格上写下你的家庭住址。"},{"l":2,"en":"Could you tell me what your new address is so that I can send you the photos?","zh":"你能告诉我你的新地址是什么吗，这样我就能把照片寄给你？"},{"l":3,"en":"It was at that old address that we first met each other, which I will never forget as long as I live.","zh":"正是在那个旧地址我们初次相遇，只要我一息尚存，就永远不会忘记。"}]}]},{"day":1,"w":"adult","ph":"","defs":[{"pos":"n.","m":"成年人","ex":[{"l":1,"en":"Adults should set a good example for children.","zh":"成年人应该为孩子们树立好榜样。"},{"l":2,"en":"When you become an adult, you must take responsibility for your own actions and decisions.","zh":"当你成为一名成年人时，你必须为自己的行为和决定负责。"},{"l":3,"en":"Only when we grow into adults do we truly understand how much our parents have done for us over the years.","zh":"只有当我们长大成人，我们才真正理解这些年来父母为我们付出了多少。"}]},{"pos":"adj.","m":"成年的","ex":[{"l":1,"en":"An adult elephant can weigh up to six tons.","zh":"一头成年的大象能重达六吨。"},{"l":2,"en":"The adult panda looks calm, but it can actually become dangerous when it feels its baby is in danger.","zh":"这只成年的熊猫看起来很平静，但当它觉得宝宝有危险时，实际上会变得危险。"},{"l":3,"en":"Having grown into an adult lion, the young animal left its mother to start a new life of its own in the wild.","zh":"这只年轻的动物长成一头成年的狮子后，离开了母亲，去野外开始属于自己的新生活。"}]}]},{"day":1,"w":"advantage","ph":"","defs":[{"pos":"n.","m":"有利条件；优势；优点","ex":[{"l":1,"en":"Speaking English well is a great advantage.","zh":"说好英语是一个很大的优势。"},{"l":2,"en":"If you take advantage of every chance to read, your English will surely improve a lot.","zh":"如果你利用每一个阅读的机会，你的英语一定会提高很多。"},{"l":3,"en":"Not only does this method save time, but it also gives us a clear advantage when we deal with such problems.","zh":"这种方法不仅节省时间，而且在处理此类问题时给了我们明显的优势。"}]}]},{"day":1,"w":"adventure","ph":"","defs":[{"pos":"n.","m":"冒险；冒险经历；冒险精神","ex":[{"l":1,"en":"The boys set off on a new adventure.","zh":"男孩们开始了新的冒险。"},{"l":2,"en":"The book tells the story of a boy whose exciting adventure in the forest changed his whole life.","zh":"这本书讲述了一个男孩的故事，他在森林里那段激动人心的冒险经历改变了他的一生。"},{"l":3,"en":"Driven by a strong love for adventure, the young man travelled alone across the desert, which few people had ever tried before.","zh":"出于对冒险的强烈热爱，这个年轻人独自穿越沙漠，这很少有人尝试过。"}]}]},{"day":1,"w":"advertisement","ph":"","defs":[{"pos":"n.","m":"广告","ex":[{"l":1,"en":"I saw the advertisement on TV last night.","zh":"我昨晚在电视上看到了那则广告。"},{"l":2,"en":"The advertisement that was put up at the bus stop says the shop will have a big sale next weekend.","zh":"公交车站贴出的那则广告说这家商店下周末将有大促销。"},{"l":3,"en":"It is through such clever advertisements that companies manage to attract so many young customers within such a short time.","zh":"正是通过如此巧妙的广告，公司才能在这么短的时间内吸引这么多年轻顾客。"}]}]},{"day":1,"w":"advice","ph":"","defs":[{"pos":"n.","m":"忠告；劝告；建议","ex":[{"l":1,"en":"Can you give me some advice on learning English?","zh":"你能给我一些关于学习英语的建议吗？"},{"l":2,"en":"The teacher advised me to follow my father's advice, which he believed would help me a lot.","zh":"老师建议我听从父亲的建议，他认为这对我会有很大帮助。"},{"l":3,"en":"Had I taken my teacher's advice earlier, I would not have made so many mistakes in the exam.","zh":"如果我早点听从老师的建议，我就不会在考试中犯这么多错误了。"}]}]},{"day":1,"w":"advise","ph":"","defs":[{"pos":"v.","m":"劝告，建议","ex":[{"l":1,"en":"The doctor advises him to rest more.","zh":"医生建议他多休息。"},{"l":2,"en":"I advise that you (should) think carefully before you make such an important decision.","zh":"我建议你在做出如此重要的决定之前要仔细考虑。"},{"l":3,"en":"The expert advised us to read more, saying that those who read widely tend to think more deeply than others.","zh":"那位专家建议我们多读书，他说阅读广泛的人往往比别人思考得更深入。"}]}]},{"day":1,"w":"affect","ph":"","defs":[{"pos":"vt.","m":"影响；使感染","ex":[{"l":1,"en":"The rain will affect our trip.","zh":"这场雨会影响我们的旅行。"},{"l":2,"en":"What we eat every day can deeply affect our health, so we should choose our food carefully.","zh":"我们每天吃的东西会深深影响我们的健康，所以我们应该谨慎选择食物。"},{"l":3,"en":"Seldom does a single decision affect so many people's lives as this one did, which is why we must think twice.","zh":"很少有一个决定能像这个决定一样影响这么多人的生活，这就是为什么我们必须三思。"}]}]},{"day":1,"w":"afford","ph":"","defs":[{"pos":"v.","m":"负担得起；抽得出（时间）","ex":[{"l":1,"en":"I can't afford a new car now.","zh":"我现在买不起新车。"},{"l":2,"en":"Many families cannot afford to send their children to such an expensive school, however good it may be.","zh":"许多家庭负担不起把孩子送到如此昂贵的学校，无论它有多好。"},{"l":3,"en":"Only by working hard now can we afford the life we dream of in the future, which is the price we must pay.","zh":"只有现在努力奋斗，我们将来才能负担得起梦想的生活，这是我们必须付出的代价。"}]}]},{"day":1,"w":"afraid","ph":"","defs":[{"pos":"adj.","m":"害怕的；担心的","ex":[{"l":1,"en":"She is afraid of dogs.","zh":"她害怕狗。"},{"l":2,"en":"The little girl was so afraid that she did not dare to walk alone in the dark street at night.","zh":"这个小女孩如此害怕，以至于她不敢晚上独自走在黑暗的街道上。"},{"l":3,"en":"Afraid of being laughed at, the boy kept silent about his true feelings, which only made him feel more lonely.","zh":"因为害怕被嘲笑，这个男孩对自己的真实感受保持沉默，这反而让他感到更加孤独。"}]}]},{"day":1,"w":"Africa","ph":"","defs":[{"pos":"n.","m":"非洲","ex":[{"l":1,"en":"Africa is a very large continent.","zh":"非洲是一个非常大的洲。"},{"l":2,"en":"Many wild animals that live in Africa are now in danger, which worries scientists around the world.","zh":"生活在非洲的许多野生动物现在正处于危险之中，这让全世界的科学家都很担忧。"},{"l":3,"en":"It is in Africa that the world's longest river begins its long journey towards the sea, passing through several countries on the way.","zh":"正是在非洲，世界上最长的河流开始了它奔向大海的漫长旅程，途中穿过好几个国家。"}]}]},{"day":2,"w":"after","ph":"","defs":[{"pos":"prep.","m":"在...之后，在...后面","ex":[{"l":1,"en":"It’s a few minutes after two.","zh":"现在是两点过几分。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番之后，我了解到那些负责绘制全世界道路、山脉、海洋以及其他地点的人被称为制图师。"},{"l":3,"en":"After reading the letter three times, the old man finally realized what his son had been trying to tell him all these years.","zh":"把这封信读了三遍之后，这位老人终于意识到这些年来他儿子一直想告诉他什么。"}]},{"pos":"adv.","m":"在后；后来","ex":[{"l":1,"en":"It’s a few minutes after two.","zh":"现在是两点过几分。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番之后，我了解到那些负责绘制全世界道路、山脉、海洋以及其他地点的人被称为制图师。"},{"l":3,"en":"He stood at the door and watched for a while, and then hurried after his friends who had already gone far ahead.","zh":"他在门口站了一会儿看了看，然后急忙追赶已经走远的朋友们。"}]},{"pos":"conj.","m":"在...以后","ex":[{"l":1,"en":"It’s a few minutes after two.","zh":"现在是两点过几分。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番之后，我了解到那些负责绘制全世界道路、山脉、海洋以及其他地点的人被称为制图师。"},{"l":3,"en":"After he finished his homework, he went out to play football with his friends, who were waiting for him at the gate.","zh":"做完作业之后，他出去和朋友们踢足球，朋友们正在门口等他。"}]}]},{"day":2,"w":"afternoon","ph":"","defs":[{"pos":"n.","m":"下午","ex":[{"l":1,"en":"Good afternoon,Mr. Green.","zh":"下午好，格林先生。"},{"l":2,"en":"When we reached the houses in the late afternoon, we were tired.","zh":"傍晚我们到达那些房子时，我们已经累了。"},{"l":3,"en":"It was a cold winter afternoon when we finally arrived at the small village, which lay quietly among the hills.","zh":"那是一个寒冷的冬日午后，我们终于到达了那个静静坐落在群山之间的小村庄。"}]}]},{"day":2,"w":"again","ph":"","defs":[{"pos":"adv.","m":"再一次；再；又","ex":[{"l":1,"en":"Even if you take the exam again, you won't pass it.","zh":"即使你再考一次，你也不会通过。"},{"l":2,"en":"If you fail this time, do not give up, because you can always try again until you reach your goal.","zh":"如果你这次失败了，不要放弃，因为你总是可以再试一次，直到实现你的目标。"},{"l":3,"en":"Try as he might again and again, he still could not solve the problem, which made him realize how much more he had to learn.","zh":"尽管他一次又一次地努力尝试，他还是无法解决这个问题，这让他意识到自己还有多少东西要学。"}]}]},{"day":2,"w":"against","ph":"","defs":[{"pos":"prep.","m":"对着；反对","ex":[{"l":1,"en":"Are you for or against the plan?","zh":"你支持还是反对这个计划？"},{"l":2,"en":"Many students are strongly against the new rule, which they think will make their school life much harder.","zh":"许多学生强烈反对这条新规定，他们认为这会让他们的学校生活艰难得多。"},{"l":3,"en":"Standing against the cold wall, the poor boy had no choice but to wait for someone who might be willing to help him.","zh":"靠着冰冷的墙站着，这个可怜的男孩别无选择，只能等待可能愿意帮助他的人。"}]}]},{"day":2,"w":"age","ph":"","defs":[{"pos":"n.","m":"年龄；时代","ex":[{"l":1,"en":"What is your age?","zh":"你多大了？"},{"l":2,"en":"At my age, my grandfather had already started working to support the whole family, which I can hardly imagine.","zh":"在我这个年纪，我爷爷已经开始工作养活全家了，这我简直难以想象。"},{"l":3,"en":"It is not your age but your effort that decides how far you can go in life, as many successful people have proved.","zh":"决定你人生能走多远的不是年龄而是努力，正如许多成功人士所证明的那样。"}]}]},{"day":2,"w":"aged","ph":"","defs":[{"pos":"adj.","m":"有...年岁的；上年龄的","ex":[{"l":1,"en":"He has an aged mother at home.","zh":"他在家有一位年迈的母亲。"},{"l":2,"en":"The aged man who lives next door often tells us interesting stories about his life when he was young.","zh":"住在隔壁的那位老人经常给我们讲他年轻时的有趣故事。"},{"l":3,"en":"The boy, aged only ten, managed to take care of his sick mother all by himself, which moved everyone around him.","zh":"这个只有十岁的男孩，独自一人设法照顾生病的母亲，这感动了他身边的每一个人。"}]}]},{"day":2,"w":"ago","ph":"","defs":[{"pos":"adv.","m":"以前","ex":[{"l":1,"en":"Your friend was here a week ago, wasn't he?","zh":"你的朋友一周前在这里，不是吗？"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次研学旅行中遇到一些青少年，现在我仍与他们保持联系，但我几乎记不起旅途中买了什么。"},{"l":3,"en":"Only a few years ago, few people believed that such a small invention could change the way we communicate with friends around the world.","zh":"就在几年前，很少有人相信这样一件小小的发明能改变我们与世界各地朋友交流的方式。"}]}]},{"day":2,"w":"agree","ph":"","defs":[{"pos":"v.","m":"同意；应允","ex":[{"l":1,"en":"I agree with you on this point.","zh":"在这一点上我同意你的看法。"},{"l":2,"en":"Although they did not agree at first, they finally agreed that the plan was the best choice for everyone.","zh":"虽然起初他们并不同意，但最终他们一致认为这个计划对每个人来说都是最佳选择。"},{"l":3,"en":"What I cannot agree with is the idea that success depends only on luck rather than on hard work.","zh":"我所不能同意的是：成功仅仅取决于运气而非努力。"}]}]},{"day":2,"w":"ahead","ph":"","defs":[{"pos":"adv.","m":"在前；向前","ex":[{"l":1,"en":"Please go ahead and tell your story.","zh":"请继续，把你的故事讲下去。"},{"l":2,"en":"If you want to win the race, you must keep looking ahead instead of turning back to check the other runners.","zh":"如果你想赢得比赛，你必须一直向前看，而不是回头去看其他选手。"},{"l":3,"en":"Only by planning well ahead can we avoid the problems that may appear in the coming winter holiday.","zh":"只有提前做好规划，我们才能避开即将到来的寒假可能出现的问题。"}]}]},{"day":2,"w":"aim","ph":"","defs":[{"pos":"n.","m":"目的；目标","ex":[{"l":1,"en":"His main aim is to help poor children.","zh":"他的主要目标是帮助贫困儿童。"},{"l":2,"en":"The aim of this club is to encourage students to read more books that can open their minds to the world.","zh":"这个俱乐部的目的是鼓励学生读更多能让他们打开眼界、认识世界的书。"},{"l":3,"en":"The aim that he set for himself at the beginning of this term was not easy, yet he managed to reach it through months of effort.","zh":"他在本学期初为自己设定的目标并不容易，但通过数月的努力他还是实现了。"}]},{"pos":"v.","m":"打算；瞄准","ex":[{"l":1,"en":"He aims to be a doctor in the future.","zh":"他打算将来当一名医生。"},{"l":2,"en":"She aims to finish the report before Friday so that her teacher will have enough time to check it.","zh":"她打算在周五之前完成报告，这样老师就有足够的时间来检查。"},{"l":3,"en":"Aimed at improving the reading skills of beginners, the new course has become popular among students who find English hard.","zh":"这门旨在提高初学者阅读能力的新课程，在觉得英语难的学生中很受欢迎。"}]}]},{"day":2,"w":"air","ph":"","defs":[{"pos":"n.","m":"空气；大气","ex":[{"l":1,"en":"They measure land, air space, and water areas.","zh":"他们测量陆地、空域和水域。"},{"l":2,"en":"For example, people should remember to turn off electric items like TV sets and air conditioners when they are not used.","zh":"例如，人们应该记得在不使用时关掉电视和空调等电器。"},{"l":3,"en":"Only when the air in the room becomes fresh again will the children be able to focus on their study.","zh":"只有当房间里的空气重新变得清新时，孩子们才能够专注于学习。"}]}]},{"day":2,"w":"airline","ph":"","defs":[{"pos":"n.","m":"航线","ex":[{"l":1,"en":"This airline flies to many big cities.","zh":"这条航线飞往许多大城市。"},{"l":2,"en":"The new airline, which was opened last month, makes it much easier for travellers to reach the small island.","zh":"上月开通的这条新航线，使旅客更容易抵达这座小岛。"},{"l":3,"en":"Not only does this airline connect the two cities, but it also brings new business chances to local people.","zh":"这条航线不仅连接了两座城市，还给当地人带来了新的商业机会。"}]}]},{"day":2,"w":"airport","ph":"","defs":[{"pos":"n.","m":"机场","ex":[{"l":1,"en":"We will meet at the airport at six.","zh":"我们六点在机场见面。"},{"l":2,"en":"When I arrived at the airport, I found that my plane had already taken off because of the heavy rain.","zh":"当我到达机场时，我发现由于大雨，我的飞机已经起飞了。"},{"l":3,"en":"It was at the small airport that I said goodbye to my parents for the first time and began my study in another city.","zh":"正是在那座小机场，我第一次与父母告别，开始在另一座城市求学。"}]}]},{"day":2,"w":"alarm","ph":"","defs":[{"pos":"n.","m":"警报","ex":[{"l":1,"en":"The fire alarm rang loudly.","zh":"火警警报大声响起。"},{"l":2,"en":"As soon as the alarm went off, all the students quickly left the classroom and gathered on the playground.","zh":"警报一响，所有学生便迅速离开教室，聚集在操场上。"},{"l":3,"en":"So loudly did the alarm ring that everyone in the building woke up within seconds and ran out into the street.","zh":"警报声响得那么大，整栋楼里的人几秒钟内都被惊醒，跑到了街上。"}]}]},{"day":2,"w":"alive","ph":"","defs":[{"pos":"adj.","m":"活着的；存在的","ex":[{"l":1,"en":"The fish is still alive.","zh":"这条鱼还活着。"},{"l":2,"en":"To our joy, the old man who was lost in the forest for three days was found alive.","zh":"令我们高兴的是，在森林中迷路三天的老人被发现时还活着。"},{"l":3,"en":"It is a wonder that so many old traditions are still kept alive by the young people in this small village.","zh":"令人惊叹的是，这个小村里的许多古老传统仍被年轻人保留着、传承着。"}]}]},{"day":2,"w":"all","ph":"","defs":[{"pos":"adj.","m":"全（部）；总；整","ex":[{"l":1,"en":"All the students are here today.","zh":"今天所有的学生都到了。"},{"l":2,"en":"All the books that you lent me last month were very helpful, and I have learned a lot from them.","zh":"你上月借给我的所有书都很有帮助，我从中受益良多。"},{"l":3,"en":"All these photos remind me of the days when we travelled together along the beautiful river.","zh":"所有这些照片都让我想起我们一起沿着那条美丽的河流旅行的日子。"}]},{"pos":"adv.","m":"全部地","ex":[{"l":1,"en":"He ate all the cake.","zh":"他把蛋糕全吃光了。"},{"l":2,"en":"The children were so hungry that they ate all the food on the table within ten minutes.","zh":"孩子们太饿了，不到十分钟就把桌上的食物全吃光了。"},{"l":3,"en":"After running for two hours, the boy was so tired that he fell asleep the moment he lay down and slept all through the night.","zh":"跑了两个小时后，男孩累得一躺下就睡着了，整整睡了一夜。"}]},{"pos":"pron.&n.","m":"全部；全体人员","ex":[{"l":1,"en":"All of us like music.","zh":"我们大家都喜欢音乐。"},{"l":2,"en":"All of the workers agreed that safety should come first, no matter how busy the factory was.","zh":"所有工人都同意，无论工厂多忙，安全都应该放在首位。"},{"l":3,"en":"What surprised the teacher most was that all of the class passed the difficult exam on the first try.","zh":"最让老师惊讶的是，全班第一次就通过了这场困难的考试。"}]}]},{"day":2,"w":"allow","ph":"","defs":[{"pos":"v.","m":"允许，准许","ex":[{"l":1,"en":"My parents allow me to watch TV on weekends.","zh":"我父母允许我在周末看电视。"},{"l":2,"en":"The teacher does not allow students to use phones in class unless it is for classwork.","zh":"老师不允许学生在课堂上使用手机，除非是为了课堂任务。"},{"l":3,"en":"Only when parents allow their children enough free time can the children grow into independent and confident people.","zh":"只有当父母给孩子足够的自由时间，孩子才能成长为独立自信的人。"}]}]},{"day":2,"w":"almost","ph":"","defs":[{"pos":"adv.","m":"几乎，差不多","ex":[{"l":1,"en":"It is almost six o'clock now.","zh":"现在差不多六点了。"},{"l":2,"en":"After hours of hard work, she almost forgot that she had promised to meet her friend at the station.","zh":"辛苦工作几小时后，她几乎忘了自己答应过在车站接朋友。"},{"l":3,"en":"Almost every student in our school has taken part in at least one volunteer activity in the past year.","zh":"过去一年里，我们学校几乎每个学生都参加过至少一次志愿活动。"}]}]},{"day":2,"w":"alone","ph":"","defs":[{"pos":"adj.","m":"单独的","ex":[{"l":1,"en":"The poor boy was all alone at home.","zh":"那个可怜的男孩独自在家。"},{"l":2,"en":"Although she felt alone in the new city, she soon made some good friends at school.","zh":"虽然在这座新城市她感到孤单，但很快她就在学校交到了好朋友。"},{"l":3,"en":"It is that alone old man in the corner whom we should care about most during the cold winter.","zh":"寒冬里我们最应该关心的，正是角落里那位孤独的老人。"}]},{"pos":"adv.","m":"单独地","ex":[{"l":1,"en":"She lives alone in a small flat.","zh":"她独自住在一间小公寓里。"},{"l":2,"en":"When the parents were away, the little girl had to stay at home alone and look after herself.","zh":"父母不在时，小女孩不得不独自待在家里照顾自己。"},{"l":3,"en":"Having travelled alone for the first time, the young man learned how to solve problems without anyone's help.","zh":"第一次独自旅行后，这个年轻人学会了如何在没有任何人帮助的情况下解决问题。"}]}]},{"day":2,"w":"along","ph":"","defs":[{"pos":"prep.","m":"沿着；顺着","ex":[{"l":1,"en":"We walked along the river after dinner.","zh":"晚饭后我们沿着河散步。"},{"l":2,"en":"While we were walking along the beach, we found a strange bottle that had been washed up by the sea.","zh":"我们沿着海滩散步时，发现了一个被海水冲上来的奇怪瓶子。"},{"l":3,"en":"Walking along the quiet street, the old man thought of the days when he used to play here with his friends.","zh":"沿着安静的街道走着，老人想起了从前常和朋友们在这里玩耍的日子。"}]},{"pos":"adv.","m":"先前；和...一起；一同","ex":[{"l":1,"en":"Please bring your friend along.","zh":"请把你的朋友一起带来。"},{"l":2,"en":"Since you are going to the library, why not take your younger brother along with you?","zh":"既然你要去图书馆，为什么不带你弟弟一起去呢？"},{"l":3,"en":"Not until I arrived at the new school did I realize how much I had missed the friends who came along with me from my hometown.","zh":"直到我到了新学校，我才意识到自己有多么想念和我一同从家乡来的那些朋友。"}]}]},{"day":2,"w":"already","ph":"","defs":[{"pos":"adv.","m":"已经","ex":[{"l":1,"en":"He already has a phonograph, but he doesn't have a radio yet.","zh":"他已经有一台留声机，但还没有收音机。"},{"l":2,"en":"We thought he had just found better stones than the ones we already had.","zh":"我们原以为他只是找到了比我们已有的更好的石头。"},{"l":3,"en":"By the time the teacher arrived, the students had already finished cleaning the classroom and were waiting quietly for the lesson.","zh":"老师到达时，学生们已经打扫完教室，正安静地等着上课。"}]}]},{"day":2,"w":"also","ph":"","defs":[{"pos":"adv.","m":"也","ex":[{"l":1,"en":"The canal will also help to move water.","zh":"这条运河也将有助于输送水资源。"},{"l":2,"en":"Cartographers, also called mapmakers, study and interpret geographic information.","zh":"制图师，也被称为地图绘制者，研究和解读地理信息。"},{"l":3,"en":"Not only does the new bridge make travel faster, but it also attracts more visitors to the small town, which was almost forgotten a few years ago.","zh":"这座新桥不仅让出行变得更快捷，还吸引了更多游客来到这座几年前几乎被遗忘的小镇。"}]}]},{"day":2,"w":"although/though","ph":"","defs":[{"pos":"conj.","m":"虽然，尽管","ex":[{"l":1,"en":"Although it rained, we still went out to play.","zh":"虽然下雨了，我们还是出去玩儿了。"},{"l":2,"en":"Although she was very tired, she kept working until she finished all the homework that the teacher had given her.","zh":"虽然她很累，她还是继续工作，直到完成老师布置的所有作业。"},{"l":3,"en":"Though the task seemed impossible at first, the team did not give up; instead, they worked together so well that they finally achieved what nobody had expected.","zh":"尽管这项任务起初看起来不可能完成，团队并没有放弃；相反，他们合作得如此默契，最终实现了没有人预料到的成果。"}]}]},{"day":2,"w":"altogether","ph":"","defs":[{"pos":"adv.","m":"总共；全部地","ex":[{"l":1,"en":"There are altogether ten students in our group.","zh":"我们小组总共有十名学生。"},{"l":2,"en":"If you add up all the books on these shelves, there are altogether two hundred of them, which is more than I expected.","zh":"如果你把这些书架上的书全部加起来，总共有两百本，这比我预想的还要多。"},{"l":3,"en":"It was not altogether his fault, for the rules had been changed several times before he joined the project, leaving him little time to understand them.","zh":"这并不完全是他的错，因为在他加入项目之前规则已经被修改了好几次，让他几乎没有时间去理解它们。"}]}]},{"day":2,"w":"always","ph":"","defs":[{"pos":"adv.","m":"总是；一直；永远","ex":[{"l":1,"en":"Sometimes my father's job makes me feel unhappy and lonely because he's always very busy.","zh":"有时候爸爸的工作让我感到不开心和孤单，因为他总是很忙。"},{"l":2,"en":"She is always the first student to arrive at school because she believes that early morning is the best time to remember new words.","zh":"她总是第一个到校的学生，因为她相信清晨是记忆新单词的最佳时间。"},{"l":3,"en":"No matter how busy he is, he always finds time to read with his children, firmly believing that good habits formed in childhood will last a lifetime.","zh":"无论他多忙，他总能抽出时间和孩子们一起阅读，坚信童年养成的良好习惯将受用一生。"}]}]},{"day":2,"w":"A.M.（a.m.）","ph":"","defs":[{"pos":"","m":"上午","ex":[{"l":1,"en":"We have an English class at 9 a.m.","zh":"我们上午九点有一节英语课。"},{"l":2,"en":"The meeting will start at 10 a.m. tomorrow, so everyone should arrive at least ten minutes earlier to get ready.","zh":"会议将于明天上午十点开始，所以每个人都应至少提前十分钟到达做好准备。"},{"l":3,"en":"The flight was supposed to leave at 7 a.m., but owing to the heavy fog that covered the airport, it was delayed until late in the afternoon.","zh":"航班原定上午七点起飞，但由于大雾笼罩机场，它被推迟到了下午晚些时候。"}]}]},{"day":2,"w":"amazing","ph":"","defs":[{"pos":"adj.","m":"令人惊讶的；令人赞叹的","ex":[{"l":1,"en":"After his amazing talk, I understand why my father is busy.","zh":"在他那场精彩的演讲之后，我明白了爸爸为什么那么忙。"},{"l":2,"en":"It is amazing that such a young boy can play the piano so well that everyone in the hall stood up to clap for him.","zh":"令人惊叹的是，这么小的男孩能把钢琴弹得这么好，以至于大厅里的每个人都站起来为他鼓掌。"},{"l":3,"en":"What was truly amazing was not the score itself, but the fact that the girl had taught herself everything within only half a year.","zh":"真正令人赞叹的并不是分数本身，而是这个女孩在仅仅半年内自学了全部内容这一事实。"}]}]},{"day":2,"w":"ambition","ph":"","defs":[{"pos":"n.","m":"雄心；野心","ex":[{"l":1,"en":"His great ambition is to become a famous doctor in the future.","zh":"他远大的志向是将来成为一名著名的医生。"},{"l":2,"en":"Although many people laughed at his ambition, he never gave up and kept working hard until his dream finally came true.","zh":"虽然许多人嘲笑他的志向，但他从未放弃，一直努力，直到梦想最终成真。"},{"l":3,"en":"It was her ambition to study abroad that pushed her to get up early every morning, determined to master English before the entrance exam.","zh":"正是出国留学的志向促使她每天清晨早起，下定决心在入学考试前精通英语。"}]}]},{"day":2,"w":"America","ph":"","defs":[{"pos":"n.","m":"美国（U.S.A.)；美洲","ex":[{"l":1,"en":"America is a very big and beautiful country in the world.","zh":"美国是世界上一个很大、很美丽的国家。"},{"l":2,"en":"When he travelled to America last summer, he visited many famous cities that he had only seen in pictures before.","zh":"去年夏天他去美国旅行时，参观了许多他以前只在图片上见过的著名城市。"},{"l":3,"en":"The exchange program gave him a rare chance to experience life in America, where he improved his English and made friends from many countries.","zh":"这项交流项目给了他一个难得的机会去体验美国的生活，在那里他提高了英语水平，还结交了来自许多国家的朋友。"}]}]},{"day":2,"w":"American","ph":"","defs":[{"pos":"adj.","m":"美国的；美洲的","ex":[{"l":1,"en":"The tall boy is an American student in our class.","zh":"那个高个子男孩是我们班的一名美国学生。"},{"l":2,"en":"The American teacher who came to our school last year has taught us a lot of interesting things about his country.","zh":"去年来到我们学校的那位美国老师教了我们许多关于他国家的有趣事情。"},{"l":3,"en":"Compared with traditional American food, the dishes she cooked were far healthier, containing plenty of fresh vegetables and very little sugar.","zh":"与传统美式食物相比，她做的菜要健康得多，含有大量新鲜蔬菜和很少的糖。"}]},{"pos":"n.","m":"美国人","ex":[{"l":1,"en":"An American tourist is talking with my father in the park.","zh":"一位美国游客正在公园里和我爸爸交谈。"},{"l":2,"en":"The young American who sat next to me on the train told me many wonderful stories about his travels in China.","zh":"在火车上坐在我旁边的那位年轻的美国人给我讲了许多他在中国旅行的精彩故事。"},{"l":3,"en":"As an American, he found it rather difficult to use chopsticks at first, but with the help of his friends, he soon got used to it.","zh":"作为一个美国人，他起初觉得使用筷子相当困难，但在朋友们的帮助下，他很快就习惯了。"}]}]},{"day":3,"w":"among","ph":"","defs":[{"pos":"prep.","m":"在...中间；在三者（或三者以上）之中","ex":[{"l":1,"en":"The little girl is standing quietly among the tall trees.","zh":"那个小女孩正静静地站在高大的树丛之中。"},{"l":2,"en":"Among all the subjects we learn at school, English is the one that most students find both useful and interesting.","zh":"在我们学校学习的所有科目中，英语是大多数学生觉得既有用又有趣的那一门。"},{"l":3,"en":"Hidden among the old letters was a small photograph, which, to everyone's surprise, turned out to be the key to solving the long-standing mystery.","zh":"藏在那些旧信件之中是一张小照片，令大家惊讶的是，它竟成了解开这个长期谜团的关键。"}]}]},{"day":3,"w":"amount","ph":"","defs":[{"pos":"n.","m":"数量；总量","ex":[{"l":1,"en":"He has a large amount of money in the bank now.","zh":"他现在银行里有一大笔钱。"},{"l":2,"en":"A large amount of time has been spent on this project, but the result is still not as good as we expected.","zh":"这个项目已经花费了大量时间，但结果仍然不如我们预期的那么好。"},{"l":3,"en":"The amount of information available on the Internet is so huge that students must learn how to choose what is truly useful for their studies.","zh":"互联网上可获取的信息量如此巨大，以至于学生必须学会如何挑选对学习真正有用的内容。"}]}]},{"day":3,"w":"amusement","ph":"","defs":[{"pos":"n.","m":"娱乐；消遣；娱乐活动","ex":[{"l":1,"en":"The big park near my home is a place of amusement.","zh":"我家附近的那座大公园是一个娱乐场所。"},{"l":2,"en":"To our amusement, the little dog picked up the ball and brought it back to us just like a trained player.","zh":"令我们感到有趣的是，那只小狗把球捡起来并还给我们，就像一个受过训练的选手。"},{"l":3,"en":"The amusement park, which was built only two years ago, has already become the most popular place for families to spend their weekends together.","zh":"这座两年前才建成的游乐园，已经成为家庭一起度过周末最受欢迎的去处。"}]}]},{"day":3,"w":"amusing","ph":"","defs":[{"pos":"adj.","m":"引起乐趣的","ex":[{"l":1,"en":"The short story he told us is very amusing.","zh":"他给我们讲的那个短篇故事非常有趣。"},{"l":2,"en":"The teacher told us an amusing story that made the whole class laugh loudly, forgetting all about the tiredness of the day.","zh":"老师给我们讲了一个有趣的故事，逗得全班哈哈大笑，把一天的疲惫都忘光了。"},{"l":3,"en":"What made the speech truly amusing was not the jokes themselves, but the clever way in which the speaker connected them to his main idea.","zh":"让这场演讲真正有趣的并不是笑话本身，而是演讲者把它们与主题巧妙联系起来的方式。"}]}]},{"day":3,"w":"ancient","ph":"","defs":[{"pos":"adj.","m":"古代的；古老的","ex":[{"l":1,"en":"Last summer we visited an ancient city in China.","zh":"去年夏天我们参观了中国的一座古城。"},{"l":2,"en":"The ancient temple, which was built more than a thousand years ago, still stands quietly at the foot of the mountain.","zh":"那座一千多年前建造的古庙，依然静静地矗立在山脚下。"},{"l":3,"en":"Walking through the ancient streets, one can easily imagine how people lived hundreds of years ago, when these stone houses were first built.","zh":"走在古老的街道上，人们很容易想象几百年前人们是如何生活的，那时这些石头房子才刚刚建起。"}]}]},{"day":3,"w":"and","ph":"","defs":[{"pos":"conj.","m":"和；又；而","ex":[{"l":1,"en":"Listen and repeat.","zh":"听一听并跟着读。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番之后，我了解到负责绘制世界各地道路、山脉、海洋及其他地方的人被称为制图师。"},{"l":3,"en":"Reading widely and thinking deeply are both important habits, and only by combining them can a student truly understand the world in a meaningful way.","zh":"广泛阅读和深入思考都是重要的习惯，只有把两者结合起来，学生才能真正有意义地理解这个世界。"}]}]},{"day":3,"w":"angrily","ph":"","defs":[{"pos":"adv.","m":"生气地；愤怒地","ex":[{"l":1,"en":"Every time you were complaining angrily, I put a stone in your bag.","zh":"每次你生气地抱怨时，我都在你的袋子里放一块石头。"},{"l":2,"en":"He walked out of the room angrily because nobody had listened to his idea during the long meeting.","zh":"他生气地走出了房间，因为在漫长的会议中没有人听取他的想法。"},{"l":3,"en":"Rather than shouting angrily at his younger brother, he took a deep breath and calmly explained why what he had done was wrong.","zh":"他没有愤怒地冲弟弟大喊大叫，而是深吸一口气，平静地解释为什么他所做的事是错的。"}]}]},{"day":3,"w":"angry","ph":"","defs":[{"pos":"adj.","m":"生气的；愤怒的","ex":[{"l":1,"en":"She is very angry with me because I am late again.","zh":"她很生我的气，因为我又迟到了。"},{"l":2,"en":"My mother was angry because I had broken her favourite cup while I was cleaning the table this morning.","zh":"妈妈很生气，因为我今天早上擦桌子时把她最喜欢的杯子打碎了。"},{"l":3,"en":"What made her angry was not the mistake itself, but the fact that her friend had promised to be careful and still broke the agreement.","zh":"让她生气的并不是错误本身，而是她的朋友答应过要小心却还是违背了约定这一事实。"}]}]},{"day":3,"w":"animal","ph":"","defs":[{"pos":"n.","m":"动物","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"一些植物有自己赶走动物的方法。"},{"l":2,"en":"When an animal is under attack, it can run away or fight back.","zh":"当一只动物受到攻击时，它可以逃跑或反击。"},{"l":3,"en":"It is reported that the number of wild animals in this area has increased greatly, which shows that our efforts to protect the environment are paying off.","zh":"据报道，该地区野生动物的数量已大幅增加，这表明我们保护环境的努力正在取得成效。"}]}]},{"day":3,"w":"another","ph":"","defs":[{"pos":"adj.","m":"再一；另一；别的；不同的","ex":[{"l":1,"en":"Would you like to have another cup of hot tea?","zh":"你想再喝一杯热茶吗？"},{"l":2,"en":"Since this shirt does not fit me well, I would like to try another one before I make a final decision.","zh":"既然这件衬衫我穿不合适，我想在作最终决定之前再试另一件。"},{"l":3,"en":"Losing the match was a bitter experience, but it taught him another valuable lesson: success often comes only after one has learned how to face failure bravely.","zh":"输掉比赛是一次痛苦的经历，但它教会了他另一个宝贵的道理：成功往往只有在一个人学会勇敢面对失败之后才会到来。"}]},{"pos":"pron.","m":"另一个","ex":[{"l":1,"en":"This apple is too small. Could you give me another?","zh":"这个苹果太小了，你能再给我一个吗？"},{"l":2,"en":"If you don't like this shirt, you can choose another one from the shelf.","zh":"如果你不喜欢这件衬衫，你可以从架子上再选一件。"},{"l":3,"en":"Having failed twice, the young scientist decided to try another method that might lead to a more reliable result.","zh":"失败两次后，这位年轻的科学家决定尝试另一种可能得出更可靠结果的方法。"}]}]},{"day":3,"w":"answer","ph":"","defs":[{"pos":"n.","m":"回答；答复；答案；回（信）","ex":[{"l":1,"en":"Please give me the answer to this question.","zh":"请给我这个问题的答案。"},{"l":2,"en":"I think that the answer he gave us is completely right, because he checked it three times.","zh":"我认为他给我们的答案完全正确，因为他核对过三次。"},{"l":3,"en":"To our surprise, the answer to the problem turned out to be far more interesting than we had expected.","zh":"令我们惊讶的是，这个问题的答案远比我们预想的要有趣得多。"}]},{"pos":"v.","m":"回答；答复；回（信）","ex":[{"l":1,"en":"Can you answer my question in English?","zh":"你能用英语回答我的问题吗？"},{"l":2,"en":"When the teacher asked why he was late, he didn't know how to answer her.","zh":"当老师问他为什么迟到时，他不知道该怎么回答她。"},{"l":3,"en":"No matter how many times you call him, he never answers the phone, which makes his mother rather worried.","zh":"无论你给他打多少次电话，他从不接电话，这让他母亲相当担心。"}]}]},{"day":3,"w":"any","ph":"","defs":[{"pos":"adj.","m":"（用于疑问句、否定句、条件句）一些；什么；任何的；任一的","ex":[{"l":1,"en":"Do you have any questions about the text?","zh":"你对这篇课文有什么问题吗？"},{"l":2,"en":"If you have any difficulty with your homework, you can ask the teacher for help after class.","zh":"如果你做作业有任何困难，课后可以请老师帮忙。"},{"l":3,"en":"It is reported that there isn't any student who can solve this physics problem within five minutes.","zh":"据报道，没有任何一个学生能在五分钟内解出这道物理题。"}]},{"pos":"pron.","m":"（无论）哪一个；（无论）哪些","ex":[{"l":1,"en":"I don't like any of these pictures.","zh":"这些画我哪幅都不喜欢。"},{"l":2,"en":"You may choose any of the books on the desk, but you must return it next Monday.","zh":"你可以选桌上任何一本书，但下周一必须归还。"},{"l":3,"en":"Whichever of these summer camps you finally choose, I am sure you will learn something valuable.","zh":"无论你最终选择这些夏令营中的哪一个，我都确信你会学到有价值的东西。"}]}]},{"day":3,"w":"anybody/anyone","ph":"","defs":[{"pos":"pron.","m":"任何人；无论谁","ex":[{"l":1,"en":"Is anybody absent from class today?","zh":"今天有人没来上课吗？"},{"l":2,"en":"If anybody wants to join the swimming club, please tell me before Friday.","zh":"如果有人想加入游泳俱乐部，请在周五前告诉我。"},{"l":3,"en":"There wasn't anybody in the dark room when I came in, which made me feel a bit nervous.","zh":"我进来时黑屋子里没有任何人，这让我有点紧张。"}]}]},{"day":3,"w":"anything","ph":"","defs":[{"pos":"pron.","m":"什么事（物）；任何事（物）","ex":[{"l":1,"en":"I don’t know anything about that.","zh":"我对那件事一无所知。"},{"l":2,"en":"He pretended that he didn't know anything about the accident, but in fact he had seen it happen.","zh":"他假装对那场事故一无所知，但事实上他目睹了它的发生。"},{"l":3,"en":"Rarely does she say anything about her past, so few of us really understand what she has been through.","zh":"她极少谈论自己的过去，所以我们中很少有人真正了解她经历过什么。"}]}]},{"day":3,"w":"anywhere","ph":"","defs":[{"pos":"adv.","m":"任何地方","ex":[{"l":1,"en":"I can't find my pen anywhere.","zh":"我到处都找不到我的钢笔。"},{"l":2,"en":"Although it was raining heavily, we still wanted to go somewhere warm for the holiday.","zh":"虽然下着大雨，我们仍想去个温暖的地方度假。"},{"l":3,"en":"With the help of the new map app, you can easily find your way anywhere in this strange city.","zh":"有了新的地图应用帮忙，你能轻松找到在这座陌生城市任何地方的路。"}]}]},{"day":3,"w":"apologize","ph":"","defs":[{"pos":"v.","m":"道歉","ex":[{"l":1,"en":"You should apologize to her for being late.","zh":"你应该为迟到向她道歉。"},{"l":2,"en":"If you are wrong, you must apologize to your friend instead of staying silent.","zh":"如果你错了，你必须向朋友道歉，而不是保持沉默。"},{"l":3,"en":"Realizing that he had hurt his sister's feelings, he hurried to apologize before she got even angrier.","zh":"意识到自己伤了姐姐的感情，他赶紧在她更生气之前道了歉。"}]}]},{"day":3,"w":"appear","ph":"","defs":[{"pos":"v.","m":"出现","ex":[{"l":1,"en":"He never appeared on our school open day or at school parents' meeting.","zh":"他从没在我们学校的开放日或家长会上露面。"},{"l":2,"en":"The singer didn't appear on the stage until all the lights were turned off, which surprised everyone.","zh":"直到所有灯光熄灭，那位歌手才出现在舞台上，这让所有人都吃了一惊。"},{"l":3,"en":"It was not until the sun set that a strange ship appeared on the horizon, slowly moving toward the island.","zh":"直到日落时分，一艘陌生的船才出现在地平线上，缓缓驶向那座小岛。"}]}]},{"day":3,"w":"apple","ph":"","defs":[{"pos":"n.","m":"苹果","ex":[{"l":1,"en":"I eat an apple every morning.","zh":"我每天早上吃一个苹果。"},{"l":2,"en":"My mother told me that eating an apple a day could help keep me healthy.","zh":"妈妈告诉我，每天吃一个苹果能帮助我保持健康。"},{"l":3,"en":"The apple, which my grandfather grew in his small garden, tasted sweeter than any we had bought from the market.","zh":"爷爷在小花园里种的苹果，比我们从市场买的任何苹果都要甜。"}]}]},{"day":3,"w":"apply","ph":"","defs":[{"pos":"v.","m":"申请；应用","ex":[{"l":1,"en":"I want to apply for this job.","zh":"我想申请这份工作。"},{"l":2,"en":"She decided to apply for the volunteer program because she wanted to help others during the summer.","zh":"她决定申请这项志愿者活动，因为她想暑假期间帮助别人。"},{"l":3,"en":"Only by applying what you have learned in class to real life can you truly master a foreign language.","zh":"只有把课堂上学到的知识运用到现实生活中，你才能真正掌握一门外语。"}]}]},{"day":3,"w":"April","ph":"","defs":[{"pos":"n.","m":"四月","ex":[{"l":1,"en":"Where were you during the month of April last year?","zh":"去年四月这一个月你在哪儿？"},{"l":2,"en":"When April comes, the weather becomes warmer and the flowers in our school begin to open.","zh":"四月来临时，天气变暖，校园里的花儿开始开放。"},{"l":3,"en":"It was in April that we finally finished the long project, which had taken us almost three months.","zh":"正是在四月，我们才终于完成了那项漫长的项目，它几乎花了我们三个月时间。"}]}]},{"day":3,"w":"area","ph":"","defs":[{"pos":"n.","m":"面积；范围；地区","ex":[{"l":1,"en":"They measure land, air space, and water areas.","zh":"他们测量陆地、领空和水域面积。"},{"l":2,"en":"But our trusty GPS pulled up a map of the area and got us back on track in no time.","zh":"但我们可靠的GPS调出了该地区的地图，很快就把我们带回了正路。"},{"l":3,"en":"Covering an area of more than 200 square kilometers, the national park attracts thousands of visitors every spring.","zh":"这座国家公园占地超过两百平方公里，每年春天吸引成千上万的游客。"}]}]},{"day":3,"w":"argue","ph":"","defs":[{"pos":"v.","m":"争吵，争论","ex":[{"l":1,"en":"I had thought about arguing with the teacher about that, but I didn't have enough courage.","zh":"我本想就那件事和老师争论，但我没有足够的勇气。"},{"l":2,"en":"Although the two boys often argue with each other, they are still good friends after class.","zh":"虽然这两个男孩经常争吵，但课后他们仍是好朋友。"},{"l":3,"en":"Instead of arguing about who was right, the students sat down and calmly discussed how to solve the problem together.","zh":"学生们没有争论谁是对的，而是坐下来冷静地一起讨论如何解决这个问题。"}]}]},{"day":3,"w":"arm","ph":"","defs":[{"pos":"n.","m":"手臂","ex":[{"l":1,"en":"He broke his arm last week.","zh":"他上周摔断了手臂。"},{"l":2,"en":"The little girl held her mother's arm tightly because she was afraid of the big dog.","zh":"小女孩紧紧抓住妈妈的手臂，因为她害怕那只大狗。"},{"l":3,"en":"With a basket on her arm, the old woman walked slowly along the street toward the small shop at the corner.","zh":"老妇人臂上挎着篮子，沿着街道慢慢走向街角的小店。"}]}]},{"day":3,"w":"army","ph":"","defs":[{"pos":"n.","m":"军队","ex":[{"l":1,"en":"My brother joined the army last year.","zh":"我哥哥去年参军了。"},{"l":2,"en":"The young man dreamed of joining the army so that he could protect his country one day.","zh":"这个年轻人梦想参军，以便有朝一日能保卫祖国。"},{"l":3,"en":"It was his strong wish to join the army that made him give up the comfortable life in the city.","zh":"正是强烈的参军愿望，让他放弃了城市里舒适的生活。"}]}]},{"day":3,"w":"around","ph":"","defs":[{"pos":"adv.","m":"在周围；环绕","ex":[{"l":1,"en":"They use this information to make detailed maps of places around the globe.","zh":"他们利用这些信息制作全球各地的详细地图。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索一番后，我了解到，负责绘制世界各地道路、山脉、海洋等地图的人被称为制图师。"},{"l":3,"en":"Looking around the quiet village, we suddenly realized that we had completely lost our way in the deep mountains.","zh":"环顾这个安静的村庄，我们才突然意识到自己在深山里彻底迷了路。"}]},{"pos":"prep.","m":"在...周围","ex":[{"l":1,"en":"They use this information to make detailed maps of places around the globe.","zh":"他们利用这些信息制作全球各地的详细地图。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索一番后，我了解到，负责绘制世界各地道路、山脉、海洋等地图的人被称为制图师。"},{"l":3,"en":"Walking around the old castle, the visitors were deeply moved by the stories hidden behind every stone wall.","zh":"漫步在古堡周围，游客们被每一面石墙背后隐藏的故事深深打动。"}]}]},{"day":3,"w":"arrange","ph":"","defs":[{"pos":"v.","m":"安排；布置","ex":[{"l":1,"en":"I will arrange the meeting for you.","zh":"我会替你安排这次会议。"},{"l":2,"en":"The teacher asked us to arrange the books on the shelf before the new term began.","zh":"老师让我们在新学期开始前把书架上的书整理好。"},{"l":3,"en":"Not until everything was carefully arranged did the manager allow the guests to enter the new restaurant.","zh":"直到一切都被仔细布置妥当，经理才允许客人进入新餐厅。"}]}]},{"day":3,"w":"arrival","ph":"","defs":[{"pos":"n.","m":"到达","ex":[{"l":1,"en":"We waited for the arrival of the bus.","zh":"我们等候着公交车的到来。"},{"l":2,"en":"When she heard the arrival of her old friend, she ran to the door happily.","zh":"当她听到老朋友到达的消息时，她高兴地跑到门口。"},{"l":3,"en":"Only after the arrival of spring did the frozen river begin to flow again.","zh":"直到春天到来之后，那条冰封的河流才重新开始流淌。"}]}]},{"day":3,"w":"arrive","ph":"","defs":[{"pos":"v.","m":"达到；到达","ex":[{"l":1,"en":"We arrive at school at seven.","zh":"我们七点到校。"},{"l":2,"en":"Please call me as soon as you arrive at the airport so that I can pick you up.","zh":"请一到机场就给我打电话，以便我去接你。"},{"l":3,"en":"No matter how late they arrive at the hotel, the manager will keep a warm meal ready for them.","zh":"无论他们多晚到达酒店，经理都会为他们备好一顿热饭。"}]}]},{"day":3,"w":"art","ph":"","defs":[{"pos":"n.","m":"艺术","ex":[{"l":1,"en":"She loves modern art very much.","zh":"她非常热爱现代艺术。"},{"l":2,"en":"The museum which was built last year shows many kinds of Chinese art to visitors.","zh":"去年建成的这家博物馆向游客展示了许多种中国艺术。"},{"l":3,"en":"It is the love of art that makes his empty life full of color and hope.","zh":"正是对艺术的热爱，让他空虚的生活充满了色彩与希望。"}]}]},{"day":3,"w":"article","ph":"","defs":[{"pos":"n.","m":"文章","ex":[{"l":1,"en":"I read an interesting article today.","zh":"我今天读了一篇有趣的文章。"},{"l":2,"en":"The article that he wrote about climate change won the first prize in the school competition.","zh":"他写的那篇关于气候变化的文章在校赛中荣获一等奖。"},{"l":3,"en":"Not until I finished reading the article did I realize how serious the water problem had become.","zh":"直到读完整篇文章，我才意识到水问题已经变得多么严重。"}]}]},{"day":4,"w":"artist","ph":"","defs":[{"pos":"n.","m":"艺术家；画家","ex":[{"l":1,"en":"The young artist draws very well.","zh":"这位年轻的画家画得很好。"},{"l":2,"en":"The artist whose paintings are shown in the hall has won many international awards.","zh":"在大厅里展出画作的那位画家获得过许多国际奖项。"},{"l":3,"en":"Having traveled across the country for years, the artist finally found his own style of painting.","zh":"在全国各地游历多年后，这位画家终于找到了属于自己的绘画风格。"}]}]},{"day":4,"w":"as","ph":"","defs":[{"pos":"conj.","m":"像..（一样）；如同；因为；当..时","ex":[{"l":1,"en":"Some plants, such as the oak tree, have special ways to discourage leaf-eating animals.","zh":"一些植物，比如橡树，有特殊的方法来驱赶吃叶子的动物。"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"路易丝现年十三岁，目前正在学习中文，中文已经成为和英语一样重要的世界语言。她有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"As time goes by, she has grown as tall as her elder sister, which surprises the whole family.","zh":"随着时间的推移，她已经长得和姐姐一样高了，这让全家人都很惊讶。"}]},{"pos":"prep.","m":"作为；当作；当..时","ex":[{"l":1,"en":"Some plants, such as the oak tree, have special ways to discourage leaf-eating animals.","zh":"一些植物，比如橡树，有特殊的方法来驱赶吃叶子的动物。"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"路易丝现年十三岁，目前正在学习中文，中文已经成为和英语一样重要的世界语言。她有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"She works as a volunteer in the library because she wants to help children read more books.","zh":"她在图书馆做志愿者，因为她想帮助孩子们读更多的书。"}]},{"pos":"adv.","m":"同样地","ex":[{"l":1,"en":"Some plants, such as the oak tree, have special ways to discourage leaf-eating animals.","zh":"一些植物，比如橡树，有特殊的方法来驱赶吃叶子的动物。"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"路易丝现年十三岁，目前正在学习中文，中文已经成为和英语一样重要的世界语言。她有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"As usual, he arrived at the office earliest, having prepared everything for the morning meeting.","zh":"和往常一样，他最早到办公室，已经为晨会准备好了一切。"}]}]},{"day":4,"w":"Asia","ph":"","defs":[{"pos":"n.","m":"亚洲","ex":[{"l":1,"en":"Asia is the largest continent on earth.","zh":"亚洲是地球上最大的洲。"},{"l":2,"en":"Many countries in Asia are developing quickly because they work hard on science and technology.","zh":"亚洲的许多国家发展迅速，因为它们在科技方面十分努力。"},{"l":3,"en":"It is in Asia that more than half of the world's population lives and works every day.","zh":"正是在亚洲，世界一半以上的人口每天生活和工作。"}]}]},{"day":4,"w":"ask","ph":"","defs":[{"pos":"v.","m":"问，询问；请求，要求","ex":[{"l":1,"en":"Olivia asked her secretary if the exhibition would be held in Shanghai.","zh":"奥利维亚问她的秘书展览是否会在上海举行。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"文章二 起初，这所学校被要求关闭，校舍将不得不被出售，因为学校地处一个非常优越的位置。"},{"l":3,"en":"Having been asked to give a speech, the old teacher felt both nervous and proud at the same time.","zh":"被邀请作演讲后，这位老教师既紧张又感到自豪。"}]}]},{"day":4,"w":"assistant","ph":"","defs":[{"pos":"n.","m":"助手，助理","ex":[{"l":1,"en":"His assistant is very kind and helpful.","zh":"他的助手非常友善，乐于助人。"},{"l":2,"en":"The assistant who works in the shop told me that the shoes were on sale that day.","zh":"在那家店工作的店员告诉我，那天鞋子在打折。"},{"l":3,"en":"No matter how busy the assistant is, she always greets every customer with a warm smile.","zh":"无论这位店员有多忙，她总是用温暖的微笑迎接每一位顾客。"}]}]},{"day":4,"w":"at","ph":"","defs":[{"pos":"prep.","m":"在（几点钟）；在（某处）；（表示动作的目标和方向等）向，朝","ex":[{"l":1,"en":"Will you be here at ten o'clock tomorrow?","zh":"你明天十点钟会到这里吗？"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"路易丝现年十三岁，目前正在学习中文，中文已经成为和英语一样重要的世界语言。她有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"Looking out of the window at the falling snow, the boy suddenly felt the warmth of home.","zh":"透过窗户望着飘落的雪花，男孩忽然感受到了家的温暖。"}]}]},{"day":4,"w":"attack","ph":"","defs":[{"pos":"v.","m":"进攻，袭击","ex":[{"l":1,"en":"When an animal is under attack, it can run away or fight back.","zh":"当动物受到攻击时，它可以逃跑或反击。"},{"l":2,"en":"The police warned that the wild dog might attack anyone who walked alone in the park at night.","zh":"警察警告说，那只野狗可能会袭击夜间独自在公园里行走的人。"},{"l":3,"en":"Only when the enemy began to attack did the soldiers realize how dangerous their situation was.","zh":"直到敌人开始进攻时，士兵们才意识到他们的处境有多么危险。"}]}]},{"day":4,"w":"attend","ph":"","defs":[{"pos":"v.","m":"出席，参加","ex":[{"l":1,"en":"However, I still hope that he can attend either our school open day or school parents' meeting.","zh":"然而，我仍然希望他能参加我们的学校开放日或家长会。"},{"l":2,"en":"All the students who attended the meeting agreed that the new rule would make the school a better place.","zh":"所有参加会议的学生都同意，新规定将使学校变得更好。"},{"l":3,"en":"Not having attended the lecture yesterday, I had to borrow my friend's notes to catch up.","zh":"因为昨天没有去听讲座，我只好借朋友的笔记来补上。"}]}]},{"day":4,"w":"attention","ph":"","defs":[{"pos":"n.","m":"注意；关心","ex":[{"l":1,"en":"Please pay attention to the teacher.","zh":"请集中注意听老师讲。"},{"l":2,"en":"If you want to learn English well, you must pay attention to what the teacher says in class.","zh":"如果你想学好英语，就必须在课堂上注意听老师讲的内容。"},{"l":3,"en":"It was his careful attention to every small detail that finally led the team to success.","zh":"正是他对每一个细节的细心关注，最终引领团队走向了成功。"}]}]},{"day":4,"w":"attitude","ph":"","defs":[{"pos":"n.","m":"态度","ex":[{"l":1,"en":"Our uncle taught us one of the most important lessons in life: the power of attitude.","zh":"我们的叔叔教会了我们人生中最重要的一课：态度的力量。"},{"l":2,"en":"The teacher said that a positive attitude could help students overcome many difficulties in their studies.","zh":"老师说，积极的态度能帮助学生克服学习中的许多困难。"},{"l":3,"en":"Only those who hold a positive attitude toward failure can truly grow stronger step by step.","zh":"只有对失败保持积极态度的人，才能一步一步真正变得更强。"}]}]},{"day":4,"w":"attract","ph":"","defs":[{"pos":"v.","m":"吸引；引起","ex":[{"l":1,"en":"A lot of fans were attracted by the 13-year-old one-armed basketball player.","zh":"许多球迷被这位13岁的独臂篮球少年所吸引。"},{"l":2,"en":"The new film has attracted thousands of young people because it tells a moving story about dreams.","zh":"这部新电影吸引了成千上万的年轻人，因为它讲述了一个关于梦想的动人故事。"},{"l":3,"en":"What attracted the tourists most was the quiet beauty of the small town hidden in the mountains.","zh":"最吸引游客的，是那座藏在山中的小镇的宁静之美。"}]}]},{"day":4,"w":"attractive","ph":"","defs":[{"pos":"adj.","m":"有吸引力的","ex":[{"l":1,"en":"The shop has attractive prices.","zh":"这家店的价格很有吸引力。"},{"l":2,"en":"The attractive poster on the wall made many students want to join the swimming club at once.","zh":"墙上那张吸引人的海报让许多学生立刻想加入游泳俱乐部。"},{"l":3,"en":"Although the city is attractive to young people, the high cost of living keeps many of them away.","zh":"尽管这座城市对年轻人很有吸引力，但高昂的生活成本却让许多人望而却步。"}]}]},{"day":4,"w":"audience","ph":"","defs":[{"pos":"n.","m":"观众；听众","ex":[{"l":1,"en":"The audience clapped for a long time.","zh":"观众鼓掌了很久。"},{"l":2,"en":"The audience who came to the concert were deeply moved by the beautiful music of the piano.","zh":"来听音乐会的观众被美妙的钢琴曲深深打动。"},{"l":3,"en":"Never before had the audience seen such an exciting performance by a group of children.","zh":"观众们从未见过一群孩子带来如此精彩的表演。"}]}]},{"day":4,"w":"August","ph":"","defs":[{"pos":"n.","m":"八月","ex":[{"l":1,"en":"August is a hot month here.","zh":"八月在这里是个炎热的月份。"},{"l":2,"en":"Every August, my family travels to the beach because the weather there is cool and pleasant.","zh":"每年八月，我们一家都会去海边旅行，因为那里的天气凉爽宜人。"},{"l":3,"en":"It was in August that we finally finished the long project and enjoyed a peaceful holiday by the sea.","zh":"正是在八月，我们终于完成了那项漫长的工程，并在海边享受了一个宁静的假期。"}]}]},{"day":4,"w":"aunt","ph":"","defs":[{"pos":"n.","m":"姑；姨；伯母；舅母；婶","ex":[{"l":1,"en":"My aunt works in a hospital near our school.","zh":"我的姑姑在我们学校附近的一家医院工作。"},{"l":2,"en":"My aunt told me that she would visit us as soon as she finished her work.","zh":"我姑姑告诉我，她一完成工作就会来看我们。"},{"l":3,"en":"It was my aunt who taught me that reading widely is the key to writing well.","zh":"正是我的姑姑教会我广泛阅读是写好文章的关键。"}]}]},{"day":4,"w":"Australia","ph":"","defs":[{"pos":"n.","m":"澳洲；澳大利亚","ex":[{"l":1,"en":"Australia is famous for its lovely kangaroos.","zh":"澳大利亚以其可爱的袋鼠而闻名。"},{"l":2,"en":"Many tourists visit Australia every year because it has beautiful beaches and friendly people.","zh":"每年都有许多游客访问澳大利亚，因为它有美丽的海滩和友好的人民。"},{"l":3,"en":"Australia, which is the only country covering a whole continent, attracts millions of visitors with its unique wildlife.","zh":"澳大利亚是唯一覆盖整个大陆的国家，以其独特的野生动物吸引着数百万游客。"}]}]},{"day":4,"w":"Australian","ph":"","defs":[{"pos":"adj.","m":"澳洲的；澳大利亚的","ex":[{"l":1,"en":"I like Australian food very much.","zh":"我非常喜欢澳大利亚的食物。"},{"l":2,"en":"The Australian team won the match although they were not the strongest one.","zh":"这支澳大利亚队虽然不是最强的，但他们赢得了比赛。"},{"l":3,"en":"Not only does Australian wildlife include kangaroos, but it also attracts scientists from all over the world.","zh":"澳大利亚的野生动物不仅包括袋鼠，还吸引着来自世界各地的科学家。"}]},{"pos":"n.","m":"澳大利亚人","ex":[{"l":1,"en":"An Australian is talking with our teacher now.","zh":"一位澳大利亚人正在和我们的老师交谈。"},{"l":2,"en":"The Australian who visited our class yesterday gave us an interesting lesson.","zh":"昨天来我们班参观的那位澳大利亚人给我们上了一堂有趣的课。"},{"l":3,"en":"Only when you talk with an Australian will you understand how friendly and easygoing they are.","zh":"只有当你和一位澳大利亚人交谈时，你才会明白他们是多么友好和随和。"}]}]},{"day":4,"w":"automatic","ph":"","defs":[{"pos":"adj.","m":"自动的","ex":[{"l":1,"en":"This is an automatic door.","zh":"这是一扇自动门。"},{"l":2,"en":"The doors in the supermarket open automatically when people come near them.","zh":"超市的门在人们靠近时会自动打开。"},{"l":3,"en":"Equipped with an automatic system, the new library allows students to borrow books without waiting in line.","zh":"配备了自动系统后，新图书馆让学生无需排队就能借书。"}]}]},{"day":4,"w":"autumn","ph":"","defs":[{"pos":"n.","m":"秋天，秋季","ex":[{"l":1,"en":"Autumn is my favorite season.","zh":"秋天是我最喜欢的季节。"},{"l":2,"en":"When autumn comes, the leaves on the trees turn yellow and fall to the ground.","zh":"秋天来临时，树上的叶子变黄并落到地上。"},{"l":3,"en":"Autumn is the season when farmers feel happiest because their hard work finally pays off.","zh":"秋天是农民感到最幸福的季节，因为他们的辛勤劳动终于有了回报。"}]}]},{"day":4,"w":"available","ph":"","defs":[{"pos":"","m":"可用的；可得到的","ex":[{"l":1,"en":"The book is available in the library.","zh":"这本书在图书馆里可以借到。"},{"l":2,"en":"I want to know whether this kind of ticket is still available online.","zh":"我想知道这种票在网上是否还能买到。"},{"l":3,"en":"If you want the job, you must show that you are available whenever the company needs you.","zh":"如果你想得到这份工作，你必须表明公司随时需要你时你都能到岗。"}]}]},{"day":4,"w":"average","ph":"","defs":[{"pos":"adj.","m":"平均的；普通的","ex":[{"l":1,"en":"He is just an average student in our class.","zh":"他只是我们班一个普通的学生。"},{"l":2,"en":"The average score of our class is higher than that of last year.","zh":"我们班的平均分比去年高。"},{"l":3,"en":"Though he seems like an average boy, his effort has made him stand out among his classmates.","zh":"虽然他看起来像个普通的男孩，但他的努力使他在同学中脱颖而出。"}]},{"pos":"n.","m":"平均数","ex":[{"l":1,"en":"The average of these numbers is ten.","zh":"这些数字的平均数是十。"},{"l":2,"en":"Can you tell me how to work out the average of these test scores?","zh":"你能告诉我怎样算出这些考试成绩的平均数吗？"},{"l":3,"en":"The average of the three groups shows that regular exercise really helps students stay healthy.","zh":"这三组的平均数表明，规律的运动确实有助于学生保持健康。"}]}]},{"day":4,"w":"avoid","ph":"","defs":[{"pos":"v.","m":"避免；避开","ex":[{"l":1,"en":"You should avoid making the same mistake.","zh":"你应该避免犯同样的错误。"},{"l":2,"en":"To avoid being late, we left home earlier than usual this morning.","zh":"为了避免迟到，我们今天早上比平时更早离开了家。"},{"l":3,"en":"Only by thinking carefully before you speak can you avoid hurting the people you love.","zh":"只有开口前认真思考，你才能避免伤害你所爱的人。"}]}]},{"day":4,"w":"award","ph":"","defs":[{"pos":"n.","m":"奖品；奖励","ex":[{"l":1,"en":"He won the first award in the match.","zh":"他在比赛中获得了一等奖。"},{"l":2,"en":"The award that she received last week made her family very proud.","zh":"她上周获得的奖项让她的家人非常自豪。"},{"l":3,"en":"Never before has such a young student won the highest award in this national competition.","zh":"此前从未有过如此年轻的学生在这项全国比赛中获得最高奖项。"}]},{"pos":"v.","m":"授予","ex":[{"l":1,"en":"The school awarded him a gold medal.","zh":"学校授予他一枚金牌。"},{"l":2,"en":"The teacher awarded the prize to the student who had helped others most.","zh":"老师把奖品授予了那个最乐于助人的学生。"},{"l":3,"en":"Having been awarded the title of best volunteer, she felt that all her hard work was meaningful.","zh":"被授予最佳志愿者的称号后，她觉得所有的辛苦都是值得的。"}]}]},{"day":4,"w":"away","ph":"","defs":[{"pos":"adv.","m":"离开；远离","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"一些植物有它们自己的办法让动物远离。"},{"l":2,"en":"When an animal is under attack, it can run away or fight back.","zh":"当动物受到攻击时，它可以逃跑或反击。"},{"l":3,"en":"No matter how far you run away from your problems, they will catch up with you sooner or later.","zh":"无论你逃离问题多远，它们迟早都会追上你。"}]}]},{"day":4,"w":"awful","ph":"","defs":[{"pos":"adj.","m":"可怕的","ex":[{"l":1,"en":"The weather was awful yesterday.","zh":"昨天的天气很糟糕。"},{"l":2,"en":"It was an awful day because it rained heavily and I lost my way home.","zh":"那是糟糕的一天，因为下着大雨，我又迷了路。"},{"l":3,"en":"It was such an awful experience that I will never forget how scared I felt that night.","zh":"那是一次如此可怕的经历，我永远不会忘记那天晚上我有多害怕。"}]}]},{"day":4,"w":"baby","ph":"","defs":[{"pos":"n.","m":"婴儿","ex":[{"l":1,"en":"The baby is sleeping in the bed.","zh":"婴儿正在床上睡觉。"},{"l":2,"en":"The mother held her baby gently while she was singing a soft song.","zh":"妈妈轻轻地抱着她的婴儿，同时哼着一首轻柔的歌。"},{"l":3,"en":"Watching the baby smile, the tired mother felt that everything she had done was worthwhile.","zh":"看着婴儿微笑，疲惫的母亲觉得她所做的一切都是值得的。"}]}]},{"day":4,"w":"back","ph":"","defs":[{"pos":"adv.","m":"回（原处）；向后","ex":[{"l":1,"en":"Looking back on it, I think I shouldn't have given up the contest so easily.","zh":"回想起来，我觉得我不该那么轻易地放弃比赛。"},{"l":2,"en":"But our trusty GPS pulled up a map of the area and got us back on track in no time.","zh":"但是我们可靠的GPS调出了该地区的地图，让我们很快就回到了正轨。"},{"l":3,"en":"Looking back on those difficult days, I realize that failure is not as terrible as we once thought.","zh":"回首那些艰难的日子，我意识到失败并不像我们曾经认为的那么可怕。"}]},{"pos":"n.","m":"背后；后部；背","ex":[{"l":1,"en":"He hurt his back when he fell off the bike.","zh":"他从自行车上摔下来时伤到了背。"},{"l":2,"en":"The boy who sat at the back of the classroom was reading a storybook quietly.","zh":"坐在教室后面的男孩正在安静地看故事书。"},{"l":3,"en":"Tied to the back of the truck, the box moved with every bump on the rough road.","zh":"箱子被绑在卡车后部，随着崎岖路上每一次颠簸而晃动。"}]}]},{"day":4,"w":"background","ph":"","defs":[{"pos":"n.","m":"背景","ex":[{"l":1,"en":"Please tell me your family background.","zh":"请告诉我你的家庭背景。"},{"l":2,"en":"The photo with a beautiful background was taken by my father last summer.","zh":"这张背景很美的照片是我爸爸去年夏天拍的。"},{"l":3,"en":"Students from different cultural backgrounds can learn a great deal from each other in this international school.","zh":"在这所国际学校里，来自不同文化背景的学生能从彼此身上学到很多。"}]}]},{"day":4,"w":"bad","ph":"","defs":[{"pos":"adj.","m":"坏的；有害的；不利的；糟糕，可惜；严重的","ex":[{"l":1,"en":"If these problems aren't solved well, they may bring bad results.","zh":"如果这些问题得不到妥善解决，它们可能会带来不良后果。"},{"l":2,"en":"Eating too much fast food is a bad habit that can seriously harm our health.","zh":"吃太多快餐是一个坏习惯，会严重损害我们的健康。"},{"l":3,"en":"It is bad manners to talk loudly in the library while others are reading quietly.","zh":"别人在安静阅读时，在图书馆里大声喧哗是不礼貌的。"}]}]},{"day":4,"w":"bag","ph":"","defs":[{"pos":"n.","m":"书包；提包；带子","ex":[{"l":1,"en":"You carry them in your mind just like those stones in bags.","zh":"你把它们装在心里，就像那些装在袋子里的石头一样。"},{"l":2,"en":"The whole day we walked around the countryside, and every now and then, my uncle put stones in our bags.","zh":"我们一整天都在乡间漫步，我的叔叔不时地把石头放进我们的袋子里。"},{"l":3,"en":"Filled with books and bottles, the heavy bag on her back made every step feel harder than the last.","zh":"装满书本和水壶，她背上沉重的书包让每一步都感觉比上一步更艰难。"}]}]},{"day":5,"w":"bakery","ph":"","defs":[{"pos":"n.","m":"面包店","ex":[{"l":1,"en":"There is a new bakery near my home.","zh":"我家附近有一家新面包店。"},{"l":2,"en":"The bakery that opened last week sells the best bread in our town.","zh":"上周开业的那家面包店卖着我们镇上最好的面包。"},{"l":3,"en":"Not only does the small bakery offer freshly baked bread every morning, but it also attracts customers from neighboring cities who are eager to taste its unique cakes.","zh":"这家小面包店不仅每天早上供应现烤的面包，还吸引了邻近城市的顾客前来品尝它独特的蛋糕。"}]}]},{"day":5,"w":"balance","ph":"","defs":[{"pos":"n.","m":"平衡","ex":[{"l":1,"en":"You must keep a balance between work and rest.","zh":"你必须在工作与休息之间保持平衡。"},{"l":2,"en":"It is important to keep a balance between study and exercise so that we can stay healthy.","zh":"在学习和锻炼之间保持平衡很重要，这样我们才能保持健康。"},{"l":3,"en":"Only by finding a proper balance between his schoolwork and hobbies did the boy manage to enjoy a fulfilling and happy life.","zh":"只有在学业和爱好之间找到恰当的平衡，这个男孩才得以享受充实而快乐的生活。"}]}]},{"day":5,"w":"ball","ph":"","defs":[{"pos":"n.","m":"球","ex":[{"l":1,"en":"The boy is playing with a ball in the park.","zh":"那个男孩正在公园里玩球。"},{"l":2,"en":"The children were playing with a ball when it suddenly began to rain heavily.","zh":"孩子们正在玩球，这时突然下起了大雨。"},{"l":3,"en":"The moment the boy kicked the ball into the goal, the crowd cheered loudly, realizing that their team had finally won the match.","zh":"男孩把球踢进球门的那一刻，人群大声欢呼起来，意识到他们的球队终于赢得了比赛。"}]}]},{"day":5,"w":"balloon","ph":"","defs":[{"pos":"n.","m":"气球","ex":[{"l":1,"en":"The red balloon flies into the sky.","zh":"那只红色的气球飞上了天空。"},{"l":2,"en":"The little girl held a balloon which her father had bought her at the fair.","zh":"小女孩拿着一个气球，那是她爸爸在集市上给她买的。"},{"l":3,"en":"Watching the colorful balloon rise slowly into the sky, the children felt so excited that they kept jumping and shouting with joy.","zh":"看着彩色的气球缓缓升入天空，孩子们激动得不停地蹦跳欢呼。"}]}]},{"day":5,"w":"banana","ph":"","defs":[{"pos":"n.","m":"香蕉","ex":[{"l":1,"en":"I eat a banana every morning.","zh":"我每天早上吃一根香蕉。"},{"l":2,"en":"Monkeys like eating bananas, and they often climb trees to find them.","zh":"猴子喜欢吃香蕉，它们经常爬树去找香蕉。"},{"l":3,"en":"Rich in vitamins and easy to carry, the banana has become one of the most popular fruits among students who need quick energy before exams.","zh":"香蕉富含维生素且便于携带，已成为需要在考试前快速补充能量的学生中最受欢迎的水果之一。"}]}]},{"day":5,"w":"bank","ph":"","defs":[{"pos":"n.","m":"银行","ex":[{"l":1,"en":"My mother works in a bank.","zh":"我妈妈在一家银行工作。"},{"l":2,"en":"The bank where my father works is located in the center of the city.","zh":"我父亲工作的那家银行位于市中心。"},{"l":3,"en":"Having saved money for three years, the old man finally went to the bank to open an account for his grandson's future education.","zh":"攒了三年钱之后，这位老人终于去银行为孙子的未来教育开了一个账户。"}]}]},{"day":5,"w":"bar","ph":"","defs":[{"pos":"n.","m":"酒吧","ex":[{"l":1,"en":"We met at a small bar last night.","zh":"我们昨晚在一家小酒吧见面。"},{"l":2,"en":"There is a quiet bar near the station where people can relax after work.","zh":"车站附近有一家安静的酒吧，人们下班后可以在那里放松。"},{"l":3,"en":"Seldom does he go to the bar, but when he does, he always orders a glass of juice and chats with his old friends until midnight.","zh":"他很少去酒吧，但一旦去了，他总要点一杯果汁，和老朋友聊天直到午夜。"}]}]},{"day":5,"w":"base","ph":"","defs":[{"pos":"n.","m":"根据地；基地；基础","ex":[{"l":1,"en":"They built a base on the island.","zh":"他们在岛上建了一个基地。"},{"l":2,"en":"Trust is the base of any good friendship, without which people cannot get along well.","zh":"信任是任何良好友谊的基础，没有它人们就无法好好相处。"},{"l":3,"en":"Based on solid scientific research, the new theory has laid a firm base for future studies in this field.","zh":"这项新理论建立在严谨的科学研究之上，为该领域的未来研究奠定了坚实的基础。"}]}]},{"day":5,"w":"basic","ph":"","defs":[{"pos":"adj.","m":"基本的；基础的","ex":[{"l":1,"en":"These are the basic rules of the game.","zh":"这些是这项比赛的基本规则。"},{"l":2,"en":"Reading and writing are basic skills that every student must master in primary school.","zh":"阅读和写作是每个学生在小学阶段必须掌握的基本技能。"},{"l":3,"en":"Not until he had mastered the basic grammar did he realize how important a solid foundation is for learning English well.","zh":"直到掌握了基本语法，他才意识到扎实的基础对学好英语有多重要。"}]}]},{"day":5,"w":"basket","ph":"","defs":[{"pos":"n.","m":"篮子","ex":[{"l":1,"en":"She put the apples in a basket.","zh":"她把苹果放进了一个篮子里。"},{"l":2,"en":"The basket full of eggs was so heavy that the old woman could hardly carry it.","zh":"装满鸡蛋的篮子太重了，那位老妇人几乎提不动。"},{"l":3,"en":"Carrying a basket loaded with fresh vegetables, the farmer walked along the narrow path, hoping to sell them at the morning market.","zh":"这位农夫提着装满新鲜蔬菜的篮子，沿着狭窄的小路走着，希望能把它们在早市上卖掉。"}]}]},{"day":5,"w":"basketball","ph":"","defs":[{"pos":"n.","m":"篮球","ex":[{"l":1,"en":"A lot of fans were attracted by the 13-year-old one-armed basketball player.","zh":"许多球迷被这位十三岁的独臂篮球运动员所吸引。"},{"l":2,"en":"The basketball player who broke his arm last year has returned to the court and won the match.","zh":"去年手臂骨折的那位篮球运动员已经重返球场并赢得了比赛。"},{"l":3,"en":"Having practiced basketball for over ten years, the young player finally realized his dream of joining the national team, which made his family e
