y","ph":"","defs":[{"pos":"n.","m":"日记；日记簿","ex":[{"l":1,"en":"I write my diary every evening.","zh":"我每天晚上写日记。"},{"l":2,"en":"Keeping a diary in English is a good habit because it can help you improve both your writing and your thinking.","zh":"用英语记日记是一个好习惯，因为它能帮助你同时提高写作和思考能力。"},{"l":3,"en":"Looking back at the diary she had kept since primary school, the girl realized how much she had grown over the years.","zh":"回顾自己从小学起就坚持写的日记，这个女孩意识到这些年来她成长了多少。"}]}]},{"day":15,"w":"dictionary","ph":"","defs":[{"pos":"n.","m":"词典，字典","ex":[{"l":1,"en":"I bought a new English dictionary yesterday.","zh":"我昨天买了一本新英语词典。"},{"l":2,"en":"When you meet a new word while reading, you can look it up in the dictionary instead of asking others at once.","zh":"当你在阅读时遇到生词，你可以查词典，而不是立刻问别人。"},{"l":3,"en":"A good dictionary is not only a tool that tells you the meaning of a word, but also a teacher that shows you how to use it correctly.","zh":"一本好词典不仅是告诉你单词意思的工具，还是教你如何正确使用它的老师。"}]}]},{"day":15,"w":"die","ph":"","defs":[{"pos":"v.","m":"死","ex":[{"l":1,"en":"Plants will die without water.","zh":"没有水植物会枯死。"},{"l":2,"en":"The old man felt very sad when he heard that his best friend had died of a serious illness.","zh":"当这位老人听说他最好的朋友死于一场重病时，他感到非常难过。"},{"l":3,"en":"Even though the famous writer died many years ago, the books he left behind still encourage young people to chase their dreams.","zh":"尽管这位著名作家多年前就去世了，他留下的书仍然鼓励年轻人去追寻梦想。"}]}]},{"day":15,"w":"diet","ph":"","defs":[{"pos":"n.","m":"饮食；食谱；食物","ex":[{"l":1,"en":"A healthy diet is good for us.","zh":"健康的饮食对我们有益。"},{"l":2,"en":"Doctors say that a balanced diet can help children grow taller and stay away from many kinds of illnesses.","zh":"医生说均衡的饮食能帮助孩子长得更高，并远离许多疾病。"},{"l":3,"en":"Only when you keep a proper diet and take enough exercise can you stay healthy in the busy school life.","zh":"只有保持合理的饮食并做足够的锻炼，你才能在忙碌的学校生活中保持健康。"}]}]},{"day":15,"w":"difference","ph":"","defs":[{"pos":"n.","m":"不同","ex":[{"l":1,"en":"Can you tell the difference between them?","zh":"你能说出它们之间的不同吗？"},{"l":2,"en":"There is a big difference between spoken English and written English, so you should practice both of them often.","zh":"英语口语和书面语之间有很大差异，所以你应该经常练习这两者。"},{"l":3,"en":"What makes the real difference between two students is not how clever they are, but how hard they work every single day.","zh":"真正决定两个学生之间差距的，不是他们有多聪明，而是他们每一天有多努力。"}]}]},{"day":15,"w":"different","ph":"","defs":[{"pos":"adj.","m":"不同的，有差异的","ex":[{"l":1,"en":"To do their work, cartographers put together information from many different places.","zh":"为了完成工作，制图师把来自许多不同地方的信息汇集在一起。"},{"l":2,"en":"My first reason is that experiences make us different as we grow.","zh":"我的第一个理由是，经历让我们在成长过程中变得与众不同。"},{"l":3,"en":"Children from different backgrounds may think in different ways, yet they can still learn from one another when they study together.","zh":"来自不同背景的孩子可能用不同的方式思考，然而当他们一起学习时，仍然可以互相学习。"}]}]},{"day":15,"w":"difficult","ph":"","defs":[{"pos":"adj.","m":"困难的；费力的","ex":[{"l":1,"en":"To be honest, being a child of a fireman can be difficult.","zh":"说实话，做消防员的孩子可能会很不容易。"},{"l":2,"en":"They have thick and hard leaves that are difficult for animals to eat.","zh":"它们有又厚又硬的叶子，动物很难吃下。"},{"l":3,"en":"Difficult as the task was, the young student managed to finish it before the deadline with the help of his teachers.","zh":"尽管这项任务很困难，这位年轻学生在老师们的帮助下还是在截止日期前完成了它。"}]}]},{"day":15,"w":"difficulty","ph":"","defs":[{"pos":"n.","m":"困难","ex":[{"l":1,"en":"No matter how many difficulties we came across, we considered them as chances for us to improve.","zh":"无论我们遇到多少困难，我们都把它们看作是我们提升的机会。"},{"l":2,"en":"Although we met with many difficulties at first, we finally worked out a plan that satisfied everyone.","zh":"尽管我们起初遇到许多困难，但最终制定出了一个人人满意的计划。"},{"l":3,"en":"Only by facing difficulties bravely can we realize what we are truly capable of achieving.","zh":"只有勇敢地面对困难，我们才能认识到自己真正有能力取得什么成就。"}]}]},{"day":15,"w":"dig","ph":"","defs":[{"pos":"v.","m":"挖，掘","ex":[{"l":1,"en":"The children like to dig holes in the sand.","zh":"孩子们喜欢在沙子里挖洞。"},{"l":2,"en":"When spring comes, the farmers begin to dig the field so that they can plant vegetables.","zh":"春天到来时，农民们开始翻挖田地，以便种植蔬菜。"},{"l":3,"en":"It was the old man who spent the whole morning digging a well to provide water for the village.","zh":"正是那位老人花了整整一个上午挖了一口井，为村子提供水源。"}]}]},{"day":15,"w":"dinner","ph":"","defs":[{"pos":"n.","m":"正餐","ex":[{"l":1,"en":"Why not meet at 5:30 to have dinner first?","zh":"为什么不5点半先见面吃晚饭呢？"},{"l":2,"en":"After we finished the meeting, my family had dinner together and talked about the interesting trip.","zh":"开完会后，我们一家人一起吃了晚饭，并谈论了那次有趣的旅行。"},{"l":3,"en":"Not until mother called us did we stop playing and sit down to enjoy a warm family dinner.","zh":"直到妈妈喊我们，我们才停止玩耍，坐下来享用一顿温馨的家庭晚餐。"}]}]},{"day":15,"w":"direction","ph":"","defs":[{"pos":"n.","m":"方向；趋势；用法说明","ex":[{"l":1,"en":"Please tell me the direction of the railway station.","zh":"请告诉我去火车站的方向。"},{"l":2,"en":"If you read the directions carefully, you will know how to use the new machine without difficulty.","zh":"如果你仔细阅读使用说明，你就能毫不困难地知道如何使用这台新机器。"},{"l":3,"en":"Driven by a strong interest in science, the young student decided to follow a new direction in his research.","zh":"在强烈科学兴趣的驱使下，这位年轻学生决定在研究中走一个新的方向。"}]}]},{"day":15,"w":"directly","ph":"","defs":[{"pos":"adv.","m":"直接地","ex":[{"l":1,"en":"Please speak directly to the teacher.","zh":"请直接跟老师说。"},{"l":2,"en":"When the problem happened, she went directly to the manager so that it could be solved quickly.","zh":"问题发生时，她直接去找经理，以便问题能被迅速解决。"},{"l":3,"en":"What surprised me most was that the boy answered all the difficult questions directly and correctly.","zh":"最令我吃惊的是，那个男孩直接而又正确地回答了所有难题。"}]}]},{"day":15,"w":"director","ph":"","defs":[{"pos":"n.","m":"导演","ex":[{"l":1,"en":"The director of the film is very famous.","zh":"这部电影的导演非常出名。"},{"l":2,"en":"The director who made this popular film told us that patience was the key to success.","zh":"制作这部流行电影的导演告诉我们，耐心是成功的关键。"},{"l":3,"en":"It is the young director whose works have won several prizes that we invited to give a talk today.","zh":"我们今天邀请来作报告的，正是其作品数次获奖的那位年轻导演。"}]}]},{"day":15,"w":"dirty","ph":"","defs":[{"pos":"adj.","m":"脏的","ex":[{"l":1,"en":"Your hands are very dirty. Please wash them.","zh":"你的手很脏。请把它们洗干净。"},{"l":2,"en":"Because the room was so dirty, mother asked us to clean it before the guests arrived.","zh":"因为房间太脏了，妈妈让我们在客人到来前打扫干净。"},{"l":3,"en":"Dirty as the river once was, it has now become a clean home for many kinds of fish.","zh":"尽管这条河曾经很脏，如今它已成为许多鱼类的洁净家园。"}]}]},{"day":15,"w":"disabled","ph":"","defs":[{"pos":"n.","m":"残疾人士；伤残者","ex":[{"l":1,"en":"We should help the disabled in our daily life.","zh":"我们应该在日常生活中帮助残疾人。"},{"l":2,"en":"The school built special paths so that the disabled could enter the building easily and safely.","zh":"学校修建了专门的通道，以便残疾人能够轻松安全地进入大楼。"},{"l":3,"en":"Only when the disabled are treated with respect can our society truly be called a caring one.","zh":"只有当残疾人受到尊重时，我们的社会才能真正称得上是一个有爱心的社会。"}]},{"pos":"adj.","m":"丧失能力的；有残疾的；无能力的","ex":[{"l":1,"en":"The disabled boy can still play basketball well.","zh":"那个有残疾的男孩仍然能把篮球打得很好。"},{"l":2,"en":"Although he became disabled after the accident, he never gave up his dream of becoming a doctor.","zh":"尽管他在事故后变成了残疾人，但他从未放弃当医生的梦想。"},{"l":3,"en":"Inspired by his disabled classmate, Tom decided to start a club to help people in need.","zh":"受他那位有残疾的同学的激励，汤姆决定创办一个社团来帮助需要帮助的人。"}]}]},{"day":15,"w":"disadvantage","ph":"","defs":[{"pos":"n.","m":"不利，劣势；短处","ex":[{"l":1,"en":"The disadvantage of this plan is the high cost.","zh":"这个计划的劣势是成本高。"},{"l":2,"en":"Living in a big city has many advantages, but the disadvantage is that the air is often polluted.","zh":"住在大城市有很多好处，但劣势是空气常常被污染。"},{"l":3,"en":"Every coin has two sides, and the main disadvantage of online learning is the lack of face-to-face communication.","zh":"凡事皆有两面，网络学习的主要劣势是缺少面对面的交流。"}]}]},{"day":15,"w":"disappear","ph":"","defs":[{"pos":"v.","m":"消失，不见","ex":[{"l":1,"en":"The sun disappeared behind the cloud.","zh":"太阳消失在云层后面。"},{"l":2,"en":"When the teacher came into the classroom, the noise disappeared at once and everyone became quiet.","zh":"当老师走进教室时，吵闹声立刻消失，大家都安静下来。"},{"l":3,"en":"Many old traditions are disappearing simply because young people show little interest in them.","zh":"许多古老的传统正在消失，仅仅是因为年轻人对它们没什么兴趣。"}]}]},{"day":15,"w":"disappointed","ph":"","defs":[{"pos":"adj.","m":"失望的，沮丧的","ex":[{"l":1,"en":"I was very disappointed with the result.","zh":"我对这个结果感到很失望。"},{"l":2,"en":"Although he was disappointed at first, he soon cheered up and decided to try again.","zh":"虽然他起初很失望，但很快又振作起来，决定再试一次。"},{"l":3,"en":"Disappointed as the players were, they still shook hands with the winners and showed true sportsmanship.","zh":"尽管选手们很失望，他们仍然与获胜者握手，展现了真正的体育精神。"}]}]},{"day":15,"w":"disaster","ph":"","defs":[{"pos":"n.","m":"灾难；灾祸","ex":[{"l":1,"en":"The flood was a terrible disaster.","zh":"那场洪水是一场可怕的灾难。"},{"l":2,"en":"When the earthquake happened, thousands of volunteers rushed to help the people who suffered from the disaster.","zh":"地震发生时，数千名志愿者赶去帮助遭受灾难的人们。"},{"l":3,"en":"Only after the disaster did people deeply realize how important it is to protect the environment.","zh":"直到灾难过后，人们才深刻认识到保护环境是多么重要。"}]}]},{"day":15,"w":"discover","ph":"","defs":[{"pos":"v.","m":"发现；看出","ex":[{"l":1,"en":"I discovered a small bird in the tree.","zh":"我在树上发现了一只小鸟。"},{"l":2,"en":"Scientists have discovered that this kind of plant can grow well even in very cold weather.","zh":"科学家们已经发现，这种植物即使在很冷的天气里也能长得很好。"},{"l":3,"en":"It was in this old library that the young reader discovered a book which changed his whole life.","zh":"正是在这座旧图书馆里，这位年轻读者发现了一本改变他一生的书。"}]}]},{"day":15,"w":"discuss","ph":"","defs":[{"pos":"v.","m":"讨论；议论","ex":[{"l":1,"en":"We will discuss the problem tomorrow.","zh":"我们明天将讨论这个问题。"},{"l":2,"en":"Before we make a decision, we should discuss the plan carefully so that everyone agrees on it.","zh":"在做决定之前，我们应该仔细讨论这个计划，以便大家都能赞同。"},{"l":3,"en":"What the students discussed most warmly was how to balance study and hobbies in the new term.","zh":"学生们讨论得最热烈的是如何在新学期平衡学习与爱好。"}]}]},{"day":15,"w":"discussion","ph":"","defs":[{"pos":"n.","m":"讨论","ex":[{"l":1,"en":"We had a long discussion in class.","zh":"我们在课堂上进行了长时间的讨论。"},{"l":2,"en":"After a heated discussion, the students finally agreed that the trip should be put off until next week.","zh":"经过激烈的讨论后，学生们最终同意把旅行推迟到下周。"},{"l":3,"en":"The discussion held yesterday made it clear that most parents support the new reading program.","zh":"昨天举行的讨论清楚地表明，大多数家长支持这项新的阅读计划。"}]}]},{"day":15,"w":"dish","ph":"","defs":[{"pos":"n.","m":"盘，碟；盘装菜；盘形物","ex":[{"l":1,"en":"Please pass me that dish.","zh":"请把那盘菜递给我。"},{"l":2,"en":"My mother cooked several delicious dishes which all the guests enjoyed very much at the party.","zh":"我妈妈做了几道美味的菜，所有客人在聚会上都非常喜欢。"},{"l":3,"en":"Considered the most famous dish in our town, the roast duck attracts visitors from many different places.","zh":"烤鸭被视为我们镇上最有名的菜，吸引着来自许多不同地方的游客。"}]}]},{"day":15,"w":"dishonest","ph":"","defs":[{"pos":"adj.","m":"不诚实的，欺骗性的","ex":[{"l":1,"en":"It is dishonest to tell a lie.","zh":"撒谎是不诚实的。"},{"l":2,"en":"If a student is dishonest in an exam, he will lose the trust of both teachers and classmates.","zh":"如果一个学生在考试中不诚实，他就会失去老师和同学的信任。"},{"l":3,"en":"Dishonest as the salesman seemed, few customers realized they had been cheated until much later.","zh":"尽管那个推销员看起来不诚实，但很少有顾客意识到自己被骗，直到很久以后。"}]}]},{"day":15,"w":"dislike","ph":"","defs":[{"pos":"vt.","m":"不喜欢；厌恶","ex":[{"l":1,"en":"I dislike cold weather.","zh":"我不喜欢寒冷的天气。"},{"l":2,"en":"Even though some children dislike vegetables, parents should encourage them to eat more for their health.","zh":"即使有些孩子不喜欢蔬菜，父母也应该为了他们的健康鼓励他们多吃。"},{"l":3,"en":"What the boy dislikes most is being asked the same question again and again by careless people.","zh":"这个男孩最讨厌的，是被粗心的人一遍又一遍地问同一个问题。"}]}]},{"day":15,"w":"distance","ph":"","defs":[{"pos":"n.","m":"距离","ex":[{"l":1,"en":"The distance from my home to school is two kilometres.","zh":"从我家到学校的距离是两公里。"},{"l":2,"en":"No matter how great the distance is, true friends will always keep in touch with each other.","zh":"无论距离有多远，真正的朋友总会彼此保持联系。"},{"l":3,"en":"Only in this way can we shorten the distance between people from completely different cultures.","zh":"只有这样，我们才能缩短来自完全不同文化背景的人们之间的距离。"}]}]},{"day":15,"w":"disturb","ph":"","defs":[{"pos":"v.","m":"扰乱；打扰","ex":[{"l":1,"en":"Lily asked her son to close the door softly in order not to disturb others.","zh":"莉莉让儿子轻轻关门，以免打扰别人。"},{"l":2,"en":"Please turn down the TV because the loud noise will disturb the neighbours who are taking a rest.","zh":"请把电视音量调低，因为巨大的噪音会打扰正在休息的邻居们。"},{"l":3,"en":"Not until the baby fell asleep did the mother dare to close the window, afraid that even a slight sound might disturb him.","zh":"直到婴儿睡着，母亲才敢关窗，她担心哪怕一丝声响也会打扰到他。"}]}]},{"day":15,"w":"divide","ph":"","defs":[{"pos":"v.","m":"分，划分；除","ex":[{"l":1,"en":"The teacher divided the class into four groups.","zh":"老师把全班分成了四个小组。"},{"l":2,"en":"We divided the cake equally so that every child could get a piece of the same size.","zh":"我们把蛋糕平均分开，这样每个孩子都能得到一块同样大小的。"},{"l":3,"en":"When you divide twelve by three, you will find it equals four, which is the basic rule we should remember.","zh":"当你用十二除以三时，你会发现结果等于四，这是我们应当记住的基本规则。"}]}]},{"day":15,"w":"do","ph":"","defs":[{"pos":"v.","m":"做，干","ex":[{"l":1,"en":"Do you understand?","zh":"你明白了吗？"},{"l":2,"en":"Try to do regular sports.The mind needs exercise as well as the body.","zh":"尽量坚持做规律的运动，大脑和身体一样需要锻炼。"},{"l":3,"en":"Only when you do what you have promised can you win the trust of the people around you.","zh":"只有当你兑现了自己的承诺，你才能赢得身边人的信任。"}]}]},{"day":16,"w":"doctor","ph":"","defs":[{"pos":"n.","m":"医生","ex":[{"l":1,"en":"Julia made up her mind to be a doctor after watching the news programme.","zh":"朱莉娅在看完那档新闻节目后，下定决心要当一名医生。"},{"l":2,"en":"According to the family doctor,Louise will live to at least130.Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易丝至少能活到一百三十岁，她的心愿是再工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"It is the doctor who saved my grandfather that I will never forget, for his kindness lit up our whole family.","zh":"我永远不会忘记那位救过我爷爷的医生，因为他的善良照亮了我们全家。"}]}]},{"day":16,"w":"dog","ph":"","defs":[{"pos":"n.","m":"狗","ex":[{"l":1,"en":"The dog is sleeping under the tree.","zh":"那条狗正在树下睡觉。"},{"l":2,"en":"The dog that we adopted last year has become the best friend of the whole family.","zh":"我们去年收养的那条狗已经成了全家最好的朋友。"},{"l":3,"en":"Hardly had the boy opened the door when his dog rushed out, wagging its tail with great joy.","zh":"男孩刚一开门，他的狗就冲了出去，开心地摇着尾巴。"}]}]},{"day":16,"w":"dollar","ph":"","defs":[{"pos":"n.","m":"元","ex":[{"l":1,"en":"The book costs five dollars.","zh":"这本书五美元。"},{"l":2,"en":"He saved every dollar he earned so that he could buy a new computer for his studies.","zh":"他把挣到的每一美元都攒起来，以便能为学习买一台新电脑。"},{"l":3,"en":"What surprised us most was that the old watch turned out to be worth thousands of dollars after careful checking.","zh":"最令我们惊讶的是，经过仔细鉴定，那块旧表竟然价值数千美元。"}]}]},{"day":16,"w":"door","ph":"","defs":[{"pos":"n.","m":"门；通道","ex":[{"l":1,"en":"Where’s the door?","zh":"门在哪里？"},{"l":2,"en":"Lily asked her son to close the door softly in order not to disturb others.","zh":"莉莉让儿子轻轻关门，以免打扰别人。"},{"l":3,"en":"As soon as he opened the door, a strong wind blew in, which made all the papers fly into the air.","zh":"他一打开门，一股强风就吹了进来，把所有纸张都卷到了空中。"}]}]},{"day":16,"w":"double","ph":"","defs":[{"pos":"adj.","m":"两倍的；双的","ex":[{"l":1,"en":"I need a double room for tonight.","zh":"我今晚需要一间双人房。"},{"l":2,"en":"Since the price of the tickets is double what it was last year, we have to think twice before buying them.","zh":"由于票价是去年的两倍，我们在购买前不得不三思。"},{"l":3,"en":"It was the double effort he had made that finally helped him win the first prize in the English contest.","zh":"正是他所付出的加倍努力，最终帮助他在英语竞赛中获得了一等奖。"}]}]},{"day":16,"w":"down","ph":"","defs":[{"pos":"prep.","m":"沿着，沿...而下","ex":[{"l":1,"en":"Sit down.","zh":"坐下。"},{"l":2,"en":"The children walked down the street happily, talking and laughing all the way to the park.","zh":"孩子们沿着街道快乐地走着，一路说笑着去公园。"},{"l":3,"en":"Walking down the river on a sunny morning, I felt that all my worries had been washed away by the gentle wind.","zh":"在一个阳光明媚的早晨沿着河走，我觉得所有的烦恼都被微风吹散了。"}]},{"pos":"adv.","m":"向下","ex":[{"l":1,"en":"Sit down.","zh":"坐下。"},{"l":2,"en":"He looked down at his shoes and found that they were covered with mud after the heavy rain.","zh":"他低头看了看鞋子，发现大雨过后鞋子上满是泥巴。"},{"l":3,"en":"Tears rolling down her cheeks, the girl said in a low voice that she would never give up her dream.","zh":"泪水顺着脸颊流下，女孩低声说她绝不会放弃自己的梦想。"}]}]},{"day":16,"w":"download","ph":"","defs":[{"pos":"v.","m":"下载","ex":[{"l":1,"en":"You can download this song for free.","zh":"你可以免费下载这首歌。"},{"l":2,"en":"Before you download the app, you should make sure that it is safe for your phone.","zh":"在下载这个应用之前，你应该确认它对你的手机是安全的。"},{"l":3,"en":"Not only can students download useful materials from the website, but they can also share their own ideas with others.","zh":"学生们不仅可以从网站上下载有用的资料，还能与他人分享自己的想法。"}]}]},{"day":16,"w":"downstairs","ph":"","defs":[{"pos":"adv.","m":"在楼下；到楼下","ex":[{"l":1,"en":"He went downstairs to get some water.","zh":"他下楼去拿些水。"},{"l":2,"en":"When I heard a strange noise downstairs, I quickly called my father who was working in the study.","zh":"当我听到楼下有奇怪的声响时，我赶紧打电话给正在书房工作的爸爸。"},{"l":3,"en":"Hurrying downstairs, the little boy was surprised to find that his grandparents had prepared a big birthday cake for him.","zh":"小男孩匆忙下楼，惊讶地发现爷爷奶奶为他准备了一个大生日蛋糕。"}]}]},{"day":16,"w":"draw","ph":"","defs":[{"pos":"v.","m":"绘画；绘制；拉，拖","ex":[{"l":1,"en":"She likes to draw pictures of flowers.","zh":"她喜欢画花的图画。"},{"l":2,"en":"The girl who is drawing under the tree wants to become a famous artist when she grows up.","zh":"正在树下画画的那个女孩长大后想成为一名著名的艺术家。"},{"l":3,"en":"It is said that the painter spent three years drawing this picture, which shows the beauty of his hometown.","zh":"据说这位画家花了三年时间才画完这幅画，它展现了家乡之美。"}]}]},{"day":16,"w":"dream","ph":"","defs":[{"pos":"n.&v.","m":"梦；梦想","ex":[{"l":1,"en":"I had a strange dream last night.","zh":"我昨晚做了一个奇怪的梦。"},{"l":2,"en":"Although he failed many times, he never gave up his dream of becoming a scientist.","zh":"虽然他失败了许多次，但他从未放弃成为科学家的梦想。"},{"l":3,"en":"Only those who dare to dream of a better future will have the courage to work hard for it day and night.","zh":"只有那些敢于梦想美好未来的人，才有勇气为之日夜奋斗。"}]}]},{"day":16,"w":"dress","ph":"","defs":[{"pos":"n.","m":"女装，连衣裙；（统称）服装；童装","ex":[{"l":1,"en":"She is wearing a beautiful red dress.","zh":"她穿着一条漂亮的红色连衣裙。"},{"l":2,"en":"The dress that my mother bought me is too long, so I have to ask the tailor to make it shorter.","zh":"妈妈给我买的那条裙子太长了，所以我得请裁缝把它改短。"},{"l":3,"en":"Never before has she worn such an elegant dress, which made her the centre of attention at the party.","zh":"她以前从未穿过如此优雅的裙子，这使她成了晚会上众人瞩目的焦点。"}]},{"pos":"v.","m":"穿衣；穿着","ex":[{"l":1,"en":"The boy can dress himself now.","zh":"这个男孩现在能自己穿衣服了。"},{"l":2,"en":"Please dress the baby warmly before you take him out, because it is very cold outside.","zh":"带宝宝出门前请给他穿暖和些，因为外面非常冷。"},{"l":3,"en":"Dressed in a white shirt, the young man walked confidently onto the stage and began his speech.","zh":"那个年轻人身穿白衬衫，自信地走上舞台，开始了他的演讲。"}]}]},{"day":16,"w":"drink","ph":"","defs":[{"pos":"v.","m":"喝；饮","ex":[{"l":1,"en":"I want to drink a cup of tea.","zh":"我想喝一杯茶。"},{"l":2,"en":"After running for an hour, he was so thirsty that he drank three bottles of water at once.","zh":"跑了一个小时后，他渴得一口气喝了三瓶水。"},{"l":3,"en":"It is important for us to drink enough water every day, which helps keep our bodies working well.","zh":"我们每天喝足够的水很重要，这有助于保持身体正常运转。"}]},{"pos":"n.","m":"饮料；喝酒","ex":[{"l":1,"en":"Can I have a cold drink?","zh":"我能要一杯冷饮吗？"},{"l":2,"en":"The drink that she made with fresh fruits tastes much better than the one sold in the shop.","zh":"她用新鲜水果做的那杯饮料，比店里卖的喝起来好喝得多。"},{"l":3,"en":"What I like most about summer is the cool drink my mother prepares when I come back home tired.","zh":"关于夏天我最喜欢的，是当我疲惫回家时妈妈准备的清凉饮料。"}]}]},{"day":16,"w":"drive","ph":"","defs":[{"pos":"v.","m":"驾驶，开（车）；驱赶","ex":[{"l":1,"en":"My father can drive a car.","zh":"我爸爸会开汽车。"},{"l":2,"en":"You must not drive after drinking, because it is both dangerous and against the law.","zh":"酒后绝不能开车，因为这既危险又违法。"},{"l":3,"en":"Only by driving carefully can we protect ourselves and others from terrible accidents on the road.","zh":"只有谨慎驾驶，我们才能保护自己和他人免受路上可怕的交通事故。"}]}]},{"day":16,"w":"driver","ph":"","defs":[{"pos":"n.","m":"司机，驾驶员","ex":[{"l":1,"en":"The bus driver is very kind.","zh":"那位公交车司机很和善。"},{"l":2,"en":"The taxi driver who helped the old lady find her way home was praised by everyone in the city.","zh":"帮助老奶奶找到回家路的出租车司机受到了全城人的称赞。"},{"l":3,"en":"It was the young driver that saved all the passengers, risking his own life to stop the bus safely.","zh":"正是那位年轻的司机救了所有乘客，他冒着生命危险把车安全停了下来。"}]}]},{"day":16,"w":"drop","ph":"","defs":[{"pos":"n.","m":"滴","ex":[{"l":1,"en":"A drop of water fell on my book.","zh":"一滴水落在了我的书上。"},{"l":2,"en":"After the heavy rain, every drop of water on the leaves shone brightly in the morning sun.","zh":"大雨过后,树叶上的每一滴水在晨光中都闪闪发光。"},{"l":3,"en":"Even a single drop of water wasted each day adds up to a surprising amount over a whole year, which is why we must form the habit of saving water early in life.","zh":"每天哪怕只浪费一滴水,整整一年累积下来数量也十分惊人,因此我们必须从小养成节约用水的习惯。"}]},{"pos":"v.","m":"掉下，落下；扔掉；放弃；下降","ex":[{"l":1,"en":"Be careful, or you will drop the glass.","zh":"小心点,否则你会把玻璃杯掉在地上。"},{"l":2,"en":"If you drop the plan now, all the work we have done this week will be wasted.","zh":"如果你现在放弃这个计划,我们这一周所做的全部工作都会白费。"},{"l":3,"en":"Not until the price dropped to half did I finally decide to buy the book that I had been longing for since last term.","zh":"直到价格降到一半,我才最终决定买下那本我从上学期起就一直渴望得到的书。"}]}]},{"day":16,"w":"dry","ph":"","defs":[{"pos":"adj.","m":"干的；干燥的","ex":[{"l":1,"en":"The river becomes dry in summer.","zh":"这条河在夏天会变干。"},{"l":2,"en":"The flowers will die soon if the soil stays dry for too many days.","zh":"如果土壤长时间保持干燥,这些花很快就会枯死。"},{"l":3,"en":"After two months of dry weather, the farmers had to find new ways to keep their crops alive until the autumn rain finally arrived.","zh":"经过两个月的干燥天气后,农民们不得不寻找新办法让庄稼存活下去,直到秋雨最终降临。"}]}]},{"day":16,"w":"duck","ph":"","defs":[{"pos":"n.","m":"鸭子","ex":[{"l":1,"en":"The duck is swimming in the lake.","zh":"那只鸭子正在湖里游泳。"},{"l":2,"en":"The little duck that we saved last week has grown much bigger and stronger.","zh":"我们上周救下的那只小鸭子已经长得更大更强壮了。"},{"l":3,"en":"To our surprise, the wild duck returned to our garden every spring, as if it had decided to treat this small pond as its real home.","zh":"令我们惊讶的是,那只野鸭每年春天都会回到我们的花园,仿佛它已经决定把这个小池塘当作真正的家。"}]}]},{"day":16,"w":"dull","ph":"","defs":[{"pos":"adj.","m":"单调无味的","ex":[{"l":1,"en":"The book is very dull and I feel sleepy.","zh":"这本书很无聊,我感到困倦。"},{"l":2,"en":"I used to find history dull, but now I think it is full of interesting stories.","zh":"我过去觉得历史很乏味,但现在我认为它充满了有趣的故事。"},{"l":3,"en":"Only when the teacher added lively games and group discussions did the dull lesson finally become attractive to every student in the class.","zh":"只有当老师加入了生动的游戏和小组讨论后,那堂乏味的课才终于吸引了班上的每一个学生。"}]}]},{"day":16,"w":"during","ph":"","defs":[{"pos":"prep.","m":"在..的期间；在..过程中","ex":[{"l":1,"en":"Where were you during the month of April last year?","zh":"去年四月那个月你在哪里?"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次研学旅行中遇到了一些少年,现在我仍和他们保持联系,但我几乎记不得旅行期间买了什么。"},{"l":3,"en":"It was during those cold winter months that I truly understood how much my grandparents had sacrificed to raise the whole family.","zh":"正是在那些寒冷的冬日里,我才真正理解了祖父母为了抚养整个家庭付出了多少。"}]}]},{"day":16,"w":"duty","ph":"","defs":[{"pos":"n.","m":"责任","ex":[{"l":1,"en":"It is our duty to clean the classroom.","zh":"打扫教室是我们的责任。"},{"l":2,"en":"As a monitor, I think it is my duty to help every classmate with their study.","zh":"作为班长,我认为帮助每位同学学习是我的责任。"},{"l":3,"en":"Deep in his heart, he always believed that doing one's duty was far more important than winning praise or prizes from others.","zh":"在他内心深处,他始终认为尽好自己的责任远比赢得他人的称赞或奖品更重要。"}]}]},{"day":16,"w":"each","ph":"","defs":[{"pos":"adj.&pron.","m":"每人；每个；每件","ex":[{"l":1,"en":"I enjoyed the time we shared snacks with each other during the break time.","zh":"我很享受课间我们彼此分享零食的时光。"},{"l":2,"en":"It was really wonderful to chat with each other and enjoy food at the same time.","zh":"一边彼此聊天,一边品尝美食,真是太美妙了。"},{"l":3,"en":"Each time we faced a difficult problem, we chose to listen to each other patiently rather than argue, and that was the real secret of our success.","zh":"每次遇到难题,我们都选择耐心地倾听彼此而不是争吵,那才是我们成功的真正秘诀。"}]}]},{"day":16,"w":"eager","ph":"","defs":[{"pos":"adj.","m":"渴望的，热切的","ex":[{"l":1,"en":"The children are eager to open their gifts.","zh":"孩子们迫不及待地想打开礼物。"},{"l":2,"en":"She is so eager to join the club that she has practised singing every day this week.","zh":"她是如此渴望加入俱乐部,以至于这周每天都练习唱歌。"},{"l":3,"en":"So eager were the students to share their ideas that nearly every hand went up the moment the teacher finished asking the question.","zh":"学生们如此急切地想分享自己的想法,以至于老师刚一问完问题,几乎每只手都举了起来。"}]}]},{"day":16,"w":"ear","ph":"","defs":[{"pos":"n.","m":"耳朵","ex":[{"l":1,"en":"The rabbit has long ears.","zh":"这只兔子有长长的耳朵。"},{"l":2,"en":"Cover your ears when the noise outside becomes too loud for you to bear.","zh":"当外面的噪音大得让你无法忍受时,请捂住你的耳朵。"},{"l":3,"en":"Whenever the old man heard that familiar song, a warm feeling would rise in his heart and music seemed to fill his ears with memories of childhood.","zh":"每当老人听到那首熟悉的歌,心头就会涌起一股暖意,音乐仿佛用童年的回忆填满了他的双耳。"}]}]},{"day":16,"w":"early","ph":"","defs":[{"pos":"adj.","m":"早的","ex":[{"l":1,"en":"One morning, we left early and this time our uncle had bought us backpacks.","zh":"一天早晨,我们早早出发,这一次叔叔给我们买了背包。"},{"l":2,"en":"Catching the early bus allowed us to reach the museum before most of the other visitors arrived.","zh":"赶上早班车让我们能在大多数其他游客到达之前抵达博物馆。"},{"l":3,"en":"It was in the early years of primary school that she developed a strong love for reading, a habit that has stayed with her ever since.","zh":"正是在小学早期,她培养了对阅读的强烈热爱,这个习惯从此一直伴随着她。"}]},{"pos":"adv.","m":"早地","ex":[{"l":1,"en":"One morning, we left early and this time our uncle had bought us backpacks.","zh":"一天早晨,我们早早出发,这一次叔叔给我们买了背包。"},{"l":2,"en":"If you get up early enough, you will have plenty of time to review your lessons before breakfast.","zh":"如果你起得足够早,就有充足的时间在早餐前复习功课。"},{"l":3,"en":"Only by arriving early at the station did we manage to get seats together, since the train was already packed with passengers heading home for the holiday.","zh":"只有早早赶到车站,我们才得以坐在一起,因为火车上已经挤满了回家过节旅客。"}]}]},{"day":16,"w":"earth","ph":"","defs":[{"pos":"n.","m":"地球；土；泥；大地","ex":[{"l":1,"en":"The earth goes around the sun.","zh":"地球绕着太阳转。"},{"l":2,"en":"We must protect the earth so that our children can still see blue skies and clean rivers.","zh":"我们必须保护地球,这样我们的孩子才能继续看到蓝天和清澈的河流。"},{"l":3,"en":"It is high time that we took action to protect the earth, for the harm we have done to nature is beginning to return to us in many worrying ways.","zh":"该是我们采取行动保护地球的时候了,因为我们对自然造成的伤害正开始以许多令人担忧的方式回到我们自己身上。"}]}]},{"day":16,"w":"earthquake","ph":"","defs":[{"pos":"n.","m":"地震","ex":[{"l":1,"en":"A big earthquake hit the city last night.","zh":"昨晚一场大地震袭击了这座城市。"},{"l":2,"en":"When the earthquake happened, people quickly ran out of their houses to find a safe place.","zh":"地震发生时,人们迅速跑出房屋去寻找安全的地方。"},{"l":3,"en":"It was the earthquake that completely changed the small town, yet the warm help from all over the country gave the local people new hope to rebuild their homes.","zh":"正是那场地震彻底改变了这座小镇,然而来自全国各地的温暖帮助给了当地人重建家园的新希望。"}]}]},{"day":16,"w":"easily","ph":"","defs":[{"pos":"adv.","m":"容易地","ex":[{"l":1,"en":"Looking back on it, I think I shouldn't have given up the contest so easily.","zh":"回想起来,我觉得我不该那么轻易就放弃比赛。"},{"l":2,"en":"Once you form a good habit, you will find that learning English is not as easily forgotten as you thought.","zh":"一旦养成好习惯,你会发现学英语并不像你想象的那样容易忘记。"},{"l":3,"en":"Never before had the team won a match so easily, which made everyone wonder whether their hard training of the whole winter had finally paid off.","zh":"这支队伍以前从未如此轻松地赢下一场比赛,这让每个人都想知道,他们整个冬天的刻苦训练是否终于得到了回报。"}]}]},{"day":16,"w":"east","ph":"","defs":[{"pos":"adj.","m":"东方的；东部的","ex":[{"l":1,"en":"He lives on the east coast of the country.","zh":"他住在这个国家的东海岸。"},{"l":2,"en":"The east wind brings warm and wet air to our city in early spring every year.","zh":"每年早春,东风给我们的城市带来温暖湿润的空气。"},{"l":3,"en":"Unlike the dry and cold north, the east part of the province enjoys plenty of rain, which makes it suitable for growing rice and fresh vegetables.","zh":"与干燥寒冷的北方不同,该省的东部雨水充沛,这使它适合种植水稻和新鲜蔬菜。"}]},{"pos":"n.","m":"东；东方；东部","ex":[{"l":1,"en":"The sun rises in the east.","zh":"太阳从东方升起。"},{"l":2,"en":"If you walk towards the east for ten minutes, you will see the post office on your right.","zh":"如果你朝东走十分钟,就会看到邮局在你的右边。"},{"l":3,"en":"It was from the east that the first light of dawn slowly spread across the sky, telling the sleepy village that a brand-new day had begun.","zh":"第一缕曙光正是从东方缓缓漫过天空,告诉这座沉睡的村庄一个崭新的一天已经开始。"}]}]},{"day":16,"w":"easy","ph":"","defs":[{"pos":"adj.","m":"容易的；不费力的","ex":[{"l":1,"en":"It is not easy to beat a robot player in a chess game.","zh":"在国际象棋比赛中打败机器人选手并不容易。"},{"l":2,"en":"This is because the lower leaves are easier for most animals to reach.","zh":"这是因为较低的叶子对大多数动物来说更容易够到。"},{"l":3,"en":"What seemed an easy task at first turned out to be rather difficult, which taught me never to judge anything before giving it a real try.","zh":"起初看似简单的任务结果却相当困难,这教会我在真正尝试之前绝不要随意评判任何事。"}]}]},{"day":16,"w":"eat","ph":"","defs":[{"pos":"v.","m":"吃","ex":[{"l":1,"en":"It was so salty that no one wanted to eat it.","zh":"它太咸了,没有人想吃。"},{"l":2,"en":"They have thick and hard leaves that are difficult for animals to eat.","zh":"它们有又厚又硬的叶子,动物很难吃掉。"},{"l":3,"en":"Only after we sat down at the table did I realize how hungry I was, for I had eaten nothing since the early morning and the smell of the food was simply too inviting.","zh":"直到我们在桌边坐下,我才意识到自己有多饿,因为从清晨起我就什么都没吃,而食物的香气实在太过诱人。"}]}]},{"day":17,"w":"economy","ph":"","defs":[{"pos":"n.","m":"经济","ex":[{"l":1,"en":"The economy of the city is growing fast.","zh":"这座城市的经济增长很快。"},{"l":2,"en":"Tourism has helped the local economy a lot since the new railway was opened.","zh":"自新铁路开通以来,旅游业对当地经济帮助很大。"},{"l":3,"en":"It is generally believed that a strong economy depends not only on natural resources but also on the education and creativity of its young people.","zh":"人们普遍认为,强大的经济不仅依赖于自然资源,也依赖于年轻人的教育和创造力。"}]}]},{"day":17,"w":"education","ph":"","defs":[{"pos":"n.","m":"教育","ex":[{"l":1,"en":"Education is very important to every child.","zh":"教育对每个孩子都非常重要。"},{"l":2,"en":"Good education not only helps students gain knowledge but also teaches them how to become better people.","zh":"良好的教育不仅帮助学生获取知识，还教会他们如何成为更好的人。"},{"l":3,"en":"Only when every child receives quality education can a country hope to achieve real progress in the future.","zh":"只有当每个孩子都接受优质教育时，一个国家才有希望在未来取得真正的进步。"}]}]},{"day":17,"w":"educational","ph":"","defs":[{"pos":"adj.","m":"教育的","ex":[{"l":1,"en":"This is an educational TV program for kids.","zh":"这是一个为孩子设计的教育类电视节目。"},{"l":2,"en":"The museum offers many educational activities which help students learn history in an interesting way.","zh":"这家博物馆提供许多教育活动，帮助学生以有趣的方式学习历史。"},{"l":3,"en":"Watching educational videos is helpful, but we should never forget that reading books remains the most effective way to learn.","zh":"观看教育视频是有帮助的，但我们绝不能忘记读书仍然是最有效的学习方式。"}]}]},{"day":17,"w":"effect","ph":"","defs":[{"pos":"n.","m":"效果","ex":[{"l":1,"en":"The medicine has a good effect on him.","zh":"这药对他有很好的效果。"},{"l":2,"en":"Although the new rule has some bad effects at first, most people begin to accept it after a few weeks.","zh":"虽然新规定起初有一些不良影响，但几周后大多数人开始接受它。"},{"l":3,"en":"It is the effect of these small daily habits that decides whether a student will finally succeed in the exam.","zh":"正是这些日常小习惯的影响，决定了一个学生最终能否在考试中取得成功。"}]}]},{"day":17,"w":"effective","ph":"","defs":[{"pos":"adj.","m":"产生预期结果的；有效的","ex":[{"l":1,"en":"This is an effective way to learn English.","zh":"这是一个学习英语的有效方法。"},{"l":2,"en":"Doing exercises every day is more effective than studying for hours only before the exam.","zh":"每天做练习比只在考试前学习几个小时更有效。"},{"l":3,"en":"Compared with reading once, taking notes while reading proves to be a far more effective method of remembering new words.","zh":"与只读一遍相比，边读边记笔记被证明是记住生词更为有效得多的方法。"}]}]},{"day":17,"w":"effort","ph":"","defs":[{"pos":"n.","m":"精力，努力","ex":[{"l":1,"en":"He made a great effort to pass the exam.","zh":"他为了通过考试付出了很大努力。"},{"l":2,"en":"Through years of effort, the young man finally realized his dream of becoming a doctor.","zh":"经过多年的努力，这个年轻人终于实现了成为医生的梦想。"},{"l":3,"en":"It is your effort, rather than your talent, that will finally decide how far you can go in life.","zh":"最终决定你在人生中能走多远的，是你的努力而不是你的天赋。"}]}]},{"day":17,"w":"egg","ph":"","defs":[{"pos":"n.","m":"蛋；卵","ex":[{"l":1,"en":"I had an egg and some milk this morning.","zh":"今天早上我吃了一个鸡蛋，喝了些牛奶。"},{"l":2,"en":"My mother told me that eating an egg every day is good for my health.","zh":"妈妈告诉我，每天吃一个鸡蛋对我的健康有好处。"},{"l":3,"en":"Not until I read the book did I realize that an egg contains almost all the nutrients a growing child needs.","zh":"直到读了那本书，我才意识到一个鸡蛋几乎含有成长中孩子所需的全部营养。"}]}]},{"day":17,"w":"either","ph":"","defs":[{"pos":"adj.","m":"两方任一方的；二者之一的","ex":[{"l":1,"en":"Those men aren't students, either.","zh":"那些人也不是学生。"},{"l":2,"en":"However, I still hope that he can attend either our school open day or school parents' meeting.","zh":"然而，我仍然希望他能参加我们学校的开放日或家长会。"},{"l":3,"en":"Either you finish the project on time, or you will lose the chance to join the summer camp.","zh":"要么你按时完成这个项目，要么你将失去参加夏令营的机会。"}]},{"pos":"pron.","m":"二者之一；要么","ex":[{"l":1,"en":"Those men aren't students, either.","zh":"那些人也不是学生。"},{"l":2,"en":"However, I still hope that he can attend either our school open day or school parents' meeting.","zh":"然而，我仍然希望他能参加我们学校的开放日或家长会。"},{"l":3,"en":"There are two books on the desk, but I do not think either of them is what you need.","zh":"桌上有两本书，但我认为两本都不是你需要的。"}]},{"pos":"adv.","m":"也（不）","ex":[{"l":1,"en":"Those men aren't students, either.","zh":"那些人也不是学生。"},{"l":2,"en":"However, I still hope that he can attend either our school open day or school parents' meeting.","zh":"然而，我仍然希望他能参加我们学校的开放日或家长会。"},{"l":3,"en":"If you do not go to the meeting, I will not go either, because we should always act as a team.","zh":"如果你不去参加会议，我也不去，因为我们应该始终作为一个团队行动。"}]}]},{"day":17,"w":"elder","ph":"","defs":[{"pos":"adj.","m":"年龄较大的；前辈的","ex":[{"l":1,"en":"My elder brother is a teacher.","zh":"我的哥哥是一名老师。"},{"l":2,"en":"As the elder child in the family, she always helps her parents take care of her little brother.","zh":"作为家里的长女，她总是帮父母照顾弟弟。"},{"l":3,"en":"It is often the elder members of a family who pass down valuable traditions to the younger generation.","zh":"把宝贵的传统传承给年轻一代的，往往是一个家庭中年长的成员。"}]}]},{"day":17,"w":"electric","ph":"","defs":[{"pos":"adj.","m":"电的","ex":[{"l":1,"en":"For example, people should remember to turn off electric items like TV sets and air conditioners when they are not used.","zh":"例如，人们应该记得在不使用时关掉电视机和空调等电器。"},{"l":2,"en":"This electric car runs quietly and does not pollute the air, so it is becoming more and more popular in big cities.","zh":"这辆电动车行驶安静且不污染空气，因此在大城市越来越受欢迎。"},{"l":3,"en":"Only by using electric products wisely can we both save energy and protect the environment at the same time.","zh":"只有明智地使用电器产品，我们才能同时节约能源并保护环境。"}]}]},{"day":17,"w":"electricity","ph":"","defs":[{"pos":"n.","m":"电","ex":[{"l":1,"en":"We use electricity every day.","zh":"我们每天都用电。"},{"l":2,"en":"We should save electricity because it not only costs money but also helps protect the environment.","zh":"我们应该节约用电，因为这不仅能省钱，还有助于保护环境。"},{"l":3,"en":"Were it not for electricity, our modern life would completely stop and many daily tasks would become impossible.","zh":"要不是有电，我们的现代生活将完全停滞，许多日常事务也将变得不可能。"}]}]},{"day":17,"w":"elementary","ph":"","defs":[{"pos":"adj.","m":"初级的；基本的","ex":[{"l":1,"en":"He studies at an elementary school.","zh":"他在一所小学读书。"},{"l":2,"en":"Even a child in elementary school can understand that we should be kind to others.","zh":"即使是小学生也能理解我们应该对他人友善。"},{"l":3,"en":"Mastering elementary skills is the foundation upon which all further learning must be built.","zh":"掌握基础技能，是一切后续学习赖以建立的基础。"}]}]},{"day":17,"w":"elephant","ph":"","defs":[{"pos":"n.","m":"大象","ex":[{"l":1,"en":"The elephant is very big and strong.","zh":"这头大象又大又壮。"},{"l":2,"en":"The elephant which we saw at the zoo yesterday came from Africa.","zh":"我们昨天在动物园看到的那头大象来自非洲。"},{"l":3,"en":"Not only is the elephant the largest land animal, but it is also known for its surprising memory and intelligence.","zh":"大象不仅是最大的陆地动物，还以惊人的记忆力和智慧而闻名。"}]}]},{"day":17,"w":"else","ph":"","defs":[{"pos":"adv.","m":"另外，其他","ex":[{"l":1,"en":"Let's talk about something else.","zh":"我们来谈点别的吧。"},{"l":2,"en":"Since nobody else knows the answer, you had better ask the teacher for help right now.","zh":"既然没有别人知道答案，你最好现在就去向老师求助。"},{"l":3,"en":"Little else matters in life than having a few true friends who will stand by you in difficult times.","zh":"生活中除了拥有几个在困难时刻与你并肩的真心朋友，其他几乎都不重要。"}]}]},{"day":17,"w":"e-mail","ph":"","defs":[{"pos":"n.","m":"电子邮件","ex":[{"l":1,"en":"I got an e-mail from my friend today.","zh":"我今天收到了朋友的一封电子邮件。"},{"l":2,"en":"Please reply to my e-mail as soon as possible so that I can finish the report before Friday.","zh":"请尽快回复我的电子邮件，以便我能在周五前完成报告。"},{"l":3,"en":"It is said that more than a thousand e-mails are sent every second around the world.","zh":"据说全世界每秒钟发送的电子邮件超过一千封。"}]},{"pos":"v.","m":"发电子邮件","ex":[{"l":1,"en":"I will e-mail you tomorrow.","zh":"我明天会给你发电子邮件。"},{"l":2,"en":"I will e-mail the photos to you as soon as I arrive home this evening.","zh":"今晚我一到家就会把这些照片通过电子邮件发给你。"},{"l":3,"en":"Having e-mailed the report to the manager, she finally allowed herself a short rest.","zh":"把报告通过电子邮件发给经理之后，她终于让自己短暂休息了一下。"}]}]},{"day":17,"w":"embarrassed","ph":"","defs":[{"pos":"adj.","m":"局促不安的；为难的；尴尬的；窘迫的","ex":[{"l":1,"en":"He felt embarrassed when he fell down.","zh":"他摔倒时感到很尴尬。"},{"l":2,"en":"She looked embarrassed because she did not know how to answer the question that the teacher asked.","zh":"她显得很尴尬，因为她不知道如何回答老师问的那个问题。"},{"l":3,"en":"Embarrassed as he was, the boy still gathered enough courage to admit his mistake in front of the whole class.","zh":"尽管很尴尬，这个男孩还是鼓足了勇气在全班同学面前承认自己的错误。"}]}]},{"day":17,"w":"emergency","ph":"","defs":[{"pos":"n.","m":"紧急情况；突发事件","ex":[{"l":1,"en":"Call 120 in an emergency.","zh":"遇到紧急情况请拨打120。"},{"l":2,"en":"When an emergency happens, we should keep calm and call the police for help at once.","zh":"当紧急情况发生时，我们应该保持冷静并立即报警求助。"},{"l":3,"en":"Only after realizing how serious the emergency was did the manager decide to call the police at once.","zh":"直到意识到这起紧急事件有多严重，经理才决定立即报警。"}]}]},{"day":17,"w":"empty","ph":"","defs":[{"pos":"adj.","m":"空的","ex":[{"l":1,"en":"The bottle is empty.","zh":"这个瓶子是空的。"},{"l":2,"en":"When I opened the fridge, I found that it was almost empty and there was nothing to eat.","zh":"我打开冰箱时，发现里面几乎是空的，什么吃的都没有。"},{"l":3,"en":"Empty as the room looked, it was once filled with laughter and happy memories of my childhood.","zh":"尽管这间屋子看上去空荡荡的，它曾经充满了我童年时的欢声笑语和美好回忆。"}]}]},{"day":17,"w":"enable","ph":"","defs":[{"pos":"v.","m":"使...有能力,使...能够","ex":[{"l":1,"en":"The new tool helps us work faster.","zh":"这个新工具帮助我们更快地工作。"},{"l":2,"en":"Reading every day will enable you to understand more difficult articles in the future.","zh":"每天阅读将使你能够理解未来更难的文章。"},{"l":3,"en":"Only by mastering basic skills well can this app enable students to solve problems that once seemed impossible to handle.","zh":"只有把基础技能掌握好，这款应用才能让学生解决那些曾经看似无法处理的问题。"}]}]},{"day":17,"w":"encourage","ph":"","defs":[{"pos":"v.","m":"鼓励","ex":[{"l":1,"en":"My teacher often encourages me to try new things.","zh":"我的老师经常鼓励我尝试新事物。"},{"l":2,"en":"Our parents always encourage us to keep working hard so that we can achieve our dreams in the end.","zh":"我们的父母总是鼓励我们继续努力，以便我们最终能够实现梦想。"},{"l":3,"en":"What the coach said at the meeting encouraged the whole team to believe that real confidence comes from honest effort rather than from luck.","zh":"教练在会上所说的话鼓励了整个队伍相信：真正的自信来自踏实的努力，而非运气。"}]}]},{"day":17,"w":"end","ph":"","defs":[{"pos":"n.","m":"末尾；终点；结束","ex":[{"l":1,"en":"Success belongs to hardworking students in the end.","zh":"成功最终属于勤奋的学生。"},{"l":2,"en":"And some said they couldn't wait for the project to be finally completed at the end of this year.","zh":"有些人说他们迫不及待地希望这项工程在今年年底最终完工。"},{"l":3,"en":"At the end of the long journey, the students realised that the real reward was not the prize but the friends they had made along the way.","zh":"在这段漫长旅途的终点，学生们意识到真正的回报不是奖品，而是一路上结识的朋友。"}]},{"pos":"v.","m":"结束，终止","ex":[{"l":1,"en":"The meeting will end at five o'clock.","zh":"会议将在五点结束。"},{"l":2,"en":"When the rain finally ended, the children ran out to play in the wet garden happily.","zh":"当雨终于停下时，孩子们高兴地跑到潮湿的花园里玩耍。"},{"l":3,"en":"Not until the concert ended did the audience realise how quickly the wonderful evening had passed.","zh":"直到音乐会结束，观众们才意识到这个美妙的夜晚过得有多快。"}]}]},{"day":17,"w":"enemy","ph":"","defs":[{"pos":"n.","m":"敌人，敌军","ex":[{"l":1,"en":"Laziness is the enemy of success.","zh":"懒惰是成功的大敌。"},{"l":2,"en":"In the story, the clever boy defeats his enemy by using wisdom instead of strength.","zh":"在故事里，聪明的男孩用智慧而非力量击败了他的敌人。"},{"l":3,"en":"Fear is often considered the greatest enemy of progress, for it prevents us from taking the first step toward change.","zh":"恐惧常被视为进步的最大敌人，因为它阻止我们迈出走向改变的第一步。"}]}]},{"day":17,"w":"energy","ph":"","defs":[{"pos":"n.","m":"精力；能量","ex":[{"l":1,"en":"The boy has enough energy to play all day.","zh":"这个男孩有足够的精力玩上一整天。"},{"l":2,"en":"Although she has been working for ten hours, she still has enough energy to look after her little brother.","zh":"虽然她已经工作了十个小时，她仍然有足够的精力照顾弟弟。"},{"l":3,"en":"It is widely believed that spending time in nature can give people fresh energy to face the challenges of busy modern life.","zh":"人们普遍认为，亲近自然能给人带来新鲜的精力去面对忙碌现代生活的挑战。"}]}]},{"day":17,"w":"engine","ph":"","defs":[{"pos":"n.","m":"发动机，引擎","ex":[{"l":1,"en":"The car engine makes a strange noise.","zh":"汽车发动机发出奇怪的声响。"},{"l":2,"en":"When the engine suddenly stopped working, the driver had to park the bus by the side of the road.","zh":"当发动机突然停止运转时，司机只好把公共汽车停在路边。"},{"l":3,"en":"It was the small engine that the young inventor designed himself which finally helped the plane fly higher than anyone had expected.","zh":"正是这位年轻发明家亲自设计的小型发动机，最终帮助飞机飞得比任何人预期的都更高。"}]}]},{"day":17,"w":"engineer","ph":"","defs":[{"pos":"n.","m":"工程师；技师","ex":[{"l":1,"en":"The engineer promised to finish the task as soon as possible.","zh":"这位工程师承诺尽快完成这项任务。"},{"l":2,"en":"The engineer who designed the bridge told us that the project would be completed before the rainy season began.","zh":"设计这座桥的工程师告诉我们，工程将在雨季开始前完工。"},{"l":3,"en":"Having worked on the machine for months, the young engineer finally found a way to make it run more quietly and save more power.","zh":"在这台机器上工作了数月之后，这位年轻工程师终于找到了让它运转更安静、更省电的方法。"}]}]},{"day":17,"w":"England","ph":"","defs":[{"pos":"n.","m":"英格兰","ex":[{"l":1,"en":"London is the capital of England.","zh":"伦敦是英格兰的首都。"},{"l":2,"en":"When my cousin studied in England last year, she learned a lot about its history and customs.","zh":"去年我表姐在英格兰学习时，了解了许多关于其历史和习俗的知识。"},{"l":3,"en":"It was in a small town in England that the writer found the inspiration for the novel which later became famous around the world.","zh":"正是在英格兰的一个小镇上，这位作家找到了后来闻名世界的那部小说的灵感。"}]}]},{"day":17,"w":"English","ph":"","defs":[{"pos":"adj.","m":"英国的；英国人的；英语的","ex":[{"l":1,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"这个中学生能用英语讲中国传统故事吗？"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"露易丝今年十三岁，目前正在学习汉语，汉语已成为与英语同样重要的世界语言。露易丝有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"Reading English stories every morning is a habit that, according to many teachers, can greatly improve both your vocabulary and your sense of the language.","zh":"每天早上阅读英语故事是许多老师认为能极大提升你词汇量和语感的习惯。"}]},{"pos":"n.","m":"英语；英国人","ex":[{"l":1,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"这个中学生能用英语讲中国传统故事吗？"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"露易丝今年十三岁，目前正在学习汉语，汉语已成为与英语同样重要的世界语言。露易丝有许多中国朋友，他们通过电脑交流。"},{"l":3,"en":"What I have learned from this exchange is that English is not only a subject to pass but also a bridge that connects people from different cultures.","zh":"我从这次交流中学到的是：英语不仅是一门要考过的科目，更是连接不同文化之间人们的一座桥梁。"}]}]},{"day":17,"w":"enjoy","ph":"","defs":[{"pos":"v.","m":"欣赏；享受；喜欢","ex":[{"l":1,"en":"I enjoyed the time we shared snacks with each other during the break time.","zh":"我享受休息时我们互相分享零食的时光。"},{"l":2,"en":"It was really wonderful to chat with each other and enjoy food at the same time.","zh":"一边聊天一边品尝美食真是太美妙了。"},{"l":3,"en":"Looking back on those summer days, I truly enjoyed every moment spent with my grandparents, who taught me more about life than any book ever could.","zh":"回想起那些夏日，我真切地享受与祖父母度过的每一刻，他们教会我的人生道理胜过任何一本书。"}]}]},{"day":17,"w":"enjoyable","ph":"","defs":[{"pos":"adj.","m":"使人愉快的；使人欢乐的","ex":[{"l":1,"en":"We had an enjoyable weekend in the park.","zh":"我们在公园度过了愉快的周末。"},{"l":2,"en":"The school trip to the museum was so enjoyable that many students hoped to visit it again next term.","zh":"去博物馆的学校旅行非常愉快，许多学生希望下学期还能再去参观。"},{"l":3,"en":"What made the camping trip truly enjoyable was not the comfortable weather but the warm laughter shared around the fire late into the night.","zh":"让这次露营真正令人愉快的，不是舒适的天气，而是深夜围炉共享的温暖笑声。"}]}]},{"day":17,"w":"enough","ph":"","defs":[{"pos":"adj.","m":"足够的；充分的","ex":[{"l":1,"en":"I had thought about arguing with the teacher about that, but I didn't have enough courage.","zh":"我本想就那件事和老师争论，但我没有足够的勇气。"},{"l":2,"en":"There is not enough time left for us to finish all the questions, so we should work more quickly.","zh":"剩下的时间不够我们做完所有题目，所以我们应该做得更快些。"},{"l":3,"en":"Only when we have prepared enough materials can we feel confident enough to give a speech in front of the whole school.","zh":"只有当我们准备好足够的材料时，我们才能有充分的信心在全校面前发表演讲。"}]},{"pos":"adv.","m":"足够地；充分地","ex":[{"l":1,"en":"The boy is old enough to go to school.","zh":"这个男孩已经到了上学的年龄。"},{"l":2,"en":"She practised the piano carefully enough so that she could play it well at the school concert.","zh":"她把钢琴练习得足够认真，以便能在学校音乐会上弹好。"},{"l":3,"en":"Strange as the question may seem, the student answered it clearly enough to surprise every teacher in the room.","zh":"尽管这个问题似乎很奇怪，这名学生却回答得足够清楚，让在场的每位老师都感到惊讶。"}]},{"pos":"n.","m":"足够；充分","ex":[{"l":1,"en":"I have eaten enough for lunch.","zh":"我午餐已经吃得够多了。"},{"l":2,"en":"We have prepared enough for the party, so there is no need to buy anything more.","zh":"我们已经为聚会准备了充足的东西，所以没必要再买什么了。"},{"l":3,"en":"Enough has been said about the importance of honesty; what really matters now is whether we are willing to put those words into practice.","zh":"关于诚实的重要性已经说得够多了；现在真正重要的是我们是否愿意把这些话付诸行动。"}]}]},{"day":18,"w":"enrich","ph":"","defs":[{"pos":"v.","m":"使...丰富","ex":[{"l":1,"en":"Reading books can enrich our minds.","zh":"读书可以丰富我们的思想。"},{"l":2,"en":"Travelling to different countries can enrich our knowledge and help us understand other cultures better.","zh":"去不同的国家旅行能丰富我们的知识，帮助我们更好地了解其他文化。"},{"l":3,"en":"It is widely agreed that taking part in social activities can enrich students' school life and prepare them for the real world ahead.","zh":"人们普遍认为，参加社会活动能丰富学生的学校生活，并为他们迎接前方的真实世界做好准备。"}]}]},{"day":18,"w":"enter","ph":"","defs":[{"pos":"v.","m":"进入；参加","ex":[{"l":1,"en":"Please enter the room quietly.","zh":"请安静地进入房间。"},{"l":2,"en":"When we entered the cinema, the film had already begun and the lights were turned off.","zh":"当我们进入电影院时，电影已经开始，灯也关了。"},{"l":3,"en":"Having made up her mind to enter the speech competition, the shy girl practised in front of the mirror day after day until she felt ready.","zh":"下定决心参加演讲比赛后，这位腼腆的女孩日复一日在镜子前练习，直到觉得自己准备好了。"}]}]},{"day":18,"w":"entertainment","ph":"","defs":[{"pos":"n.","m":"娱乐；消遣；款待","ex":[{"l":1,"en":"TV is a kind of entertainment.","zh":"电视是一种娱乐方式。"},{"l":2,"en":"The park offers different kinds of entertainment, such as games, music shows and boat rides.","zh":"这座公园提供各种娱乐活动，比如游戏、音乐表演和乘船游览。"},{"l":3,"en":"While smart phones provide plenty of entertainment, spending too much time on them may take us away from meaningful face-to-face communication.","zh":"尽管智能手机提供了大量娱乐，但花太多时间在上面可能会让我们远离有意义的面对面交流。"}]}]},{"day":18,"w":"entrance","ph":"","defs":[{"pos":"n.","m":"入场；入口","ex":[{"l":1,"en":"Please wait for me at the entrance.","zh":"请在入口处等我。"},{"l":2,"en":"Before the entrance to the museum, the guide told us not to touch anything inside.","zh":"在进入博物馆之前，导游告诉我们要触摸里面的任何东西。"},{"l":3,"en":"It was at the main entrance of the school that the headmaster stood every morning, greeting each student with a warm smile.","zh":"每天清晨，校长正是站在学校的主入口处，用温暖的微笑迎接每一位学生。"}]}]},{"day":18,"w":"envelope","ph":"","defs":[{"pos":"n.","m":"信封","ex":[{"l":1,"en":"I put the letter into a new envelope.","zh":"我把那封信放进了一个新信封里。"},{"l":2,"en":"Before you mail the letter, you should check whether the address on the envelope is correct.","zh":"寄信之前，你应该核对一下信封上的地址是否正确。"},{"l":3,"en":"It was not until she opened the envelope that she realized she had been admitted to the dream school.","zh":"直到她打开信封，她才意识到自己已被梦想的学校录取。"}]}]},{"day":18,"w":"environment","ph":"","defs":[{"pos":"n.","m":"环境","ex":[{"l":1,"en":"We should protect our living environment.","zh":"我们应该保护我们的生活环境。"},{"l":2,"en":"If we keep polluting the air, the environment around us will become worse and worse.","zh":"如果我们继续污染空气，我们周围的环境会变得越来越糟。"},{"l":3,"en":"Only by working together can we create a clean environment in which children can grow up healthily.","zh":"只有齐心协力，我们才能创造一个让孩子们健康成长 的干净环境。"}]}]},{"day":18,"w":"equal","ph":"","defs":[{"pos":"adj.","m":"平等的","ex":[{"l":1,"en":"All people should be equal in the world.","zh":"世界上所有人都应该是平等的。"},{"l":2,"en":"In our class, every student is equal, no matter how much money their parents make.","zh":"在我们班，每个学生都是平等的，无论他们的父母赚多少钱。"},{"l":3,"en":"It is widely believed that equal chances should be given to those who dream of changing their lives.","zh":"人们普遍认为，应该给那些梦想改变自己生活的人平等的机会。"}]},{"pos":"v.","m":"等于","ex":[{"l":1,"en":"Two plus two equals four.","zh":"二加二等于四。"},{"l":2,"en":"If you add these two numbers together, the result equals what we got yesterday.","zh":"如果你把这两个数加在一起，结果等于我们昨天得到的答案。"},{"l":3,"en":"Hardly does any other sport equal basketball in popularity among teenagers in our city.","zh":"在我们城市的青少年中，几乎没有哪项运动的受欢迎程度能和篮球相当。"}]}]},{"day":18,"w":"escape","ph":"","defs":[{"pos":"n.&v.","m":"逃跑；逃脱","ex":[{"l":1,"en":"The thief tried to escape from the room.","zh":"那个小偷试图从房间里逃跑。"},{"l":2,"en":"When the fire started, the workers managed to escape through the back door before the roof fell.","zh":"火灾发生时，工人们在屋顶塌落之前设法从后门逃了出来。"},{"l":3,"en":"Narrow as the window was, the brave girl made her escape and called the police at once.","zh":"尽管窗户很窄，那位勇敢的女孩还是逃了出去并立刻 报了警。"}]}]},{"day":18,"w":"especially","ph":"","defs":[{"pos":"adv.","m":"特别，尤其","ex":[{"l":1,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，当他们在生活中遇到困难时可能会感到无助和沮丧，尤其是那些害羞的人。"},{"l":2,"en":"Many teenagers feel stressed before exams, especially those who seldom review their lessons in time.","zh":"许多青少年在考试前会感到紧张，尤其是那些很少及时复习功课的人。"},{"l":3,"en":"What makes the course attractive is that it offers real practice, especially for beginners who fear speaking in public.","zh":"让这门课吸引人的是它提供了真正的练习机会，尤其对那些害怕当众讲话的初学者而言。"}]}]},{"day":18,"w":"Europe","ph":"","defs":[{"pos":"n.","m":"欧洲","ex":[{"l":1,"en":"He plans to travel around Europe this summer.","zh":"他计划今年夏天环游欧洲。"},{"l":2,"en":"Although Europe is far from China, many students dream of visiting it during the holiday.","zh":"虽然欧洲离中国很远，许多学生仍梦想着假期去那里游玩。"},{"l":3,"en":"So rich in history is Europe that millions of tourists travel there every year to explore its old cities.","zh":"欧洲历史悠久，每年都有数百万游客前往那里探索它古老的城市。"}]}]},{"day":18,"w":"eve","ph":"","defs":[{"pos":"n.","m":"（节日的）前夜，前夕","ex":[{"l":1,"en":"We had a big dinner on New Year's Eve.","zh":"除夕夜我们吃了一顿丰盛的晚餐。"},{"l":2,"en":"On the eve of the Spring Festival, families always get together and enjoy a big meal.","zh":"在春节前夕，家人们总是聚在一起享用一顿丰盛的饭菜。"},{"l":3,"en":"It was on the eve of the exam that he finally understood how important it is to review lessons early.","zh":"正是在考试前夕，他才终于明白及早复习功课有多么重要。"}]}]},{"day":18,"w":"even","ph":"","defs":[{"pos":"adv.","m":"甚至；连（...)都；更","ex":[{"l":1,"en":"Even if you take the exam again, you won't pass it.","zh":"即使你再考一次，你也不会及格。"},{"l":2,"en":"Even though the weather was terrible, the children still went out to play in the snow.","zh":"尽管天气很糟糕，孩子们还是出去到雪地里玩了。"},{"l":3,"en":"Not until he lost the match did he realize that even a small mistake could change the whole result.","zh":"直到输掉比赛，他才意识到即使一个微小的失误也能改变整个结果。"}]}]},{"day":18,"w":"evening","ph":"","defs":[{"pos":"n.","m":"傍晚；晚上","ex":[{"l":1,"en":"Good evening, Mrs. Brown.","zh":"晚上好，布朗夫人。"},{"l":2,"en":"Yesterday evening, while I was reading a book, my mother came in and gave me a glass of milk.","zh":"昨天傍晚，当我正在读书时，妈妈走进来给了我一杯牛奶。"},{"l":3,"en":"On a quiet summer evening, the children sat under the tree, listening to their grandpa tell old stories.","zh":"在一个宁静的夏日傍晚，孩子们坐在树下，听爷爷讲古老的故事。"}]}]},{"day":18,"w":"event","ph":"","defs":[{"pos":"n.","m":"事件；大事；比赛项目","ex":[{"l":1,"en":"The sports meet has many exciting events.","zh":"运动会有许多激动人心的比赛项目。"},{"l":2,"en":"The 100-meter race is the event that everyone wants to watch during the school sports meet.","zh":"百米赛跑是校运会期间大家都想观看的比赛项目。"},{"l":3,"en":"Never before has such a wonderful event been held in our small town, which made all the local people excited.","zh":"我们这座小镇从未举办过如此精彩的活动，这让当地所有的人都兴奋不已。"}]}]},{"day":18,"w":"ever","ph":"","defs":[{"pos":"adv.","m":"曾经；无论何时","ex":[{"l":1,"en":"Have you ever been to Beijing?","zh":"你曾经去过北京吗？"},{"l":2,"en":"This is the most beautiful city that I have ever visited since I was a child.","zh":"这是我从小到大参观过的最美丽的城市。"},{"l":3,"en":"Seldom have I ever met a teacher so patient that every student in the class loves her lessons.","zh":"我很少见过这么有耐心的老师，班里每个学生都喜欢上她的课。"}]}]},{"day":18,"w":"every","ph":"","defs":[{"pos":"adj.","m":"每一；每个","ex":[{"l":1,"en":"I get up before six o'clock every day.","zh":"我每天六点前起床。"},{"l":2,"en":"The whole day we walked around the countryside, and every now and then, my uncle put stones in our bags.","zh":"我们一整天都在乡间走动，不时地，叔叔会把石头放进我们的包里。"},{"l":3,"en":"Not only does he read English every morning, but he also keeps a diary to remember every new word he learns.","zh":"他不仅每天早晨读英语，还坚持写日记来记住他学到的每个生词。"}]}]},{"day":18,"w":"everybody/everyone","ph":"","defs":[{"pos":"pron.","m":"每人，人人","ex":[{"l":1,"en":"Everybody likes the new English teacher.","zh":"大家都喜欢这位新来的英语老师。"},{"l":2,"en":"When the famous singer appeared on the stage, everybody in the hall stood up and cheered.","zh":"当那位著名歌手出现在舞台上时，大厅里的每个人都站起来欢呼。"},{"l":3,"en":"Such was his kindness that everybody in the village still remembers him years after he left.","zh":"他为人如此善良，以至于在他离开多年后，村里每个人都还惦记着他。"}]}]},{"day":18,"w":"everyday","ph":"","defs":[{"pos":"adj.","m":"每日的；日常的","ex":[{"l":1,"en":"Reading is part of my everyday life.","zh":"阅读是我日常生活的一部分。"},{"l":2,"en":"My grandfather walks in the park every morning because it has become his everyday habit.","zh":"我爷爷每天早晨在公园散步，因为这已成为他每天的习惯。"},{"l":3,"en":"It is these everyday choices, small as they seem, that finally decide what kind of person we will become.","zh":"正是这些日常的选择，尽管看似微小，最终决定了我们会成为什么样的人。"}]}]},{"day":18,"w":"everything","ph":"","defs":[{"pos":"pron.","m":"每件事；事事","ex":[{"l":1,"en":"Instead, we are the result of everything we've seen and done.","zh":"相反，我们所见和所做的一切造就了我们。"},{"l":2,"en":"Before you leave the room, please make sure that everything is put in the right place.","zh":"离开房间之前，请确保每件东西都放在了合适的位置。"},{"l":3,"en":"Only when you travel abroad will you find that everything around you can be both strange and interesting.","zh":"只有出国旅行时你才会发现，周围的一切既陌生又有趣。"}]}]},{"day":18,"w":"everywhere","ph":"","defs":[{"pos":"adv.","m":"到处","ex":[{"l":1,"en":"I looked everywhere for my keys.","zh":"我到处找我的钥匙。"},{"l":2,"en":"After the strong wind, broken branches could be seen everywhere in the small village.","zh":"大风过后，小村庄里到处都能看到断枝。"},{"l":3,"en":"So fast has the news spread that almost everywhere people are talking about the brave boy.","zh":"消息传播得如此之快，以至于几乎每个地方的人都在谈论那个勇敢的男孩。"}]}]},{"day":18,"w":"exactly","ph":"","defs":[{"pos":"adv.","m":"确切地；确实如此","ex":[{"l":1,"en":"Tell me exactly what happened.","zh":"准确地告诉我发生了什么。"},{"l":2,"en":"I can't remember exactly where I left my schoolbag, though I'm sure it was in the classroom.","zh":"我记不清把书包忘在哪儿了，不过我肯定是在教室里。"},{"l":3,"en":"What surprised me most was that he could describe the accident exactly as it had happened years before.","zh":"最令我惊讶的是，他能把多年前发生的那场事故描述得分毫不差。"}]}]},{"day":18,"w":"exam","ph":"","defs":[{"pos":"n.","m":"考试，测试；检查","ex":[{"l":1,"en":"Even if you take the exam again, you won't pass it.","zh":"即使你再考一次，你也不会及格。"},{"l":2,"en":"Before the final exam begins, the teacher told us to read every question carefully and stay calm.","zh":"期末考试开始前，老师告诉我们要仔细阅读每道题并保持冷静。"},{"l":3,"en":"Not until the exam results came out did he realize how much time he had wasted playing games.","zh":"直到考试成绩公布，他才意识到自己玩游戏浪费了多少时间。"}]}]},{"day":18,"w":"examine","ph":"","defs":[{"pos":"v.","m":"检查；细查；对...进行考试","ex":[{"l":1,"en":"The doctor will examine your eyes.","zh":"医生会检查你的眼睛。"},{"l":2,"en":"The teacher examined each student's homework carefully before she returned it to them.","zh":"老师把作业还给学生之前，仔细检查了每个学生的作业。"},{"l":3,"en":"Having examined the old machine for hours, the engineer finally found out why it stopped working.","zh":"检查了这台旧机器几个小时之后，工程师终于找出了它停止运转的原因。"}]}]},{"day":18,"w":"example","ph":"","defs":[{"pos":"n.","m":"例子；榜样","ex":[{"l":1,"en":"For example, the leaves of the holly plant have sharp points that discourage grass-eating animals.","zh":"例如，冬青植物的叶子长有尖刺，能阻止食草动物啃食。"},{"l":2,"en":"For example, people should remember to turn off electric items like TV sets and air conditioners when they are not used.","zh":"例如，人们应当记得在不使用时关掉电视、空调等电器。"},{"l":3,"en":"Let me give you a vivid example of how a small habit, once formed, can gradually shape the whole direction of a person's life.","zh":"让我给你举一个生动的例子，说明一个小习惯一旦养成，会如何逐渐改变一个人一生的方向。"}]}]},{"day":18,"w":"excellent","ph":"","defs":[{"pos":"adj.","m":"极好的，优秀的","ex":[{"l":1,"en":"She is an excellent student in our class.","zh":"她是我们班一名优秀的学生。"},{"l":2,"en":"The teacher said that the students who worked hard would get an excellent chance to study abroad next year.","zh":"老师说，努力学习的学生明年将获得一个出国深造的极好机会。"},{"l":3,"en":"Not only is she an excellent speaker, but she also has the rare ability to make every listener feel personally involved in the discussion.","zh":"她不仅是一位优秀的演讲者，还拥有一种罕见的能力，能让每位听众都觉得自己亲身参与了讨论。"}]}]},{"day":18,"w":"except","ph":"","defs":[{"pos":"prep.","m":"除...之外","ex":[{"l":1,"en":"Everyone went to the park except Tom.","zh":"除了汤姆，大家都去了公园。"},{"l":2,"en":"All the students passed the exam except the one who had been absent from school for a whole month.","zh":"除了那个缺课整整一个月的学生外，所有学生都通过了考试。"},{"l":3,"en":"Except for a few minor mistakes in grammar, the essay is so well written that it could easily win the first prize in the competition.","zh":"除了一些细微的语法错误外，这篇文章写得如此出色，完全有望在比赛中夺得一等奖。"}]}]},{"day":18,"w":"exchange","ph":"","defs":[{"pos":"n.","m":"交换；交流","ex":[{"l":1,"en":"We had a short exchange of ideas after the meeting.","zh":"会后我们简短地交换了意见。"},{"l":2,"en":"The cultural exchange program offers students a valuable chance to learn how people in other countries live and think.","zh":"这项文化交流项目为学生提供了宝贵机会，去了解其他国家的人们如何生活与思考。"},{"l":3,"en":"Through the exchange of letters that lasted several years, the two pen pals built a friendship strong enough to bridge the distance between their cultures.","zh":"通过持续数年的书信往来，这两位笔友建立起一段坚固的友谊，足以跨越彼此文化间的距离。"}]}]},{"day":18,"w":"excited","ph":"","defs":[{"pos":"adj.","m":"兴奋的","ex":[{"l":1,"en":"The kids were excited to see the toy rocket flying into the sky.","zh":"孩子们看到玩具火箭飞向天空，兴奋不已。"},{"l":2,"en":"When the children heard the exciting news that their team had won the match, they were so excited that they jumped and cheered loudly.","zh":"当孩子们听到自己球队获胜这个令人激动的消息时，他们激动得又蹦又跳，大声欢呼。"},{"l":3,"en":"Never before had the young scientist felt so excited, for the result of her long experiment finally proved the theory she had believed in for years.","zh":"这位年轻的科学家从未如此兴奋过，因为她漫长实验的结果终于证明了她多年来坚信的理论。"}]}]},{"day":18,"w":"exciting","ph":"","defs":[{"pos":"adj.","m":"使人兴奋的","ex":[{"l":1,"en":"The football match was very exciting.","zh":"那场足球比赛非常激动人心。"},{"l":2,"en":"It is such an exciting film that many students want to watch it again after the final exam.","zh":"这是一部如此令人激动的电影，以至于许多学生想在期末考试后再看一遍。"},{"l":3,"en":"Few things are as exciting as setting out on a journey to a place you have read about but never seen with your own eyes.","zh":"几乎没有什么能比得上启程前往一个你读过却从未亲眼见过的地方更令人兴奋了。"}]}]},{"day":18,"w":"excuse","ph":"","defs":[{"pos":"v.","m":"原谅；宽恕","ex":[{"l":1,"en":"Excuse me. Can you tell me the correct time?","zh":"打扰一下，请问您能告诉我准确的时间吗？"},{"l":2,"en":"Please excuse my being late, because the bus I took this morning broke down on the way.","zh":"请原谅我迟到，因为我今早乘坐的公交车在路上抛锚了。"},{"l":3,"en":"Nothing can excuse his rudeness to the elderly, however difficult the situation he was facing might have been.","zh":"无论他所处的处境多么艰难，都无法成为他对长者无礼的借口。"}]},{"pos":"n.","m":"借口；辩解","ex":[{"l":1,"en":"He always has a new excuse for being late.","zh":"他迟到总有新的借口。"},{"l":2,"en":"Being ill is no excuse for not finishing the homework that the teacher asked us to hand in tomorrow.","zh":"生病不能成为不完成老师要求明天交的作业的借口。"},{"l":3,"en":"She made up a clever excuse to cover her mistake, only to find later that an honest explanation would have worked far better.","zh":"她编了个巧妙的借口来掩饰自己的错误，后来却发现，诚实的解释其实效果好得多。"}]}]},{"day":19,"w":"exercise","ph":"","defs":[{"pos":"n.","m":"锻炼；做操；练习；习题","ex":[{"l":1,"en":"Try to do regular sports. The mind needs exercise as well as the body.","zh":"尽量坚持有规律的体育锻炼。大脑和身体一样，也需要锻炼。"},{"l":2,"en":"Doing morning exercise every day is a good habit that can help us stay healthy and focus better in class.","zh":"每天做早操是一个好习惯，能帮助我们保持健康，并在课堂上更好地集中注意力。"},{"l":3,"en":"Regular exercise not only strengthens the body but also clears the mind, making it easier for students to deal with the pressure of heavy schoolwork.","zh":"规律的锻炼不仅能强健体魄，还能使头脑清醒，让学生更从容地应对繁重学业的压力。"}]},{"pos":"v.","m":"锻炼；运用","ex":[{"l":1,"en":"I exercise every morning to keep fit.","zh":"我每天早晨锻炼以保持健康。"},{"l":2,"en":"Doctors suggest that we should exercise at least three times a week so that we can stay away from illness.","zh":"医生建议我们每周至少锻炼三次，这样才能远离疾病。"},{"l":3,"en":"To stay energetic throughout the long school day, she has learned to exercise wisely instead of simply training harder than everyone else.","zh":"为了在漫长的学校生活中保持精力充沛，她学会了科学地锻炼，而不是一味地比别人练得更苦。"}]}]},{"day":19,"w":"exhibition","ph":"","defs":[{"pos":"n.","m":"展览；展览会","ex":[{"l":1,"en":"Olivia asked her secretary if the exhibition would be held in Shanghai.","zh":"奥利维亚问她的秘书，展览是否会在上海举办。"},{"l":2,"en":"The art exhibition which was held in our city last week attracted thousands of visitors who came to enjoy the paintings.","zh":"上周在我市举办的艺术展览吸引了数千名前来欣赏画作的参观者。"},{"l":3,"en":"What impressed the visitors most at the exhibition was not the modern technology but the simple stories behind each old object on display.","zh":"在展览上给参观者留下最深印象的，并非现代科技，而是每件展品背后那些朴素的故事。"}]}]},{"day":19,"w":"exist","ph":"","defs":[{"pos":"v.","m":"存在","ex":[{"l":1,"en":"Do you think ghosts really exist?","zh":"你认为鬼真的存在吗？"},{"l":2,"en":"Scientists say that this kind of plant still exists in a few forests where the air is clean and fresh.","zh":"科学家说，这种植物仍然存在于少数空气清新洁净的森林中。"},{"l":3,"en":"It is hard to believe that such a strange custom still exists in the modern world, where most traditions have slowly faded away.","zh":"很难相信在大多数传统已渐渐消逝的现代社会里，这样一种奇特的习俗依然存在。"}]}]},{"day":19,"w":"exit","ph":"","defs":[{"pos":"n.","m":"出口，通道","ex":[{"l":1,"en":"Please find the nearest exit before the film begins.","zh":"电影开始前，请找到离你最近的出口。"},{"l":2,"en":"When the fire alarm rang, all the workers quickly left the building through the exit that was marked with a green sign.","zh":"火警响起时，所有工人迅速通过标有绿色标志的出口离开了大楼。"},{"l":3,"en":"Only after the show ended did the audience realize that the exit they had rushed to was actually locked from the outside.","zh":"直到演出结束，观众们才意识到他们争相涌向的那个出口其实被从外面锁上了。"}]},{"pos":"vi.","m":"离别；退出","ex":[{"l":1,"en":"Please exit the room from the back door.","zh":"请从后门离开房间。"},{"l":2,"en":"After the meeting was over, the manager asked everyone to exit the hall quietly so as not to wake the sleeping baby.","zh":"会议结束后，经理请大家安静地离开大厅，以免吵醒熟睡的婴儿。"},{"l":3,"en":"Having exited the stage to warm applause, the young actor felt that all the months of hard practice had finally paid off.","zh":"在热烈的掌声中走下舞台后，这位年轻演员感到，数月来的刻苦练习终于有了回报。"}]}]},{"day":19,"w":"expect","ph":"","defs":[{"pos":"v.","m":"预料；期待；认为","ex":[{"l":1,"en":"I expect to see you tomorrow.","zh":"我期待明天见到你。"},{"l":2,"en":"We all expect that the new library which will open next month will provide students with a better place to study.","zh":"我们都期待下月开放的新图书馆能为学生提供一个更好的学习场所。"},{"l":3,"en":"Contrary to what people had expected, the quiet girl turned out to be the most creative designer the company had ever hired.","zh":"与人们的预料相反，那位安静的女孩竟成了公司有史以来聘请过的最具创造力的设计师。"}]}]},{"day":19,"w":"expensive","ph":"","defs":[{"pos":"adj.","m":"昂贵的","ex":[{"l":1,"en":"For example, getting expensive clothes didn't change me as a person, but the camping trip last summer certainly did.","zh":"例如，买昂贵的衣服并没有改变我这个人，但去年夏天的露营之旅确实改变了我。"},{"l":2,"en":"Although the camera was very expensive, my father decided to buy it because he wanted to record every important moment of my growth.","zh":"虽然相机很昂贵，爸爸还是决定买下它，因为他想记录我成长中的每个重要时刻。"},{"l":3,"en":"The more expensive a gift is, the less likely it is to express the true feelings that lie hidden in a simple, honest word.","zh":"礼物越是昂贵，就越难以表达那句朴实真诚的话语中所蕴含的真情。"}]}]},{"day":19,"w":"experience","ph":"","defs":[{"pos":"n.","m":"经验；经历","ex":[{"l":1,"en":"In addition, I prefer experiences because they bring people together.","zh":"此外，我更偏爱经历，因为它们能让人走到一起。"},{"l":2,"en":"My first reason is that experiences make us different as we grow.","zh":"我的第一个理由是，经历使我们在成长过程中变得与众不同。"},{"l":3,"en":"Looking back on her years of teaching, she realized that the most valuable experience was not winning awards but watching shy children slowly find their own voices.","zh":"回顾多年的教学生涯，她意识到最宝贵的经历不是获奖，而是看着腼腆的孩子慢慢学会表达自己。"}]}]},{"day":19,"w":"experiment","ph":"","defs":[{"pos":"n.","m":"实验","ex":[{"l":1,"en":"We will do a science experiment in class today.","zh":"今天我们将在课上做一个科学实验。"},{"l":2,"en":"The experiment which the students carried out yesterday showed that plants grow faster when they get enough sunlight.","zh":"学生们昨天做的实验表明，植物在获得充足阳光时生长得更快。"},{"l":3,"en":"To everyone's surprise, the simple experiment designed by a group of middle school students produced a result that even the professor had not expected.","zh":"令所有人意外的是，一群中学生设计的简单实验竟得出了连教授都未曾预料的结果。"}]}]},{"day":19,"w":"explore","ph":"","defs":[{"pos":"v.","m":"探索；探测","ex":[{"l":1,"en":"They like to explore the old castle.","zh":"他们喜欢探索那座古堡。"},{"l":2,"en":"When the holiday begins, many children want to explore the places that they have only read about in books before.","zh":"假期开始时，许多孩子想去探索那些他们以前只在书上读到过的地方。"},{"l":3,"en":"Driven by endless curiosity, the young traveler set out to explore every corner of the island, hoping to discover something no one had ever reported before.","zh":"在无尽好奇心的驱使下，这位年轻的旅行者出发去探索岛屿的每个角落，希望能发现从未被人记载过的东西。"}]}]},{"day":19,"w":"explain","ph":"","defs":[{"pos":"v.","m":"解释；说明","ex":[{"l":1,"en":"Can you explain this word to me?","zh":"你能给我解释一下这个词吗？"},{"l":2,"en":"The teacher tried to explain why the answer was wrong, but some students still could not understand the difficult question.","zh":"老师试图解释为什么这个答案是错的，但仍有一些学生无法理解这道难题。"},{"l":3,"en":"It is not easy to explain why two children raised in the same family can grow up to be so completely different in character.","zh":"要解释为什么在同一个家庭长大的两个孩子，性格却能如此截然不同，并不容易。"}]}]},{"day":19,"w":"express","ph":"","defs":[{"pos":"v.","m":"表达；表示","ex":[{"l":1,"en":"We wanted them to think of ideas to express their own interests and hopes,' she said.","zh":"她说：‘我们希望他们想办法表达自己的兴趣和希望。’"},{"l":2,"en":"When students are encouraged to express how they truly feel, teachers can understand what they really need and help them better.","zh":"当学生被鼓励表达自己真实的感受时，老师就能了解他们真正需要什么，从而更好地帮助他们。"},{"l":3,"en":"Only when we learn to express our ideas clearly in public can we make others understand the value of what we are trying to share.","zh":"只有当我们学会在公开场合清楚地表达自己的想法时，才能让别人明白我们想要分享的东西的价值。"}]},{"pos":"n.","m":"快车","ex":[{"l":1,"en":"We wanted them to think of ideas to express their own interests and hopes,' she said.","zh":"她说：‘我们希望他们想办法表达自己的兴趣和希望。’"},{"l":2,"en":"The express to Beijing runs so fast that it saves passengers at least two hours compared with the ordinary train.","zh":"开往北京的快车跑得非常快，与普通列车相比能为旅客节省至少两个小时。"},{"l":3,"en":"Having taken the express that morning, we arrived well ahead of schedule, which gave us enough time to explore the city.","zh":"由于那天早上坐了快车，我们提前很久到达，这让我们有充足的时间去探索这座城市。"}]}]},{"day":19,"w":"extra","ph":"","defs":[{"pos":"adv.","m":"特别地；非常；另外","ex":[{"l":1,"en":"He worked extra hard this term and got the first prize.","zh":"这学期他格外努力，得了一等奖。"},{"l":2,"en":"Although she was tired after school, she practiced extra carefully so that she could win the competition.","zh":"尽管放学后她很累，但她练习得格外认真，以便能赢得比赛。"},{"l":3,"en":"To make sure every detail was correct, the team checked the report extra carefully before handing it in.","zh":"为确保每个细节都正确，团队在提交前格外仔细地核对了报告。"}]},{"pos":"adj.","m":"额外的","ex":[{"l":1,"en":"I need some extra time to finish my homework.","zh":"我需要一些额外的时间来完成作业。"},{"l":2,"en":"If you want to join the school team, you will have to do extra training every day after class.","zh":"如果你想加入校队，就必须每天课后进行额外的训练。"},{"l":3,"en":"The extra money he earned during the summer holiday made it possible for him to buy the books he had long wanted.","zh":"他在暑假挣的额外收入使他能够买下自己渴望已久的那些书。"}]}]},{"day":19,"w":"eye","ph":"","defs":[{"pos":"n.","m":"眼睛","ex":[{"l":1,"en":"Close your eyes and listen to the music.","zh":"闭上眼睛，听听音乐。"},{"l":2,"en":"When the little girl opened her eyes, she found that the whole room was filled with colourful balloons.","zh":"当小女孩睁开眼睛时，她发现整个房间都装满了五颜六色的气球。"},{"l":3,"en":"Never before had her eyes shown so much excitement as when she finally saw the sea for the first time.","zh":"当她第一次看到大海时，她的眼睛里流露出的兴奋是前所未有的。"}]}]},{"day":19,"w":"fable","ph":"","defs":[{"pos":"n.","m":"寓言","ex":[{"l":1,"en":"This fable tells us an important lesson.","zh":"这则寓言告诉我们一个重要的道理。"},{"l":2,"en":"The fable which we read in class yesterday teaches us that hard work always pays off in the end.","zh":"我们昨天在课上读的那则寓言告诉我们：努力终会有回报。"},{"l":3,"en":"Through this simple fable, the writer manages to show that those who are honest will finally be rewarded.","zh":"通过这个简单的寓言，作者成功表明：诚实的人最终会得到回报。"}]}]},{"day":19,"w":"face","ph":"","defs":[{"pos":"n.","m":"脸，面孔","ex":[{"l":1,"en":"We learned much about fire and the danger firemen face.","zh":"我们学到了很多关于火以及消防员所面临的危险的知识。"},{"l":2,"en":"With a big smile on her face, she walked into the classroom and told us the good news she had just heard.","zh":"她脸上带着灿烂的笑容走进教室，告诉我们她刚听到的那个好消息。"},{"l":3,"en":"Embarrassed by the question, the boy lowered his head so that nobody could see the red on his face.","zh":"被这个问题弄得很难为情，男孩低下了头，这样就没有人能看到他脸上的红晕。"}]},{"pos":"v.","m":"面对","ex":[{"l":1,"en":"We learned much about fire and the danger firemen face.","zh":"我们学到了很多关于火以及消防员所面临的危险的知识。"},{"l":2,"en":"Whenever we face difficulties in our studies, we should not give up but try to find a way out.","zh":"每当我们在学习中遇到困难时，都不应放弃，而要设法找出路。"},{"l":3,"en":"No matter how serious the problems we face may be, keeping calm is always the first step toward solving them.","zh":"无论我们面临的问题有多严重，保持冷静始终是解决它们的第一步。"}]}]},{"day":19,"w":"fact","ph":"","defs":[{"pos":"n.","m":"事实；现实；实际","ex":[{"l":1,"en":"In fact, it's not one canal, but a system of canals and rivers linked together.","zh":"事实上，它不是一条运河，而是相互连接的运河与河流组成的系统。"},{"l":2,"en":"In fact, the project which seemed impossible at first turned out to be a great success.","zh":"事实上，那个起初看起来不可能的项目最后取得了巨大的成功。"},{"l":3,"en":"What surprised everyone was the fact that a small group of students had completed the whole survey on their own.","zh":"令大家惊讶的是，一小群学生竟然独自完成了整个调查。"}]}]},{"day":19,"w":"factory","ph":"","defs":[{"pos":"n.","m":"工厂","ex":[{"l":1,"en":"My father works in a big factory near our home.","zh":"我爸爸在我们家附近的一家大工厂上班。"},{"l":2,"en":"The factory where my mother used to work was closed last year because of pollution problems.","zh":"我妈妈以前工作的那家工厂去年因为污染问题被关闭了。"},{"l":3,"en":"Built more than thirty years ago, the factory still provides jobs for hundreds of local people today.","zh":"这家工厂建于三十多年前，如今仍为数百名当地人提供工作。"}]}]},{"day":19,"w":"fail","ph":"","defs":[{"pos":"v.","m":"失败；不及格","ex":[{"l":1,"en":"Don't be afraid to fail in the exam.","zh":"不要害怕考试不及格。"},{"l":2,"en":"Even if you fail this time, you will learn something that helps you succeed next time.","zh":"即使你这次失败了，你也会学到有助于下次成功的东西。"},{"l":3,"en":"Those who fail to see the value of small progress will hardly achieve anything great in the long run.","zh":"那些看不到微小进步价值的人，从长远来看很难取得伟大的成就。"}]}]},{"day":19,"w":"fair","ph":"","defs":[{"pos":"adj.","m":"公平的，合理的；金色的","ex":[{"l":1,"en":"It is fair to let everyone have a turn.","zh":"让每个人都轮一次是公平的。"},{"l":2,"en":"The teacher explained that it was fair for every student to get the same chance to answer questions.","zh":"老师解释说，每个学生都有相同的机会回答问题才是公平的。"},{"l":3,"en":"Only when the rules are fair to everyone can a game truly bring people joy rather than anger.","zh":"只有当规则对每个人都很公平时，比赛才能真正给人们带来快乐而不是愤怒。"}]},{"pos":"n.","m":"集市","ex":[{"l":1,"en":"We had a great time at the book fair.","zh":"我们在书展上玩得很开心。"},{"l":2,"en":"The science fair, which is held every spring, attracts thousands of students who love inventing new things.","zh":"每年春天举办的科技展吸引了成千上万热爱发明新事物的学生。"},{"l":3,"en":"Having walked around the fair for hours, the children were still so excited that they refused to leave.","zh":"尽管在集市上逛了几个小时，孩子们仍然兴奋得不肯离开。"}]}]},{"day":19,"w":"fall","ph":"","defs":[{"pos":"v.","m":"落下；降落；倒下；跌倒","ex":[{"l":1,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"在有风的日子里，树叶落在地上，马路看起来很美。"},{"l":2,"en":"When autumn comes, the leaves which used to be green fall quietly to the ground one by one.","zh":"秋天到来时，曾经翠绿的树叶一片片悄悄地落到地上。"},{"l":3,"en":"Should the temperature fall below zero tonight, the farmers will have to take action to protect their crops.","zh":"如果今夜气温降到零度以下，农民们将不得不采取措施保护庄稼。"}]},{"pos":"n.","m":"（美）秋季","ex":[{"l":1,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"在有风的日子里，树叶落在地上，马路看起来很美。"},{"l":2,"en":"Last fall, my family took a trip to the mountains where we enjoyed the beautiful red and yellow leaves.","zh":"去年秋天，我们一家去山里旅行，欣赏了美丽的红黄相间的树叶。"},{"l":3,"en":"The fall we spent in the countryside remains one of the most unforgettable memories of my childhood.","zh":"我们在乡下度过的那个秋天仍是我童年最难忘的回忆之一。"}]}]},{"day":19,"w":"familiar","ph":"","defs":[{"pos":"adj.","m":"熟悉的","ex":[{"l":1,"en":"This song sounds very familiar to me.","zh":"这首歌我听起来很熟悉。"},{"l":2,"en":"The old house looked familiar to him, but he could not remember when he had seen it before.","zh":"那座旧房子看起来很眼熟，但他想不起以前何时见过。"},{"l":3,"en":"Although the street was familiar to her, everything seemed strangely different in the dim evening light.","zh":"尽管她对这条街很熟悉，但在昏暗的暮色中，一切却显得奇怪地不同。"}]}]},{"day":19,"w":"family","ph":"","defs":[{"pos":"n.","m":"家庭；家族；家人","ex":[{"l":1,"en":"My father said people should know more about fire safety so that they could protect themselves and their families.","zh":"我爸爸说，人们应该多了解消防安全知识，以便能保护自己和家人。"},{"l":2,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易丝至少能活到130岁。她的愿望是工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"What makes this family special is that everyone, old and young, sits together to share stories every weekend.","zh":"这个家庭的特别之处在于，每个周末，无论老少，大家都会坐在一起分享故事。"}]}]},{"day":19,"w":"famous","ph":"","defs":[{"pos":"adj.","m":"著名的","ex":[{"l":1,"en":"Hangzhou is famous for its beautiful West Lake.","zh":"杭州以美丽的西湖而闻名。"},{"l":2,"en":"The writer who is famous for his children's books will visit our school and give a talk next Friday.","zh":"那位以儿童文学闻名的作家下周五将来我校做讲座。"},{"l":3,"en":"Not only is this small town famous for its tea, but it also attracts visitors with its long and colourful history.","zh":"这座小镇不仅因茶叶而闻名，还以其悠久多彩的历史吸引着游客。"}]}]},{"day":19,"w":"fan","ph":"","defs":[{"pos":"n.","m":"（电影、运动等）迷；热心的爱好者；扇子","ex":[{"l":1,"en":"A lot of fans were attracted by the 13-year-old one-armed basketball player.","zh":"许多粉丝被这位13岁的独臂篮球运动员所吸引。"},{"l":2,"en":"Your fan, Carmen Rivera --- A head master is giving a speech about how to perform successfully in an interview to a new school.","zh":"你的粉丝卡门·里维拉——一位校长正在就如何在新学校的面试中表现出色发表演讲。"},{"l":3,"en":"Devoted as they are, the fans travel hundreds of miles just to watch their favourite team play a single match.","zh":"尽管如此，这些忠实的球迷仍会跋涉数百英里，只为观看他们最喜爱的球队踢一场比赛。"}]}]},{"day":19,"w":"far","ph":"","defs":[{"pos":"adj.","m":"远的","ex":[{"l":1,"en":"I was born in a little town not far from here.","zh":"我出生在离这儿不远的一个小镇上。"},{"l":2,"en":"The village is so far from the city that the children have to get up very early to catch the school bus.","zh":"这个村庄离城市很远，孩子们不得不很早起床去赶校车。"},{"l":3,"en":"However far the journey may be, nothing can stop a person who has made up his mind to reach the goal.","zh":"无论旅途有多远，都无法阻挡一个下定决心要达成目标的人。"}]},{"pos":"adv.","m":"远","ex":[{"l":1,"en":"I was born in a little town not far from here.","zh":"我出生在离这里不远的一个小镇上。"},{"l":2,"en":"Although the museum is not far from our school, we still need to take a bus because the road is busy.","zh":"虽然博物馆离我们学校不远，但我们仍需要坐公交车，因为路上很繁忙。"},{"l":3,"en":"No matter how far you have travelled, the warm light of home will always guide you back when you feel lost.","zh":"无论你走了多远，当你感到迷茫时，家中那温暖的灯光总会指引你回来。"}]}]},{"day":19,"w":"fare","ph":"","defs":[{"pos":"n.","m":"票价；费用","ex":[{"l":1,"en":"The bus fare is two yuan for students.","zh":"学生坐公交车的票价是两元。"},{"l":2,"en":"The conductor told us that the train fare would rise if we bought tickets during the Spring Festival.","zh":"售票员告诉我们，如果我们在春节期间买票，火车票价会上涨。"},{"l":3,"en":"It is the cheap fare that makes this underground line the first choice for thousands of workers every morning.","zh":"正是低廉的票价使这条地铁线成为每天清晨数以千计工人的首选。"}]}]},{"day":19,"w":"farm","ph":"","defs":[{"pos":"n.","m":"农场，农庄","ex":[{"l":1,"en":"My uncle works on a small farm.","zh":"我叔叔在一个小农场工作。"},{"l":2,"en":"The farm which lies at the foot of the hill keeps hundreds of cows and sheep.","zh":"坐落在山脚下的那个农场养着数百头牛羊。"},{"l":3,"en":"Raised on a quiet farm in the south, the boy learned to love nature long before he moved to the noisy city.","zh":"在南边一个宁静的农场长大，这个男孩早在搬到喧嚣的城市之前就学会了热爱自然。"}]}]},{"day":19,"w":"farmer","ph":"","defs":[{"pos":"n.","m":"农民，农夫","ex":[{"l":1,"en":"Maybe they're farmers.","zh":"也许他们是农民。"},
