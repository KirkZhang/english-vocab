":"prep.","m":"与..一道；跟..一起；带有；具有；关于；以；和；用；有","ex":[{"l":1,"en":"I had thought about living with my grandparents when my parents went abroad last year.","zh":"去年父母出国时，我曾考虑过和祖父母一起住。"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次研学旅行中遇到了一些青少年，现在我仍和他们保持联系，但我几乎记不得旅途中买了什么。"},{"l":3,"en":"With the help of his kind neighbors, the old man finally managed to repair the broken roof before the heavy rain arrived.","zh":"在热心邻居的帮助下，老人终于在大雨来临之前修好了破损的屋顶。"}]}]},{"day":59,"w":"within","ph":"","defs":[{"pos":"prep.","m":"在..范围之内","ex":[{"l":1,"en":"Please finish the work within two hours.","zh":"请在两小时内完成这项工作。"},{"l":2,"en":"The teacher asked us to read the whole book within a week so that we could discuss it together in class.","zh":"老师让我们在一周内读完这本书，以便我们能在课堂上一起讨论。"},{"l":3,"en":"Within a few months, the small company grew into one of the most popular businesses in the city, surprising everyone.","zh":"在短短几个月内，这家小公司发展成了城里最受欢迎的企业之一，让所有人都感到惊讶。"}]}]},{"day":59,"w":"without","ph":"","defs":[{"pos":"prep.","m":"没有","ex":[{"l":1,"en":"I can't do it without your help.","zh":"没有你的帮助我做不了这件事。"},{"l":2,"en":"Without enough practice, it is almost impossible for students to pass the English exam successfully at the end of the term.","zh":"没有足够的练习，学生几乎不可能在期末顺利通过英语考试。"},{"l":3,"en":"Without the timely help of those strangers, the lost child might not have found his way home that cold and dark night.","zh":"如果没有那些陌生人及时的帮助，那个迷路的孩子在那个又冷又黑的夜晚可能就找不到回家的路了。"}]}]},{"day":59,"w":"wolf","ph":"","defs":[{"pos":"n.","m":"狼","ex":[{"l":1,"en":"The wolf ran into the forest quickly.","zh":"狼迅速跑进了森林。"},{"l":2,"en":"In the story, the clever boy saved all the sheep from the hungry wolf that came down from the mountain at night.","zh":"在故事里，聪明的男孩把所有的羊从夜晚从山上下来觅食的饿狼口中救了出来。"},{"l":3,"en":"It was reported that a single wolf had been seen near the village, which made all the farmers worried about their sheep.","zh":"据报道，村子附近出现了一头孤狼，这让所有的农夫都为他们的羊群担心起来。"}]}]},{"day":59,"w":"woman","ph":"","defs":[{"pos":"n.","m":"妇女；女人","ex":[{"l":1,"en":"That woman is my English teacher.","zh":"那位女士是我的英语老师。"},{"l":2,"en":"The young woman who is talking to our headmaster is a famous scientist working on a new kind of medicine.","zh":"正在和校长交谈的那位年轻女士是一位研究新药的著名科学家。"},{"l":3,"en":"Never before had the woman imagined that one day she would stand on the stage and receive such an important award.","zh":"那位女士从未想过，有朝一日自己会站在舞台上领取这样一项重要的奖项。"}]}]},{"day":59,"w":"wonder","ph":"","defs":[{"pos":"v.","m":"对..感到疑惑；想知道","ex":[{"l":1,"en":"It made me wonder: Who creates maps in the first place?","zh":"这让我好奇：到底是谁最初创造了地图？"},{"l":2,"en":"I wonder whether our headmaster will agree to hold the sports meeting next Friday as we planned before.","zh":"我想知道校长是否会同意按我们之前的计划在下周五举行运动会。"},{"l":3,"en":"Looking at the strange stars in the sky, the children began to wonder how the universe was formed so long ago.","zh":"望着天空中陌生的星辰，孩子们开始好奇：如此久远之前，宇宙究竟是怎样形成的。"}]},{"pos":"n.","m":"奇迹，奇观","ex":[{"l":1,"en":"The Great Wall is one of the wonders of the world.","zh":"长城是世界奇观之一。"},{"l":2,"en":"When we finally reached the top of the mountain, we all felt that the beautiful sunrise was truly a wonder of nature.","zh":"当我们终于到达山顶时，我们都觉得那美丽的日出真是一大自然奇观。"},{"l":3,"en":"No wonder so many tourists travel thousands of miles every year just to see this ancient wonder with their own eyes.","zh":"难怪每年有那么多游客不远万里而来，只为亲眼目睹这座古老的奇观。"}]}]},{"day":59,"w":"wonderful","ph":"","defs":[{"pos":"adj.","m":"美妙的，精彩的；太好了","ex":[{"l":1,"en":"It was really wonderful to chat with each other and enjoy food at the same time.","zh":"一边聊天一边享用美食，真是太美好了。"},{"l":2,"en":"What a wonderful time we had during the school trip, although it rained suddenly on the second day of our journey.","zh":"虽然我们旅行的第二天突然下了雨，但我们在这次学校旅行中度过了一段多么美好的时光。"},{"l":3,"en":"It is wonderful to see that the children who once had nothing are now able to study in such a bright and modern classroom.","zh":"看到那些曾经一无所有的孩子现在能在这样明亮而现代化的教室里学习，真是太好了。"}]}]},{"day":59,"w":"wood","ph":"","defs":[{"pos":"n.","m":"木头，木材；（复）树林","ex":[{"l":1,"en":"The desk is made of wood.","zh":"这张桌子是木头做的。"},{"l":2,"en":"The children were so excited that they ran into the woods behind the school to look for the missing dog together.","zh":"孩子们非常兴奋，一起跑进学校后面的小树林去寻找那只走失的狗。"},{"l":3,"en":"It was in this small wood that the writer found the peace and quiet he needed to finish his long novel.","zh":"正是在这片小树林里，这位作家找到了完成他长篇小说所需的宁静。"}]}]},{"day":59,"w":"wooden","ph":"","defs":[{"pos":"adj.","m":"木制的","ex":[{"l":1,"en":"There is a wooden chair in the room.","zh":"房间里有一把木椅子。"},{"l":2,"en":"The old man sat on the wooden bench under the tree, watching the children play games happily on the grass.","zh":"老人坐在树下的木长椅上，看着孩子们在草地上快乐地玩游戏。"},{"l":3,"en":"Carefully carved out of wood, the small wooden horse was the only toy the poor boy had ever owned.","zh":"那匹小木马是用木头精心雕刻而成的，是那个穷苦男孩唯一拥有过的玩具。"}]}]},{"day":59,"w":"word","ph":"","defs":[{"pos":"n.","m":"词，单词；话","ex":[{"l":1,"en":"Because he misunderstood his Grandma's words \"fruit bowl\" as \"football\".","zh":"因为他把奶奶说的'果盆(fruit bowl)'错听成了'足球(football)'。"},{"l":2,"en":"The teacher asked us to read each new word carefully so that we could remember them more easily during the exam.","zh":"老师让我们仔细读每个生词，这样在考试时就能更容易地记住它们。"},{"l":3,"en":"It is said that a single word of encouragement can completely change a student who has lost hope in his studies.","zh":"据说，一句鼓励的话，就能彻底改变一个对学习失去信心的学生。"}]}]},{"day":59,"w":"work","ph":"","defs":[{"pos":"v.","m":"工作；（机器等）运转，活动","ex":[{"l":1,"en":"Nowadays, many robots have been used to work in dangerous situations.","zh":"如今，许多机器人已被用于在危险的环境中工作。"},{"l":2,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，露易丝至少能活到一百三十岁。她的心愿是再工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"It is working together as a team that truly matters, for no matter how talented a single person may be, real progress can hardly be made without cooperation.","zh":"真正重要的是作为一个团队一起工作，因为无论一个人多么有天赋，没有合作就几乎不可能取得真正的进步。"}]},{"pos":"n.","m":"工作；劳动；作品","ex":[{"l":1,"en":"Nowadays, many robots have been used to work in dangerous situations.","zh":"如今，许多机器人已被用于在危险的环境中工作。"},{"l":2,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，露易丝至少能活到一百三十岁。她的心愿是再工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"The work produced by these young artists not only reflects their personal feelings but also encourages us to think about the society in which we live.","zh":"这些年轻艺术家创作的作品不仅反映了他们的个人情感，还鼓励我们去思考我们所生活的社会。"}]}]},{"day":59,"w":"worker","ph":"","defs":[{"pos":"n.","m":"工作者；工人","ex":[{"l":1,"en":"My father is a worker in a car factory.","zh":"我爸爸是一家汽车厂的工人。"},{"l":2,"en":"The workers who built this bridge worked day and night so that the city could open it before the holiday.","zh":"建造这座桥的工人们日夜工作，以便这座城市能在假期前开通它。"},{"l":3,"en":"Treated as a model worker, he was invited to share his experience, yet he remained modest and insisted that he still had much to learn from others.","zh":"作为模范工人，他被邀请分享经验，但他依然谦虚，坚持说自己还有很多要向别人学习的地方。"}]}]},{"day":59,"w":"world","ph":"","defs":[{"pos":"n.","m":"世界","ex":[{"l":1,"en":"It's the longest man-made waterway in the world.","zh":"它是世界上最长的人造水道。"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English. Louise has many Chinese friends. They communicate by computer.","zh":"露易丝今年十三岁，目前正在学中文，中文已经成为与英语同样重要的世界语言。露易丝有很多中国朋友。他们通过电脑交流。"},{"l":3,"en":"Rarely has any invention changed the world so deeply as the Internet, which connects people across the globe and makes distant communication possible.","zh":"很少有哪项发明像互联网这样深刻地改变了世界，它把全球各地的人们连接起来，使远距离交流成为可能。"}]}]},{"day":59,"w":"worry","ph":"","defs":[{"pos":"v.","m":"担心；烦恼","ex":[{"l":1,"en":"Don't worry about the exam. You will do well.","zh":"别担心这次考试，你会考好的。"},{"l":2,"en":"My mother always tells me not to worry too much, because worrying will never solve the problems that lie ahead.","zh":"妈妈总是告诉我不要太担心，因为担心永远解决不了前面的问题。"},{"l":3,"en":"It is normal to worry when facing challenges, but what really counts is turning that worry into the courage needed to move forward.","zh":"面对挑战时感到担忧是正常的，但真正重要的是把那份担忧转化为前进所需的勇气。"}]},{"pos":"n.","m":"烦恼；担忧","ex":[{"l":1,"en":"The mother's worry showed on her face.","zh":"母亲的担忧写在了脸上。"},{"l":2,"en":"Although worry filled her mind, she still smiled at her children and told them that everything would be fine.","zh":"尽管内心满是担忧，她依然对孩子们微笑，告诉他们一切都会好起来。"},{"l":3,"en":"Worry, if kept under control, can remind us to prepare carefully; however, once it grows too large, it may prevent us from taking any action at all.","zh":"担忧若能加以控制，便能提醒我们认真准备；然而，一旦它膨胀过度，就可能让我们完全无法采取行动。"}]}]},{"day":59,"w":"worth","ph":"","defs":[{"pos":"adj.","m":"有..价值的，值得..的","ex":[{"l":1,"en":"This book is worth reading.","zh":"这本书值得一读。"},{"l":2,"en":"The film is well worth watching because it tells a moving story about family and love.","zh":"这部电影很值得一看，因为它讲述了一个关于家庭和爱的动人故事。"},{"l":3,"en":"The museum is well worth a visit, for the exhibits displayed there offer a rare chance to look into the history of this ancient city.","zh":"这家博物馆很值得参观，因为那里展出的展品提供了一个了解这座古城历史的难得机会。"}]}]},{"day":60,"w":"would","ph":"","defs":[{"pos":"v.","m":"愿意","ex":[{"l":1,"en":"Would he have seen you if you hadn't waved to him?","zh":"如果你没向他挥手，他会看见你吗？"},{"l":2,"en":"In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"起初，这所学校被要求关闭，校舍将不得不被出售，因为学校的位置非常好。"},{"l":3,"en":"Were it not for his help, I would still be struggling with the problem, wondering whether I could ever find the right answer.","zh":"要不是他的帮助，我还会在那个问题上苦苦挣扎，怀疑自己是否永远也找不到正确答案。"}]}]},{"day":60,"w":"wound","ph":"","defs":[{"pos":"n.","m":"创伤；伤口","ex":[{"l":1,"en":"The e how cold the winter morning could be.","zh":"直到气温降到零度，学生们才意识到这个冬日的清晨会有多冷。"}]}]},{"day":60,"w":"zoo","ph":"","defs":[{"pos":"n.","m":"动物园","ex":[{"l":1,"en":"We saw many animals in the zoo last Sunday.","zh":"上周日我们在动物园里看到了许多动物。"},{"l":2,"en":"The zoo which was built ten years ago has become the most popular place for children in our city.","zh":"这座十年前建造的动物园已经成为我们城市里最受孩子们欢迎的地方。"},{"l":3,"en":"What makes the new zoo attractive is that visitors can get close to the animals while learning how to protect them.","zh":"让这座新动物园如此吸引人的是，游客既能近距离接触动物，又能学习如何保护它们。"}]}]}];

const K='zk';
const S = { view:'mode', mode:null, dayTarget:'test', days:[], level:1, pool:[], cur:null, last:null, lastWord:null, flipped:false, yes:0, no:0, startTime:null, autoSpeak:(localStorage.getItem(K+'autoSpeak')!=='off'), dictation:false, dictRevealed:false, dictResult:null, dictTimer:null, history:[] };
let WS = {};
try { WS = JSON.parse(localStorage.getItem(K+'vocabState')||'{}'); } catch(e){ WS={}; }
const saveWS = ()=>localStorage.setItem(K+'vocabState', JSON.stringify(WS));
let MASTERED = {};
try { const _m=JSON.parse(localStorage.getItem(K+'vocabMastered')||'{}');
  if(Array.isArray(_m)){ MASTERED={}; _m.forEach(w=>MASTERED[w]={time:0,level:0}); }  // 旧数组→对象(到期回归)
  else MASTERED=_m;
}catch(e){ MASTERED={}; }
const saveMastered = ()=>localStorage.setItem(K+'vocabMastered', JSON.stringify(MASTERED));
const COOL_DAYS=[1,3,7,15,30];   // 艾宾浩斯冷却阶梯(天)
function mastery(w){ const s=WS[w]||{}; const k=s.k||0,u=s.u||0; return k/(k+u+1); }
function timeFactor(w){ const s=WS[w]; if(!s||!s.t) return 1.5;
  const d=(Date.now()-s.t)/86400000; if(d<1)return 1; if(d<3)return 1.4; if(d<7)return 1.9; if(d<15)return 2.6; return 3.5; }
function isCooling(w){ const m=MASTERED[w]; if(!m) return false;
  return (Date.now()-(m.time||0)) < (COOL_DAYS[Math.min(m.level||0,4)]||30)*86400000; }
function masteredCount(){ return WORDS.filter(w=>mastery(w.w)>=0.7 && WS[w.w] && WS[w.w].k>=1).length; }
let TOTAL_TIME = parseInt(localStorage.getItem(K+'totalTime')||'0',10)||0;
function fmtTime(ms){ const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
  if(h>0) return h+'时'+m+'分'; if(m>0) return m+'分'; return s+'秒'; }
const pct = n => Math.round(n/WORDS.length*100);
const $ = ()=>document.getElementById('app');

// === 烟花效果：点"会"触发，约1秒，每次随机（调色板/粒子数/形态/位置/次数）===
let fwCanvas=null, fwCtx=null, particles=[];
function fwInit(){
  fwCanvas=document.createElement('canvas');
  fwCanvas.style.cssText='position:fixed;top:0;left:0;pointer-events:none;z-index:9999';
  document.body.appendChild(fwCanvas);
  fwCtx=fwCanvas.getContext('2d');
  fwResize(); window.addEventListener('resize',fwResize);
  requestAnimationFrame(fwLoop);
}
function fwResize(){
  const d=window.devicePixelRatio||1;
  fwCanvas.width=innerWidth*d; fwCanvas.height=innerHeight*d;
  fwCanvas.style.width=innerWidth+'px'; fwCanvas.style.height=innerHeight+'px';
  fwCtx.setTransform(d,0,0,d,0,0);
}
function fwLoop(){
  fwCtx.clearRect(0,0,innerWidth,innerHeight);
  if(particles.length){
    fwCtx.globalCompositeOperation='lighter';
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.vy+=0.06; p.vx*=0.985; p.vy*=0.985;
      p.x+=p.vx; p.y+=p.vy; p.life--;
      fwCtx.globalAlpha=Math.max(0,p.life/p.max);
      fwCtx.fillStyle=p.c;
      fwCtx.beginPath(); fwCtx.arc(p.x,p.y,p.r,0,6.2832); fwCtx.fill();
      if(p.life<=0) particles.splice(i,1);
    }
    fwCtx.globalAlpha=1; fwCtx.globalCompositeOperation='source-over';
  }
  requestAnimationFrame(fwLoop);
}
const FW_PAL=[['#ff4757','#ffa502','#ffdd59','#ffffff'],['#5352ed','#3742fa','#70a1ff','#ffffff'],
  ['#2ed573','#7bed9f','#f1f2f6','#ffffff'],['#ff6b81','#ff9ff3','#feca57','#ffffff'],
  ['#48dbfb','#0abde3','#00d2d3','#ffffff'],['#a55eea','#d4a3ff','#ff9ff3','#ffffff']];
function fwBurst(x,y){
  const pal=FW_PAL[(Math.random()*FW_PAL.length)|0];
  const n=40+((Math.random()*50)|0);
  const ring=Math.random()<0.5, spin=Math.random()*6.2832;
  for(let i=0;i<n;i++){
    const ang = ring ? spin+(6.2832/n)*i+(Math.random()-0.5)*0.25 : Math.random()*6.2832;
    const sp = (ring?2.5:1) + Math.random()*(ring?3.5:5);
    particles.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      r:1.3+Math.random()*2.2, c:pal[(Math.random()*pal.length)|0],
      life:36+((Math.random()*30)|0), max:60});
  }
}
function fireworks(){
  if(!fwCanvas) fwInit();
  const times=2+((Math.random()*2)|0);   // 2~3 次爆炸
  for(let i=0;i<times;i++){
    setTimeout(()=>{
      fwBurst(innerWidth*(0.15+Math.random()*0.7), innerHeight*(0.12+Math.random()*0.45));
    }, i*(220+Math.random()*180));
  }
}

function speakWord(){
  if(!S.autoSpeak || S.cur===null || typeof speechSynthesis==='undefined') return;
  const idx = S.mode==='browse' ? S.pool[S.cur] : S.cur;
  const w = WORDS[idx] && WORDS[idx].w;
  if(!w) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(w);
    u.lang='en-US'; u.rate=0.9;
    // 显式挑选美式英语 voice，确保美式发音（依赖设备已安装该语音）
    const vs = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
    const v = vs.find(x=>/en[-_]US/i.test(x.lang)) || vs.find(x=>/^en/i.test(x.lang));
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function speakWordForce(){
  if(S.cur===null || typeof speechSynthesis==='undefined') return;
  const idx = S.mode==='browse' ? S.pool[S.cur] : S.cur;
  const w = WORDS[idx] && WORDS[idx].w;
  if(!w) return;
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(w);
    u.lang='en-US'; u.rate=0.9;
    const vs = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
    const v = vs.find(x=>/en[-_]US/i.test(x.lang)) || vs.find(x=>/^en/i.test(x.lang));
    if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
if(typeof speechSynthesis!=='undefined' && 'onvoiceschanged' in speechSynthesis){
  speechSynthesis.onvoiceschanged = ()=>{};   // 触发系统语音列表加载
}
function toggleSpeak(){
  S.autoSpeak=!S.autoSpeak;
  localStorage.setItem(K+'autoSpeak', S.autoSpeak?'on':'off');
  if(!S.autoSpeak && typeof speechSynthesis!=='undefined') speechSynthesis.cancel();
  if(S.autoSpeak) speakWord();
  render();
}

function render(){
  $().style.maxWidth = S.view==='card' ? '100%' : '';
  if(S.view==='mode')   $().innerHTML = modeHTML();
  else if(S.view==='day') $().innerHTML = dayHTML();
  else if(S.mode==='browse'){ $().innerHTML = browseHTML(); bindSwipeAll(); }
  else { $().innerHTML = cardHTML(); bindSwipeAll(); }
}

function dayHTML(){
  const cbs = DAYS.map(d=>`<label class="day"><input type="checkbox" class="day-cb" value="${d}" onchange="this.parentNode.classList.toggle('on',this.checked);updDayCnt()">Day ${d}</label>`).join('');
  return `<div class="wrap">
    <h1>选择 Day</h1>
    <p class="sub">可多选 · 共 ${DAYS.length} 天 · 已选 <span id="dcnt">0</span></p>
    <div class="day-grid">${cbs}</div>
    <div class="big-btns">
      <button class="big ghost" onclick="toggleAll()">全选/反选</button>
      <button class="big" onclick="${S.dayTarget==='browse'?'startBrowse':'startTest'}()">${S.dayTarget==='browse'?'开始背默':'开始测试'}</button>
    </div>
    <button class="link" onclick="goMode()">← 返回</button>
  </div>`;
}

function cardHTML(){
  const w = WORDS[S.cur];
  const defs = w.defs.map(d=>{
    const ex = d.ex.find(e=>e.l===S.level) || d.ex[0] || null;
    return `<div class="def"><div class="pos-m"><span class="pos">${d.pos||''}</span><span class="m">${d.m||''}</span></div>
      ${ex?`<div class="ex"><div class="en">${ex.en}</div><div class="zh">${ex.zh}</div></div>`:''}</div>`;
  }).join('');
  const tag = S.mode==='test' ? ('测试 · Day '+S.days.join(',')) : '复习';
  const lvlBtns = [1,2,3].map(n=>`<button class="${S.level===n?'on':''}" onclick="event.stopPropagation();setLevel(${n})">${n}</button>`).join('');
  const dictBtn = S.mode==='test' ? ` <button class="spk ${S.dictation?'on':''}" onclick="toggleDictation()">${S.dictation?'📝听写':'📝自测'}</button>` : '';
  let cardBody, ansBtns, cardClick;
  if(S.mode==='test' && S.dictation){
    cardClick='';
    if(!S.dictRevealed){
      cardBody = `<div class="dict-area">
        <div class="dict-hint">🔊 听写 · 朗读两遍，写出单词并回车提交</div>
        <input id="dictInput" class="dict-input" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="输入单词，回车提交" onkeydown="if(event.key==='Enter')revealDict()">
        <button type="button" class="spk" onclick="speakWordForce()">🔊 再听一遍</button>
      </div>`;
      ansBtns = '';
    } else {
      const mark = `<span class="dict-mark ${S.dictResult==='ok'?'ok':'no'}">${S.dictResult==='ok'?'✓':'✗ '+w.w}</span>`;
      cardBody = `<div class="word">${w.w}</div><div class="ph">${w.ph||''}</div>${mark}<div style="margin:12px 0"><button type="button" class="spk" onclick="speakWordForce()">🔊 再听一遍</button></div><div class="defs">${defs}</div>`;
      ansBtns = `<button class="yes" id="dictNextBtn" onclick="dictNext()">下一个</button>`;
    }
  } else {
    cardClick=' onclick="flip()"';
    cardBody = S.flipped
      ? `<div class="word">${w.w}</div><div class="ph">${w.ph||''}</div><div class="defs">${defs}</div>`
      : `<div class="word">${w.w}</div><div class="ph">${w.ph||''}</div><div class="tap">点击查看释义与例句</div>`;
    ansBtns = `<button class="no" onclick="answer(false)">不会</button><button class="yes" onclick="answer(true)">会</button>`;
  }
  return `<div class="topbar">
      <span class="tag">${tag}</span>
      <div class="lvl">难度${lvlBtns}${dictBtn}</div>
      <button class="link" onclick="goMode()">退出</button>
    </div>
    <div class="stage"><div class="card"${cardClick}>${cardBody}</div></div>
    <div class="progress">本次 · 会 ${S.yes} · 不会 ${S.no}　<button class="spk" onclick="toggleSpeak()">${S.autoSpeak?'🔊朗读':'🔇静音'}</button></div>
    <div class="ans">${ansBtns}</div>`;
}

function goMode(){
  clearDictTimer();
  if(S.startTime){ TOTAL_TIME += Date.now()-S.startTime; S.startTime=null; localStorage.setItem(K+'totalTime', TOTAL_TIME); }
  S.view='mode'; S.mode=null; render();
}
function goDay(target){ S.dayTarget=target||'test'; S.view='day'; render(); updDayCnt(); }
function updDayCnt(){ const n=document.querySelectorAll('.day-cb:checked').length; const e=document.getElementById('dcnt'); if(e) e.textContent=n; }
function toggleAll(){ const cbs=[...document.querySelectorAll('.day-cb')]; const all=cbs.every(c=>c.checked); cbs.forEach(c=>{c.checked=!all; c.parentNode.classList.toggle('on',c.checked);}); updDayCnt(); }

function startReview(){
  let _due=0; for(const w in MASTERED){ if(!isCooling(w)) _due++; }
  if(Object.keys(WS).length===0 && _due===0){ alert('尚无复习记录，请先到「背默/测试」学习一些单词。'); return; }
  S.mode='review'; S.yes=0; S.no=0; S.last=null; S.lastWord=null; S.flipped=false; S.startTime=Date.now(); S.history=[];
  if(!nextCard()){ alert('无可用单词'); goMode(); return; }
  S.view='card'; render();
}
function startTest(){
  S.days = [...document.querySelectorAll('.day-cb:checked')].map(cb=>+cb.value);
  if(!S.days.length){ alert('请至少选择一个 Day'); return; }
  S.pool = []; WORDS.forEach((w,i)=>{ if(S.days.includes(w.day)) S.pool.push(i); });
  S.mode='test'; S.yes=0; S.no=0; S.last=null; S.flipped=false; S.startTime=Date.now(); S.history=[];
  S.dictRevealed=false; S.dictResult=null;
  if(!nextCard()){ alert('所选 Day 无单词'); goMode(); return; }
  S.view='card';
  if(S.dictation){ render(); startDictation(); } else render();
}

function nextCard(){
  let idx;
  if(S.mode==='test'){
    if(!S.pool.length) return false;
    let t=0;
    do{ idx=S.pool[(Math.random()*S.pool.length)|0]; t++; }
    while(idx===S.last && S.pool.length>1 && t<6);
  } else {
    const keys=Object.keys(WS);
    const due=[]; for(const w in MASTERED){ if(!isCooling(w) && !(w in WS)) due.push(w); }  // 到期回归词
    const all=[...keys,...due];
    if(!all.length) return false;
    let tot=0;
    const items=all.map(k=>{
      const s=WS[k]||{}, u=s.u||0, kn=s.k||0;
      let wt = (1 + u*2.0) * (1.35 - kn/(kn+u+1)) * timeFactor(k);   // 综合:不会数+掌握度+时间衰减
      if(MASTERED[k] && !isCooling(k)) wt*=1.3;   // 到期回归词加权
      if(k===S.lastWord) wt*=0.05;
      tot += wt; return {k,wt};
    });
    let r=Math.random()*tot, pick=items[0].k;
    for(const it of items){ r-=it.wt; if(r<=0){ pick=it.k; break; } }
    idx = IDX[pick]; if(idx===undefined) return false;
    S.lastWord = pick;
  }
  S.last = S.cur; S.cur = idx; S.flipped = false; S.history.push(idx); if(!(S.mode==='test'&&S.dictation)) speakWord(); return true;
}

function flip(){ if(S.cur===null) return; S.flipped=!S.flipped; render(); }
function setLevel(n){ S.level=n; render(); }

function answer(known){
  if(S.cur===null) return;
  const w = WORDS[S.cur].w;
  if(!WS[w]) WS[w]={k:0,u:0};
  if(known){ WS[w].k++; S.yes++; } else { WS[w].u++; S.no++; }
  WS[w].t=Date.now(); saveWS();
  if(MASTERED[w]){   // 回归词: 对→延长冷却进阶, 错→解除掌握
    if(known){ MASTERED[w]={time:Date.now(),level:Math.min((MASTERED[w].level||0)+1,4)}; }
    else { delete MASTERED[w]; }
    saveMastered();
  }
  if(known) fireworks();
  if(S.mode==='test' && S.pool.length===0){ finish(); return; }
  if(!nextCard()){ finish(); return; }
  render();
}
function finish(){ alert('本轮完成！\n会 '+S.yes+' · 不会 '+S.no); goMode(); }

// === 浏览模式：直接展开全部释义，上一个/下一个 + 左右划 ===
function startBrowse(){
  S.days = [...document.querySelectorAll('.day-cb:checked')].map(cb=>+cb.value);
  if(!S.days.length){ alert('请至少选择一个 Day'); return; }
  S.pool = []; WORDS.forEach((w,i)=>{ if(S.days.includes(w.day) && !isCooling(w.w)) S.pool.push(i); });
  if(!S.pool.length){ alert('所选 Day 的单词已全部掌握 🎉'); goMode(); return; }
  S.mode='browse'; S.cur=0; S.flipped=false; S.startTime=Date.now();
  S.view='card'; render(); speakWord();
}
function browseHTML(){
  const w = WORDS[S.pool[S.cur]];
  const defs = w.defs.map(d=>{
    const ex = d.ex.find(e=>e.l===S.level) || d.ex[0] || null;
    return `<div class="def"><div class="pos-m"><span class="pos">${d.pos||''}</span><span class="m">${d.m||''}</span></div>
      ${ex?`<div class="ex"><div class="en">${ex.en}</div><div class="zh">${ex.zh}</div></div>`:''}</div>`;
  }).join('');
  const lvlBtns = [1,2,3].map(n=>`<button class="${S.level===n?'on':''}" onclick="setLevel(${n})">${n}</button>`).join('');
  return `<div class="topbar">
    <span class="tag">背默 · Day ${S.days.join(',')}</span>
    <div class="lvl">难度${lvlBtns}</div>
    <button class="link" onclick="goMode()">退出</button>
  </div>
  <div class="stage browse-stage">
    <div class="card browsed" id="bcard">
      <div class="word-bar">
        <button class="nav-arrow" onclick="browsePrev()" aria-label="上一个">‹</button>
        <div class="word-row"><div class="word">${w.w}</div><div class="ph">${w.ph||''}</div></div>
        <button class="nav-arrow" onclick="browseNext()" aria-label="下一个">›</button>
      </div>
      <div class="defs">${defs}</div>
    </div>
  </div>
  <div class="progress">${S.pool.length?(S.cur+1):0} / ${S.pool.length}　·　左右划 / ‹› 切换　<button class="spk" onclick="toggleSpeak()">${S.autoSpeak?'🔊朗读':'🔇静音'}</button></div>
  <div class="ans">
    <button class="yes" onclick="markMastered()">已掌握</button>
  </div>`;
}
function browseNext(){
  if(S.cur >= S.pool.length-1){
    if(confirm('已浏览全部单词，是否再来一遍？')){ S.cur=0; enterBrowseWord(); }
    else goMode();
    return;
  }
  S.cur++; enterBrowseWord();
}
function browsePrev(){ if(S.cur>0){ S.cur--; enterBrowseWord(); } }
function markMastered(){
  if(S.cur===null || !S.pool.length) return;
  const w = WORDS[S.pool[S.cur]].w;
  const lv = ((MASTERED[w] && MASTERED[w].level) || -1) + 1;
  MASTERED[w] = {time:Date.now(), level:Math.min(lv,4)};   // 掌握 + 冷却阶梯进阶
  saveMastered();
  S.pool.splice(S.cur,1);
  if(!S.pool.length){ alert('所选单词已全部掌握 🎉\n已掌握词将在 1/3/7/15/30 天后自动回归复习'); goMode(); return; }
  if(S.cur >= S.pool.length) S.cur = S.pool.length-1;
  enterBrowseWord();
}
function clearDictTimer(){ if(S.dictTimer){ clearTimeout(S.dictTimer); S.dictTimer=null; } }
function toggleDictation(){
  if(S.mode!=='test') return;            // 仅测试模式支持听写
  S.dictation=!S.dictation; clearDictTimer();
  S.dictRevealed=false; S.dictResult=null;
  if(S.dictation){ render(); startDictation(); } else render();
}
function startDictation(){
  S.dictRevealed=false;
  speakWordForce();
  setTimeout(()=>{ if(S.mode==='test' && S.dictation && !S.dictRevealed) speakWordForce(); }, 1800);
  const inp=document.getElementById('dictInput'); if(inp) inp.focus();
}
function revealDict(){
  clearDictTimer();
  const inp=document.getElementById('dictInput');
  const ans=inp?inp.value.trim().toLowerCase():'';
  const orig = WORDS[S.cur] && WORDS[S.cur].w;
  const ok = ans && orig && ans===orig.toLowerCase();
  S.dictResult = ok?'ok':'no';
  if(S.mode==='test'){ if(ok) S.yes++; else S.no++; }
  if(orig){   // 听写结果入库(驱动复习权重)
    if(!WS[orig]) WS[orig]={k:0,u:0};
    if(ok) WS[orig].k++; else WS[orig].u++;
    WS[orig].t=Date.now(); saveWS();
    if(MASTERED[orig]){ if(ok){ MASTERED[orig]={time:Date.now(),level:Math.min((MASTERED[orig].level||0)+1,4)}; } else { delete MASTERED[orig]; } saveMastered(); }
    if(ok) fireworks();
  }
  S.dictRevealed=true;
  render();
  const nb=document.getElementById('dictNextBtn'); if(nb) nb.focus();
}
function dictNext(){
  S.dictRevealed=false; S.dictResult=null;
  if(!nextCard()){ finish(); return; }
  render(); startDictation();
}
function enterBrowseWord(){ render(); speakWord(); }
function nextWord(){
  if(S.mode==='browse') browseNext();
  else { if(!nextCard()) finish(); }
}
function prevWord(){
  if(S.mode==='browse') browsePrev();
  else if(S.history.length>1){
    S.history.pop(); S.cur=S.history[S.history.length-1]; S.flipped=false;
    S.dictRevealed=false; S.dictResult=null;
    render();
    if(S.mode==='test'&&S.dictation) startDictation(); else speakWord();
  }
}
function bindSwipeAll(){
  const el = document.querySelector('.stage') || document.getElementById('bcard');
  if(!el || el._sw) return; el._sw=true;
  el.style.touchAction = S.mode==='test' && !S.dictation ? 'none' : 'pan-y';
  let sx=0, sy=0, act=false, dec=0;
  el.addEventListener('touchstart', e=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; act=true; dec=0; el.style.transition='none'; }, {passive:true,capture:true});
  el.addEventListener('touchmove', e=>{ if(!act) return; const t=e.touches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(!dec && (Math.abs(dx)>10||Math.abs(dy)>10)) dec = Math.abs(dx)>Math.abs(dy)?1:2;
    if(dec===1){ e.preventDefault(); el.style.transform='translate('+dx+'px,0)'; }   // 水平跟手
  }, {passive:false,capture:true});
  el.addEventListener('touchend', e=>{ if(!act) return; act=false; el.style.transition='transform .2s'; el.style.transform='';
    const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy; const TH=50;
    if(dec===1 && Math.abs(dx)>TH){ dx<0 ? nextWord() : prevWord(); }
    else if(dec===2 && Math.abs(dy)>TH && S.mode==='test' && !S.dictation){ dy<0 ? answer(true) : answer(false); }
  }, {passive:true,capture:true});
}

render();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
