{"l":2,"en":"The farmers who grow rice in this village sell their crops to the market every autumn.","zh":"这个村子里种稻子的农民每年秋天把庄稼卖到市场。"},{"l":3,"en":"Only when the farmers are properly paid will they have enough courage to continue working the land year after year.","zh":"只有当农民得到合理的报酬时，他们才会有足够的勇气年复一年地继续耕种这片土地。"}]}]},{"day":19,"w":"fashion","ph":"","defs":[{"pos":"n.","m":"时尚","ex":[{"l":1,"en":"Long skirts are in fashion this year.","zh":"今年长裙很流行。"},{"l":2,"en":"Many teenagers follow the latest fashion because they want to look cool among their friends.","zh":"许多青少年追随最新时尚，因为他们想在朋友中显得很酷。"},{"l":3,"en":"What surprises me most is that the simple style has come back into fashion after being forgotten for years.","zh":"最令我惊讶的是，这种朴素的风格在被遗忘多年后又重新流行起来。"}]}]},{"day":19,"w":"fast","ph":"","defs":[{"pos":"adj.","m":"快的，迅速的","ex":[{"l":1,"en":"My watch is fast and your watch is slow.","zh":"我的表快了，你的表慢了。"},{"l":2,"en":"The fast train that runs between the two cities takes only thirty minutes.","zh":"往返于两座城市之间的那列快车只需要三十分钟。"},{"l":3,"en":"Such a fast pace of life leaves young people little time to sit down and talk with their parents.","zh":"如此快的生活节奏让年轻人几乎没有时间坐下来和父母交谈。"}]},{"pos":"adv.","m":"快地，迅速地","ex":[{"l":1,"en":"My watch is fast and your watch is slow.","zh":"我的表快了，你的表慢了。"},{"l":2,"en":"He ran so fast that nobody in our class could catch up with him.","zh":"他跑得太快了，我们班上没有人能追上他。"},{"l":3,"en":"The harder you work, the faster you will master a foreign language, as many successful learners have proved.","zh":"正如许多成功的学习者所证明的那样，你越努力，就越快掌握一门外语。"}]}]},{"day":20,"w":"fasten","ph":"","defs":[{"pos":"v.","m":"系；扎","ex":[{"l":1,"en":"Please fasten your seat belt in the car.","zh":"请在车里系好安全带。"},{"l":2,"en":"Before the plane takes off, the air hostess asks all the passengers to fasten their seat belts.","zh":"飞机起飞前，空姐要求所有乘客系好安全带。"},{"l":3,"en":"Remember to fasten your coat tightly, for the wind outside is much stronger than we expected.","zh":"记得把外套系紧，因为外面的风比我们预料的要猛烈得多。"}]}]},{"day":20,"w":"fat","ph":"","defs":[{"pos":"adj.","m":"胖的；肥的","ex":[{"l":1,"en":"The fat cat is sleeping on the sofa.","zh":"那只胖猫正在沙发上睡觉。"},{"l":2,"en":"The doctor told my grandfather that eating too much fat meat was bad for his health.","zh":"医生告诉我爷爷，吃太多肥肉对他的健康不好。"},{"l":3,"en":"Though some kids think being a bit fat means being healthy, doctors warn that extra weight may bring trouble.","zh":"虽然有些孩子觉得稍微胖一点意味着健康，但医生警告说，多余的体重可能带来麻烦。"}]},{"pos":"n.","m":"脂肪","ex":[{"l":1,"en":"Butter has a lot of fat in it.","zh":"黄油里含有大量脂肪。"},{"l":2,"en":"If you want to lose weight, you should eat less food that is high in fat.","zh":"如果你想减肥，就应该少吃高脂肪的食物。"},{"l":3,"en":"What worries the teacher most is that the fast food contains too much fat and salt for growing children.","zh":"最令老师担心的是，这些快餐对正在长身体的孩子来说含有太多的脂肪和盐分。"}]}]},{"day":20,"w":"father","ph":"","defs":[{"pos":"n.","m":"父亲","ex":[{"l":1,"en":"But last Friday morning, my father came to my school.","zh":"但是上周五早上，我爸爸来到了我的学校。"},{"l":2,"en":"After his amazing talk, I understand why my father is busy.","zh":"在他精彩的演讲之后，我明白了为什么我爸爸那么忙。"},{"l":3,"en":"It was my father who first taught me that honesty matters more than any prize in the world.","zh":"正是我父亲最先教会我，诚实比世上任何奖品都更重要。"}]}]},{"day":20,"w":"favour","ph":"","defs":[{"pos":"n.","m":"恩惠；好意；帮助","ex":[{"l":1,"en":"Can you do me a favour, please?","zh":"请问你能帮我一个忙吗？"},{"l":2,"en":"I will do you a favour if you promise to finish the homework on time.","zh":"如果你保证按时完成作业，我就帮你一个忙。"},{"l":3,"en":"Never will I forget the favour she did for me when my family was in deep trouble.","zh":"我永远不会忘记我家深陷困境时她给予我的帮助。"}]}]},{"day":20,"w":"favourite","ph":"","defs":[{"pos":"adj.","m":"最喜爱的","ex":[{"l":1,"en":"Red is my favourite colour.","zh":"红色是我最喜欢的颜色。"},{"l":2,"en":"The book that you lent me is my favourite novel of this year.","zh":"你借给我的那本书是我今年最喜欢的小说。"},{"l":3,"en":"Hidden among these old photos is my favourite picture of my mother when she was young.","zh":"在这些旧照片中藏着我妈妈年轻时我最喜欢的那张照片。"}]},{"pos":"n.","m":"特别喜爱的人（或物）","ex":[{"l":1,"en":"This song is a favourite of mine.","zh":"这首歌是我的心头好。"},{"l":2,"en":"Ice cream is a favourite among children when summer comes to the small town.","zh":"当夏天来到这座小镇时，冰淇淋是孩子们最喜爱的东西。"},{"l":3,"en":"Of all the dishes my grandmother cooks, the sweet soup has long been the family favourite.","zh":"在我奶奶做的所有菜中，那道甜汤一直是全家人的最爱。"}]}]},{"day":20,"w":"fear","ph":"","defs":[{"pos":"n.","m":"害怕，恐惧","ex":[{"l":1,"en":"The little girl has a fear of dogs.","zh":"那个小女孩害怕狗。"},{"l":2,"en":"She could not speak in public because of the fear that everyone would laugh at her.","zh":"她不敢在公开场合讲话，因为害怕大家都会嘲笑她。"},{"l":3,"en":"Only by facing our fear can we find the courage hidden deep inside our hearts.","zh":"只有正视我们的恐惧，我们才能找到深藏于内心的勇气。"}]}]},{"day":20,"w":"February","ph":"","defs":[{"pos":"n.","m":"二月","ex":[{"l":1,"en":"You were here in February, weren't you?","zh":"你二月份在这里，不是吗？"},{"l":2,"en":"I remember that we met in February, when the snow was still covering the whole field.","zh":"我记得我们是在二月相遇的，那时雪还覆盖着整片田野。"},{"l":3,"en":"It was in February that the brave girl made up her mind to travel alone for the first time.","zh":"正是在二月，这个勇敢的女孩下定决心第一次独自旅行。"}]}]},{"day":20,"w":"feed","ph":"","defs":[{"pos":"v.","m":"喂养，饲养","ex":[{"l":1,"en":"The girl feeds the cat every morning.","zh":"那个女孩每天早上喂猫。"},{"l":2,"en":"The old man who lives next door feeds the birds on the balcony before breakfast.","zh":"住在隔壁的那位老人早饭前在阳台上喂鸟。"},{"l":3,"en":"Having fed the animals, the children sat under the tree and watched the sun go down slowly.","zh":"喂完动物后，孩子们坐在树下，看着太阳慢慢落下。"}]}]},{"day":20,"w":"feel","ph":"","defs":[{"pos":"v.&link.","m":"感觉，觉得；摸，触","ex":[{"l":1,"en":"He might feel happy because Grandma loved his gift.","zh":"他可能会感到高兴，因为奶奶喜欢他的礼物。"},{"l":2,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，当他们生活中遇到困难时，可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":3,"en":"Only after you tell the truth will you feel the heavy stone in your heart finally fall away.","zh":"只有说出真相之后，你才会感到心中的那块石头终于落下。"}]}]},{"day":20,"w":"female","ph":"","defs":[{"pos":"adj.","m":"女的；女性的；雌性的","ex":[{"l":1,"en":"A female teacher is reading a story to the children.","zh":"一位女老师正在给孩子们讲故事。"},{"l":2,"en":"The female scientist who won the prize has spent twenty years studying the sea.","zh":"获奖的那位女科学家花了二十年时间研究大海。"},{"l":3,"en":"In the past, few female workers were allowed to take such important roles in the factory.","zh":"过去，很少有女工被允许在工厂里担任如此重要的角色。"}]}]},{"day":20,"w":"fence","ph":"","defs":[{"pos":"n.","m":"栅栏；围栏；篱笆","ex":[{"l":1,"en":"There is a wooden fence around the garden.","zh":"花园周围有一道木栅栏。"},{"l":2,"en":"The white fence that stands behind the house was painted by the children last weekend.","zh":"房子后面那道白色栅栏是孩子们上周末刷的。"},{"l":3,"en":"Not until he climbed over the old fence did he discover the secret garden full of red roses.","zh":"直到翻过那道旧栅栏，他才发现那座开满红玫瑰的秘密花园。"}]}]},{"day":20,"w":"ferry","ph":"","defs":[{"pos":"n.","m":"渡船","ex":[{"l":1,"en":"We took a ferry to cross the river.","zh":"我们乘渡船过河。"},{"l":2,"en":"The ferry which runs between the two islands every hour is the only way for villagers to reach the city.","zh":"每小时在两座岛屿之间运营的那艘渡船，是村民前往城市的唯一通道。"},{"l":3,"en":"Not until the new ferry was put into use did people realize how convenient it would be to travel between the two cities across the wide river.","zh":"直到新渡船投入使用后，人们才意识到在宽阔河流两岸的两座城市之间往返将会多么便利。"}]}]},{"day":20,"w":"festival","ph":"","defs":[{"pos":"n.","m":"节日","ex":[{"l":1,"en":"Spring Festival is my favorite festival.","zh":"春节是我最喜欢的节日。"},{"l":2,"en":"During the festival, children receive red packets from their relatives, and the whole family enjoys a big dinner together.","zh":"节日期间，孩子们会收到亲戚的红包，全家人一起享用丰盛的晚餐。"},{"l":3,"en":"It is the lantern festival that reminds many Chinese people of their childhood, when they would carry paper lanterns through the narrow streets at night.","zh":"正是元宵节让许多中国人想起童年，那时他们会提着纸灯笼夜晚穿行在狭窄的街道上。"}]}]},{"day":20,"w":"fever","ph":"","defs":[{"pos":"n.","m":"发烧，发热","ex":[{"l":1,"en":"The boy has a high fever today.","zh":"这个男孩今天发高烧了。"},{"l":2,"en":"Because she had a fever, her mother took her to the hospital to see a doctor at once.","zh":"因为她发烧了，妈妈立刻带她去医院看医生。"},{"l":3,"en":"Having suffered from a high fever for three days, the little girl was finally sent to the hospital, where the doctors took good care of her.","zh":"持续高烧三天后，小女孩终于被送到了医院，在那里医生们对她进行了悉心照料。"}]}]},{"day":20,"w":"few","ph":"","defs":[{"pos":"pron.","m":"不多；少数","ex":[{"l":1,"en":"It’s a few minutes after two.","zh":"现在是两点过几分。"},{"l":2,"en":"First find out about the school.Read the school introductions and look at the school websites.Then think about yourself—your strong points and weak ones.Try to find a few examples you could give the interviewers.","zh":"先了解学校的情况。阅读学校介绍并查看学校网站。然后想想你自己——你的优点和缺点。试着找出几个可以给面试官的例子。"},{"l":3,"en":"Only a few of the students who entered the speech competition managed to make it to the final round held at the city hall.","zh":"参加演讲比赛的学生中，只有少数人成功进入了在市政厅举行的决赛阶段。"}]},{"pos":"adj.","m":"不多的；少数的","ex":[{"l":1,"en":"It’s a few minutes after two.","zh":"现在是两点过几分。"},{"l":2,"en":"First find out about the school.Read the school introductions and look at the school websites.Then think about yourself—your strong points and weak ones.Try to find a few examples you could give the interviewers.","zh":"先了解学校的情况。阅读学校介绍并查看学校网站。然后想想你自己——你的优点和缺点。试着找出几个可以给面试官的例子。"},{"l":3,"en":"Though there were only a few students in the reading club, they kept meeting every Friday afternoon to share what they had read during the week.","zh":"虽然读书社里只有少数几个学生，但他们坚持每周五下午聚会，分享这一周读过的内容。"}]}]},{"day":20,"w":"field","ph":"","defs":[{"pos":"n.","m":"天地；牧地；场地","ex":[{"l":1,"en":"The children are playing in the field.","zh":"孩子们在田野里玩耍。"},{"l":2,"en":"The farmer was working in the field when it suddenly began to rain heavily.","zh":"那位农夫正在田里干活时，突然下起了大雨。"},{"l":3,"en":"Walking across the wide green field early in the morning, the old man always remembers the days when he used to run and play here with his friends.","zh":"清晨走过那片宽阔的绿色田野时，老人总会想起从前和朋友们在这里奔跑玩耍的日子。"}]}]},{"day":20,"w":"fight","ph":"","defs":[{"pos":"v.&n.","m":"打仗；打架；争论","ex":[{"l":1,"en":"When an animal is under attack, it can run away or fight back.","zh":"当动物受到攻击时，它可以逃跑或反击。"},{"l":2,"en":"The two boys had a fight over a toy, but they soon became good friends again and played together.","zh":"这两个男孩为了一个玩具打了一架，但很快又成了好朋友，一起玩了起来。"},{"l":3,"en":"Having fought against the disease for many years, the scientist finally discovered a new way that could help save thousands of lives.","zh":"与这种疾病抗争多年之后，这位科学家终于发现了一种能帮助拯救数千条生命的新方法。"}]}]},{"day":20,"w":"figure","ph":"","defs":[{"pos":"n.","m":"(人的）体型；外形；数字","ex":[{"l":1,"en":"The figure on the page is hard to read.","zh":"这一页上的数字很难看清。"},{"l":2,"en":"The teacher asked the students to add up all the figures in the table and write down the result.","zh":"老师让学生把表格里所有的数字加起来，并写下结果。"},{"l":3,"en":"It is the latest figures from the report that show how quickly the number of visitors to the museum has grown over the past few months.","zh":"正是报告中的最新数字表明，过去几个月里博物馆的游客数量增长得有多快。"}]}]},{"day":20,"w":"fill","ph":"","defs":[{"pos":"v.","m":"填空；装满；充满","ex":[{"l":1,"en":"John began to play the piano and beautiful music filled the room.","zh":"约翰开始弹钢琴，美妙的音乐充满了整个房间。"},{"l":2,"en":"Please fill in the form carefully before you hand it in to the office.","zh":"请仔细填写这张表格，然后再交到办公室。"},{"l":3,"en":"Filled with excitement, the children ran into the playground, where a huge surprise had been prepared for them by their teachers.","zh":"满怀兴奋的孩子们跑进操场，老师为他们准备了一个巨大的惊喜。"}]}]},{"day":20,"w":"film","ph":"","defs":[{"pos":"n.","m":"电影；影片；胶卷","ex":[{"l":1,"en":"Let’s go to see a film this weekend.","zh":"这个周末我们去看场电影吧。"},{"l":2,"en":"The film that we watched last night was so exciting that I want to see it again.","zh":"我们昨晚看的那部电影太精彩了，我想再看一遍。"},{"l":3,"en":"Not only is the film popular among young people, but it also encourages them to think more deeply about friendship and family.","zh":"这部电影不仅在年轻人中很受欢迎，还鼓励他们更深入地思考友谊与家庭。"}]}]},{"day":20,"w":"final","ph":"","defs":[{"pos":"adj.","m":"最后的；终极的","ex":[{"l":1,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我的最后一点是，虽然有人说拥有东西是一种快乐，但我认为使用你拥有的东西更令人愉悦。"},{"l":2,"en":"After two weeks of hard work, the students finally reached the final stage of the science project.","zh":"经过两周的努力，学生们终于到达了科学项目的最后阶段。"},{"l":3,"en":"It was in the final match that the young player showed great courage, scoring the winning goal just before the whistle was blown.","zh":"正是在决赛中，这位年轻球员展现出巨大的勇气，在哨声吹响前攻入了制胜一球。"}]}]},{"day":20,"w":"finally","ph":"","defs":[{"pos":"adv.","m":"最后；最终","ex":[{"l":1,"en":"Uncle Andy tried ten different jobs, and finally chose to be a lawyer.","zh":"安迪叔叔尝试了十种不同的工作，最后选择做一名律师。"},{"l":2,"en":"And some said they couldn't wait for the project to be finally completed at the end of this year.","zh":"有些人说他们等不及这项工程在今年年底最终完工了。"},{"l":3,"en":"After waiting for more than an hour in the cold wind, the fans finally saw their favorite singer walk onto the stage, smiling and waving.","zh":"在寒风中等待了一个多小时后，歌迷们终于看到他们最喜爱的歌手面带微笑、挥手走上舞台。"}]}]},{"day":20,"w":"find","ph":"","defs":[{"pos":"v.","m":"找到；发现；发觉","ex":[{"l":1,"en":"We thought he had just found better stones than the ones we already had.","zh":"我们以为他只是找到了比我们已有的更好的石头。"},{"l":2,"en":"First find out about the school.Read the school introductions and look at the school websites.Then think about yourself—your strong points and weak ones.Try to find a few examples you could give the interviewers.","zh":"先了解学校的情况。阅读学校介绍并查看学校网站。然后想想你自己——你的优点和缺点。试着找出几个可以给面试官的例子。"},{"l":3,"en":"No matter how hard he tried, he could never find the book that he had lost in the library last month.","zh":"无论他多么努力，都再也找不到他上个月在图书馆丢失的那本书。"}]}]},{"day":20,"w":"fine","ph":"","defs":[{"pos":"adj.","m":"晴朗的；美好的；（身体）健康的","ex":[{"l":1,"en":"Fine,thanks.","zh":"很好，谢谢。"},{"l":2,"en":"If the weather is fine tomorrow, we will have a picnic in the park near our school.","zh":"如果明天天气晴朗，我们就在学校附近的公园野餐。"},{"l":3,"en":"Not only is the weather fine today, but the gentle breeze also makes it a perfect day for an outdoor trip with friends.","zh":"今天天气不仅晴朗，而且微风轻拂，是和朋友户外出游的绝佳日子。"}]}]},{"day":20,"w":"finger","ph":"","defs":[{"pos":"n.","m":"手指","ex":[{"l":1,"en":"I cut my finger by accident.","zh":"我不小心割破了手指。"},{"l":2,"en":"The little girl was so careful that she pointed to each word with her finger while reading.","zh":"小女孩非常认真，读的时候用手指着每一个单词。"},{"l":3,"en":"It was the strong fingers of the old pianist that moved so quickly across the keys, producing music that deeply touched everyone in the hall.","zh":"正是这位老钢琴家有力的手指在琴键上快速移动，奏出了深深打动大厅里每一个人的乐曲。"}]}]},{"day":20,"w":"finish","ph":"","defs":[{"pos":"v.","m":"结束；做完","ex":[{"l":1,"en":"The engineer promised to finish the task as soon as possible.","zh":"这位工程师承诺尽快完成任务。"},{"l":2,"en":"Before you finish your homework, you are not allowed to play computer games with your friends.","zh":"在完成作业之前，你不可以和朋友一起玩电脑游戏。"},{"l":3,"en":"Having finished all the work ahead of time, the team leader decided to give everyone an extra day off as a reward.","zh":"提前完成所有工作后，团队负责人决定给每个人额外放一天假作为奖励。"}]}]},{"day":20,"w":"fire","ph":"","defs":[{"pos":"n.","m":"火；火炉；火灾","ex":[{"l":1,"en":"We learned much about fire and the danger firemen face.","zh":"我们学到了很多关于火以及消防员所面临危险的知识。"},{"l":2,"en":"My father said people should know more about fire safety so that they could protect themselves and their families.","zh":"我父亲说人们应该多了解消防安全，这样他们才能保护自己和家人。"},{"l":3,"en":"It is fire that not only gives us warmth and light but also reminds us to always be careful when we cook at home.","zh":"正是火不仅给了我们温暖和光明，还提醒我们在家做饭时要时刻小心。"}]},{"pos":"v.","m":"开火；开（枪、炮等）；射击","ex":[{"l":1,"en":"The soldiers had to fire at the targets during training.","zh":"士兵们在训练时不得不向目标开火。"},{"l":2,"en":"The officer ordered the soldiers not to fire until they received a clear signal from the captain.","zh":"军官命令士兵们，直到接到队长明确的信号后才可射击。"},{"l":3,"en":"Only when the enemy came close enough did the captain allow his men to fire at the moving targets in the dark.","zh":"只有当敌人足够靠近时，队长才允许士兵在黑暗中向移动的目标开火。"}]}]},{"day":20,"w":"fireman","ph":"","defs":[{"pos":"n.","m":"消防队员","ex":[{"l":1,"en":"To be honest, being a child of a fireman can be difficult.","zh":"说实话，做一名消防员的孩子可能会很不容易。"},{"l":2,"en":"The fireman who saved three people from the burning house became a hero in our city.","zh":"那位从燃烧的房子里救出三个人的消防员成了我们城市的英雄。"},{"l":3,"en":"Not until he grew up did the boy understand why his father, a brave fireman, had to leave home so often in the middle of the night.","zh":"直到长大，这个男孩才明白，为什么他那勇敢的消防员父亲常常不得不在深夜离开家。"}]}]},{"day":20,"w":"firework","ph":"","defs":[{"pos":"n.","m":"焰火","ex":[{"l":1,"en":"We watched beautiful fireworks on New Year’s Eve.","zh":"除夕夜我们观看了美丽的焰火。"},{"l":2,"en":"When the fireworks began to light up the sky, all the people in the square cheered happily.","zh":"当焰火开始照亮天空时，广场上所有的人都高兴地欢呼起来。"},{"l":3,"en":"It was the colorful fireworks that filled the dark sky with light, making the whole city look like a wonderful painting.","zh":"正是五彩缤纷的焰火用光芒填满了黑暗的天空，让整座城市看起来像一幅奇妙的画卷。"}]}]},{"day":20,"w":"first","ph":"","defs":[{"pos":"adj.","m":"第一的；最初的","ex":[{"l":1,"en":"What’s your first name?","zh":"你的名字是什么？"},{"l":2,"en":"My first reason is that experiences make us different as we grow.","zh":"我的第一个理由是，随着我们成长，经历让我们变得与众不同。"},{"l":3,"en":"It is during the first few years of school that children form the habits which will shape the rest of their lives.","zh":"正是在上学的最初几年里，孩子们养成了将影响他们余生的习惯。"}]},{"pos":"adv.","m":"第一；首先，最初","ex":[{"l":1,"en":"What’s your first name?","zh":"你的名字是什么？"},{"l":2,"en":"My first reason is that experiences make us different as we grow.","zh":"我的第一个理由是，随着我们成长，经历让我们变得与众不同。"},{"l":3,"en":"First, you should read the question carefully, and only then can you find the key information hidden in the long passage.","zh":"首先，你应该仔细阅读问题，然后才能找到隐藏在长篇文章中的关键信息。"}]},{"pos":"n.","m":"开始；开端","ex":[{"l":1,"en":"What’s your first name?","zh":"你的名字是什么？"},{"l":2,"en":"My first reason is that experiences make us different as we grow.","zh":"我的第一个理由是，随着我们成长，经历让我们变得与众不同。"},{"l":3,"en":"From the very first of the new term, the teacher encouraged us to set goals that would push us to work harder than before.","zh":"从新学期一开始，老师就鼓励我们制定能促使我们比以前更努力的目标。"}]}]},{"day":21,"w":"fish","ph":"","defs":[{"pos":"n.","m":"鱼；鱼肉","ex":[{"l":1,"en":"I had some fish for lunch today.","zh":"我今天午饭吃了一些鱼肉。"},{"l":2,"en":"The doctor told me that eating more fish is good for my health because it is rich in protein.","zh":"医生告诉我多吃鱼对我的健康有益，因为它富含蛋白质。"},{"l":3,"en":"Not only does fish provide the protein that teenagers need to grow, but it also contains oils that help keep the brain active during long exams.","zh":"鱼肉不仅提供青少年成长所需的蛋白质，还含有在漫长的考试期间帮助大脑保持活跃的油脂。"}]},{"pos":"v.","m":"钓鱼；捕鱼","ex":[{"l":1,"en":"My grandfather likes to fish by the river.","zh":"我爷爷喜欢在河边钓鱼。"},{"l":2,"en":"When we arrived at the lake, the old man was fishing quietly under a big tree.","zh":"当我们到达湖边时，那位老人正在一棵大树下静静地钓鱼。"},{"l":3,"en":"Having fished in this river for over thirty years, the old man knows exactly which season brings the best catch and which corner hides the largest fish.","zh":"在这条河里钓了三十多年鱼，这位老人清楚地知道哪个季节能带来最好的收获，哪个角落藏着最大的鱼。"}]}]},{"day":21,"w":"fisherman","ph":"","defs":[{"pos":"n.","m":"渔夫，渔民","ex":[{"l":1,"en":"The fisherman caught a big fish.","zh":"渔夫捕到了一条大鱼。"},{"l":2,"en":"The fisherman who lives next to the sea has to get up early every morning to check his nets.","zh":"住在海边的那位渔夫每天早上必须早起检查他的渔网。"},{"l":3,"en":"Although the storm had passed, the fisherman still decided to repair his boat carefully before sailing out, for he knew the sea could change in a flash.","zh":"尽管风暴已经过去，这位渔夫仍决定在出海前仔细修理他的船，因为他知道大海可能转瞬之间就变脸。"}]}]},{"day":21,"w":"fit","ph":"","defs":[{"pos":"v.","m":"（使）适合；与...相配","ex":[{"l":1,"en":"This shirt fits me well.","zh":"这件衬衫很适合我。"},{"l":2,"en":"These shoes do not fit you because they are too small for your feet.","zh":"这双鞋不适合你，因为对你的脚来说太小了。"},{"l":3,"en":"What we must find is a plan that fits the needs of every student, so that no one is left behind during the busy exam season.","zh":"我们必须找到的是一个适合每位学生需求的计划，这样在繁忙的考试季就没有人会被落下。"}]},{"pos":"adj.","m":"健康的；合适的","ex":[{"l":1,"en":"Running keeps you fit.","zh":"跑步让你保持健康。"},{"l":2,"en":"If you want to stay fit, you should exercise for at least thirty minutes every day.","zh":"如果你想保持健康，你应该每天至少锻炼三十分钟。"},{"l":3,"en":"Only by keeping fit through regular exercise and a balanced diet can students have enough energy to deal with the heavy pressure of study.","zh":"只有通过有规律的锻炼和均衡的饮食保持健康，学生们才有足够的精力应对沉重的学习压力。"}]}]},{"day":21,"w":"fix","ph":"","defs":[{"pos":"v.","m":"修理；安装；确定；安排；解决","ex":[{"l":1,"en":"My dad can fix this bike.","zh":"我爸爸会修这辆自行车。"},{"l":2,"en":"The worker promised that he would fix my computer before I came back from holiday.","zh":"那位工人答应在我度假回来之前把我的电脑修好。"},{"l":3,"en":"Realizing that the problem was more serious than expected, the engineer worked through the night to fix the machine that the whole factory depended on.","zh":"意识到问题比预想的更严重，这位工程师彻夜工作，修理了整座工厂都依赖的那台机器。"}]}]},{"day":21,"w":"flag","ph":"","defs":[{"pos":"n.","m":"旗；旗舰","ex":[{"l":1,"en":"The red flag is flying high.","zh":"那面红旗高高飘扬。"},{"l":2,"en":"When the national flag was raised, all the students stood quietly and sang the song together.","zh":"当国旗升起时，所有学生都静静地站立，一起唱起了那首歌。"},{"l":3,"en":"It was the flag that had been passed down for years that gave the team the courage to face such a powerful opponent in the final match.","zh":"正是那面传承多年的旗帜，给了这支球队在决赛中面对如此强大对手的勇气。"}]}]},{"day":21,"w":"flash","ph":"","defs":[{"pos":"n.","m":"闪；闪光；转瞬间","ex":[{"l":1,"en":"A flash of light lit up the sky.","zh":"一道闪光照亮了天空。"},{"l":2,"en":"In a flash, the little boy ran across the street before his mother could stop him.","zh":"转瞬间，小男孩就在母亲还没来得及拦住他时跑过了马路。"},{"l":3,"en":"Caught in a sudden flash of lightning, the travelers had no choice but to wait inside the small wooden house until the storm finally died down.","zh":"被突如其来的闪电困住，这些旅行者别无选择，只能在那个小木屋里等待，直到风暴最终平息。"}]}]},{"day":21,"w":"flat","ph":"","defs":[{"pos":"n.","m":"一套房间；公寓","ex":[{"l":1,"en":"We live in a small flat.","zh":"我们住在一套小公寓里。"},{"l":2,"en":"The flat that my aunt bought last year is on the fifth floor of a tall building.","zh":"我姑妈去年买的那套公寓在一栋高楼的五楼。"},{"l":3,"en":"Although the flat was small and rather old, the family managed to turn it into a warm home where everyone felt relaxed after a long day.","zh":"尽管这套公寓又小又相当旧，这家人还是把它变成了一个温暖的家，让每个人在漫长的一天后都能感到放松。"}]}]},{"day":21,"w":"flexible","ph":"","defs":[{"pos":"adj.","m":"能适应新情况的；灵活的；可变动的；柔韧的；有弹性的","ex":[{"l":1,"en":"Our teacher is flexible with homework.","zh":"我们老师对作业很灵活。"},{"l":2,"en":"A good plan should be flexible so that you can change it when something unexpected happens.","zh":"一个好计划应该是灵活的，这样当意外发生时你就可以改变它。"},{"l":3,"en":"What parents need to understand is that a flexible approach to learning often works better than forcing children to follow a fixed timetable day after day.","zh":"家长们需要理解的是，灵活的学习方式往往比强迫孩子们日复一日地遵守固定的时间表更有效。"}]}]},{"day":21,"w":"flight","ph":"","defs":[{"pos":"n.","m":"航班；飞行","ex":[{"l":1,"en":"Our flight was late today.","zh":"我们的航班今天晚点了。"},{"l":2,"en":"The flight that we took last night was delayed because of the heavy rain.","zh":"我们昨晚乘坐的航班因为大雨而延误了。"},{"l":3,"en":"Only after the flight had taken off did she realize that she had left the most important documents on the desk at home.","zh":"直到航班起飞后，她才意识到自己把最重要的文件落在了家里的桌子上。"}]}]},{"day":21,"w":"flood","ph":"","defs":[{"pos":"n.","m":"洪水；水灾","ex":[{"l":1,"en":"The flood destroyed many houses.","zh":"洪水冲毁了许多房屋。"},{"l":2,"en":"After the flood, hundreds of volunteers came to help the people who had lost their homes.","zh":"洪水过后，数百名志愿者前来帮助那些失去家园的人。"},{"l":3,"en":"It was the worst flood in fifty years, yet the whole town worked together so bravely that no family was left without food or shelter.","zh":"这是五十年来最严重的一场洪水，然而整个小镇如此勇敢地团结在一起，以至于没有一个家庭缺少食物或住所。"}]}]},{"day":21,"w":"floor","ph":"","defs":[{"pos":"n.","m":"地面；地板；（楼房的）层","ex":[{"l":1,"en":"The cat is on the floor.","zh":"猫在地板上。"},{"l":2,"en":"Our classroom is on the third floor, so we have to climb the stairs every morning.","zh":"我们的教室在三楼，所以我们每天早上都得爬楼梯。"},{"l":3,"en":"When the bell rang, the children on the ground floor rushed out of the door, their faces filled with joy at the thought of the long holiday ahead.","zh":"铃声响起时，一楼的学生们冲出了门，一想到前面漫长的假期，他们的脸上满是喜悦。"}]}]},{"day":21,"w":"flower","ph":"","defs":[{"pos":"n.","m":"花","ex":[{"l":1,"en":"The flowers look beautiful.","zh":"这些花看起来很漂亮。"},{"l":2,"en":"The flowers that my mother planted in spring have started to open in the warm sun.","zh":"妈妈春天种下的那些花已经在温暖的阳光下开始绽放了。"},{"l":3,"en":"Not until I walked into the garden did I notice the small white flowers that had quietly opened during the night, filling the air with a gentle smell.","zh":"直到走进花园，我才注意到那些在夜里悄悄绽放的小白花，它们使空气中弥漫着一股淡淡的香气。"}]}]},{"day":21,"w":"flu","ph":"","defs":[{"pos":"n.","m":"流感","ex":[{"l":1,"en":"He stayed home because of the flu.","zh":"因为得了流感，他待在家里。"},{"l":2,"en":"The teacher reminded us that washing hands often is one of the best ways to avoid the flu.","zh":"老师提醒我们，经常洗手是避免流感的最好方法之一。"},{"l":3,"en":"Having suffered from the flu for a whole week, the boy finally understood why doctors always say that rest matters as much as medicine.","zh":"病了一整周流感后，这个男孩终于明白为什么医生总是说休息和药物同样重要。"}]}]},{"day":21,"w":"fly","ph":"","defs":[{"pos":"v.","m":"飞行；乘飞机旅行；（旗帜等）飘动；放（风筝、飞机模型等）","ex":[{"l":1,"en":"The kids were excited to see the toy rocket flying into the sky.","zh":"孩子们看到玩具火箭飞向天空，兴奋不已。"},{"l":2,"en":"When the bell rang, the children watched the colourful kites flying high above the playground until they disappeared among the clouds.","zh":"铃声响起时，孩子们看着彩色的风筝在操场上空高高飞翔，直到它们消失在云层中。"},{"l":3,"en":"It was the first time that the little girl had flown alone, and she felt both nervous and proud as the plane rose above the city she had lived in for ten years.","zh":"那是小女孩第一次独自乘飞机旅行，当飞机升上她生活了十年的城市上空时，她既紧张又自豪。"}]},{"pos":"n.","m":"飞机；苍蝇","ex":[{"l":1,"en":"The kids were excited to see the toy rocket flying into the sky.","zh":"孩子们看到玩具火箭飞向天空，兴奋不已。"},{"l":2,"en":"The boy waved his hand quickly to drive away the fly that kept landing on his lunch.","zh":"男孩快速挥手，赶走那只一直落在他午餐上的苍蝇。"},{"l":3,"en":"Only those who have watched a small fly struggle in the web can truly understand how patient a spider must be when waiting for its meal.","zh":"只有亲眼看过一只小苍蝇在蛛网中挣扎的人，才能真正理解蜘蛛在等待猎物时必须多么有耐心。"}]}]},{"day":21,"w":"focus","ph":"","defs":[{"pos":"v.","m":"集中","ex":[{"l":1,"en":"I really need to focus on the report for tomorrow's meeting.","zh":"我确实需要集中精力准备明天会议的报告。"},{"l":2,"en":"When you study, you should focus on your book so that you can understand what the teacher has explained.","zh":"学习时你应该把注意力集中在书本上，这样才能理解老师讲解的内容。"},{"l":3,"en":"Only by focusing fully on what we are doing can we make real progress, no matter how difficult the task may seem.","zh":"无论任务看起来多么困难，只有全身心专注于我们正在做的事，我们才能取得真正的进步。"}]}]},{"day":21,"w":"follow","ph":"","defs":[{"pos":"v.","m":"听从；跟随；仿效；跟得上","ex":[{"l":1,"en":"Please follow the rules in the library.","zh":"请遵守图书馆里的规则。"},{"l":2,"en":"If you want to learn English well, you should follow the advice that your teacher gives you every day.","zh":"如果你想把英语学好，就应该每天听从老师给你的建议。"},{"l":3,"en":"Those who follow their dreams with courage will finally reach the goal they have been working for since childhood.","zh":"那些勇敢追随梦想的人，终将抵达他们从小就为之奋斗的目标。"}]}]},{"day":21,"w":"following","ph":"","defs":[{"pos":"adj.","m":"下列的；接着的；以下的","ex":[{"l":1,"en":"Please answer the following questions.","zh":"请回答以下问题。"},{"l":2,"en":"The following story tells us that helping others is one of the best ways to find happiness in life.","zh":"接下来的故事告诉我们，帮助别人是找到生活幸福感的最佳方式之一。"},{"l":3,"en":"In the following days, she kept practicing the piano so hard that her fingers bled, yet she never thought of giving up.","zh":"在接下来的几天里，她拼命练琴，指尖都磨出血来，却从未想过放弃。"}]}]},{"day":21,"w":"fond","ph":"","defs":[{"pos":"adj.","m":"喜爱的","ex":[{"l":1,"en":"I am fond of reading stories.","zh":"我喜欢读故事。"},{"l":2,"en":"Though my grandfather is old, he is still fond of taking photos wherever he travels with his friends.","zh":"虽然我爷爷年纪大了，但他仍然喜欢和朋友旅行时到处拍照。"},{"l":3,"en":"It is your choice whether to be fond of the subject you find hard, but a positive attitude will surely help you improve.","zh":"是否喜欢你觉得困难的科目由你决定，但积极的态度一定会帮助你进步。"}]}]},{"day":21,"w":"food","ph":"","defs":[{"pos":"n.","m":"食物，食品","ex":[{"l":1,"en":"It was really wonderful to chat with each other and enjoy food at the same time.","zh":"一边彼此聊天一边享用美食，真是太棒了。"},{"l":2,"en":"When the festival comes, families get together to share traditional food that has been passed down for hundreds of years.","zh":"节日到来时，家人们聚在一起分享代代相传数百年的传统美食。"},{"l":3,"en":"Not only is the food here cheap and delicious, but it also reminds me of the warm days I spent with my grandmother in the countryside.","zh":"这里的食物不仅便宜美味，还让我想起和奶奶在乡下度过的温暖时光。"}]}]},{"day":21,"w":"fool","ph":"","defs":[{"pos":"n.","m":"傻子","ex":[{"l":1,"en":"Don't be a fool, think before you act.","zh":"别犯傻，行动前先想想。"},{"l":2,"en":"The story tells us that a fool may sometimes give a wise answer when others expect nothing from him.","zh":"这个故事告诉我们，傻子有时也会在别人对他毫无期待时给出明智的回答。"},{"l":3,"en":"Only a fool would believe that success comes without effort, for every achievement is built on countless hours of hard work.","zh":"只有傻子才会相信成功无需努力，因为每项成就都建立在无数小时的辛勤付出之上。"}]},{"pos":"v.","m":"愚弄；欺骗","ex":[{"l":1,"en":"Don't try to fool me.","zh":"别想愚弄我。"},{"l":2,"en":"The clever boy fooled his friends by hiding the toy under the bed where no one could find it easily.","zh":"那个聪明的男孩把玩具藏在床底下，轻易骗过了朋友们，让他们找不到。"},{"l":3,"en":"Never let yourself be fooled by sweet words, for what people do matters far more than what they say.","zh":"切勿被甜言蜜语所蒙骗，因为人们所做的远比所说的更重要。"}]}]},{"day":21,"w":"foolish","ph":"","defs":[{"pos":"adj.","m":"愚蠢的，傻的","ex":[{"l":1,"en":"It is foolish to spend so much money on toys.","zh":"花这么多钱买玩具是愚蠢的。"},{"l":2,"en":"It was foolish of him to give up the chance, because such a good opportunity may never come again.","zh":"他放弃这个机会真是太傻了，因为这样好的机遇可能再也不会来了。"},{"l":3,"en":"However foolish the mistake seems now, it taught me a lesson that I will remember as long as I live.","zh":"无论这个错误现在看来多么愚蠢，它都给了我一个终身难忘的教训。"}]}]},{"day":21,"w":"foot","ph":"","defs":[{"pos":"n.","m":"足，脚；英尺","ex":[{"l":1,"en":"He hurt his foot yesterday.","zh":"他昨天弄伤了脚。"},{"l":2,"en":"When the boy saw the old woman struggling to cross the road, he went to help her on foot at once.","zh":"当男孩看到老奶奶艰难地过马路时，他立刻步行过去帮她。"},{"l":3,"en":"Tired as his feet were after the long walk, he kept moving until he reached the top of the mountain.","zh":"尽管长途跋涉后双脚疲惫不堪，他仍不停歇，直到登上山顶。"}]}]},{"day":21,"w":"football","ph":"","defs":[{"pos":"n.","m":"（英式）足球；（美式）橄榄球","ex":[{"l":1,"en":"She put the football in the centre of a fruit bowl and praised it.","zh":"她把足球放在水果碗中央并加以夸赞。"},{"l":2,"en":"Because he misunderstood his Grandma's words \"fruit bowl\" as \"football\".","zh":"因为他把奶奶说的 fruit bowl（水果碗）误听成了 football（足球）。"},{"l":3,"en":"What a wonderful time we had playing football together, even though the rain made the field muddy and hard to run on.","zh":"我们一起踢足球玩得多开心啊，尽管大雨让球场泥泞难跑。"}]}]},{"day":21,"w":"for","ph":"","defs":[{"pos":"prep.","m":"为了；向...；达；计；因为...；对...；来说","ex":[{"l":1,"en":"I was in the hospital for several weeks.","zh":"我在医院住了几个星期。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索一番后，我得知负责绘制全世界道路、山脉、海洋及其他地方的人被称为制图师。"},{"l":3,"en":"For a student who has just moved to a new city, the first few weeks are often the hardest but also the most important for making new friends.","zh":"对于一个刚搬到新城市的学生来说，最初几周往往最艰难，却也是结交新朋友最重要的时期。"}]},{"pos":"conj.","m":"因为，由于","ex":[{"l":1,"en":"I was in the hospital for several weeks.","zh":"我在医院住了几个星期。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索一番后，我得知负责绘制全世界道路、山脉、海洋及其他地方的人被称为制图师。"},{"l":3,"en":"We must start early, for the road to the village is long and the bus runs only twice a day.","zh":"我们必须早早出发，因为去村子里的路很长，而且公交车一天只开两班。"}]}]},{"day":21,"w":"forecast","ph":"","defs":[{"pos":"n.&v.","m":"预告，预报","ex":[{"l":1,"en":"The weather forecast says it will rain.","zh":"天气预报说会下雨。"},{"l":2,"en":"According to the weather forecast, we should bring umbrellas in case the heavy rain comes suddenly in the afternoon.","zh":"根据天气预报，我们应该带上雨伞，以防下午突降大雨。"},{"l":3,"en":"Though scientists can forecast the weather more accurately now, no one can truly predict what tomorrow will bring.","zh":"尽管如今科学家能更准确地预报天气，却没人能真正预知明天会带来什么。"}]}]},{"day":21,"w":"foreign","ph":"","defs":[{"pos":"adj.","m":"外国的","ex":[{"l":1,"en":"He is learning a foreign language.","zh":"他在学一门外语。"},{"l":2,"en":"Since more foreign visitors are coming to our city, we should learn some English to welcome them warmly.","zh":"既然有越来越多外国游客来到我们的城市，我们应该学些英语热情地欢迎他们。"},{"l":3,"en":"Learning a foreign language opens a window through which we can better understand the world and its different cultures.","zh":"学习一门外语打开了一扇窗，透过它我们能更好地了解世界及其多元文化。"}]}]},{"day":21,"w":"foreigner","ph":"","defs":[{"pos":"n.","m":"外国人","ex":[{"l":1,"en":"The foreigner speaks Chinese well.","zh":"那个外国人中文说得很好。"},{"l":2,"en":"When the foreigner asked me the way to the museum, I was glad that I could explain it in English clearly.","zh":"当那个外国人向我问去博物馆的路时，我很高兴能用英语清楚地为他指路。"},{"l":3,"en":"Although he is a foreigner in this small town, the warm smiles of the neighbors make him feel quite at home.","zh":"虽然他是这座小镇的外乡人，邻居们温暖的笑容却让他感到宾至如归。"}]}]},{"day":21,"w":"forest","ph":"","defs":[{"pos":"n.","m":"森林","ex":[{"l":1,"en":"The forest is full of trees.","zh":"森林里满是树木。"},{"l":2,"en":"We must protect the forest because it is home to thousands of animals that cannot live anywhere else.","zh":"我们必须保护这片森林，因为它是数千种动物的家，它们无法在别处生存。"},{"l":3,"en":"Deep in the forest lies a small village where time seems to have stopped, keeping its old traditions alive for centuries.","zh":"森林深处坐落着一个小村庄，那里时光仿佛停滞，古老的传统延续了数百年。"}]}]},{"day":21,"w":"forever","ph":"","defs":[{"pos":"adv.","m":"永远；永恒地","ex":[{"l":1,"en":"I will remember you forever.","zh":"我会永远记得你。"},{"l":2,"en":"True friends are those who will stand by your side forever, no matter what difficulties you meet in your life.","zh":"真正的朋友是那些会永远站在你身边的人，无论你生活中遇到什么困难。"},{"l":3,"en":"Little did she know that the kind words she said that day would stay in his heart forever.","zh":"她不知道的是，那天她说的那番善意的话会永远留在他心里。"}]}]},{"day":21,"w":"forget","ph":"","defs":[{"pos":"v.","m":"忘记；忘掉","ex":[{"l":1,"en":"Don't forget your bag.","zh":"别忘了你的包。"},{"l":2,"en":"I will never forget the day when I first came to this school, because everyone was so kind to me.","zh":"我永远不会忘记第一次来到这所学校的那天，因为每个人都对我那么好。"},{"l":3,"en":"Having forgotten to bring the ticket, he had to run all the way home before the train finally left the station.","zh":"因为忘了带票，他不得不一路跑回家，赶在火车驶离车站之前。"}]}]},{"day":22,"w":"forgetful","ph":"","defs":[{"pos":"adj.","m":"健忘的","ex":[{"l":1,"en":"My grandmother is a bit forgetful.","zh":"我奶奶有点健忘。"},{"l":2,"en":"As he grew older, he became so forgetful that he often lost his keys and could not find them anywhere.","zh":"随着年龄增长，他变得十分健忘，经常找不到钥匙，到处都找不到。"},{"l":3,"en":"Forgetful as the old man has become, he still remembers clearly the name of his first teacher from sixty years ago.","zh":"尽管这位老人已经变得健忘，他却仍清楚地记得六十年前他第一位老师的名字。"}]}]},{"day":22,"w":"forgive","ph":"","defs":[{"pos":"v.","m":"原谅，宽恕","ex":[{"l":1,"en":"Please forgive my mistake.","zh":"请原谅我的错误。"},{"l":2,"en":"I hope you can forgive me for what I said yesterday, because I did not really mean to hurt your feelings.","zh":"我希望你能原谅我昨天说的话，因为我并非真的想伤害你的感情。"},{"l":3,"en":"It takes real courage to forgive those who have hurt you, yet doing so often sets your own heart free.","zh":"原谅那些伤害过你的人需要真正的勇气，然而这样做却常常让自己的心灵获得自由。"}]}]},{"day":22,"w":"fork","ph":"","defs":[{"pos":"n.","m":"叉","ex":[{"l":1,"en":"Please pass me a fork.","zh":"请递给我一把叉子。"},{"l":2,"en":"The fork that you gave me yesterday is very useful when I eat noodles.","zh":"你昨天给我的那把叉子在我吃面条时很有用。"},{"l":3,"en":"Not until I reached the cafeteria did I realize I had forgotten to bring a fork for the salad.","zh":"直到到达餐厅我才意识到自己忘了带吃沙拉的叉子。"}]}]},{"day":22,"w":"form","ph":"","defs":[{"pos":"n.","m":"形式；方式","ex":[{"l":1,"en":"Water has three forms.","zh":"水有三种形态。"},{"l":2,"en":"Please fill in this form before you see the doctor so that he can help you.","zh":"请先填写这张表格再去就医，这样他才能帮到你。"},{"l":3,"en":"It is the most common form of transport that allows people to travel across the city quickly.","zh":"这是让人们能快速穿越城市最常见的交通方式。"}]}]},{"day":22,"w":"forward","ph":"","defs":[{"pos":"adv.","m":"向前，前进；今后","ex":[{"l":1,"en":"Please look forward.","zh":"请向前看。"},{"l":2,"en":"When the teacher asked a question, all the students moved forward to hear him clearly.","zh":"当老师提问时，所有学生都向前移动以便听清他的话。"},{"l":3,"en":"Looking forward to the future, we firmly believe that our efforts will pay off one day.","zh":"展望未来，我们坚信努力终有一天会有回报。"}]}]},{"day":22,"w":"fountain","ph":"","defs":[{"pos":"n.","m":"喷泉","ex":[{"l":1,"en":"There is a fountain in the park.","zh":"公园里有一个喷泉。"},{"l":2,"en":"Children love to play around the fountain which stands in the middle of the square.","zh":"孩子们喜欢在矗立于广场中央的喷泉周围玩耍。"},{"l":3,"en":"What a beautiful fountain it is that attracts so many tourists to take photos every day.","zh":"多么美丽的喷泉啊，每天都吸引着众多游客前来拍照。"}]}]},{"day":22,"w":"France","ph":"","defs":[{"pos":"n.","m":"法国","ex":[{"l":1,"en":"He comes from France.","zh":"他来自法国。"},{"l":2,"en":"France is a country that is famous for its wine and romantic culture.","zh":"法国是一个以葡萄酒和浪漫文化闻名的国家。"},{"l":3,"en":"Having dreamed of visiting France for years, she finally went to Paris last summer.","zh":"梦想游览法国多年之后，她终于在去年夏天去了巴黎。"}]}]},{"day":22,"w":"free","ph":"","defs":[{"pos":"adj.","m":"自由的；空闲的；免费的","ex":[{"l":1,"en":"The tickets are free for students.","zh":"门票对学生免费。"},{"l":2,"en":"Since the museum is free on Sundays, many families choose to visit it together.","zh":"由于博物馆周日免费开放，许多家庭选择一起去参观。"},{"l":3,"en":"Only when you are free from worry can you truly enjoy the beauty of life.","zh":"只有摆脱烦恼，你才能真正享受生活的美好。"}]}]},{"day":22,"w":"freedom","ph":"","defs":[{"pos":"n.","m":"自由","ex":[{"l":1,"en":"We love freedom.","zh":"我们热爱自由。"},{"l":2,"en":"Everyone has the right to enjoy freedom, which is one of the most important things in life.","zh":"每个人都有权享受自由，这是生活中最重要的事情之一。"},{"l":3,"en":"It is freedom that encourages people to express their own ideas without fear.","zh":"正是自由鼓励人们毫无畏惧地表达自己的想法。"}]}]},{"day":22,"w":"freeze","ph":"","defs":[{"pos":"v.","m":"结冰","ex":[{"l":1,"en":"Water freezes in winter.","zh":"水在冬天结冰。"},{"l":2,"en":"When the temperature drops below zero, the river will freeze quickly at night.","zh":"当温度降到零度以下时，河水在夜晚很快就会结冰。"},{"l":3,"en":"So freezing was the wind that the lake froze from one side to the other overnight.","zh":"风太冷了，整个湖一夜之间就从一头冻到了另一头。"}]}]},{"day":22,"w":"freezing","ph":"","defs":[{"pos":"adj.","m":"结冰的；极冷的","ex":[{"l":1,"en":"It is freezing outside.","zh":"外面冷极了。"},{"l":2,"en":"Although the freezing wind blew hard, the children still played happily in the snow.","zh":"尽管刺骨的寒风刮得猛烈，孩子们仍在雪地里快乐地玩耍。"},{"l":3,"en":"Standing in the freezing rain for an hour, he finally caught a cold and had to stay in bed.","zh":"在冰冷的雨中站了一个小时后，他终于感冒了，不得不卧床休息。"}]}]},{"day":22,"w":"French","ph":"","defs":[{"pos":"adj.","m":"法国的；法国人的；法语的","ex":[{"l":1,"en":"I like French food.","zh":"我喜欢法国食物。"},{"l":2,"en":"The French restaurant that opened last week serves the best bread in town.","zh":"上周开业的那家法国餐厅提供全镇最好吃的面包。"},{"l":3,"en":"Deeply interested in French culture, she decided to learn the language and study abroad.","zh":"出于对法国文化的浓厚兴趣，她决定学习这门语言并出国留学。"}]},{"pos":"n.","m":"法国人；法语","ex":[{"l":1,"en":"He speaks French.","zh":"他说法语。"},{"l":2,"en":"French is a language that is widely spoken in many countries around the world.","zh":"法语是一种在世界许多国家被广泛使用的语言。"},{"l":3,"en":"Not only does he speak French fluently, but he also writes articles for a famous magazine.","zh":"他不仅法语说得流利，还为一家著名杂志撰写文章。"}]}]},{"day":22,"w":"fresh","ph":"","defs":[{"pos":"adj.","m":"新鲜的","ex":[{"l":1,"en":"The bread is fresh.","zh":"这面包很新鲜。"},{"l":2,"en":"The vegetables that we bought this morning look fresh and taste delicious.","zh":"我们今早买的蔬菜看起来很新鲜，吃起来也很美味。"},{"l":3,"en":"Only by eating fresh food every day can we keep healthy and full of energy.","zh":"只有每天吃新鲜的食物，我们才能保持健康、充满活力。"}]}]},{"day":22,"w":"Friday","ph":"","defs":[{"pos":"n.","m":"星期五","ex":[{"l":1,"en":"But last Friday morning, my father came to my school.","zh":"但是上周五早上，我爸爸来到了我的学校。"},{"l":2,"en":"I remember that last Friday morning my father came to my school, which made me very surprised.","zh":"我记得上周五早上我爸爸来到了我的学校，这让我很惊讶。"},{"l":3,"en":"It was last Friday morning that my father came to my school with some books for me.","zh":"正是上周五早上，我爸爸带着一些书来到了我的学校。"}]}]},{"day":22,"w":"fridge","ph":"","defs":[{"pos":"n.","m":"冰箱","ex":[{"l":1,"en":"The milk is in the fridge.","zh":"牛奶在冰箱里。"},{"l":2,"en":"Please put the cake into the fridge so that it can stay fresh until tomorrow.","zh":"请把蛋糕放进冰箱，这样它就能保鲜到明天。"},{"l":3,"en":"Having been left in the fridge for a week, the milk had gone bad and smelled terrible.","zh":"在冰箱里放了一周之后，牛奶变质了，闻起来很难闻。"}]}]},{"day":22,"w":"fried","ph":"","defs":[{"pos":"adj.","m":"油煎的","ex":[{"l":1,"en":"I like fried chicken.","zh":"我喜欢炸鸡。"},{"l":2,"en":"Eating too much fried food is bad for your health, so you should eat more vegetables.","zh":"吃太多油炸食品对身体不好，所以你应该多吃蔬菜。"},{"l":3,"en":"Although fried rice tastes wonderful, eating it too often may lead to serious health problems.","zh":"虽然炒饭味道很好，但吃得太频繁可能会导致严重的健康问题。"}]}]},{"day":22,"w":"friend","ph":"","defs":[{"pos":"n.","m":"朋友","ex":[{"l":1,"en":"What's your friend's name?","zh":"你的朋友叫什么名字？"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English. Louise has many Chinese friends. They communicate by computer.","zh":"露易丝现在十三岁，目前正在学习中文，中文已经成为与英语同样重要的世界语言。露易丝有很多中国朋友。他们通过电脑交流。"},{"l":3,"en":"A true friend is someone who always stands by your side when you are in trouble.","zh":"真正的朋友是那个在你遇到困难时总是站在你身边的人。"}]}]},{"day":22,"w":"friendly","ph":"","defs":[{"pos":"adj.","m":"朋友般的；友好的","ex":[{"l":1,"en":"She is very friendly.","zh":"她很友好。"},{"l":2,"en":"The shop assistant was so friendly that she helped me choose a nice gift for my mother.","zh":"那位店员非常友好，帮我为妈妈挑选了一份好礼物。"},{"l":3,"en":"Friendly as he is, he still finds it hard to make close friends in a new place.","zh":"尽管他很友好，但在新地方他还是很难交到知心朋友。"}]}]},{"day":22,"w":"friendship","ph":"","defs":[{"pos":"n.","m":"友谊","ex":[{"l":1,"en":"Our friendship is strong.","zh":"我们的友谊很坚固。"},{"l":2,"en":"True friendship will never fade away even if we live far from each other.","zh":"真正的友谊永远不会消退，即使我们住得很远。"},{"l":3,"en":"It is friendship that gives us courage to face any difficulty we meet in life.","zh":"正是友谊给予我们勇气去面对生活中遇到的任何困难。"}]}]},{"day":22,"w":"frighten","ph":"","defs":[{"pos":"v.","m":"使害怕","ex":[{"l":1,"en":"Dogs frighten him.","zh":"狗使他害怕。"},{"l":2,"en":"The loud noise outside the window frightened the little girl so much that she started to cry.","zh":"窗外的巨响把小女孩吓坏了，她哭了起来。"},{"l":3,"en":"Never try to frighten others, for everyone deserves to be treated with respect and kindness.","zh":"永远不要试图吓唬别人，因为每个人都值得被尊重和友善地对待。"}]}]},{"day":22,"w":"frightened","ph":"","defs":[{"pos":"adj.","m":"受惊吓的；吃惊的","ex":[{"l":1,"en":"The boy was frightened.","zh":"那个男孩受惊了。"},{"l":2,"en":"When she saw the snake on the road, she was so frightened that she could not move at all.","zh":"当她看到路上的蛇时，她吓得一动都不能动。"},{"l":3,"en":"Frightened by the sudden thunder, the child ran quickly into his mother's arms for comfort.","zh":"被突如其来的雷声吓到，孩子迅速跑进母亲怀里寻求安慰。"}]}]},{"day":22,"w":"frightening","ph":"","defs":[{"pos":"adj.","m":"恐怖的","ex":[{"l":1,"en":"The horror movie was very frightening.","zh":"那部恐怖片非常吓人。"},{"l":2,"en":"When she heard the strange noise outside, she felt it was a frightening night.","zh":"当她听到外面奇怪的声响时,她觉得那是一个可怕的夜晚。"},{"l":3,"en":"Only when we face the frightening challenge bravely can we discover how strong we really are.","zh":"只有当我们勇敢地面对那可怕的挑战时,才能发现自己究竟有多强大。"}]}]},{"day":22,"w":"from","ph":"","defs":[{"pos":"prep.","m":"从；自；从...开始；离...；距...；来自","ex":[{"l":1,"en":"I was born in a little town not far from here.","zh":"我出生在离这儿不远的一个小镇上。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它的修建是为了将中国南方富饶农业区的粮食运到北方的城市。"},{"l":3,"en":"Ranging from ancient poetry to modern science, the books in this library offer readers a window into the wisdom passed down from generation to generation.","zh":"从古代诗歌到现代科学,这家图书馆里的书为读者打开了一扇窗,展现了一代代相传的智慧。"}]}]},{"day":22,"w":"front","ph":"","defs":[{"pos":"adj.","m":"前面的；前部的","ex":[{"l":1,"en":"Sitting in front of the screen for too long is unhealthy.","zh":"在屏幕前坐得太久对健康不利。"},{"l":2,"en":"The front wheel of my bicycle was broken when I hit a big stone on the road.","zh":"当我在路上撞到一块大石头时,我自行车的前轮坏了。"},{"l":3,"en":"Not until the front door was firmly locked did she feel safe enough to fall asleep on such a stormy night.","zh":"直到前门被牢牢锁上,她才感到足够安全,能在这样一个暴风雨之夜入睡。"}]},{"pos":"n.","m":"前面；前部；前线","ex":[{"l":1,"en":"Sitting in front of the screen for too long is unhealthy.","zh":"在屏幕前坐得太久对健康不利。"},{"l":2,"en":"There is a beautiful garden in front of the house where my grandparents live.","zh":"我祖父母住的那栋房子前面有一个美丽的花园。"},{"l":3,"en":"Standing at the front of the line, the brave boy raised his hand without hesitation when the teacher asked for a volunteer.","zh":"站在队伍前面的那个勇敢男孩,在老师征求志愿者时毫不犹豫地举起了手。"}]}]},{"day":22,"w":"frozen","ph":"","defs":[{"pos":"adj.","m":"冰冻的","ex":[{"l":1,"en":"The frozen food is very cheap today.","zh":"今天冷冻食品很便宜。"},{"l":2,"en":"Be careful when you walk on the frozen lake because the ice may not be thick enough.","zh":"在结冰的湖面上行走时要小心,因为冰可能不够厚。"},{"l":3,"en":"Caught in the heavy snow, the travellers had no choice but to wait beside the frozen river until help arrived.","zh":"被困在大雪中的旅行者们别无选择,只能在结冰的河边等待救援到来。"}]}]},{"day":22,"w":"fruit","ph":"","defs":[{"pos":"n.","m":"水果；果实","ex":[{"l":1,"en":"She put the football in the centre of a fruit bowl and praised it.","zh":"她把那个足球放在水果碗的中央并称赞了它。"},{"l":2,"en":"Because he misunderstood his Grandma's words 'fruit bowl' as 'football'.","zh":"因为他把奶奶说的'水果碗(fruit bowl)'误解成了'足球(football)'。"},{"l":3,"en":"What surprised us most was that the fruit grown on this dry hillside tasted sweeter than any we had ever bought.","zh":"最令我们惊讶的是,在这片干燥山坡上种出的水果比我们买过的任何水果都要甜。"}]}]},{"day":22,"w":"fuel","ph":"","defs":[{"pos":"n.","m":"燃料","ex":[{"l":1,"en":"Cars need fuel to run on the road.","zh":"汽车在路上行驶需要燃料。"},{"l":2,"en":"If we save fuel every day, we can help protect the environment that we live in.","zh":"如果我们每天节约燃料,就能帮助保护我们居住的环境。"},{"l":3,"en":"It is high time that we developed new kinds of clean fuel, for traditional energy will run out sooner or later.","zh":"我们早该开发新型清洁燃料了,因为传统能源迟早会被耗尽。"}]}]},{"day":22,"w":"full","ph":"","defs":[{"pos":"adj.","m":"满的，充满的；完全的","ex":[{"l":1,"en":"The cup is full of hot water.","zh":"杯子里装满了热水。"},{"l":2,"en":"The basket is full of apples that my mother picked from the garden this morning.","zh":"篮子里装满了妈妈今天早上从园子里摘的苹果。"},{"l":3,"en":"Full of confidence and energy, the young player stepped onto the court, determined to win the match for his team.","zh":"满怀信心与活力的年轻选手走上球场,决心为他的球队赢下这场比赛。"}]}]},{"day":22,"w":"fun","ph":"","defs":[{"pos":"n.","m":"乐趣；有趣的事；娱乐；玩笑","ex":[{"l":1,"en":"We had great fun at the party.","zh":"我们在聚会上玩得很开心。"},{"l":2,"en":"Learning English can be fun if you try to use it in your daily life.","zh":"如果你试着在日常生活中使用英语,学英语也会很有趣。"},{"l":3,"en":"It is learning itself, rather than high marks, that brings us the real fun of studying and lasts for a lifetime.","zh":"正是学习本身,而非高分,带给我们真正的学习乐趣,并受用一生。"}]}]},{"day":22,"w":"funny","ph":"","defs":[{"pos":"adj.","m":"滑稽的；可笑的","ex":[{"l":1,"en":"The clown looks very funny.","zh":"那个小丑看起来很滑稽。"},{"l":2,"en":"The story he told us was so funny that everyone laughed loudly in the classroom.","zh":"他讲的故事如此有趣,以至于教室里每个人都大声笑了起来。"},{"l":3,"en":"Such was his funny performance that even the strictest teacher in our school could not help laughing out loud.","zh":"他的表演如此滑稽,连我们学校最严厉的老师都忍不住大笑起来。"}]}]},{"day":23,"w":"furniture","ph":"","defs":[{"pos":"n.","m":"（总称）家具","ex":[{"l":1,"en":"We bought some new furniture yesterday.","zh":"我们昨天买了一些新家具。"},{"l":2,"en":"The wooden furniture in this room was made by my grandfather thirty years ago.","zh":"这个房间里的木制家具是我祖父三十年前做的。"},{"l":3,"en":"Carefully chosen to match the colour of the walls, the new furniture made the small room look much more spacious.","zh":"新家具经过精心挑选以搭配墙壁的颜色,使这个小房间看起来宽敞了许多。"}]}]},{"day":23,"w":"further","ph":"","defs":[{"pos":"adv.","m":"较远，更远；进一步；而且","ex":[{"l":1,"en":"We walked further down the road.","zh":"我们沿着这条路走得更远了。"},{"l":2,"en":"If you want to know further about the plan, you can ask Mr. Wang after class.","zh":"如果你想进一步了解这个计划,可以在课后问王老师。"},{"l":3,"en":"The scientist explained the theory further so that every student in the hall could understand what really matters in the experiment.","zh":"这位科学家进一步解释了这个理论,以便大厅里的每位学生都能理解实验中真正重要的东西。"}]},{"pos":"v.","m":"促进；增进","ex":[{"l":1,"en":"Reading further helps us learn more.","zh":"进一步阅读有助于我们学到更多。"},{"l":2,"en":"The new bridge will further the trade between the two cities and bring more jobs.","zh":"这座新桥将促进两座城市之间的贸易,并带来更多就业机会。"},{"l":3,"en":"Only by working closely with foreign partners can we further our understanding of different cultures and broaden our horizons.","zh":"只有与外国伙伴紧密合作,我们才能增进对不同文化的理解,开阔视野。"}]},{"pos":"adj.","m":"更多的；更进一步的","ex":[{"l":1,"en":"I need further help with my homework.","zh":"我的作业需要进一步的帮助。"},{"l":2,"en":"If you have any further questions, please raise your hand and I will answer them.","zh":"如果你还有进一步的问题,请举手,我会回答。"},{"l":3,"en":"Without further delay, the captain ordered the team to set off, hoping to reach the camp before sunset.","zh":"队长没有再耽搁,命令队伍出发,希望能在日落前抵达营地。"}]}]},{"day":23,"w":"future","ph":"","defs":[{"pos":"n.","m":"将来，未来","ex":[{"l":1,"en":"I want to be a doctor in the future.","zh":"将来我想成为一名医生。"},{"l":2,"en":"No one knows what will happen in the future, but we can prepare for it now.","zh":"没有人知道将来会发生什么,但我们可以现在就为之准备。"},{"l":3,"en":"It is what we do today that will shape our future, so we should treasure every moment and never waste our youth.","zh":"正是我们今天所做的事将塑造我们的未来,所以我们应珍惜每一刻,绝不虚度青春。"}]}]},{"day":23,"w":"gain","ph":"","defs":[{"pos":"v.","m":"获得，得到","ex":[{"l":1,"en":"She gained high marks in the test.","zh":"她在考试中取得了高分。"},{"l":2,"en":"Through years of hard work, he gained enough experience to start his own company.","zh":"经过多年努力,他获得了足够的经验来创办自己的公司。"},{"l":3,"en":"Devoted to helping the poor, the young doctor gained not only respect but also a deeper understanding of the value of life.","zh":"这位年轻医生致力于帮助穷人,不仅赢得了尊重,也对生命的价值有了更深的理解。"}]}]},{"day":23,"w":"game","ph":"","defs":[{"pos":"n.","m":"游戏；运动；比赛","ex":[{"l":1,"en":"It is not easy to beat a robot player in a chess game.","zh":"在棋类比赛中击败机器人选手并不容易。"},{"l":2,"en":"The basketball game which was held yesterday attracted hundreds of students to watch.","zh":"昨天举行的那场篮球比赛吸引了数百名学生观看。"},{"l":3,"en":"So exciting was the final game that the whole school cheered wildly when our team scored the winning goal in the last second.","zh":"决赛如此激动人心,当我们的队伍在最后一秒踢进制胜球时,全校都疯狂欢呼起来。"}]}]},{"day":23,"w":"garden","ph":"","defs":[{"pos":"n.","m":"花园，果园，菜园","ex":[{"l":1,"en":"There are many flowers in the garden.","zh":"花园里有很多花。"},{"l":2,"en":"My grandfather spends most of his free time taking care of the garden behind our house.","zh":"我爷爷把大部分空闲时间都花在打理我们房子后面的花园上。"},{"l":3,"en":"Surrounded by colourful flowers and tall trees, the secret garden has become the place where I go whenever I feel sad.","zh":"被五颜六色的花朵和高大的树木环绕,这座秘密花园成了我每当难过时都会去的地方。"}]}]},{"day":23,"w":"gas","ph":"","defs":[{"pos":"n.","m":"气态；气体；煤气","ex":[{"l":1,"en":"Turn off the gas before you leave.","zh":"离开前关掉煤气。"},{"l":2,"en":"Gas is widely used in our daily life because it is cleaner than coal.","zh":"煤气在我们的日常生活中被广泛使用,因为它比煤更清洁。"},{"l":3,"en":"Were there no clean gas and electricity, our modern life would return to the dark ages within only a few days.","zh":"如果没有清洁的煤气和电力,我们的现代生活在短短几天内就会倒退回黑暗时代。"}]}]},{"day":23,"w":"gate","ph":"","defs":[{"pos":"n.","m":"大门","ex":[{"l":1,"en":"Please wait for me at the gate.","zh":"请在大门口等我。"},{"l":2,"en":"The old man who stands at the school gate every morning is our kind security guard.","zh":"每天早上站在校门口的那位老人是我们和善的保安。"},{"l":3,"en":"Not until all the students had passed through the gate did the teacher leave, though it was already getting dark.","zh":"直到所有学生都穿过大门,老师才离开,尽管天色已经渐暗。"}]}]},{"day":23,"w":"general","ph":"","defs":[{"pos":"adj.","m":"大体的；笼统的；总的","ex":[{"l":1,"en":"Can you give me a general idea of the plan?","zh":"你能给我一个关于这个计划的大致想法吗？"},{"l":2,"en":"In general, students who read every day make greater progress than those who seldom read.","zh":"总的来说，每天阅读的学生比很少阅读的学生进步更大。"},{"l":3,"en":"It is generally believed that reading widely not only broadens our horizons but also helps us form a clearer view of the world.","zh":"人们普遍认为，广泛阅读不仅能开阔我们的视野，还能帮助我们形成对世界更清晰的认识。"}]}]},{"day":23,"w":"generation","ph":"","defs":[{"pos":"n.","m":"代；一代","ex":[{"l":1,"en":"My grandparents belong to a different generation.","zh":"我的祖父母属于另一代人。"},{"l":2,"en":"The story has been passed down from generation to generation, and it still touches everyone who hears it.","zh":"这个故事一代代流传下来，仍然打动着每一位听到它的人。"},{"l":3,"en":"What we do today will shape the world that the next generation inherits, so we must act responsibly.","zh":"我们今天所做的事将塑造下一代继承的世界，因此我们必须负责任地行动。"}]}]},{"day":23,"w":"generous","ph":"","defs":[{"pos":"adj.","m":"慷慨的，大方的","ex":[{"l":1,"en":"It is very generous of you to share your toys.","zh":"你愿意分享你的玩具，真是太慷慨了。"},{"l":2,"en":"The generous old man has donated most of his money to the children who lost their parents in the earthquake.","zh":"那位慷慨的老人把大部分钱捐给了在地震中失去父母的孩子们。"},{"l":3,"en":"Generous as he is, he never expects anything in return when he helps those who are in need.","zh":"尽管他为人慷慨，但在帮助有困难的人时，他从不指望得到任何回报。"}]}]},{"day":23,"w":"gentle","ph":"","defs":[{"pos":"adj.","m":"温柔的；轻轻的","ex":[{"l":1,"en":"The teacher spoke in a gentle voice.","zh":"老师用温柔的声音说话。"},{"l":2,"en":"The mother patted the baby gently until he fell asleep, although she herself was very tired.","zh":"妈妈轻轻地拍着婴儿直到他睡着，尽管她自己非常疲惫。"},{"l":3,"en":"Only with a gentle heart and a patient mind can we truly understand the feelings of the people around us.","zh":"只有拥有一颗温柔的心和耐心的头脑，我们才能真正理解身边人的感受。"}]}]},{"day":23,"w":"gentleman","ph":"","defs":[{"pos":"n.","m":"绅士；先生","ex":[{"l":1,"en":"That old gentleman helped me carry the bags.","zh":"那位老绅士帮我提了袋子。"},{"l":2,"en":"The gentleman who is talking to our headmaster is a famous scientist from Beijing.","zh":"正在和校长交谈的那位先生是来自北京的一位著名科学家。"},{"l":3,"en":"A true gentleman is not judged by his clothes but by how he treats others, especially when no one is watching.","zh":"一个真正的绅士不是以衣着来衡量，而是以他如何对待他人来衡量，尤其是在无人旁观的时候。"}]}]},{"day":23,"w":"gently","ph":"","defs":[{"pos":"adv.","m":"轻柔地","ex":[{"l":1,"en":"Please close the door gently.","zh":"请轻轻地把门关上。"},{"l":2,"en":"The nurse gently told the boy that his mother would get well soon, which made him stop crying.","zh":"护士温柔地告诉男孩他妈妈很快就会好起来，这让他不再哭泣。"},{"l":3,"en":"Holding the wounded bird gently in her hands, she wondered whether it would ever fly again.","zh":"她把受伤的小鸟轻轻捧在手中，心里想着它是否还能再次飞翔。"}]}]},{"day":23,"w":"geography","ph":"","defs":[{"pos":"n.","m":"地理","ex":[{"l":1,"en":"The degree might be in cartography, geography, or something similar.","zh":"这个学位可能是制图学、地理学或类似的专业。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应该尽可能多地学习地理知识。"},{"l":3,"en":"Not only does geography help us understand where countries lie, but it also explains why climates and cultures differ so greatly.","zh":"地理不仅帮助我们了解各国所处的位置，还解释了为什么气候和文化会有如此大的差异。"}]}]},{"day":23,"w":"German","ph":"","defs":[{"pos":"n.","m":"各国人；德语","ex":[{"l":1,"en":"A German is visiting our school this week.","zh":"本周一位德国人正在参观我们学校。"},{"l":2,"en":"The German who sits next to me in class speaks Chinese so well that we often forget he is a foreigner.","zh":"在班里坐我旁边的那个德国人中文说得那么好，我们常常忘记他是外国人。"},{"l":3,"en":"When the German began to speak, the whole room fell silent, for his story was both moving and unforgettable.","zh":"当那位德国人开始讲话时，整个房间都安静下来，因为他的故事既感人又令人难忘。"}]},{"pos":"adj.","m":"德国的；德国人的；德语的","ex":[{"l":1,"en":"She is reading a German book.","zh":"她正在读一本德语书。"},{"l":2,"en":"The German engineer who came to our factory last month has taught us many useful skills.","zh":"上个月来我们工厂的那位德国工程师教了我们许多有用的技能。"},{"l":3,"en":"Deeply influenced by German culture, he decided to learn the language well so that he could study there one day.","zh":"深受德国文化影响的他决定学好这门语言，以便有朝一日在那里学习。"}]}]},{"day":23,"w":"Germany","ph":"","defs":[{"pos":"n.","m":"德国","ex":[{"l":1,"en":"My uncle lives in Germany now.","zh":"我叔叔现在住在德国。"},{"l":2,"en":"Germany is famous for its cars, and many people dream of visiting the country one day.","zh":"德国以汽车闻名，许多人梦想有一天能去那个国家看看。"},{"l":3,"en":"Located in the heart of Europe, Germany attracts millions of tourists every year with its rich history and beautiful cities.","zh":"德国位于欧洲中部，以其悠久的历史和美丽的城市每年吸引数百万游客。"}]}]},{"day":23,"w":"get","ph":"","defs":[{"pos":"v.","m":"成为；变得；得到；到达；具有","ex":[{"l":1,"en":"I get up before six o'clock every day.","zh":"我每天六点前起床。"},{"l":2,"en":"For example, getting expensive clothes didn't change me as a person, but the camping trip last summer certainly did.","zh":"例如，买昂贵的衣服并没有改变我这个人，但去年夏天的露营旅行确实改变了我。"},{"l":3,"en":"No matter how hard the journey gets, we should never give up trying to become the person we wish to be.","zh":"无论旅途多么艰难，我们都不应放弃努力，去成为我们想成为的人。"}]}]},{"day":23,"w":"gift","ph":"","defs":[{"pos":"n.","m":"赠品；礼物","ex":[{"l":1,"en":"He might feel happy because Grandma loved his gift.","zh":"他可能会感到高兴，因为奶奶喜欢他的礼物。"},{"l":2,"en":"The gift that my best friend gave me on my birthday is the most meaningful one I have ever received.","zh":"我最好的朋友在我生日时送我的礼物，是我收到过的最有意义的礼物。"},{"l":3,"en":"Real friendship is the best gift one can ever receive, for it cannot be bought with any amount of money.","zh":"真正的友谊是一个人所能收到的最好礼物，因为它用再多的钱也买不到。"}]}]},{"day":23,"w":"girl","ph":"","defs":[{"pos":"n.","m":"女孩","ex":[{"l":1,"en":"I'm sure that you will do well in your interviews. Best of luck, boys and girls!","zh":"我相信你们在面试中会表现很好。祝你们好运，孩子们！"},{"l":2,"en":"The girl who won the first prize in the speech contest said that practice was the key to her success.","zh":"在演讲比赛中获得一等奖的那个女孩说，练习是她成功的关键。"},{"l":3,"en":"What made the shy girl finally stand on the stage was the warm encouragement from her teacher and classmates.","zh":"让那个害羞的女孩最终站上舞台的，是老师和同学们真诚的鼓励。"}]}]},{"day":23,"w":"give","ph":"","defs":[{"pos":"v.","m":"给；递给；付出；给予","ex":[{"l":1,"en":"Looking back on it, I think I shouldn't have given up the contest so easily.","zh":"回想起来，我觉得我不应该那么轻易地放弃那场比赛。"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，我们把它们放在地上时长长地松了一口气，而我们叔叔的背包却只装了一半。"},{"l":3,"en":"Only when we give our best effort can we look back without regret, no matter what the result may be.","zh":"只有尽了最大努力，我们才能在回首时不留遗憾，无论结果如何。"}]}]},{"day":23,"w":"glad","ph":"","defs":[{"pos":"adj.","m":"高兴的；乐意的","ex":[{"l":1,"en":"I am glad to see you again.","zh":"很高兴再次见到你。"},{"l":2,"en":"I am glad that you have made great progress in English, although there is still a long way to go.","zh":"我很高兴你在英语上取得了很大进步，尽管还有很长的路要走。"},{"l":3,"en":"Much to our glad surprise, the team that nobody believed in finally won the championship after months of hard training.","zh":"令我们喜出望外的是，那支谁都不看好的队伍经过数月刻苦训练，最终赢得了冠军。"}]}]},{"day":23,"w":"glass","ph":"","defs":[{"pos":"n.","m":"玻璃杯；玻璃；（复）眼镜","ex":[{"l":1,"en":"Please pass me a glass of water.","zh":"请递给我一杯水。"},{"l":2,"en":"Be careful! The glass on the table is hot, and you might get hurt if you touch it right now.","zh":"小心！桌上的玻璃杯很烫，如果现在去碰你可能会受伤。"},{"l":3,"en":"Seen through the glass window, the garden looked even more beautiful in the soft morning light.","zh":"透过玻璃窗望去，花园在柔和的晨光中显得更加美丽。"}]}]},{"day":23,"w":"go","ph":"","defs":[{"pos":"v.","m":"去；走；驶；通到；达到","ex":[{"l":1,"en":"If it had been fine, we would have gone to the park.","zh":"如果天气好的话，我们就去公园了。"},{"l":2,"en":"We know that someone tried hard to make our visit special. Thanks so much for going above and beyond!","zh":"我们知道有人努力让我们的访问与众不同。非常感谢你们的尽心尽力！"},{"l":3,"en":"Where there is a will, there is a way; as long as we keep going, we will finally reach our destination.","zh":"有志者事竟成；只要我们不断前行，终会抵达目的地。"}]}]},{"day":23,"w":"goal","ph":"","defs":[{"pos":"n.","m":"目标","ex":[{"l":1,"en":"My goal is to be a doctor.","zh":"我的目标是成为一名医生。"},{"l":2,"en":"Once you have set a clear goal, you should work hard to achieve it, no matter how hard it seems.","zh":"一旦你设定了明确的目标，就应该努力去实现它，无论它看起来多么困难。"},{"l":3,"en":"It is the process of reaching our goals, rather than the goals themselves, that truly shapes who we become.","zh":"真正塑造我们成为什么样的人的，是追求目标的过程，而不是目标本身。"}]}]},{"day":23,"w":"gold","ph":"","defs":[{"pos":"n.","m":"黄金","ex":[{"l":1,"en":"Gold is a precious metal.","zh":"黄金是一种贵金属。"},{"l":2,"en":"In ancient times, gold was used as money, and people traded it for almost everything they needed.","zh":"在古代，黄金被当作货币使用，人们用它交换几乎所有需要的东西。"},{"l":3,"en":"Time is often compared to gold, for once it is lost, no wealth in the world can bring it back.","zh":"时间常被比作黄金，因为一旦失去，世上再多的财富也无法将它换回。"}]}]},{"day":23,"w":"golden","ph":"","defs":[{"pos":"adj.","m":"金色的","ex":[{"l":1,"en":"She has long golden hair.","zh":"她有一头金色的长发。"},{"l":2,"en":"When the sun sets, the sea turns golden, and the whole beach looks like a beautiful painting.","zh":"夕阳西下时，大海变成金色，整个海滩看上去就像一幅美丽的画。"},{"l":3,"en":"Childhood is often seen as the golden period of life, during which the happiest and purest memories are formed.","zh":"童年常被视为人生中的黄金时期，最幸福、最纯真的回忆正是在那时形成的。"}]}]},{"day":23,"w":"good","ph":"","defs":[{"pos":"adj.","m":"好的；良好的","ex":[{"l":1,"en":"Good morning.","zh":"早上好。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段 一开始，这所学校被要求关闭，校舍也将不得不被出售，因为这所学校位于一个很好的地段。"},{"l":3,"en":"It is generally believed that a good habit, once formed in childhood, will benefit a person throughout his life, no matter what job he finally takes up.","zh":"人们普遍认为，从小养成的好习惯一旦形成，无论一个人最终从事什么工作，都将让他终生受益。"}]}]},{"day":23,"w":"government","ph":"","defs":[{"pos":"n.","m":"政府","ex":[{"l":1,"en":"Now the Chinese government is doing new work on the Grand Canal.","zh":"如今，中国政府正在大运河上开展新的工作。"},{"l":2,"en":"The government has decided that more hospitals will be built so that people in small towns can see doctors more easily.","zh":"政府已经决定建设更多的医院，以便小镇上的居民能更方便地看病。"},{"l":3,"en":"Only when the government and citizens work closely together can the serious pollution problem be solved in the years to come.","zh":"只有当政府和市民紧密合作，严重的污染问题才能在未来几年得到解决。"}]}]},{"day":23,"w":"grade","ph":"","defs":[{"pos":"n.","m":"等级；学年；成绩；分数","ex":[{"l":1,"en":"She got a good grade in the English test.","zh":"她在英语考试中取得了好成绩。"},{"l":2,"en":"Although he was sick for a whole week, he still got the highest grade in his class because he reviewed lessons every evening.","zh":"虽然他病了整整一周，但他仍然获得了班上最高的成绩，因为他每天晚上都复习功课。"},{"l":3,"en":"What really matters is not the grade itself but the effort you have made, which will shape your character more than any mark on paper.","zh":"真正重要的不是成绩本身，而是你所付出的努力，这比纸上的任何分数都更能塑造你的品格。"}]}]},{"day":24,"w":"graduate","ph":"","defs":[{"pos":"v.","m":"毕业","ex":[{"l":1,"en":"My brother will graduate from middle school next year.","zh":"我哥哥明年将从中学毕业。"},{"l":2,"en":"When she graduates from university, she wants to work in a hospital where she can help sick children.","zh":"当她大学毕业时，她想去一家能帮助生病孩子的医院工作。"},{"l":3,"en":"Having graduated from college in summer, the young man decided to travel across the country before looking for a job.","zh":"夏天大学毕业后，这个年轻人决定在找工作之前先游历全国。"}]},{"pos":"n.","m":"大学毕业生","ex":[{"l":1,"en":"Her brother is a graduate of Beijing University.","zh":"她的哥哥是北京大学的毕业生。"},{"l":2,"en":"As a graduate who just left school, he found it was not easy to get a satisfying job without any experience.","zh":"作为一个刚走出校门的毕业生，他发现没有任何经验就找到一份满意的工作并不容易。"},{"l":3,"en":"Not until he became a graduate did he realize how much knowledge the real world still required him to learn.","zh":"直到成为一名毕业生，他才意识到真实世界仍需要他学习多少知识。"}]}]},{"day":24,"w":"grandma","ph":"","defs":[{"pos":"n.","m":"奶奶；外婆","ex":[{"l":1,"en":"He might feel happy because Grandma loved his gift.","zh":"他可能会感到开心，因为奶奶喜欢他的礼物。"},{"l":2,"en":"Whenever Grandma comes to visit us, she always brings delicious food that reminds me of my childhood.","zh":"每当奶奶来看望我们时，她总会带来美味的食物，让我想起童年。"},{"l":3,"en":"It is Grandma who taught me to be patient and kind, and her warm smile remains in my memory even after all these years.","zh":"正是奶奶教会了我耐心和善良，她的温暖微笑即使过了这么多年仍留在我的记忆中。"}]}]},{"day":24,"w":"grandpa","ph":"","defs":[{"pos":"n.","m":"爷爷；外公","ex":[{"l":1,"en":"Grandpa often reads newspapers in the park.","zh":"爷爷常在公园里读报纸。"},{"l":2,"en":"Grandpa told me a story about his youth that I had never heard before, and it made me understand him better.","zh":"爷爷给我讲了一个关于他年轻时的故事，我以前从未听过，这让我更了解他了。"},{"l":3,"en":"Only when Grandpa fell ill did I realize how much he had done for our family without ever asking for anything in return.","zh":"直到爷爷病倒，我才意识到他为我们的家庭付出了多少，却从未要求过任何回报。"}]}]},{"day":24,"w":"grape","ph":"","defs":[{"pos":"n.","m":"葡萄","ex":[{"l":1,"en":"I like eating sweet grapes very much.","zh":"我非常喜欢吃甜葡萄。"},{"l":2,"en":"These grapes are so sweet that everyone in my family wants to eat more after the first taste.","zh":"这些葡萄太甜了，以至于我家里每个人尝了一口后都想再吃。"},{"l":3,"en":"Grown in the warm southern valleys, the grapes have a special taste that attracts buyers from all over the country.","zh":"生长在温暖南方山谷里的这些葡萄有一种特别的味道，吸引了全国各地的买家。"}]}]},{"day":24,"w":"grass","ph":"","defs":[{"pos":"n.","m":"草；草场；牧草","ex":[{"l":1,"en":"The children are playing on the soft grass.","zh":"孩子们正在柔软的草地上玩耍。"},{"l":2,"en":"If you look carefully, you will find that the grass turns greener after the spring rain falls on it.","zh":"如果你仔细观察，你会发现春雨过后，小草变得更绿了。"},{"l":3,"en":"Never step on the grass that has just begun to grow, for it is more easily damaged than you might imagine.","zh":"千万不要踩踏刚刚长出的小草，因为它比你想的更容易被损坏。"}]}]},{"day":24,"w":"great","ph":"","defs":[{"pos":"adj.","m":"伟大的；重要的；（口语）好极了；很好","ex":[{"l":1,"en":"It is my opinion that spending money on experiences brings greater happiness.","zh":"我的看法是，把钱花在经历上会带来更大的幸福感。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想说的是，虽然有人说拥有物品是一种巨大的快乐，但我觉得使用你所拥有的东西更令人愉快。"},{"l":3,"en":"What makes the trip a great success is not the beautiful scenery alone but the close friends who shared every moment with us.","zh":"让这次旅行大获成功的不仅是美丽的风景，还有与我们分享每一刻的亲密朋友。"}]}]},{"day":24,"w":"green","ph":"","defs":[{"pos":"n.","m":"绿色","ex":[{"l":1,"en":"Good afternoon, Mr. Green.","zh":"下午好，格林先生。"},{"l":2,"en":"The color green often makes people think of spring, when trees and flowers come back to life after a long winter.","zh":"绿色常常让人想到春天，那时花草树木在漫长的冬天后重新焕发生机。"},{"l":3,"en":"In Chinese culture, green is seen as a sign of hope and new life, which explains why spring has always been a favorite season of poets.","zh":"在中国文化中，绿色被视为希望和新生的象征，这解释了为何春天一直是诗人最钟爱的季节。"}]},{"pos":"adj.","m":"绿色的；青的","ex":[{"l":1,"en":"Good afternoon, Mr. Green.","zh":"下午好，格林先生。"},{"l":2,"en":"The hills turn green in spring, and many families choose to go out for a picnic when the weather becomes warm.","zh":"春天里山变绿了，许多家庭在天气变暖时选择外出野餐。"},{"l":3,"en":"It is said that wearing green clothes in spring can put people in a better mood and help them work more efficiently.","zh":"据说春天穿绿色衣服能让人心情更好，工作更高效。"}]}]},{"day":24,"w":"greenhouse","ph":"","defs":[{"pos":"n.","m":"温室，暖房","ex":[{"l":1,"en":"The tomatoes grow well in the greenhouse.","zh":"西红柿在温室里长得很好。"},{"l":2,"en":"The vegetables in the greenhouse stay warm even in winter, so farmers can sell fresh tomatoes all year round.","zh":"温室里的蔬菜即使在冬天也保持温暖，所以农民全年都能卖出新鲜的西红柿。"},{"l":3,"en":"Built last spring, the greenhouse allows the school to grow flowers that would not normally survive the cold northern winter.","zh":"去年春天建成的温室使学校能够种植通常无法在寒冷北方冬天存活的花卉。"}]}]},{"day":24,"w":"greet","ph":"","defs":[{"pos":"v.","m":"问候；向...致敬","ex":[{"l":1,"en":"The teacher greets us with a warm smile.","zh":"老师用温暖的微笑问候我们。"},{"l":2,"en":"When the foreign guests arrived, the students lined up to greet them with flowers and songs.","zh":"当外宾到达时，学生们排成队，用鲜花和歌声欢迎他们。"},{"l":3,"en":"Rarely does he greet his neighbors, which makes people think he is unfriendly though he is in fact only shy.","zh":"他很少跟邻居打招呼，这让人以为他不友好，尽管他其实只是害羞。"}]}]},{"day":24,"w":"ground","ph":"","defs":[{"pos":"n.","m":"地面；地板；（楼房的）层","ex":[{"l":1,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"在刮风的日子里，树叶落在地上，道路看起来很美。"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，当我们把它们放在地上时长长地松了一口气，而我们叔叔的背包却只装了一半。"},{"l":3,"en":"Lying on the soft ground, the boy watched the stars slowly appear in the sky and forgot all the worries of the day.","zh":"躺在柔软的地面上，男孩看着星星慢慢出现在天空，忘掉了白天所有的烦恼。"}]}]},{"day":24,"w":"group","ph":"","defs":[{"pos":"n.","m":"组；群","ex":[{"l":1,"en":"Our group has four students.","zh":"我们小组有四名学生。"},{"l":2,"en":"Divided into six groups, the students discussed the question for a long time before they reached an agreement.","zh":"学生们被分成六组，讨论这个问题很久之后才达成了一致。"},{"l":3,"en":"What impressed the teacher most was that each group managed to finish the task ahead of time without any help from others.","zh":"让老师印象最深的是，每个小组都不需要他人帮助，提前完成了任务。"}]}]},{"day":24,"w":"grow","ph":"","defs":[{"pos":"v.","m":"生长；发育；种植；变成","ex":[{"l":1,"en":"My first reason is that experiences make us different as we grow.","zh":"我的第一个理由是，随着我们的成长，经历让我们与众不同。"},{"l":2,"en":"If you grow vegetables in your own garden, you will find that they taste much better than the ones sold in the market.","zh":"如果你在自己的花园里种蔬菜，你会发现它们比市场上卖的味道好得多。"},{"l":3,"en":"Growing up in a small town, he never imagined that one day he would stand on the stage and speak to thousands of people.","zh":"在一个小镇长大，他从没想过有朝一日会站在舞台上面对成千上万的人演讲。"}]}]},{"day":24,"w":"guess","ph":"","defs":[{"pos":"v.","m":"猜测；推测","ex":[{"l":1,"en":"Can you guess the answer to this question?","zh":"你能猜出这个问题的答案吗？"},{"l":2,"en":"If you guess the riddle correctly, you will get a small gift that the teacher has prepared for the winners.","zh":"如果你猜对了这个谜语，你将得到老师为获胜者准备的一份小礼物。"},{"l":3,"en":"No one could have guessed that the quiet boy sitting at the back would turn out to be one of the most famous writers of his time.","zh":"没有人能猜到，坐在后排的那个安静男孩竟会成为他那个时代最著名的作家之一。"}]}]},{"day":24,"w":"guest","ph":"","defs":[{"pos":"n.","m":"客人，宾客","ex":[{"l":1,"en":"We had many guests at the party last night.","zh":"昨晚我们的聚会上来了许多客人。"},{"l":2,"en":"When the guests arrive, please offer them some tea and fruit before you start the meal together.","zh":"当客人到达时，请先给他们端些茶和水果，然后再一起开始用餐。"},{"l":3,"en":"What a guest remembers most is rarely the food itself but the warmth with which he was welcomed into the house.","zh":"客人记得最清楚的很少是食物本身，而是他走进这户人家时受到欢迎的那份温暖。"}]}]},{"day":24,"w":"guide","ph":"","defs":[{"pos":"n.","m":"向导，导游；指南","ex":[{"l":1,"en":"The guide showed us around the old castle.","zh":"导游带我们参观了那座古堡。"},{"l":2,"en":"The guide who led us through the museum explained the history behind each painting with great patience.","zh":"带我们参观博物馆的那位导游非常耐心地讲解了每幅画作背后的历史。"},{"l":3,"en":"Without an experienced guide, we would surely have lost our way in the deep forest before sunset.","zh":"若没有一位经验丰富的向导，我们肯定会在日落前迷失在那片密林中。"}]}]},{"day":24,"w":"guitar","ph":"","defs":[{"pos":"n.","m":"吉他","ex":[{"l":1,"en":"My brother plays the guitar every evening.","zh":"我哥哥每天晚上弹吉他。"},{"l":2,"en":"The boy who is playing the guitar under the tree is my classmate.","zh":"正在树下弹吉他的那个男孩是我的同班同学。"},{"l":3,"en":"Only when he picked up the guitar did the shy boy finally find the courage to express his feelings.","zh":"只有当他拿起吉他时，这个腼腆的男孩才终于找到了表达感情的勇气。"}]}]},{"day":24,"w":"gun","ph":"","defs":[{"pos":"n.","m":"枪；炮","ex":[{"l":1,"en":"The police officer carried a gun on duty.","zh":"警察执勤时带着枪。"},{"l":2,"en":"In many countries, it is strictly forbidden to carry a gun unless you have a special license.","zh":"在很多国家，除非有特别许可证，否则严禁携带枪支。"},{"l":3,"en":"It is reported that carrying a gun in public without permission will lead to serious legal problems.","zh":"据报道，未经允许在公共场合携带枪支将引发严重的法律问题。"}]}]},{"day":24,"w":"habit","ph":"","defs":[{"pos":"n.","m":"习惯；习俗","ex":[{"l":1,"en":"Reading every morning is a good habit.","zh":"每天早上阅读是个好习惯。"},{"l":2,"en":"If you want to learn English well, you must develop the habit of reading aloud every day.","zh":"如果你想学好英语，必须养成每天大声朗读的习惯。"},{"l":3,"en":"Not until he failed the exam did he realize how important it was to form a good study habit.","zh":"直到考试失利，他才意识到养成良好学习习惯有多么重要。"}]}]},{"day":24,"w":"hair","ph":"","defs":[{"pos":"n.","m":"头发","ex":[{"l":1,"en":"The girl has long black hair.","zh":"那个女孩留着长长的黑发。"},{"l":2,"en":"My mother asked me to get my hair cut because it was too long to see clearly.","zh":"妈妈让我去理发，因为头发太长影响看清楚了。"},{"l":3,"en":"The old photo reminded him of his mother, whose grey hair always shone softly in the sunlight.","zh":"那张老照片让他想起了母亲，她那花白的头发在阳光下总是柔和地发亮。"}]}]},{"day":24,"w":"half","ph":"","defs":[{"pos":"adj.&n.","m":"半，一半，半个","ex":[{"l":1,"en":"Half of the students are girls.","zh":"一半的学生是女生。"},{"l":2,"en":"Although half of the apple was rotten, the little boy still wanted to eat it.","zh":"虽然苹果有一半烂了，小男孩还是想吃。"},{"l":3,"en":"Nearly half of the students who took part in the survey said that reading helped them reduce stress.","zh":"几乎一半参加调查的学生表示，阅读帮助他们减轻了压力。"}]}]},{"day":24,"w":"hall","ph":"","defs":[{"pos":"n.","m":"大厅，会堂，礼堂","ex":[{"l":1,"en":"We had a meeting in the hall.","zh":"我们在大厅里开了会。"},{"l":2,"en":"The school will hold a concert in the hall so that more students can enjoy the music.","zh":"学校将在礼堂举办音乐会，这样更多学生就能欣赏音乐了。"},{"l":3,"en":"It was in this old hall that the famous scientist once gave a speech which changed many young lives.","zh":"正是在这座旧礼堂里，那位著名科学家曾做过一次改变了许多年轻人一生的演讲。"}]}]},{"day":24,"w":"hamburger","ph":"","defs":[{"pos":"n.","m":"汉堡包","ex":[{"l":1,"en":"I had a hamburger for lunch.","zh":"我午饭吃了一个汉堡包。"},{"l":2,"en":"Even though the hamburger tastes delicious, we should not eat too much fast food.","zh":"尽管汉堡包很美味，我们也不该吃太多快餐。"},{"l":3,"en":"What worries the doctor most is that children prefer a hamburger to a healthy home-cooked meal.","zh":"最让医生担心的是，孩子们宁愿吃汉堡包也不愿吃健康的家常饭。"}]}]},{"day":24,"w":"hand","ph":"","defs":[{"pos":"n.","m":"手；指针","ex":[{"l":1,"en":"He raised his hand to answer the question.","zh":"他举手回答问题。"},{"l":2,"en":"When the teacher asked a question, every student raised his or her hand eagerly.","zh":"当老师提问时，每个学生都急切地举手。"},{"l":3,"en":"It is polite to raise your hand before you speak, which shows respect for both the teacher and classmates.","zh":"发言前先举手是礼貌的表现，这体现了对老师和同学的尊重。"}]},{"pos":"v.","m":"递；给；交付；交进","ex":[{"l":1,"en":"Please hand in your homework on time.","zh":"请按时交作业。"},{"l":2,"en":"The teacher asked us to hand in our reports before Friday so that she could check them carefully.","zh":"老师让我们在周五前交报告，这样她就能仔细批阅。"},{"l":3,"en":"Not only did he hand in his paper early, but he also helped his classmates correct their mistakes.","zh":"他不仅早早交了试卷，还帮助同学纠正了错误。"}]}]},{"day":24,"w":"hang","ph":"","defs":[{"pos":"v.","m":"处绞刑；上吊","ex":[{"l":1,"en":"The story tells us a sad ending.","zh":"这个故事讲了一个悲伤的结局。"},{"l":2,"en":"In the past, some criminals were hanged for the serious crimes they had committed.","zh":"在过去，一些罪犯因所犯重罪而被处以绞刑。"},{"l":3,"en":"History reminds us that in ancient times thieves could be hanged for stealing even a small thing.","zh":"历史提醒我们，在古代，小偷即便偷了一件小东西也可能被处以绞刑。"}]},{"pos":"v.","m":"悬挂；把...吊起","ex":[{"l":1,"en":"She hung her coat on the door.","zh":"她把外套挂在门上。"},{"l":2,"en":"When I entered the room, I noticed that many pictures were hung on the wall.","zh":"我进房间时，注意到墙上挂了许多画。"},{"l":3,"en":"The old clock, which has been hung on the wall for over fifty years, still keeps perfect time.","zh":"那面挂在墙上五十多年的旧钟，至今走时仍分秒不差。"}]}]},{"day":24,"w":"happen","ph":"","defs":[{"pos":"v.","m":"（偶然）发生；碰巧","ex":[{"l":1,"en":"What happened to you yesterday?","zh":"你昨天发生什么事了？"},{"l":2,"en":"No one knew what had happened until the police arrived at the scene of the accident.","zh":"直到警察赶到事故现场，才有人知道发生了什么事。"},{"l":3,"en":"It was lucky that he happened to be passing by when the old man fell down on the street.","zh":"幸运的是，老人在街上摔倒时，他恰好路过。"}]}]},{"day":24,"w":"happily","ph":"","defs":[{"pos":"adv.","m":"幸福地；快乐地，高兴地","ex":[{"l":1,"en":"The children played happily in the park.","zh":"孩子们在公园里快乐地玩耍。"},{"l":2,"en":"After winning the match, the players hugged each other happily and cheered loudly.","zh":"赢得比赛后，队员们高兴地拥抱在一起并大声欢呼。"},{"l":3,"en":"Looking back on those summer days, I still remember how happily we ran through the golden fields.","zh":"回想起那些夏日，我依然记得我们在金色田野里奔跑得多么快乐。"}]}]},{"day":24,"w":"happiness","ph":"","defs":[{"pos":"n.","m":"幸福；快乐","ex":[{"l":1,"en":"It is my opinion that spending money on experiences brings greater happiness.","zh":"我认为把钱花在经历上能带来更大的幸福。"},{"l":2,"en":"Many people believe that true happiness comes not from money but from the love of family and friends.","zh":"许多人相信，真正的幸福不是来自金钱，而是来自家人和朋友的爱。"},{"l":3,"en":"What the old man wants to tell us is that happiness lies in simple things we often ignore.","zh":"老人想告诉我们的是，幸福藏在我们常常忽略的简单事物中。"}]}]},{"day":24,"w":"happy","ph":"","defs":[{"pos":"adj.","m":"幸福的；快乐的，高兴的","ex":[{"l":1,"en":"He might feel happy because Grandma loved his gift.","zh":"他可能感到高兴，因为奶奶喜欢他的礼物。"},{"l":2,"en":"Whenever she receives a letter from her old friend, she feels happy and smiles like a child.","zh":"每当收到老朋友的来信，她都感到快乐，像孩子一样笑起来。"},{"l":3,"en":"It is not the gift itself but the thought behind it that makes Grandma feel truly happy.","zh":"让奶奶真正感到快乐的不是礼物本身，而是礼物背后的那份心意。"}]}]},{"day":24,"w":"hard","ph":"","defs":[{"pos":"adv.","m":"努力地；使劲；猛烈地","ex":[{"l":1,"en":"You should have studied much harder.","zh":"你本应该更加努力学习。"},{"l":2,"en":"We know that someone tried hard to make our visit special. Thanks so much for going above and beyond!","zh":"我们知道有人为了让我们的到访与众不同而尽心尽力。非常感谢你们的付出！"},{"l":3,"en":"Only those who work hard under pressure can finally achieve the goals they have dreamed of for years.","zh":"只有在压力下仍努力拼搏的人，才能最终实现他们梦想多年的目标。"}]},{"pos":"adj.","m":"硬的；困难的；艰难的","ex":[{"l":1,"en":"You should have studied much harder.","zh":"你本应该更加努力。"},{"l":2,"en":"We know that someone tried hard to make our visit special. Thanks so much for going above and beyond!","zh":"我们知道有人为了让我们的到访与众不同而尽心尽力。非常感谢你们的付出！"},{"l":3,"en":"It is a hard decision to make, yet every parent must face it when their child grows up.","zh":"这是一个艰难的决定，但当孩子长大时，每位父母都必须面对。"}]}]},{"day":24,"w":"hardly","ph":"","defs":[{"pos":"adv.","m":"几乎不","ex":[{"l":1,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在游学途中遇到一些少年，现在仍与他们保持联系，但我几乎记不起旅途中买了什么。"},{"l":2,"en":"The old man lives alone in the village and hardly ever goes out because his legs are weak.","zh":"老人独自住在村子里，因为腿脚无力，几乎从不外出。"},{"l":3,"en":"Hardly had the bell rung when the students rushed out of the classroom to enjoy the short break.","zh":"铃声一响，学生们就冲出教
