[{"pos":"adj.","m":"如此的；真的","ex":[{"l":1,"en":"I hope so.","zh":"我希望如此。"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包如此之重,以至于当我们把它们放在地上时,我们大大地松了一口气,而我们叔叔的背包却是半空的。"},{"l":3,"en":"So touching was the film that many students could not help crying, and they realized that true love was so powerful a force that it could change a person completely.","zh":"这部电影如此感人,以至于许多学生忍不住哭了起来,他们意识到真爱是一股如此强大的力量,它能彻底改变一个人。"}]},{"pos":"adv.","m":"如此；这么；也；同样","ex":[{"l":1,"en":"I hope so.","zh":"我希望如此。"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包如此之重,以至于当我们把它们放在地上时,我们大大地松了一口气,而我们叔叔的背包却是半空的。"},{"l":3,"en":"He ran so fast in the race that he left all the other runners far behind, and it was clear that his hard training had finally paid off.","zh":"他在比赛中跑得如此之快,以至于把所有其他选手远远甩在身后,很明显,他艰苦的训练终于得到了回报。"}]},{"pos":"conj.","m":"因此；所以；为的是，以便","ex":[{"l":1,"en":"I hope so.","zh":"我希望如此。"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包如此之重,以至于当我们把它们放在地上时,我们大大地松了一口气,而我们叔叔的背包却是半空的。"},{"l":3,"en":"It was raining heavily, so we had to stay at home; therefore, we decided to read some books so that we could make full use of the rainy day.","zh":"雨下得很大,所以我们只好待在家里;因此,我们决定读些书,以便充分利用这个雨天。"}]}]},{"day":49,"w":"social","ph":"","defs":[{"pos":"adj.","m":"社会上的；社会地位的；社交的","ex":[{"l":1,"en":"We use social apps every day.","zh":"我们每天都使用社交软件。"},{"l":2,"en":"Although social media helps us keep in touch with friends, it may also bring some problems if we spend too much time on it.","zh":"虽然社交媒体帮助我们与朋友保持联系,但如果我们花太多时间在上面,它也可能带来一些问题。"},{"l":3,"en":"It is social skills, rather than high grades alone, that truly help a person succeed in a team where cooperation is highly valued.","zh":"真正帮助一个人在高度重视合作精神的团队中取得成功的,是社交能力,而不仅仅是高分。"}]}]},{"day":49,"w":"society","ph":"","defs":[{"pos":"n.","m":"社会","ex":[{"l":1,"en":"We live in a modern society.","zh":"我们生活在一个现代社会中。"},{"l":2,"en":"In today's society, people are paying more and more attention to environmental protection because they realize how important a clean environment is.","zh":"在当今社会,人们越来越重视环境保护,因为他们意识到一个清洁的环境有多么重要。"},{"l":3,"en":"Only when every member of society takes action to protect the earth can we build a greener and more harmonious world for the generations to come.","zh":"只有当社会的每一位成员都采取行动保护地球时,我们才能为子孙后代建设一个更绿色、更和谐的世界。"}]}]},{"day":49,"w":"soft","ph":"","defs":[{"pos":"adj.","m":"软的；柔软的","ex":[{"l":1,"en":"The bed is soft and comfortable.","zh":"这张床又软又舒服。"},{"l":2,"en":"The toy bear feels so soft that the little girl carries it everywhere she goes, even when she travels with her parents.","zh":"这只玩具熊摸起来如此柔软,以至于小女孩走到哪儿都带着它,甚至和父母一起旅行时也不例外。"},{"l":3,"en":"Soft as the pillow looks, it actually provides strong support for the neck, which is why people who often suffer from neck pain prefer it.","zh":"这枕头看起来虽然柔软,但其实为颈部提供了有力的支撑,这就是经常受颈部疼痛困扰的人偏爱它的原因。"}]}]},{"day":49,"w":"softly","ph":"","defs":[{"pos":"adv.","m":"温柔地","ex":[{"l":1,"en":"Lily asked her son to close the door softly in order not to disturb others.","zh":"莉莉让她儿子轻轻关门,以免打扰别人。"},{"l":2,"en":"The mother spoke so softly to her crying baby that the little child stopped weeping and fell asleep in her arms within a few minutes.","zh":"这位母亲对哭闹的婴儿说话如此温柔,以至于孩子很快停止了哭泣,在她怀里几分钟就睡着了。"},{"l":3,"en":"Softly humming an old song, the grandmother sat by the window, recalling the days when she was young and the world seemed much simpler.","zh":"祖母轻声哼着一首老歌,坐在窗边,回忆着她年轻时的那些日子,那时的世界似乎简单得多。"}]}]},{"day":49,"w":"soldier","ph":"","defs":[{"pos":"n.","m":"士兵；战士","ex":[{"l":1,"en":"The soldier stood in the rain.","zh":"那名士兵站在雨中。"},{"l":2,"en":"The young soldier was so brave that he saved three children from the burning house before the firefighters arrived.","zh":"那名年轻士兵非常勇敢,在消防员赶到之前,他从着火的房子里救出了三个孩子。"},{"l":3,"en":"Wearing a uniform covered with dust, the old soldier told the students stories about the war, hoping that they would never forget the peace they enjoy today.","zh":"这位老战士穿着沾满灰尘的制服,向学生们讲述战争故事,希望他们永远不要忘记今天所享受的和平。"}]}]},{"day":49,"w":"solution","ph":"","defs":[{"pos":"n.","m":"解决方法；解答","ex":[{"l":1,"en":"Let's find a good solution.","zh":"让我们想出一个好办法。"},{"l":2,"en":"After a long discussion, the team finally found a solution to the problem that had troubled them for weeks.","zh":"经过长时间讨论,这个团队终于找到了困扰他们数周的那个问题的解决办法。"},{"l":3,"en":"There is no simple solution to this problem unless we take action immediately; the longer we wait, the worse the situation will become.","zh":"除非我们立即采取行动,否则这个问题没有简单的解决办法;我们等得越久,情况就会变得越糟。"}]}]},{"day":49,"w":"solve","ph":"","defs":[{"pos":"v.","m":"解决；解答","ex":[{"l":1,"en":"If these problems aren't solved well, they may bring bad results.","zh":"如果这些问题没有得到很好的解决,它们可能会带来不良后果。"},{"l":2,"en":"The clever boy solved the difficult math problem before anyone else in the class, which really surprised his teacher.","zh":"这个聪明的男孩比班里其他任何人都更早解出了这道数学难题,这让他的老师非常惊讶。"},{"l":3,"en":"To solve the problem of heavy traffic, the government has decided to build more underground lines, which will make it much easier for people to travel across the city.","zh":"为了解决交通拥堵问题,政府已决定修建更多地铁线路,这将使人们穿越城市出行变得容易得多。"}]}]},{"day":49,"w":"some","ph":"","defs":[{"pos":"adj.","m":"一些；若干；几个；某一","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"有些植物有自己独特的办法来驱赶动物。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想说的是,尽管有人说拥有东西是一种极大的快乐,但我认为使用你所拥有的东西更加令人愉快。"},{"l":3,"en":"Some students prefer studying alone in a quiet room, while others find that working in a group helps them understand difficult ideas more easily.","zh":"有些学生喜欢在安静的房间里独自学习,而另一些学生则发现小组合作有助于他们更轻松地理解难懂的概念。"}]},{"pos":"pron.","m":"若干；一些","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"有些植物有自己独特的办法来驱赶动物。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想说的是,尽管有人说拥有东西是一种极大的快乐,但我认为使用你所拥有的东西更加令人愉快。"},{"l":3,"en":"I have read some of the books on the shelf, but there are still many that I have never opened, waiting to be explored on a quiet weekend.","zh":"我已经读过书架上的一些书,但仍有许多我从未翻开过,等着在一个安静的周末去探索。"}]}]},{"day":49,"w":"somebody/someone","ph":"","defs":[{"pos":"pron.","m":"某人；有人","ex":[{"l":1,"en":"Somebody is knocking at the door.","zh":"有人在敲门。"},{"l":2,"en":"When somebody is in trouble, we should try our best to help him instead of just walking away.","zh":"当有人遇到困难时,我们应该尽力帮助他,而不是径直走开。"},{"l":3,"en":"There must be someone who knows the answer to this question, so let's keep asking until we find the right person.","zh":"一定有人知道这个问题的答案,所以我们继续问下去,直到找到合适的人。"}]}]},{"day":49,"w":"something","ph":"","defs":[{"pos":"pron.","m":"某事；某物","ex":[{"l":1,"en":"Let's talk about something else.","zh":"我们谈点别的吧。"},{"l":2,"en":"The degree might be in cartography, geography, or something similar.","zh":"这个学位可能是制图学、地理学或类似的专业。"},{"l":3,"en":"There is something special about the way she sings that makes everyone in the hall stop talking and listen carefully.","zh":"她唱歌的方式有一种特别之处,能让大厅里的每一个人都停止交谈,认真聆听。"}]}]},{"day":49,"w":"sometimes","ph":"","defs":[{"pos":"adv.","m":"有时","ex":[{"l":1,"en":"Sometimes my father's job makes me feel unhappy and lonely because he's always very busy.","zh":"有时候爸爸的工作让我感到不开心和孤独,因为他总是很忙。"},{"l":2,"en":"Sometimes we make mistakes, but what really matters is whether we can learn from them and do better next time.","zh":"有时我们会犯错,但真正重要的是我们能否从中吸取教训,下次做得更好。"},{"l":3,"en":"Sometimes the bravest thing a person can do is to admit that he was wrong, because it takes real courage to face one's own mistakes.","zh":"有时一个人能做的最勇敢的事就是承认自己错了,因为面对自己的错误需要真正的勇气。"}]}]},{"day":49,"w":"son","ph":"","defs":[{"pos":"n.","m":"儿子","ex":[{"l":1,"en":"Lily asked her son to close the door softly in order not to disturb others.","zh":"莉莉让她儿子轻轻关门,以免打扰别人。"},{"l":2,"en":"The proud mother watched her son receive the first prize on stage, tears of joy filling her eyes.","zh":"这位自豪的母亲看着儿子在台上领取一等奖,眼中盈满喜悦的泪水。"},{"l":3,"en":"The old man's son, who had been working abroad for years, finally returned home, bringing with him a gift that the family would never forget.","zh":"这位老人在国外工作多年的儿子终于回家了,他带回了一件让家人难以忘怀的礼物。"}]}]},{"day":49,"w":"song","ph":"","defs":[{"pos":"n.","m":"歌唱；歌曲","ex":[{"l":1,"en":"She sang a beautiful song.","zh":"她唱了一首动听的歌。"},{"l":2,"en":"The little girl sang a sweet song that her grandmother had taught her, which brought back many happy memories.","zh":"小女孩唱起奶奶教过她的那首甜美的歌,这勾起了许多快乐的回忆。"},{"l":3,"en":"Listening to a familiar song, he suddenly remembered the summer he spent in the small village, a time that had shaped who he was today.","zh":"听到一首熟悉的歌,他突然想起了在那个小村庄度过的夏天,那段时光塑造了今天的他。"}]}]},{"day":50,"w":"soon","ph":"","defs":[{"pos":"adv.","m":"不久，很快，一会","ex":[{"l":1,"en":"The engineer promised to finish the task as soon as possible.","zh":"那位工程师承诺尽快完成这项任务。"},{"l":2,"en":"Please write back to me as soon as you arrive in Beijing so that my parents will not worry about you.","zh":"请一到北京就给我回信,这样我的父母就不会担心你了。"},{"l":3,"en":"No sooner had the bell rung than the students rushed out of the classroom, eager to start their long-awaited summer holiday.","zh":"铃声一响,学生们就冲出了教室,迫不及待地开始他们期待已久的暑假。"}]}]},{"day":50,"w":"sorry","ph":"","defs":[{"pos":"adj.","m":"对不起的；抱歉的；难过的","ex":[{"l":1,"en":"I am sorry for being late.","zh":"很抱歉我迟到了。"},{"l":2,"en":"I am really sorry that I broke your cup, so I will buy you a new one as soon as possible.","zh":"真的很抱歉我打碎了你的杯子,所以我会尽快给你买一个新的。"},{"l":3,"en":"Feeling deeply sorry for what he had said, the boy apologized to his friend, realizing that thoughtless words could sometimes hurt the people closest to us.","zh":"男孩为自己说过的话深感抱歉,向朋友道了歉,他意识到轻率的话语有时会伤害最亲近的人。"}]}]},{"day":50,"w":"sound","ph":"","defs":[{"pos":"n.","m":"声音","ex":[{"l":1,"en":"I heard a strange sound.","zh":"我听到一个奇怪的声音。"},{"l":2,"en":"The sound of the rain against the window was so loud that I could hardly hear what the teacher was saying.","zh":"雨打在窗户上的声音太大了,我几乎听不清老师在说什么。"},{"l":3,"en":"The sound of laughter coming from the next room made it clear that the children were having a wonderful time, which warmed the whole house.","zh":"隔壁房间传来的笑声清楚地表明,孩子们玩得非常开心,这温暖了整间屋子。"}]},{"pos":"v.","m":"听起来；发出声音","ex":[{"l":1,"en":"Your idea sounds great.","zh":"你的主意听起来很棒。"},{"l":2,"en":"The plan sounds perfect, but we still need to discuss whether it can really work.","zh":"这个计划听起来很完美，但我们仍需要讨论它是否真的行得通。"},{"l":3,"en":"What sounds like an ordinary song may actually carry a deep message that touches everyone who listens carefully.","zh":"听起来像一首普通歌曲的作品，也许其实蕴含着打动每位细心聆听者的深刻寓意。"}]}]},{"day":50,"w":"soup","ph":"","defs":[{"pos":"n.","m":"汤","ex":[{"l":1,"en":"I would like a bowl of tomato soup.","zh":"我想要一碗番茄汤。"},{"l":2,"en":"The soup that my mother made for dinner was so delicious that I asked for more.","zh":"妈妈晚饭做的那锅汤太好喝了，以至于我又要了一些。"},{"l":3,"en":"Served with fresh bread, the hot soup warmed the travelers who had been walking in the rain for hours.","zh":"配上新鲜面包，这碗热汤温暖了那些在雨中行走了数小时的旅人。"}]}]},{"day":50,"w":"south","ph":"","defs":[{"pos":"n.","m":"南；南方；南部","ex":[{"l":1,"en":"The canal will carry millions of liters of water from the south to the north.","zh":"这条运河将把数百万升的水从南方运到北方。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它被修建起来，作为一条通道，把中国南方富饶农业区的粮食运送到北方的城市。"},{"l":3,"en":"Only when you travel from the south to the north can you realize how greatly the climate and food differ across the country.","zh":"只有当你从南方旅行到北方时，你才能意识到全国各地的气候和食物差异有多大。"}]},{"pos":"adj.","m":"南（方）的；向南的","ex":[{"l":1,"en":"The canal will carry millions of liters of water from the south to the north.","zh":"这条运河将把数百万升的水从南方运到北方。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它被修建起来，作为一条通道，把中国南方富饶农业区的粮食运送到北方的城市。"},{"l":3,"en":"Standing on the south gate of the old city, we watched the sun go down behind the green hills in the distance.","zh":"站在古城的南门上，我们望着太阳在远处青山后落下。"}]}]},{"day":50,"w":"space","ph":"","defs":[{"pos":"n.","m":"空间；太空","ex":[{"l":1,"en":"They measure land, air space, and water areas.","zh":"他们测量陆地、空域和水域。"},{"l":2,"en":"There is enough space in the new classroom for fifty students to study comfortably at the same time.","zh":"新教室里有足够的空间，可以同时容纳五十名学生舒适地学习。"},{"l":3,"en":"It is in the quiet space of the small library that I finally found the courage to read aloud and express my own ideas.","zh":"正是在那间小图书馆的安静空间里，我终于鼓起勇气大声朗读并表达自己的想法。"}]}]},{"day":50,"w":"spaceship","ph":"","defs":[{"pos":"n.","m":"宇宙飞船","ex":[{"l":1,"en":"The spaceship flew into space.","zh":"宇宙飞船飞入了太空。"},{"l":2,"en":"The astronauts who traveled in the spaceship spent six months doing experiments in the space station.","zh":"乘坐这艘宇宙飞船旅行的宇航员们，花了六个月时间在空间站做实验。"},{"l":3,"en":"Launched last year, the new spaceship is expected to carry not only scientists but also ordinary visitors beyond the earth.","zh":"这艘去年发射的新宇宙飞船，预计不仅将搭载科学家，还将搭载普通游客飞越地球。"}]}]},{"day":50,"w":"spare","ph":"","defs":[{"pos":"adj.","m":"空闲的；多余的，剩余的","ex":[{"l":1,"en":"For example, I spend most of my spare money on new parts for my old mountain bike, but I love the experience of cycling, not owning bike parts!","zh":"例如，我把大部分零花钱花在给旧山地车买新零件上，但我热爱的是骑行的体验，而不是拥有自行车零件！"},{"l":2,"en":"In my spare time, I prefer reading novels that take me to places I have never been to before.","zh":"在业余时间里，我更喜欢读那些把我带到从未去过之处的小说。"},{"l":3,"en":"Not until I entered senior high did I realize how valuable those spare minutes before class really were.","zh":"直到进入高中，我才意识到课前那点空闲时间有多么宝贵。"}]}]},{"day":50,"w":"speak","ph":"","defs":[{"pos":"v.","m":"说；讲；谈话；发言","ex":[{"l":1,"en":"Please speak slowly.","zh":"请慢慢说。"},{"l":2,"en":"The teacher asked us to speak English as often as possible so that we could improve quickly.","zh":"老师让我们尽可能经常地说英语，以便我们能很快提高。"},{"l":3,"en":"Confident enough to speak in front of hundreds of people, the shy girl surprised everyone who had once doubted her.","zh":"这个腼腆的女孩有足够的自信在数百人面前发言，让所有曾经怀疑过她的人都感到惊讶。"}]}]},{"day":50,"w":"special","ph":"","defs":[{"pos":"adj.","m":"特别的；专门的","ex":[{"l":1,"en":"Some plants, such as the oak tree, have special ways to discourage leaf-eating animals.","zh":"一些植物，比如橡树，有特殊的方法来阻止吃叶子的动物。"},{"l":2,"en":"We know that someone tried hard to make our visit special. Thanks so much for going above and beyond!","zh":"我们知道有人努力让我们的拜访变得特别。非常感谢你们的尽心竭力！"},{"l":3,"en":"What makes the festival special is that people of all ages gather together to share stories passed down by their grandparents.","zh":"让这个节日显得特别的，是各个年龄段的人们齐聚一堂，分享祖辈传下来的故事。"}]}]},{"day":50,"w":"speech","ph":"","defs":[{"pos":"n.","m":"演讲；说话","ex":[{"l":1,"en":"Your fan, Carmen Rivera --- A head master is giving a speech about how to perform successfully in an interview to a new school.","zh":"你的粉丝卡门·里韦拉——一位校长正在发表演讲，讲述如何在新学校的面试中表现出色。"},{"l":2,"en":"The speech that the headmaster gave at the opening ceremony encouraged every student to work hard for their dreams.","zh":"校长在开学典礼上发表的那场演讲，鼓励了每一位学生为梦想而努力。"},{"l":3,"en":"Having prepared for weeks, she finally delivered a speech so moving that the whole hall fell silent for a long moment.","zh":"经过数周准备，她终于发表了一场如此动人的演讲，整个大厅静默了好一会儿。"}]}]},{"day":50,"w":"speed","ph":"","defs":[{"pos":"n.","m":"速度","ex":[{"l":1,"en":"The car runs at high speed.","zh":"汽车高速行驶。"},{"l":2,"en":"When the snow began to fall, the bus slowed down because driving at high speed was dangerous.","zh":"当雪开始下时，公交车放慢了速度，因为高速行驶很危险。"},{"l":3,"en":"It was at the speed of light that the news spread across the school, leaving no one uninformed by noon.","zh":"消息以光速传遍了全校，到中午时已无人不知。"}]},{"pos":"v.","m":"(使）加速","ex":[{"l":1,"en":"The boy sped down the hill.","zh":"男孩飞速冲下山坡。"},{"l":2,"en":"The driver sped up when he saw the green light, hoping to reach the station before the train left.","zh":"司机看到绿灯便加速，希望能在火车开走前赶到车站。"},{"l":3,"en":"Realizing that she was already late, Lucy sped along the quiet street, only to find the library doors closed.","zh":"意识到自己已经迟到，露西沿着安静的街道飞奔，结果却发现图书馆大门已关。"}]}]},{"day":50,"w":"spend","ph":"","defs":[{"pos":"v.","m":"度过；花费（钱，时间等）","ex":[{"l":1,"en":"It is my opinion that spending money on experiences brings greater happiness.","zh":"我的观点是，把钱花在经历上能带来更大的幸福感。"},{"l":2,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"根据家庭医生的说法，路易丝至少能活到130岁。她的愿望是工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"However busy she is, she always finds time to spend with her children, believing that no success is worth missing their childhood.","zh":"无论多忙，她总能抽出时间陪伴孩子们，她相信任何成功都不值得错过他们的童年。"}]}]},{"day":50,"w":"spoon","ph":"","defs":[{"pos":"n.","m":"调羹","ex":[{"l":1,"en":"Pass me a spoon, please.","zh":"请递给我一把勺子。"},{"l":2,"en":"I dropped my spoon on the floor, so I had to ask the waiter to bring me a clean one.","zh":"我把勺子掉在了地上，所以我只好请服务员给我拿一把干净的。"},{"l":3,"en":"With only a spoon and a bowl of hot porridge, the old man sat by the window, watching the first snow of winter fall softly.","zh":"老人仅凭一把勺子和一碗热粥，坐在窗边，望着冬天的第一场雪轻轻飘落。"}]}]},{"day":50,"w":"sport","ph":"","defs":[{"pos":"n.","m":"体育运动，锻炼","ex":[{"l":1,"en":"Try to do regular sports. The mind needs exercise as well as the body.","zh":"尽量定期做运动。大脑和身体一样需要锻炼。"},{"l":2,"en":"Although he was tired after school, he still went to play his favorite sport with his friends.","zh":"尽管放学后他很累，他仍然去和朋友们做他最喜欢的运动。"},{"l":3,"en":"Only by taking up a sport and sticking to it day after day can a student truly build both a strong body and a strong will.","zh":"只有开始一项运动并日复一日地坚持下去，学生才能真正锻炼出强健的体魄和坚强的意志。"}]}]},{"day":50,"w":"spread","ph":"","defs":[{"pos":"v.","m":"延伸；展开","ex":[{"l":1,"en":"The news spread widely after it was reported by a local newspaper.","zh":"这条消息在一家当地报纸报道后广泛传播开来。"},{"l":2,"en":"The fire spread so quickly that the firefighters could hardly control it within the first hour.","zh":"火势蔓延得如此之快，以至于消防员在头一个小时内几乎无法控制。"},{"l":3,"en":"Spread across the mountains in autumn, the golden leaves attract thousands of travelers who come just to take photos.","zh":"秋天，金黄的树叶铺展在群山之间，吸引了成千上万专程前来拍照的游客。"}]}]},{"day":50,"w":"spring","ph":"","defs":[{"pos":"n.","m":"春天，春季","ex":[{"l":1,"en":"Spring is my favorite season.","zh":"春天是我最喜欢的季节。"},{"l":2,"en":"When spring comes, the flowers in the garden begin to open and the air smells sweet.","zh":"当春天到来时，花园里的花开始绽放，空气闻起来很香甜。"},{"l":3,"en":"It is in spring, when everything comes back to life, that I always feel hopeful about the year ahead.","zh":"正是在万物复苏的春天，我总是对接下来的一年充满希望。"}]}]},{"day":50,"w":"square","ph":"","defs":[{"pos":"n.","m":"广场","ex":[{"l":1,"en":"Many people dance in the square.","zh":"许多人在广场上跳舞。"},{"l":2,"en":"The square which is located in the center of the city is always crowded with tourists on weekends.","zh":"位于市中心的那个广场在周末总是挤满了游客。"},{"l":3,"en":"Not until I stood in the middle of the vast square did I understand why so many poets had written about this city.","zh":"直到我站在那片广阔广场的中央，我才明白为什么有那么多诗人写过这座城市。"}]},{"pos":"adj.","m":"平方的；方形的","ex":[{"l":1,"en":"The table is square.","zh":"这张桌子是方形的。"},{"l":2,"en":"The square box that grandma gave me is filled with old photos of our family.","zh":"奶奶给我的那个方盒子里装满了我们家的旧照片。"},{"l":3,"en":"Covering an area of about nine square kilometers, the wetland has become home to hundreds of birds that fly here every winter.","zh":"这片湿地占地约九平方公里，已成为每年冬天飞来此地的数百种鸟类的家园。"}]}]},{"day":50,"w":"staff","ph":"","defs":[{"pos":"n.","m":"全体职员","ex":[{"l":1,"en":"The staff are friendly.","zh":"员工们很友好。"},{"l":2,"en":"All the staff in the hotel worked together to make sure that every guest had a comfortable stay.","zh":"酒店的所有员工齐心协力，确保每位客人都能住得舒适。"},{"l":3,"en":"Praised by the manager for their excellent service, the young staff felt that months of hard work had finally paid off.","zh":"因出色的服务受到经理表扬，这些年轻员工觉得数月的辛苦终于有了回报。"}]}]},{"day":50,"w":"stamp","ph":"","defs":[{"pos":"n.","m":"邮票","ex":[{"l":1,"en":"I have a beautiful stamp from China.","zh":"我有一枚来自中国的漂亮邮票。"},{"l":2,"en":"The stamp which my uncle sent me from France has become my favourite one in the collection.","zh":"我叔叔从法国寄给我的那枚邮票成了我收藏中最喜欢的一枚。"},{"l":3,"en":"Not only does this rare stamp remind me of my grandfather, but it also teaches me to value the small things in life.","zh":"这枚稀有邮票不仅让我想起祖父，还教会我珍视生活中的小事。"}]}]},{"day":50,"w":"stand","ph":"","defs":[{"pos":"v.","m":"站；战立","ex":[{"l":1,"en":"Stand up,please.","zh":"请起立。"},{"l":2,"en":"The teacher asked the students to stand in a line so that everyone could see the blackboard clearly.","zh":"老师让学生们站成一排，这样大家都能看清黑板。"},{"l":3,"en":"Tired as he was after the long race, he still managed to stand tall and smile at the cheering crowd.","zh":"尽管长跑之后筋疲力尽，他仍挺直身板，向欢呼的人群微笑。"}]}]},{"day":50,"w":"star","ph":"","defs":[{"pos":"n.","m":"星；恒星","ex":[{"l":1,"en":"I can see a bright star in the sky.","zh":"我能看到天空中一颗明亮的星星。"},{"l":2,"en":"When I was a child, I believed that every star in the sky was watching over me at night.","zh":"小时候我相信天上的每颗星星都在夜晚守护着我。"},{"l":3,"en":"Looking up at the countless stars, I suddenly understood why ancient people told so many stories about the sky.","zh":"仰望无数星辰，我突然明白了古人为何讲述那么多关于天空的故事。"}]}]},{"day":50,"w":"start","ph":"","defs":[{"pos":"v.","m":"开始，着手；出发","ex":[{"l":1,"en":"The boy started to live in school and learn to manage time by himself.","zh":"那个男孩开始住校，并学着独自管理时间。"},{"l":2,"en":"Before we started on our road trip, we packed up the car with snacks, water, and music.","zh":"出发自驾游之前，我们把零食、水和音乐装满了车。"},{"l":3,"en":"Having started the project with little confidence, the students finally surprised everyone with their creative ideas.","zh":"虽然开始这个项目时信心不足，学生们最终以创意点子让所有人惊叹。"}]},{"pos":"n.","m":"开端，开始","ex":[{"l":1,"en":"Spring is the start of a new year for farmers.","zh":"对农民来说，春天是一年新的开始。"},{"l":2,"en":"A good start is very important because it gives us the confidence to keep going when things get hard.","zh":"良好的开端很重要，因为它在困难时给我们继续前行的信心。"},{"l":3,"en":"Only by making a careful start can we avoid the mistakes that have troubled us in the past.","zh":"只有谨慎地开始，我们才能避免过去困扰我们的错误。"}]}]},{"day":50,"w":"state","ph":"","defs":[{"pos":"n.","m":"状态；情形；国家；（美国的）州","ex":[{"l":1,"en":"The room is in a dirty state.","zh":"房间处于脏乱的状态。"},{"l":2,"en":"After the heavy rain, the roads were in such a bad state that many cars could not pass through safely.","zh":"大雨过后，道路状况如此糟糕，许多车辆无法安全通过。"},{"l":3,"en":"What worries the doctors most is the state of the patient's health after such a long illness.","zh":"最令医生担心的是病人在久病之后身体的状况。"}]}]},{"day":50,"w":"station","ph":"","defs":[{"pos":"n.","m":"车站；点台","ex":[{"l":1,"en":"We will meet at the train station.","zh":"我们将在火车站见面。"},{"l":2,"en":"Please let me know as soon as you arrive at the station so that I can pick you up.","zh":"你一到车站就请告诉我，这样我可以去接你。"},{"l":3,"en":"It was at this small station that I said goodbye to my best friend before he moved to another city.","zh":"正是在这个小车站，我与即将搬去另一座城市的好友道别。"}]}]},{"day":50,"w":"stay","ph":"","defs":[{"pos":"n.","m":"停留，逗留","ex":[{"l":1,"en":"We had a short stay in Beijing.","zh":"我们在北京短暂停留。"},{"l":2,"en":"During our stay in the village, we learned how the farmers grew rice and raised chickens.","zh":"在村子逗留期间，我们学会了农民如何种稻养鸡。"},{"l":3,"en":"My stay in the mountain town, though short, turned out to be the most unforgettable part of the whole journey.","zh":"我在山城的逗留虽短，却成了整趟旅程中最难忘的部分。"}]},{"pos":"v.","m":"停留，逗留，呆；保持，继续","ex":[{"l":1,"en":"I would have had a much better holiday if I had stayed at home.","zh":"如果我呆在家里，假期会好得多。"},{"l":2,"en":"Please stay here until the rain stops, because the roads outside are too dangerous for children.","zh":"请在这里待到雨停，因为外面的路对孩子们来说太危险了。"},{"l":3,"en":"No matter how far we travel, it is the warm home that we always wish to stay in at the end of the day.","zh":"无论我们走得多远，温暖的家始终是一天结束时最想停留的地方。"}]}]},{"day":50,"w":"steak","ph":"","defs":[{"pos":"n.","m":"牛排","ex":[{"l":1,"en":"My father ordered a steak for dinner.","zh":"我爸爸晚餐点了一份牛排。"},{"l":2,"en":"The steak that my mother cooked last night was so tender that everyone wanted a second piece.","zh":"妈妈昨晚煎的牛排那么嫩，每个人都想再来一块。"},{"l":3,"en":"Having waited an hour for the famous steak, we finally understood why the restaurant was always full of people.","zh":"等了一个小时才吃到那块有名的牛排，我们终于明白这家餐厅为何总是座无虚席。"}]}]},{"day":50,"w":"steal","ph":"","defs":[{"pos":"v.","m":"偷，窃取","ex":[{"l":1,"en":"A bad man tried to steal my bike.","zh":"一个坏人企图偷我的自行车。"},{"l":2,"en":"The police caught the thief who tried to steal a mobile phone from the shop yesterday afternoon.","zh":"警察抓住了昨天下午企图从商店偷手机的贼。"},{"l":3,"en":"To steal even a small thing is wrong, and such a habit may ruin a young person's whole future.","zh":"哪怕偷一件小东西也是错的，这种习惯可能毁掉一个年轻人的整个未来。"}]}]},{"day":50,"w":"steam","ph":"","defs":[{"pos":"n.","m":"汽，水蒸气","ex":[{"l":1,"en":"Steam rose from the hot water.","zh":"蒸汽从热水中升起。"},{"l":2,"en":"When the soup is ready, you will see steam rising slowly from the bowl in the cold kitchen.","zh":"汤做好时，你会看到蒸汽从寒冷厨房里的碗中缓缓升起。"},{"l":3,"en":"Driven by steam, the old engine once carried thousands of passengers across the mountain before trains were electrified.","zh":"在火车电气化之前，这台靠蒸汽驱动的旧机车曾载着成千上万名乘客翻越群山。"}]}]},{"day":50,"w":"step","ph":"","defs":[{"pos":"n.","m":"脚步；台阶","ex":[{"l":1,"en":"He took two steps forward.","zh":"他向前走了两步。"},{"l":2,"en":"Please watch your step when you climb the wet steps, or you may fall and hurt yourself.","zh":"爬湿滑的台阶时请当心脚下，否则可能会摔倒受伤。"},{"l":3,"en":"Every step the young scientist takes brings her closer to the answer she has been searching for years.","zh":"这位年轻科学家迈出的每一步都让她更接近她寻找多年的答案。"}]},{"pos":"v.","m":"走；跨步","ex":[{"l":1,"en":"She stepped into the room quietly.","zh":"她悄悄地走进房间。"},{"l":2,"en":"After he stepped off the bus, he realised that he had left his schoolbag on the seat.","zh":"他下了公交车后才意识到把书包落在了座位上。"},{"l":3,"en":"Stepping out of the dark cave at last, the children felt that the sunlight had never been so warm and welcome.","zh":"孩子们终于走出黑暗的洞穴，感到阳光从未如此温暖而亲切。"}]}]},{"day":51,"w":"stick","ph":"","defs":[{"pos":"v.","m":"黏住；钉住；坚持","ex":[{"l":1,"en":"Please stick the photo on the wall.","zh":"请把照片贴在墙上。"},{"l":2,"en":"If you stick to your plan every day, you will surely make great progress in your studies.","zh":"如果你每天坚持计划，学习上一定会取得巨大进步。"},{"l":3,"en":"Only those who stick to their dreams in the hardest times can finally see them come true.","zh":"只有在最艰难时刻仍坚持梦想的人，才能最终看到梦想成真。"}]},{"pos":"n.","m":"木棒（棍）；枝条","ex":[{"l":1,"en":"The old man walked with a stick.","zh":"老人拄着拐杖走路。"},{"l":2,"en":"The boy picked up a stick and used it to draw a big circle on the sandy ground.","zh":"男孩捡起一根木棍，用它 在沙地上画了一个大圆。"},{"l":3,"en":"With nothing but a wooden stick in hand, the brave girl managed to scare the wild dog away from her little brother.","zh":"手里只有一根木棍，勇敢的女孩却成功把野狗从弟弟身边赶走了。"}]}]},{"day":51,"w":"still","ph":"","defs":[{"pos":"adv.","m":"仍然，还","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍是中国交通系统中重要的一部分。"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在游学途中遇到一些少年，现在仍与他们保持联系，但我几乎记不起旅途中买了什么。"},{"l":3,"en":"Even after so many years, the old song still brings back the sweet memories of my childhood summers.","zh":"即使过了这么多年，这首老歌仍唤起我童年夏天的美好回忆。"}]},{"pos":"adj.","m":"不动的；平静的","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍是中国交通系统中重要的一部分。"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在游学途中遇到一些少年，现在仍与他们保持联系，但我几乎记不起旅途中买了什么。"},{"l":3,"en":"Keep still for a moment, and you will hear the soft singing of birds hidden among the leaves.","zh":"保持片刻不动，你就会听到藏在树叶间的鸟儿轻柔的歌声。"}]}]},{"day":51,"w":"stocking","ph":"","defs":[{"pos":"n.","m":"长筒袜","ex":[{"l":1,"en":"She hung a stocking by the bed.","zh":"她在床边挂了一只长筒袜。"},{"l":2,"en":"On Christmas Eve, the children hung their stockings by the fireplace and waited excitedly for Santa Claus.","zh":"平安夜那天，孩子们把长筒袜挂在壁炉旁，兴奋地等待圣诞老人。"},{"l":3,"en":"To the little girl's surprise, the stocking she had carefully prepared was filled with gifts the next morning.","zh":"令小女孩惊喜的是，第二天早上她精心准备的长筒袜里装满了礼物。"}]}]},{"day":51,"w":"stomachache","ph":"","defs":[{"pos":"n.","m":"胃疼","ex":[{"l":1,"en":"I have a bad stomachache today.","zh":"我今天胃疼得厉害。"},{"l":2,"en":"The boy did not go to school because he had a stomachache after eating too much ice cream.","zh":"男孩没有去上学，因为吃了太多冰淇淋后他胃疼。"},{"l":3,"en":"Having suffered from a stomachache all night, she finally decided to see the doctor early the next morning.","zh":"胃疼了一整夜后，她终于决定第二天一早就去看医生。"}]}]},{"day":51,"w":"stone","ph":"","defs":[{"pos":"n.","m":"石头；石料","ex":[{"l":1,"en":"You carry them in your mind just like those stones in bags.","zh":"你把它们记在心里，就像那些装在袋子里的石头一样。"},{"l":2,"en":"The whole day we walked around the countryside, and every now and then, my uncle put stones in our bags.","zh":"我们一整天都在乡间漫步，每隔一会儿，叔叔就往我们的袋子里放些石头。"},{"l":3,"en":"Realizing that each stone we picked up symbolized a worry in our mind, we finally understood why the bag grew heavier with every step we took.","zh":"意识到我们捡起的每块石头都象征着心中的一份忧虑后，我们终于明白为何背包会随着每一步变得越来越沉。"}]}]},{"day":51,"w":"stop","ph":"","defs":[{"pos":"v.","m":"停；停止；阻止","ex":[{"l":1,"en":"Please stop talking in class.","zh":"请在课堂上停止讲话。"},{"l":2,"en":"The teacher stopped the boy from running in the hallway because it was dangerous.","zh":"老师阻止了那个男孩在走廊里奔跑，因为那很危险。"},{"l":3,"en":"No matter how hard we tried to stop him from giving up, he had made up his mind to leave the team.","zh":"无论我们多么努力地想阻止他放弃，他都已下定决心离开队伍。"}]},{"pos":"n.","m":"停；（停车）站","ex":[{"l":1,"en":"We will get off at the next bus stop.","zh":"我们将在下一站下车。"},{"l":2,"en":"I waited at the bus stop for half an hour before the rain finally stopped.","zh":"我在公交站等了半小时，雨才终于停了。"},{"l":3,"en":"It was at this small stop that I first met the friend who would later change my whole life.","zh":"正是在这个小站，我第一次遇见了后来改变我一生的那位朋友。"}]}]},{"day":51,"w":"store","ph":"","defs":[{"pos":"n.","m":"商店","ex":[{"l":1,"en":"There is a new store near my home.","zh":"我家附近有一家新商店。"},{"l":2,"en":"The store where my mother works sells all kinds of school things.","zh":"我妈妈工作的那家商店出售各种学习用品。"},{"l":3,"en":"The little store at the corner of the street, though small, offers the warmest service I have ever received.","zh":"街角那家小店虽然不大，却提供了我收到过的最温暖的服务。"}]},{"pos":"v.","m":"储藏；存储","ex":[{"l":1,"en":"We store some water for the trip.","zh":"我们为旅行储存了一些水。"},{"l":2,"en":"The computer can store a large amount of information that we need for our study.","zh":"这台电脑能存储我们学习所需的大量信息。"},{"l":3,"en":"Equipped with a special chip, the new device can store more data than any model sold before.","zh":"配备了专用芯片，这款新设备能存储比以往任何型号都多的数据。"}]}]},{"day":51,"w":"storm","ph":"","defs":[{"pos":"n.","m":"风暴；暴（风）雨（雪）","ex":[{"l":1,"en":"A big storm is coming tonight.","zh":"今晚会有一场大风暴。"},{"l":2,"en":"When the storm began, we were having dinner at home, so we had to stay inside.","zh":"风暴开始时，我们正在家吃晚饭，所以只好待在屋里。"},{"l":3,"en":"Only after the storm passed did we realize how much damage the strong wind had done to the village.","zh":"直到风暴过去，我们才意识到大风给村庄造成了多大的破坏。"}]}]},{"day":51,"w":"story","ph":"","defs":[{"pos":"n.","m":"小说；故事","ex":[{"l":1,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"这个中学男生能用英语讲中国传统故事吗？"},{"l":2,"en":"He also told us his story of saving people from a burning building.","zh":"他还给我们讲述了他从燃烧的大楼里救人的故事。"},{"l":3,"en":"The old man often says that every story we share brings us closer, making the distance between hearts disappear.","zh":"老人常说，我们分享的每个故事都让彼此更亲近，让心与心之间的距离消失。"}]}]},{"day":51,"w":"straight","ph":"","defs":[{"pos":"adj.","m":"一直的；直的","ex":[{"l":1,"en":"Draw a straight line on the paper.","zh":"在纸上画一条直线。"},{"l":2,"en":"The road to the village is long and straight, which makes driving much easier.","zh":"通往村庄的路又长又直，这让开车变得轻松许多。"},{"l":3,"en":"Keeping a straight posture while speaking is considered a sign of confidence in many cultures.","zh":"在许多文化中，说话时保持挺直的姿势被视为自信的表现。"}]},{"pos":"adv.","m":"一直地；直","ex":[{"l":1,"en":"Go straight ahead and you will find it.","zh":"一直往前走，你就会找到它。"},{"l":2,"en":"After school, he went straight home to finish the homework that was due the next day.","zh":"放学后，他直接回家去完成第二天要交的作业。"},{"l":3,"en":"Tired as he was, he walked straight into the library, determined to prepare well for the coming exam.","zh":"尽管很累，他还是径直走进图书馆，决心为即将到来的考试做好充分准备。"}]}]},{"day":51,"w":"strange","ph":"","defs":[{"pos":"adj.","m":"奇怪的；奇特的；陌生的","ex":[{"l":1,"en":"There is a strange cat at the door.","zh":"门口有一只奇怪的猫。"},{"l":2,"en":"It is strange that he should be late, for he is always the first to arrive.","zh":"奇怪的是他竟然迟到，因为他总是第一个到的。"},{"l":3,"en":"What surprised me most was not the strange sound in the dark, but the calm look on her face.","zh":"最让我惊讶的不是黑暗中那奇怪的声音，而是她脸上平静的表情。"}]}]},{"day":51,"w":"strawberry","ph":"","defs":[{"pos":"n.","m":"草莓","ex":[{"l":1,"en":"I like eating strawberries very much.","zh":"我非常喜欢吃草莓。"},{"l":2,"en":"My grandmother grows strawberries in the garden, and they taste much sweeter than those in the shop.","zh":"我奶奶在花园里种了草莓，它们比商店里的要甜得多。"},{"l":3,"en":"Picked fresh from the field, the strawberries we ate that morning were the sweetest I had ever tasted.","zh":"那天早上我们吃的草莓是刚从田里摘的，是我尝过最甜的。"}]}]},{"day":51,"w":"street","ph":"","defs":[{"pos":"n.","m":"街，街道","ex":[{"l":1,"en":"Don't play football in the street.","zh":"不要在街上踢足球。"},{"l":2,"en":"The street where I live is very busy, so my parents never let me cross it alone.","zh":"我住的那条街非常繁忙，所以父母从不让我独自穿过它。"},{"l":3,"en":"Walking down the empty street at midnight, I suddenly felt how peaceful the city could be.","zh":"午夜走在空荡荡的街上，我突然感到这座城市竟如此宁静。"}]}]},{"day":51,"w":"stress","ph":"","defs":[{"pos":"n.","m":"压力；紧张；强调","ex":[{"l":1,"en":"He is under a lot of stress these days.","zh":"这些天他压力很大。"},{"l":2,"en":"Too much stress can lead to health problems, so we should learn to relax ourselves.","zh":"压力太大会引发健康问题，所以我们应该学会自我放松。"},{"l":3,"en":"It is the stress from study, rather than the work itself, that worries most middle school students today.","zh":"如今困扰大多数中学生的，是来自学习的压力，而不是学习本身。"}]},{"pos":"v.","m":"加压力于；使紧张；强调","ex":[{"l":1,"en":"The teacher stressed the importance of safety.","zh":"老师强调了安全的重要性。"},{"l":2,"en":"The doctor stressed that we should eat more vegetables and do more exercise to keep healthy.","zh":"医生强调我们应该多吃蔬菜、多锻炼以保持健康。"},{"l":3,"en":"In his speech, the headmaster stressed again and again that honesty matters more than high marks.","zh":"校长在讲话中反复强调，诚实比高分更重要。"}]}]},{"day":51,"w":"strict","ph":"","defs":[{"pos":"adj.","m":"严格的；严密的","ex":[{"l":1,"en":"Our English teacher is very strict with us.","zh":"我们的英语老师对我们很严格。"},{"l":2,"en":"Although his father is strict with him, he knows it is all because of love.","zh":"虽然父亲对他很严格，但他知道那完全是出于爱。"},{"l":3,"en":"Strict as the rules may seem, every student finally understands they exist to protect our safety.","zh":"尽管这些规定看起来很严格，每个学生最终都会明白它们的存在是为了保护我们的安全。"}]}]},{"day":51,"w":"strike","ph":"","defs":[{"pos":"v.","m":"敲；打击；侵袭；（钟）鸣","ex":[{"l":1,"en":"The clock struck twelve at midnight.","zh":"钟在午夜敲了十二下。"},{"l":2,"en":"When the earthquake struck the city, most people were sleeping soundly in their beds.","zh":"当地震袭击这座城市时，大多数人正睡得很香。"},{"l":3,"en":"Hardly had the clock struck midnight when a strange light appeared in the eastern sky.","zh":"时钟刚敲响午夜，东方天空中就出现了一道奇怪的光。"}]}]},{"day":51,"w":"strong","ph":"","defs":[{"pos":"adj.","m":"强（壮）的；坚固的；强烈的；坚强的","ex":[{"l":1,"en":"Sharing a new experience develops stronger relationships and creates long-lasting memories.","zh":"分享新的体验能发展更牢固的关系，并创造持久的回忆。"},{"l":2,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着GPS系统等基于计算机的工具的兴起，制图师需要比过去更强的计算机技能。"},{"l":3,"en":"Only those who have a strong will can overcome the difficulties that lie ahead on the road to success.","zh":"只有那些拥有坚强意志的人，才能克服成功路上的种种困难。"}]}]},{"day":51,"w":"stuck","ph":"","defs":[{"pos":"adj.","m":"被卡住的，被困住的","ex":[{"l":1,"en":"The key is stuck in the door.","zh":"钥匙卡在门里了。"},{"l":2,"en":"We were stuck in the traffic for two hours, which made us miss the start of the film.","zh":"我们被堵在路上两小时，这让我们错过了电影的开头。"},{"l":3,"en":"Stuck in the lift for over an hour, the two strangers began to talk and soon became good friends.","zh":"被困在电梯里一个多小时后，两个陌生人开始交谈，很快就成了好朋友。"}]}]},{"day":51,"w":"student","ph":"","defs":[{"pos":"n.","m":"学生","ex":[{"l":1,"en":"I'm a student.","zh":"我是一名学生。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生，应尽可能多地学习地理知识。"},{"l":3,"en":"Being a student today means far more than passing exams; it also means learning how to face challenges bravely.","zh":"今天当一名学生远不只是通过考试，它还意味着学会如何勇敢地面对挑战。"}]}]},{"day":51,"w":"study","ph":"","defs":[{"pos":"v.","m":"学习；研究","ex":[{"l":1,"en":"You should have studied much harder.","zh":"你本应该更努力学习。"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English.","zh":"路易斯现在十三岁，目前正在学习汉语，汉语已成为与英语同样重要的一门世界语言。"},{"l":3,"en":"Devoted to studying the behaviour of wild animals, the young scientist has spent years living in the forest.","zh":"致力于研究野生动物的行为，这位年轻的科学家已经在森林里生活了多年。"}]},{"pos":"n.","m":"学习；研究；书房","ex":[{"l":1,"en":"You should have studied much harder.","zh":"你本应该更努力地学习。"},{"l":2,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在一次游学旅行中遇到了一些青少年，现在我和他们仍有联系，但我几乎不记得旅行中买过什么了。"},{"l":3,"en":"Not until I entered senior high school did I realize that a quiet study of my own could help me focus better on every difficult subject.","zh":"直到进入高中我才意识到，拥有一个安静的书房能让我更专注地钻研每一门困难的学科。"}]}]},{"day":51,"w":"stupid","ph":"","defs":[{"pos":"adj.","m":"愚蠢的，笨的","ex":[{"l":1,"en":"It is stupid to drive so fast on a rainy day.","zh":"雨天开这么快是愚蠢的。"},{"l":2,"en":"It was rather stupid of him to copy others' homework, because the teacher would certainly find it out sooner or later.","zh":"他抄别人的作业真是太蠢了，因为老师迟早一定会发现的。"},{"l":3,"en":"However stupid the mistake may seem, what really matters is whether you are brave enough to admit it and learn from it.","zh":"无论这个错误看起来多么愚蠢，真正重要的是你是否有勇气承认它并从中吸取教训。"}]}]},{"day":51,"w":"style","ph":"","defs":[{"pos":"n.","m":"风格；方式；类型","ex":[{"l":1,"en":"I really like her hair style.","zh":"我真的很喜欢她的发型。"},{"l":2,"en":"The young artist has developed a painting style that is quite different from those of other painters in our city.","zh":"这位年轻画家形成了一种与我们城市其他画家截然不同的绘画风格。"},{"l":3,"en":"Only by reading widely can you enrich your writing style and make your articles more attractive to the readers.","zh":"只有广泛阅读，你才能丰富自己的写作风格，使文章对读者更具吸引力。"}]}]},{"day":51,"w":"subject","ph":"","defs":[{"pos":"n.","m":"题目；主题；学科；主语；主体","ex":[{"l":1,"en":"Math is my favourite subject.","zh":"数学是我最喜欢的学科。"},{"l":2,"en":"The teacher told us that the subject of this passage was how to protect wild animals in danger.","zh":"老师告诉我们，这篇文章的主题是如何保护濒危野生动物。"},{"l":3,"en":"What surprised me most was that the subject he chose for his project was seldom discussed in our textbook.","zh":"最让我惊讶的是，他为课题选择的那个主题在我们的课本中很少被讨论。"}]}]},{"day":51,"w":"succeed","ph":"","defs":[{"pos":"v.","m":"获得成功；达到目的","ex":[{"l":1,"en":"If you work hard, you will succeed.","zh":"如果你努力，你就会成功。"},{"l":2,"en":"Although he failed several times, he believed that he would succeed in finishing the experiment at last.","zh":"虽然他失败了好几次，但他相信自己最终会成功完成这项实验。"},{"l":3,"en":"Only those who keep trying in spite of difficulties are likely to succeed in realizing their dreams.","zh":"只有那些不顾困难坚持尝试的人才有可能成功实现自己的梦想。"}]}]},{"day":51,"w":"success","ph":"","defs":[{"pos":"","m":"n,成功","ex":[{"l":1,"en":"Success belongs to hardworking students in the end.","zh":"成功最终属于勤奋的学生。"},{"l":2,"en":"I really think the school will develop with success.","zh":"我确实认为这所学校会成功地发展下去。"},{"l":3,"en":"The success of the sports meeting depended not on one person but on the close teamwork of every student.","zh":"运动会的成功不取决于某一个人，而是依靠每位学生的密切团队合作。"}]}]},{"day":51,"w":"successful","ph":"","defs":[{"pos":"adj.","m":"成功的","ex":[{"l":1,"en":"She is a successful businesswoman.","zh":"她是一位成功的女商人。"},{"l":2,"en":"The meeting turned out to be so successful that more and more people wanted to join the club.","zh":"结果证明这次会议非常成功，以至于越来越多的人想加入这个俱乐部。"},{"l":3,"en":"To become a successful learner, you must not only read more books but also think carefully about what you have read.","zh":"要想成为一名成功的学习者，你不仅要读更多的书，还要认真思考你所读的内容。"}]}]},{"day":51,"w":"such","ph":"","defs":[{"pos":"adj.","m":"这样的；那样的","ex":[{"l":1,"en":"Some plants, such as the oak tree, have special ways to discourage leaf-eating animals.","zh":"有些植物，例如橡树，有特殊的方法来阻止吃树叶的动物。"},{"l":2,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着GPS系统等基于计算机的工具的兴起，制图师需要比过去更强的计算机技能。"},{"l":3,"en":"Never before have we seen such amazing robots as those shown in the exhibition, which can do almost everything for us.","zh":"我们以前从未见过像展览中展出的那样令人惊叹的机器人，它们几乎能为我们做一切事情。"}]},{"pos":"pron.","m":"（泛指）人；事物","ex":[{"l":1,"en":"Some plants, such as the oak tree, have special ways to discourage leaf-eating animals.","zh":"有些植物，例如橡树，有特殊的方法来阻止吃树叶的动物。"},{"l":2,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着GPS系统等基于计算机的工具的兴起，制图师需要比过去更强的计算机技能。"},{"l":3,"en":"Such is the power of a kind word that it can warm a lonely heart on the coldest winter day.","zh":"一句善意的话就是有这样的力量，它能在最寒冷的冬日温暖一颗孤独的心。"}]}]},{"day":51,"w":"suddenly","ph":"","defs":[{"pos":"adv.","m":"突然地","ex":[{"l":1,"en":"Suddenly it began to rain heavily.","zh":"突然天开始下大雨。"},{"l":2,"en":"We were playing happily in the park when suddenly a strong wind blew away our kites.","zh":"我们正在公园里开心地玩耍，突然一阵大风把我们的风筝吹走了。"},{"l":3,"en":"Suddenly realizing that he had left his keys at home, he had no choice but to wait for his mother outside the door.","zh":"他突然意识到自己把钥匙忘在家里了，只好在门外等母亲回来。"}]}]},{"day":51,"w":"suffer","ph":"","defs":[{"pos":"v.","m":"受苦；遭受","ex":[{"l":1,"en":"Besides, students are likely to suffer from mental problems.","zh":"此外，学生很可能遭受心理问题的困扰。"},{"l":2,"en":"The doctor warned that those who often stayed up late would suffer from serious health problems in the future.","zh":"医生警告说，那些经常熬夜的人将来会遭受严重健康问题的折磨。"},{"l":3,"en":"Having suffered from a bad cold for a whole week, the boy finally decided to ask for leave and see the doctor.","zh":"患重感冒整整一周后，这个男孩终于决定请假去看医生。"}]}]},{"day":51,"w":"sugar","ph":"","defs":[{"pos":"n.","m":"糖","ex":[{"l":1,"en":"There is too much sugar in this cake.","zh":"这块蛋糕里糖太多了。"},{"l":2,"en":"The dentist told me that eating too much sugar would cause tooth problems if I did not brush my teeth carefully.","zh":"牙医告诉我，如果不认真刷牙，吃太多糖会引起牙齿问题。"},{"l":3,"en":"What parents should keep in mind is that food high in sugar does more harm than good to children's growth.","zh":"父母应当牢记的是，高糖食物对孩子的成长弊大于利。"}]}]},{"day":52,"w":"suggest","ph":"","defs":[{"pos":"v.","m":"建议，提议","ex":[{"l":1,"en":"I suggest that you take more exercise.","zh":"我建议你多做运动。"},{"l":2,"en":"The doctor suggested that I should drink more water and give up junk food as soon as possible.","zh":"医生建议我应该多喝水，并尽快戒掉垃圾食品。"},{"l":3,"en":"Evidence suggests that students who read for half an hour every day tend to make greater progress than those who do not.","zh":"有证据表明，每天阅读半小时的学生往往比不读的学生进步更大。"}]}]},{"day":52,"w":"suggestion","ph":"","defs":[{"pos":"n.","m":"建议，提议","ex":[{"l":1,"en":"Can you give me some suggestions?","zh":"你能给我一些建议吗？"},{"l":2,"en":"Could you tell me whether you have any good suggestions on how to improve my spoken English?","zh":"你能告诉我，关于如何提高英语口语你有什么好建议吗？"},{"l":3,"en":"The suggestion that we should spend more time reading classic books is well worth considering at this age.","zh":"我们应该花更多时间阅读经典书籍这一建议，在当今这个时代很值得考虑。"}]}]},{"day":52,"w":"summer","ph":"","defs":[{"pos":"n.","m":"夏天，夏季","ex":[{"l":1,"en":"For example, getting expensive clothes didn't change me as a person, but the camping trip last summer certainly did.","zh":"例如，买昂贵的衣服并没有改变我这个人，但去年夏天的露营旅行确实改变了我。"},{"l":2,"en":"Since the summer vacation is coming, our family is planning to travel to a city which we have never visited before.","zh":"既然暑假就要到了，我们全家正计划去一座我们从未去过的城市旅行。"},{"l":3,"en":"Not only did he spend the whole summer reading books, but he also volunteered to help the old in the nursing home.","zh":"整个夏天他不仅一直在读书，还自愿去养老院帮助老人。"}]}]},{"day":52,"w":"sun","ph":"","defs":[{"pos":"n.","m":"太阳；阳光","ex":[{"l":1,"en":"The sun rises in the east.","zh":"太阳从东方升起。"},{"l":2,"en":"When the sun came out after the heavy rain, the children ran into the garden to play happily.","zh":"大雨过后太阳出来时，孩子们跑进花园开心地玩耍起来。"},{"l":3,"en":"Only when the sun goes down do the streets of this small town become quiet and peaceful.","zh":"只有当太阳落山时，这座小镇的街道才变得宁静祥和。"}]}]},{"day":52,"w":"Sunday","ph":"","defs":[{"pos":"n.","m":"星期日","ex":[{"l":1,"en":"Yesterday was Sunday.","zh":"昨天是星期日。"},{"l":2,"en":"Every Sunday morning, my grandfather takes me to the park where I can learn how to fly a kite from him.","zh":"每个星期日上午，爷爷带我去公园，在那里我可以向他学习如何放风筝。"},{"l":3,"en":"It was on a rainy Sunday that I first understood how much my parents had done for me over the years.","zh":"正是在一个下雨的星期日，我第一次明白了这些年来父母为我付出了多少。"}]}]},{"day":52,"w":"sunny","ph":"","defs":[{"pos":"adj.","m":"阳光充足的；晴朗的","ex":[{"l":1,"en":"It is a sunny day today.","zh":"今天是个晴天。"},{"l":2,"en":"As it was warm and sunny, we decided to have a picnic by the lake instead of staying at home.","zh":"因为天气温暖晴朗，我们决定去湖边野餐，而不是待在家里。"},{"l":3,"en":"Such a sunny morning it was that everyone in the village woke up early and began to work in the fields with joy.","zh":"那是一个如此阳光明媚的早晨，村里每个人都早早醒来，愉快地开始下地干活。"}]}]},{"day":52,"w":"super","ph":"","defs":[{"pos":"adj.","m":"超级的；极好的","ex":[{"l":1,"en":"That is a super idea.","zh":"那是个极好的主意。"},{"l":2,"en":"The film we watched yesterday was so super that I want to see it again with my friends next weekend.","zh":"我们昨天看的那部电影太精彩了，我想下周末再和朋友一起看一遍。"},{"l":3,"en":"What a super performance the young pianist gave that all the audience stood up and cheered for a long time.","zh":"这位年轻的钢琴家演奏得多么出色，全体观众都站起来长时间欢呼。"}]}]},{"day":52,"w":"supermarket","ph":"","defs":[{"pos":"n.","m":"超级市场","ex":[{"l":1,"en":"My mother is shopping in the supermarket.","zh":"我妈妈正在超市购物。"},{"l":2,"en":"The new supermarket near our school sells all kinds of things which are much cheaper than those in small shops.","zh":"我们学校附近的新超市出售各种各样的商品，比小店里卖的便宜得多。"},{"l":3,"en":"Rarely have I seen such a crowded supermarket as this one, where people are busy choosing fresh fruit and vegetables.","zh":"我很少见到像这家一样拥挤的超市，人们正忙着挑选新鲜的水果和蔬菜。"}]}]},{"day":52,"w":"supper","ph":"","defs":[{"pos":"n.","m":"晚餐，晚饭","ex":[{"l":1,"en":"We had a simple supper after work.","zh":"下班后我们吃了一顿简单的晚饭。"},{"l":2,"en":"After we finished the delicious supper, my mother told me an interesting story about her childhood.","zh":"吃完那顿美味的晚饭后，妈妈给我讲了一个关于她童年的有趣故事。"},{"l":3,"en":"It was not until supper was ready that I realized how much time I had spent reading the novel.","zh":"直到晚饭准备好时，我才意识到自己读这本小说花了多少时间。"}]}]},{"day":52,"w":"support","ph":"","defs":[{"pos":"v.&n.","m":"支持；赞助","ex":[{"l":1,"en":"My parents support my dream.","zh":"我的父母支持我的梦想。"},{"l":2,"en":"If you want to be a doctor, your family will support you as long as you work hard for it.","zh":"如果你想成为一名医生，只要你为之努力，你的家人就会支持你。"},{"l":3,"en":"Not only does the club support young players financially, but it also provides them with chances to show their talent.","zh":"这家俱乐部不仅在经济上支持年轻球员，还为他们提供展示才华的机会。"}]}]},{"day":52,"w":"suppose","ph":"","defs":[{"pos":"v.","m":"猜想；假定；料想","ex":[{"l":1,"en":"I suppose he is right.","zh":"我想他是对的。"},{"l":2,"en":"I suppose that you have already finished the homework that the teacher gave us yesterday.","zh":"我想你已经完成了老师昨天布置给我们的作业。"},{"l":3,"en":"Supposing that you fail the exam, what will you do to make up for the lost time?","zh":"假如你考试不及格，你会做些什么来弥补失去的时间呢？"}]}]},{"day":52,"w":"sure","ph":"","defs":[{"pos":"adj.","m":"确信的，肯定的，有把握的","ex":[{"l":1,"en":"I'm sure that you will do well in your interviews.Best of luck,boys and girls!","zh":"我确信你们在面试中会表现得很好。祝好运，孩子们！"},{"l":2,"en":"Make sure that you have checked your answers carefully before you hand in the test paper.","zh":"交卷之前务必要仔细检查你的答案。"},{"l":3,"en":"However sure you are of your own opinion, it is wise to listen to what others have to say.","zh":"无论你对自己的看法多么有把握，听听别人的意见都是明智的。"}]}]},{"day":52,"w":"surface","ph":"","defs":[{"pos":"n.","m":"表面","ex":[{"l":1,"en":"The surface of the table is clean.","zh":"桌子的表面很干净。"},{"l":2,"en":"The surface of the lake was so calm that it looked like a huge mirror in the early morning.","zh":"清晨湖面如此平静，看起来就像一面巨大的镜子。"},{"l":3,"en":"Only when the surface of the ice becomes thick enough is it safe for children to skate on it.","zh":"只有当冰面足够厚时，孩子们在上面滑冰才是安全的。"}]}]},{"day":52,"w":"surprise","ph":"","defs":[{"pos":"n.","m":"惊奇，诧异","ex":[{"l":1,"en":"What a nice surprise to see you!","zh":"见到你真是个惊喜！"},{"l":2,"en":"To my surprise, the shy girl gave an excellent speech in front of the whole school.","zh":"令我惊讶的是，那个害羞的女孩在全校师生面前发表了精彩的演讲。"},{"l":3,"en":"Much to our surprise, the old bridge, built more than a hundred years ago, is still in good condition today.","zh":"令我们十分惊讶的是，那座建于一百多年前的老桥如今仍状况良好。"}]},{"pos":"v.","m":"使惊奇，使诧异","ex":[{"l":1,"en":"The news surprised everyone.","zh":"这个消息让所有人都很惊讶。"},{"l":2,"en":"What surprised me most was that the little boy could speak three foreign languages fluently.","zh":"最令我惊讶的是，那个小男孩能流利地说三门外语。"},{"l":3,"en":"Never before had the match surprised the audience so much as it did that rainy evening.","zh":"在那场雨夜之前，这场比赛从未如此让观众感到惊讶。"}]}]},{"day":52,"w":"surprised","ph":"","defs":[{"pos":"adj.","m":"感到惊奇的","ex":[{"l":1,"en":"We were a bit surprised that he also took some stones out from our bags at times.","zh":"我们有点惊讶，他有时还会从我们的包里拿出一些石头。"},{"l":2,"en":"I was surprised to hear that he had won the first prize in the English speech contest.","zh":"听说他在英语演讲比赛中获得了一等奖，我感到很惊讶。"},{"l":3,"en":"Looking surprised, the old man stared at the photo, trying to remember where he had seen the boy before.","zh":"老人面露惊讶，凝视着那张照片，努力回想以前在哪里见过这个男孩。"}]}]},{"day":52,"w":"survey","ph":"","defs":[{"pos":"v.&n.","m":"调查","ex":[{"l":1,"en":"They will survey the students about their hobbies.","zh":"他们将就学生们的爱好进行调查。"},{"l":2,"en":"The survey shows that most students who were asked prefer reading stories to watching TV.","zh":"调查显示，被问到的大多数学生比起看电视更喜欢读故事。"},{"l":3,"en":"According to the survey carried out last month, the number of young readers has risen sharply compared with five years ago.","zh":"根据上个月进行的调查，与五年前相比，年轻读者的数量大幅增加。"}]}]},{"day":52,"w":"survive","ph":"","defs":[{"pos":"v.","m":"幸存；活下来；存活；生还","ex":[{"l":1,"en":"Only three people survived the fire.","zh":"只有三个人在那场火灾中幸存下来。"},{"l":2,"en":"The plants will not survive unless they get enough water and sunlight in the dry season.","zh":"除非在旱季得到足够的水分和阳光，否则这些植物无法存活。"},{"l":3,"en":"Having survived the terrible earthquake, the family treasure their peaceful life more than ever before.","zh":"在那场可怕的地震中幸存下来后，这家人比以往任何时候都更加珍惜平静的生活。"}]}]},{"day":52,"w":"sweep","ph":"","defs":[{"pos":"v.","m":"扫除；扫","ex":[{"l":1,"en":"She sweeps the floor every morning.","zh":"她每天早上扫地。"},{"l":2,"en":"When I got home, my grandmother was sweeping the yard while my grandfather was reading a newspaper.","zh":"我到家时，奶奶正在扫院子，而爷爷在看报纸。"},{"l":3,"en":"Before the Spring Festival, every family cleans the house, sweeping away the dust that has gathered over the whole year.","zh":"春节前，家家户户打扫房屋，扫去一整年积攒的灰尘。"}]}]},{"day":52,"w":"sweet","ph":"","defs":[{"pos":"adj.","m":"甜的；可爱的","ex":[{"l":1,"en":"The cake tastes sweet.","zh":"这蛋糕尝起来是甜的。"},{"l":2,"en":"The sweet smell of the flowers reminds me of the garden that my grandmother once kept.","zh":"花朵甜甜的香味让我想起了奶奶曾经照料的那个花园。"},{"l":3,"en":"What a sweet voice the little girl has that everyone in the hall stopped talking to listen.","zh":"小女孩的声音多么甜美，大厅里的每个人都停下来聆听。"}]},{"pos":"n.","m":"甜食；糖果","ex":[{"l":1,"en":"Children love sweets.","zh":"孩子们喜欢糖果。"},{"l":2,"en":"My mother told me not to eat too many sweets because they are bad for my teeth.","zh":"妈妈告诉我不要吃太多糖果，因为它们对牙齿不好。"},{"l":3,"en":"Although sweets are popular among children, eating too many of them can lead to serious health problems later in life.","zh":"虽然糖果深受孩子们喜爱，但吃太多会在日后的生活中引发严重的健康问题。"}]}]},{"day":52,"w":"swim","ph":"","defs":[{"pos":"v.&n.","m":"游泳","ex":[{"l":1,"en":"He can swim very fast.","zh":"他游泳游得很快。"},{"l":2,"en":"If you want to swim in the deep pool, you must be accompanied by an adult who can swim well.","zh":"如果你想在深水池游泳，必须由一位游泳很好的成年人陪同。"},{"l":3,"en":"Only by practising every day can you swim as smoothly as the members of the school team do.","zh":"只有每天练习，你才能游得像校队队员那样流畅。"}]}]},{"day":52,"w":"symbol","ph":"","defs":[{"pos":"n.","m":"符号；象征","ex":[{"l":1,"en":"The dove is a symbol of peace.","zh":"鸽子是和平的象征。"},{"l":2,"en":"The red rose, which is widely known as a symbol of love, is often given on Valentine's Day.","zh":"作为爱情象征而广为人知的红玫瑰，常在情人节送出。"},{"l":3,"en":"Standing in the centre of the square, the statue has long been regarded as a symbol of the city's long history.","zh":"矗立在广场中央的这座雕像长久以来被视为这座城市悠久历史的象征。"}]}]},{"day":52,"w":"system","ph":"","defs":[{"pos":"n.","m":"体系；系统","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍然是中国交通系统的重要组成部分。"},{"l":2,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着 GPS 系统等基于计算机的工具兴起，制图师需要比过去更强的计算机技能。"},{"l":3,"en":"It is the education system that determines, to a large degree, what kind of future the young generation will have.","zh":"在很大程度上，正是教育体系决定了年轻一代将拥有怎样的未来。"}]}]},{"day":52,"w":"table","ph":"","defs":[{"pos":"n.","m":"桌子；表格","ex":[{"l":1,"en":"Put the book on the table.","zh":"把书放在桌子上。"},{"l":2,"en":"Please look at the table on page five, which shows how the weather changes through the year.","zh":"请看第五页的表格，它展示了天气在一年中的变化。"},{"l":3,"en":"Found on the dusty table was a small box, inside which lay a letter written more than thirty years ago.","zh":"在落满灰尘的桌子上发现了一个小盒子，里面躺着一封写于三十多年前的信。"}]}]},{"day":52,"w":"take","ph":"","defs":[{"pos":"v.","m":"拿；拿走；做；吃；服用；乘坐（车、船）；花费（时间）；拍照","ex":[{"l":1,"en":"Had I taken a taxi, I wouldn't have been late.","zh":"要是当时乘了出租车，我就不会迟到了。"},{"l":2,"en":"Thanks to the invention of the smart phone, it's convenient to take photos anytime.","zh":"多亏了智能手机的发明，随时拍照都很方便。"},{"l":3,"en":"Only when you take responsibility for your own mistakes will you truly grow up and earn respect from others.","zh":"只有当你为自己的错误承担责任时，你才会真正成长，并赢得他人的尊重。"}]}]},{"day":52,"w":"talent","ph":"","defs":[{"pos":"n.","m":"才能；天才","ex":[{"l":1,"en":"She has a talent for music.","zh":"她有音乐天赋。"},{"l":2,"en":"The boy showed such a great talent for painting that his teacher advised him to study art further.","zh":"这个男孩展现了极高的绘画天赋，老师建议他进一步学习美术。"},{"l":3,"en":"Born with a remarkable talent for languages, the girl could read several foreign novels by the age of twelve.","zh":"这个女孩天生具有非凡的语言天赋，十二岁时就能阅读好几本外语小说。"}]}]},{"day":52,"w":"talk","ph":"","defs":[{"pos":"n.&v.","m":"谈话；讲话；演讲；交谈","ex":[{"l":1,"en":"Let's talk about something else.","zh":"我们谈点别的吧。"},{"l":2,"en":"After his amazing talk, I understand why my father is busy.","zh":"听了他精彩的演讲后，我明白了父亲为什么那么忙碌。"},{"l":3,"en":"Having talked with the expert for nearly an hour, the students came to realize how important it is to protect the environment.","zh":"与专家交谈了将近一小时后，学生们逐渐意识到保护环境是多么重要。"}]}]},{"day":52,"w":"tall","ph":"","defs":[{"pos":"adj.","m":"高的","ex":[{"l":1,"en":"The tall boy is my brother.","zh":"那个高个子男孩是我哥哥。"},{"l":2,"en":"The tall man who is talking to our teacher is a famous basketball player.","zh":"正在和我们老师说话的那位高个子男士是一位著名的篮球运动员。"},{"l":3,"en":"Tall as he is, he still finds it hard to reach the top shelf without a stool.","zh":"尽管他个子很高，不踩凳子还是够不到顶层货架。"}]}]},{"day":52,"w":"tap","ph":"","defs":[{"pos":"n.","m":"（自来水、煤气等的）龙头","ex":[{"l":1,"en":"Please turn off the tap after you wash your hands.","zh":"洗完手后请关上水龙头。"},{"l":2,"en":"If you leave the tap running, a lot of water will be wasted in a short time.","zh":"如果你让水龙头一直开着，短时间内就会浪费大量水。"},{"l":3,"en":"Not only did he forget to turn off the tap, but he also left the kitchen in a mess.","zh":"他不仅忘了关水龙头，还把厨房弄得一团糟。"}]}]},{"day":52,"w":"tape","ph":"","defs":[{"pos":"n.","m":"磁带；录音带","ex":[{"l":1,"en":"If I had got enough money yesterday, I would have bought that tape.","zh":"如果我昨天有足够的钱，我就会买下那盘磁带了。"},{"l":2,"en":"Although most people use digital music now, my grandfather still keeps his old tape collection carefully.","zh":"虽然现在大多数人使用数字音乐，我爷爷仍然小心保存着他的旧磁带收藏。"},{"l":3,"en":"It is the old tape that reminds me of the days when we listened to English together after school.","zh":"正是这盘旧磁带让我想起我们放学后一起听英语的日子。"}]}]},{"day":52,"w":"task","ph":"","defs":[{"pos":"n.","m":"任务；工作","ex":[{"l":1,"en":"The engineer promised to finish the task as soon as possible.","zh":"那位工程师承诺尽快完成这项任务。"},{"l":2,"en":"The teacher gave each group a difficult task so that they could learn to work together.","zh":"老师给每个小组布置了一项困难的任务，以便他们能学会合作。"},{"l":3,"en":"Only by dividing the task into smaller parts did the team manage to finish it before the deadline.","zh":"只有把任务拆分成更小的部分，团队才设法在截止日期前完成它。"}]}]},{"day":53,"w":"taste","ph":"","defs":[{"pos":"v.","m":"品尝，尝味","ex":[{"l":1,"en":"Some plants produce chemicals that taste bitter or cause an unpleasant reaction.","zh":"一些植物产生的化学物质尝起来发苦，或引起令人不适的反应。"},{"l":2,"en":"When you taste the soup for the first time, you will find that it is not as salty as you expected.","zh":"当你第一次品尝这汤时，你会发现它没有你预想的那样咸。"},{"l":3,"en":"Having tasted failure several times, the young inventor finally succeeded in designing a useful machine.","zh":"品尝过几次失败后，这位年轻的发明家终于成功设计出一台实用的机器。"}]},{"pos":"n.","m":"味道","ex":[{"l":1,"en":"Some plants produce chemicals that taste bitter or cause an unpleasant reaction.","zh":"一些植物产生的化学物质尝起来发苦，或引起令人不适的反应。"},{"l":2,"en":"The cake has a strange taste because my sister added too much salt by mistake.","zh":"这块蛋糕味道很奇怪，因为我妹妹误加了太多盐。"},{"l":3,"en":"It was the special taste of the dish that made the foreign guests want to learn how to cook it.","zh":"正是这道菜独特的味道让外国客人想学习如何烹饪它。"}]}]},{"day":53,"w":"taxi","ph":"","defs":[{"pos":"n.","m":"出租汽车","ex":[{"l":1,"en":"Had I taken a taxi, I wouldn't have been late.","zh":"如果我那时坐了出租车，我就不会迟到了。"},{"l":2,"en":"Since she missed the early bus, she had to take a taxi so that she could arrive at the airport on time.","zh":"因为她错过了早班车，她只好乘出租车，以便能准时到达机场。"},{"l":3,"en":"Only after he had taken a taxi did he realize that he had left his schoolbag on the bus.","zh":"直到坐上出租车后，他才意识到自己把书包落在了公交车上。"}]}]},{"day":53,"w":"tea","ph":"","defs":[{"pos":"n.","m":"茶；茶叶","ex":[{"l":1,"en":"Would you like a cup of tea?","zh":"你想来杯茶吗？"},{"l":2,"en":"My mother told me that drinking green tea in the morning was good for my health.","zh":"我妈妈告诉我，早上喝绿茶对我的健康有益。"},{"l":3,"en":"It is said that tea was discovered thousands of years ago and has become an important part of Chinese culture.","zh":"据说茶在数千年前被发现，并已成为中国文化的重要组成部分。"}]}]},{"day":53,"w":"teach","ph":"","defs":[{"pos":"v.","m":"教书，教","ex":[{"l":1,"en":"Am I your teacher?","zh":"我是你的老师吗？"},{"l":2,"en":"Susan, the head teacher, invited students to share their ideas about how to rebuild the school.","zh":"校长苏珊邀请学生们分享关于如何重建学校的想法。"},{"l":3,"en":"Having taught English for twenty years, she still spends much time preparing each lesson carefully.","zh":"教了二十年英语后，她仍花大量时间认真准备每一节课。"}]}]},{"day":53,"w":"teacher","ph":"","defs":[{"pos":"n.","m":"教师","ex":[{"l":1,"en":"Am I your teacher?","zh":"我是你的老师吗？"},{"l":2,"en":"But parents and teachers worked together to protect the school and now they are pleased to see the result.","zh":"但家长们和老师们一起努力保护学校，现在他们很高兴看到这个结果。"},{"l":3,"en":"It was the new teacher who encouraged me to believe in myself and try new things in class.","zh":"正是这位新老师鼓励我相信自己，并在课堂上尝试新事物。"}]}]},{"day":53,"w":"team","ph":"","defs":[{"pos":"n.","m":"队；组","ex":[{"l":1,"en":"Our team won the game.","zh":"我们队赢得了比赛。"},{"l":2,"en":"The team that wins the final match will get a chance to travel abroad during the holiday.","zh":"赢得决赛的那支队伍将有机会在假期出国旅行。"},{"l":3,"en":"Never before has our school team performed so well in such an important match.","zh":"我们校队从未在如此重要的比赛中表现得这么出色。"}]}]},{"day":53,"w":"tear","ph":"","defs":[{"pos":"n.","m":"眼泪","ex":[{"l":1,"en":"A tear ran down her face.","zh":"一滴眼泪顺着她的脸颊滑落。"},{"l":2,"en":"When she heard the good news, tears of joy came into her eyes before she could speak.","zh":"当她听到这个好消息时，还没来得及说话，喜悦的泪水就涌上了眼眶。"},{"l":3,"en":"So moved was the girl by the film that tears kept rolling down her face until the lights came on.","zh":"女孩被这部电影感动得泪水不断滚落脸颊，直到灯亮起。"}]}]},{"day":53,"w":"technology","ph":"","defs":[{"pos":"n.","m":"技术","ex":[{"l":1,"en":"Technology changes our life.","zh":"科技改变了我们的生活。"},{"l":2,"en":"With the help of modern technology, students can learn more easily than they did in the past.","zh":"在现代科技的帮助下，学生可以比过去更轻松地学习。"},{"l":3,"en":"Not only has technology made communication faster, but it has also changed the way we study and work.","zh":"科技不仅使交流变得更快捷，还改变了我们学习和工作的方式。"}]}]},{"day":53,"w":"teenager","ph":"","defs":[{"pos":"n.","m":"青少年，十几岁的少年","ex":[{"l":1,"en":"Three years ago I met some teenagers on a study trip and now I am still in touch with them, but I hardly remember what I bought during the trip.","zh":"三年前我在游学途中遇到一些青少年，现在仍和他们保持联系，但我几乎记不起旅途中买了什么。"},{"l":2,"en":"As a teenager, you should learn to take care of yourself and make wise choices.","zh":"作为一名青少年，你应该学会照顾自己并做出明智的选择。"},{"l":3,"en":"It is important that every teenager learns to balance study and hobbies before entering high school.","zh":"每个青少年在进入高中前学会平衡学习与爱好，这是很重要的。"}]}]},{"day":53,"w":"telephone","ph":"","defs":[{"pos":"v.","m":"打电话","ex":[{"l":1,"en":"Please telephone me later.","zh":"请稍后给我打电话。"},{"l":2,"en":"If you need any help, you can telephone me whenever you are free.","zh":"如果你需要帮助，可以在你有空时随时给我打电话。"},{"l":3,"en":"Only after he had telephoned his mother three times did she finally pick up the phone.","zh":"直到他给妈妈打了三次电话后，她才终于接起电话。"}]},{"pos":"n.","m":"电话；电话机","ex":[{"l":1,"en":"The telephone is ringing.","zh":"电话正在响。"},{"l":2,"en":"When the telephone rang, my father was cooking dinner in the kitchen.","zh":"电话响起时，我爸爸正在厨房做晚饭。"},{"l":3,"en":"It was the telephone that broke the silence of the room while everyone was reading quietly.","zh":"正是电话打破了房间里的寂静，当时大家都在安静地阅读。"}]}]},{"day":53,"w":"television","ph":"","defs":[{"pos":"n.","m":"电视","ex":[{"l":1,"en":"He watches television every day.","zh":"他每天看电视。"},{"l":2,"en":"Although television brings us a lot of information, watching it too much is bad for our eyes.","zh":"虽然电视给我们带来很多信息，但看太多对我们的眼睛有害。"},{"l":3,"en":"Rarely do the children watch television on weekdays because they have too much homework to do.","zh":"孩子们在工作日很少看电视，因为他们有太多作业要做。"}]}]},{"day":53,"w":"tell","ph":"","defs":[{"pos":"v.","m":"告诉；讲诉；吩咐","ex":[{"l":1,"en":"I wish I had told him the truth.","zh":"我希望我当时告诉了他真相。"},{"l":2,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"那个中学生能用英语讲述中国传统故事吗？"},{"l":3,"en":"Only when you tell others how you really feel will they understand what you need.","zh":"只有当你告诉别人你真正的感受时，他们才会理解你的需求。"}]}]},{"day":53,"w":"temperature","ph":"","defs":[{"pos":"n.","m":"温度","ex":[{"l":1,"en":"The temperature is high today.","zh":"今天气温很高。"},{"l":2,"en":"If the temperature drops below zero, water will turn into ice quickly.","zh":"如果气温降到零度以下，水很快就会变成冰。"},{"l":3,"en":"Not until the temperature rose again did the snow on the road begin to melt.","zh":"直到气温再次上升，路上的积雪才开始融化。"}]}]},{"day":53,"w":"temple","ph":"","defs":[{"pos":"n.","m":"寺院，庙宇","ex":[{"l":1,"en":"We visited an old temple.","zh":"我们参观了一座古老的寺庙。"},{"l":2,"en":"The old temple which stands on the top of the hill has a history of more than five hundred years.","zh":"矗立在小山顶上的那座古寺有五百多年的历史。"},{"l":3,"en":"It was in this quiet temple that the writer found the inspiration to finish his famous novel.","zh":"正是在这座宁静的寺庙里，这位作家找到了完成其著名小说的灵感。"}]}]},{"day":53,"w":"tennis","ph":"","defs":[{"pos":"n.","m":"网球","ex":[{"l":1,"en":"My brother plays tennis every Sunday morning.","zh":"我哥哥每个星期天早上都打网球。"},{"l":2,"en":"Although it was raining hard, we still decided to play tennis on the school playground.","zh":"尽管雨下得很大，我们仍然决定在学校操场上打网球。"},{"l":3,"en":"Not only does tennis help us build a strong body, but it also teaches us how to stay calm under pressure.","zh":"网球不仅帮助我们强健体魄，还教会我们如何在压力下保持冷静。"}]}]},{"day":53,"w":"term","ph":"","defs":[{"pos":"n.","m":"学期","ex":[{"l":1,"en":"We will have a new English teacher next term.","zh":"下个学期我们将有一位新英语老师。"},{"l":2,"en":"Since this term is coming to an end, we should make a clear plan for the coming holiday.","zh":"既然这个学期即将结束，我们应该为即将到来的假期制定一个清晰的计划。"},{"l":3,"en":"Only when we make good use of every term can we make real progress in our studies.","zh":"只有充分利用每个学期，我们才能在学习上取得真正的进步。"}]}]},{"day":53,"w":"terrible","ph":"","defs":[{"pos":"adj.","m":"可怕的；糟糕的","ex":[{"l":1,"en":"The weather was terrible yesterday.","zh":"昨天天气糟糕透了。"},{"l":2,"en":"I felt terrible because I had let my parents down in the maths exam last week.","zh":"我感到非常难过，因为我上周的数学考试让父母失望了。"},{"l":3,"en":"It was such a terrible storm that many trees were blown down, leaving the streets in a mess.","zh":"暴风雨如此猛烈，许多树被吹倒，街道一片狼藉。"}]}]},{"day":53,"w":"test","ph":"","defs":[{"pos":"v.&n.","m":"测试；考查；试验","ex":[{"l":1,"en":"We will test your reading skills in class.","zh":"我们将在课堂上测试你的阅读能力。"},{"l":2,"en":"Before you buy a new bike, you should test it carefully to make sure everything works well.","zh":"买新自行车之前，你应该仔细测试一下，确保每个部件都正常工作。"},{"l":3,"en":"Scientists are testing a new medicine which is believed to cure the disease more effectively.","zh":"科学家们正在测试一种新药，人们相信它能更有效地治愈这种疾病。"}]}]},{"day":53,"w":"text","ph":"","defs":[{"pos":"n.","m":"文本；课文","ex":[{"l":1,"en":"Please read the text after me.","zh":"请跟我读这篇课文。"},{"l":2,"en":"The teacher asked us to read the text carefully so that we could answer the questions correctly.","zh":"老师让我们认真读这篇课文，这样我们才能正确地回答问题。"},{"l":3,"en":"What makes the text so moving is that the writer describes his childhood in such a sincere way.","zh":"让这篇课文如此感人的是，作者用如此真诚的方式描写了他的童年。"}]}]},{"day":53,"w":"than","ph":"","defs":[{"pos":"conj.","m":"比","ex":[{"l":1,"en":"We thought he had just found better stones than the ones we already had.","zh":"我们原以为他只是找到了比我们已有的更好的石头。"},{"l":2,"en":"This man-made waterway, known in China as Da Yunhe, is 1,700 kilometers long and some parts of it are more than 2,000 years old.","zh":"这条人工水道在中国被称为大运河，长1700公里，其中一些部分已有两千多年的历史。"},{"l":3,"en":"The more carefully you compare the two plans, the better choice you will make than before.","zh":"你越仔细地比较这两个方案，就会做出比以前更好的选择。"}]}]},{"day":53,"w":"thank","ph":"","defs":[{"pos":"v.","m":"感谢，致谢，道谢","ex":[{"l":1,"en":"Fine, thanks.","zh":"很好，谢谢。"},{"l":2,"en":"We know that someone tried hard to make our visit special. Thanks so much for going above and beyond!","zh":"我们知道有人努力让我们的访问变得特别。非常感谢你们做得超出预期！"},{"l":3,"en":"I sincerely thank all the teachers who have helped me grow into a more confident student over the past three years.","zh":"我真诚地感谢所有在过去三年里帮助我成长为一个更自信的学生的老师。"}]},{"pos":"n.","m":"（复）感谢；谢意","ex":[{"l":1,"en":"Fine, thanks.","zh":"很好，谢谢。"},{"l":2,"en":"We know that someone tried hard to make our visit special. Thanks so much for going above and beyond!","zh":"我们知道有人努力让我们的访问变得特别。非常感谢你们做得超出预期！"},{"l":3,"en":"Please accept my heartfelt thanks, for without your help I could not have finished the project on time.","zh":"请接受我衷心的感谢，因为如果没有你的帮助，我不可能按时完成这个项目。"}]}]},{"day":53,"w":"thankful","ph":"","defs":[{"pos":"adj.","m":"感谢的，感激的","ex":[{"l":1,"en":"I am thankful for your kind help.","zh":"我感谢你友善的帮助。"},{"l":2,"en":"We are deeply thankful to everyone who offered us help when we were in trouble.","zh":"我们深深感谢每一个在我们遇到困难时提供帮助的人。"},{"l":3,"en":"Grateful and thankful, the old man shook hands with the students who had carried his heavy bags all the way home.","zh":"怀着感激之情，老人和那些一路把他的重包扛回家的学生握手。"}]}]},{"day":53,"w":"that","ph":"","defs":[{"pos":"adj.&pron.","m":"那，那个","ex":[{"l":1,"en":"That is fine.","zh":"那很好。"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，以至于我们把它们放在地上时长长地松了一口气，而我们叔叔的背包却只有半满。"},{"l":3,"en":"That day in the old library was the very moment when I fell in love with reading.","zh":"在旧图书馆的那一天，正是我爱上阅读的那一刻。"}]},{"pos":"conj.","m":"(引导宾语从句）","ex":[{"l":1,"en":"That is fine.","zh":"那很好。"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，以至于我们把它们放在地上时长长地松了一口气，而我们叔叔的背包却只有半满。"},{"l":3,"en":"I truly believe that hard work will finally pay off, no matter how long the road ahead may be.","zh":"我真心相信努力终将会有回报，无论前方的路有多长。"}]}]},{"day":53,"w":"theatre","ph":"","defs":[{"pos":"n.","m":"剧场，戏剧","ex":[{"l":1,"en":"We went to the theatre to watch a play last night.","zh":"昨晚我们去剧院看了一场话剧。"},{"l":2,"en":"The new theatre, which was built last year, can hold more than a thousand people at a time.","zh":"去年新建的那家剧院一次可以容纳一千多人。"},{"l":3,"en":"Seldom does this small theatre host such a famous play, so tickets sold out within hours.","zh":"这家小剧院很少上演如此有名的话剧，所以票在几小时内就卖光了。"}]}]},{"day":53,"w":"then","ph":"","defs":[{"pos":"adv.","m":"当时，那时；然后，后来；那么","ex":[{"l":1,"en":"I do not remember where I was then.","zh":"我不记得那时我在哪里。"},{"l":2,"en":"First find out about the school. Read the school introductions and look at the school websites. Then think about yourself, your strong points and weak ones. Try to find a few examples you could give the interviewers.","zh":"首先要了解学校，阅读学校介绍并查看学校网站。然后再想想你自己，你的长处和不足，试着找几个可以给面试官的例子。"},{"l":3,"en":"Only then did I realize how much my mother had done for me without ever asking for anything in return.","zh":"直到那时我才意识到母亲为我做了多少，却从未要求任何回报。"}]}]},{"day":53,"w":"there","ph":"","defs":[{"pos":"adv.","m":"在那里；往那里","ex":[{"l":1,"en":"There it is.","zh":"它在那里。"},{"l":2,"en":"There is a lot of rain in the south of China, but not as much in the north.","zh":"中国南方雨水很多，但北方没有那么多。"},{"l":3,"en":"There stands an ancient tower on the top of the hill, which has watched over the village for hundreds of years.","zh":"山顶上矗立着一座古塔，它守护着这个村庄已有数百年。"}]}]},{"day":53,"w":"these","ph":"","defs":[{"pos":"adj.&pron.","m":"这些","ex":[{"l":1,"en":"What are these?","zh":"这些是什么？"},{"l":2,"en":"If these problems are not solved well, they may bring bad results.","zh":"如果这些问题解决不好，可能会带来不好的结果。"},{"l":3,"en":"These old photos remind me of the happy days when we studied together in the small village school.","zh":"这些旧照片让我想起了我们一起在乡村小学校里学习的快乐时光。"}]}]},{"day":53,"w":"thick","ph":"","defs":[{"pos":"adj.","m":"厚的；浓的","ex":[{"l":1,"en":"They have thick and hard leaves that are difficult for animals to eat.","zh":"它们有又厚又硬的叶子，动物很难吃掉。"},{"l":2,"en":"The thick forest is home to many wild animals, so visitors must follow the rules while walking through it.","zh":"茂密的森林是许多野生动物的家园，因此游客穿过时必须遵守规则。"},{"l":3,"en":"Wrapped in a thick coat, the boy stood at the gate, waiting patiently for his father to return from work.","zh":"男孩裹着厚厚的外套，站在门口，耐心地等待父亲下班回来。"}]}]},{"day":53,"w":"thin","ph":"","defs":[{"pos":"adj.","m":"薄的；瘦的；细的","ex":[{"l":1,"en":"This book is too thin for me to read.","zh":"这本书太薄了，不够我读。"},{"l":2,"en":"The ice on the river is so thin that it is dangerous for children to skate on it.","zh":"河上的冰太薄了，孩子们在上面滑冰很危险。"},{"l":3,"en":"Pale and thin after the long illness, the little girl still kept a bright smile on her face.","zh":"久病之后脸色苍白消瘦，小女孩脸上仍保持着灿烂的微笑。"}]}]},{"day":53,"w":"thing","ph":"","defs":[{"pos":"n.","m":"东西；事情","ex":[{"l":1,"en":"We are not the result of the things we have bought.","zh":"我们不是我们所买东西的结果。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想说的是，尽管有人说拥有东西是一种巨大的快乐，但我觉得使用你拥有的东西更令人愉快。"},{"l":3,"en":"The most valuable thing we can give our children is not money, but the courage to face difficulties in life.","zh":"我们能给孩子的最宝贵的东西不是金钱，而是面对生活困难的勇气。"}]}]},{"day":54,"w":"think","ph":"","defs":[{"pos":"v.","m":"想，思考；认为；考虑","ex":[{"l":1,"en":"Yes, I think it does.","zh":"是的，我认为它是这样。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想说的是，尽管有人说拥有东西是一种巨大的快乐，但我觉得使用你拥有的东西更令人愉快。"},{"l":3,"en":"Hardly do I think of my childhood without remembering the old garden where I used to play with my friends.","zh":"我一想到童年，就总会记起我曾和朋友们一起玩耍的那个旧花园。"}]}]},{"day":54,"w":"thirsty","ph":"","defs":[{"pos":"adj.","m":"渴的","ex":[{"l":1,"en":"I am very thirsty after running.","zh":"跑步后我非常口渴。"},{"l":2,"en":"After the long walk in the hot sun, we were so thirsty that we finished three bottles of water at once.","zh":"在烈日下走了很长一段路后，我们太渴了，一口气喝完了三瓶水。"},{"l":3,"en":"Not only was he tired and thirsty, but he also had to keep walking until he found a safe place to rest.","zh":"他不仅又累又渴，还不得不继续走，直到找到一个安全的地方休息。"}]}]},{"day":54,"w":"this","ph":"","defs":[{"pos":"adj.&pron.","m":"这，这个","ex":[{"l":1,"en":"What’s this?","zh":"这是什么？"},{"l":2,"en":"This man-made waterway — known in China as Da Yunhe — is 1,700 kilometers long and some parts of it are more than 2,000 years old.","zh":"这条人造水道——在中国被称为大运河——长1700公里，其中一些部分已有两千多年的历史。"},{"l":3,"en":"This is exactly the kind of problem that we discussed last week, and only by working together can we find a workable solution.","zh":"这正是我们上周讨论过的那种问题，只有齐心协力，我们才能找到一个可行的解决办法。"}]}]},{"day":54,"w":"those","ph":"","defs":[{"pos":"adj.&pron.","m":"那些","ex":[{"l":1,"en":"Those are books.","zh":"那些是书。"},{"l":2,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对于一些学生来说，当他们在生活中遇到困难时，可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":3,"en":"Of all those old photos kept in the wooden box, the one taken on the school playground remains the dearest to my heart.","zh":"在木盒里保存的所有旧照片中，那张在学校操场上拍的依然是我心中最珍贵的。"}]}]},{"day":54,"w":"thought","ph":"","defs":[{"pos":"n.","m":"思想；想法","ex":[{"l":1,"en":"Yes, I think it does.","zh":"是的，我认为它确实如此。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想说的是，虽然有人说拥有物品是一种巨大的快乐，但我认为使用你拥有的东西更令人愉快。"},{"l":3,"en":"Lost in deep thought, he hardly noticed that the rain had stopped and that the whole street was bathed in golden sunlight.","zh":"他陷入了沉思，几乎没有注意到雨已经停了，整条街道沐浴在金色的阳光中。"}]}]},{"day":54,"w":"through","ph":"","defs":[{"pos":"prep.","m":"穿（通）过；从始至终","ex":[{"l":1,"en":"We walked through the park after dinner.","zh":"晚饭后我们穿过了公园。"},{"l":2,"en":"When we walked through the forest, we saw many beautiful birds that we had never seen before.","zh":"当我们穿过森林时，我们看到了许多以前从未见过的美丽鸟儿。"},{"l":3,"en":"Only by pushing through the hardest moments of training did the young athlete realize what he was truly capable of.","zh":"只有熬过训练中最艰难的时刻，这位年轻的运动员才意识到自己真正的能力。"}]}]},{"day":54,"w":"throughout","ph":"","defs":[{"pos":"prep.","m":"遍及；贯穿","ex":[{"l":1,"en":"The news spread throughout the school.","zh":"这个消息传遍了全校。"},{"l":2,"en":"Throughout the winter, the old man kept feeding the birds so that they could survive the cold days.","zh":"整个冬天，这位老人一直喂这些鸟，以便它们能熬过寒冷的日子。"},{"l":3,"en":"It is a tradition that has been passed down throughout the village for more than a hundred years, uniting generation after generation.","zh":"这是一项在全村传承了一百多年的传统，将一代又一代人联系在一起。"}]}]},{"day":54,"w":"throw","ph":"","defs":[{"pos":"v.","m":"投，掷，扔","ex":[{"l":1,"en":"Please throw the rubbish into the bin.","zh":"请把垃圾扔进垃圾桶。"},{"l":2,"en":"If you throw stones at the dogs, they will become angry and may bite you.","zh":"如果你朝狗扔石头，它们会生气，可能会咬你。"},{"l":3,"en":"Never throw away what seems useless today, for it may turn out to be exactly what you need in the years to come.","zh":"永远不要把今天看似无用的东西扔掉，因为多年以后它可能恰好是你所需要的。"}]}]},{"day":54,"w":"Thursday","ph":"","defs":[{"pos":"n.","m":"星期四","ex":[{"l":1,"en":"We have an English class on Thursday.","zh":"我们星期四有一节英语课。"},{"l":2,"en":"I will visit my grandma this Thursday because she has been ill since last week.","zh":"这个星期四我要去看望奶奶，因为从上周起她就一直生病。"},{"l":3,"en":"It was on a cold Thursday morning that the brave boy finally made up his mind to set off on his journey alone.","zh":"正是在一个寒冷的星期四早晨，这个勇敢的男孩终于下定决心独自踏上旅程。"}]}]},{"day":54,"w":"ticket","ph":"","defs":[{"pos":"n.","m":"票，券","ex":[{"l":1,"en":"I bought two tickets for the film.","zh":"我买了两张这部电影的电影票。"},{"l":2,"en":"The tickets that I booked online yesterday will be sent to my home tomorrow morning.","zh":"我昨天在网上订的票明天上午会被送到我家。"},{"l":3,"en":"Only when he arrived at the gate did he realize that the ticket he had proudly kept for weeks was for the wrong date.","zh":"直到到达门口，他才意识到自己骄傲地保存了数周的那张票日期弄错了。"}]}]},{"day":54,"w":"tidy","ph":"","defs":[{"pos":"adj.","m":"整洁的，干净的","ex":[{"l":1,"en":"Her room is very tidy and clean.","zh":"她的房间非常整洁干净。"},{"l":2,"en":"She always keeps her desk tidy so that she can find her books easily before class.","zh":"她总是保持书桌整洁，这样她在上课前就能轻松找到书。"},{"l":3,"en":"Tidy as the small room appears, every corner has been carefully arranged to make the most of the limited space.","zh":"尽管这间小房间看起来很整洁，但每个角落都经过精心安排，以充分利用有限的空间。"}]}]},{"day":54,"w":"tie","ph":"","defs":[{"pos":"n.","m":"领带；结","ex":[{"l":1,"en":"He is wearing a blue tie today.","zh":"他今天打着一条蓝色领带。"},{"l":2,"en":"The tie that my father bought me matches the white shirt very well.","zh":"爸爸给我买的那条领带和这件白衬衫很相配。"},{"l":3,"en":"Wearing a neat tie, the young man walked confidently into the hall where the final interview was to be held.","zh":"这位年轻人戴着整洁的领带，自信地走进即将举行最终面试的大厅。"}]},{"pos":"v.","m":"（用绳、线）系，栓","ex":[{"l":1,"en":"Please tie the dog to the tree.","zh":"请把狗拴在树上。"},{"l":2,"en":"The farmer tied the horse to the fence before he went into the house to rest.","zh":"农夫把马拴在栅栏上，然后才进屋休息。"},{"l":3,"en":"Having tied the boat firmly to the wooden post, the old fisherman sat down to wait for the rising tide.","zh":"把船牢牢地拴在木桩上之后，老渔夫坐下来等待涨潮。"}]}]},{"day":54,"w":"tiger","ph":"","defs":[{"pos":"n.","m":"老虎","ex":[{"l":1,"en":"The tiger is a dangerous animal.","zh":"老虎是一种危险的动物。"},{"l":2,"en":"The tiger that lives in the zoo was saved from the forest when it was only a baby.","zh":"住在动物园里的那只老虎还是幼崽时从森林里被救了出来。"},{"l":3,"en":"Rare as the South China tiger is, scientists are still working hard to increase its numbers in the wild.","zh":"尽管华南虎十分稀有，科学家们仍在努力增加其在野外的数量。"}]}]},{"day":54,"w":"till","ph":"","defs":[{"pos":"prep.&conj.","m":"直到；直到...为止","ex":[{"l":1,"en":"Wait here till I come back.","zh":"在这里等到我回来。"},{"l":2,"en":"I will keep reading till my mother comes back home from work.","zh":"我会一直读书，直到妈妈下班回家。"},{"l":3,"en":"Not until the last guest had left did she realize that it was already past midnight.","zh":"直到最后一位客人离开，她才意识到已经过了午夜。"}]}]},{"day":54,"w":"time","ph":"","defs":[{"pos":"n.","m":"时间；日期；钟点；次，回","ex":[{"l":1,"en":"What time is it?","zh":"现在几点了？"},{"l":2,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，露易丝至少能活到130岁。她的愿望是工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"Looking back, I do believe that the time we spent together in the countryside was the happiest period of my childhood.","zh":"回想起来，我坚信我们在乡下一起度过的那段时光是我童年最幸福的岁月。"}]}]},{"day":54,"w":"tip","ph":"","defs":[{"pos":"n.","m":"尖端；提示；小费；小窍门；建议","ex":[{"l":1,"en":"Can you give me a tip?","zh":"你能给我一个提示吗？"},{"l":
