的方法。"}]}]},{"day":44,"w":"reply","ph":"","defs":[{"pos":"v.&n.","m":"回复，回答","ex":[{"l":1,"en":"Please reply to my email soon.","zh":"请尽快回复我的邮件。"},{"l":2,"en":"When I asked why he was late, he did not reply at all.","zh":"当我问他为什么迟到时，他根本没有回答。"},{"l":3,"en":"To my surprise, she made no reply to the question that I had prepared so carefully.","zh":"令我惊讶的是，她对我精心准备的问题没有作出任何回答。"}]}]},{"day":44,"w":"report","ph":"","defs":[{"pos":"n.","m":"报道；报告；成绩单；（新闻）报道；调查报告","ex":[{"l":1,"en":"I really need to focus on the report for tomorrow's meeting.","zh":"我真的需要集中精力准备明天会议的报告。"},{"l":2,"en":"The science report which we wrote last month won the first prize in the school competition.","zh":"我们上个月写的那份科学报告在学校比赛中获得了一等奖。"},{"l":3,"en":"The report which the students handed in last Friday was praised by all the teachers at the meeting.","zh":"上周五学生提交的那份报告在会上受到了所有老师的表扬。"}]},{"pos":"v.","m":"报告；汇报；通报","ex":[{"l":1,"en":"I really need to focus on the report for tomorrow's meeting.","zh":"我真的需要集中精力准备明天会议的报告。"},{"l":2,"en":"The news spread widely after it was reported by a local newspaper.","zh":"这条新闻被一家当地报纸报道后广泛传播。"},{"l":3,"en":"It is reported that more and more families are choosing to travel abroad during the winter holiday.","zh":"据报道，越来越多的家庭选择在寒假出国旅行。"}]}]},{"day":44,"w":"reporter","ph":"","defs":[{"pos":"n.","m":"记者","ex":[{"l":1,"en":"The reporter is interviewing a famous scientist.","zh":"那位记者正在采访一位著名的科学家。"},{"l":2,"en":"The young reporter who works for the city newspaper has already won several awards.","zh":"在那家市报工作的年轻记者已经获得过几个奖项。"},{"l":3,"en":"It was the reporter's courage that made the hidden truth known to the public.","zh":"正是这位记者的勇气，让隐藏的真相为公众所知。"}]}]},{"day":44,"w":"republic","ph":"","defs":[{"pos":"n.","m":"共和国","ex":[{"l":1,"en":"France is a republic in Europe.","zh":"法国是欧洲的一个共和国。"},{"l":2,"en":"The teacher told us that the country became a republic more than seventy years ago.","zh":"老师告诉我们，这个国家七十多年前成为了一个共和国。"},{"l":3,"en":"Only when every citizen takes part in public affairs can a republic remain strong and fair.","zh":"只有当每位公民都参与公共事务，一个共和国才能保持强大与公正。"}]}]},{"day":44,"w":"require","ph":"","defs":[{"pos":"v.","m":"需要；要求","ex":[{"l":1,"en":"This game requires at least two players.","zh":"这个游戏至少需要两名玩家。"},{"l":2,"en":"The new rule requires that all students wear school uniforms on Mondays.","zh":"新规定要求所有学生周一穿校服。"},{"l":3,"en":"Learning a foreign language well requires not only time but also plenty of practice.","zh":"学好一门外语不仅需要时间，还需要大量的练习。"}]}]},{"day":44,"w":"research","ph":"","defs":[{"pos":"v.","m":"研究；调查","ex":[{"l":1,"en":"Scientists research how birds find their way.","zh":"科学家研究鸟类如何认路。"},{"l":2,"en":"Before writing the paper, she spent two months researching the history of the city.","zh":"在写论文之前，她花了两个月时间研究这座城市的历史。"},{"l":3,"en":"Having researched the problem for years, the team finally found a possible way to clean the river.","zh":"研究这个问题多年后，这个团队终于找到了一种可能清洁河流的方法。"}]}]},{"day":44,"w":"resource","ph":"","defs":[{"pos":"n.","m":"资源","ex":[{"l":1,"en":"Water is an important natural resource.","zh":"水是一种重要的自然资源。"},{"l":2,"en":"We should save resources because they are limited on the earth.","zh":"我们应当节约资源，因为地球上的资源是有限的。"},{"l":3,"en":"If we keep wasting resources without thinking, our children will have little left to use in the future.","zh":"如果我们毫不思考地继续浪费资源，我们的孩子将来将几乎无物可用。"}]}]},{"day":44,"w":"respect","ph":"","defs":[{"pos":"n.&v.","m":"尊重，敬重","ex":[{"l":1,"en":"We should respect our teachers.","zh":"我们应当尊重老师。"},{"l":2,"en":"He has won the respect of everyone who knows him through hard work.","zh":"他通过努力赢得了所有认识他的人的尊重。"},{"l":3,"en":"Only by respecting others can we truly expect to be respected in return.","zh":"只有尊重他人，我们才能真正期望得到相应的尊重。"}]}]},{"day":44,"w":"response","ph":"","defs":[{"pos":"n.","m":"响应；反应；作答","ex":[{"l":1,"en":"I am waiting for his response.","zh":"我在等他的回复。"},{"l":2,"en":"Her quick response to the question surprised all the students in the class.","zh":"她对问题的迅速回答让班里所有学生都感到惊讶。"},{"l":3,"en":"What impressed me most was his calm response when facing such a difficult situation.","zh":"最令我印象深刻的是，面对如此困难的局面，他依然冷静作答。"}]}]},{"day":44,"w":"responsibility","ph":"","defs":[{"pos":"n.","m":"责任；职责；责任心","ex":[{"l":1,"en":"It is my responsibility to clean the blackboard.","zh":"擦黑板是我的职责。"},{"l":2,"en":"Parents should teach their children how to take responsibility for their own actions.","zh":"父母应当教孩子如何为自己的行为承担责任。"},{"l":3,"en":"Taking responsibility does not mean doing everything alone, but rather knowing when to ask for help.","zh":"承担责任并不意味着凡事独自完成，而是懂得何时寻求帮助。"}]}]},{"day":44,"w":"responsible","ph":"","defs":[{"pos":"adj.","m":"负责的；有责任的","ex":[{"l":1,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索后，我了解到负责绘制全世界道路、山脉、海洋及其他地方的人被称为制图师。"},{"l":2,"en":"The manager who is responsible for this project will explain the plan to us tomorrow.","zh":"负责这个项目的经理明天会向我们解释这个计划。"},{"l":3,"en":"Being responsible does not only mean finishing your own work, but also caring about the people around you.","zh":"负责任不仅意味着完成自己的工作，还意味着关心身边的人。"}]}]},{"day":44,"w":"rest","ph":"","defs":[{"pos":"n.","m":"休息；剩余部分；其余的人（物）","ex":[{"l":1,"en":"Let's take a short rest after lunch.","zh":"午饭后我们休息一会儿吧。"},{"l":2,"en":"After the heavy rain, the rest of the football match was cancelled.","zh":"大雨过后，剩余的足球比赛被取消了。"},{"l":3,"en":"Of all the students, only three finished the task; the rest were still struggling with the last question.","zh":"所有学生中，只有三人完成了任务；其余的人还在为最后一题而犯难。"}]},{"pos":"v.","m":"休息，歇息","ex":[{"l":1,"en":"You look tired. Please rest for a while.","zh":"你看起来很累，请休息一会儿。"},{"l":2,"en":"After running for an hour, he lay down on the grass to rest.","zh":"跑了一个小时后，他躺在草地上休息。"},{"l":3,"en":"No matter how busy you are, do not forget to rest, for health always comes first.","zh":"无论多忙，都不要忘记休息，因为健康永远是第一位的。"}]}]},{"day":44,"w":"restaurant","ph":"","defs":[{"pos":"n.","m":"饭馆；饭店","ex":[{"l":1,"en":"The restaurant doesn't open until seven forty-five.","zh":"这家饭店直到七点四十五才开门。"},{"l":2,"en":"The restaurant which is famous for its seafood attracts many visitors every weekend.","zh":"那家以海鲜闻名的饭店每个周末都吸引许多游客。"},{"l":3,"en":"Not until we walked into the restaurant did I realize how beautifully it had been decorated for the festival.","zh":"直到走进那家饭店，我才意识到它为节日装饰得如此漂亮。"}]}]},{"day":44,"w":"result","ph":"","defs":[{"pos":"n.","m":"结果；成果","ex":[{"l":1,"en":"We are not the result of the things we've bought.","zh":"我们不是我们所买东西的产物。"},{"l":2,"en":"But parents and teachers worked together to protect the school and now they are pleased to see the result.","zh":"但是家长和老师们齐心协力保护了这所学校,如今他们很高兴看到这样的结果。"},{"l":3,"en":"Only by working closely with our teammates can we turn a difficult task into a satisfying result that everyone is proud of.","zh":"只有与队友密切合作,我们才能把一项艰难的任务变成令人满意、人人都引以为豪的成果。"}]}]},{"day":44,"w":"retired","ph":"","defs":[{"pos":"adj.","m":"退休的","ex":[{"l":1,"en":"The retired teacher often visits the children in the hospital.","zh":"那位退休的老师经常去医院看望孩子们。"},{"l":2,"en":"Although he is a retired worker, he still volunteers at the community center every weekend.","zh":"虽然他是一位退休的工人,但他每个周末仍在社区中心做志愿者。"},{"l":3,"en":"The retired scientist devotes most of his time to writing books that introduce young readers to the wonders of nature.","zh":"这位退休的科学家把大部分时间都用来写书,向年轻读者介绍大自然的奇迹。"}]}]},{"day":44,"w":"return","ph":"","defs":[{"pos":"v.","m":"回来；返回；归还；偿还","ex":[{"l":1,"en":"Please return the book to the library on time.","zh":"请按时把书还给图书馆。"},{"l":2,"en":"I will return the camera to you as soon as I come back from Beijing next week.","zh":"下周我从北京一回来,我就会把照相机还给你。"},{"l":3,"en":"If you forget to return the borrowed bike before Friday, you will have to pay an extra fee for the delay.","zh":"如果你忘记在周五之前归还借来的自行车,你就得为延误支付额外的费用。"}]}]},{"day":44,"w":"reuse","ph":"","defs":[{"pos":"v.","m":"再利用","ex":[{"l":1,"en":"We should reuse the empty bottles at home.","zh":"我们应该重复利用家里的空瓶子。"},{"l":2,"en":"If we reuse old clothes to make shopping bags, we can reduce a lot of waste in our daily life.","zh":"如果我们把旧衣服改造成购物袋,就能在日常生活中减少大量浪费。"},{"l":3,"en":"It is reported that students who learn to reuse waste materials in art class become more creative than before.","zh":"据报道,在美术课上学会再利用废弃材料的学生比以前更有创造力。"}]}]},{"day":45,"w":"review","ph":"","defs":[{"pos":"v.&n.","m":"复习；评论","ex":[{"l":1,"en":"Let's review the new words together after class.","zh":"下课后我们一起复习生词吧。"},{"l":2,"en":"Before the exam, you had better review what you have learned so that you can do well in the test.","zh":"考试前,你最好复习一下所学的内容,这样你才能考好。"},{"l":3,"en":"The teacher asked us to write a short review of the novel we had read, explaining why we liked or disliked it.","zh":"老师让我们为我们读过的小说写一篇简短的评论,解释我们喜欢或不喜欢它的原因。"}]}]},{"day":45,"w":"rice","ph":"","defs":[{"pos":"n.","m":"稻；米；米饭","ex":[{"l":1,"en":"We eat rice for lunch every day.","zh":"我们每天午饭吃米饭。"},{"l":2,"en":"Rice is one of the most important foods in southern China, where people grow it in the warm fields.","zh":"水稻是中国南方最重要的粮食之一,人们在温暖的田地里种植它。"},{"l":3,"en":"It is amazing that a single grain of rice can carry so much culture and history passed down by our ancestors.","zh":"令人惊叹的是,一粒米竟能承载由我们祖先传承下来的如此丰富的文化与历史。"}]}]},{"day":45,"w":"rich","ph":"","defs":[{"pos":"adj.","m":"富裕的；有钱的；味道浓的；重油的","ex":[{"l":1,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它的修建是为了把中国南方富饶农田里的粮食运送到北方的城市。"},{"l":2,"en":"The rich businessman decided to build a new school so that poor children could study there for free.","zh":"那位富有的商人决定建一所新学校,以便贫困的孩子能在那里免费读书。"},{"l":3,"en":"Only after years of hard work did the young man become rich enough to support his family and realize his dream.","zh":"经过多年辛勤努力之后,这位年轻人才变得足够富有,既能养家又能实现梦想。"}]}]},{"day":45,"w":"rid","ph":"","defs":[{"pos":"v.","m":"使摆脱","ex":[{"l":1,"en":"You must get rid of the bad habit at once.","zh":"你必须立刻改掉这个坏习惯。"},{"l":2,"en":"The doctor told him to get rid of smoking if he wanted to stay healthy in the future.","zh":"医生告诉他,如果想今后保持健康,就必须戒除吸烟。"},{"l":3,"en":"It is never easy to rid yourself of a deep fear, but with courage and patience you can finally succeed.","zh":"让自己摆脱深层的恐惧绝非易事,但凭借勇气与耐心,你终能成功。"}]}]},{"day":45,"w":"ride","ph":"","defs":[{"pos":"v.","m":"骑（马、自行车等)","ex":[{"l":1,"en":"My brother can ride a bike very well.","zh":"我弟弟骑自行车骑得很好。"},{"l":2,"en":"When I was eight years old, my father taught me how to ride a horse on the farm.","zh":"我八岁的时候,爸爸在农场里教我如何骑马。"},{"l":3,"en":"It was in this small village that I first learned to ride a bicycle without help from anyone else.","zh":"正是在这个小村庄里,我第一次学会在没有任何人帮助的情况下骑自行车。"}]},{"pos":"n.","m":"乘车旅行","ex":[{"l":1,"en":"The bus ride took us two hours.","zh":"乘公交车花了我们两个小时。"},{"l":2,"en":"The ride to the mountain was long, but the beautiful view made us forget how tired we were.","zh":"上山的那段乘车旅程很漫长,但美丽的景色让我们忘却了疲惫。"},{"l":3,"en":"Never will I forget the exciting ride on the roller coaster that left my heart beating fast for hours.","zh":"我永远不会忘记那次令人激动的过山车之旅,它让我的心剧烈跳动了好几个小时。"}]}]},{"day":45,"w":"right","ph":"","defs":[{"pos":"adj.","m":"对的，正确的；恰当的；右边的","ex":[{"l":1,"en":"Your answer is right this time.","zh":"你这次的答案是对的。"},{"l":2,"en":"Make sure you choose the right answer before you hand in your test paper.","zh":"交卷前一定要确保你选择了正确的答案。"},{"l":3,"en":"It is important to find the right balance between study and rest so that we can keep both body and mind healthy.","zh":"在学习与休息之间找到恰当的平衡很重要,这样我们才能保持身心健康。"}]},{"pos":"adv.","m":"正确地；恰恰；向右，在右边","ex":[{"l":1,"en":"Turn right at the second crossing.","zh":"在第二个十字路口向右拐。"},{"l":2,"en":"Walk straight on and turn right when you see the post office on your left.","zh":"一直往前走,当你看到邮局在左边时就向右拐。"},{"l":3,"en":"Standing right in the middle of the square, the old tower reminds people of the long history of the city.","zh":"那座古塔恰恰矗立在广场中央,使人们想起这座城市悠久的历史。"}]},{"pos":"n.","m":"右；权利","ex":[{"l":1,"en":"Everyone has the right to go to school.","zh":"每个人都有上学的权利。"},{"l":2,"en":"In our country, every child has the right to receive free education until the age of fifteen.","zh":"在我国,每个孩子都有权利接受免费教育直到十五岁。"},{"l":3,"en":"It is our duty to protect the right of every student to express their own ideas in class.","zh":"保护每个学生在课堂上表达自己观点的权利,是我们的责任。"}]}]},{"day":45,"w":"ring","ph":"","defs":[{"pos":"v.","m":"（钟、铃等）响；摇铃；打电话","ex":[{"l":1,"en":"The bell is ringing for class.","zh":"上课铃正在响。"},{"l":2,"en":"Please ring me up as soon as you arrive at the railway station tomorrow morning.","zh":"明天早上你一到火车站就请给我打电话。"},{"l":3,"en":"The moment the bell began to ring, the students rushed out of the classroom to enjoy the sunny afternoon.","zh":"铃声一响,学生们就冲出教室,去享受那个阳光明媚的下午。"}]},{"pos":"n.","m":"打电话；铃声；环形物","ex":[{"l":1,"en":"I will give you a ring this evening.","zh":"我今晚会给你打个电话。"},{"l":2,"en":"The gold ring on her finger was a birthday gift from her grandmother who lived far away.","zh":"她手指上那枚金戒指是远方的祖母送给她的生日礼物。"},{"l":3,"en":"Lost in thought, she kept turning the silver ring around her finger without noticing the people around her.","zh":"她陷入沉思,不停地转动着手指上的银戒指,丝毫没有注意到周围的人。"}]}]},{"day":45,"w":"rise","ph":"","defs":[{"pos":"v.","m":"上升；上涨；起来","ex":[{"l":1,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着基于计算机的工具(如GPS系统)的兴起,制图师需要比过去更强的计算机技能。"},{"l":2,"en":"The price of the house continued to rise, which made it hard for young people to buy one.","zh":"房价持续上涨,这让年轻人很难买得起房子。"},{"l":3,"en":"Not until the sun began to rise did the climbers realize how far they still had to go to reach the top.","zh":"直到太阳开始升起,登山者们才意识到距离山顶还有多远。"}]}]},{"day":45,"w":"river","ph":"","defs":[{"pos":"n.","m":"江，河","ex":[{"l":1,"en":"In fact, it's not one canal, but a system of canals and rivers linked together.","zh":"事实上,它不是一条运河,而是一个由相互连通的运河和河流组成的系统。"},{"l":2,"en":"The river that runs through our village is so clear that we can see fish swimming in it.","zh":"流过我们村庄的那条河非常清澈,我们能看到鱼在里面游来游去。"},{"l":3,"en":"Surrounded by green hills, the quiet river looks like a long mirror shining under the morning sun.","zh":"在青山的环绕下,那条宁静的河流宛如一面长长的镜子,在朝阳下闪闪发亮。"}]}]},{"day":45,"w":"road","ph":"","defs":[{"pos":"n.","m":"路，道路","ex":[{"l":1,"en":"On windy days, leaves fall on the ground and the road looks beautiful.","zh":"刮风的日子里,树叶落到地上,道路看上去很美。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索之后,我了解到那些负责绘制世界各地道路、山脉、海洋和其他地方的人被称为制图师。"},{"l":3,"en":"It was along this narrow road that the old man walked every morning, greeting each neighbor with a warm smile.","zh":"每天清晨,这位老人正是沿着这条狭窄的道路行走,用温暖的微笑向每位邻居问好。"}]}]},{"day":45,"w":"roast","ph":"","defs":[{"pos":"v.","m":"烤（肉）","ex":[{"l":1,"en":"My mother is roasting chicken in the kitchen.","zh":"妈妈正在厨房里烤鸡。"},{"l":2,"en":"They plan to roast some meat over the fire when they go camping in the forest this weekend.","zh":"他们计划本周末去森林露营时,在火上烤些肉吃。"},{"l":3,"en":"The smell of the meat being roasted over the fire made everyone at the camp feel both hungry and excited.","zh":"火上烤着的肉散发出的香味,让营地里每个人都既饥饿又兴奋。"}]}]},{"day":45,"w":"robot","ph":"","defs":[{"pos":"n.","m":"机器人","ex":[{"l":1,"en":"Nowadays, many robots have been used to work in dangerous situations.","zh":"如今,许多机器人已被用于在危险环境中工作。"},{"l":2,"en":"It is not easy to beat a robot player in a chess game.","zh":"在国际象棋比赛中,打败机器人棋手并不容易。"},{"l":3,"en":"Not only can the new robot clean the floor, but it can also remind the elderly to take medicine on time.","zh":"这款新机器人不仅能打扫地板,还能提醒老人按时服药。"}]}]},{"day":45,"w":"rock","ph":"","defs":[{"pos":"n.","m":"岩石","ex":[{"l":1,"en":"The boy picked up a small rock by the river.","zh":"男孩在河边捡起了一块小岩石。"},{"l":2,"en":"The children were surprised to find that the rock was actually the home of many small insects.","zh":"孩子们惊讶地发现，那块岩石其实是许多小昆虫的家。"},{"l":3,"en":"Hidden beneath the heavy rock lay a small wooden box, which had been waiting to be discovered for nearly thirty years.","zh":"那块沉重的岩石下藏着一个木制小盒子，它已经等待被发现近三十年了。"}]}]},{"day":45,"w":"rocket","ph":"","defs":[{"pos":"n.","m":"火箭","ex":[{"l":1,"en":"The kids were excited to see the toy rocket flying into the sky.","zh":"孩子们兴奋地看着玩具火箭飞上天空。"},{"l":2,"en":"The scientist explained how the rocket could carry satellites into space so that we could learn more about the universe.","zh":"科学家解释了火箭如何将卫星送入太空，以便我们能更多地了解宇宙。"},{"l":3,"en":"It was the rocket that the young engineer designed himself that finally sent the experimental probe into orbit, proving his years of hard work worthwhile.","zh":"正是这位年轻工程师亲自设计的火箭最终将实验探测器送入轨道，证明了他多年来的努力是值得的。"}]}]},{"day":45,"w":"role","ph":"","defs":[{"pos":"n.","m":"角色","ex":[{"l":1,"en":"She played an important role in the school play.","zh":"她在学校的话剧中扮演了一个重要角色。"},{"l":2,"en":"The teacher told us that confidence plays a very important role when we want to learn English well.","zh":"老师告诉我们，当我们想学好英语时，自信起着非常重要的作用。"},{"l":3,"en":"Not until I joined the drama club did I realize how challenging the leading role could be, yet it also taught me to face difficulties bravely.","zh":"直到我加入戏剧社，我才意识到主角可以多么有挑战性，但它也教会了我勇敢地面对困难。"}]}]},{"day":45,"w":"room","ph":"","defs":[{"pos":"n.","m":"房间，室；空间；地方","ex":[{"l":1,"en":"I prefer to make it a heart-to-heart room.","zh":"我更愿意把它变成一间谈心室。"},{"l":2,"en":"The heart-to-heart room can offer help to these students in time.","zh":"这间谈心室能及时为这些学生提供帮助。"},{"l":3,"en":"What the headmaster wanted was a room where students could share their worries freely, and that was exactly why the heart-to-heart room was set up.","zh":"校长想要的正是这样一个房间，让学生们可以自由地倾诉烦恼，这正是设立谈心室的原因。"}]}]},{"day":45,"w":"root","ph":"","defs":[{"pos":"n.","m":"根；根源；起源","ex":[{"l":1,"en":"This messenger sends to the roots the information to produce more nicotine.","zh":"这个信使把信息传送到根部，以产生更多的尼古丁。"},{"l":2,"en":"Deep roots help the tall tree stand firm in strong winds, while shallow ones may cause it to fall easily.","zh":"深深的根帮助高大的树在强风中稳固站立，而浅根则可能让它容易倒下。"},{"l":3,"en":"Although the custom has spread widely across the country, its roots can still be traced back to a small village in the south hundreds of years ago.","zh":"虽然这个习俗已在全国广泛传播，但它的根源仍可追溯到几百年前南方的一个小村庄。"}]}]},{"day":45,"w":"rope","ph":"","defs":[{"pos":"n.","m":"绳子","ex":[{"l":1,"en":"He tied the box with a long rope.","zh":"他用一根长绳子把箱子绑了起来。"},{"l":2,"en":"The climbers used a strong rope to make sure that everyone could reach the top of the mountain safely.","zh":"登山者们使用了一根结实的绳子，以确保每个人都能安全到达山顶。"},{"l":3,"en":"Only by pulling the rope together with all his strength was the boy able to save his friend who had fallen into the deep hole.","zh":"只有用尽全身力气一起拉那根绳子，男孩才救出了掉进深洞的朋友。"}]}]},{"day":45,"w":"rose","ph":"","defs":[{"pos":"n.","m":"玫瑰花","ex":[{"l":1,"en":"My mother grows beautiful roses in the garden.","zh":"我妈妈在花园里种着美丽的玫瑰。"},{"l":2,"en":"The red rose that he gave me on my birthday has become one of my most precious gifts.","zh":"他在我生日时送我的那朵红玫瑰，已成为我最珍贵的礼物之一。"},{"l":3,"en":"Not only does the rose stand for love in many cultures, but it also reminds people to cherish those who truly care about them.","zh":"玫瑰不仅在许多文化中象征着爱，还提醒人们珍惜那些真正关心自己的人。"}]}]},{"day":45,"w":"rough","ph":"","defs":[{"pos":"adj.","m":"粗糙的；不平的；风浪急的","ex":[{"l":1,"en":"The road here is very rough.","zh":"这里的路很粗糙不平。"},{"l":2,"en":"After walking on the rough path for two hours, the children finally arrived at the old temple on the hill.","zh":"在崎岖的小路上走了两个小时后，孩子们终于到达了山上的古庙。"},{"l":3,"en":"Though the journey over the rough sea was far from comfortable, the sailors never gave up their hope of reaching the distant island.","zh":"尽管在风急浪高的海上的航程远不舒适，水手们从未放弃到达远方岛屿的希望。"}]}]},{"day":45,"w":"round","ph":"","defs":[{"pos":"adj.","m":"圆的；球形的","ex":[{"l":1,"en":"The table has a round top.","zh":"这张桌子有一个圆桌面。"},{"l":2,"en":"The round clock on the wall reminds me of the happy days I spent with my grandmother.","zh":"墙上那只圆圆的钟让我想起了和祖母一起度过的快乐时光。"},{"l":3,"en":"With a round mirror hanging above the bed, the small room suddenly looked much brighter and more spacious than before.","zh":"床的上方挂着一面圆镜子，这个小房间一下子看起来比以前明亮、宽敞了许多。"}]},{"pos":"adv.","m":"环绕地；在周围","ex":[{"l":1,"en":"Please come round and see us soon.","zh":"请尽快过来看看我们。"},{"l":2,"en":"When winter comes round, the whole family always gathers together to make dumplings and tell stories.","zh":"当冬天到来时，全家人总会聚在一起包饺子、讲故事。"},{"l":3,"en":"Wherever he travels round the world, the old artist always carries a notebook in which he records his sudden ideas.","zh":"无论这位老艺术家在世界上走到哪里，他总是随身带着一个笔记本，记录他突然涌现的想法。"}]},{"pos":"prep.","m":"环绕一周；围着","ex":[{"l":1,"en":"They walked round the lake together.","zh":"他们一起绕着湖走。"},{"l":2,"en":"The guide led us round the old castle and told us many interesting stories about its history.","zh":"向导带我们绕着古堡参观，并给我们讲了许多关于它历史的有趣故事。"},{"l":3,"en":"Having driven round the city for nearly an hour, the tourists finally found a small restaurant that served delicious local food.","zh":"在城里绕了将近一个小时后，游客们终于找到了一家供应美味当地菜的小餐馆。"}]}]},{"day":45,"w":"row","ph":"","defs":[{"pos":"n.","m":"（一）排,（一）行","ex":[{"l":1,"en":"The students sat in a long row.","zh":"学生们坐成一长排。"},{"l":2,"en":"The books on the back row of the shelf are the ones that our teacher recommended to us last week.","zh":"书架后排的那些书是老师上周向我们推荐的。"},{"l":3,"en":"In the front row sat a little girl who kept asking curious questions, which made the whole lecture much more lively than expected.","zh":"前排坐着一个小女孩，她不断提出好奇的问题，这让整场讲座比预期生动得多。"}]}]},{"day":45,"w":"rubbish","ph":"","defs":[{"pos":"n.","m":"垃圾；废物","ex":[{"l":1,"en":"Please put your rubbish in the bin.","zh":"请把垃圾放进垃圾桶里。"},{"l":2,"en":"If we throw rubbish everywhere, our city will become dirty and unhealthy for everyone.","zh":"如果我们到处扔垃圾，我们的城市将变得肮脏，对每个人都不健康。"},{"l":3,"en":"What surprised the volunteers was that most of the rubbish collected on the beach could actually be recycled if people sorted it carefully.","zh":"令志愿者惊讶的是，在海滩上收集到的大部分垃圾，如果人们仔细分类，其实是可以回收利用的。"}]}]},{"day":45,"w":"rude","ph":"","defs":[{"pos":"adj.","m":"无礼的，粗鲁的","ex":[{"l":1,"en":"It is rude to laugh at others.","zh":"嘲笑别人是不礼貌的。"},{"l":2,"en":"Although he was angry, he still tried not to be rude to the waiter who had made a mistake.","zh":"虽然他很生气，但他仍尽量不对犯了错的服务员粗鲁。"},{"l":3,"en":"No matter how rude the customer was, the shop assistant kept smiling, believing that politeness could finally win respect.","zh":"无论那位顾客多么粗鲁，店员始终微笑着，他相信礼貌最终能赢得尊重。"}]}]},{"day":45,"w":"rule","ph":"","defs":[{"pos":"n.","m":"规定；规则","ex":[{"l":1,"en":"We must follow the school rules.","zh":"我们必须遵守学校的规定。"},{"l":2,"en":"The new rule says that students are not allowed to use mobile phones during class unless there is an emergency.","zh":"新规定说，学生在上课期间不得使用手机，除非有紧急情况。"},{"l":3,"en":"Only when everyone understands the reason behind each rule will they be willing to follow it willingly instead of feeling forced.","zh":"只有当每个人都理解每条规则背后的原因时，他们才会心甘情愿地遵守，而不是感到被迫。"}]},{"pos":"v.","m":"统治","ex":[{"l":1,"en":"The king ruled the country for forty years.","zh":"国王统治这个国家四十年。"},{"l":2,"en":"The wise emperor who ruled the empire two hundred years ago is still remembered by people all over the country.","zh":"两百年前统治这个帝国的明智皇帝，至今仍被全国人民铭记。"},{"l":3,"en":"It was during the years when she ruled the small kingdom that schools were first opened to children from poor families, changing countless lives forever.","zh":"正是在她统治这个小王国的那些年里，学校首次向贫困家庭的孩子开放，永远改变了无数人的生活。"}]}]},{"day":45,"w":"run","ph":"","defs":[{"pos":"v.","m":"跑，奔跑；经营；管理","ex":[{"l":1,"en":"Plants certainly cannot run away, and they have no teeth or claws.","zh":"植物当然跑不掉，它们也没有牙齿或爪子。"},{"l":2,"en":"When an animal is under attack, it can run away or fight back.","zh":"当动物受到攻击时，它可以逃跑或反击。"},{"l":3,"en":"Not only does he run a small bookstore in the old street, but he also organizes free reading clubs every weekend to encourage children to read more.","zh":"他不仅在老街经营着一家小书店，还每个周末组织免费读书会，鼓励孩子们多读书。"}]},{"pos":"n.","m":"跑，奔跑","ex":[{"l":1,"en":"The boy went for a quick run in the morning.","zh":"男孩早晨快速跑了一段。"},{"l":2,"en":"After a long run along the river, the athletes felt tired but proud of what they had achieved.","zh":"沿着河长跑之后，运动员们感到疲惫，但为自己的成就感到自豪。"},{"l":3,"en":"Such was his love for running that he kept a daily run for ten years, even on the coldest winter mornings.","zh":"他对跑步的热爱如此之深，以至于十年里每天坚持跑步，即使在最冷的冬日清晨也不例外。"}]}]},{"day":45,"w":"rush","ph":"","defs":[{"pos":"v.","m":"冲；奔跑","ex":[{"l":1,"en":"He rushed into the classroom this morning.","zh":"他今早冲进了教室。"},{"l":2,"en":"As soon as the bell rang, the students rushed out of the classroom to play on the playground.","zh":"铃声一响，学生们就冲出教室，到操场上去玩。"},{"l":3,"en":"Having rushed through the heavy rain, the boy arrived at the station only to find that the last train had already left.","zh":"男孩冒雨冲到车站，结果却发现最后一班火车已经开走了。"}]}]},{"day":45,"w":"sad","ph":"","defs":[{"pos":"adj.","m":"悲伤的","ex":[{"l":1,"en":"She looked sad after hearing the news.","zh":"听到这个消息后，她看起来很悲伤。"},{"l":2,"en":"The little girl felt sad because her best friend was moving to another city and they might not see each other again.","zh":"小女孩感到难过，因为她最好的朋友要搬到另一个城市，他们可能再也见不到彼此了。"},{"l":3,"en":"Sad as she was about leaving the old house, she tried to comfort her mother, telling her that their new life would be just as full of joy.","zh":"虽然离开老房子让她很伤心，她还是努力安慰母亲，告诉她他们的新生活也会同样充满欢乐。"}]}]},{"day":45,"w":"sadly","ph":"","defs":[{"pos":"adv.","m":"悲哀地；忧愁地；令人遗憾地；不幸地","ex":[{"l":1,"en":"Sadly, he missed the early bus this morning.","zh":"令人遗憾的是，他今天早上错过了早班车。"},{"l":2,"en":"Sadly, many wild animals are in danger because people keep cutting down forests.","zh":"令人遗憾的是，由于人们不断砍伐森林，许多野生动物正处于危险之中。"},{"l":3,"en":"Sadly, the old bridge which had connected the two villages for over a century was finally destroyed by the terrible storm.","zh":"令人遗憾的是，那座连接两个村庄长达一个多世纪的老桥，最终被可怕的暴风雨摧毁了。"}]}]},{"day":45,"w":"safe","ph":"","defs":[{"pos":"adj.","m":"安全的，平安的","ex":[{"l":1,"en":"It is safe to cross the road when the light is green.","zh":"绿灯亮的时候过马路是安全的。"},{"l":2,"en":"The teacher told us that it was not safe to leave the camp alone after dark.","zh":"老师告诉我们，天黑后独自离开营地是不安全的。"},{"l":3,"en":"Only when everyone follows the safety rules can we make sure that the playground remains a safe place for children.","zh":"只有当每个人都遵守安全规则时，我们才能确保操场对孩子们来说仍然是一个安全的地方。"}]},{"pos":"n.","m":"保险柜","ex":[{"l":1,"en":"He keeps all his money in a small safe.","zh":"他把所有的钱都放在一个小保险柜里。"},{"l":2,"en":"The manager opened the safe and found that the important documents were missing.","zh":"经理打开保险柜，发现那些重要的文件不见了。"},{"l":3,"en":"The boss hid the most valuable contracts in the safe so that nobody else in the company could take them away.","zh":"老板把最有价值的合同藏进了保险柜，这样公司里其他人就无法把它们拿走。"}]}]},{"day":46,"w":"safely","ph":"","defs":[{"pos":"adv.","m":"安全地，平安地","ex":[{"l":1,"en":"The children arrived home safely after the trip.","zh":"孩子们旅行后平安地回到了家。"},{"l":2,"en":"Thanks to the guide, all the climbers returned safely from the high mountain.","zh":"多亏了向导，所有的登山者都安全地从高山上返回了。"},{"l":3,"en":"After walking through the forest for several hours in the heavy rain, the students finally reached the village safely.","zh":"在大雨中穿过森林走了几个小时后，学生们终于安全地抵达了那个村庄。"}]}]},{"day":46,"w":"safety","ph":"","defs":[{"pos":"n.","m":"安全，平安","ex":[{"l":1,"en":"My father said people should know more about fire safety so that they could protect themselves and their families.","zh":"我父亲说人们应该多了解消防安全知识，这样才能保护自己和家人。"},{"l":2,"en":"The school holds a safety drill every term so that students will know what to do when a fire breaks out.","zh":"学校每学期举行一次安全演习，以便学生们知道火灾发生时该怎么做。"},{"l":3,"en":"Not only does the factory pay attention to food safety, but it also trains every worker to follow strict rules during production.","zh":"这家工厂不仅关注食品安全，还培训每一位员工在生产过程中严格遵守规则。"}]}]},{"day":46,"w":"salad","ph":"","defs":[{"pos":"n.","m":"色拉","ex":[{"l":1,"en":"She made a fruit salad for lunch.","zh":"她午餐做了一份水果沙拉。"},{"l":2,"en":"My mother often prepares a fresh salad because it is good for our health.","zh":"我妈妈经常准备新鲜的沙拉，因为这有益于我们的健康。"},{"l":3,"en":"The salad which the chef recommended tasted so delicious that I decided to order it again next time.","zh":"主厨推荐的那份沙拉尝起来如此美味，以至于我决定下次再来点一份。"}]}]},{"day":46,"w":"salary","ph":"","defs":[{"pos":"n.","m":"薪金，薪水","ex":[{"l":1,"en":"His salary is higher than mine.","zh":"他的薪水比我高。"},{"l":2,"en":"Although her salary is not very high, she really enjoys working in the small company.","zh":"虽然她的薪水不是很高，但她很喜欢在这家小公司工作。"},{"l":3,"en":"It was the rich salary and the friendly workmates that made him accept the offer without hesitation.","zh":"正是丰厚的薪水和友善的同事，让他毫不犹豫地接受了这份工作。"}]}]},{"day":46,"w":"sale","ph":"","defs":[{"pos":"n.","m":"卖，出售","ex":[{"l":1,"en":"The shop will put these books on sale next week.","zh":"这家商店下周将把这些书降价出售。"},{"l":2,"en":"I bought this jacket on sale, so I spent much less money than before.","zh":"我是在促销时买下这件夹克的，所以我花的钱比以前少得多。"},{"l":3,"en":"The new product has been on sale for only a week, yet it has already become popular among young customers.","zh":"这款新产品上市才一周，却已经深受年轻顾客的欢迎。"}]}]},{"day":46,"w":"salt","ph":"","defs":[{"pos":"n.","m":"盐","ex":[{"l":1,"en":"I remember I put too much salt into the pizza.","zh":"我记得我在披萨里放了太多的盐。"},{"l":2,"en":"The doctor advised my grandfather to eat less salt if he wanted to stay healthy.","zh":"医生建议我爷爷如果想保持健康，就要少吃盐。"},{"l":3,"en":"Studies show that taking in too much salt may lead to serious health problems, especially for elderly people.","zh":"研究表明，摄入过多的盐可能会引发严重的健康问题，尤其是对老年人而言。"}]}]},{"day":46,"w":"salty","ph":"","defs":[{"pos":"adj.","m":"咸的；含盐的","ex":[{"l":1,"en":"It was so salty that no one wanted to eat it.","zh":"它太咸了，以至于没有人想吃。"},{"l":2,"en":"The soup was so salty that I had to drink a lot of water after lunch.","zh":"这汤太咸了，午饭后我不得不喝了许多水。"},{"l":3,"en":"Believe it or not, the salty fish dish turned out to be the most popular food at the family party.","zh":"信不信由你，那道咸鱼竟然成了家庭聚会上最受欢迎的食物。"}]}]},{"day":46,"w":"same","ph":"","defs":[{"pos":"adj.","m":"同样的；同一的","ex":[{"l":1,"en":"It was really wonderful to chat with each other and enjoy food at the same time.","zh":"一边彼此聊天，一边享用美食，真是太棒了。"},{"l":2,"en":"Although the twins look the same, their interests are quite different from each other.","zh":"虽然这对双胞胎长得一样，但他们的兴趣却大不相同。"},{"l":3,"en":"What surprised me most was that the same dish tasted completely different in the two restaurants we visited last Sunday.","zh":"最令我惊讶的是，上周日我们光顾的两家餐厅里，同一道菜尝起来味道完全不同。"}]},{"pos":"pron.","m":"同样的事","ex":[{"l":1,"en":"It was really wonderful to chat with each other and enjoy food at the same time.","zh":"一边彼此聊天，一边享用美食，真是太棒了。"},{"l":2,"en":"I ordered a hamburger, and my brother ordered the same, so we paid the same price.","zh":"我点了一个汉堡，弟弟点了同样的，所以我们付了同样的价钱。"},{"l":3,"en":"Wherever the famous singer goes, she always receives the same warm welcome from her fans around the world.","zh":"无论这位著名歌手走到哪里，她总是收到世界各地歌迷同样热烈的欢迎。"}]}]},{"day":46,"w":"sandwich","ph":"","defs":[{"pos":"n.","m":"三明治","ex":[{"l":1,"en":"I usually have a sandwich and milk for breakfast.","zh":"我早餐通常吃一个三明治，喝点牛奶。"},{"l":2,"en":"Before leaving for school, Tom quickly made himself a sandwich because he was very hungry.","zh":"上学前，汤姆因为很饿，飞快地给自己做了一个三明治。"},{"l":3,"en":"The sandwich I bought at the school canteen yesterday was so delicious that I want to try it again tomorrow.","zh":"我昨天在学校食堂买的那份三明治太好吃了，我想明天再尝一次。"}]}]},{"day":46,"w":"satisfied","ph":"","defs":[{"pos":"adj.","m":"满足的；满意的","ex":[{"l":1,"en":"I am satisfied with my test results.","zh":"我对我的考试结果感到满意。"},{"l":2,"en":"The teacher was satisfied with what the students had done for the school show.","zh":"老师对学生们为学校演出所做的事感到满意。"},{"l":3,"en":"Deeply satisfied with the service of the hotel, the foreign guests decided to stay there again during their next trip.","zh":"由于对酒店的服务深感满意，这些外国客人决定下次旅行时再住那里。"}]}]},{"day":46,"w":"satisfying","ph":"","defs":[{"pos":"adj.","m":"令人满意的；令人满足的","ex":[{"l":1,"en":"It is satisfying to help others in need.","zh":"帮助有需要的人是令人满足的。"},{"l":2,"en":"After months of hard work, finishing the project was a very satisfying experience for the whole team.","zh":"经过几个月的努力，完成这个项目对整个团队来说是一次非常令人满意的经历。"},{"l":3,"en":"It is such a satisfying feeling to see the plants you have cared for begin to flower in the warm spring.","zh":"看到自己照料的植物在温暖的春天里开始开花，真是令人满足的感觉。"}]}]},{"day":46,"w":"Saturday","ph":"","defs":[{"pos":"n.","m":"星期六","ex":[{"l":1,"en":"We will have a school trip this Saturday.","zh":"我们这周六有一次学校旅行。"},{"l":2,"en":"If it does not rain this Saturday, we will go to the park and have a picnic together.","zh":"如果这周六不下雨，我们就去公园一起野餐。"},{"l":3,"en":"Last Saturday, my family drove to the countryside, where we enjoyed the fresh air and beautiful flowers all afternoon.","zh":"上周六，我们一家开车去了乡下，在那里我们整个下午都享受着清新的空气和美丽的花朵。"}]}]},{"day":46,"w":"sauce","ph":"","defs":[{"pos":"n.","m":"酱汁，调味汁","ex":[{"l":1,"en":"Please pass me the tomato sauce.","zh":"请把番茄酱递给我。"},{"l":2,"en":"My mother mixed some special sauce with the noodles to make them taste better.","zh":"我妈妈在面条里拌了一些特制的酱汁，让它们更好吃。"},{"l":3,"en":"The secret sauce that the restaurant uses has been passed down in the family for more than fifty years.","zh":"这家餐厅使用的秘制酱汁已在家族中传承了五十多年。"}]}]},{"day":46,"w":"save","ph":"","defs":[{"pos":"v.","m":"救，挽救；节省","ex":[{"l":1,"en":"I'm proud of him because he has saved people's lives.","zh":"我为他感到自豪，因为他拯救了人们的生命。"},{"l":2,"en":"He also told us his story of saving people from a burning building.","zh":"他还给我们讲了他从一栋燃烧的大楼里救人的故事。"},{"l":3,"en":"Not only did the brave firefighter save the old man from the fire, but he also refused any reward for his courage.","zh":"这位勇敢的消防员不仅从火中救出了那位老人，而且拒绝了对他勇气的任何酬谢。"}]}]},{"day":46,"w":"say","ph":"","defs":[{"pos":"v.","m":"说；讲","ex":[{"l":1,"en":"She said that they wanted them to think of ideas to express their own interests and hopes.","zh":"她说，他们希望他们想出办法来表达自己的兴趣和希望。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我的最后一点是，虽然有人说拥有东西是一种巨大的快乐，但我认为使用你拥有的东西更令人愉快。"},{"l":3,"en":"As a famous saying goes, actions speak louder than words, which means what we do matters more than what we say.","zh":"正如一句名言所说，行动胜于言辞，意思是我们的所做所为比我们所说的更重要。"}]}]},{"day":46,"w":"saying","ph":"","defs":[{"pos":"n.","m":"谚语，俗语；格言","ex":[{"l":1,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我的最后一点是，虽然有人说拥有东西是一种巨大的快乐，但我认为使用你拥有的东西更令人愉快。"},{"l":2,"en":"There is an old saying that a friend in need is a friend indeed.","zh":"有一句古老的谚语说，患难见真情。"},{"l":3,"en":"The old saying, where there is a will, there is a way, has encouraged generations of young people to keep trying in hard times.","zh":"有志者事竟成这句古老的格言，激励了一代又一代年轻人在困难时期不断尝试。"}]}]},{"day":46,"w":"schedule","ph":"","defs":[{"pos":"n.","m":"时间表；节目表；工作计划","ex":[{"l":1,"en":"Here is the train schedule for today.","zh":"这是今天的火车时刻表。"},{"l":2,"en":"Please check the schedule before you decide when to leave so that you will not miss the early bus.","zh":"请在你决定何时出发前查看一下时间表，这样你就不会错过早班车。"},{"l":3,"en":"It is the busy schedule that leaves him little time to relax, which is why he often feels tired after work.","zh":"正是繁忙的日程让他几乎没有时间放松，这也是他下班后常常感到疲惫的原因。"}]},{"pos":"v.","m":"安排；预定；为……安排时间","ex":[{"l":1,"en":"We will schedule the meeting for Friday.","zh":"我们将把会议安排在周五。"},{"l":2,"en":"The manager has scheduled the interview for next Monday, and all the applicants are expected to arrive on time.","zh":"经理已经把面试安排在下周一，所有申请人都被要求准时到达。"},{"l":3,"en":"Having scheduled all the activities in advance, we found it much easier to complete the project ahead of time than we had expected.","zh":"由于提前安排好了所有活动，我们发现提前完成项目比我们预想的要容易得多。"}]}]},{"day":46,"w":"school","ph":"","defs":[{"pos":"n.","m":"学校","ex":[{"l":1,"en":"I really think the school will develop with success.","zh":"我真地认为这所学校会成功地发展下去。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段：起初，这所学校被要求关闭，校舍也将不得不被出售，因为学校位于一个非常优越的地段。"},{"l":3,"en":"Not only does our school offer various courses, but it also encourages students to take part in activities that help them grow into better people.","zh":"我们学校不仅提供各种课程，而且鼓励学生参加有助于他们成长为更优秀之人的活动。"}]}]},{"day":46,"w":"science","ph":"","defs":[{"pos":"n.","m":"科学；自然科学","ex":[{"l":1,"en":"It also helps to take courses in maths and computer science.","zh":"学习数学和计算机科学课程也有帮助。"},{"l":2,"en":"Although science may seem difficult at first, it becomes more interesting once you understand how things work around us.","zh":"虽然科学起初看起来很难，但一旦你明白了我们周围的事物是如何运作的，它就会变得更加有趣。"},{"l":3,"en":"Only by studying science carefully can we discover the truth behind those natural wonders and use the knowledge to change the world.","zh":"只有认真研究科学，我们才能发现那些自然奇观背后的真相，并运用所学知识改变世界。"}]}]},{"day":46,"w":"scientist","ph":"","defs":[{"pos":"n.","m":"科学家","ex":[{"l":1,"en":"The scientist works hard every day.","zh":"这位科学家每天都努力工作。"},{"l":2,"en":"The scientist who discovered the new medicine said that it would help save many lives in the future.","zh":"发现这种新药的科学家说，它将来会帮助挽救许多生命。"},{"l":3,"en":"Such is the devotion of the scientist that he often forgets to eat while doing experiments in the laboratory.","zh":"这位科学家如此投入，以至于在实验室做实验时经常忘记吃饭。"}]}]},{"day":46,"w":"score","ph":"","defs":[{"pos":"n.","m":"得分；分数","ex":[{"l":1,"en":"He got a high score in the test.","zh":"他在考试中得了高分。"},{"l":2,"en":"When the teacher told her the score, she was so excited that she could hardly say a word.","zh":"当老师把分数告诉她时，她激动得几乎说不出话来。"},{"l":3,"en":"What surprised us most was that the boy with the lowest score at the beginning finally became the top student in our class.","zh":"最令我们惊讶的是，起初分数最低的那个男孩最终成了我们班的尖子生。"}]}]},{"day":46,"w":"screen","ph":"","defs":[{"pos":"n.","m":"屏幕；荧光屏","ex":[{"l":1,"en":"Sitting in front of the screen for too long is unhealthy.","zh":"在屏幕前坐太久是不健康的。"},{"l":2,"en":"If you keep staring at the screen without resting your eyes, you may feel tired and find it hard to see clearly.","zh":"如果你一直盯着屏幕不让眼睛休息，你可能会感到疲劳，并发现很难看清东西。"},{"l":3,"en":"It is the bright screen in the dark room that does the most harm to your eyes, so you had better turn on a small light while reading online.","zh":"正是黑暗房间里明亮的屏幕对你的眼睛伤害最大，所以你在上网阅读时最好开一盏小灯。"}]}]},{"day":46,"w":"sea","ph":"","defs":[{"pos":"n.","m":"海，海洋","ex":[{"l":1,"en":"We can see the blue sea from here.","zh":"我们从这儿能看到蓝色的大海。"},{"l":2,"en":"When we arrived at the seaside, the children ran toward the sea and began to play happily in the water.","zh":"当我们到达海边时，孩子们朝大海跑去，开始在水里开心地玩耍。"},{"l":3,"en":"Never before have I seen such a beautiful sea, whose calm surface shone like glass under the morning sun.","zh":"我以前从未见过如此美丽的大海，它平静的海面在朝阳下像玻璃一样闪闪发光。"}]}]},{"day":46,"w":"seafood","ph":"","defs":[{"pos":"n.","m":"海鲜","ex":[{"l":1,"en":"I like eating fresh seafood.","zh":"我喜欢吃新鲜的海鲜。"},{"l":2,"en":"My mother told me that the seafood sold in this market was the freshest in the whole city.","zh":"我妈妈告诉我，这个市场出售的海鲜是全城最新鲜的。"},{"l":3,"en":"Having tasted the local seafood, the visitors agreed that the trip to the small town was well worth the long journey.","zh":"品尝过当地的海鲜后，游客们一致认为这趟小镇之行对漫长的旅途来说是值得的。"}]}]},{"day":46,"w":"search","ph":"","defs":[{"pos":"v.&n.","m":"搜寻；搜查","ex":[{"l":1,"en":"We will search for the lost keys.","zh":"我们将搜寻丢失的钥匙。"},{"l":2,"en":"The police continued to search the building until they were sure that no one was left inside.","zh":"警察继续搜查那栋大楼，直到他们确定里面没有人留下为止。"},{"l":3,"en":"After a long search in the dark forest, the rescue team finally found the missing child hiding under a tall tree.","zh":"在黑暗的森林里搜寻了很长时间后，救援队终于找到了那个失踪的孩子，他正躲在一棵高大的树下。"}]}]},{"day":46,"w":"seaside","ph":"","defs":[{"pos":"n.","m":"海滨","ex":[{"l":1,"en":"We spent a nice day at the seaside.","zh":"我们在海滨度过了愉快的一天。"},{"l":2,"en":"Every summer, many families travel to the seaside where children can build castles on the soft sand.","zh":"每年夏天，许多家庭去海滨旅行，在那里孩子们可以在柔软的沙滩上堆城堡。"},{"l":3,"en":"It was at the quiet seaside that I first realized how peaceful life could be when we slowed down and enjoyed nature.","zh":"正是在那宁静的海滨，我第一次意识到当我们放慢脚步享受自然时，生活可以多么宁静。"}]}]},{"day":46,"w":"season","ph":"","defs":[{"pos":"n.","m":"季；季节","ex":[{"l":1,"en":"Autumn is a busy season for farmers.","zh":"秋天是农民忙碌的季节。"},{"l":2,"en":"Spring is the season when everything comes back to life, and people often go out to enjoy the warm sunshine.","zh":"春天是万物复苏的季节，人们常常外出享受温暖的阳光。"},{"l":3,"en":"Of all the seasons I have experienced, winter remains my favourite, for it always reminds me of the snowy days in my childhood.","zh":"在我经历过的所有季节中，冬天仍然是我最喜欢的，因为它总是让我想起童年的下雪天。"}]}]},{"day":46,"w":"seat","ph":"","defs":[{"pos":"n.","m":"座位","ex":[{"l":1,"en":"Please take a seat near the window.","zh":"请坐在靠窗的座位上。"},{"l":2,"en":"When I entered the hall, I found that the best seat had already been taken by an old man.","zh":"当我走进大厅时，我发现最好的座位已经被一位老人占了。"},{"l":3,"en":"Only when the show began did we realize how lucky we were to have such good seats in the front row of the theatre.","zh":"直到演出开始，我们才意识到能在剧院前排拥有这么好的座位是多么幸运。"}]}]},{"day":46,"w":"second","ph":"","defs":[{"pos":"n.","m":"第二个；秒","ex":[{"l":1,"en":"Please wait here for a second.","zh":"请在这里等一秒钟。"},{"l":2,"en":"Although the bus was late, it arrived in the end and saved us the trouble of waiting for another second.","zh":"虽然公交车晚点了，但它最终还是到了，省去了我们再等一秒的麻烦。"},{"l":3,"en":"It takes only a second to make a decision, but it may take years to understand whether that decision was truly wise.","zh":"做出一个决定只需一秒钟，但要明白那个决定是否真正明智，可能需要数年时间。"}]},{"pos":"adj.","m":"第二位的","ex":[{"l":1,"en":"He won the second prize in the race.","zh":"他在比赛中获得了二等奖。"},{"l":2,"en":"This is the second time that she has visited the museum, and she still finds something new to learn each time.","zh":"这是她第二次参观这家博物馆，她每次仍然能发现新的东西可以学习。"},{"l":3,"en":"What made the teacher proud was that the second student to answer the question gave a clearer explanation than anyone else.","zh":"让老师感到骄傲的是，第二个回答问题的学生给出了比其他任何人都更清晰的解释。"}]},{"pos":"adv.","m":"第二位；其次","ex":[{"l":1,"en":"He came second in the running race.","zh":"他在跑步比赛中获得第二名。"},{"l":2,"en":"Of all the players, he finished second, which made his parents feel very proud of his hard work.","zh":"在所有选手中，他第二个完成比赛，这让父母对他的努力感到非常骄傲。"},{"l":3,"en":"Not until the final result was announced did we learn that he had come second, only one point behind the champion.","zh":"直到宣布最终结果时，我们才知道他获得了第二名，仅比冠军落后一分。"}]}]},{"day":46,"w":"secondary","ph":"","defs":[{"pos":"adj.","m":"中等的；第二的","ex":[{"l":1,"en":"He is a secondary school student.","zh":"他是一名中学生。"},{"l":2,"en":"After finishing primary school, most children move on to secondary school, where they will study more subjects.","zh":"小学毕业后，大多数孩子升入中学，在那里他们将学习更多科目。"},{"l":3,"en":"It is during the secondary school years that students begin to think more seriously about what they want to do in the future.","zh":"正是在中学阶段，学生们开始更认真地思考自己将来想做什么。"}]}]},{"day":47,"w":"secret","ph":"","defs":[{"pos":"n.","m":"秘密","ex":[{"l":1,"en":"Please keep this secret for me.","zh":"请为我保守这个秘密。"},{"l":2,"en":"She promised that she would keep the secret until her friend was ready to tell others the truth.","zh":"她答应会保守这个秘密，直到她的朋友准备好告诉别人真相为止。"},{"l":3,"en":"Such was the secret between the two brothers that no one in the family ever discovered it for more than twenty years.","zh":"这就是两兄弟之间的秘密，家里二十多年来竟然没有人发现过。"}]}]},{"day":47,"w":"secretary","ph":"","defs":[{"pos":"n.","m":"秘书","ex":[{"l":1,"en":"Olivia asked her secretary if the exhibition would be held in Shanghai.","zh":"奥利维娅问她的秘书展览是否会在上海举行。"},{"l":2,"en":"The secretary who works in our office is so kind that she always helps everyone with their problems patiently.","zh":"在我们办公室工作的那位秘书非常和善，总是耐心地帮助每个人解决问题。"},{"l":3,"en":"Only after talking to the secretary did the manager realize how much work she had done to prepare for the important meeting.","zh":"直到和秘书交谈后，经理才意识到她为准备这次重要会议做了多少工作。"}]}]},{"day":47,"w":"section","ph":"","defs":[{"pos":"n.","m":"部分；部门；栏目","ex":[{"l":1,"en":"Read the first section of the book.","zh":"阅读这本书的第一部分。"},{"l":2,"en":"The teacher told us that the last section of the article was the most important, so we should read it carefully.","zh":"老师告诉我们，这篇文章的最后一部分最重要，所以我们应该仔细阅读。"},{"l":3,"en":"What impressed the readers most was the middle section of the novel, where the author described the hero's deep love for his country.","zh":"给读者印象最深的是小说的中间部分，作者在那里描写了主人公对祖国深沉的爱。"}]}]},{"day":47,"w":"see","ph":"","defs":[{"pos":"v.","m":"看见，看到；领会，理解；拜访，会见","ex":[{"l":1,"en":"See you tomorrow.","zh":"明天见。"},{"l":2,"en":"But parents and teachers worked together to protect the school and now they are pleased to see the result.","zh":"但是家长和老师们齐心协力保护这所学校，如今他们对看到的结果感到满意。"},{"l":3,"en":"Not until we stepped into the forest did we see how much damage the storm had done to the ancient trees.","zh":"直到我们走进森林，我们才看到暴风雨对那些古树造成了多大的破坏。"}]}]},{"day":47,"w":"seed","ph":"","defs":[{"pos":"n.","m":"种子","ex":[{"l":1,"en":"I planted a seed in the pot.","zh":"我在花盆里种下了一粒种子。"},{"l":2,"en":"The farmer told us that a tiny seed could grow into a tall tree if we took good care of it.","zh":"农民告诉我们，如果我们用心照料，一粒小小的种子也能长成一棵大树。"},{"l":3,"en":"Every great dream begins like a seed, small and weak, yet it holds the power to change a whole life when nourished with patience.","zh":"每一个伟大的梦想都像一粒种子那样开始，渺小而脆弱，然而只要用耐心去滋养，它便拥有改变一生的力量。"}]}]},{"day":47,"w":"seem","ph":"","defs":[{"pos":"v.","m":"似乎，好像","ex":[{"l":1,"en":"And every day seems much better and brighter.","zh":"而每一天似乎都变得更加美好、更加明亮。"},{"l":2,"en":"It seems that he has changed a lot since he entered the senior high school last September.","zh":"自从去年九月进入高中以来，他似乎改变了许多。"},{"l":3,"en":"What seemed impossible at first gradually turned into a real chance for the young scientist to prove her idea.","zh":"起初看似不可能的事，渐渐变成了这位年轻科学家证明自己想法的真实机会。"}]}]},{"day":47,"w":"seldom","ph":"","defs":[{"pos":"adv.","m":"很少，不常","ex":[{"l":1,"en":"I seldom eat fast food.","zh":"我很少吃快餐。"},{"l":2,"en":"She seldom goes shopping because she thinks it is a waste of time and money.","zh":"她很少去购物，因为她认为那既浪费时间又浪费金钱。"},{"l":3,"en":"Seldom do we realize how much our parents have done for us until we leave home and face the world alone.","zh":"我们很少意识到父母为我们付出了多少，直到我们离家独自面对这个世界。"}]}]},{"day":47,"w":"select","ph":"","defs":[{"pos":"v.","m":"选择；挑选，选拔","ex":[{"l":1,"en":"Please select a book you like.","zh":"请挑选一本你喜欢的书。"},{"l":2,"en":"The teacher asked us to select the best picture from those we had drawn in the art class.","zh":"老师让我们从美术课上画的画里挑选出最好的一幅。"},{"l":3,"en":"Carefully selected from hundreds of students, the team members felt both proud and deeply responsible for the coming match.","zh":"从数百名学生中精心选拔出来，队员们对即将到来的比赛既感到自豪，又深感责任重大。"}]}]},{"day":47,"w":"sell","ph":"","defs":[{"pos":"v.","m":"卖；售","ex":[{"l":1,"en":"How long has Lee helped the local people sell their products?","zh":"Lee帮助当地人销售他们的产品有多久了？"},{"l":2,"en":"The shop sells all kinds of school things, and many students like to buy their notebooks there.","zh":"这家店出售各种学习用品，许多学生喜欢在那里买笔记本。"},{"l":3,"en":"The handmade shoes, sold at a fair price in the small town, soon became popular with customers who valued quality over fashion.","zh":"以公道价格在小镇出售的手工鞋，很快受到那些看重品质胜过时髦的顾客的欢迎。"}]}]},{"day":47,"w":"send","ph":"","defs":[{"pos":"v.","m":"打发；派遣；送；邮寄","ex":[{"l":1,"en":"This messenger sends to the roots the information to produce more nicotine.","zh":"这个信使向根部发送信息，以产生更多的尼古丁。"},{"l":2,"en":"I will send you an email as soon as I arrive in Beijing so that you need not worry about me.","zh":"我一到北京就会给你发邮件，这样你就不必为我担心了。"},{"l":3,"en":"Having sent the invitation to every classmate, she sat by the window, waiting anxiously for their replies.","zh":"把邀请发给每一位同学之后，她坐在窗边，焦急地等待着他们的回复。"}]}]},{"day":47,"w":"senior","ph":"","defs":[{"pos":"adj.","m":"年长的；高年级的；高级的","ex":[{"l":1,"en":"He is a senior student in our school.","zh":"他是我们学校的高年级学生。"},{"l":2,"en":"My senior brother often helps me with my lessons when I meet difficulties in study.","zh":"当我学习上遇到困难时，学长经常帮助我复习功课。"},{"l":3,"en":"Senior students are expected to set a good example, showing the younger ones how to face challenges with courage.","zh":"人们期望高年级学生树立良好的榜样，向低年级同学展示如何勇敢地面对挑战。"}]}]},{"day":47,"w":"sense","ph":"","defs":[{"pos":"n.","m":"感觉；意识；感官","ex":[{"l":1,"en":"I have a strong sense of duty.","zh":"我有强烈的责任感。"},{"l":2,"en":"Although she could not see, she had a sharp sense of hearing that helped her a lot.","zh":"虽然她看不见，但她敏锐的听觉帮了她很大的忙。"},{"l":3,"en":"Reading widely not only broadens our mind but also sharpens our sense of language, which is vital for future learning.","zh":"广泛阅读不仅能开阔我们的思维，还能敏锐我们的语感，这对今后的学习至关重要。"}]}]},{"day":47,"w":"sentence","ph":"","defs":[{"pos":"n.","m":"句子","ex":[{"l":1,"en":"This is a long sentence.","zh":"这是一个长句子。"},{"l":2,"en":"The teacher asked us to read the first sentence aloud and then translate it into Chinese.","zh":"老师让我们大声读第一句话，然后把它翻译成中文。"},{"l":3,"en":"To master a foreign language, one must understand not only single words but also how each sentence is built step by step.","zh":"要掌握一门外语，一个人不仅要理解单个单词，还要明白每一个句子是如何一步步构成的。"}]}]},{"day":47,"w":"September","ph":"","defs":[{"pos":"n.","m":"九月","ex":[{"l":1,"en":"School begins in September.","zh":"学校在九月开学。"},{"l":2,"en":"When September comes, the leaves begin to turn yellow and fall from the trees.","zh":"当九月到来时，树叶开始变黄并从树上落下。"},{"l":3,"en":"It was in early September that we first met, a season which has ever since reminded me of friendship and fresh beginnings.","zh":"正是在九月初我们初次相遇，从那以后，这个季节总让我想起友谊与崭新的开始。"}]}]},{"day":47,"w":"serious","ph":"","defs":[{"pos":"adj.","m":"严肃的；严重的；认真的","ex":[{"l":1,"en":"So next time before you pay for something, give it some serious thought.","zh":"所以下次在你为某物付款之前，认真考虑一下。"},{"l":2,"en":"The doctor told him that his illness was serious and that he must stay in hospital for a week.","zh":"医生告诉他他的病情严重，必须住院一周。"},{"l":3,"en":"Faced with such a serious problem, the whole class worked together and finally found a workable way to solve it.","zh":"面对如此严重的问题，全班同学齐心协力，最终找到了一个可行的解决办法。"}]}]},{"day":47,"w":"seriously","ph":"","defs":[{"pos":"adv.","m":"严肃地；严重地；认真地","ex":[{"l":1,"en":"Please listen seriously in class.","zh":"上课请认真听讲。"},{"l":2,"en":"If you want to learn English well, you must take every chance to practise it seriously.","zh":"如果你想学好英语，你必须认真利用每一次机会去练习。"},{"l":3,"en":"Taking his teacher's advice seriously, the boy made a detailed plan and stuck to it until he caught up with his classmates.","zh":"这个男孩认真听从老师的建议，制定了详细的计划并坚持执行，直到赶上同学们。"}]}]},{"day":47,"w":"serve","ph":"","defs":[{"pos":"v.","m":"招待（顾客等）；为...服务","ex":[{"l":1,"en":"We should serve the people.","zh":"我们应该为人民服务。"},{"l":2,"en":"This small restaurant serves the best noodles in town, and the price is quite reasonable.","zh":"这家小餐馆供应镇上最好吃的面条，而且价格相当公道。"},{"l":3,"en":"Determined to serve the village where he was born, the young doctor gave up a comfortable city life and returned home.","zh":"这位年轻的医生决心为自己出生的村庄服务，放弃了舒适的城市生活回到家乡。"}]}]},{"day":47,"w":"service","ph":"","defs":[{"pos":"n.","m":"服务；公用事业","ex":[{"l":1,"en":"The service here is very good.","zh":"这里的服务非常好。"},{"l":2,"en":"The hotel provides excellent service so that guests can enjoy a comfortable stay.","zh":"这家酒店提供优质的服务，让客人能享受舒适的住宿。"},{"l":3,"en":"What impressed us most was not the product itself but the warm service offered by every staff member in the shop.","zh":"给我们印象最深的不是产品本身，而是店里每位员工所提供的热情服务。"}]}]},{"day":47,"w":"set","ph":"","defs":[{"pos":"v.","m":"释放，安置；树立（榜样）；创造（记录）","ex":[{"l":1,"en":"For example, people should remember to turn off electric items like TV sets and air conditioners when they are not used.","zh":"例如，人们应该记得在不使用时关掉电视机和空调等电器。"},{"l":2,"en":"Our teacher has set a good example for us by working hard every day.","zh":"我们的老师每天努力学习，为我们树立了良好的榜样。"},{"l":3,"en":"Only by setting clear goals and working steadily towards them can a student turn his dreams into reality in the years ahead.","zh":"只有树立明确的目标并朝着目标稳步努力，学生才能在未来的岁月里把梦想变为现实。"}]}]},{"day":47,"w":"settle","ph":"","defs":[{"pos":"v.","m":"安家，定居；解决","ex":[{"l":1,"en":"They settled in the city.","zh":"他们在那座城市定居了。"},{"l":2,"en":"After the long journey, the family finally settled down in a small town near the sea.","zh":"经过漫长的旅程后，这家人最终在海边的一个小镇安顿了下来。"},{"l":3,"en":"It took them several years to settle the problem, but the experience they gained was far more valuable than the result itself.","zh":"他们花了几年时间才解决这个问题，但他们获得的经验远比结果本身更有价值。"}]}]},{"day":47,"w":"several","ph":"","defs":[{"pos":"adj.","m":"几个，数个","ex":[{"l":1,"en":"I was in the hospital for several weeks.","zh":"我在医院住了好几个星期。"},{"l":2,"en":"I have read this book several times, and each time I find something new and interesting.","zh":"这本书我已经读了好几遍，每次都能发现新的有趣之处。"},{"l":3,"en":"Several reasons have been given for the change, but the most important one is that students need more time for outdoor activities.","zh":"对这一变化给出了几个原因，但最重要的一点是学生需要更多时间进行户外活动。"}]}]},{"day":47,"w":"shake","ph":"","defs":[{"pos":"v.","m":"握（手）；摇（头）；使震动","ex":[{"l":1,"en":"Please shake the bottle well.","zh":"请把瓶子摇匀。"},{"l":2,"en":"When the teacher asked him the question, he shook his head because he did not know the answer.","zh":"当老师问他这个问题时，他摇了摇头，因为他不知道答案。"},{"l":3,"en":"Hearing the exciting news, the children shook with joy, unable to say a single word for a long while.","zh":"听到这个激动人心的消息，孩子们高兴得浑身颤抖，好一会儿说不出一句话来。"}]}]},{"day":47,"w":"shall","ph":"","defs":[{"pos":"v.","m":"将要；会；...好吗？","ex":[{"l":1,"en":"Shall we go now?","zh":"我们现在走吗？"},{"l":2,"en":"Shall we go to the park this Sunday if the weather is fine and we have enough free time?","zh":"如果这个星期天天气好，我们又有足够的空闲时间，我们去公园好吗？"},{"l":3,"en":"Shall we, as senior students, take the lead in protecting the environment so that younger children may follow our example?","zh":"作为高年级学生，我们是否应该带头保护环境，让年幼的孩子们以我们为榜样呢？"}]}]},{"day":47,"w":"shame","ph":"","defs":[{"pos":"n.","m":"遗憾的事；羞愧","ex":[{"l":1,"en":"It is a shame that you missed the party.","zh":"你错过了聚会真遗憾。"},{"l":2,"en":"It is really a shame that he failed the exam after studying so hard.","zh":"他这么用功却没通过考试，真是一件憾事。"},{"l":3,"en":"What a shame it is that such a talented student has given up the chance to study abroad!","zh":"这么有天赋的学生竟然放弃了出国学习的机会，真令人惋惜！"}]}]},{"day":47,"w":"shape","ph":"","defs":[{"pos":"n.","m":"形状；外形，样子","ex":[{"l":1,"en":"The cake is in the shape of a star.","zh":"这块蛋糕是星形的。"},{"l":2,"en":"The little girl cut the paper into the shape of a heart and gave it to her mother.","zh":"小女孩把纸剪成心形，并把它送给了妈妈。"},{"l":3,"en":"Seen from the top of the hill, the lake takes the shape of a flying bird, which surprises every visitor.","zh":"从山顶望去，那片湖呈现出飞鸟的形状，这让每位游客都感到惊喜。"}]}]},{"day":47,"w":"share","ph":"","defs":[{"pos":"v.","m":"分享；共同使用","ex":[{"l":1,"en":"Sharing a new experience develops stronger relationships and creates long-lasting memories.","zh":"分享新的经历能建立更牢固的关系，并创造持久的回忆。"},{"l":2,"en":"Susan, the head teacher, invited students to share their ideas about how to rebuild the school.","zh":"校长苏珊邀请学生们分享关于如何重建学校的想法。"},{"l":3,"en":"Only when we are willing to share what we have can we build true friendship and win respect from others.","zh":"只有当我们乐于分享自己所拥有的东西时，我们才能建立真正的友谊并赢得他人的尊重。"}]}]},{"day":47,"w":"sheep","ph":"","defs":[{"pos":"n.","m":"（绵）羊","ex":[{"l":1,"en":"There are some sheep on the hill.","zh":"山上有一些绵羊。"},{"l":2,"en":"The farmer keeps a lot of sheep, and they eat grass happily on the farm.","zh":"这位农民养了很多羊，它们在农场里开心地吃草。"},{"l":3,"en":"It is said that the boy who looks after these sheep every day has become the bravest child in the village.","zh":"据说，那个每天照看这些羊的男孩已经成了村里最勇敢的孩子。"}]}]},{"day":47,"w":"shelf","ph":"","defs":[{"pos":"n.","m":"架子；隔板","ex":[{"l":1,"en":"The books are on the shelf.","zh":"书在架子上。"},{"l":2,"en":"Please put the dictionary back on the shelf after you use it.","zh":"用完词典后，请把它放回架子上。"},{"l":3,"en":"On the top shelf lies an old photo album which records the warmest days of my childhood.","zh":"顶层架子上放着一本旧相册，它记录了我童年最温暖的日子。"}]}]},{"day":47,"w":"shine","ph":"","defs":[{"pos":"v.","m":"发光；照耀；使发光","ex":[{"l":1,"en":"The sun shines brightly in the sky.","zh":"太阳在天空中明亮地照耀。"},{"l":2,"en":"When the sun shines through the window, the room becomes warm and bright.","zh":"当阳光透过窗户照进来时，房间变得温暖而明亮。"},{"l":3,"en":"Not until the dark clouds disappear does the bright moon shine again over the quiet town.","zh":"直到乌云散去，明月才再次照耀这座宁静的小镇。"}]}]},{"day":47,"w":"ship","ph":"","defs":[{"pos":"n.","m":"船，轮船","ex":[{"l":1,"en":"It is making parts of it deeper, so bigger ships can use it.","zh":"它正在把部分河道挖深，以便更大的船只能通行。"},{"l":2,"en":"The big ship carried hundreds of passengers across the sea safely last month.","zh":"上个月那艘大船安全地把数百名乘客送过了大海。"},{"l":3,"en":"The ship that set out last night is expected to arrive at the port before dawn, weather permitting.","zh":"如果天气允许，昨晚出发的那艘船预计将在黎明前抵达港口。"}]}]},{"day":48,"w":"shirt","ph":"","defs":[{"pos":"n.","m":"衬衫","ex":[{"l":1,"en":"He is wearing a white shirt.","zh":"他穿着一件白衬衫。"},{"l":2,"en":"My mother bought me a new shirt because the old one was too small for me.","zh":"妈妈给我买了一件新衬衫，因为旧的对我来说太小了。"},{"l":3,"en":"The shirt he bought yesterday is made of cotton, which feels soft and comfortable in summer.","zh":"他昨天买的那件衬衫是棉质的，夏天穿起来柔软舒适。"}]}]},{"day":48,"w":"shoe","ph":"","defs":[{"pos":"n.","m":"鞋","ex":[{"l":1,"en":"Ask yourself, 'Which will I spend my money on, an outing or a pair of shoes?'","zh":"问问你自己：我会把钱花在出游还是一双鞋上？"},{"l":2,"en":"My new shoes are so comfortable that I can walk for a long time without feeling tired.","zh":"我的新鞋很舒服，我可以走很长时间而不觉得累。"},{"l":3,"en":"Only after you have walked a long way in tight shoes will you understand how important comfort is.","zh":"只有穿着挤脚的鞋走过长路之后，你才会明白舒适有多重要。"}]}]},{"day":48,"w":"shop","ph":"","defs":[{"pos":"n.","m":"店铺","ex":[{"l":1,"en":"There is a shop near my home.","zh":"我家附近有一家店铺。"},{"l":2,"en":"The little shop at the corner sells all kinds of bread and cakes.","zh":"街角的那家小店卖各种面包和蛋糕。"},{"l":3,"en":"The old bookshop which has stood on this street for thirty years will soon be turned into a coffee bar.","zh":"在这条街上矗立了三十年的那家旧书店不久将被改造成一家咖啡吧。"}]},{"pos":"v.","m":"购物","ex":[{"l":1,"en":"I often shop on Sundays.","zh":"我常在星期天购物。"},{"l":2,"en":"She likes to shop online because it saves her a lot of time and money.","zh":"她喜欢网购，因为这能省下很多时间和金钱。"},{"l":3,"en":"With the rapid development of the Internet, more and more people prefer to shop at home rather than go to the mall.","zh":"随着互联网的快速发展，越来越多的人宁愿在家购物，也不愿去商场。"}]}]},{"day":48,"w":"short","ph":"","defs":[{"pos":"adj.","m":"短的；矮的；短缺的","ex":[{"l":1,"en":"He has short hair.","zh":"他头发很短。"},{"l":2,"en":"The T-shirt is too short for him, so he decides to buy a bigger one.","zh":"这件T恤对他来说太短了，所以他决定买件大一点的。"},{"l":3,"en":"Short as the speech was, it left such a deep impression on us that we still remember it today.","zh":"那场演讲虽然简短，却给我们留下了如此深刻的印象，以至于我们今天仍记得它。"}]}]},{"day":48,"w":"should","ph":"","defs":[{"pos":"v.","m":"应该，应当，会","ex":[{"l":1,"en":"You should have studied much harder.","zh":"你本应该更加努力学习的。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"想成为制图员的学生应该尽可能多地学习地理知识。"},{"l":3,"en":"It is high time that we should take action to protect the environment before it is too late.","zh":"该是我们采取行动保护环境的时候了，免得为时已晚。"}]}]},{"day":48,"w":"shout","ph":"","defs":[{"pos":"v.&n.","m":"喊;高声呼喊","ex":[{"l":1,"en":"Do not shout in the library.","zh":"不要在图书馆里大喊。"},{"l":2,"en":"When he saw the famous singer, he gave a shout of joy and ran to her quickly.","zh":"当他看到那位著名歌手时，他高兴地大喊一声，并快速跑向她。"},{"l":3,"en":"Hearing the good news, the children let out a loud shout, their faces glowing with excitement.","zh":"听到这个好消息，孩子们发出一声大声欢呼，脸上洋溢着兴奋。"}]}]},{"day":48,"w":"show","ph":"","defs":[{"pos":"v.","m":"给..看，出示；显示；告知；表明","ex":[{"l":1,"en":"Please show me your ticket.","zh":"请给我看你的票。"},{"l":2,"en":"The teacher asked the student to show his homework to the whole class.","zh":"老师让那位学生向全班展示他的作业。"},{"l":3,"en":"What the report shows is that students who read regularly tend to do better in exams.","zh":"报告所表明的是，经常阅读的学生往往在考试中表现更好。"}]},{"pos":"n.","m":"展示；演出；节目；展览会","ex":[{"l":1,"en":"We watched a great show last night.","zh":"我们昨晚看了一场精彩的演出。"},{"l":2,"en":"The school will hold a talent show next Friday so that students can show their gifts.","zh":"学校下周五将举办一场才艺表演，以便学生们展示自己的天赋。"},{"l":3,"en":"The talk show, which has been popular for many years, attracts millions of viewers every week.","zh":"这档脱口秀已经火爆多年，每周都吸引数以百万计的观众。"}]}]},{"day":48,"w":"shower","ph":"","defs":[{"pos":"n.","m":"阵雨；淋浴","ex":[{"l":1,"en":"I take a shower every morning.","zh":"我每天早上洗淋浴。"},{"l":2,"en":"We were caught in a heavy shower on our way home from school yesterday.","zh":"昨天我们放学回家的路上遇到了一场大雨。"},{"l":3,"en":"After a quick shower, he felt so refreshed that he decided to finish the report that very night.","zh":"冲了个澡后，他感到神清气爽，于是决定当晚就把报告写完。"}]}]},{"day":48,"w":"shut","ph":"","defs":[{"pos":"v.","m":"关上；封闭","ex":[{"l":1,"en":"Please shut the door.","zh":"请关上门。"},{"l":2,"en":"He shut the window because the wind was too strong outside.","zh":"他关上了窗户，因为外面风太大了。"},{"l":3,"en":"Not until the manager shut the door did he realize how serious the problem was.","zh":"直到经理关上门，他才意识到问题有多严重。"}]}]},{"day":48,"w":"shy","ph":"","defs":[{"pos":"adj.","m":"害羞的","ex":[{"l":1,"en":"For some students, they may feel helpless and depressed when they meet troubles in life, especially those who are shy.","zh":"对一些学生来说，他们在生活中遇到困难时可能会感到无助和沮丧，尤其是那些害羞的学生。"},{"l":2,"en":"The shy girl was too nervous to say a word when she stood in front of the class.","zh":"那个害羞的女孩站在全班面前时，紧张得一句话都说不出来。"},{"l":3,"en":"Shy as she is, she never hesitates to express her own opinion in class discussions.","zh":"她虽然害羞，但在课堂讨论中从不犹豫表达自己的观点。"}]}]},{"day":48,"w":"sick","ph":"","defs":[{"pos":"adj.","m":"有病的，患病的；（想）呕吐的，恶心的","ex":[{"l":1,"en":"The sick boy is in bed.","zh":"生病的男孩在床上休息。"},{"l":2,"en":"He felt sick after eating too much ice cream at the birthday party.","zh":"在生日聚会上吃了太多冰淇淋后，他觉得恶心。"},{"l":3,"en":"It was the strong smell that made the sick old man feel even worse during the long bus trip.","zh":"正是那股刺鼻的气味，让那位生病的老人在漫长的巴士旅途中感觉更糟了。"}]}]},{"day":48,"w":"side","ph":"","defs":[{"pos":"n.","m":"边；旁边；面；侧面","ex":[{"l":1,"en":"There is a tree on each side of the road.","zh":"路的两边各有一棵树。"},{"l":2,"en":"When you walk along the river, you can see beautiful flowers on both sides.","zh":"当你沿着河走时，你能看到两边美丽的花。"},{"l":3,"en":"Wherever you go in this city, you will find that each side of the street tells a different story about its history.","zh":"无论你走到这座城市的哪里，你都会发现街道的每一面都讲述着一段关于其历史的不同故事。"}]}]},{"day":48,"w":"sight","ph":"","defs":[{"pos":"n.","m":"风景；视力","ex":[{"l":1,"en":"The sight of the mountains is wonderful.","zh":"山上的风景真美。"},{"l":2,"en":"As we reached the top of the hill, we were deeply moved by the beautiful sight of the lake below.","zh":"当我们到达山顶时，我们被下方湖泊的美丽景色深深打动了。"},{"l":3,"en":"It was at first sight that I fell in love with the small town, whose streets were lined with old houses and red flowers.","zh":"我对这座小镇一见钟情，它的街道两旁排列着古老的房屋和红色的花朵。"}]}]},{"day":48,"w":"sightseeing","ph":"","defs":[{"pos":"n.","m":"游览；观光","ex":[{"l":1,"en":"We went sightseeing in Beijing last summer.","zh":"去年夏天我们去北京观光了。"},{"l":2,"en":"After they finished sightseeing around the old town, the students took many photos to remember the trip.","zh":"学生们在古镇游览完毕后，拍了许多照片来纪念这次旅行。"},{"l":3,"en":"Not only did we enjoy the sightseeing along the river, but we also learned a lot about the local culture from the guide.","zh":"我们不仅享受了沿河的观光，还从导游那里学到了很多关于当地文化的知识。"}]}]},{"day":48,"w":"sign","ph":"","defs":[{"pos":"n.","m":"符号；标记","ex":[{"l":1,"en":"Look at the sign on the wall.","zh":"看墙上的标志。"},{"l":2,"en":"The sign on the door tells us that we should keep quiet while we are in the library.","zh":"门上的标志告诉我们，在图书馆里应该保持安静。"},{"l":3,"en":"Only when you follow the signs carefully can you find your way out of the huge shopping mall without getting lost.","zh":"只有认真遵循这些标志，你才能找到走出巨大购物中心的路而不迷路。"}]},{"pos":"v.","m":"签名，署名","ex":[{"l":1,"en":"Please sign your name here.","zh":"请在这里签上你的名字。"},{"l":2,"en":"Before you sign the paper, you should read every word carefully so that you understand it well.","zh":"在你签字之前，你应该仔细阅读每一个字，以便充分理解它。"},{"l":3,"en":"Having signed the letter, the manager handed it to me and asked me to send it to the head office at once.","zh":"经理在信上签名后，把它交给我并让我立刻把它送到总部。"}]}]},{"day":48,"w":"signal","ph":"","defs":[{"pos":"n.","m":"信号；手势","ex":[{"l":1,"en":"He gave us a signal to stop.","zh":"他给我们一个停止的信号。"},{"l":2,"en":"When the teacher raises her hand, it is a signal that the students should stop talking and listen to her.","zh":"当老师举手时，这是学生们应该停止说话并听她讲的信号。"},{"l":3,"en":"The sudden flash of light was a clear signal that the storm was coming, so we hurried back home as fast as we could.","zh":"突然的闪光是暴风雨即将来临的明显信号，所以我们尽快赶回了家。"}]}]},{"day":48,"w":"silent","ph":"","defs":[{"pos":"adj.","m":"静的；无声的","ex":[{"l":1,"en":"Please keep silent in the library.","zh":"请在图书馆里保持安静。"},{"l":2,"en":"Although the whole class was silent, everyone was thinking hard about the question the teacher had asked.","zh":"虽然全班都很安静，但每个人都在认真思考老师提出的问题。"},{"l":3,"en":"So silent was the forest at midnight that I could even hear my own heart beating fast in the dark.","zh":"午夜的森林如此安静，以至于我甚至能听到自己的心脏在黑暗中快速跳动。"}]}]},{"day":48,"w":"silk","ph":"","defs":[{"pos":"n.","m":"丝，丝绸","ex":[{"l":1,"en":"This scarf is made of silk.","zh":"这条围巾是丝绸做的。"},{"l":2,"en":"The silk that is produced in this city is so famous that many foreigners come to buy it every year.","zh":"这座城市生产的丝绸非常有名，每年都有许多外国人来购买。"},{"l":3,"en":"Known for its soft touch and bright colors, Chinese silk has been loved by people all over the world for hundreds of years.","zh":"中国丝绸以其柔软的触感和鲜艳的色彩而闻名，几百年来一直受到全世界人们的喜爱。"}]}]},{"day":48,"w":"silly","ph":"","defs":[{"pos":"adj.","m":"傻的，愚蠢的","ex":[{"l":1,"en":"It is silly to say that.","zh":"那样说真傻。"},{"l":2,"en":"I think it is silly of you to give up the chance, because you have worked so hard for it.","zh":"我认为你放弃这个机会很傻，因为你为它努力了这么久。"},{"l":3,"en":"No matter how silly the question may sound, you should never be afraid to ask the teacher when you are in doubt.","zh":"无论问题听起来多么愚蠢，当你有疑问时都不应害怕向老师提问。"}]}]},{"day":48,"w":"similar","ph":"","defs":[{"pos":"adj.","m":"相似的，像","ex":[{"l":1,"en":"The degree might be in cartography, geography, or something similar.","zh":"学位可能是关于制图学、地理学或类似学科的。"},{"l":2,"en":"My opinion on this matter is similar to yours, although we still have some small differences in detail.","zh":"我在这件事上的观点与你相似，尽管我们在细节上还有一些小差异。"},{"l":3,"en":"What surprises me most is that the two brothers have very similar habits, from the food they like to the way they speak.","zh":"最让我惊讶的是，这对兄弟有着非常相似的习惯，从他们喜欢的食物到他们说话的方式。"}]}]},{"day":48,"w":"simple","ph":"","defs":[{"pos":"adj.","m":"简单的；简易的","ex":[{"l":1,"en":"This question is very simple.","zh":"这个问题很简单。"},{"l":2,"en":"Even though the rules seem simple, you must follow them carefully if you want to win the game.","zh":"尽管规则看起来很简单，但如果你想赢得比赛，就必须认真遵守它们。"},{"l":3,"en":"Simple as the story may seem, it actually carries a deep lesson that every child should learn from.","zh":"这个故事看似简单，其实蕴含着每个孩子都应该学习的深刻道理。"}]}]},{"day":48,"w":"since","ph":"","defs":[{"pos":"prep.","m":"从...以来；自从","ex":[{"l":1,"en":"What have you been doing since I saw you last time?","zh":"自从上次见到你以来，你一直在做什么？"},{"l":2,"en":"I have read three English books since the new term began two months ago.","zh":"自从两个月前新学期开始以来，我已经读了三本英语书。"},{"l":3,"en":"Great changes have taken place in my hometown since I left for the city ten years ago.","zh":"自从十年前我离开家乡去城市以来，我的家乡发生了巨大的变化。"}]},{"pos":"conj.","m":"从...以来；由于；既然","ex":[{"l":1,"en":"What have you been doing since I saw you last time?","zh":"自从上次见到你以来，你一直在做什么？"},{"l":2,"en":"Since you have already finished your homework, you can go out to play with your friends for a while.","zh":"既然你已经做完了作业，你可以出去和朋友们玩一会儿。"},{"l":3,"en":"Since the weather is getting colder and colder, we had better put on more clothes before we go out.","zh":"由于天气越来越冷，我们出门前最好多穿些衣服。"}]}]},{"day":48,"w":"sing","ph":"","defs":[{"pos":"v.","m":"唱；唱歌","ex":[{"l":1,"en":"She likes to sing songs.","zh":"她喜欢唱歌。"},{"l":2,"en":"The girl who is singing on the stage is one of the best students in our school.","zh":"正在舞台上唱歌的女孩是我们学校最优秀的学生之一。"},{"l":3,"en":"Hearing the children sing so happily in the next room, the old man smiled and began to remember his own childhood.","zh":"听到孩子们在隔壁房间里如此快乐地唱歌，老人微笑着开始回忆起自己的童年。"}]}]},{"day":48,"w":"singer","ph":"","defs":[{"pos":"n.","m":"歌手,歌唱家","ex":[{"l":1,"en":"My favorite singer is Jay Chou.","zh":"我最喜欢的歌手是周杰伦。"},{"l":2,"en":"The famous singer who visited our school yesterday told us that hard work is the key to success.","zh":"昨天来我们学校参观的那位著名歌手告诉我们，努力工作是成功的关键。"},{"l":3,"en":"Not only is she a popular singer, but she is also a kind person who often helps poor children in the mountain areas.","zh":"她不仅是一位受欢迎的歌手，还是一个经常帮助山区贫困儿童的善良之人。"}]}]},{"day":48,"w":"single","ph":"","defs":[{"pos":"adj.","m":"单一的；单个的；单身的","ex":[{"l":1,"en":"There is not a single cloud in the sky.","zh":"天空中一朵云也没有。"},{"l":2,"en":"She is the single most hard-working student that I have ever taught in my twenty years of teaching.","zh":"她是我二十年教学经历中教过的最勤奋的学生。"},{"l":3,"en":"It was a single word from her mother that changed her mind and made her decide to try once more.","zh":"正是她母亲的一句话改变了她的想法，让她决定再试一次。"}]}]},{"day":48,"w":"sir","ph":"","defs":[{"pos":"n.","m":"先生；阁下","ex":[{"l":1,"en":"Can I help you, sir?","zh":"先生，需要帮忙吗？"},{"l":2,"en":"Excuse me, sir, could you please tell me how I can get to the nearest post office?","zh":"打扰一下，先生，您能告诉我怎样才能到最近的邮局吗？"},{"l":3,"en":"Dear sir, I am writing to ask whether it is possible for me to join the summer camp that your school will hold next month.","zh":"尊敬的先生，我写信是想询问我是否有可能参加贵校下个月将举办的夏令营。"}]}]},{"day":48,"w":"sister","ph":"","defs":[{"pos":"n.","m":"姐，妹","ex":[{"l":1,"en":"My sister was born in nineteen thirty-eight.","zh":"我姐姐出生于1938年。"},{"l":2,"en":"My sister has been learning French since she was ten, and now she can talk with foreigners freely.","zh":"我姐姐从十岁起就一直在学法语，现在她能和外国人自由交谈了。"},{"l":3,"en":"It was my elder sister who first taught me how to read, and I will never forget those warm afternoons we spent together.","zh":"是我姐姐最先教我读书的，我永远不会忘记我们一起度过的那些温暖的下午。"}]}]},{"day":48,"w":"sit","ph":"","defs":[{"pos":"v.","m":"坐","ex":[{"l":1,"en":"Sit down.","zh":"坐下。"},{"l":2,"en":"Sitting in front of the screen for too long is unhealthy.","zh":"在屏幕前坐得太久是不健康的。"},{"l":3,"en":"Only after you finish your homework are you allowed to sit at the table and watch your favorite TV program.","zh":"只有完成作业后，你才被允许坐在桌前看你最喜欢的电视节目。"}]}]},{"day":48,"w":"situation","ph":"","defs":[{"pos":"n.","m":"形势；情况；场面","ex":[{"l":1,"en":"Nowadays, many robots have been used to work in dangerous situations.","zh":"如今，许多机器人已被用于在危险的情况下工作。"},{"l":2,"en":"When you are in a difficult situation, you should keep calm and think carefully before you make any decision.","zh":"当你处于困难的情况下时，你应该保持冷静，在做出任何决定之前认真思考。"},{"l":3,"en":"The situation in the small town was so serious that the government had to send a team to help the people who were in danger.","zh":"这座小镇的形势非常严峻，政府不得不派出一支队伍去帮助那些处于危险中的人们。"}]}]},{"day":48,"w":"size","ph":"","defs":[{"pos":"n.","m":"尺寸；大小","ex":[{"l":1,"en":"What size do you need for this shirt?","zh":"这件衬衫你需要什么尺寸？"},{"l":2,"en":"Could you tell me what size of shoes you usually wear so that I can buy a pair for you?","zh":"你能告诉我你平时穿多大码的鞋，好让我给你买一双吗？"},{"l":3,"en":"It is the size of the room that decides how much furniture we can put in, so we must measure it carefully first.","zh":"正是房间的大小决定了我们能放多少家具，所以我们必须先仔细测量它。"}]}]},{"day":49,"w":"skate","ph":"","defs":[{"pos":"v.","m":"溜冰","ex":[{"l":1,"en":"My brother likes to skate on the lake in winter.","zh":"我弟弟冬天喜欢在湖上溜冰。"},{"l":2,"en":"Although she fell down many times when she learned to skate, she never gave up practicing.","zh":"虽然她学溜冰时摔了很多次，但她从未放弃练习。"},{"l":3,"en":"Only by practicing every day can you skate as freely as those professional players on the ice.","zh":"只有每天练习，你才能像那些专业选手一样在冰上自由滑行。"}]}]},{"day":49,"w":"skill","ph":"","defs":[{"pos":"n.","m":"技能；技巧","ex":[{"l":1,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着GPS系统等基于计算机的工具的兴起，制图师需要比过去更强的计算机技能。"},{"l":2,"en":"If you want to master this skill well, you should spend more time practicing it every single day.","zh":"如果你想很好地掌握这项技能，你就应该每天花更多时间来练习它。"},{"l":3,"en":"It was his strong communication skill that helped him win the chance to work in the international company.","zh":"正是他出色的沟通能力帮他赢得了在那家国际公司工作的机会。"}]}]},{"day":49,"w":"skin","ph":"","defs":[{"pos":"n.","m":"皮肤","ex":[{"l":1,"en":"Wash your hands to keep your skin clean.","zh":"洗手，保持皮肤清洁。"},{"l":2,"en":"The doctor told us that we should drink enough water so that our skin can stay soft and healthy.","zh":"医生告诉我们应该喝足够的水，这样我们的皮肤才能保持柔软健康。"},{"l":3,"en":"Not until winter comes do we realize how dry our skin becomes without enough care.","zh":"直到冬天来临，我们才意识到没有足够的护理，我们的皮肤会变得多么干燥。"}]}]},{"day":49,"w":"skirt","ph":"","defs":[{"pos":"n.","m":"女裙","ex":[{"l":1,"en":"She bought a blue skirt yesterday.","zh":"她昨天买了一条蓝色的裙子。"},{"l":2,"en":"The skirt which my mother bought for me last week is made of soft cotton and feels very comfortable.","zh":"我妈妈上周给我买的裙子是柔软的棉布做的，摸起来很舒服。"},{"l":3,"en":"The longer skirt has become popular this year because more students prefer dressing in a simple and decent way.","zh":"今年较长的裙子流行起来了，因为更多学生喜欢穿得简洁得体。"}]}]},{"day":49,"w":"sky","ph":"","defs":[{"pos":"n.","m":"天空","ex":[{"l":1,"en":"The kids were excited to see the toy rocket flying into the sky.","zh":"孩子们兴奋地看着玩具火箭飞向天空。"},{"l":2,"en":"When we looked up at the sky, we found that thousands of stars were shining brightly in the dark.","zh":"当我们抬头望向天空时，我们发现成千上万颗星星在黑暗中闪闪发光。"},{"l":3,"en":"Never had we seen such a beautiful sky, painted with red and gold as the sun slowly went down behind the hills.","zh":"我们从未见过如此美丽的天空，太阳在山后缓缓落下，天空被染成红色和金色。"}]}]},{"day":49,"w":"sleep","ph":"","defs":[{"pos":"v.&n.","m":"睡觉","ex":[{"l":1,"en":"I usually sleep at ten every night.","zh":"我通常每晚十点睡觉。"},{"l":2,"en":"The teacher said that students who sleep at least eight hours a day can study better in class.","zh":"老师说每天至少睡八小时的学生在课堂上能学得更好。"},{"l":3,"en":"So important is enough sleep for teenagers that lacking it may cause both health and memory problems.","zh":"充足的睡眠对青少年如此重要，缺乏它可能引发健康和记忆两方面的问题。"}]}]},{"day":49,"w":"slow","ph":"","defs":[{"pos":"adj.","m":"慢慢地，缓慢地","ex":[{"l":1,"en":"My watch is fast and your watch Is slow.","zh":"我的表快，而你的表慢。"},{"l":2,"en":"Even though the Internet in the village is rather slow, the students still try hard to search for useful information.","zh":"尽管村里的网络相当慢，学生们仍努力搜索有用的信息。"},{"l":3,"en":"It is generally believed that a slow learner can also achieve great success as long as he keeps making progress.","zh":"人们普遍认为，学得慢的人只要不断进步，也能取得巨大成功。"}]}]},{"day":49,"w":"slowly","ph":"","defs":[{"pos":"adv.","m":"慢慢地，缓慢地","ex":[{"l":1,"en":"Please speak slowly so I can understand you.","zh":"请慢慢说，这样我能听懂你。"},{"l":2,"en":"When the old man crossed the road slowly, a kind boy went up to help him without hesitation.","zh":"当那位老人慢慢过马路时，一个善良的男孩毫不犹豫地上前帮助他。"},{"l":3,"en":"The more slowly you read the article, the more details you will remember about the main idea.","zh":"你读这篇文章越慢，就能记住越多关于主旨的细节。"}]}]},{"day":49,"w":"small","ph":"","defs":[{"pos":"adj.","m":"小的；少的","ex":[{"l":1,"en":"The cat has a small head and big eyes.","zh":"这只猫头小眼睛大。"},{"l":2,"en":"Although the room is quite small, we have made it look bright and tidy by putting things in order.","zh":"虽然房间相当小，但我们通过整理物品使它看起来明亮整洁。"},{"l":3,"en":"Even a small mistake in the exam may cost you several points, so you had better check your answers carefully.","zh":"考试中哪怕一个小错误也可能让你丢掉几分，所以你最好仔细检查答案。"}]}]},{"day":49,"w":"smart","ph":"","defs":[{"pos":"adj.","m":"灵巧的；聪明的；智能的","ex":[{"l":1,"en":"Thanks to the invention of the smart phone, it's convenient to take photos anytime.","zh":"多亏了智能手机的发明，随时拍照都很方便。"},{"l":2,"en":"My sister is so smart that she can work out the difficult math problem in only a few minutes.","zh":"我妹妹很聪明，几分钟就能算出那道数学难题。"},{"l":3,"en":"Smart as the robot looks, it still cannot completely take the place of humans in real life.","zh":"虽然这机器人看起来很智能，但在现实生活中它仍无法完全取代人类。"}]}]},{"day":49,"w":"smell","ph":"","defs":[{"pos":"v.","m":"嗅；闻到","ex":[{"l":1,"en":"I can smell something delicious from the kitchen.","zh":"我能闻到厨房里传来的香味。"},{"l":2,"en":"When I walked into the room, I could smell that someone had just cooked a big meal for us.","zh":"当我走进房间时，我能闻到有人刚刚为我们做了一顿丰盛的饭菜。"},{"l":3,"en":"Never have I smelled such wonderful coffee, which reminded me of the warm mornings in my hometown.","zh":"我从未闻过如此美妙的咖啡香，它让我想起了家乡温暖的早晨。"}]},{"pos":"n.","m":"气味","ex":[{"l":1,"en":"The flowers have a sweet smell.","zh":"这些花有甜香味。"},{"l":2,"en":"The strange smell coming from the fridge shows that we must have left some food there for too long.","zh":"冰箱里传来的奇怪气味说明我们一定把某些食物放在那里太久了。"},{"l":3,"en":"It is the fresh smell of the forest after rain that makes so many hikers love walking there in summer.","zh":"正是雨后森林清新的气味让许多徒步者夏天喜欢在那里散步。"}]}]},{"day":49,"w":"smile","ph":"","defs":[{"pos":"v.&n.","m":"微笑","ex":[{"l":1,"en":"She gave me a warm smile at the gate.","zh":"她在门口给了我一个温暖的微笑。"},{"l":2,"en":"Whenever I feel upset, my best friend will smile at me and tell me that everything will be fine.","zh":"每当我感到难过时，我最好的朋友总会对我微笑，并告诉我一切都会好的。"},{"l":3,"en":"Such a bright smile did she wear that everyone in the room felt happy at once.","zh":"她带着如此灿烂的微笑，房间里每个人立刻都开心起来。"}]}]},{"day":49,"w":"smoke","ph":"","defs":[{"pos":"n.","m":"烟","ex":[{"l":1,"en":"Black smoke rose from the burning house.","zh":"黑烟从燃烧的房子里升起。"},{"l":2,"en":"When we saw thick smoke coming out of the window, we called the firemen for help at once.","zh":"当我们看到窗户里冒出浓烟时，我们立刻打电话向消防员求助。"},{"l":3,"en":"The smoke filled the room so quickly that it was almost impossible for anyone to see the way out clearly.","zh":"烟雾很快充满了房间，几乎没人能看清出路。"}]},{"pos":"v.","m":"冒烟；吸烟","ex":[{"l":1,"en":"Please do not smoke in the library.","zh":"请不要在图书馆里吸烟。"},{"l":2,"en":"The doctor warned him that if he continued to smoke so heavily, his health would become worse and worse.","zh":"医生警告他，如果继续这样大量吸烟，他的健康会越来越差。"},{"l":3,"en":"Only after he was seriously ill did he realize how foolish it was to smoke so much every day.","zh":"直到他得了重病，他才意识到每天抽这么多烟是多么愚蠢。"}]}]},{"day":49,"w":"snack","ph":"","defs":[{"pos":"n.","m":"小吃","ex":[{"l":1,"en":"I enjoyed the time we shared snacks with each other during the break time.","zh":"我很享受课间我们互相分享零食的时光。"},{"l":2,"en":"Before we started on our road trip, we packed up the car with snacks, water, and music.","zh":"在开始公路旅行之前，我们把零食、水和音乐装满了车。"},{"l":3,"en":"So popular are healthy snacks among students that many schools have begun to sell fruit instead of fried food.","zh":"健康零食在学生中如此受欢迎，许多学校已开始用水果代替油炸食品。"}]}]},{"day":49,"w":"snow","ph":"","defs":[{"pos":"n.","m":"雪","ex":[{"l":1,"en":"The children played happily in the snow.","zh":"孩子们在雪里快乐地玩耍。"},{"l":2,"en":"After a heavy snow covered the whole village, the children ran outside to make a big snowman together.","zh":"一场大雪覆盖了整个村庄后，孩子们跑到外面一起堆了一个大雪人。"},{"l":3,"en":"It is the first snow of this winter that turns the whole city into a quiet white world.","zh":"正是今冬的第一场雪把整座城市变成了安静洁白的世界。"}]},{"pos":"v.","m":"下雪","ex":[{"l":1,"en":"It often snows in winter here.","zh":"这里的冬天经常下雪。"},{"l":2,"en":"When it snowed heavily last night, the roads became so dangerous that few people dared to drive out.","zh":"昨晚下大雪时，道路变得非常危险，几乎没人敢开车出门。"},{"l":3,"en":"Hardly had it stopped snowing when the children rushed into the yard to start their snowball fight.","zh":"雪刚停，孩子们就冲进院子开始打雪仗。"}]}]},{"day":49,"w":"snowy","ph":"","defs":[{"pos":"adj.","m":"下雪的，多雪的","ex":[{"l":1,"en":"We had a snowy day last week.","zh":"上周我们这里下了一场雪。"},{"l":2,"en":"On that cold and snowy morning, many kind people helped clear the snow on the roads for the old.","zh":"在那个寒冷的下雪的早晨，许多好心人帮老人清除路上的雪。"},{"l":3,"en":"What a snowy winter it is, for it has already snowed more than ten times since December began.","zh":"这真是一个多雪的冬天，因为从十二月开始已经下了十多次雪了。"}]}]},{"day":49,"w":"so","ph":"","defs":
