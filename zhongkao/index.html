上搜索了一番之后，我了解到那些负责绘制世界各地道路、山脉、海洋和其他地点的人被称为制图师。"},{"l":2,"en":"For example, I spend most of my spare money on new parts for my old mountain bike, but I love the experience of cycling, not owning bike parts!","zh":"例如，我把大部分零花钱花在为我的旧山地车买新零件上，但我热爱的是骑行的体验，而不是拥有自行车零件！"},{"l":3,"en":"It was at the foot of the mountain that we finally realized how small human beings were compared with the vast natural world around us.","zh":"正是在山脚下，我们终于意识到与周围浩瀚的自然世界相比，人类是多么渺小。"}]}]},{"day":34,"w":"mouse","ph":"","defs":[{"pos":"n.","m":"老鼠；鼠标","ex":[{"l":1,"en":"A small mouse ran across the floor.","zh":"一只小老鼠跑过了地板。"},{"l":2,"en":"When I moved the mouse, the arrow on the screen moved at the same time, which surprised me a lot.","zh":"当我移动鼠标时，屏幕上的箭头也同时移动，这让我非常惊讶。"},{"l":3,"en":"Quiet as a mouse, the little girl slipped into the kitchen in the hope of finding some cookies hidden in the cupboard.","zh":"小女孩像老鼠一样悄无声息地溜进厨房，希望能找到藏在橱柜里的饼干。"}]}]},{"day":34,"w":"mouth","ph":"","defs":[{"pos":"n.","m":"嘴，口","ex":[{"l":1,"en":"Open your mouth and say ah.","zh":"张开嘴，说啊。"},{"l":2,"en":"The doctor asked the boy to open his mouth wide so that he could check whether his throat was red and inflamed.","zh":"医生让男孩张大嘴巴，以便他能检查喉咙是否又红又发炎。"},{"l":3,"en":"Never speak with your mouth full of food; it is considered impolite and may leave a poor impression on others.","zh":"嘴里满是食物时绝不要说话；这被视为不礼貌，可能会给别人留下不好的印象。"}]}]},{"day":34,"w":"move","ph":"","defs":[{"pos":"v.","m":"移动，搬动；搬家；感动","ex":[{"l":1,"en":"The canal will also help to move water.","zh":"这条运河也将有助于输送水。"},{"l":2,"en":"The old man was so moved by the girl's kindness that he decided to help her family in return.","zh":"老人被女孩的善良深深感动，于是决定帮助她的家人作为回报。"},{"l":3,"en":"Having moved to a new city, the family found it difficult to get used to the unfamiliar environment and the fast pace of life there.","zh":"搬到一座新城市之后，这家人发现很难适应陌生的环境和那里快节奏的生活。"}]}]},{"day":34,"w":"movie","ph":"","defs":[{"pos":"n.","m":"电影","ex":[{"l":1,"en":"We watched a funny movie last night.","zh":"我们昨晚看了一部搞笑的电影。"},{"l":2,"en":"The movie that we watched yesterday was so exciting that I wanted to see it again the next day.","zh":"我们昨天看的那部电影太精彩了，以至于第二天我还想再看一遍。"},{"l":3,"en":"Only by watching the movie to the end did I realize that the seemingly ordinary old man was in fact the hero of the whole story.","zh":"直到把电影看完，我才意识到那位看似普通的老人其实是整个故事的英雄。"}]}]},{"day":34,"w":"Mr.","ph":"","defs":[{"pos":"n.","m":"先生","ex":[{"l":1,"en":"Mr. Smith is our English teacher.","zh":"史密斯先生是我们的英语老师。"},{"l":2,"en":"Mr. Brown, who has taught in our school for over twenty years, is loved by all his students because of his patience.","zh":"布朗先生在我们学校任教二十多年，因为耐心而深受所有学生喜爱。"},{"l":3,"en":"Mr. Lee is such an experienced teacher that whenever we meet a difficult problem, we turn to him for help without hesitation.","zh":"李先生是一位如此经验丰富的老师，以至于每当我们遇到难题，都会毫不犹豫地向他求助。"}]}]},{"day":34,"w":"Mrs.","ph":"","defs":[{"pos":"n.","m":"夫人，太太","ex":[{"l":1,"en":"Mrs. Green lives next door to us.","zh":"格林夫人住在我们隔壁。"},{"l":2,"en":"Mrs. White was cooking in the kitchen when she heard someone knocking at the door loudly.","zh":"怀特夫人正在厨房做饭，这时她听到有人大声敲门。"},{"l":3,"en":"Mrs. Black is not only a kind neighbour but also a wise woman from whom we have learned a great deal about life.","zh":"布莱克夫人不仅是一位和善的邻居，还是一位睿智的女性，我们从她那里学到了许多关于人生的道理。"}]}]},{"day":35,"w":"much","ph":"","defs":[{"pos":"adj.","m":"许多的，大量的","ex":[{"l":1,"en":"You should have studied much harder.","zh":"你本应该学习更努力些。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应该尽可能多地学习地理知识。"},{"l":3,"en":"So much knowledge has been discovered in recent years that it is almost impossible for any single person to master it all.","zh":"近年来被发现的知识如此之多，以至于任何一个人几乎都不可能全部掌握。"}]},{"pos":"adv.","m":"非常；更加","ex":[{"l":1,"en":"You should have studied much harder.","zh":"你本应该学习更加努力。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应该尽可能多地学习地理知识。"},{"l":3,"en":"Having practiced much harder than before, the young athlete finally broke the school record at the sports meeting last week.","zh":"经过比从前更加刻苦的训练，这位年轻的运动员上周终于在运动会上打破了学校纪录。"}]},{"pos":"n.","m":"许多；大量","ex":[{"l":1,"en":"You should have studied much harder.","zh":"你本应该学习更加努力。"},{"l":2,"en":"Students who are interested in becoming cartographers should learn as much as they can about geography.","zh":"对成为制图师感兴趣的学生应该尽可能多地学习地理知识。"},{"l":3,"en":"Much of what we read in our childhood has been forgotten, yet some stories still remain clearly in our minds today.","zh":"我们童年所读的大部分内容已被遗忘，然而有些故事至今仍清晰地留在我们脑海中。"}]}]},{"day":35,"w":"mum","ph":"","defs":[{"pos":"n.","m":"（口语）妈妈","ex":[{"l":1,"en":"Mum is making dinner in the kitchen.","zh":"妈妈正在厨房做晚饭。"},{"l":2,"en":"Mum told me to put on more clothes before I went out because it was very cold outside.","zh":"妈妈让我出门前多穿点衣服，因为外面很冷。"},{"l":3,"en":"It was Mum who always encouraged me to keep trying whenever I felt like giving up during those difficult months.","zh":"在那些艰难的月份里，每当我想要放弃时，总是妈妈鼓励我继续尝试。"}]}]},{"day":35,"w":"museum","ph":"","defs":[{"pos":"n.","m":"博物馆","ex":[{"l":1,"en":"We visited the science museum yesterday.","zh":"我们昨天参观了科学博物馆。"},{"l":2,"en":"The museum that we are going to visit tomorrow was built more than one hundred years ago.","zh":"我们明天要参观的博物馆建于一百多年前。"},{"l":3,"en":"Located in the centre of the city, the museum attracts thousands of visitors every year who come to admire its rich collection.","zh":"这座博物馆坐落在市中心，每年吸引成千上万来欣赏其丰富藏品的游客。"}]}]},{"day":35,"w":"mushroom","ph":"","defs":[{"pos":"n.","m":"蘑菇","ex":[{"l":1,"en":"I like eating mushrooms in soup.","zh":"我喜欢在汤里吃蘑菇。"},{"l":2,"en":"My grandmother told me that we should never pick wild mushrooms unless we are sure they are safe to eat.","zh":"奶奶告诉我，除非确定安全可食用，否则绝不要采摘野蘑菇。"},{"l":3,"en":"Walking through the wet forest after the rain, we were surprised to find so many mushrooms growing along the path.","zh":"雨后走过潮湿的森林，我们惊讶地发现小路两旁长着这么多蘑菇。"}]}]},{"day":35,"w":"music","ph":"","defs":[{"pos":"n.","m":"音乐；乐曲","ex":[{"l":1,"en":"John began to play the piano and beautiful music filled the room.","zh":"约翰开始弹钢琴，美妙的乐曲充满了房间。"},{"l":2,"en":"According to the family doctor,Louise will live to at least130.Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生所说，露易丝至少能活到一百三十岁。她的愿望是工作几十年，然后把时间花在音乐和绘画上。"},{"l":3,"en":"Lost in beautiful music, the old man forgot all his worries and sat quietly by the window until the sun went down.","zh":"沉浸在美妙的音乐中，老人忘却了所有烦恼，静静地坐在窗边直到太阳落山。"}]}]},{"day":35,"w":"must","ph":"","defs":[{"pos":"v.","m":"必须；需要；应当；必定是；一定","ex":[{"l":1,"en":"It must be about three thirty.","zh":"现在一定大约是三点半。"},{"l":2,"en":"You must finish your project before Friday, or the teacher will not accept it.","zh":"你必须周五之前完成项目，否则老师不会接收。"},{"l":3,"en":"He must have missed the early bus, otherwise he would have arrived at the meeting on time this morning.","zh":"他一定是错过了早班车，否则今早他就会准时到会了。"}]}]},{"day":35,"w":"name","ph":"","defs":[{"pos":"n.","m":"名字；姓名；名称","ex":[{"l":1,"en":"What's your name?","zh":"你叫什么名字？"},{"l":2,"en":"Could you please tell me what your full name is so that I can fill in this form?","zh":"请问你能告诉我你的全名吗，这样我才能填写这张表格？"},{"l":3,"en":"The name of the novel that won the prize last year has been on the lips of almost every reader across the country.","zh":"去年获奖的那部小说的名字几乎挂在全国每位读者的嘴边。"}]},{"pos":"v.","m":"命名；名叫","ex":[{"l":1,"en":"They named their baby Lily.","zh":"他们给宝宝取名叫莉莉。"},{"l":2,"en":"The scientist who discovered the new plant decided to name it after his hometown.","zh":"发现这种新植物的科学家决定以他的家乡为它命名。"},{"l":3,"en":"Named after a famous poet, the small library has become a popular place where children love to spend their weekends.","zh":"这座以一位著名诗人命名的小图书馆，已成为孩子们喜欢度过周末的热门去处。"}]}]},{"day":35,"w":"narrow","ph":"","defs":[{"pos":"adj.","m":"狭窄的","ex":[{"l":1,"en":"The road is too narrow for two cars.","zh":"这条路太窄，容不下两辆车。"},{"l":2,"en":"The path was so narrow that we had to walk in a single line through the forest.","zh":"小路太窄，我们只好排成单行走过的森林。"},{"l":3,"en":"Narrow as the bridge is, it has safely carried villagers across the river for more than half a century.","zh":"尽管这座桥很窄，半个多世纪以来它一直安全地把村民送过河。"}]}]},{"day":35,"w":"nation","ph":"","defs":[{"pos":"n.","m":"民族；国家","ex":[{"l":1,"en":"China is a great nation with a long history.","zh":"中国是一个有着悠久历史的伟大国家。"},{"l":2,"en":"As a nation, we should work together to protect the environment that supports us all.","zh":"作为一个国家，我们应该携手保护支撑我们所有人的环境。"},{"l":3,"en":"It is this shared culture that makes a nation strong even when it faces unexpected difficulties.","zh":"正是这种共同的文化，让一个国家即使面对意料之外的困难也能保持强大。"}]}]},{"day":35,"w":"national","ph":"","defs":[{"pos":"adj.","m":"全国性的；国家的；民族的","ex":[{"l":1,"en":"The national park is open every day.","zh":"这个国家公园每天都开放。"},{"l":2,"en":"The national flag is raised every morning while all the students stand quietly in the playground.","zh":"每天早晨升国旗时，所有学生都静静地站在操场上。"},{"l":3,"en":"Not until I joined the national competition did I realize how much effort other students had put in.","zh":"直到参加全国比赛，我才意识到其他同学付出了多少努力。"}]}]},{"day":35,"w":"nationality","ph":"","defs":[{"pos":"n.","m":"国籍","ex":[{"l":1,"en":"What is your nationality?","zh":"你的国籍是什么？"},{"l":2,"en":"Please tell me what your nationality is so that I can fill in the form correctly.","zh":"请告诉我你的国籍是什么，这样我才能正确填写表格。"},{"l":3,"en":"When you fill in the form, the officer will ask you whether your nationality has ever changed in the past.","zh":"填表时，工作人员会询问你过去国籍是否曾经变更过。"}]}]},{"day":35,"w":"native","ph":"","defs":[{"pos":"adj.","m":"本地的；本国的；当地的","ex":[{"l":1,"en":"Mandarin is my native language.","zh":"普通话是我的母语。"},{"l":2,"en":"Although he has lived abroad for years, he still speaks his native language fluently and clearly.","zh":"虽然他在国外住了多年，但他仍然能流利清晰地讲母语。"},{"l":3,"en":"It is said that native plants grow better because they are already used to the local climate.","zh":"据说本地植物长得更好，因为它们早已适应当地的气候。"}]},{"pos":"n.","m":"本地人；本国人","ex":[{"l":1,"en":"He is a native of Shanghai.","zh":"他是上海本地人。"},{"l":2,"en":"As a native of this small town, she knows every street and every old building very well.","zh":"作为这座小镇的本地人，她对每条街道和每座老建筑都非常熟悉。"},{"l":3,"en":"Only a native of the village could tell us the story that has been passed down for hundreds of years.","zh":"只有这个村子的本地人才能告诉我们那个流传了数百年的故事。"}]}]},{"day":35,"w":"natural","ph":"","defs":[{"pos":"adj.","m":"自然的；天然的","ex":[{"l":1,"en":"Honey is a natural food.","zh":"蜂蜜是一种天然食物。"},{"l":2,"en":"It is natural for children to make mistakes while they are learning something new.","zh":"孩子们在学习新事物时犯错是很自然的。"},{"l":3,"en":"What we need is a natural way of learning that helps students keep their curiosity alive.","zh":"我们需要的是一种自然的学习方式，帮助学生保持好奇心。"}]}]},{"day":35,"w":"nature","ph":"","defs":[{"pos":"n.","m":"自然；本质","ex":[{"l":1,"en":"I love the beauty of nature.","zh":"我热爱自然之美。"},{"l":2,"en":"If we do not protect nature, many wild animals will lose their homes in the near future.","zh":"如果我们不保护自然，许多野生动物在不久的将来将失去家园。"},{"l":3,"en":"It is the nature of children to ask endless questions about the world around them.","zh":"对周围世界提出无尽的问题，正是孩子们的天性。"}]}]},{"day":35,"w":"naughty","ph":"","defs":[{"pos":"adj.","m":"顽皮的","ex":[{"l":1,"en":"The naughty boy broke the window.","zh":"那个顽皮的男孩打破了窗户。"},{"l":2,"en":"The naughty boy was asked to stand outside because he kept talking during the lesson.","zh":"那个顽皮的男孩被要求站到外面，因为他上课时一直说话。"},{"l":3,"en":"Although he was once a naughty child, he has grown into a polite and hard-working student.","zh":"虽然他曾经是个顽皮的孩子，但他已成长为一名礼貌又勤奋的学生。"}]}]},{"day":35,"w":"near","ph":"","defs":[{"pos":"prep.","m":"在..附近","ex":[{"l":1,"en":"The shop is near our school.","zh":"那家商店在我们学校附近。"},{"l":2,"en":"The library near my house is small, but it has a large collection of interesting books.","zh":"我家附近的图书馆虽小，却藏有许多有趣的书。"},{"l":3,"en":"The restaurant near the station, which opened last month, has quickly become popular among young people.","zh":"车站附近的那家餐厅上个月开业，很快就在年轻人中流行起来。"}]},{"pos":"adj.","m":"近的，附近的","ex":[{"l":1,"en":"The post office is quite near.","zh":"邮局相当近。"},{"l":2,"en":"The nearest hospital is not very far, so we can get there in about ten minutes.","zh":"最近的医院不是很远，我们大约十分钟就能到。"},{"l":3,"en":"Even when the goal seems near, we still need to keep working hard until we truly reach it.","zh":"即使目标看似很近，我们仍需努力，直到真正抵达为止。"}]},{"pos":"adv.","m":"附近，临近","ex":[{"l":1,"en":"Come near, please.","zh":"请走近一些。"},{"l":2,"en":"As the exam draws near, more and more students spend their evenings reviewing their lessons.","zh":"随着考试临近，越来越多的学生把晚上时间用来复习功课。"},{"l":3,"en":"When the holiday drew near, the children became so excited that they could hardly fall asleep.","zh":"假期临近时，孩子们兴奋得几乎睡不着觉。"}]}]},{"day":35,"w":"nearby","ph":"","defs":[{"pos":"adj.","m":"附近的","ex":[{"l":1,"en":"We went to a nearby restaurant.","zh":"我们去了一家附近的餐厅。"},{"l":2,"en":"A nearby factory has been closed because it produced too much dirty smoke last year.","zh":"附近一家工厂被关闭了，因为它去年排放了太多污浊的烟。"},{"l":3,"en":"The nearby lake, surrounded by green trees, is a perfect place for families to spend the weekend.","zh":"附近那个被绿树环绕的湖泊，是家庭度周末的理想去处。"}]},{"pos":"adv.","m":"在附近","ex":[{"l":1,"en":"There is a park nearby.","zh":"附近有一个公园。"},{"l":2,"en":"When we lost our way, we asked someone nearby to show us the right direction.","zh":"当我们迷路时，我们请附近的人为我们指明正确的方向。"},{"l":3,"en":"Living nearby means that students can walk to school and save a lot of time every morning.","zh":"住在附近意味着学生可以步行上学，每天早上节省大量时间。"}]}]},{"day":35,"w":"nearly","ph":"","defs":[{"pos":"adv.","m":"将近；几乎；差不多","ex":[{"l":1,"en":"It is nearly six o'clock.","zh":"差不多六点了。"},{"l":2,"en":"After running for nearly an hour, he was so tired that he had to sit down and rest.","zh":"跑了将近一个小时后，他累得不得不坐下休息。"},{"l":3,"en":"It took nearly two months to finish the project, but the result was far better than we expected.","zh":"完成这个项目花了将近两个月，但结果远比我们预期的要好。"}]}]},{"day":35,"w":"necessary","ph":"","defs":[{"pos":"adj.","m":"必需的，必要的","ex":[{"l":1,"en":"Water is necessary for life.","zh":"水是生命所必需的。"},{"l":2,"en":"It is necessary that we wear helmets when we ride bikes to keep ourselves safe.","zh":"我们骑自行车时有必要戴头盔，以保证安全。"},{"l":3,"en":"If it is necessary to change the plan, we must tell everyone who has already been invited.","zh":"如果有必要更改计划，我们必须通知每一位已受邀的人。"}]}]},{"day":35,"w":"need","ph":"","defs":[{"pos":"v.","m":"必须","ex":[{"l":1,"en":"I really need to focus on the report for tomorrow's meeting.","zh":"我真的需要专注于为明天的会议准备那份报告。"},{"l":2,"en":"Try to do regular sports. The mind needs exercise as well as the body.","zh":"尽量经常做运动。大脑和身体一样，都需要锻炼。"},{"l":3,"en":"What students need most is not more homework, but enough time to think and rest after class.","zh":"学生最需要的不是更多作业，而是课后有足够的时间去思考和休息。"}]},{"pos":"v.","m":"需要；必须","ex":[{"l":1,"en":"I really need to focus on the report for tomorrow's meeting.","zh":"我真的需要专注于为明天的会议准备那份报告。"},{"l":2,"en":"Try to do regular sports. The mind needs exercise as well as the body.","zh":"尽量经常做运动。大脑和身体一样，都需要锻炼。"},{"l":3,"en":"Before you decide to buy a new computer, you need to consider whether it is truly useful for your study.","zh":"在决定购买新电脑之前，你需要考虑它是否真的对你的学习有帮助。"}]},{"pos":"n.","m":"需要，需求；必要","ex":[{"l":1,"en":"I really need to focus on the report for tomorrow's meeting.","zh":"我真的需要专注于为明天的会议准备那份报告。"},{"l":2,"en":"Try to do regular sports. The mind needs exercise as well as the body.","zh":"尽量经常做运动。大脑和身体一样，都需要锻炼。"},{"l":3,"en":"There is a growing need for clean water in cities where the population keeps rising year by year.","zh":"在人口逐年增长的城市里，对清洁水的需求正在不断增加。"}]}]},{"day":35,"w":"neighbour","ph":"","defs":[{"pos":"n.","m":"邻居","ex":[{"l":1,"en":"My neighbour is very kind.","zh":"我的邻居非常和善。"},{"l":2,"en":"Our new neighbour brought us some fresh fruit when she moved in last weekend.","zh":"上周末新邻居搬进来时，给我们送了一些新鲜水果。"},{"l":3,"en":"A good neighbour is someone who is always ready to help when you are in trouble.","zh":"好邻居就是当你遇到困难时，总是乐意伸出援手的人。"}]}]},{"day":35,"w":"neighbourhood","ph":"","defs":[{"pos":"n.","m":"邻近街区；街坊","ex":[{"l":1,"en":"I live in a quiet neighbourhood.","zh":"我住在一个安静的街区。"},{"l":2,"en":"In our neighbourhood, people often hold small parties so that children can play together.","zh":"在我们街区，人们经常举办小型聚会，让孩子们可以一起玩耍。"},{"l":3,"en":"The neighbourhood where I grew up has changed so much that I can hardly recognize it now.","zh":"我长大的那个街区变化如此之大，我现在几乎认不出来了。"}]}]},{"day":35,"w":"neither","ph":"","defs":[{"pos":"pron.&adj.","m":"（两者）都不","ex":[{"l":1,"en":"Neither of the two answers is right.","zh":"这两个答案都不对。"},{"l":2,"en":"Neither of my parents likes watching action movies because they think they are too noisy.","zh":"我父母都不喜欢看动作片，因为他们觉得太吵了。"},{"l":3,"en":"Neither the teacher nor the students knew the answer to the question until the bell rang.","zh":"直到铃响，老师和学生们都不知道这个问题的答案。"}]},{"pos":"adv.&conj.","m":"也不","ex":[{"l":1,"en":"I do not like coffee, and neither does she.","zh":"我不喜欢咖啡，她也不喜欢。"},{"l":2,"en":"He has never been to Beijing, and neither have his parents since they moved to Shanghai.","zh":"他从来没去过北京，自从搬到上海后，他父母也没去过。"},{"l":3,"en":"Not only does she speak English fluently, but neither does she find it hard to communicate with foreigners.","zh":"她不仅英语说得流利，而且她也不觉得和外国人交流困难。"}]}]},{"day":35,"w":"nervous","ph":"","defs":[{"pos":"adj.","m":"紧张的","ex":[{"l":1,"en":"I felt very nervous before the exam.","zh":"考试前我感到非常紧张。"},{"l":2,"en":"She was so nervous that she forgot what to say when she stood in front of the whole class.","zh":"她太紧张了，站在全班同学面前时都忘了要说什么。"},{"l":3,"en":"It was the first time that he had given a speech in public, which made him extremely nervous and his hands shook slightly.","zh":"那是他第一次当众演讲，这让他极其紧张，双手微微颤抖。"}]}]},{"day":35,"w":"net","ph":"","defs":[{"pos":"n.","m":"网","ex":[{"l":1,"en":"The fishermen pulled in the net full of fish.","zh":"渔民们拉上了装满鱼的网。"},{"l":2,"en":"The boys played basketball in the net at the corner of the playground after school.","zh":"放学后，男孩们在操场角落那个带网的篮筐里打篮球。"},{"l":3,"en":"The villagers cast their net into the river at dawn, hoping to catch enough fish to sell at the market.","zh":"天亮时村民们把网撒进河里，希望能捕到足够的鱼去市场卖。"}]}]},{"day":35,"w":"network","ph":"","defs":[{"pos":"n.","m":"网络；网络系统","ex":[{"l":1,"en":"We use the school network every day.","zh":"我们每天使用学校的网络。"},{"l":2,"en":"The railway network connects most of the big cities in China, which makes travel much easier.","zh":"铁路网络连接着中国大多数大城市，这让出行方便多了。"},{"l":3,"en":"Thanks to the development of the communication network, people in remote villages can now take online lessons from famous teachers.","zh":"多亏通信网络的发展，偏远村庄的人们现在也能上名师的网课了。"}]}]},{"day":35,"w":"never","ph":"","defs":[{"pos":"adv.","m":"决不；从来没有","ex":[{"l":1,"en":"He never appeared on our school open day or at school parents' meeting.","zh":"他从没在学校开放日或家长会上露过面。"},{"l":2,"en":"The old man has never given up his dream of travelling around the world although he is already over seventy.","zh":"这位老人从未放弃环游世界的梦想，尽管他已经七十多岁了。"},{"l":3,"en":"Never before have I seen such a wonderful performance as the one we watched at the art festival last night.","zh":"我以前从没见过像昨晚艺术节上那么精彩的演出。"}]}]},{"day":35,"w":"new","ph":"","defs":[{"pos":"adj.","m":"新的；新鲜的","ex":[{"l":1,"en":"Sharing a new experience develops stronger relationships and creates long-lasting memories.","zh":"分享一次新体验能增进感情，并留下长久的回忆。"},{"l":2,"en":"For example, I spend most of my spare money on new parts for my old mountain bike, but I love the experience of cycling, not owning bike parts!","zh":"比如，我把大部分零花钱花在给我的旧山地车买新零件上，但我热爱的是骑行的体验，而不是拥有零件！"},{"l":3,"en":"The new library, which opened last month, provides students with a quiet place where they can read and study after school.","zh":"上月开放的新图书馆为学生们提供了一个安静的场所，放学后可以在那里阅读和学习。"}]}]},{"day":35,"w":"news","ph":"","defs":[{"pos":"n.","m":"新闻；消息","ex":[{"l":1,"en":"The news spread widely after it was reported by a local newspaper.","zh":"这则消息被一家当地报纸报道后广为流传。"},{"l":2,"en":"Julia made up her mind to be a doctor after watching the news programme.","zh":"朱莉娅在看了那档新闻节目后下定决心要当医生。"},{"l":3,"en":"The moment I heard the good news that I had won the first prize, I could not help jumping up and cheering.","zh":"一听到我获得一等奖的好消息，我忍不住跳起来欢呼。"}]}]},{"day":35,"w":"newspaper","ph":"","defs":[{"pos":"n.","m":"报纸","ex":[{"l":1,"en":"The news spread widely after it was reported by a local newspaper.","zh":"这则消息被一家当地报纸报道后广为流传。"},{"l":2,"en":"My grandpa reads the morning newspaper while having breakfast, which has been his habit for over twenty years.","zh":"我爷爷边吃早饭边看晨报，这是他二十多年来的习惯。"},{"l":3,"en":"Nowadays fewer young people read newspapers because they prefer getting information through the Internet on their phones.","zh":"如今读报的年轻人越来越少，因为他们更喜欢通过手机上网获取信息。"}]}]},{"day":36,"w":"next","ph":"","defs":[{"pos":"adj.","m":"最近的；紧挨着的；隔壁的；下一次的","ex":[{"l":1,"en":"What month is next month?","zh":"下个月是几月？"},{"l":2,"en":"So next time before you pay for something, give it some serious thought.","zh":"所以下次在付钱买东西之前，要好好想一想。"},{"l":3,"en":"The next train to Beijing will leave in ten minutes, so you had better hurry up if you do not want to miss it.","zh":"下一班去北京的火车十分钟后发车，如果不想错过的话，你最好快点。"}]},{"pos":"adv.","m":"最近地；然后；下一步","ex":[{"l":1,"en":"What month is next month?","zh":"下个月是几月？"},{"l":2,"en":"So next time before you pay for something, give it some serious thought.","zh":"所以下次在付钱买东西之前，要好好想一想。"},{"l":3,"en":"First read the question carefully, and next try to find the key words in the passage that may help you work out the answer.","zh":"先仔细读题，然后试着在文章中找出可能帮你得出答案的关键词。"}]}]},{"day":36,"w":"nice","ph":"","defs":[{"pos":"adj.","m":"令人愉快的；好的；漂亮的","ex":[{"l":1,"en":"It is a nice day for a picnic.","zh":"今天是个野餐的好日子。"},{"l":2,"en":"It is really nice of you to help me with my English when I have so many difficulties.","zh":"你真好，在我遇到这么多困难时帮我学英语。"},{"l":3,"en":"What a nice surprise it was to meet my old friend at the airport when I had thought I was travelling alone!","zh":"我原以为独自旅行，却在机场遇见了老朋友，真是个令人愉快的惊喜！"}]}]},{"day":36,"w":"night","ph":"","defs":[{"pos":"n.","m":"夜；夜间","ex":[{"l":1,"en":"Good night, John.","zh":"晚安，约翰。"},{"l":2,"en":"The baby kept crying all night because he had a high fever and could not fall asleep.","zh":"宝宝整夜哭个不停，因为他发高烧睡不着。"},{"l":3,"en":"It was such a cold night that we had to stay indoors, watching TV and drinking hot tea with our family.","zh":"那是个如此寒冷的夜晚，我们只能待在家里，和家人一起看电视、喝热茶。"}]}]},{"day":36,"w":"nobody","ph":"","defs":[{"pos":"pron.","m":"没有人；谁也不","ex":[{"l":1,"en":"Nobody knows the answer to this question.","zh":"没有人知道这个问题的答案。"},{"l":2,"en":"Nobody in our class could solve the math problem until the teacher explained it to us again.","zh":"直到老师再次给我们讲解，我们班才有人会做这道数学题。"},{"l":3,"en":"When I arrived at the empty room, I found that nobody had come to the meeting, which made me feel rather disappointed.","zh":"当我到达空荡荡的房间时，我发现没人来开会，这让我感到相当失望。"}]}]},{"day":36,"w":"noise","ph":"","defs":[{"pos":"n.","m":"声音；噪音；响声","ex":[{"l":1,"en":"Please do not make noise in the library.","zh":"请不要在图书馆里制造噪音。"},{"l":2,"en":"The noise from the construction site was so loud that the students could not hear the teacher clearly.","zh":"建筑工地的噪音太大了，学生们听不清老师说话。"},{"l":3,"en":"Try to avoid making any noise while the baby is sleeping, or he will wake up and start crying at once.","zh":"宝宝睡觉时尽量不要弄出任何声响，否则他会马上醒来哭闹。"}]}]},{"day":36,"w":"noisy","ph":"","defs":[{"pos":"adj.","m":"嘈杂的，喧闹的","ex":[{"l":1,"en":"The street is very noisy at night.","zh":"这条街晚上很吵。"},{"l":2,"en":"The classroom became so noisy that the teacher had to stop talking and wait for silence.","zh":"教室变得太吵了，老师不得不停下来等大家安静。"},{"l":3,"en":"Living in such a noisy neighbourhood, the old man often finds it hard to fall asleep without turning on some soft music.","zh":"住在这么嘈杂的街区，老人常常发现不打开柔和的音乐就很难入睡。"}]}]},{"day":36,"w":"none","ph":"","defs":[{"pos":"pron.","m":"没有任何东西；没有人","ex":[{"l":1,"en":"None of them came to the party.","zh":"他们中没有人来参加聚会。"},{"l":2,"en":"Although I asked many people for help, none of them could give me a satisfying answer.","zh":"虽然我向很多人求助，但没有一个人能给我一个满意的答复。"},{"l":3,"en":"None of the books on the shelf interested him, so he decided to go to the bookstore to buy something new to read.","zh":"书架上的书没有一本让他感兴趣，于是他决定去书店买些新东西来读。"}]}]},{"day":36,"w":"noodle","ph":"","defs":[{"pos":"n.","m":"面条","ex":[{"l":1,"en":"I would like a bowl of beef noodles.","zh":"我想要一碗牛肉面。"},{"l":2,"en":"My mother often cooks noodles for us on Sunday morning because it is our favourite breakfast.","zh":"我妈妈常在周日早上给我们煮面条，因为那是我们最爱的早餐。"},{"l":3,"en":"The noodles that my grandmother made by hand tasted so delicious that I ate two big bowls without stopping.","zh":"奶奶亲手做的面条太好吃了，我连吃了两大碗停不下来。"}]}]},{"day":36,"w":"nor","ph":"","defs":[{"pos":"conj.","m":"也不","ex":[{"l":1,"en":"He can neither sing nor dance.","zh":"他既不会唱歌，也不会跳舞。"},{"l":2,"en":"Neither Tom nor his brothers were interested in the film, so they left the cinema early.","zh":"汤姆和他的兄弟们对这部电影都不感兴趣，所以他们早早离开了电影院。"},{"l":3,"en":"Not a single word did he say, nor did he show any sign that he had heard what we were talking about.","zh":"他一句话也没说，也没有任何迹象表明他听到了我们在谈什么。"}]}]},{"day":36,"w":"north","ph":"","defs":[{"pos":"adj.","m":"北的；朝北的；北方的","ex":[{"l":1,"en":"The canal will carry millions of liters of water from the south to the north.","zh":"这条运河将把数百万升水从南方输送到北方。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它的修建是为了把中国南方富饶农业区的粮食运到北方的城市。"},{"l":3,"en":"Located in the north of the country, the city is famous for its snow in winter, which attracts thousands of tourists every year.","zh":"这座城市位于该国北方，以冬天的雪景闻名，每年吸引成千上万的游客。"}]},{"pos":"n.","m":"北；北方；北部","ex":[{"l":1,"en":"The canal will carry millions of liters of water from the south to the north.","zh":"这条运河将把数百万升的水从南方输送到北方。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它的修建是为了把粮食从中国南方富饶的农业区运送到北方的城市。"},{"l":3,"en":"Not only does the railway connect the remote north with the busy south, but it also makes it possible for tourists to enjoy the scenery that few people had seen before.","zh":"这条铁路不仅把偏远的北方与繁忙的南方连接起来，还让游客能够欣赏到此前很少有人见过的风景。"}]}]},{"day":36,"w":"nose","ph":"","defs":[{"pos":"n.","m":"鼻子","ex":[{"l":1,"en":"The boy has a small nose.","zh":"这个男孩有一个小鼻子。"},{"l":2,"en":"When the boy caught a bad cold, his nose kept running and he had to breathe through his mouth all day.","zh":"当这个男孩得了重感冒时，他的鼻子不停地流鼻涕，他只好一整天都用嘴呼吸。"},{"l":3,"en":"It was the strong smell of coffee that led her by the nose to the small kitchen, where her mother had prepared breakfast as usual.","zh":"正是咖啡浓浓的香味吸引着她走到了小厨房，妈妈像往常一样已经准备好了早餐。"}]}]},{"day":36,"w":"note","ph":"","defs":[{"pos":"n.","m":"便条；笔记；钞票","ex":[{"l":1,"en":"I left a note on the desk.","zh":"我在桌子上留了一张便条。"},{"l":2,"en":"The students were asked to take notes while the teacher explained how to solve the problem step by step.","zh":"老师一步步讲解如何解题时，要求学生们做笔记。"},{"l":3,"en":"What surprised me most was that the old note, written in a hurry twenty years ago, still reminded me of the promise I had made to my grandfather.","zh":"最令我惊讶的是，二十年前匆忙写下的那张旧便条，依然让我想起对爷爷许下的承诺。"}]}]},{"day":36,"w":"nothing","ph":"","defs":[{"pos":"pron.","m":"没有东西；没有什么","ex":[{"l":1,"en":"There is nothing in the box.","zh":"盒子里什么也没有。"},{"l":2,"en":"Although she searched everywhere in the room, she found nothing that could help her with the project.","zh":"虽然她在房间里到处寻找，但没有找到任何能帮助她完成这个项目的东西。"},{"l":3,"en":"Nothing is more important than health, which is a lesson that many people fail to realize until they fall seriously ill.","zh":"没有什么比健康更重要，这个道理许多人直到生了重病才意识到。"}]}]},{"day":36,"w":"notice","ph":"","defs":[{"pos":"n.","m":"布告；通知；注意 V.注意；注意到","ex":[{"l":1,"en":"There is a notice on the wall.","zh":"墙上有一张通知。"},{"l":2,"en":"Please put up the notice on the board so that everyone in the class can read it before the meeting begins.","zh":"请把通知贴在布告栏上，以便全班同学在会议开始前都能看到。"},{"l":3,"en":"Having noticed that nobody paid attention to the notice, the teacher decided to explain the safety rules again in person.","zh":"老师注意到没有人关注那张通知，于是决定亲自再次讲解安全规则。"}]}]},{"day":36,"w":"novel","ph":"","defs":[{"pos":"n.","m":"小说","ex":[{"l":1,"en":"I am reading an interesting novel.","zh":"我正在读一本有趣的小说。"},{"l":2,"en":"The novel that she borrowed from the library tells a moving story about a brave girl who fought against cancer.","zh":"她从图书馆借来的那本小说，讲述了一个勇敢女孩与癌症抗争的感人故事。"},{"l":3,"en":"It is said that the novel, which has sold millions of copies, was written by a young author who used to work as a nurse.","zh":"据说这本销量达数百万册的小说，是由一位曾经做过护士的年轻作家写的。"}]}]},{"day":36,"w":"November","ph":"","defs":[{"pos":"n.","m":"十一月","ex":[{"l":1,"en":"Today is November first, nineteen sixty-three.","zh":"今天是一九六三年十一月一日。"},{"l":2,"en":"By the time the meeting began in November, the team had already finished most of the work that the manager had asked them to do.","zh":"到十一月会议开始时，团队已经完成了经理要求他们做的大部分工作。"},{"l":3,"en":"Only when November arrived did the farmers realize how much damage the storm had done to the crops that they had worked on for months.","zh":"直到十一月到来，农民们才意识到那场暴风雨对他们辛苦劳作数月的庄稼造成了多大的损害。"}]}]},{"day":36,"w":"now","ph":"","defs":[{"pos":"adv.","m":"现在","ex":[{"l":1,"en":"Now read, please.","zh":"现在请读一读。"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English.","zh":"路易丝现在十三岁，目前在学习中文，中文已成为和英语一样重要的世界语言。"},{"l":3,"en":"Now that we have made enough preparation, there is no reason why we should feel nervous about the speech contest to be held next week.","zh":"既然我们已经做好了充分的准备，就没有理由对下周举行的演讲比赛感到紧张。"}]},{"pos":"conj.","m":"既然","ex":[{"l":1,"en":"Now that you are here, please sit down.","zh":"既然你来了，请坐下吧。"},{"l":2,"en":"Now that everyone has arrived, let us start the discussion that we have been looking forward to for days.","zh":"既然大家都到了，让我们开始这场我们期盼了好几天的讨论吧。"},{"l":3,"en":"Now that you have made up your mind to study abroad, you had better start preparing for the language test as early as possible.","zh":"既然你已下定决心出国留学，最好尽早开始准备语言考试。"}]}]},{"day":36,"w":"nowadays","ph":"","defs":[{"pos":"adv.","m":"当今，现在","ex":[{"l":1,"en":"Nowadays, many robots have been used to work in dangerous situations.","zh":"如今，许多机器人已被用于在危险的环境中工作。"},{"l":2,"en":"Nowadays, more and more students choose to learn a second language, which they believe will help them find better jobs in the future.","zh":"如今，越来越多的学生选择学习第二语言，他们认为这将有助于将来找到更好的工作。"},{"l":3,"en":"Nowadays it is hard to imagine a world without the Internet, which has made it possible for people to share information across the ocean in seconds.","zh":"如今很难想象一个没有互联网的世界，它使得人们可以在几秒钟内跨越海洋分享信息。"}]}]},{"day":36,"w":"nowhere","ph":"","defs":[{"pos":"adv.","m":"任何地方都不","ex":[{"l":1,"en":"The boy is nowhere to be found.","zh":"到处都找不到这个男孩。"},{"l":2,"en":"When she opened the door, she found nowhere to hide because the whole room was filled with old boxes and broken chairs.","zh":"她推开门时，发现无处可藏，因为整个房间堆满了旧箱子和破椅子。"},{"l":3,"en":"Nowhere else in the city can you find such a quiet place, where birds sing and flowers bloom as if time had stopped.","zh":"在这座城市，你再也找不到这样一个安静的地方，那里鸟语花香，仿佛时间已经静止。"}]}]},{"day":36,"w":"number","ph":"","defs":[{"pos":"n.","m":"数；数字；号码；数量","ex":[{"l":1,"en":"His phone number is on the card.","zh":"他的电话号码在卡片上。"},{"l":2,"en":"The number of tourists who visited the museum last year was much larger than the staff had expected before the holiday.","zh":"去年参观这家博物馆的游客数量，比员工在假期前预计的要多得多。"},{"l":3,"en":"What worries the teacher is that a large number of students spend so much time on phones that they hardly have time to read books.","zh":"让老师担心的是，大量学生把这么多时间花在手机上，以至于几乎没有时间读书。"}]}]},{"day":36,"w":"nurse","ph":"","defs":[{"pos":"n.","m":"护士；保育员","ex":[{"l":1,"en":"The nurse is kind to the patients.","zh":"这位护士对病人很和善。"},{"l":2,"en":"The nurse who works in the children's hospital is so patient that every child likes her very much.","zh":"在儿童医院工作的那位护士非常耐心，每个孩子都很喜欢她。"},{"l":3,"en":"Having worked as a nurse for twenty years, she has learned that a warm smile can sometimes be more powerful than medicine.","zh":"做了二十年护士后，她明白了一个温暖的微笑有时比药物更有力量。"}]}]},{"day":36,"w":"obey","ph":"","defs":[{"pos":"v.","m":"服从，顺从；听从","ex":[{"l":1,"en":"We must obey the school rules.","zh":"我们必须遵守学校的规定。"},{"l":2,"en":"Every driver should obey the traffic rules so that accidents can be avoided on busy roads.","zh":"每位司机都应遵守交通规则，这样在繁忙的道路上才能避免事故的发生。"},{"l":3,"en":"Those who refuse to obey the law will sooner or later be punished, no matter how hard they try to hide what they have done.","zh":"无论那些拒绝守法的人多么努力地掩饰自己的所作所为，迟早都会受到惩罚。"}]}]},{"day":36,"w":"observe","ph":"","defs":[{"pos":"v.","m":"观察，观测","ex":[{"l":1,"en":"Let us observe the stars tonight.","zh":"今晚让我们观察星星吧。"},{"l":2,"en":"The scientist spent years observing how the birds build their nests in the forest near the river.","zh":"这位科学家花了很多年观察鸟类如何在河边森林里筑巢。"},{"l":3,"en":"By observing carefully what happens around us, we can discover many interesting facts that cannot be found in textbooks.","zh":"通过仔细观察身边发生的事，我们能发现许多教科书上学不到的有趣事实。"}]}]},{"day":36,"w":"occupation","ph":"","defs":[{"pos":"n.","m":"职业","ex":[{"l":1,"en":"What is your father's occupation?","zh":"你父亲的职业是什么？"},{"l":2,"en":"Teaching is a meaningful occupation because it gives teachers the chance to help children grow into useful people.","zh":"教书是一份有意义的职业，因为它让老师有机会帮助孩子成长为有用的人。"},{"l":3,"en":"It was his dream to take up the occupation of a doctor, a job that requires not only knowledge but also a kind heart.","zh":"从事医生这一职业是他的梦想，这份工作不仅需要知识，还需要一颗善良的心。"}]}]},{"day":36,"w":"ocean","ph":"","defs":[{"pos":"n.","m":"海洋","ex":[{"l":1,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番后，我得知负责绘制世界各地道路、山脉、海洋及其他地方的人被称为制图师。"},{"l":2,"en":"The ocean that lies to the east of our country is home to thousands of kinds of fish and plants that scientists are still studying today.","zh":"位于我国东面的海洋是数千种鱼类和植物的家园，科学家们至今仍在研究它们。"},{"l":3,"en":"Rarely have I seen such a beautiful ocean, the surface of which shines like glass when the sun rises in the early morning.","zh":"我很少见到如此美丽的海洋，清晨太阳升起时，它的水面像玻璃一样闪闪发光。"}]}]},{"day":36,"w":"o'clock","ph":"","defs":[{"pos":"n.","m":"点钟","ex":[{"l":1,"en":"It is six o'clock now.","zh":"现在六点钟了。"},{"l":2,"en":"When the clock struck eight o'clock, the children realized that they had been playing in the garden for three hours.","zh":"当钟敲响八点时，孩子们才意识到他们已经在花园里玩了三个小时。"},{"l":3,"en":"It was already nine o'clock by the time he finished the report, yet he insisted on checking every detail once more before going to bed.","zh":"等他完成报告时已经九点了，但他还是坚持在上床前再检查一遍每一个细节。"}]}]},{"day":36,"w":"October","ph":"","defs":[{"pos":"n.","m":"十月","ex":[{"l":1,"en":"My birthday is in October.","zh":"我的生日在十月。"},{"l":2,"en":"Last October, my family took a trip to the mountains where the leaves had turned red and yellow in the cool autumn wind.","zh":"去年十月，我们一家去山里旅行，那里的树叶在凉爽的秋风中变成了红色和黄色。"},{"l":3,"en":"Only in October does the whole town come alive, when people from across the country gather to celebrate the harvest that they have worked for all year.","zh":"只有在十月，整个小镇才热闹起来，来自全国各地的人们聚在一起，庆祝他们辛劳一年的丰收。"}]}]},{"day":36,"w":"of","ph":"","defs":[{"pos":"prep.","m":"的","ex":[{"l":1,"en":"Where were you during the month of April last year?","zh":"去年四月那个月你在哪里？"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground.","zh":"背包太重了，当我们把它们放到地上时，长长地松了一口气。"},{"l":3,"en":"Of all the books that I have read, this is the one that has influenced me most, for it taught me to face difficulties with courage.","zh":"在我读过的所有书中，这本对我影响最大，因为它教会了我勇敢地面对困难。"}]}]},{"day":36,"w":"off","ph":"","defs":[{"pos":"adv.","m":"离开，走开；断掉（水、电等）；完，光","ex":[{"l":1,"en":"Even if you had given him much more money, he might not have paid off the debt.","zh":"即使你给他更多的钱，他也可能还不清那笔债。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段：起初，这所学校被要求关闭，校舍也将不得不被卖掉，因为学校位于一个非常好的地段。"},{"l":3,"en":"Not until the lights went off did we realize how late it was, and we had to hurry off to catch the last bus home.","zh":"直到灯熄灭，我们才意识到天有多晚了，不得不匆忙离开去赶最后一班回家的公交车。"}]},{"pos":"prep.","m":"脱离，（走）开；从...离开","ex":[{"l":1,"en":"Even if you had given him much more money, he might not have paid off the debt.","zh":"即使你给他更多的钱，他也可能还不清那笔债。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段：起初，这所学校被要求关闭，校舍也将不得不被卖掉，因为学校位于一个非常好的地段。"},{"l":3,"en":"He fell off his bike on the way to school, but he still managed to arrive before the bell rang.","zh":"他在上学的路上从自行车上摔了下来，但他还是赶在铃响之前到了学校。"}]}]},{"day":36,"w":"offer","ph":"","defs":[{"pos":"n.&v.","m":"提供","ex":[{"l":1,"en":"The heart-to-heart room can offer help to these students in time.","zh":"知心室能及时为这些学生提供帮助。"},{"l":2,"en":"The company offered him a well-paid job because it believed that he was the right person for the position.","zh":"公司给他提供了一份薪水丰厚的工作，因为公司相信他是这个职位的合适人选。"},{"l":3,"en":"What I really want to stress is that we should offer a hand to those who are in trouble instead of laughing at them.","zh":"我真正想强调的是，我们应该向身处困境的人伸出援手，而不是嘲笑他们。"}]}]},{"day":37,"w":"office","ph":"","defs":[{"pos":"n.","m":"办公室","ex":[{"l":1,"en":"My father works in a big office.","zh":"我父亲在一家大办公室里工作。"},{"l":2,"en":"When I got to the office this morning, I found that someone had left a message on my desk.","zh":"今天早上我到办公室时，发现有人在我桌上留了张便条。"},{"l":3,"en":"It was in this small office that the young engineer designed the bridge which later became famous all over the country.","zh":"正是在这间小小的办公室里，这位年轻的工程师设计了后来闻名全国的那座桥。"}]}]},{"day":37,"w":"officer","ph":"","defs":[{"pos":"n.","m":"官员；办事员","ex":[{"l":1,"en":"The police officer helped the old man cross the road.","zh":"那位警察帮助老人过马路。"},{"l":2,"en":"The officer asked the boy why he was absent from school yesterday and whether he needed any help.","zh":"那位官员问那个男孩昨天为什么没来上学，以及是否需要帮助。"},{"l":3,"en":"Only when the officer explained the rule clearly did the visitors understand what they were supposed to do next.","zh":"直到那位工作人员把规则解释清楚，参观者才明白他们接下来该做什么。"}]}]},{"day":37,"w":"official","ph":"","defs":[{"pos":"n.","m":"官员","ex":[{"l":1,"en":"A government official visited our school last week.","zh":"上周一位政府官员参观了我们的学校。"},{"l":2,"en":"The official said that the new park would be open to the public as soon as the safety check was finished.","zh":"那位官员说，安全检查一完成，新公园就会向公众开放。"},{"l":3,"en":"The official who is in charge of the project promised that more trees would be planted to make the city greener.","zh":"负责该项目的官员承诺，将种植更多的树木，让城市变得更绿。"}]},{"pos":"adj.","m":"官方的，政府的；官员的","ex":[{"l":1,"en":"This is the official answer to the question.","zh":"这是这个问题的官方答案。"},{"l":2,"en":"Although the official report has not come out yet, many people already know what happened that night.","zh":"虽然官方报告还没出来，但很多人已经知道那天晚上发生了什么。"},{"l":3,"en":"It is reported that the official language of the country will be taught in more schools starting from next year.","zh":"据报道，从明年起，将有更多的学校教授该国的官方语言。"}]}]},{"day":37,"w":"often","ph":"","defs":[{"pos":"adv.","m":"经常，常常","ex":[{"l":1,"en":"I often play basketball after school.","zh":"放学后我经常打篮球。"},{"l":2,"en":"She often reads books before going to bed because she believes that reading helps her sleep better.","zh":"她经常在睡觉前看书，因为她相信读书有助于她更好地入睡。"},{"l":3,"en":"As is often the case with beginners, he made a lot of mistakes at first, but he never gave up.","zh":"正如初学者常有的情况一样，他一开始犯了很多错误，但他从未放弃。"}]}]},{"day":37,"w":"oil","ph":"","defs":[{"pos":"n.","m":"油；石油","ex":[{"l":1,"en":"We use oil to cook food.","zh":"我们用油来烹饪食物。"},{"l":2,"en":"The price of oil has risen so quickly that many drivers have decided to take the bus instead.","zh":"油价上涨得如此之快，以至于许多司机决定改乘公交车。"},{"l":3,"en":"What surprised us most was that the village had built a small factory to turn used oil into clean fuel.","zh":"最让我们惊讶的是，这个村子建了一座小工厂，把废油变成了清洁燃料。"}]}]},{"day":37,"w":"old","ph":"","defs":[{"pos":"adj.","m":"年老的；古老的；旧的","ex":[{"l":1,"en":"John and I are old friends.","zh":"约翰和我是老朋友。"},{"l":2,"en":"This man-made waterway — known in China as Da Yunhe — is 1,700 kilometers long and some parts of it are more than 2,000 years old.","zh":"这条人工运河——在中国被称为大运河——全长1700公里，其中一些部分已有两千多年的历史。"},{"l":3,"en":"Though the old bridge looks weak, it has stood there for centuries and still carries heavy trucks every day.","zh":"虽然这座古老的桥看起来很脆弱，但它已经在那儿矗立了几个世纪，每天仍然承载着重型卡车。"}]}]},{"day":37,"w":"Olympic","ph":"","defs":[{"pos":"adj.","m":"奥林匹克的","ex":[{"l":1,"en":"He won an Olympic gold medal last year.","zh":"他去年赢得了一枚奥运金牌。"},{"l":2,"en":"The Olympic Games, which are held every four years, bring together athletes from all over the world.","zh":"每四年举办一次的奥运会，把来自世界各地的运动员聚集在一起。"},{"l":3,"en":"Not only does the Olympic spirit encourage athletes, but it also inspires ordinary people to keep trying in their daily lives.","zh":"奥运精神不仅激励着运动员，也鼓舞着普通人在日常生活中不断尝试。"}]},{"pos":"n.","m":"奥林匹克（运动会）","ex":[{"l":1,"en":"The Olympic will be held in Paris.","zh":"奥运会将在巴黎举行。"},{"l":2,"en":"It is said that the Olympic will attract millions of tourists who want to watch the games in person.","zh":"据说奥运会将吸引数百万想要亲临现场观看比赛的游客。"},{"l":3,"en":"What makes the Olympic so special is that it gives young players a chance to show their talents on the world stage.","zh":"让奥运会如此特别的是，它给年轻选手一个在世界舞台上展示才华的机会。"}]}]},{"day":37,"w":"on","ph":"","defs":[{"pos":"prep.","m":"在..上；在..时刻；关于","ex":[{"l":1,"en":"Where were you on Tuesday?","zh":"星期二你在哪里？"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，当我们把它们放到地上时大大地松了一口气，而我们叔叔的背包却是半空的。"},{"l":3,"en":"On the morning of the school trip, the students were so excited that few of them could focus on the lessons before setting off.","zh":"在春游那天早上，学生们太兴奋了，出发前几乎没人能专心听课。"}]},{"pos":"adv.","m":"在...上；接通；进行下去","ex":[{"l":1,"en":"Where were you on Tuesday?","zh":"星期二你在哪里？"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，当我们把它们放到地上时大大地松了一口气，而我们叔叔的背包却是半空的。"},{"l":3,"en":"Please read on, and you will find that the story becomes more and more interesting as the hero grows up.","zh":"请继续读下去，你会发现随着主人公长大，故事变得越来越有趣。"}]},{"pos":"adj.","m":"在上映","ex":[{"l":1,"en":"Where were you on Tuesday?","zh":"星期二你在哪里？"},{"l":2,"en":"The backpacks were so heavy that we gave a big sigh of relief when we put them on the ground, while our uncle's backpack was half-empty.","zh":"背包太重了，当我们把它们放到地上时大大地松了一口气，而我们叔叔的背包却是半空的。"},{"l":3,"en":"The new film has been on for a week, and it is said that more and more people are going to the cinema to watch it.","zh":"这部新电影已经上映一周了，据说越来越多的人正走进影院观看它。"}]}]},{"day":37,"w":"once","ph":"","defs":[{"pos":"adv.","m":"一次；一度；从前","ex":[{"l":1,"en":"I have been to Beijing once.","zh":"我去过北京一次。"},{"l":2,"en":"He once lived in a small village, but now he has become one of the most famous writers in the country.","zh":"他曾住在一个小村庄里，但现在他已成为全国最著名的作家之一。"},{"l":3,"en":"Once a shy boy, he has grown into a confident speaker who is not afraid to share his ideas in front of hundreds of people.","zh":"曾经是个害羞男孩的他，已经成长为一名自信的演讲者，不再害怕在数百人面前分享自己的想法。"}]},{"pos":"n.","m":"一次","ex":[{"l":1,"en":"I just need to do it once.","zh":"我只需要做一次。"},{"l":2,"en":"Just this once, the teacher allowed the students to hand in their homework a day late because of the heavy rain.","zh":"就这一次，因为大雨的缘故，老师允许学生们晚一天交作业。"},{"l":3,"en":"It is said that seeing the old photo just once was enough to bring back all the memories of his childhood.","zh":"据说，只要看那张老照片一次，就足以唤起他对童年的全部记忆。"}]},{"pos":"conj.","m":"一旦","ex":[{"l":1,"en":"Once you start, do not stop.","zh":"一旦你开始了，就不要停下来。"},{"l":2,"en":"Once you understand the rule, you will find that this kind of math problem is not difficult at all.","zh":"一旦你理解了这条规则，你会发现这类数学题一点也不难。"},{"l":3,"en":"Once you have made up your mind to learn a foreign language, nothing can stop you from reaching your goal.","zh":"一旦你下定决心学习一门外语，就没有什么能阻止你实现目标。"}]}]},{"day":37,"w":"one","ph":"","defs":[{"pos":"pron.","m":"一","ex":[{"l":1,"en":"This is Lesson One.","zh":"这是第一课。"},{"l":2,"en":"First find out about the school.Read the school introductions and look at the school websites.Then think about yourself—your strong points and weak ones.Try to find a few examples you could give the interviewers.","zh":"首先要了解这所学校。阅读学校介绍并查看学校网站。然后想想你自己——你的优点和缺点。试着找几个可以给面试官的例子。"},{"l":3,"en":"Of all the books on the shelf, this is the one that has influenced me most and changed the way I see the world.","zh":"在书架上所有的书中，这一本对我影响最大，并改变了我看世界的方式。"}]}]},{"day":37,"w":"online","ph":"","defs":[{"pos":"adj.","m":"在线的","ex":[{"l":1,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番之后，我了解到那些负责绘制世界各地道路、山脉、海洋和其他地方地图的人被称为制图师。"},{"l":2,"en":"More and more students prefer to take online courses because they can study at any time and review the lessons as often as they like.","zh":"越来越多的学生更喜欢上在线课程，因为他们可以随时学习，并想复习多少遍就复习多少遍。"},{"l":3,"en":"What parents worry about most is that spending too much time on online games may do harm to children's eyesight and studies.","zh":"家长们最担心的是，花太多时间玩网络游戏可能会损害孩子的视力和学业。"}]},{"pos":"adv.","m":"在线地","ex":[{"l":1,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番后，我了解到那些负责绘制世界各地道路、山脉、海洋及其他地方的人被称为制图师。"},{"l":2,"en":"Whenever I meet a new word, I look it up online so that I can understand how it is used in real sentences.","zh":"每当遇到生词，我都会上网查阅，这样我就能明白它在真实句子中是如何使用的。"},{"l":3,"en":"Only by searching online carefully and comparing different sources can we tell whether the news spreading so quickly is true or not.","zh":"只有仔细上网搜索并对比不同来源，我们才能判断传播得如此之快的新闻是真是假。"}]}]},{"day":37,"w":"only","ph":"","defs":[{"pos":"adv.","m":"只；只是；仅仅","ex":[{"l":1,"en":"I only have five yuan in my pocket.","zh":"我口袋里只有五元钱。"},{"l":2,"en":"Although the question seemed easy, only two students in our class managed to work it out within ten minutes.","zh":"虽然这道题看起来简单，但我们班只有两名学生在十分钟内做出来了。"},{"l":3,"en":"Not only does she study hard every day, but she also spends her free time reading books that broaden her view of the world.","zh":"她不仅每天刻苦学习，还利用空闲时间阅读拓宽世界观的书籍。"}]},{"pos":"adj.","m":"唯一的；仅有的","ex":[{"l":1,"en":"He is the only boy in our team.","zh":"他是我们队里唯一的男孩。"},{"l":2,"en":"The only way to improve your English is to practice speaking it as often as you can every day.","zh":"提高英语的唯一方法就是每天尽可能多地练习说英语。"},{"l":3,"en":"The only reason why he refused the offer was that the job would keep him away from his family for too long.","zh":"他拒绝这份工作的唯一原因是这份工作会让他长时间远离家人。"}]}]},{"day":37,"w":"onto","ph":"","defs":[{"pos":"prep.","m":"到...上面","ex":[{"l":1,"en":"The cat jumped onto the table.","zh":"猫跳到了桌子上。"},{"l":2,"en":"When the bus stopped, the old man stepped onto the street carefully so that he would not fall over.","zh":"公交车停下时，那位老人小心翼翼地走下街道，以免摔倒。"},{"l":3,"en":"Hearing the good news, the children rushed onto the playground, waving their hands and shouting with joy.","zh":"听到这个好消息，孩子们冲向操场，挥着手，高兴地欢呼起来。"}]}]},{"day":37,"w":"open","ph":"","defs":[{"pos":"v.","m":"打开；张开；开办；开设","ex":[{"l":1,"en":"Open your book,please.","zh":"请打开你们的书。"},{"l":2,"en":"He never appeared on our school open day or at school parents' meeting.","zh":"他从不出现在我们学校的开放日或家长会上。"},{"l":3,"en":"It was the kind teacher who first opened the door to the world of reading for me and changed my life completely.","zh":"正是那位和蔼的老师第一次为我打开了阅读世界的大门，彻底改变了我的生活。"}]},{"pos":"adj.","m":"开着的，开口的；敞开的；营业中的","ex":[{"l":1,"en":"Open your book,please.","zh":"请打开你们的书。"},{"l":2,"en":"He never appeared on our school open day or at school parents' meeting.","zh":"他从不出现在我们学校的开放日或家长会上。"},{"l":3,"en":"With an open mind, we can learn from people whose ideas seem quite different from ours and grow wiser.","zh":"怀着开放的心态，我们能向那些想法与我们大不相同的人学习，并变得更加明智。"}]}]},{"day":37,"w":"operate","ph":"","defs":[{"pos":"v.","m":"动手术，开刀；操作；运转","ex":[{"l":1,"en":"Can you operate this machine?","zh":"你能操作这台机器吗？"},{"l":2,"en":"The doctor will operate on the patient as soon as he arrives at the hospital.","zh":"医生一到医院就会给这位病人做手术。"},{"l":3,"en":"Only after reading the instructions carefully did I learn how to operate the new machine safely and correctly.","zh":"只有仔细阅读了说明书之后，我才学会如何安全正确地操作这台新机器。"}]}]},{"day":37,"w":"operation","ph":"","defs":[{"pos":"n.","m":"手术","ex":[{"l":1,"en":"He had an operation last week.","zh":"他上周做了一次手术。"},{"l":2,"en":"After the operation, the doctor told him that he should rest in bed for at least two weeks.","zh":"手术之后，医生告诉他至少应该在床上休息两周。"},{"l":3,"en":"The operation turned out to be so successful that the patient was able to walk again within a month.","zh":"手术结果非常成功，病人在一个月内就能再次行走了。"}]}]},{"day":37,"w":"opinion","ph":"","defs":[{"pos":"n.","m":"观点，看法","ex":[{"l":1,"en":"It is my opinion that spending money on experiences brings greater happiness.","zh":"我认为把钱花在体验上会带来更大的幸福。"},{"l":2,"en":"In my opinion, students should be given more free time so that they can develop their own interests.","zh":"在我看来，应该给学生更多自由时间，这样他们才能发展自己的兴趣。"},{"l":3,"en":"Everyone is welcome to share his or her opinion on the plan, however different it may be from others.","zh":"欢迎每个人就这项计划发表自己的看法，无论它与别人的看法有多大差异。"}]}]},{"day":37,"w":"opposite","ph":"","defs":[{"pos":"adj.","m":"在...对面的;相对的；对立的","ex":[{"l":1,"en":"They live on the opposite side of the street.","zh":"他们住在街道的对面。"},{"l":2,"en":"The two boys hold opposite views on the question, so they often argue with each other.","zh":"这两个男孩在这个问题上持相反的观点，所以他们经常争论。"},{"l":3,"en":"Though they come from opposite backgrounds, they have worked together to finish the project ahead of time.","zh":"尽管他们出身背景截然不同，但他们齐心协力，提前完成了这个项目。"}]},{"pos":"prep.","m":"在...对面","ex":[{"l":1,"en":"She sat opposite me in the classroom.","zh":"在教室里她坐在我对面。"},{"l":2,"en":"The bank is just opposite the post office, which makes it easy for people to find.","zh":"银行就在邮局对面，这让人们很容易找到它。"},{"l":3,"en":"Standing opposite the old tower, I finally understood why so many visitors are deeply moved by its beauty.","zh":"站在古塔对面，我终于明白为什么如此多的游客被它的美深深打动。"}]}]},{"day":37,"w":"or","ph":"","defs":[{"pos":"conj.","m":"或者；还是；否则","ex":[{"l":1,"en":"The degree might be in cartography, geography, or something similar.","zh":"学位可能是制图学、地理学或类似的学科。"},{"l":2,"en":"When an animal is under attack, it can run away or fight back.","zh":"当动物受到攻击时，它可以逃跑或反击。"},{"l":3,"en":"Hurry up, or you will miss the last bus that can take you straight to the railway station.","zh":"快点，否则你会错过能把你直接送到火车站的末班车。"}]}]},{"day":37,"w":"orange","ph":"","defs":[{"pos":"n.","m":"橘子，橙；橙色","ex":[{"l":1,"en":"I would like an orange, please.","zh":"我想要一个橙子，谢谢。"},{"l":2,"en":"My mother bought a kilo of oranges at the market because they were on sale that day.","zh":"妈妈在市场上买了一公斤橙子，因为那天它们在打折。"},{"l":3,"en":"Of all the fruit in the basket, it is the orange that my little sister likes best, for it is sweet and full of juice.","zh":"篮子里所有的水果中，小妹妹最喜欢的正是橙子，因为它又甜又多汁。"}]},{"pos":"adj.","m":"橙色的","ex":[{"l":1,"en":"She is wearing an orange dress.","zh":"她穿着一件橙色的连衣裙。"},{"l":2,"en":"The little girl looks lovely in the orange dress that her aunt bought for her birthday.","zh":"小女孩穿着阿姨为她生日买的橙色连衣裙，看起来很可爱。"},{"l":3,"en":"At sunset, the sky turned orange, which made the whole city look like a beautiful painting.","zh":"日落时天空变成了橙色，这让整座城市看起来像一幅美丽的画。"}]}]},{"day":37,"w":"order","ph":"","defs":[{"pos":"n.","m":"命令，指示；顺序","ex":[{"l":1,"en":"Lily asked her son to close the door softly in order not to disturb others.","zh":"莉莉让儿子轻轻关门，以免打扰别人。"},{"l":2,"en":"Please stand in line and keep your things in good order while waiting for the bus.","zh":"请排队等候公交车，并保持物品井然有序。"},{"l":3,"en":"Only by putting your ideas in order can you write a clear essay that readers will easily understand.","zh":"只有把你的想法理顺，你才能写出一篇读者容易理解的清晰文章。"}]},{"pos":"v.","m":"命令；定购；点（菜、饮料等）","ex":[{"l":1,"en":"Lily asked her son to close the door softly in order not to disturb others.","zh":"莉莉让儿子轻轻关门，以免打扰别人。"},{"l":2,"en":"The teacher ordered the students to stop talking as soon as the bell rang.","zh":"铃一响，老师就命令学生们停止说话。"},{"l":3,"en":"Having ordered the meal online, we sat down to wait, only to find that we had chosen the wrong restaurant.","zh":"在网上点好餐后，我们坐下来等待，结果却发现我们选错了餐厅。"}]}]},{"day":37,"w":"ordinary","ph":"","defs":[{"pos":"adj.","m":"普通的，平常的","ex":[{"l":1,"en":"He is just an ordinary student.","zh":"他只是一个普通的学生。"},{"l":2,"en":"Although she looks like an ordinary girl, she has a strong will that helps her face any difficulty.","zh":"虽然她看起来像个普通女孩，但她有坚强的意志，帮助她面对任何困难。"},{"l":3,"en":"It is hard to believe that such an ordinary man once saved three children from the burning house.","zh":"很难相信这样一位普通人曾从燃烧的房子里救出了三个孩子。"}]}]},{"day":37,"w":"organization","ph":"","defs":[{"pos":"n.","m":"组织；团体；机构","ex":[{"l":1,"en":"She works in a big organization.","zh":"她在一个大型机构工作。"},{"l":2,"en":"The organization was set up to help poor children who cannot afford to go to school.","zh":"这个机构是为了帮助上不起学的贫困儿童而成立的。"},{"l":3,"en":"Thanks to the organization, more and more volunteers have joined in protecting the river that runs through our city.","zh":"多亏了该组织，越来越多的志愿者加入了保护流经我们城市的那条河的行列。"}]}]},{"day":37,"w":"organize","ph":"","defs":[{"pos":"v.","m":"组织","ex":[{"l":1,"en":"We will organize a party.","zh":"我们将组织一场聚会。"},{"l":2,"en":"Our class organized a spring trip so that everyone could relax after the busy exam week.","zh":"我们班组织了一次春游，这样大家在繁忙的考试周后可以放松一下。"},{"l":3,"en":"Organized by several warm-hearted teachers, the charity sale raised enough money to build a new library for the village school.","zh":"在几位热心老师的组织下，这次义卖筹集了足够的钱，为乡村学校建了一座新图书馆。"}]}]},{"day":37,"w":"other","ph":"","defs":[{"pos":"adj.","m":"其他的；另外的","ex":[{"l":1,"en":"I enjoyed the time we shared snacks with each other during the break time.","zh":"我很享受课间我们彼此分享零食的时光。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索了一番后，我了解到那些负责绘制世界各地道路、山脉、海洋及其他地方的人被称为制图师。"},{"l":3,"en":"While some students prefer reading alone, other teenagers enjoy sharing their ideas in group discussions, which often leads to deeper thinking.","zh":"虽然一些学生喜欢独自阅读，但另一些青少年喜欢在小组讨论中分享自己的想法，这往往能带来更深入的思考。"}]},{"pos":"pron.","m":"别人，别的东西","ex":[{"l":1,"en":"I enjoyed the time we shared snacks with each other during the break time.","zh":"我很享受课间休息时我们彼此分享零食的时光。"},{"l":2,"en":"After some searching online, I learned that the people responsible for mapping out roads, mountains, oceans, and other places around the world are called cartographers.","zh":"在网上搜索之后，我了解到负责绘制世界各地的道路、山脉、海洋和其他地方的人被称为制图师。"},{"l":3,"en":"While some students prefer studying alone, others believe that discussing with classmates not only deepens their understanding but also sparks new ideas that they might never think of by themselves.","zh":"虽然有些学生喜欢独自学习，但另一些人认为与同学讨论不仅能加深理解，还能激发出他们独自永远想不到的新想法。"}]}]},{"day":37,"w":"ought","ph":"","defs":[{"pos":"v.","m":"应该，应当","ex":[{"l":1,"en":"You ought to finish your homework before dinner.","zh":"你应该在晚饭前完成作业。"},{"l":2,"en":"Since the exam is coming next week, you ought to make a study plan so that you can review all the lessons in time.","zh":"因为考试下周就要来了，你应当制定一个学习计划，以便能及时复习所有的功课。"},{"l":3,"en":"As a student aiming at a top high school, you ought to realize that every minute spent on meaningful reading will eventually pay off in ways you cannot imagine right now.","zh":"作为一个以重点高中为目标的学生，你应该意识到花在有意义的阅读上的每一分钟，最终都会以你现在无法想象的方式得到回报。"}]}]},{"day":37,"w":"out","ph":"","defs":[{"pos":"adv.","m":"向外；在外；离开","ex":[{"l":1,"en":"What would you have done if you hadn't gone out for a picnic yesterday?","zh":"昨天你要是没有出去野餐，你会做什么？"},{"l":2,"en":"When the rain finally stopped, we decided to go out and check whether the football field was dry enough for the match.","zh":"当雨终于停下时，我们决定出去看看足球场是否足够干燥，可以举行比赛。"},{"l":3,"en":"Only after he stepped out of the comfort zone that had protected him for years did he discover how much potential he really had hidden inside.","zh":"只有当他走出多年来保护他的舒适区之后，他才发现自己内心深处究竟隐藏着多大的潜力。"}]}]},{"day":37,"w":"outdoor","ph":"","defs":[{"pos":"adj.","m":"室外的","ex":[{"l":1,"en":"Children love outdoor games in spring.","zh":"春天里孩子们喜欢户外游戏。"},{"l":2,"en":"Although outdoor activities are good for our health, we should pay attention to the weather before we set off.","zh":"虽然户外活动对我们的健康有益，但出发前我们应该关注天气情况。"},{"l":3,"en":"Not only do outdoor sports build up our bodies, but they also teach us how to cooperate with others when facing unexpected challenges.","zh":"户外运动不仅强健我们的身体，还教会我们在面对意外挑战时如何与他人合作。"}]}]},{"day":37,"w":"outing","ph":"","defs":[{"pos":"n.","m":"远足；郊游；（集体）出外游玩（或学习等）","ex":[{"l":1,"en":"Ask yourself, 'Which will I spend my money on, an outing or a pair of shoes?'","zh":"问问自己，'我会把钱花在哪个上，一次郊游还是一双鞋？'"},{"l":2,"en":"Our class is planning an outing this weekend, and everyone who wants to join should sign up before Friday.","zh":"我们班计划这个周末去郊游，每个想参加的人都应该在周五前报名。"},{"l":3,"en":"What made the spring outing truly unforgettable was not the beautiful scenery but the moments when we helped each other climb to the top of the mountain.","zh":"让这次春游真正令人难忘的，不是美丽的风景，而是我们互相帮助爬上山顶的那些时刻。"}]}]},{"day":37,"w":"outside","ph":"","defs":[{"pos":"prep.","m":"在..外","ex":[{"l":1,"en":"The children are playing outside the house.","zh":"孩子们在房子外面玩耍。"},{"l":2,"en":"Outside the classroom, there is a small garden where students can read books after school.","zh":"教室外面有一个小花园，学生们放学后可以在那里读书。"},{"l":3,"en":"Just outside the city lies a quiet village, where time seems to slow down and every face you meet wears a warm smile.","zh":"就在城外坐落着一个宁静的村庄，那里的时光似乎慢了下来，你遇见的每一张脸上都挂着温暖的笑容。"}]},{"pos":"adv.","m":"在外面","ex":[{"l":1,"en":"Please wait for me outside.","zh":"请在外面等我。"},{"l":2,"en":"When I looked outside, I found that the ground was covered with yellow leaves.","zh":"当我向外看时，我发现地上铺满了黄色的落叶。"},{"l":3,"en":"Standing outside in the cold wind, the old man kept waving until the bus disappeared around the corner, which deeply moved everyone watching.","zh":"老人站在外面的冷风中不断挥手，直到公共汽车消失在街角，这一幕深深打动了所有旁观的人。"}]}]},{"day":38,"w":"oven","ph":"","defs":[{"pos":"n.","m":"炉子；烤箱","ex":[{"l":1,"en":"Mum is baking bread in the oven.","zh":"妈妈正在烤箱里烤面包。"},{"l":2,"en":"Before you put the cake into the oven, make sure that you have set the right temperature.","zh":"在你把蛋糕放进烤箱之前，要确保你已经设定好了正确的温度。"},{"l":3,"en":"It was the first time that little Tom had tried to bake cookies by himself, and the smell coming from the oven filled the whole kitchen with warmth.","zh":"这是小汤姆第一次尝试自己烤饼干，从烤箱里飘出的香味让整个厨房充满了温暖。"}]}]},{"day":38,"w":"over","ph":"","defs":[{"pos":"prep.","m":"在..上方；越过；遍及；超过","ex":[{"l":1,"en":"They're over there.","zh":"他们在那边。"},{"l":2,"en":"A new bridge has been built over the river, which makes it easier for villagers to cross.","zh":"河上建起了一座新桥，这让村民们过河更加方便。"},{"l":3,"en":"Over the past few years, our city has changed so much that even people who left long ago can hardly recognize it now.","zh":"在过去的几年里，我们的城市变化如此之大，以至于很久以前离开的人现在几乎认不出它了。"}]},{"pos":"adv.","m":"结束；越过；翻转","ex":[{"l":1,"en":"They're over there.","zh":"他们在那边。"},{"l":2,"en":"When the meeting was over, we still had a lot of questions to discuss with the teacher.","zh":"会议结束时，我们还有很多问题想和老师讨论。"},{"l":3,"en":"Hardly had the exam ended when the students rushed out of the classroom, their faces lit up with relief and joy.","zh":"考试一结束，学生们就冲出了教室，脸上洋溢着轻松和喜悦。"}]}]},{"day":38,"w":"own","ph":"","defs":[{"pos":"adj.","m":"自己的","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"一些植物有自己独特的办法来驱赶动物。"},{"l":2,"en":"Every child should learn to solve problems in his own way instead of always copying others.","zh":"每个孩子都应学会用自己的方式解决问题，而不是总是模仿别人。"},{"l":3,"en":"What matters most is not how much you own, but whether you have the courage to follow your own dream regardless of what others say.","zh":"最重要的不是你拥有多少，而是你是否有勇气不顾他人言论，追随自己的梦想。"}]},{"pos":"v.","m":"拥有","ex":[{"l":1,"en":"Some plants have their own ways to keep animals away.","zh":"一些植物有自己独特的办法来驱赶动物。"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后想说的是，尽管有人说拥有东西是巨大的快乐，但我认为使用你所拥有的东西更令人愉快。"},{"l":3,"en":"It is often said that to own a lot does not necessarily mean to own happiness, for true wealth lies in a peaceful mind.","zh":"人们常说，拥有得多并不一定意味着拥有幸福，因为真正的财富在于一颗宁静的心。"}]}]},{"day":38,"w":"owner","ph":"","defs":[{"pos":"n.","m":"拥有者；物主","ex":[{"l":1,"en":"The owner of the shop is very kind.","zh":"这家店的老板非常和善。"},{"l":2,"en":"The owner of the lost dog offered a reward to anyone who could help find it.","zh":"走失狗狗的主人悬赏任何能帮忙找到它的人。"},{"l":3,"en":"The owner of the small bookstore, who has spent his whole life collecting old books, is respected by everyone in the town.","zh":"这位小书店的店主花费一生收集旧书，受到镇上每个人的尊敬。"}]}]},{"day":38,"w":"Pacific","ph":"","defs":[{"pos":"n.","m":"太平洋","ex":[{"l":1,"en":"The Pacific is the largest ocean on Earth.","zh":"太平洋是地球上最大的海洋。"},{"l":2,"en":"There are thousands of islands scattered across the Pacific, many of which are home to rare animals.","zh":"太平洋上散布着数千座岛屿，其中许多是珍稀动物的家园。"},{"l":3,"en":"Sailing across the Pacific alone requires not only great courage but also rich experience that takes years to gain.","zh":"独自横渡太平洋不仅需要巨大的勇气，还需要花多年才能积累的丰富经验。"}]}]},{"day":38,"w":"pack","ph":"","defs":[{"pos":"n.","m":"包","ex":[{"l":1,"en":"He carried a heavy pack on his back.","zh":"他背上背着一个沉重的包。"},{"l":2,"en":"The climber opened his pack to see whether he had brought enough food for the trip.","zh":"登山者打开背包，看看自己是否带了足够的食物供这次旅行使用。"},{"l":3,"en":"Tired as he was, the soldier refused to put down his pack until he reached the camp at the foot of the mountain.","zh":"尽管很累，这名士兵还是拒绝放下背包，直到他到达山脚下的营地。"}]},{"pos":"v.","m":"打包","ex":[{"l":1,"en":"Before we started on our road trip, we packed up the car with snacks, water, and music.","zh":"在开始我们的自驾游之前，我们把零食、水和音乐装满了车子。"},{"l":2,"en":"Since we are leaving early tomorrow, we ought to pack our bags tonight so that we will not forget anything.","zh":"既然我们明天一早出发，我们今晚就该收拾好行李，这样才不会忘记任何东西。"},{"l":3,"en":"Having packed everything needed for the long journey, the young traveler stepped out bravely, ready to embrace whatever lay ahead.","zh":"收拾好长途旅行所需的一切后，这位年轻的旅行者勇敢地迈出门去，准备迎接前方的一切。"}]}]},{"day":38,"w":"page","ph":"","defs":[{"pos":"n.","m":"页；页码","ex":[{"l":1,"en":"Please turn to page ten.","zh":"请翻到第十页。"},{"l":2,"en":"The teacher asked us to write down the answers on page fifteen, which we had to hand in before the bell rang.","zh":"老师让我们把答案写在第十五页上，并且我们必须在铃响前交上来。"},{"l":3,"en":"It was on the last page of the diary that she finally understood what her grandfather had tried to tell her all those years.","zh":"正是在日记的最后一页，她终于明白了祖父这些年来一直想告诉她的道理。"}]}]},{"day":38,"w":"pain","ph":"","defs":[{"pos":"n.","m":"疼痛，疼","ex":[{"l":1,"en":"I feel a pain in my back.","zh":"我觉得背痛。"},{"l":2,"en":"The doctor told him that the pain would go away if he took the medicine on time.","zh":"医生告诉他，如果按时服药，疼痛就会消失。"},{"l":3,"en":"Only those who have gone through real hardship can understand the pain hidden behind a brave smile.","zh":"只有经历过真正苦难的人，才能理解隐藏在勇敢笑容背后的痛苦。"}]}]},{"day":38,"w":"paint","ph":"","defs":[{"pos":"v.","m":"油漆；粉刷；绘画","ex":[{"l":1,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易丝至少能活到130岁。她的心愿是工作几十年，然后把时间花在音乐和绘画上。"},{"l":2,"en":"The artist who painted this picture spent three months traveling in the mountains to find inspiration.","zh":"画这幅画的艺术家花了三个月时间在山间旅行以寻找灵感。"},{"l":3,"en":"It is said that the girl painted the whole wall by herself, which came as a great surprise to everyone in the neighborhood.","zh":"据说这个女孩独自粉刷了整面墙，这让街坊邻居都大为惊讶。"}]},{"pos":"n.","m":"油漆；涂料；颜料","ex":[{"l":1,"en":"The paint on the wall is still wet.","zh":"墙上的油漆还是湿的。"},{"l":2,"en":"Please do not touch the door, because the paint has not dried yet and it may leave marks on your hands.","zh":"请不要碰这扇门，因为油漆还没干，可能会在你手上留下痕迹。"},{"l":3,"en":"With a few drops of bright paint, the old wall was turned into a beautiful picture that attracted passers-by to stop and admire.","zh":"只用几滴明亮的颜料，这面旧墙就被变成了一幅美丽的画，吸引路人驻足欣赏。"}]}]},{"day":38,"w":"painting","ph":"","defs":[{"pos":"n.","m":"画，油画，水彩画","ex":[{"l":1,"en":"According to the family doctor, Louise will live to at least 130. Her wish is to work for a few decades and then spend her time on music and painting.","zh":"据家庭医生说，路易丝至少能活到一百三十岁。她的心愿是工作几十年，然后把时间花在音乐和绘画上。"},{"l":2,"en":"When she was a little girl, she showed great interest in painting, which later became the most important part of her life.","zh":"当她还是个小女孩时，就对绘画表现出浓厚兴趣，这后来成了她生命中最重要的部分。"},{"l":3,"en":"Not until she visited the museum did she realize how deeply the ancient painting could move her heart and change her view of art.","zh":"直到参观博物馆，她才意识到那幅古画竟能如此深深打动她的心，并改变她对艺术的看法。"}]}]},{"day":38,"w":"pair","ph":"","defs":[{"pos":"n.","m":"一双，一对","ex":[{"l":1,"en":"Ask yourself, 'Which will I spend my money on, an outing or a pair of shoes?'","zh":"问问你自己：'我会把钱花在哪件事上，一次出游还是一双鞋子？'"},{"l":2,"en":"Since the old pair of shoes is worn out, my mother decided to buy me a new pair that would last longer.","zh":"既然那双旧鞋已经穿坏了，我妈妈决定给我买一双能穿得更久的新鞋。"},{"l":3,"en":"Only after he had lost his only pair of glasses did he understand how hard daily life could be without them.","zh":"直到弄丢了唯一的一副眼镜，他才明白没有它们日常生活会是多么艰难。"}]}]},{"day":38,"w":"palace","ph":"","defs":[{"pos":"n.","m":"宫，宫殿","ex":[{"l":1,"en":"The king lived in a beautiful palace long ago.","zh":"很久以前，国王住在一座美丽的宫殿里。"},{"l":2,"en":"The Summer Palace, which is one of the most famous parks in Beijing, attracts thousands of visitors every day.","zh":"颐和园是北京最著名的公园之一，每天吸引成千上万的游客。"},{"l":3,"en":"So grand was the palace that every visitor could hardly believe it was built hundreds of years ago without modern machines.","zh":"这座宫殿如此宏伟，每位游客都难以相信它竟是几百年前在没有现代机器的情况下建造的。"}]}]},{"day":38,"w":"pale","ph":"","defs":[{"pos":"adj.","m":"苍白的，灰白的","ex":[{"l":1,"en":"Her face turned pale when she heard the bad news.","zh":"听到这个坏消息时，她的脸色变得苍白。"},{"l":2,"en":"After running for such a long time, the boy looked so pale that his mother took him to the hospital at once.","zh":"跑了这么长时间后，那男孩看起来脸色苍白，他妈妈立刻带他去了医院。"},{"l":3,"en":"Pale and weak as she looked, she still insisted on finishing the speech that she had prepared for weeks.","zh":"尽管她看上去脸色苍白、身体虚弱，她仍坚持讲完了准备了好几周的演讲。"}]}]},{"day":38,"w":"panda","ph":"","defs":[{"pos":"n.","m":"熊猫","ex":[{"l":1,"en":"The panda is one of the cutest animals in the world.","zh":"熊猫是世界上最可爱的动物之一。"},{"l":2,"en":"The giant panda, which mainly lives in Sichuan, has become a symbol of wildlife protection in China.","zh":"主要生活在四川的大熊猫，已经成为中国野生动物保护的象征。"},{"l":3,"en":"It is the panda that reminds us how important it is to protect endangered animals before it is too late.","zh":"正是熊猫提醒我们，趁还来得及，保护濒危动物是多么重要。"}]}]},{"day":38,"w":"paper","ph":"","defs":[{"pos":"n.","m":"(不可数）纸；（可数）报纸；考卷；文件","ex":[{"l":1,"en":"Please write your answer on a piece of paper.","zh":"请把你的答案写在一张纸上。"},{"l":2,"en":"Although most people read news online today, my grandfather still prefers to read the paper every morning.","zh":"虽然今天大多数人都在网上看新闻，我爷爷仍然喜欢每天早上读报纸。"},{"l":3,"en":"What surprised the teacher was that the students handed in their papers earlier than expected and did extremely well.","zh":"让老师吃惊的是，学生们交试卷的时间比预期的早，而且考得非常好。"}]}]},{"day":38,"w":"parent","ph":"","defs":[{"pos":"n.","m":"父（母），（复）双亲","ex":[{"l":1,"en":"I had thought about living with my grandparents when my parents went abroad last year.","zh":"去年我父母出国时，我曾考虑过和祖父母一起住。"},{"l":2,"en":"But parents and teachers worked together to protect the school and now they are pleased to see the result.","zh":"但是家长和老师们齐心协力保护了这所学校，如今他们很高兴看到这样的结果。"},{"l":3,"en":"Not only do parents care about their children's grades, but they also pay attention to whether their kids grow up happily and healthily.","zh":"父母不仅关心孩子的成绩，还关注孩子是否快乐健康地成长。"}]}]},{"day":38,"w":"Paris","ph":"","defs":[{"pos":"n.","m":"（法国首都）巴黎","ex":[{"l":1,"en":"Paris is the capital city of France.","zh":"巴黎是法国的首都。"},{"l":2,"en":"When I travelled to Paris last summer, I was deeply attracted by the Eiffel Tower and the kind people there.","zh":"去年夏天我去巴黎旅行时，被埃菲尔铁塔和那里善良的人们深深吸引。"},{"l":3,"en":"So romantic is Paris that it has been described as the dream city of countless young people longing for art and love.","zh":"巴黎如此浪漫，以至于被描绘成无数向往艺术与爱情的年轻人的梦想之城。"}]}]},{"day":38,"w":"park","ph":"","defs":[{"pos":"n.","m":"公园","ex":[{"l":1,"en":"If it had been fine, we would have gone to the park.","zh":"如果天气好的话，我们就会去公园了。"},{"l":2,"en":"The park near my home, where I used to play with my friends, has been turned into a large sports center.","zh":"我家附近的那座公园，我曾和朋友在那里玩耍，如今已变成一个大型体育中心。"},{"l":3,"en":"It is in this small park that the old couple meet every morning, sharing stories that warm each other's heart.","zh":"正是在这座小公园里，老两口每天清晨相会，分享着温暖彼此心灵的故事。"}]},{"pos":"v.","m":"停放（车辆等）","ex":[{"l":1,"en":"Please park your car over there behind the tree.","zh":"请把你的车停在那边树后面。"},{"l":2,"en":"You are not allowed to park here unless you have a special permit from the manager.","zh":"除非你有经理签发的特别许可证，否则不允许在这里停车。"},{"l":3,"en":"Having parked the car carelessly by the gate, he soon realized that he had blocked the only way out for the fire engine.","zh":"他把车随意停在门口后，很快意识到自己堵住了消防车唯一的出路。"}]}]},{"day":38,"w":"part","ph":"","defs":[{"pos":"n.","m":"部分；角色；部件；零件","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍然是中国交通系统的重要组成部分。"},{"l":2,"en":"This man-made waterway - known in China as Da Yunhe - is 1,700 kilometers long and some parts of it are more than 2,000 years old.","zh":"这条人工运河在中国被称为大运河，全长一千七百公里，其中一些部分有两千多年的历史。"},{"l":3,"en":"Only by taking an active part in class discussions can students truly improve their ability to think and express themselves.","zh":"只有积极参与课堂讨论，学生才能真正提高思考与表达的能力。"}]}]},{"day":38,"w":"partner","ph":"","defs":[{"pos":"n.","m":"搭档，合作者","ex":[{"l":1,"en":"He is my partner in the dancing competition.","zh":"他是我在舞蹈比赛中的搭档。"},{"l":2,"en":"Since we became partners in the science project, we have learned how to share ideas and solve problems together.","zh":"自从我们在科学项目中成为搭档以来，我们学会了如何分享想法并共同解决问题。"},{"l":3,"en":"So reliable is his partner that he never worries about anything going wrong whenever they work on a difficult task together.","zh":"他的搭档如此可靠，每当他们一起完成艰巨任务时，他从不担心出什么差错。"}]}]},{"day":38,"w":"party","ph":"","defs":[{"pos":"n.","m":"聚会，晚会；政党；党派","ex":[{"l":1,"en":"We will hold a birthday party for Lily tonight.","zh":"今晚我们将为莉莉举办一场生日聚会。"},{"l":2,"en":"The surprise party, which was prepared by her best friends, made her so moved that she could hardly speak.","zh":"由她最好的朋友们筹备的惊喜聚会让她感动得几乎说不出话来。"},{"l":3,"en":"It was at the graduation party that she finally gathered her courage and expressed thanks to the teachers who had helped her for three years.","zh":"正是在毕业聚会上，她终于鼓起勇气，向帮助了她三年的老师们表达了谢意。"}]}]},{"day":38,"w":"pass","ph":"","defs":[{"pos":"v.","m":"传，递；经过，路过；通过","ex":[{"l":1,"en":"Even if you take the exam again, you won't pass it.","zh":"即使你再次参加考试，你也通不过。"},{"l":2,"en":"If you want to pass the coming English exam, you must spend more time reading and writing every day.","zh":"如果你想通过即将到来的英语考试，就必须每天花更多时间读和写。"},{"l":3,"en":"Not until he had failed twice did he realize that to pass the exam required not only hard work but also a wise plan.","zh":"直到失败两次后他才意识到，通过这门考试不仅需要努力，还需要明智的计划。"}]}]},{"day":38,"w":"passage","ph":"","defs":[{"pos":"n.","m":"(文章等的）一节，一段；通道","ex":[{"l":1,"en":"Please read the first passage and answer the questions.","zh":"请阅读第一段文章并回答问题。"},{"l":2,"en":"The teacher asked us to read the passage carefully before we tried to find the main idea of each paragraph.","zh":"老师让我们先仔细阅读这段文章，然后再尝试找出每段的中心意思。"},{"l":3,"en":"What makes this passage special is that the writer uses simple words to express a deep truth about life and love.","zh":"使这段文章特别的是，作者用简单的词语表达了关于生命与爱的深刻道理。"}]}]},{"day":38,"w":"passenger","ph":"","defs":[{"pos":"n.","m":"乘客，旅客","ex":[{"l":1,"en":"All the passengers got off the bus safely.","zh":"所有乘客都安全地下了公交车。"},{"l":2,"en":"When the train finally arrived, the passengers who had waited for hours rushed to the doors happily.","zh":"当火车终于到站时，等了几个小时的乘客们高兴地冲向车门。"},{"l":3,"en":"So patiently did the conductor help every passenger that the whole journey became warm and pleasant despite the heavy rain.","zh":"列车员如此耐心地帮助每一位乘客，尽管下着大雨，整段旅程依然温暖愉快。"}]}]},{"day":38,"w":"passport","ph":"","defs":[{"pos":"n.","m":"护照","ex":[{"l":1,"en":"Don't forget to bring your passport when you travel abroad.","zh":"出国旅行时别忘了带上你的护照。"},{"l":2,"en":"Before you board the plane, you must show your passport and ticket to the officers at the gate.","zh":"登机前，你必须向登机口的工作人员出示护照和机票。"},{"l":3,"en":"It was his lost passport that caused him so much trouble, forcing him to stay at the airport for a whole night.","zh":"正是他丢失的护照给他带来了这么多麻烦，迫使他不得不在机场待了整整一夜。"}]}]},{"day":38,"w":"past","ph":"","defs":[{"pos":"prep.","m":"（指时间等）过；走过某处","ex":[{"l":1,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着 GPS 系统等基于计算机的工具的兴起，制图师需要比过去更强的计算机技能。"},{"l":2,"en":"As she walked past the old bookstore, she suddenly remembered the happy days she had spent there as a child.","zh":"当她走过那家旧书店时，突然想起了小时候在那里度过的快乐时光。"},{"l":3,"en":"Not until the car drove past the church did she notice that her bag had been left on the back seat of the taxi.","zh":"直到汽车驶过教堂，她才注意到自己的包被落在了出租车的后座上。"}]},{"pos":"n.","m":"过去；昔日；往事","ex":[{"l":1,"en":"With the rise of computer-based tools such as GPS systems, cartographers need stronger computer skills than they did in the past.","zh":"随着 GPS 系统等基于计算机的工具的兴起，制图师需要比过去更强的计算机技能。"},{"l":2,"en":"Although we cannot change the past, we can still learn from it and build a better future step by step.","zh":"虽然我们无法改变过去，但我们仍能从中学习，一步步建设更美好的未来。"},{"l":3,"en":"Buried in the past are not only sweet memories but also lessons that guide us to become wiser and stronger.","zh":"深藏在过去的不仅是甜蜜的回忆，还有引导我们变得更智慧、更坚强的教训。"}]}]},{"day":38,"w":"patient","ph":"","defs":[{"pos":"n.","m":"病人","ex":[{"l":1,"en":"The doctor is taking care of a sick patient.","zh":"医生正在照顾一位生病的病人。"},{"l":2,"en":"The patient who was operated on yesterday is feeling much better and will leave the hospital soon.","zh":"昨天做手术的那位病人现在感觉好多了，很快就能出院。"},{"l":3,"en":"So kind was the nurse that every patient in the ward felt cared for, as if they had been treated by their own family.","zh":"那位护士如此善良，病房里的每位病人都感到被关怀，仿佛被自己的家人照料一般。"}]},{"pos":"adj.","m":"耐心的","ex":[{"l":1,"en":"Our teacher is very patient with us.","zh":"我们的老师对我们非常有耐心。"},{"l":2,"en":"Although the math problem was very hard, the patient boy worked it out in the end.","zh":"尽管这道数学题很难，这个有耐心的男孩最终把它解出来了。"},{"l":3,"en":"Only when you are patient enough to listen to others can you truly understand how they feel.","zh":"只有当你有足够的耐心倾听他人时，你才能真正理解他们的感受。"}]}]},{"day":38,"w":"pay","ph":"","defs":[{"pos":"v.","m":"付钱，给..报酬","ex":[{"l":1,"en":"So next time before you pay for something, give it some serious thought.","zh":"所以下次在你为某物付款之前，认真想一想。"},{"l":2,"en":"If you pay attention in class, you will find it much easier to do your homework after school.","zh":"如果你上课专心听讲，你会发现放学后做作业容易得多。"},{"l":3,"en":"Not until I had to pay the bill did I realize how much money I had spent on books this term.","zh":"直到我不得不付账单时，我才意识到这学期我在书上花了多少钱。"}]},{"pos":"n.","m":"工资","ex":[{"l":1,"en":"The workers get their pay every Friday.","zh":"工人们每周五领工资。"},{"l":2,"en":"He decided to take the job because the pay was good and the workplace was close to his home.","zh":"他决定接受这份工作，因为工资不错，而且工作地点离家近。"},{"l":3,"en":"What surprised me most was that the pay of this company is higher than that of any other one in the city.","zh":"最让我惊讶的是，这家公司的工资比这座城市任何其他公司都高。"}]}]},{"day":38,"w":"P.E.","ph":"","defs":[{"pos":"","m":"体育","ex":[{"l":1,"en":"We have a P.E. class on Monday morning.","zh":"我们周一上午有一节体育课。"},{"l":2,"en":"P.E. is my favorite subject because it helps me relax after long hours of study.","zh":"体育是我最喜欢的科目，因为它帮助我在长时间学习后放松。"},{"l":3,"en":"It is in the P.E. class that I learned the importance of teamwork and never giving up.","zh":"正是在体育课上，我学到了团队合作和永不放弃的重要性。"}]}]},{"day":38,"w":"peace","ph":"","defs":[{"pos":"n.","m":"和平","ex":[{"l":1,"en":"We all wish for peace in the world.","zh":"我们都希望世界和平。"},{"l":2,"en":"People all over the world are working hard so that they can live in peace forever.","zh":"全世界的人们都在努力工作，以便能永远生活在和平之中。"},{"l":3,"en":"Only in a world of peace can children grow up happily and pursue their dreams freely.","zh":"只有在一个和平的世界里，孩子们才能快乐地成长并自由地追求梦想。"}]}]},{"day":39,"w":"pear","ph":"","defs":[{"pos":"n.","m":"梨","ex":[{"l":1,"en":"I would like to eat a sweet pear.","zh":"我想吃一个甜甜的梨。"},{"l":2,"en":"The pear you bought yesterday tastes so good that I want to buy some more today.","zh":"你昨天买的梨尝起来很好，以至于我今天想再买一些。"},{"l":3,"en":"Sweet as the pear was, I could not eat any more because I had already had too much fruit.","zh":"尽管梨很甜，我再也吃不下了，因为我已经吃了太多水果。"}]}]},{"day":39,"w":"pearl","ph":"","defs":[{"pos":"n.","m":"珍珠","ex":[{"l":1,"en":"She wears a beautiful pearl necklace.","zh":"她戴着一条美丽的珍珠项链。"},{"l":2,"en":"The pearl that he found in the river turned out to be very valuable.","zh":"他在河里发现的那颗珍珠结果非常珍贵。"},{"l":3,"en":"Rare as the pearl is, its true value lies in the story behind it rather than its price.","zh":"尽管这颗珍珠很稀有，它真正的价值在于其背后的故事而不是它的价格。"}]}]},{"day":39,"w":"pen","ph":"","defs":[{"pos":"n.","m":"钢笔；笔","ex":[{"l":1,"en":"Are these your pens?","zh":"这些是你的钢笔吗？"},{"l":2,"en":"The pen that my mother bought me writes smoothly, so I use it to do my homework every day.","zh":"我妈妈给我买的那支钢笔写字很流畅，所以我每天用它做作业。"},{"l":3,"en":"It was this very pen, given by my best friend, that accompanied me through my hardest exam days.","zh":"正是这支由我最好的朋友赠送的钢笔，陪伴我度过了最艰难的考试时光。"}]}]},{"day":39,"w":"pencil","ph":"","defs":[{"pos":"n.","m":"铅笔","ex":[{"l":1,"en":"It's a pencil.","zh":"这是一支铅笔。"},{"l":2,"en":"Please lend me a pencil because I have left mine at home this morning.","zh":"请借我一支铅笔，因为我今天早上把我的落在家里了。"},{"l":3,"en":"With only a pencil and a piece of paper, the little boy managed to draw a picture that surprised everyone.","zh":"仅凭一支铅笔和一张纸，这个小男孩就画出了一幅令所有人惊讶的画。"}]}]},{"day":39,"w":"people","ph":"","defs":[{"pos":"n.","m":"人；人们；人民","ex":[{"l":1,"en":"Who are those people?","zh":"那些人是谁？"},{"l":2,"en":"My final point is that, although some people say it is a great joy to own things, I think using the things you own is more pleasant.","zh":"我最后要指出的是，尽管有些人说拥有东西是一种巨大的快乐，我认为使用你拥有的东西更令人愉悦。"},{"l":3,"en":"The reason why so many people visit this small town is that it has kept its old style for hundreds of years.","zh":"如此多人参观这座小镇的原因是，它已经保持其古老风貌数百年了。"}]}]},{"day":39,"w":"per","ph":"","defs":[{"pos":"prep.","m":"每，每一","ex":[{"l":1,"en":"We have three classes per day.","zh":"我们每天有三节课。"},{"l":2,"en":"The bus runs every ten minutes, so about six buses come per hour during the busy time.","zh":"公共汽车每十分钟一班，所以在繁忙时段每小时大约有六班车。"},{"l":3,"en":"According to the report, each person uses about fifty plastic bags per month on average, which worries scientists a lot.","zh":"根据这份报告，每个人平均每月使用大约五十个塑料袋，这让科学家们非常担忧。"}]}]},{"day":39,"w":"percent","ph":"","defs":[{"pos":"n.","m":"百分比","ex":[{"l":1,"en":"Eighty percent of the students like English.","zh":"百分之八十的学生喜欢英语。"},{"l":2,"en":"A recent survey shows that nearly seventy percent of the students spend more than two hours on their phones every day.","zh":"最近一项调查显示，将近百分之七十的学生每天花在手机上的时间超过两小时。"},{"l":3,"en":"What is more worrying is that ninety percent of the teenagers interviewed said they could not live without a phone for a single day.","zh":"更令人担忧的是，百分之九十受访的青少年说他们一天没有手机就活不下去。"}]}]},{"day":39,"w":"perfe
