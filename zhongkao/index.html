"w":"chess","ph":"","defs":[{"pos":"n.","m":"棋","ex":[{"l":1,"en":"It is not easy to beat a robot player in a chess game.","zh":"在棋类比赛中打败机器人棋手并不容易。"},{"l":2,"en":"My grandfather plays chess every morning in the park, which helps him keep a clear mind.","zh":"我爷爷每天早上在公园里下棋，这帮助他保持头脑清醒。"},{"l":3,"en":"Having lost three chess games in a row, the young player decided to practice harder than ever before.","zh":"连续输了三盘棋之后，这位年轻棋手决定比以往任何时候都更努力地练习。"}]}]},{"day":10,"w":"chicken","ph":"","defs":[{"pos":"n.","m":"鸡；鸡肉","ex":[{"l":1,"en":"There are many chickens on the farm.","zh":"农场里有很多鸡。"},{"l":2,"en":"My mother cooked chicken soup for me when I caught a bad cold last week.","zh":"上周我患重感冒时，妈妈给我煮了鸡汤。"},{"l":3,"en":"The dish that smells so good is fried chicken, which my little brother has been looking forward to all day.","zh":"闻起来这么香的菜是炸鸡，我弟弟一整天都在盼着吃。"}]}]},{"day":10,"w":"chief","ph":"","defs":[{"pos":"adj.","m":"主要的，首要的","ex":[{"l":1,"en":"Safety is our chief problem here.","zh":"安全是我们这里的主要问题。"},{"l":2,"en":"The chief reason why he failed the exam was that he spent too much time on games.","zh":"他考试失败的主要原因是他在游戏上花了太多时间。"},{"l":3,"en":"It is patience, rather than cleverness, that remains the chief quality of a good teacher.","zh":"正是耐心，而非聪明，仍然是一位好教师的主要品质。"}]},{"pos":"n.","m":"领导，头","ex":[{"l":1,"en":"The chief of the village is very kind.","zh":"这位村长非常和善。"},{"l":2,"en":"The village chief told us that the bridge had been built more than fifty years ago.","zh":"村长告诉我们，这座桥是五十多年前建造的。"},{"l":3,"en":"Only after the chief of the tribe agreed could the visitors enter the deep forest to study the rare plants.","zh":"只有在部落首领同意之后，参观者才能进入深林研究那些稀有植物。"}]}]},{"day":10,"w":"child","ph":"","defs":[{"pos":"n.","m":"孩子，儿童","ex":[{"l":1,"en":"To be honest, being a child of a fireman can be difficult.","zh":"说实话，做消防员的孩子可能很不容易。"},{"l":2,"en":"Every child needs love and care from parents so that they can grow up happily and healthily.","zh":"每个孩子都需要父母的爱与关怀，这样他们才能健康快乐地成长。"},{"l":3,"en":"Not until he became a father himself did he understand how hard it was to raise a child alone.","zh":"直到自己当了父亲，他才明白独自抚养一个孩子有多难。"}]}]},{"day":10,"w":"childhood","ph":"","defs":[{"pos":"n.","m":"幼年时代，童年","ex":[{"l":1,"en":"I had a happy childhood in the country.","zh":"我在乡下度过了快乐的童年。"},{"l":2,"en":"Whenever I think of my childhood, I remember the small river where I used to swim with my friends.","zh":"每当回想起童年，我都会想起那条我曾和朋友一起游泳的小河。"},{"l":3,"en":"Spent in a quiet mountain village, his childhood left him so many sweet memories that he still talks about them today.","zh":"他在宁静的山村度过的童年给他留下了太多美好的回忆，以至于他至今仍时常谈起。"}]}]},{"day":10,"w":"China","ph":"","defs":[{"pos":"n.","m":"中国","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍然是中国交通系统的重要组成部分。"},{"l":2,"en":"This man-made waterway - known in China as Da Yunhe - is 1,700 kilometers long and some parts of it are more than 2,000 years old.","zh":"这条人造水道在中国被称为大运河，全长1700公里，其中一些部分已有两千多年的历史。"},{"l":3,"en":"It is in China that paper was first invented, which later spread to other countries and changed the world.","zh":"正是在中国，纸最先被发明出来，随后传到其他国家并改变了世界。"}]}]},{"day":10,"w":"china","ph":"","defs":[{"pos":"n.","m":"瓷器","ex":[{"l":1,"en":"It's still an important part of the transport system in China.","zh":"它仍然是中国交通系统的重要组成部分。"},{"l":2,"en":"This man-made waterway - known in China as Da Yunhe - is 1,700 kilometers long and some parts of it are more than 2,000 years old.","zh":"这条人造水道在中国被称为大运河，全长1700公里，其中一些部分已有两千多年的历史。"},{"l":3,"en":"The beautiful china on the table, painted by hand hundreds of years ago, is so valuable that few families could afford it.","zh":"桌上那套精美的瓷器是数百年前手工绘制的，如此贵重，以至于很少有家庭买得起。"}]}]},{"day":10,"w":"Chinese","ph":"","defs":[{"pos":"adj.","m":"中国的；中国人的；汉语的","ex":[{"l":1,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"那个中学男生能用英语讲中国传统故事吗？"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English.","zh":"路易丝现在十三岁，目前正在学习汉语，汉语已成为与英语同样重要的世界语言。"},{"l":3,"en":"Not only does she speak Chinese fluently, but she has also won first prize in a national speech contest.","zh":"她不仅汉语说得流利，还在一次全国演讲比赛中获得了一等奖。"}]},{"pos":"n.","m":"中国人；汉语","ex":[{"l":1,"en":"Can the middle school boy tell traditional Chinese stories in English?","zh":"那个中学男生能用英语讲中国传统故事吗？"},{"l":2,"en":"Louise, now thirteen, is studying Chinese at present, which has become a world language as important as English.","zh":"路易丝现在十三岁，目前正在学习汉语，汉语已成为与英语同样重要的世界语言。"},{"l":3,"en":"It is said that more and more foreigners are learning Chinese, which makes us feel truly proud of our culture.","zh":"据说越来越多的外国人在学习汉语，这让我们为自己的文化感到由衷的自豪。"}]}]},{"day":10,"w":"chocolate","ph":"","defs":[{"pos":"n.","m":"巧克力","ex":[{"l":1,"en":"I love chocolate very much.","zh":"我非常喜欢巧克力。"},{"l":2,"en":"Although chocolate tastes wonderful, eating too much of it will make you put on weight.","zh":"虽然巧克力味道很好，但吃太多会让你发胖。"},{"l":3,"en":"The box of chocolate that my aunt sent me from abroad is so beautifully packed that I do not want to open it.","zh":"我姑姑从国外寄给我的那盒巧克力包装得如此精美，以至于我都不想打开它了。"}]}]},{"day":10,"w":"choice","ph":"","defs":[{"pos":"n.","m":"选择","ex":[{"l":1,"en":"You have to make a choice now.","zh":"你现在必须做出一个选择。"},{"l":2,"en":"It is a difficult choice for him whether to study abroad or stay with his family.","zh":"出国留学还是和家人待在一起，对他来说是个艰难的选择。"},{"l":3,"en":"Faced with so many choices, the young man felt more confused than ever about his future.","zh":"面对如此多的选择，这个年轻人对自己的未来感到前所未有的困惑。"}]}]},{"day":10,"w":"choose","ph":"","defs":[{"pos":"v.","m":"选择","ex":[{"l":1,"en":"Uncle Andy tried ten different jobs, and finally chose to be a lawyer.","zh":"安迪叔叔尝试过十种不同的工作，最后选择当了一名律师。"},{"l":2,"en":"No matter how busy she is, she always chooses to read a story to her daughter before sleep.","zh":"无论多忙，她总会在睡前选择给女儿读一个故事。"},{"l":3,"en":"Only after thinking for a whole night did he choose to give up the well-paid job and follow his dream.","zh":"在思考了整整一个晚上之后，他才选择放弃那份高薪工作去追寻自己的梦想。"}]}]},{"day":10,"w":"chopstick","ph":"","defs":[{"pos":"n.","m":"筷子","ex":[{"l":1,"en":"Chinese people use chopsticks to eat.","zh":"中国人用筷子吃饭。"},{"l":2,"en":"It is not easy for foreigners to learn to use chopsticks when they first come to China.","zh":"外国人刚来中国时，学会使用筷子并不容易。"},{"l":3,"en":"Made of bamboo or wood, chopsticks are more than a eating tool - they carry a long history of Chinese culture.","zh":"筷子由竹子或木头制成，它不仅仅是一种餐具，更承载着悠久的中国文化历史。"}]}]},{"day":10,"w":"Christmas","ph":"","defs":[{"pos":"n.","m":"圣诞节","ex":[{"l":1,"en":"We have a big dinner at Christmas.","zh":"圣诞节我们吃一顿丰盛的晚餐。"},{"l":2,"en":"Before Christmas comes, children hang up stockings so that Father Christmas can put presents in them.","zh":"圣诞节来临前，孩子们挂好长筒袜，好让圣诞老人把礼物放进去。"},{"l":3,"en":"Not until Christmas morning did the children discover that the presents they had dreamed of had already been placed under the tree.","zh":"直到圣诞节早晨，孩子们才发现他们梦寐以求的礼物早已被放在了树下。"}]}]},{"day":10,"w":"church","ph":"","defs":[{"pos":"n.","m":"教堂","ex":[{"l":1,"en":"The old church stands at the end of the street.","zh":"那座古老的教堂矗立在街道的尽头。"},{"l":2,"en":"Every Sunday morning, my grandparents walk to the church which was built over a hundred years ago.","zh":"每个星期天上午，我的祖父母都会走到那座有一百多年历史的教堂。"},{"l":3,"en":"Not until I entered the quiet church did I realize how peaceful it felt to sit there for a while.","zh":"直到走进那座安静的教堂，我才意识到在那里坐一会儿是如此令人心安。"}]}]},{"day":10,"w":"cinema","ph":"","defs":[{"pos":"n.","m":"电影院；电影","ex":[{"l":1,"en":"We will go to the cinema this Saturday.","zh":"我们这个星期六要去电影院。"},{"l":2,"en":"Although it was raining heavily, they still went to the cinema to watch the new film.","zh":"虽然雨下得很大，他们仍然去电影院看那部新电影。"},{"l":3,"en":"The cinema near our school, which used to be crowded every weekend, is now closed for repairs.","zh":"我们学校附近的那家电影院，过去每个周末都人头攒动，如今却因翻修而关闭了。"}]}]},{"day":10,"w":"circle","ph":"","defs":[{"pos":"n.","m":"圆圈","ex":[{"l":1,"en":"Please draw a circle on the paper.","zh":"请在纸上画一个圆圈。"},{"l":2,"en":"The teacher asked us to sit in a circle so that everyone could see each other clearly.","zh":"老师让我们围成一个圆圈坐，这样每个人都能清楚地看到彼此。"},{"l":3,"en":"In the middle of the square lies a stone circle that has interested visitors for hundreds of years.","zh":"广场中央有一个石圈，几百年来一直吸引着游客。"}]},{"pos":"v.","m":"将...圈起来","ex":[{"l":1,"en":"Please circle the correct answer.","zh":"请把正确答案圈出来。"},{"l":2,"en":"Before you hand in the paper, circle the questions that you are not sure about.","zh":"交卷之前，请把你没有把握的题目圈出来。"},{"l":3,"en":"Having circled all the new words in the passage, she looked them up one by one in the dictionary.","zh":"把短文中所有生词都圈出来后，她在词典里逐个查阅。"}]}]},{"day":10,"w":"citizen","ph":"","defs":[{"pos":"n.","m":"公民；居民；市民","ex":[{"l":1,"en":"He is a good citizen of this country.","zh":"他是这个国家的一位好公民。"},{"l":2,"en":"A good citizen should obey the law and care about the people around him.","zh":"一个好公民应该遵守法律，并关心身边的人。"},{"l":3,"en":"As citizens of a modern city, it is our duty to protect the environment that we depend on.","zh":"作为现代城市的居民，保护我们所依赖的环境是我们应尽的责任。"}]}]},{"day":10,"w":"city","ph":"","defs":[{"pos":"n.","m":"城市","ex":[{"l":1,"en":"It connects the north of China with Hangzhou, a city in the southern part of the country.","zh":"它把中国北方和杭州这座位于该国南部的城市连接了起来。"},{"l":2,"en":"It was built as a way to transport grain from the rich agricultural land in China's south to cities in the north.","zh":"它当初被修建，是为了把中国南方富饶农业区的粮食运到北方的城市。"},{"l":3,"en":"Hangzhou, a city that I have visited twice, is famous for its beautiful lake and long history.","zh":"杭州是我去过两次的城市，它以秀美的湖泊和悠久的历史而闻名。"}]}]},{"day":10,"w":"class","ph":"","defs":[{"pos":"n.","m":"(学校里的）班级；课；等级","ex":[{"l":1,"en":"He gave a talk about his job in my class.","zh":"他在我们班上做了一个关于他工作的讲座。"},{"l":2,"en":"The students who arrived early waited quietly in the classroom before the class began.","zh":"早到的学生在上课前安静地等在教室里。"},{"l":3,"en":"Only when we work together as a class can we win the competition held next month.","zh":"只有全班齐心协力，我们才能赢得下个月举行的比赛。"}]}]},{"day":10,"w":"classmate","ph":"","defs":[{"pos":"n.","m":"同班同学","ex":[{"l":1,"en":"My classmate Li Lei is very friendly.","zh":"我的同学李雷非常友好。"},{"l":2,"en":"The classmate who sits next to me often helps me with my maths after school.","zh":"坐在我旁边的同学经常放学后帮我学数学。"},{"l":3,"en":"My desk-mate, a classmate I have known since primary school, always encourages me when I feel down.","zh":"我的同桌是我从小学起就认识的同学，每当我情绪低落时总是鼓励我。"}]}]},{"day":10,"w":"classroom","ph":"","defs":[{"pos":"n.","m":"教室","ex":[{"l":1,"en":"Our classroom is big and bright.","zh":"我们的教室又大又明亮。"},{"l":2,"en":"After school, the students cleaned the classroom until it looked as tidy as a new one.","zh":"放学后，学生们打扫教室，直到它看起来像新的一样整洁。"},{"l":3,"en":"Walking into the empty classroom, I suddenly remembered the days we had spent together.","zh":"走进空荡荡的教室，我忽然想起了我们一起度过的那些日子。"}]}]},{"day":10,"w":"clean","ph":"","defs":[{"pos":"v.","m":"弄干净；打扫","ex":[{"l":1,"en":"I clean my room every Sunday.","zh":"我每个星期天打扫我的房间。"},{"l":2,"en":"Before the guests arrived, Mother asked us to clean the house from top to bottom.","zh":"客人到来之前，妈妈让我们把房子从上到下打扫一遍。"},{"l":3,"en":"Having finished cleaning the windows, the children felt tired but proud of their work.","zh":"擦完窗户后，孩子们虽然疲惫，却为自己的劳动感到自豪。"}]},{"pos":"adj.","m":"清洁的；干净的","ex":[{"l":1,"en":"Please keep your hands clean.","zh":"请保持双手干净。"},{"l":2,"en":"The river used to be so clean that we could see the fish swimming in it.","zh":"这条河过去非常干净，我们能看见鱼在里面游来游去。"},{"l":3,"en":"What a clean and tidy room it is! It seems that someone has just cleaned it carefully.","zh":"多么干净整洁的房间啊！似乎有人刚刚仔细打扫过。"}]}]},{"day":11,"w":"clear","ph":"","defs":[{"pos":"adj.","m":"清晰的；明亮的；清楚的","ex":[{"l":1,"en":"His handwriting is very clear.","zh":"他的书写非常清晰。"},{"l":2,"en":"The teacher spoke so clearly that every student could understand the rules without difficulty.","zh":"老师讲得如此清楚，每个学生都能毫不费力地理解这些规则。"},{"l":3,"en":"It is clear that regular exercise, along with enough sleep, will help us stay healthy.","zh":"很显然，经常锻炼再加上充足的睡眠，会帮助我们保持健康。"}]},{"pos":"v.","m":"清除；清扫","ex":[{"l":1,"en":"Please clear the table after dinner.","zh":"请饭后收拾桌子。"},{"l":2,"en":"It took us the whole morning to clear the snow from the road so that cars could pass safely.","zh":"我们花了一整个上午才清除路上的积雪，好让汽车安全通过。"},{"l":3,"en":"Before clearing away the old books, Mother checked each one to make sure nothing important was lost.","zh":"在清理旧书之前，妈妈逐一检查，以确保不会丢失任何重要的东西。"}]}]},{"day":11,"w":"clearly","ph":"","defs":[{"pos":"adv.","m":"清晰地；明亮地；清楚地","ex":[{"l":1,"en":"Please speak clearly and slowly.","zh":"请清晰、缓慢地说话。"},{"l":2,"en":"Although the room was noisy, she explained the problem so clearly that we all understood.","zh":"虽然房间很吵，她却把问题解释得如此清楚，我们都听懂了。"},{"l":3,"en":"Only by listening carefully and thinking clearly can we solve such difficult problems.","zh":"只有认真倾听、清晰思考，我们才能解决如此困难的问题。"}]}]},{"day":11,"w":"clerk","ph":"","defs":[{"pos":"n.","m":"职员，办事员","ex":[{"l":1,"en":"The clerk works in a bank.","zh":"那位职员在银行工作。"},{"l":2,"en":"The shop clerk who served us yesterday was polite and patient with every customer.","zh":"昨天接待我们的那位店员对每位顾客都既礼貌又有耐心。"},{"l":3,"en":"The young clerk, having worked in the hotel for three years, knows every corner of the building.","zh":"这位年轻职员在酒店工作了三年，对大楼的每个角落都了如指掌。"}]}]},{"day":11,"w":"clever","ph":"","defs":[{"pos":"adj.","m":"聪明的","ex":[{"l":1,"en":"The clever boy worked out the maths problem.","zh":"那个聪明的男孩算出了那道数学题。"},{"l":2,"en":"Clever as he is, he still works harder than most of his classmates.","zh":"尽管他很聪明，他仍然比大多数同学都用功。"},{"l":3,"en":"It is clever of her to think of such a simple way to solve the difficult problem.","zh":"她能想出如此简单的方法来解决这个难题，真是聪明。"}]}]},{"day":11,"w":"click","ph":"","defs":[{"pos":"n.&v.","m":"（鼠标）点击","ex":[{"l":1,"en":"Click here to open the file.","zh":"点击这里打开文件。"},{"l":2,"en":"When you click the red button, the system will save your work and close the window.","zh":"当你点击红色按钮时，系统会保存你的工作并关闭窗口。"},{"l":3,"en":"With a single click, you can send the message to all your friends at the same time.","zh":"只需点击一次，你就能把信息同时发送给所有朋友。"}]}]},{"day":11,"w":"climb","ph":"","defs":[{"pos":"v.","m":"爬；攀登","ex":[{"l":1,"en":"They will climb the mountain tomorrow.","zh":"他们明天要去爬山。"},{"l":2,"en":"When we climbed to the top of the hill, we saw the whole city below us clearly.","zh":"当我们爬到山顶时，清楚地看到了下方的整座城市。"},{"l":3,"en":"Tired as they were after climbing the mountain, the children kept smiling all the way home.","zh":"尽管爬山后很疲惫，孩子们在回家的路上一直笑个不停。"}]}]},{"day":11,"w":"clinic","ph":"","defs":[{"pos":"n.","m":"诊所；医务室","ex":[{"l":1,"en":"There is a small clinic near my home.","zh":"我家附近有一家小诊所。"},{"l":2,"en":"The school clinic, which is on the first floor, is open to students from Monday to Friday.","zh":"学校医务室在一楼，星期一到星期五对学生开放。"},{"l":3,"en":"Not until he arrived at the clinic did he realize that he had left his ID card at home.","zh":"直到到了诊所，他才意识到自己把身份证落在了家里。"}]}]},{"day":11,"w":"clock","ph":"","defs":[{"pos":"n.","m":"钟","ex":[{"l":1,"en":"It's two o'clock.","zh":"现在是两点钟。"},{"l":2,"en":"When the clock struck three, the children were still playing happily in the garden.","zh":"当钟敲响三点时，孩子们仍在花园里开心地玩耍。"},{"l":3,"en":"On the wall hangs an old clock that has kept perfect time for more than fifty years.","zh":"墙上挂着一座老钟，五十多年来一直走时精准。"}]}]},{"day":11,"w":"close","ph":"","defs":[{"pos":"v.","m":"关，关闭","ex":[{"l":1,"en":"Close your book,please.","zh":"请把你的书合上。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段：起初，这所学校被要求关闭，而且教学楼不得不被出售，因为学校处于一个非常好的地段。"},{"l":3,"en":"When the last shop on the street closed down, the whole neighbourhood lost the warm light that had guided late workers home for years.","zh":"当街上最后一家店铺关门时，整个街区失去了多年来指引晚归工人回家的那盏温暖灯光。"}]},{"pos":"adj.","m":"亲密的；近的，靠近的","ex":[{"l":1,"en":"Close your book,please.","zh":"请把你的书合上。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段：起初，这所学校被要求关闭，而且教学楼不得不被出售，因为学校处于一个非常好的地段。"},{"l":3,"en":"Although they live in different cities now, the two friends remain close because they share every joy and worry with each other.","zh":"虽然他们现在住在不同的城市，这两位朋友依然亲密，因为他们彼此分享每一份快乐与忧愁。"}]},{"pos":"adv.","m":"近,靠近","ex":[{"l":1,"en":"Close your book,please.","zh":"请把你的书合上。"},{"l":2,"en":"Passage 2 In the beginning, the school was asked to close and the buildings would have to be sold off, as the school is in a very good location.","zh":"第二段：起初，这所学校被要求关闭，而且教学楼不得不被出售，因为学校处于一个非常好的地段。"},{"l":3,"en":"Standing close to the stage, the children could clearly see the smiles on every dancer's face and feel the rhythm in their hearts.","zh":"站在靠近舞台的地方，孩子们能清楚地看到每位舞者脸上的笑容，并在心里感受到那种节奏。"}]}]},{"day":11,"w":"clothes","ph":"","defs":[{"pos":"n.","m":"衣服","ex":[{"l":1,"en":"For example, getting expensive clothes didn't change me as a person, but the camping trip last summer certainly did.","zh":"例如，买昂贵的衣服并没有改变我这个人，但去年夏天的露营之旅确实改变了它。"},{"l":2,"en":"When winter comes, my mother always asks me to put on more clothes so that I won't catch a cold on my way to school.","zh":"冬天来临时，妈妈总是让我多穿些衣服，这样我在上学的路上就不会感冒了。"},{"l":3,"en":"Having donated most of her old clothes to the children in the mountains, she felt that her life had suddenly become lighter and far more meaningful.","zh":"把大部分旧衣服捐给山里的孩子后，她觉得自己的生活忽然变得轻盈了许多，也更有意义了。"}]}]},{"day":11,"w":"cloud","ph":"","defs":[{"pos":"n.","m":"云","ex":[{"l":1,"en":"A white cloud floats in the blue sky.","zh":"一朵白云漂浮在蓝天上。"},{"l":2,"en":"When I looked up, I noticed that a dark cloud was moving quickly towards us, which meant a heavy rain was on its way.","zh":"当我抬头看时，我注意到一朵乌云正向我们快速移动，这意味着一场大雨即将到来。"},{"l":3,"en":"Dark clouds rolled across the sky while the wind grew stronger, reminding everyone that the peaceful afternoon was about to be broken by a storm.","zh":"乌云翻滚着掠过天空，风也越来越大，提醒着每个人这个宁静的下午即将被一场暴风雨打破。"}]}]},{"day":11,"w":"cloudy","ph":"","defs":[{"pos":"adj.","m":"多云的；阴天的","ex":[{"l":1,"en":"It is a cloudy day today.","zh":"今天是个阴天。"},{"l":2,"en":"Because it was cloudy yesterday, we decided to stay at home and watch a film instead of going out for a picnic.","zh":"因为昨天是阴天，我们决定待在家里看电影，而不是出去野餐。"},{"l":3,"en":"On a cloudy morning, the little boat sailed slowly out of the harbour, carrying the fishermen's hopes for a safe and fruitful day at sea.","zh":"在一个多云的早晨，小船缓缓驶出港口，载着渔民们对平安丰收的海上一天的期盼。"}]}]},{"day":11,"w":"club","ph":"","defs":[{"pos":"n.","m":"俱乐部","ex":[{"l":1,"en":"I joined the English club last year.","zh":"我去年加入了英语俱乐部。"},{"l":2,"en":"The reading club which was set up three years ago has become one of the most popular clubs among the students in our school.","zh":"三年前成立的阅读俱乐部已经成为我们学校学生中最受欢迎的俱乐部之一。"},{"l":3,"en":"Not only does the music club help students relax after class, but it also encourages them to work together and express their feelings through songs.","zh":"音乐俱乐部不仅帮助学生在课后放松，还鼓励他们合作，并通过歌曲表达自己的情感。"}]}]},{"day":11,"w":"coat","ph":"","defs":[{"pos":"n.","m":"外套；上衣","ex":[{"l":1,"en":"Yes,I have both your hat and your coat.","zh":"是的，你的帽子和外套我都有。"},{"l":2,"en":"Since the wind outside was terribly cold, my father told me to wear a thick coat before I left for the railway station.","zh":"因为外面的风冷得刺骨，爸爸让我在去火车站之前穿上一件厚外套。"},{"l":3,"en":"Wearing his grandfather's old army coat, the young man walked into the snow, his mind full of memories that the family had shared around the fire.","zh":"穿着祖父那件旧军大衣，年轻人走进了雪地，脑海中满是家人围坐在炉火旁共享的回忆。"}]}]},{"day":11,"w":"coffee","ph":"","defs":[{"pos":"n.","m":"咖啡","ex":[{"l":1,"en":"He drinks a cup of coffee every morning.","zh":"他每天早上喝一杯咖啡。"},{"l":2,"en":"Before she starts working, she always makes herself a cup of coffee because it helps her stay awake and think clearly.","zh":"在她开始工作之前，她总要给自己冲一杯咖啡，因为这能帮她保持清醒、思路清晰。"},{"l":3,"en":"Smelling the fresh coffee that her mother had prepared, she finally understood that love often hides in the smallest moments of everyday life.","zh":"闻着妈妈准备好的现煮咖啡的香气，她终于明白，爱往往藏在日常生活最微小的瞬间里。"}]}]},{"day":11,"w":"coin","ph":"","defs":[{"pos":"n.","m":"硬币","ex":[{"l":1,"en":"The boy found a coin on the ground.","zh":"男孩在地上发现了一枚硬币。"},{"l":2,"en":"When I was young, my grandfather often gave me a coin whenever I finished my homework on time, which made me very happy.","zh":"我小时候，每当我按时完成作业，爷爷总会给我一枚硬币，这让我非常开心。"},{"l":3,"en":"Holding the old coin that his father had kept for decades, he realized that some treasures are valuable not because of money, but because of memory.","zh":"握着父亲珍藏了几十年的那枚旧硬币，他意识到有些珍宝之所以珍贵，并非因为金钱，而是因为记忆。"}]}]},{"day":11,"w":"cold","ph":"","defs":[{"pos":"adj.","m":"冷的，寒冷的","ex":[{"l":1,"en":"The water in the river is very cold.","zh":"河里的水很冷。"},{"l":2,"en":"Although the weather was extremely cold, the volunteers still went out to help the old people who lived alone in the village.","zh":"虽然天气极其寒冷，志愿者们仍然出门去帮助村里独居的老人。"},{"l":3,"en":"It was a cold winter morning, yet the warm smiles of the children at the school gate made every visitor feel truly welcome.","zh":"那是一个寒冷的冬晨，然而校门口孩子们温暖的笑容让每位来访者都感到由衷的受欢迎。"}]},{"pos":"n.","m":"寒冷；感冒；伤风","ex":[{"l":1,"en":"I have a bad cold today.","zh":"我今天得了重感冒。"},{"l":2,"en":"The doctor told me that if I didn't take the medicine on time, my cold would last for at least another week.","zh":"医生告诉我，如果我不按时吃药，我的感冒至少还会再持续一周。"},{"l":3,"en":"Having suffered from a bad cold for several days, she finally decided to see a doctor instead of simply staying in bed all day long.","zh":"重感冒好几天后，她终于决定去看医生，而不是整天只是躺在床上。"}]}]},{"day":11,"w":"collect","ph":"","defs":[{"pos":"v.","m":"收集，采集","ex":[{"l":1,"en":"My brother likes to collect stamps.","zh":"我哥哥喜欢收集邮票。"},{"l":2,"en":"After school, the students helped the teacher collect the rubbish that had been left on the playground by younger children.","zh":"放学后，学生们帮老师收集了低年级孩子留在操场上的垃圾。"},{"l":3,"en":"Every weekend, she goes to the old market to collect postcards, which record the changing face of the city over the past fifty years.","zh":"每个周末，她都去旧市场收集明信片，这些明信片记录了这座城市过去五十年不断变迁的面貌。"}]}]},{"day":11,"w":"collection","ph":"","defs":[{"pos":"n.","m":"收集","ex":[{"l":1,"en":"He loved to go on long walks to find stones to add to his collection at the university.","zh":"他喜欢长途散步去寻找石头，以便添进他在大学里的收藏。"},{"l":2,"en":"The museum has a wonderful collection of old paintings, and many of them were given by famous artists who once lived in this city.","zh":"这家博物馆藏有一批精美的古画，其中许多是由曾居住在这座城市的著名画家捐赠的。"},{"l":3,"en":"Through years of patient work, the old teacher built up a rich collection of folk stories that would later be passed down to children for generations.","zh":"经过多年耐心的努力，这位老教师积累起了一座丰富的民间故事宝库，后来将代代相传给孩子们。"}]}]},{"day":11,"w":"college","ph":"","defs":[{"pos":"n.","m":"学院","ex":[{"l":1,"en":"My sister studies at a college in Beijing.","zh":"我姐姐在北京的一所学院学习。"},{"l":2,"en":"After she finishes high school, she plans to go to college so that she can learn more about medicine and become a doctor.","zh":"高中毕业后，她计划上大学，以便更多地学习医学知识，成为一名医生。"},{"l":3,"en":"Only when he entered college did he realize how wide the world was, and how much he still had to learn beyond the small town where he grew up.","zh":"直到进了大学他才意识到世界有多大，也才意识到在他长大的那座小镇之外，他还有那么多东西要学。"}]}]},{"day":11,"w":"colour","ph":"","defs":[{"pos":"n.","m":"颜色","ex":[{"l":1,"en":"If you mix red and yellow, what colour will you get?","zh":"如果你把红色和黄色混合，你会得到什么颜色？"},{"l":2,"en":"She told me that her favourite colour was blue, because it always reminded her of the clear sky and the quiet sea in summer.","zh":"她告诉我她最喜欢的颜色是蓝色，因为这总让她想起夏日晴朗的天空和宁静的大海。"},{"l":3,"en":"The colour of the leaves slowly turned from green to gold, reminding people that autumn had quietly arrived and summer was gone for good.","zh":"树叶的颜色慢慢从绿色变成金色，提醒人们秋天已悄然到来，而夏天已一去不返。"}]},{"pos":"v.","m":"涂色","ex":[{"l":1,"en":"If you mix red and yellow, what colour will you get?","zh":"如果你把红色和黄色混合，你会得到什么颜色？"},{"l":2,"en":"The little girl is colouring the picture carefully while her mother is cooking dinner in the kitchen next door.","zh":"小女孩正在认真地给画涂色，而她的妈妈正在隔壁厨房里做晚饭。"},{"l":3,"en":"Watching the children colour the wall with bright flowers and birds, the elderly neighbours felt that the dull street had suddenly come back to life.","zh":"看着孩子们在墙上画出鲜艳的花朵和小鸟，年迈的邻居们觉得这条单调的街道忽然恢复了生机。"}]}]},{"day":11,"w":"come","ph":"","defs":[{"pos":"v.","m":"来；来到","ex":[{"l":1,"en":"Come in,please.","zh":"请进。"},{"l":2,"en":"No matter how many difficulties we came across, we considered them as chances for us to improve.","zh":"无论我们遇到多少困难，我们都把它们视为提升自己的机会。"},{"l":3,"en":"When the long-awaited spring finally came, the whole village seemed to wake up, and children ran happily into the fields that had been silent all winter.","zh":"当期盼已久的春天终于到来时，整个村庄仿佛苏醒过来，孩子们欢快地跑进沉寂了一整个冬天的田野。"}]}]},{"day":11,"w":"comfortable","ph":"","defs":[{"pos":"adj.","m":"舒服的","ex":[{"l":1,"en":"This chair is very comfortable.","zh":"这把椅子很舒服。"},{"l":2,"en":"The hotel room was so comfortable that I fell asleep quickly, although I had been very tired after the long journey.","zh":"这间酒店房间太舒服了，尽管长途旅行后我非常疲惫，还是很快就睡着了。"},{"l":3,"en":"What made the small house truly comfortable was not the expensive furniture, but the love and laughter that filled every corner of it.","zh":"让这座小屋真正令人舒适的，不是昂贵的家具，而是洋溢在每一个角落的爱与欢笑。"}]}]},{"day":11,"w":"common","ph":"","defs":[{"pos":"adj.","m":"普通的，一般的；共有的","ex":[{"l":1,"en":"Smith is a very common name.","zh":"史密斯是一个非常普通的名字。"},{"l":2,"en":"It is common for students to feel nervous before exams, but proper preparation can help them stay calm and confident.","zh":"学生在考试前感到紧张是很常见的，但充分的准备能帮助他们保持冷静和自信。"},{"l":3,"en":"Although the two countries share a long history, they also hold a common wish for peace, which gives people hope even in the hardest times.","zh":"虽然两国都有着悠久的历史，但他们也怀有一个共同的和平愿望，这甚至在最艰难的时刻也给人们带来希望。"}]}]},{"day":11,"w":"communicate","ph":"","defs":[{"pos":"v.","m":"交流；交际；传达（感情、信息等）","ex":[{"l":1,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"路易丝今年十三岁，目前在学习中文，中文已经成为和英语同样重要的世界语言。路易丝有很多中国朋友，他们通过电脑交流。"},{"l":2,"en":"Although they live in different countries, the two friends communicate every weekend so that they can share their ideas and learn from each other.","zh":"虽然他们住在不同的国家，这两个朋友每个周末都会交流，这样他们就能分享想法、互相学习。"},{"l":3,"en":"Only by learning to communicate clearly with others can we avoid misunderstandings and build a friendship that will last for a long time.","zh":"只有学会与他人清晰地交流，我们才能避免误解，并建立起一段能够长久维系的友谊。"}]}]},{"day":11,"w":"community","ph":"","defs":[{"pos":"n.","m":"社区","ex":[{"l":1,"en":"Our community has a small park and a library.","zh":"我们的社区有一个小公园和一座图书馆。"},{"l":2,"en":"The volunteers in our community often organize activities which help old people who live alone feel less lonely.","zh":"我们社区的志愿者经常组织活动，帮助独居的老人减少孤独感。"},{"l":3,"en":"Not only does a warm community bring people together, but it also gives everyone a sense of belonging that money cannot buy.","zh":"一个温暖的社区不仅把人们团结在一起，而且赋予每个人一种金钱买不到的归属感。"}]}]},{"day":11,"w":"company","ph":"","defs":[{"pos":"n.","m":"公司","ex":[{"l":1,"en":"My father works in a big company.","zh":"我爸爸在一家大公司工作。"},{"l":2,"en":"The company that he works for was set up ten years ago and has become one of the most successful businesses in the city.","zh":"他就职的那家公司是十年前成立的，如今已成为这座城市里最成功的企业之一。"},{"l":3,"en":"It is the company's decision to hire young people who are creative and willing to take on new challenges in the future.","zh":"公司决定录用那些富有创造力、并且愿意在未来迎接新挑战的年轻人。"}]}]},{"day":11,"w":"compare","ph":"","defs":[{"pos":"v.","m":"比较，对照","ex":[{"l":1,"en":"Please compare these two pictures.","zh":"请比较这两幅图片。"},{"l":2,"en":"When you compare your own life with that of your parents, you will understand how hard they worked when they were young.","zh":"当你把自己的生活和父母的生活相比较时，你就会理解他们年轻时工作有多辛苦。"},{"l":3,"en":"Compared with the old teaching method, the new one makes it easier for students to master what they have learned in class.","zh":"与旧的教学方法相比，新的方法让学生更容易掌握他们在课堂上学到的知识。"}]}]},{"day":11,"w":"competition","ph":"","defs":[{"pos":"n.","m":"比赛，竞赛","ex":[{"l":1,"en":"We won the singing competition last week.","zh":"上周我们赢得了歌唱比赛。"},{"l":2,"en":"She has practiced the piano every day since she decided to take part in the competition that will be held next month.","zh":"自从决定参加下个月举行的比赛以来，她每天都练习弹钢琴。"},{"l":3,"en":"What makes the competition so exciting is that every player has spent years preparing for this important moment.","zh":"让这场比赛如此激动人心的是，每位选手都为这一重要时刻准备了多年。"}]}]},{"day":11,"w":"complain","ph":"","defs":[{"pos":"v.","m":"抱怨；投诉","ex":[{"l":1,"en":"Every time you were complaining angrily, I put a stone in your bag.","zh":"每次你愤怒地抱怨时，我都会往你的袋子里放一块石头。"},{"l":2,"en":"Instead of complaining about the difficulty of the task, we should try to find a way to solve the problem that worries us.","zh":"与其抱怨任务困难，我们不如努力找到一种方法来解决这个让我们发愁的问题。"},{"l":3,"en":"Never will a person who keeps complaining about everything achieve real success, because success belongs to those who never give up.","zh":"一个总是抱怨一切的人永远不会取得真正的成功，因为成功属于那些永不放弃的人。"}]}]},{"day":12,"w":"complete","ph":"","defs":[{"pos":"adj.","m":"完成的；完整的，完全的","ex":[{"l":1,"en":"The story is a complete success.","zh":"这个故事完全是个成功之作。"},{"l":2,"en":"The teacher gave us a complete list of the books that we should read during the summer holiday.","zh":"老师给了我们一份完整的书单，上面列着我们应该在暑假期间阅读的书。"},{"l":3,"en":"It was a complete surprise to everyone that the shy girl won the first prize in the speech contest.","zh":"那个腼腆的女孩在演讲比赛中获得一等奖，这让所有人都感到十分意外。"}]},{"pos":"v.","m":"完成，结束","ex":[{"l":1,"en":"And some said they couldn't wait for the project to be finally completed at the end of this year.","zh":"有人说他们迫不及待地想看到这个项目在今年年底最终完工。"},{"l":2,"en":"Before you complete the form, please read the instructions carefully so that you will not make any mistakes.","zh":"在填写表格之前，请仔细阅读说明，这样你就不会犯任何错误。"},{"l":3,"en":"Having completed all the tasks ahead of time, the team was praised by the manager and given a long holiday.","zh":"提前完成所有任务后，这个团队受到了经理的表扬，并得到了一个长假。"}]}]},{"day":12,"w":"completely","ph":"","defs":[{"pos":"adv.","m":"完全地，完整地","ex":[{"l":1,"en":"I completely agree with you.","zh":"我完全同意你的看法。"},{"l":2,"en":"After the heavy rain, the streets were completely covered with water, which made it hard for people to walk home.","zh":"大雨过后，街道完全被水覆盖，这让人们很难走回家。"},{"l":3,"en":"The old building was completely destroyed by the fire, leaving the family with nothing but the clothes they were wearing.","zh":"那栋旧楼被大火彻底摧毁，让这一家人只剩下身上穿的衣服。"}]}]},{"day":12,"w":"computer","ph":"","defs":[{"pos":"n.","m":"电脑","ex":[{"l":1,"en":"It also helps to take courses in maths and computer science.","zh":"这也有助于学习数学和计算机科学课程。"},{"l":2,"en":"Louise,now thirteen,is studying Chinese at present,which has become a world language as important as English.Louise has many Chinese friends.They communicate by computer.","zh":"路易丝今年十三岁，目前在学习中文，中文已经成为和英语同样重要的世界语言。路易丝有很多中国朋友，他们通过电脑交流。"},{"l":3,"en":"So quickly has computer technology developed that our daily life has been changed in ways we could hardly imagine before.","zh":"计算机技术发展得如此之快，以至于我们的日常生活以我们以前几乎无法想象的方式发生了改变。"}]}]},{"day":12,"w":"concert","ph":"","defs":[{"pos":"n.","m":"音乐会，演奏会","ex":[{"l":1,"en":"We went to a concert last night.","zh":"昨晚我们去听了一场音乐会。"},{"l":2,"en":"The concert that was held in the city square attracted thousands of people who came to enjoy the beautiful music.","zh":"在城市广场举行的那场音乐会吸引了成千上万的人前来欣赏美妙的音乐。"},{"l":3,"en":"It was at the school concert that I first met the girl who later became my best friend.","zh":"正是在学校的音乐会上，我第一次遇见了那个后来成为我最好朋友的女孩。"}]}]},{"day":12,"w":"conclusion","ph":"","defs":[{"pos":"n.","m":"结论；结束，结局","ex":[{"l":1,"en":"What is your conclusion?","zh":"你的结论是什么？"},{"l":2,"en":"After a long discussion, the group finally reached the conclusion that the plan was not good enough to be carried out.","zh":"经过长时间的讨论，小组最终得出了结论：这个计划还不够好，无法实施。"},{"l":3,"en":"Taking everything into consideration, we can safely draw the conclusion that reading widely helps students improve their writing skills.","zh":"把一切因素都考虑在内，我们可以有把握地得出结论：广泛阅读有助于学生提高写作能力。"}]}]},{"day":12,"w":"conference","ph":"","defs":[{"pos":"n.","m":"(正式的）会议；讨论会","ex":[{"l":1,"en":"The conference will begin at nine.","zh":"会议将在九点开始。"},{"l":2,"en":"The headmaster said that the conference would be held next Friday, which gave everyone enough time to prepare their reports.","zh":"校长说会议将在下周五举行，这给了每个人充足的时间准备他们的报告。"},{"l":3,"en":"What surprised the reporters most at the conference was the new policy that the government had just announced.","zh":"在这次会议上，让记者们最惊讶的是政府刚刚宣布的新政策。"}]}]},{"day":12,"w":"confidence","ph":"","defs":[{"pos":"n.","m":"自信心；自信","ex":[{"l":1,"en":"She has confidence in herself.","zh":"她对自己有信心。"},{"l":2,"en":"The more you practice speaking English, the more confidence you will have when you talk with foreigners.","zh":"你练习说英语越多，你和外国人交谈时就会越有自信。"},{"l":3,"en":"It was his confidence and hard work that finally helped him realize the dream he had kept since childhood.","zh":"正是他的自信和努力，最终帮助他实现了从儿时起就怀揣的梦想。"}]}]},{"day":12,"w":"confident","ph":"","defs":[{"pos":"adj.","m":"自信的","ex":[{"l":1,"en":"He is a confident boy.","zh":"他是一个自信的男孩。"},{"l":2,"en":"Although she was nervous at first, she became confident enough to give her speech in front of the whole school.","zh":"虽然她一开始很紧张，但她变得足够自信，可以在全校师生面前发表演讲。"},{"l":3,"en":"Only a confident student dares to raise his hand and share his own opinions when the question seems difficult to answer.","zh":"只有自信的学生才敢于在问题看似难以回答时举手分享自己的观点。"}]}]},{"day":12,"w":"confuse","ph":"","defs":[{"pos":"v.","m":"使困惑；扰乱；分不清","ex":[{"l":1,"en":"The signs will confuse the driver.","zh":"这些路标会让司机困惑。"},{"l":2,"en":"The sudden change of the plan confused the students who had already prepared for the exam for weeks.","zh":"计划的突然改变让那些已经为考试准备了好几周的学生感到困惑。"},{"l":3,"en":"Confused by the long instructions, the old man did not know what to do next until his grandson came to help him.","zh":"被冗长的说明弄得一头雾水，这位老人不知道接下来该怎么办，直到他的孙子来帮助他。"}]}]},{"day":12,"w":"congratulation","ph":"","defs":[{"pos":"n.","m":"祝贺","ex":[{"l":1,"en":"Congratulations on your success!","zh":"祝贺你取得成功！"},{"l":2,"en":"Please accept my congratulations on your winning the first prize in the speech competition that was held last Saturday.","zh":"请接受我对你在上周六举行的演讲比赛中获得一等奖的祝贺。"},{"l":3,"en":"What a wonderful thing it is to receive congratulations from so many friends after years of hard work!","zh":"经过多年努力之后，能收到这么多朋友的祝贺，这是多么美好的事情啊！"}]}]},{"day":12,"w":"connect","ph":"","defs":[{"pos":"v.","m":"连接；把...联系起来","ex":[{"l":1,"en":"This gives them the feeling that they are more closely connected with the school.","zh":"这让他们感觉到自己与学校联系得更紧密了。"},{"l":2,"en":"It connects the north of China with Hangzhou, a city in the southern part of the country.","zh":"它把中国的北方和南方的城市杭州连接了起来。"},{"l":3,"en":"Closely connected with nature, the children have grown up to be healthy and full of energy.","zh":"与大自然紧密相连，这些孩子成长为健康、充满活力的人。"}]}]},{"day":12,"w":"consider","ph":"","defs":[{"pos":"v.","m":"考虑","ex":[{"l":1,"en":"No matter how many difficulties we came across, we considered them as chances for us to improve.","zh":"无论遇到多少困难，我们都把它们看作提升自己的机会。"},{"l":2,"en":"We are considering whether we should buy a new car that will be large enough for the whole family to travel in.","zh":"我们正在考虑是否应该买一辆足够大的新车，方便全家人一起出行。"},{"l":3,"en":"Considering that he had never learned French before, his progress in such a short time was really amazing.","zh":"考虑到他以前从未学过法语，他在这么短的时间内取得的进步确实令人惊叹。"}]}]},{"day":12,"w":"consist","ph":"","defs":[{"pos":"v.","m":"包含；组成，构成","ex":[{"l":1,"en":"The team consists of ten players.","zh":"这个队由十名队员组成。"},{"l":2,"en":"The committee consists of teachers and parents who work together to make the school a better place for the students.","zh":"委员会由老师和家长组成，他们共同努力让学校成为对学生更好的地方。"},{"l":3,"en":"As we all know, water consists of hydrogen and oxygen, which was discovered by scientists many years ago.","zh":"众所周知，水由氢和氧组成，这是科学家很多年前发现的。"}]}]},{"day":12,"w":"contact","ph":"","defs":[{"pos":"n.","m":"接触；联系","ex":[{"l":1,"en":"Please keep in contact with your old friends.","zh":"请和你的老朋友们保持联系。"},{"l":2,"en":"Although they live far apart, they still keep in close contact with each other through video calls.","zh":"虽然他们住得很远，但仍然通过视频电话保持着密切的联系。"},{"l":3,"en":"Only by keeping in regular contact with people from different cultures can we truly broaden our horizons and understand the world.","zh":"只有与来自不同文化背景的人保持定期的联系，我们才能真正开阔视野、了解世界。"}]},{"pos":"v.","m":"与...来往，联系","ex":[{"l":1,"en":"Please contact me when you arrive.","zh":"你到达时请与我联系。"},{"l":2,"en":"If you have any questions about the project, you can contact Mr. Wang, who is in charge of the whole plan.","zh":"如果你对这个项目有任何疑问，可以联系负责整个计划的王先生。"},{"l":3,"en":"Realizing that the problem was more serious than expected, she decided to contact the manager immediately rather than wait until the next meeting.","zh":"意识到问题比预想的更严重后，她决定立刻联系经理，而不是等到下次会议。"}]}]},{"day":12,"w":"contest","ph":"","defs":[{"pos":"n.","m":"竞赛","ex":[{"l":1,"en":"Looking back on it, I think I shouldn't have given up the contest so easily.","zh":"回想起来，我觉得我不该那么轻易放弃那场比赛。"},{"l":2,"en":"She has been preparing for the speech contest for months, so she believes that she will win the first prize in the end.","zh":"她为这次演讲比赛准备了数月，因此她相信自己最终能获得一等奖。"},{"l":3,"en":"Not until I took part in the writing contest did I realize how much my hard work over the past year had improved my English.","zh":"直到参加那次写作比赛，我才意识到过去一年的努力在多大程度上提高了我的英语水平。"}]}]},{"day":12,"w":"continue","ph":"","defs":[{"pos":"v.","m":"继续","ex":[{"l":1,"en":"We will continue our lesson after lunch.","zh":"我们午饭后将继续上课。"},{"l":2,"en":"Even though it was raining heavily, they decided to continue climbing the mountain until they reached the top.","zh":"尽管雨下得很大，他们还是决定继续爬山，直到到达山顶。"},{"l":3,"en":"Determined to finish the novel before the deadline, the writer continued working deep into the night without taking any rest.","zh":"下定决心要在截稿前完成这部小说，作家继续工作到深夜，丝毫没有休息。"}]}]},{"day":12,"w":"control","ph":"","defs":[{"pos":"v.","m":"&","ex":[{"l":1,"en":"Parents should control the time kids spend on phones.","zh":"家长应该控制孩子用手机的时间。"},{"l":2,"en":"It is important for teenagers to learn how to control their feelings when they meet with difficulties in daily life.","zh":"对青少年来说，学会在日常生活中遇到困难时如何控制自己的情绪是很重要的。"},{"l":3,"en":"Only those who are able to control themselves well can truly be the master of their own fate and achieve success in the future.","zh":"只有能够很好地控制自己的人，才能真正成为自己命运的主人，并在未来取得成功。"}]},{"pos":"n.","m":"控制","ex":[{"l":1,"en":"The driver lost control of the car.","zh":"司机失去了对汽车的控制。"},{"l":2,"en":"When the teacher left the classroom, the students lost control and started shouting and running around.","zh":"老师离开教室后，学生们失去了控制，开始大喊大叫、四处奔跑。"},{"l":3,"en":"It was the strict training that helped the young pilot keep the plane under control even in the most terrible weather.","zh":"正是严格的训练帮助这位年轻的飞行员即使在最恶劣的天气下也能让飞机保持受控。"}]}]},{"day":12,"w":"convenient","ph":"","defs":[{"pos":"adj.","m":"便利的，方便的","ex":[{"l":1,"en":"Thanks to the invention of the smart phone, it's convenient to take photos anytime.","zh":"多亏了智能手机的发明，随时拍照变得很方便。"},{"l":2,"en":"Online shopping is so convenient that more and more people prefer buying things at home rather than going to the stores.","zh":"网购如此方便，以至于越来越多的人宁愿在家购物，也不愿去商店。"},{"l":3,"en":"Living near the subway station makes it convenient for us to travel around the city, which saves us a great deal of time every day.","zh":"住在地铁站附近使我们出行很方便，每天为我们节省了大量时间。"}]}]},{"day":12,"w":"conversation","ph":"","defs":[{"pos":"n.","m":"会话；谈话","ex":[{"l":1,"en":"We had a pleasant conversation just now.","zh":"我们刚才进行了一次愉快的谈话。"},{"l":2,"en":"During the conversation, I found that the old man had traveled to many countries and had lots of interesting stories to share.","zh":"在谈话中，我发现那位老人去过许多国家，有许多有趣的故事可以分享。"},{"l":3,"en":"It was through that brief conversation with the famous scientist that I came to understand what true passion for research really means.","zh":"正是通过与那位著名科学家的简短交谈，我才真正理解了对研究真正的热爱意味着什么。"}]}]},{"day":12,"w":"cook","ph":"","defs":[{"pos":"n.","m":"厨师，炊事员","ex":[{"l":1,"en":"My father is a good cook.","zh":"我爸爸是个好厨师。"},{"l":2,"en":"The cook who works in the restaurant is famous for his special dishes that attract a large number of customers every day.","zh":"在餐厅工作的那位厨师因拿手菜而闻名，每天都有大量顾客慕名而来。"},{"l":3,"en":"As a cook with twenty years of experience, he firmly believes that the secret of delicious food lies in fresh materials and a patient heart.","zh":"作为一名有二十年经验的厨师，他坚信美味食物的秘诀在于新鲜的食材和一颗耐心的心。"}]},{"pos":"v.","m":"烹调；做饭","ex":[{"l":1,"en":"My mother is cooking dinner in the kitchen.","zh":"我妈妈正在厨房里做晚饭。"},{"l":2,"en":"While my grandmother was cooking in the kitchen, I sat beside her and listened to the interesting stories of her childhood.","zh":"奶奶在厨房做饭的时候，我坐在她身旁，听她讲童年的趣事。"},{"l":3,"en":"Having spent the whole afternoon cooking a big meal for the family, she felt tired but extremely happy when everyone praised the food.","zh":"花了一整个下午为家人做了一顿丰盛的饭菜后，当所有人都称赞饭菜时，她虽然疲惫却无比开心。"}]}]},{"day":12,"w":"cool","ph":"","defs":[{"pos":"adj.","m":"凉的；凉爽的；酷","ex":[{"l":1,"en":"The water in the glass is cool.","zh":"杯子里的水很凉。"},{"l":2,"en":"The cool wind blew gently through the open window while we were having a picnic under the big tree by the river.","zh":"当我们在河边的大树下野餐时，凉爽的风从敞开的窗户轻轻吹过。"},{"l":3,"en":"Not only is the new design cool enough to attract young people, but it is also highly practical for everyday use in different situations.","zh":"这项新设计不仅足够酷炫以吸引年轻人，而且在日常不同场合的使用中也非常实用。"}]}]},{"day":12,"w":"copy","ph":"","defs":[{"pos":"n.","m":"抄本；副本；一本","ex":[{"l":1,"en":"I bought a copy of the new book.","zh":"我买了一本那本新书。"},{"l":2,"en":"Please send a copy of the report to every member of the team so that they can read it before the meeting begins.","zh":"请把报告的副本发给团队的每位成员，以便他们在会议开始前阅读。"},{"l":3,"en":"It was said that only one copy of the ancient book remained in the world, which made it extremely valuable to collectors and scholars alike.","zh":"据说这本古书在世上仅存一本，这使它对收藏家和学者们都极其珍贵。"}]},{"pos":"v.","m":"抄写；复印；拷贝；模仿","ex":[{"l":1,"en":"Please copy these words into your notebook.","zh":"请把这些词抄到你的笔记本上。"},{"l":2,"en":"The teacher asked the students to copy the important sentences from the text so that they could review them after class.","zh":"老师让学生们从课文中抄下重要的句子，以便课后复习。"},{"l":3,"en":"Instead of simply copying what others have done, we should try to think creatively and come up with our own ideas in solving problems.","zh":"在解决问题时，我们不应简单地照搬别人的做法，而应努力创造性地思考，提出自己的想法。"}]}]},{"day":12,"w":"corner","ph":"","defs":[{"pos":"n.","m":"角；角落；拐角","ex":[{"l":1,"en":"There is a shop on the corner.","zh":"拐角处有一家商店。"},{"l":2,"en":"When I walked past the corner of the street, I noticed an old man sitting quietly on a small wooden bench reading a newspaper.","zh":"当我走过街角时，我注意到一位老人正静静地坐在一张小木长凳上看报纸。"},{"l":3,"en":"Hidden in the corner of the old library was a rare collection of books that had been passed down for several generations.","zh":"藏在旧图书馆角落里的是一批珍贵的藏书，它们已经传了好几代人。"}]}]},{"day":12,"w":"correct","ph":"","defs":[{"pos":"adj.","m":"正确的，对的；恰当的","ex":[{"l":1,"en":"Excuse me.Can you tell me the correct time?","zh":"打扰一下，你能告诉我准确的时间吗？"},{"l":2,"en":"Please make sure that you have filled in the correct answers before you hand in your examination paper to the teacher.","zh":"请确保在把试卷交给老师之前，你已经填上了正确的答案。"},{"l":3,"en":"It is of great importance that we should form the habit of using the correct words at the correct time in communication.","zh":"重要的是，我们应该养成在交流中在恰当的时间使用恰当的词语的习惯。"}]},{"pos":"v.","m":"改正；纠正","ex":[{"l":1,"en":"Please correct your mistakes in time.","zh":"请及时改正你的错误。"},{"l":2,"en":"The teacher patiently helped the students correct the mistakes in their compositions so that they could make progress in writing.","zh":"老师耐心地帮助学生纠正作文中的错误，以便他们能在写作上取得进步。"},{"l":3,"en":"Realizing one's own shortcomings and being willing to correct them is the first step toward becoming a better and wiser person.","zh":"认识到自身的不足并愿意改正，是成为一个更优秀、更明智之人的第一步。"}]}]},{"day":12,"w":"correctly","ph":"","defs":[{"pos":"adv.","m":"正确地","ex":[{"l":1,"en":"Please answer the question correctly.","zh":"请正确地回答这个问题。"},{"l":2,"en":"If you want to use this machine correctly, you should read the instructions carefully before you start it for the first time.","zh":"如果你想正确使用这台机器，首次启动前你应该仔细阅读说明书。"},{"l":3,"en":"Only by practicing again and again can students learn to pronounce each new word correctly and speak English fluently in public.","zh":"只有通过反复练习，学生才能学会正确发出每个新单词的音，并在公众面前流利地说英语。"}]}]},{"day":12,"w":"cost","ph":"","defs":[{"pos":"v.","m":"值（多少钱）；花费","ex":[{"l":1,"en":"The book costs twenty yuan.","zh":"这本书值二十元。"},{"l":2,"en":"The new smartphone costs so much that I have to save money for several months before I can afford it.","zh":"这款新智能手机太贵了，我得攒几个月的钱才买得起。"},{"l":3,"en":"It is said that studying abroad costs a great deal of money, but the experience gained there is well worth the price for many young people.","zh":"据说出国留学要花费一大笔钱，但那里获得的经历对许多年轻人来说是物有所值的。"}]}]},{"day":12,"w":"cotton","ph":"","defs":[{"pos":"n.","m":"棉花","ex":[{"l":1,"en":"This shirt is made of cotton.","zh":"这件衬衫是棉布做的。"},{"l":2,"en":"Cotton is widely grown in this area because the warm weather and rich soil make it easy for farmers to get a good harvest every year.","zh":"这一地区广泛种植棉花，因为温暖的气候和肥沃的土壤使农民每年都能轻松获得丰收。"},{"l":3,"en":"Compared with other materials, cotton is not only soft and comfortable to wear but also friendly to the environment, which explains its lasting popularity.","zh":"与其他材料相比，棉布不仅穿着柔软舒适，而且对环境友好，这也解释了它持久的受欢迎程度。"}]}]},{"day":12,"w":"cough","ph":"","defs":[{"pos":"v.","m":"&","ex":[{"l":1,"en":"Cover your mouth when you cough.","zh":"咳嗽时捂住嘴巴。"},{"l":2,"en":"If you cough badly and have a high fever, you had better see a doctor as soon as possible instead of staying at home alone.","zh":"如果你咳嗽得很厉害并且发高烧，你最好尽快去看医生，而不是独自待在家里。"},{"l":3,"en":"Having coughed for nearly a week without getting any better, she finally decided to go to the hospital for a thorough check-up.","zh":"咳嗽了将近一周都没有好转后，她最终决定去医院做个全面检查。"}]},{"pos":"n.","m":"咳嗽","ex":[{"l":1,"en":"The boy has a bad cough today.","zh":"这个男孩今天咳嗽得厉害。"},{"l":2,"en":"The doctor told me that I should drink more water because my cough was getting worse.","zh":"医生告诉我应该多喝水，因为我的咳嗽越来越严重了。"},{"l":3,"en":"Having suffered from a bad cough for nearly a week, she finally decided to see the doctor before it turned into something more serious.","zh":"咳嗽得厉害将近一周后，她终于在病情变得更严重之前决定去看医生。"}]}]},{"day":12,"w":"count","ph":"","defs":[{"pos":"v.","m":"数","ex":[{"l":1,"en":"Let me count the apples on the table.","zh":"让我数一数桌上的苹果。"},{"l":2,"en":"The little girl can already count from one to one hundred, which surprises everyone in her family.","zh":"这个小女孩已经能从一数到一百，这让家里所有人都感到惊讶。"},{"l":3,"en":"Only when we begin to count our blessings do we realize how lucky we actually are in our daily lives.","zh":"只有当我们开始清点自己所受的恩惠时，才会意识到日常生活中我们其实有多么幸运。"}]}]},{"day":12,"w":"country","ph":"","defs":[{"pos":"n.","m":"国家；农村；乡下","ex":[{"l":1,"en":"It connects the north of China with Hangzhou, a city in the southern part of the country.","zh":"它把中国北方与南方的城市杭州连接起来。"},{"l":2,"en":"Though China is a huge country, the high-speed railway makes it easy to travel from one city to another.","zh":"虽然中国是一个巨大的国家，但高铁让城市之间的旅行变得很方便。"},{"l":3,"en":"It is this rich history and diverse culture that make the country so attractive to travelers from all over the world.","zh":"正是这段悠久的历史和多元的文化，使这个国家对来自世界各地的游客如此有吸引力。"}]}]},{"day":13,"w":"couple","ph":"","defs":[{"pos":"n.","m":"夫妇；一对；一双；一副","ex":[{"l":1,"en":"The old couple live a happy life.","zh":"这对老夫妇过着幸福的生活。"},{"l":2,"en":"The young couple who live next door moved here a couple of years ago and they are very friendly to us.","zh":"住在隔壁的那对年轻夫妇几年前搬到这里，他们对我们非常友好。"},{"l":3,"en":"Having travelled for a couple of weeks, the elderly couple decided to settle down in a small town by the sea.","zh":"旅行了几周之后，这对老夫妇决定在海边的一个小镇上安顿下来。"}]}]},{"day":13,"w":"course","ph":"","defs":[{"pos":"n.","m":"过程；经过；课程","ex":[{"l":1,"en":"It also helps to take courses in maths and computer science.","zh":"学习数学和计算机科学课程也有帮助。"},{"l":2,"en":"During the course of the summer camp, students not only learned new skills but also made a lot of good friends.","zh":"在夏令营的过程中，学生们不仅学到了新技能，还交了很多好朋友。"},{"l":3,"en":"Of course, the more effort you put into this course, the greater progress you will make by the end of the term.","zh":"当然，你在这门课程上投入的努力越多，到期末时取得的进步就越大。"}]}]},{"day":13,"w":"cousin","ph":"","defs":[{"pos":"n.","m":"堂（表）兄弟；堂（表）姐妹","ex":[{"l":1,"en":"My cousin is a kind boy.","zh":"我的表哥是个善良的男孩。"},{"l":2,"en":"My cousin who studies in Beijing often sends me letters to tell me about her interesting school life.","zh":"在北京读书的表姐经常给我写信，告诉我她有趣的学校生活。"},{"l":3,"en":"Not until my cousin came to visit us last summer did I realize how fast time had flown since we were children.","zh":"直到去年夏天表哥来看望我们，我才意识到从我们小时候起时间过得有多快。"}]}]},{"day":13,"w":"cover","ph":"","defs":[{"pos":"v.","m":"覆盖；遮盖；掩盖","ex":[{"l":1,"en":"Snow covers the ground in winter.","zh":"冬天雪覆盖着地面。"},{"l":2,"en":"The mountain was covered with white snow, which made it look like a beautiful picture in a fairy tale.","zh":"这座山被白雪覆盖着，这使它看起来像童话中的一幅美丽图画。"},{"l":3,"en":"Covered with thick green forests, the hills around our village provide a perfect home for all kinds of wild animals.","zh":"我们村庄周围的山丘覆盖着茂密的绿色森林，为各种野生动物提供了完美的家园。"}]},{"pos":"n.","m":"盖子；罩；封面","ex":[{"l":1,"en":"The book has a nice cover.","zh":"这本书有一个漂亮的封面。"},{"l":2,"en":"When you finish reading the book, please remember to put the cover back so that the pages will not get dirty.","zh":"当你读完这本书时，请记得把封皮套回去，这样书页就不会弄脏。"},{"l":3,"en":"It is the bright cover of the magazine that first caught my attention as I walked into the bookstore yesterday.","zh":"昨天我走进书店时，首先吸引我注意力的正是这本杂志鲜艳的封面。"}]}]},{"day":13,"w":"crazy","ph":"","defs":[{"pos":"adj.","m":"疯狂的","ex":[{"l":1,"en":"He is crazy about football.","zh":"他对足球很着迷。"},{"l":2,"en":"Many teenagers are crazy about pop music because it helps them relax after a long day of study.","zh":"许多青少年对流行音乐很着迷，因为它能帮助他们在长时间的学习后放松。"},{"l":3,"en":"Crazy about painting since she was a little girl, Mary has won several prizes in national art competitions.","zh":"玛丽从小就对绘画着迷，已经在全国艺术比赛中赢得了多个奖项。"}]}]},{"day":13,"w":"cream","ph":"","defs":[{"pos":"n.","m":"奶油，乳脂","ex":[{"l":1,"en":"I like ice cream very much.","zh":"我非常喜欢吃冰淇淋。"},{"l":2,"en":"My mother bought some fresh cream and fruit so that we could make a birthday cake at home together.","zh":"妈妈买了一些新鲜奶油和水果，这样我们就可以一起在家做生日蛋糕了。"},{"l":3,"en":"Not only is the cake covered with sweet cream, but it is also decorated with fresh strawberries from our garden.","zh":"这块蛋糕不仅覆盖着甜甜的奶油，还用我们花园里的新鲜草莓装饰着。"}]}]},{"day":13,"w":"create","ph":"","defs":[{"pos":"v.","m":"创造；造成","ex":[{"l":1,"en":"Sharing a new experience develops stronger relationships and creates long-lasting memories.","zh":"分享新的经历能培养更牢固的关系，并创造持久的回忆。"},{"l":2,"en":"It made me wonder: Who creates maps in the first place?","zh":"这让我想知道：到底是谁创造了地图？"},{"l":3,"en":"Only by working closely together can we create a better future for the children who will grow up in this changing world.","zh":"只有通过密切合作，我们才能为将在不断变化的世界中成长的孩子们创造更美好的未来。"}]}]},{"day":13,"w":"creative","ph":"","defs":[{"pos":"adj.","m":"创造性的，有创意的","ex":[{"l":1,"en":"She is a creative student.","zh":"她是个有创意的学生。"},{"l":2,"en":"The teacher encourages us to think in a creative way whenever we meet difficult problems in our study.","zh":"每当我们在学习中遇到难题时，老师都鼓励我们用有创意的方式思考。"},{"l":3,"en":"Such a creative idea has never come to my mind before, which shows how talented the young designer really is.","zh":"如此有创意的点子以前从未出现在我脑海中，这显示了这位年轻设计师多么有才华。"}]}]},{"day":13,"w":"cross","ph":"","defs":[{"pos":"n.","m":"十字形的东西","ex":[{"l":1,"en":"There is a red cross on the box.","zh":"盒子上有一个红十字。"},{"l":2,"en":"The hospital mark is a red cross, which can be easily recognized by people who need medical help.","zh":"医院的标志是一个红十字，需要医疗帮助的人可以很容易地认出它。"},{"l":3,"en":"Drawn in the shape of a cross on the old map, the sign was said to show where the treasure had been hidden long ago.","zh":"旧地图上画着一个十字形的标记，据说它标示着宝藏很久以前被藏匿的地方。"}]},{"pos":"v.","m":"越过；穿过","ex":[{"l":1,"en":"Be careful when you cross the street.","zh":"过马路时要小心。"},{"l":2,"en":"Please wait until the traffic light turns green before you cross the busy road in front of our school.","zh":"请等到交通灯变绿后再穿过我们学校前面那条繁忙的马路。"},{"l":3,"en":"Having crossed the river on a small boat, the travellers finally reached the village where they would spend the night.","zh":"乘小船渡过河后，旅行者们终于到达了他们将过夜的村庄。"}]}]},{"day":13,"w":"crowd","ph":"","defs":[{"pos":"n.","m":"人群","ex":[{"l":1,"en":"A big crowd waited at the gate.","zh":"一大群人等在门口。"},{"l":2,"en":"When the famous singer appeared on the stage, the crowd cheered so loudly that nobody could hear anything else.","zh":"当那位著名歌手出现在舞台上时，人群欢呼得非常响亮，以至于谁也听不见别的声音。"},{"l":3,"en":"Pushed gently by the eager crowd, the little boy slowly moved toward the front to get a clearer view of the parade.","zh":"在急切的人群的轻推下，小男孩慢慢向前面挪动，以便更清楚地看到游行队伍。"}]}]},{"day":13,"w":"crowded","ph":"","defs":[{"pos":"adj.","m":"拥挤的","ex":[{"l":1,"en":"The market is very crowded.","zh":"市场非常拥挤。"},{"l":2,"en":"The shopping mall was so crowded that we could hardly move when we went there during the holiday.","zh":"假期我们去那家购物中心时，里面太拥挤了，我们几乎无法走动。"},{"l":3,"en":"Not used to such crowded places, the old man decided to sit down at a quiet corner and wait for his daughter.","zh":"由于不习惯如此拥挤的地方，老人决定在一个安静的角落坐下等他的女儿。"}]}]},{"day":13,"w":"cry","ph":"","defs":[{"pos":"v.","m":"喊叫；哭","ex":[{"l":1,"en":"The baby began to cry loudly.","zh":"婴儿开始大声哭起来。"},{"l":2,"en":"When the little girl fell off her bike, she started to cry because her knee hurt a lot.","zh":"当小女孩从自行车上摔下来时，她开始哭，因为膝盖疼得厉害。"},{"l":3,"en":"Hearing the sad news, the boy could hardly hold back his tears, yet he tried not to cry in front of his friends.","zh":"听到这个悲伤的消息，男孩几乎忍不住泪水，但他还是努力不在朋友面前哭出来。"}]},{"pos":"n.","m":"叫喊；哭声","ex":[{"l":1,"en":"I heard a loud cry outside.","zh":"我听到外面有一声大叫。"},{"l":2,"en":"Suddenly there came a cry for help from the river, which made everyone on the bank turn around at once.","zh":"突然从河里传来一声呼救，这让岸上所有人立刻转过身来。"},{"l":3,"en":"It was the sudden cry in the dark that woke the whole family up and sent them rushing out of the house.","zh":"正是黑暗中那突然的一声叫喊，把全家人都吵醒，并使他们冲出了屋子。"}]}]},{"day":13,"w":"culture","ph":"","defs":[{"pos":"n.","m":"文化","ex":[{"l":1,"en":"Chinese culture is very rich.","zh":"中国文化非常丰富。"},{"l":2,"en":"Learning a foreign language well also means understanding the culture of the country where it is spoken.","zh":"学好一门外语也意味着了解说这种语言的国家的文化。"},{"l":3,"en":"Deeply interested in traditional culture, the exchange student decided to spend another year studying Chinese history.","zh":"由于对传统文化深感着迷，这位交换生决定再花一年时间学习中国历史。"}]}]},{"day":13,"w":"cup","ph":"","defs":[{"pos":"n.","m":"茶杯，杯子","ex":[{"l":1,"en":"Please give me a cup of tea.","zh":"请给我一杯茶。"},{"l":2,"en":"After a long walk in the park, my grandmother sat down and asked me to bring her a cup of hot water.","zh":"在公园里走了很长一段路后，奶奶坐下来，让我给她端一杯热水。"},{"l":3,"en":"Never before had I tasted such delicious tea, which was served in a beautiful cup made by a famous local artist.","zh":"我以前从未尝过这么美味的茶，它是用一位当地著名艺术家制作的漂亮杯子端上来的。"}]}]},{"day":13,"w":"custom","ph":"","defs":[{"pos":"n.","m":"习惯；习俗","ex":[{"l":1,"en":"It is a Chinese custom to eat dumplings at Spring Festival.","zh":"春节吃饺子是中国人的习俗。"},{"l":2,"en":"When you visit a foreign country, you should respect the local custom so that people there will welcome you warmly.","zh":"当你去外国游玩时，应该尊重当地的习俗，这样那里的人们才会热情地欢迎你。"},{"l":3,"en":"Only when we understand the history behind each custom can we truly respect the culture that has shaped it over hundreds of years.","zh":"只有当我们理解每个习俗背后的历史时，才能真正尊重塑造它的数百年文化。"}]}]},{"day":13,"w":"customer","ph":"","defs":[{"pos":"n.","m":"顾客，主顾","ex":[{"l":1,"en":"The shop has many customers every day.","zh":"这家店每天都有很多顾客。"},{"l":2,"en":"The manager told us that customers who buy more than two hundred yuan of goods would get a small gift for free.","zh":"经理告诉我们，购买超过两百元商品的顾客可以免费得到一份小礼物。"},{"l":3,"en":"It is the smile of every customer that encourages the young shopkeeper to keep serving people with patience and love.","zh":"正是每位顾客的微笑，鼓励这位年轻的店主继续以耐心和爱心服务大家。"}]}]},{"day":13,"w":"cut","ph":"","defs":[{"pos":"v.","m":"切；剪；削；割","ex":[{"l":1,"en":"Please cut the apple into four pieces.","zh":"请把苹果切成四块。"},{"l":2,"en":"Before you cook the meat, you should cut it into small pieces so that it can be cooked more quickly.","zh":"在煮肉之前，你应该把它切成小块，这样能煮得更快。"},{"l":3,"en":"Not until the teacher cut the cake did the children realize that the party had already begun without them noticing.","zh":"直到老师切开蛋糕，孩子们才意识到聚会已经在他们没注意的时候开始了。"}]}]},{"day":13,"w":"cute","ph":"","defs":[{"pos":"adj.","m":"可爱的；漂亮迷人的","ex":[{"l":1,"en":"Look at that cute cat on the chair.","zh":"看椅子上那只可爱的猫。"},{"l":2,"en":"My little sister looks really cute in the red dress that my mother bought her last Sunday.","zh":"我妹妹穿着妈妈上周日给她买的那条红裙子，看起来真可爱。"},{"l":3,"en":"What a cute puppy it is that follows its owner everywhere, wagging its tail happily all day long!","zh":"这是一只多么可爱的小狗啊，它到处跟着主人，整天快乐地摇着尾巴！"}]}]},{"day":13,"w":"cycle","ph":"","defs":[{"pos":"v.","m":"骑（自行）车","ex":[{"l":1,"en":"For example, I spend most of my spare money on new parts for my old mountain bike, but I love the experience of cycling, not owning bike parts!","zh":"例如，我把大部分零花钱花在给旧山地车配新零件上，但我爱的是骑行的体验，而不是拥有自行车零件！"},{"l":2,"en":"I cycle to school every morning because it not only saves time but also helps me keep healthy and happy.","zh":"我每天早上骑车上学，因为这不仅节省时间，还能让我保持健康快乐。"},{"l":3,"en":"It is cycling along the river in the early morning that makes the old man feel young and full of energy again.","zh":"正是清晨沿着河边骑行，让这位老人再次感到年轻、充满活力。"}]}]},{"day":13,"w":"dad","ph":"","defs":[{"pos":"n.","m":"（口语）爸爸","ex":[{"l":1,"en":"My dad often reads newspapers after dinner.","zh":"我爸爸常常在晚饭后看报纸。"},{"l":2,"en":"When I was a little child, my dad always told me bedtime stories until I fell asleep quietly in his arms.","zh":"当我还是小孩时，爸爸总是给我讲睡前故事，直到我安静地在他怀里睡着。"},{"l":3,"en":"It was my dad who first taught me that honesty matters far more than any prize we might win in life.","zh":"正是我爸爸最先教会我，诚实远比我们在人生中可能赢得的任何奖品都重要。"}]}]},{"day":13,"w":"daily","ph":"","defs":[{"pos":"adj.","m":"每天的；日常的","ex":[{"l":1,"en":"Reading is my daily habit.","zh":"阅读是我的日常习惯。"},{"l":2,"en":"Taking a short walk after meals has become his daily habit, which the doctor says is good for his health.","zh":"饭后散一小会儿步已经成了他的日常习惯，医生说这对他的健康有好处。"},{"l":3,"en":"Such a simple daily exercise, if kept for years, will surely help you build a strong body and a clear mind.","zh":"这样简单的日常锻炼，如果坚持多年，一定能帮你练就强健的体魄和清晰的头脑。"}]},{"pos":"adv.","m":"每天","ex":[{"l":1,"en":"I check my email daily.","zh":"我每天查看邮件。"},{"l":2,"en":"The students practice speaking English daily so that they can make great progress before the exam comes.","zh":"学生们每天练习说英语，以便在考试到来之前取得很大进步。"},{"l":3,"en":"Only by reading aloud daily can we improve our pronunciation and remember new words more easily.","zh":"只有每天大声朗读，我们才能改进发音，更轻松地记住生词。"}]},{"pos":"n.","m":"日报","ex":[{"l":1,"en":"He reads the daily every morning.","zh":"他每天早上读这份日报。"},{"l":2,"en":"My grandfather has read the same daily for thirty years, and he says it helps him know the changing world.","zh":"我爷爷读同一份日报已经三十年了，他说这能帮助他了解不断变化的世界。"},{"l":3,"en":"It is this small daily that brings the latest local news to thousands of families every single morning.","zh":"正是这份小型日报，每个清晨把最新的本地新闻带给成千上万的家庭。"}]}]},{"day":13,"w":"damage","ph":"","defs":[{"pos":"n.&v.","m":"破坏；损害","ex":[{"l":1,"en":"The storm damaged many houses.","zh":"暴风雨损坏了许多房屋。"},{"l":2,"en":"Smoking can seriously damage your health, so you'd better give it up as early as possible.","zh":"吸烟会严重损害你的健康，所以你最好尽早戒掉。"},{"l":3,"en":"Not only does the flood damage the crops, but it also leaves many families without a safe home to return to.","zh":"洪水不仅损害了庄稼，还让许多家庭失去了可以回去的安全住所。"}]}]},{"day":13,"w":"dance","ph":"","defs":[{"pos":"n.&v.","m":"跳舞","ex":[{"l":1,"en":"They dance happily at the party.","zh":"他们在聚会上快乐地跳舞。"},{"l":2,"en":"The children will dance on the stage after they finish singing the song that they have practiced for weeks.","zh":"孩子们在唱完练习了数周的那首歌后，将在舞台上跳舞。"},{"l":3,"en":"It is the traditional dance that connects the young people with the long history of their village.","zh":"正是这种传统舞蹈，把年轻人与村庄悠久的历史联系在一起。"}]}]},{"day":13,"w":"dancer","ph":"","defs":[{"pos":"n.","m":"跳舞者，舞蹈演员","ex":[{"l":1,"en":"She wants to be a famous dancer.","zh":"她想成为一名著名的舞蹈演员。"},{"l":2,"en":"As a young dancer, she practices for hours every day so that she can perform beautifully on the big stage.","zh":"作为一名年轻的舞蹈演员，她每天练习好几个小时，以便能在那个大舞台上优美地表演。"},{"l":3,"en":"Such a gifted dancer is she that even the strict teacher could not hide his surprise at her wonderful performance.","zh":"她是如此有天赋的舞蹈演员，连严厉的老师都无法掩饰对她精彩表演的惊讶。"}]}]},{"day":13,"w":"danger","ph":"","defs":[{"pos":"n.","m":"危险","ex":[{"l":1,"en":"We learned much about fire and the danger firemen face.","zh":"我们学到了很多关于火以及消防员所面临的危险的知识。"},{"l":2,"en":"The sign warns us that there is a great danger here, so we must keep away from it at once.","zh":"标志警告我们这里有巨大的危险，所以我们必须立刻远离它。"},{"l":3,"en":"Only when we face danger bravely can we discover how strong and patient we truly are inside.","zh":"只有勇敢面对危险时，我们才能发现自己内心到底有多坚强和耐心。"}]}]},{"day":13,"w":"dangerous","ph":"","defs":[{"pos":"adj.","m":"危险的","ex":[{"l":1,"en":"Nowadays, many robots have been used to work in dangerous situations.","zh":"如今，许多机器人已被用于在危险的环境中工作。"},{"l":2,"en":"It is dangerous for children to play by the river alone, especially when the water runs fast after heavy rain.","zh":"孩子们单独在河边玩耍很危险，尤其是在大雨之后水流湍急的时候。"},{"l":3,"en":"So dangerous is the mountain road at night that even the most experienced drivers choose to stop and wait for the morning.","zh":"夜晚的山路如此危险，连最有经验的司机也选择停下来等到天亮。"}]}]},{"day":13,"w":"dare","ph":"","defs":[{"pos":"v.&v.","m":"敢，敢于","ex":[{"l":1,"en":"He dare not jump into the cold water.","zh":"他不敢跳进冷水里。"},{"l":2,"en":"If you dare to try new things, you will find that learning English can be both interesting and useful.","zh":"如果你敢于尝试新事物，你会发现学习英语既有趣又有用。"},{"l":3,"en":"Only those who dare to face failure again and again will finally reach the goal they have dreamed of for years.","zh":"只有那些敢于一次次面对失败的人，才能最终到达他们梦想多年的目标。"}]}]},{"day":13,"w":"dark","ph":"","defs":[{"pos":"n.","m":"黑暗；暗处；深色","ex":[{"l":1,"en":"The cat hides in the dark.","zh":"那只猫躲在暗处。"},{"l":2,"en":"Children are often afraid of the dark because they think something terrible may be hiding in the corner.","zh":"孩子们常常害怕黑暗，因为他们觉得角落里可能藏着可怕的东西。"},{"l":3,"en":"It was in the dark that the little girl finally understood how warm and safe her home really was.","zh":"正是在黑暗中，小女孩才终于明白她的家是多么温暖和安全。"}]},{"pos":"adj.","m":"黑暗的；暗淡的；深色的","ex":[{"l":1,"en":"The room is too dark to read.","zh":"房间太暗了，没法看书。"},{"l":2,"en":"It was a cold and dark winter night, but the warm light from the window made me feel safe and happy.","zh":"那是一个寒冷又黑暗的冬夜，但窗户里透出的温暖灯光让我感到安全和快乐。"},{"l":3,"en":"No matter how dark the road ahead may seem, we should keep walking with hope burning in our hearts.","zh":"无论前方的路看起来多么黑暗，我们都应该怀着心中燃烧的希望继续前行。"}]}]},{"day":13,"w":"date","ph":"","defs":[{"pos":"n.","m":"日期；约会","ex":[{"l":1,"en":"What's the date today?","zh":"今天几号？"},{"l":2,"en":"Please write down the date and time of the meeting so that nobody in our class will forget it next week.","zh":"请把会议的日期和时间写下来，这样下周我们班就不会有人忘记了。"},{"l":3,"en":"It was on that cold morning that I finally understood the true meaning of the date we celebrate every year.","zh":"正是那个寒冷的早晨，我终于明白了我们每年庆祝的这个日期的真正含义。"}]}]},{"day":13,"w":"daughter","ph":"","defs":[{"pos":"n.","m":"女儿","ex":[{"l":1,"en":"Their daughter is a clever girl.","zh":"他们的女儿是个聪明的女孩。"},{"l":2,"en":"The proud mother said that her daughter had won first prize in the English speech contest held last Friday.","zh":"这位自豪的母亲说，她女儿在上周五举行的英语演讲比赛中获得了一等奖。"},{"l":3,"en":"Such a kind and brave daughter is she that the whole neighborhood speaks highly of her whenever she is mentioned.","zh":"她是如此善良勇敢的女儿，每当提起她，整个街区都对她赞不绝口。"}]}]},{"day":14,"w":"day","ph":"","defs":[{"pos":"n.","m":"（一）天，（一）日；白天","ex":[{"l":1,"en":"What day is today?","zh":"今天星期几？"},{"l":2,"en":"The whole day we walked around the countryside, and every now and then, my uncle put stones in our bags.","zh":"我们一整天都在乡间散步，时不时地，叔叔就往我们的包里放石头。"},{"l":3,"en":"It is the small kindness we share each day that slowly turns an ordinary life into a truly meaningful one.","zh":"正是我们每天分享的小小善意，慢慢把平凡的生活变成真正有意义的生活。"}]}]},{"day":14,"w":"dead","ph":"","defs":[{"pos":"adj.","m":"死的；无生命的","ex":[{"l":1,"en":"The flowers are dead because of the cold weather.","zh":"因为天气寒冷，这些花已经枯死了。"},{"l":2,"en":"When we arrived at the old house, we found that the battery in the clock was already dead.","zh":"当我们到达那座旧房子时，我们发现钟里的电池已经没电了。"},{"l":3,"en":"Although the old custom seems dead in modern cities, it is still kept alive by a few villages in the mountains.","zh":"尽管这种古老习俗在现代城市里似乎已经消亡，但它仍被山区的一些村庄保留着。"}]}]},{"day":14,"w":"deal","ph":"","defs":[{"pos":"v.","m":"对付；分配，分给；给予；经营","ex":[{"l":1,"en":"I will deal with this problem after lunch.","zh":"我会在午饭后处理这个问题。"},{"l":2,"en":"The teacher dealt the cards to each student so that they could play the game together.","zh":"老师把卡片分给每一位学生，以便他们能一起玩这个游戏。"},{"l":3,"en":"It is the manager who has to deal with these difficult customers whenever they complain about the service.","zh":"每当难缠的顾客抱怨服务时，都必须由经理亲自来处理。"}]},{"pos":"n.","m":"交易","ex":[{"l":1,"en":"We made a deal at the market yesterday.","zh":"昨天我们在市场上做成了一笔交易。"},{"l":2,"en":"The two companies reached a deal after they had discussed the price for a whole week.","zh":"两家公司在对价格讨论了整整一周之后达成了一笔交易。"},{"l":3,"en":"Not until both sides were satisfied with every detail did they finally sign the deal that would change the market.","zh":"直到双方对每个细节都满意，他们才最终签下了这笔将改变市场的交易。"}]}]},{"day":14,"w":"dear","ph":"","defs":[{"pos":"adj.","m":"亲爱的；贵的","ex":[{"l":1,"en":"My dear grandmother lives in the countryside.","zh":"我亲爱的祖母住在乡下。"},{"l":2,"en":"This dress is too dear for me, so I have to think twice before I buy it.","zh":"这条裙子对我来说太贵了，所以我买之前得三思。"},{"l":3,"en":"Dear as the old stamp is, the collector still refuses to sell it because it carries the memory of his father.","zh":"尽管这枚旧邮票价格昂贵，那位收藏家仍拒绝出售它，因为它承载着对父亲的记忆。"}]}]},{"day":14,"w":"death","ph":"","defs":[{"pos":"n.","m":"死亡","ex":[{"l":1,"en":"The death of his pet dog made him very sad.","zh":"宠物狗的死让他非常伤心。"},{"l":2,"en":"The doctor tried his best to save the patient, but death came in the end.","zh":"医生尽全力抢救这位病人，但死亡最终还是降临了。"},{"l":3,"en":"After hearing the news of the hero's death, the whole town fell silent, realizing how much he had done for them.","zh":"听到这位英雄牺牲的消息后，整个小镇陷入沉默，意识到他曾为他们做过那么多。"}]}]},{"day":14,"w":"debate","ph":"","defs":[{"pos":"v.&n.","m":"争论，辩论；讨论","ex":[{"l":1,"en":"We will debate this question in class tomorrow.","zh":"我们明天将在课堂上辩论这个问题。"},{"l":2,"en":"The students debated whether mobile phones should be allowed in school, and each side gave strong reasons.","zh":"学生们辩论学校是否应该允许带手机，双方都给出了有力的理由。"},{"l":3,"en":"After a long debate, the committee decided that the new rule would benefit most students in the long run.","zh":"经过长时间的讨论，委员会决定这项新规定从长远来看将使大多数学生受益。"}]}]},{"day":14,"w":"December","ph":"","defs":[{"pos":"n.","m":"十二月","ex":[{"l":1,"en":"Last month was December,wasn't it?","zh":"上个月是十二月，对吗？"},{"l":2,"en":"December is the last month of the year, when many families get together to celebrate the holidays.","zh":"十二月是一年的最后一个月，许多家庭会聚在一起庆祝节日。"},{"l":3,"en":"It was in December that the famous writer finished her novel, which later won several important prizes.","zh":"正是在十二月，这位著名作家完成了她的小说，这部作品后来赢得了好几个重要奖项。"}]}]},{"day":14,"w":"decide","ph":"","defs":[{"pos":"v.","m":"决定；下决心","ex":[{"l":1,"en":"I decide to learn English every morning.","zh":"我决定每天早上学英语。"},{"l":2,"en":"She has decided that she will join the school team because basketball is her favourite sport.","zh":"她已经决定加入校队，因为篮球是她最喜欢的运动。"},{"l":3,"en":"Only after he had compared the prices did he decide to buy the computer online instead of in the store.","zh":"只有比较了价格之后，他才决定在网上而不是在店里购买这台电脑。"}]}]},{"day":14,"w":"decision","ph":"","defs":[{"pos":"n.","m":"决定；决心","ex":[{"l":1,"en":"It is a hard decision for me to make.","zh":"这对我来说是个艰难的决定。"},{"l":2,"en":"Making a good decision requires not only courage but also enough information about the choices.","zh":"做出一个好决定不仅需要勇气，还需要关于各个选项的充分信息。"},{"l":3,"en":"The decision to study abroad, which worried his parents at first, turned out to be the best choice for his future.","zh":"出国留学的决定起初让父母担心，结果却证明是他未来最好的选择。"}]}]},{"day":14,"w":"decorate","ph":"","defs":[{"pos":"v.","m":"装饰","ex":[{"l":1,"en":"We decorate the room for the party.","zh":"我们为聚会装饰房间。"},{"l":2,"en":"The children decorated the Christmas tree with colourful lights and stars they had made by themselves.","zh":"孩子们用彩灯和自己亲手做的星星装饰了圣诞树。"},{"l":3,"en":"Decorated with flowers and ribbons, the hall looked so beautiful that everyone stopped to take photos.","zh":"用鲜花和彩带装饰后，大厅看起来如此美丽，以至于每个人都停下脚步拍照。"}]}]},{"day":14,"w":"deep","ph":"","defs":[{"pos":"adj.","m":"深的","ex":[{"l":1,"en":"It is making parts of it deeper, so bigger ships can use it.","zh":"它正在把部分河段挖得更深，这样更大的船只就能通航了。"},{"l":2,"en":"The river is so deep that no child is allowed to swim here without an adult beside them.","zh":"这条河很深，没有大人陪同，任何孩子都不允许在这里游泳。"},{"l":3,"en":"Lost in deep thought, he did not even notice that the rain had started to fall on his shoulders.","zh":"他陷入了沉思，甚至没有察觉到雨已经开始落在他的肩上。"}]}]},{"day":14,"w":"degree","ph":"","defs":[{"pos":"n.","m":"程度；度数；学位","ex":[{"l":1,"en":"The degree might be in cartography, geography, or something similar.","zh":"该学位可能是制图学、地理学或类似的学科。"},{"l":2,"en":"After she gets her degree, she hopes to find a job that is connected with protecting the environment.","zh":"拿到学位后，她希望找到一份与保护环境有关的工作。"},{"l":3,"en":"To a large degree, your success depends on how much effort you are willing to put into your daily work.","zh":"在很大程度上，你的成功取决于你愿意在日常工作中投入多少努力。"}]}]},{"day":14,"w":"delay","ph":"","defs":[{"pos":"v.&n.","m":"拖延，延误，延期","ex":[{"l":1,"en":"The train was delayed by the heavy rain.","zh":"火车因大雨而延误了。"},{"l":2,"en":"Please do not delay handing in your homework, or the teacher will ask you to stay after school.","zh":"请不要拖延交作业，否则老师会让你放学后留下。"},{"l":3,"en":"Because of the long delay caused by the storm, the plane did not take off until midnight, which made all the passengers tired.","zh":"由于风暴造成的长时间延误，飞机直到午夜才起飞，这使所有乘客都疲惫不堪。"}]}]},{"day":14,"w":"delicious","ph":"","defs":[{"pos":"adj.","m":"美味的，可口的","ex":[{"l":1,"en":"This cake is very delicious.","zh":"这块蛋糕非常美味。"},{"l":2,"en":"The soup that my mother cooked last night was so delicious that I had two bowls of it.","zh":"昨晚妈妈煮的汤非常美味，我喝了两碗。"},{"l":3,"en":"Few dishes in this restaurant are as delicious as the roast duck that has made the shop famous for thirty years.","zh":"这家餐厅里很少有哪道菜能像那道让店铺闻名三十年的烤鸭一样美味。"}]}]},{"day":14,"w":"deliver","ph":"","defs":[{"pos":"v.","m":"投递（邮件、邮包等）；传送","ex":[{"l":1,"en":"The postman delivers letters every morning.","zh":"邮递员每天早上送信。"},{"l":2,"en":"The company promises that it will deliver the goods to your door within two days after you place the order.","zh":"公司承诺会在你下单后两天内把货物送到你家门口。"},{"l":3,"en":"Invited to give a speech, the professor delivered such an inspiring talk that many students decided to follow his field of study.","zh":"受邀演讲时，这位教授做了一场如此鼓舞人心的报告，许多学生决定追随他的研究领域。"}]}]},{"day":14,"w":"dentist","ph":"","defs":[{"pos":"n.","m":"牙科医生","ex":[{"l":1,"en":"I will go to see the dentist tomorrow.","zh":"我明天去看牙医。"},{"l":2,"en":"The dentist told the boy that he should brush his teeth twice a day if he wanted to keep them healthy.","zh":"牙医告诉男孩，如果想保持牙齿健康，他应该每天刷两次牙。"},{"l":3,"en":"It was the kind dentist who noticed the girl's fear and spoke to her softly until she finally sat in the chair.","zh":"正是那位和蔼的牙医注意到了女孩的恐惧，轻声对她说话，直到她终于坐到了椅子上。"}]}]},{"day":14,"w":"deny","ph":"","defs":[{"pos":"v.","m":"否认，否定","ex":[{"l":1,"en":"He denies taking the book.","zh":"他否认拿了这本书。"},{"l":2,"en":"The boy denied that he had broken the window, but the teacher did not believe him at all.","zh":"男孩否认自己打破了窗户，但老师根本不相信他。"},{"l":3,"en":"No one can deny that reading widely helps us think more clearly and understand the world in a deeper way.","zh":"没有人能否认，广泛阅读有助于我们更清晰地思考，并以更深的方式理解世界。"}]}]},{"day":14,"w":"departure","ph":"","defs":[{"pos":"n.","m":"离开","ex":[{"l":1,"en":"The departure time is nine o'clock.","zh":"出发时间是九点。"},{"l":2,"en":"Please check the departure time on your ticket so that you will not miss the train tomorrow morning.","zh":"请核对车票上的出发时间，这样你就不会错过明天早上的火车。"},{"l":3,"en":"At his departure, the whole family stood at the gate, waving until the car disappeared around the corner of the street.","zh":"他启程时，全家人站在门口挥手，直到汽车消失在街道拐角处。"}]}]},{"day":14,"w":"depend","ph":"","defs":[{"pos":"v.","m":"依靠，依赖；取决于","ex":[{"l":1,"en":"Children depend on their parents.","zh":"孩子们依赖他们的父母。"},{"l":2,"en":"Whether we can hold the picnic tomorrow depends on the weather, which changes quickly in spring.","zh":"我们明天能否举行野餐取决于天气，而春天的天气变化很快。"},{"l":3,"en":"The success of the project depends largely on how well the team members work together under pressure.","zh":"这个项目的成功在很大程度上取决于团队成员在压力下合作的默契程度。"}]}]},{"day":14,"w":"describe","ph":"","defs":[{"pos":"v.","m":"描写，叙述","ex":[{"l":1,"en":"Can you describe the picture in English?","zh":"你能用英语描述这幅画吗？"},{"l":2,"en":"The witness was asked to describe the man who had stolen the bag from the old lady in the park.","zh":"目击者被要求描述那个在公园里从老太太手中抢走包的男人。"},{"l":3,"en":"Written in simple but warm words, the letter described the town so vividly that readers felt as if they had been there.","zh":"这封信用朴实而温暖的语言把小镇描写得如此生动，读者仿佛身临其境。"}]}]},{"day":14,"w":"deserve","ph":"","defs":[{"pos":"v.","m":"应得；应受","ex":[{"l":1,"en":"You did a good job and you deserve the prize.","zh":"你做得很好，理应得到这个奖。"},{"l":2,"en":"If you always help others when they are in trouble, you deserve to be respected by everyone.","zh":"如果你总是在别人有困难时帮助他们，你就值得被大家尊敬。"},{"l":3,"en":"Only after you have paid great effort day and night do you truly deserve the honour that many students dream of.","zh":"只有在你日夜付出巨大努力之后，你才真正配得上许多学生梦寐以求的那份荣誉。"}]}]},{"day":14,"w":"design","ph":"","defs":[{"pos":"v.","m":"设计；策划","ex":[{"l":1,"en":"My father will design a new house for us.","zh":"我爸爸将为我们设计一座新房子。"},{"l":2,"en":"The engineers who designed this bridge spent three years making sure that it was safe enough for cars.","zh":"设计这座桥的工程师们花了三年时间确保它对汽车足够安全。"},{"l":3,"en":"In order to design a product that truly satisfies customers, the team not only studied the market but also collected hundreds of opinions from users.","zh":"为了设计出一款真正让顾客满意的产品，团队不仅研究了市场，还收集了数百条用户的意见。"}]}]},{"day":14,"w":"desire","ph":"","defs":[{"pos":"n.","m":"愿望，欲望","ex":[{"l":1,"en":"He has a strong desire to learn English well.","zh":"他有强烈的愿望要把英语学好。"},{"l":2,"en":"Although she has a deep desire to travel around the world, she has to save enough money first.","zh":"虽然她有一个环游世界的强烈愿望，但她必须先攒够钱。"},{"l":3,"en":"It is the desire for knowledge, rather than the hope for prizes, that drives the young scientist to keep working late into the night.","zh":"正是对知识的渴望，而不是对奖品的期望，驱使这位年轻的科学家一直工作到深夜。"}]},{"pos":"v.","m":"渴望；热切希望","ex":[{"l":1,"en":"I desire a cup of hot tea after work.","zh":"下班后我想要一杯热茶。"},{"l":2,"en":"All the students in our class desire to enter a good high school when they finish junior middle school.","zh":"我们班所有的学生都渴望在初中毕业后进入一所好高中。"},{"l":3,"en":"Knowing that her parents desired her to become a doctor, the girl still decided to follow her own heart and study art.","zh":"知道父母希望她成为一名医生，这个女孩仍然决定听从自己的内心去学习艺术。"}]}]},{"day":14,"w":"desk","ph":"","defs":[{"pos":"n.","m":"书桌，写字台","ex":[{"l":1,"en":"There is a new dictionary on my desk.","zh":"我的书桌上有一本新词典。"},{"l":2,"en":"The book that you are looking for was left on the desk in our classroom yesterday afternoon.","zh":"你正在找的那本书昨天下午被落在我们教室的课桌上了。"},{"l":3,"en":"Whenever he felt tired of studying, he would sit quietly at his desk, looking out of the window and thinking about his future.","zh":"每当他厌倦学习时，他就会安静地坐在书桌前，望着窗外，思考自己的未来。"}]}]},{"day":14,"w":"destroy","ph":"","defs":[{"pos":"v.","m":"破坏，毁坏","ex":[{"l":1,"en":"The heavy rain destroyed many houses.","zh":"大雨摧毁了许多房屋。"},{"l":2,"en":"The storm was so strong that it destroyed several villages and left hundreds of people homeless.","zh":"暴风雨如此猛烈，以至于它摧毁了几个村庄，让数百人无家可归。"},{"l":3,"en":"What destroyed the old temple was not the fire itself, but the years of neglect that had weakened its wooden walls.","zh":"毁掉这座古庙的不是大火本身，而是多年疏于维护使它的木墙变得脆弱。"}]}]},{"day":14,"w":"detail","ph":"","defs":[{"pos":"n.","m":"细节","ex":[{"l":1,"en":"Please tell me the details of the plan.","zh":"请告诉我这个计划的细节。"},{"l":2,"en":"Before you sign the contract, you should read every detail carefully so that you will not regret later.","zh":"在签合同之前，你应该仔细阅读每一个细节，这样以后才不会后悔。"},{"l":3,"en":"The teacher asked the students to pay attention to the details hidden in the passage, for they often decided the final answer to the question.","zh":"老师让学生们注意隐藏在文章中的细节，因为这些细节常常决定问题的最终答案。"}]}]},{"day":14,"w":"detective","ph":"","defs":[{"pos":"adj.","m":"侦探的","ex":[{"l":1,"en":"He likes reading detective stories very much.","zh":"他非常喜欢读侦探故事。"},{"l":2,"en":"The detective novel that I borrowed from the library last week is so exciting that I cannot put it down.","zh":"我上周从图书馆借的那本侦探小说太精彩了，以至于我放不下它。"},{"l":3,"en":"Written by a famous British writer, this detective story has been translated into more than twenty languages since it first came out.","zh":"这部由一位英国著名作家写的侦探故事自首次出版以来，已被翻译成二十多种语言。"}]},{"pos":"n.","m":"侦探","ex":[{"l":1,"en":"The detective caught the thief at last.","zh":"侦探最终抓住了那个小偷。"},{"l":2,"en":"The clever detective found out who had stolen the painting by studying the footprints left on the floor.","zh":"那位聪明的侦探通过研究留在地板上的脚印，查出了是谁偷了那幅画。"},{"l":3,"en":"It took the detective nearly a month to discover the truth that everyone in the small town had tried to keep secret.","zh":"这位侦探花了将近一个月才发现那个小镇上每个人都试图保守的秘密真相。"}]}]},{"day":14,"w":"develop","ph":"","defs":[{"pos":"v.","m":"发展；开发，培养","ex":[{"l":1,"en":"I really think the school will develop with success.","zh":"我真的认为这所学校会成功地发展下去。"},{"l":2,"en":"Sharing a new experience develops stronger relationships and creates long-lasting memories.","zh":"分享新的经历能建立更牢固的关系，并创造出持久的回忆。"},{"l":3,"en":"Not only does reading help us develop our thinking ability, but it also opens a window through which we can see a wider world.","zh":"阅读不仅帮助我们发展思维能力，还打开了一扇窗，透过它我们可以看到更广阔的世界。"}]}]},{"day":14,"w":"development","ph":"","defs":[{"pos":"n.","m":"发展","ex":[{"l":1,"en":"The city has seen fast development in recent years.","zh":"这座城市近年来发展迅速。"},{"l":2,"en":"With the rapid development of science and technology, our life has become much easier than before.","zh":"随着科技的快速发展，我们的生活比以前变得方便多了。"},{"l":3,"en":"The development of online learning, which used to be doubted by many parents, has now proved to be an important way for students to study at home.","zh":"在线学习的发展曾被许多家长怀疑，现在却已被证明是学生在家学习的重要方式。"}]}]},{"day":14,"w":"dial","ph":"","defs":[{"pos":"v.","m":"拨电话号码","ex":[{"l":1,"en":"Please dial 110 when you are in danger.","zh":"遇到危险时请拨打110。"},{"l":2,"en":"If you dial the wrong number by mistake, you should say sorry politely before you hang up the phone.","zh":"如果你不小心拨错了号码，你应该在挂电话之前礼貌地道歉。"},{"l":3,"en":"Realizing that he had dialled the wrong number, the old man quickly put down the phone and dialled his daughter again to make sure she was safe.","zh":"意识到自己拨错了号码，老人迅速放下电话，又拨给了女儿以确保她安全。"}]}]},{"day":15,"w":"dialogue","ph":"","defs":[{"pos":"n.","m":"对话","ex":[{"l":1,"en":"Let us have a dialogue with our teacher.","zh":"我们和老师进行一次对话吧。"},{"l":2,"en":"The dialogue between the two countries has helped them solve many problems that had troubled them for years.","zh":"两国之间的对话帮助他们解决了许多困扰他们多年的问题。"},{"l":3,"en":"Through an open dialogue with their parents, the teenagers finally understood why so many rules had been made for them.","zh":"通过与父母坦诚的对话，这些青少年终于明白了为什么为他们制定了那么多规则。"}]}]},{"day":15,"w":"diar
